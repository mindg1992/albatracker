                    </div>
                </div>
            );
        }

        // 직원 내 정보 탭
        function EmpProfileTab({ empAccount, firebaseUser, showAlert, showConfirm, onDisconnectWorkplace }) {
            const [formData, setFormData] = useState({
                residentId: empAccount?.residentId || '',
                bank: empAccount?.bank || '',
                account: empAccount?.account || '',
                address: empAccount?.address || '',
                phone: empAccount?.phone || ''
            });
            const [saving, setSaving] = useState(false);
            const [viewingContract, setViewingContract] = useState(null);
            const [showContractWrite, setShowContractWrite] = useState(false);
            const [contractTemplate, setContractTemplate] = useState(null);
            const [liveDeleteReq, setLiveDeleteReq] = useState(empAccount?.contractDeleteRequest || null);

            const contractStatus = empAccount?.contractStatus || null;
            const isContractBlocked = contractStatus === 'needs_resign' || contractStatus === 'pending_boss';

            const formatResidentId = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 13);
                return digits.length > 6 ? `${digits.slice(0,6)}-${digits.slice(6)}` : digits;
            };

            const formatPhone = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 11);
                if (digits.length <= 3) return digits;
                if (digits.length <= 7) return `${digits.slice(0,3)}-${digits.slice(3)}`;
                return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    if (empAccount?.isGoogleEmployee && empAccount?.bossUid) {
                        await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                            .collection('workplaces').doc(empAccount.bossUid)
                            .update({
                                residentId: formData.residentId,
                                bank: formData.bank,
                                account: formData.account,
                                address: formData.address,
                                phone: formData.phone
                            });
                    } else {
                        await fbDb.collection('employeeAccounts').doc(firebaseUser.uid).update({
                            residentId: formData.residentId,
                            bank: formData.bank,
                            account: formData.account,
                            address: formData.address,
                            phone: formData.phone
                        });
                    }
                    showAlert('정보가 저장되었습니다.', '저장 완료', 'success');
                } catch(e) {
                    showAlert('저장 실패: ' + e.message, '오류', 'error');
                }
                setSaving(false);
            };

            const handleViewContract = async () => {
                try {
                    const doc = await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                        .collection('workplaces').doc(empAccount.bossUid).get();
                    const data = doc.data();
                    const contract = data?.contract;
                    if (contract) {
                        setLiveDeleteReq(data?.contractDeleteRequest || null);
                        setViewingContract(contract);
                    } else showAlert('저장된 근로계약서가 없습니다.', '안내', 'info');
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleRequestDeleteContract = () => {
                if (!showConfirm) return;
                showConfirm('근로계약서를 재작성하시겠습니까?', async () => {
                    try {
                        const result = await requestContractDelete(firebaseUser.uid, empAccount.bossUid, 'employee');
                        if (result === 'deleted') {
                            showAlert('근로계약서가 삭제되었습니다.', '삭제 완료', 'success');
                        } else {
                            setLiveDeleteReq('employee');
                            showAlert('재작성 요청을 보냈습니다.\n관리자가 동의하면 삭제됩니다.', '요청 완료', 'success');
                        }
                    } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 재작성');
            };

            const handleCancelDeleteContract = async () => {
                try {
                    await cancelContractDeleteRequest(firebaseUser.uid, empAccount.bossUid, 'employee');
                    setLiveDeleteReq(null);
                    showAlert('삭제 요청이 취소되었습니다.', '취소 완료', 'success');
                } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
            };

            const handleStartRewrite = async () => {
                try {
                    const wsDoc = await fbDb.collection('workspaces').doc(empAccount.bossUid).get();
                    const template = wsDoc.data()?.contractTemplate;
                    if (!template) { showAlert('관리자가 근로계약서 템플릿을 설정하지 않았습니다.', '안내', 'info'); return; }
                    setContractTemplate(template);
                    setShowContractWrite(true);
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleResubmit = async (contractData) => {
                await resubmitEmpContract(firebaseUser.uid, empAccount.bossUid, contractData);
                setShowContractWrite(false);
                showAlert('근로계약서가 제출되었습니다.\n관리자 서명을 기다려주세요.', '제출 완료', 'success');
            };

            if (showContractWrite && contractTemplate) {
                return (
                    <ContractWriteModal
                        template={contractTemplate}
                        employeeInfo={{ name: empAccount?.name || '', address: formData.address, phone: formData.phone }}
                        onSubmit={handleResubmit}
                        onBack={() => setShowContractWrite(false)}
                    />
                );
            }

            return (
                <div className="max-w-lg mx-auto space-y-4">
                    {/* 근로계약서 상태 배너 */}
                    {isContractBlocked && (
                        <div className={`rounded-xl p-4 border ${contractStatus === 'needs_resign' ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}`}>
                            <p className={`font-bold text-sm ${contractStatus === 'needs_resign' ? 'text-red-700' : 'text-yellow-700'}`}>
                                {contractStatus === 'needs_resign' ? '⚠️ 근로계약서를 작성해주세요' : '⏳ 관리자 서명 대기 중'}
                            </p>
                            <p className="text-xs text-gray-600 mt-1">
                                {contractStatus === 'needs_resign' ? '근로계약서 재작성 및 관리자 서명까지 앱 기능이 제한됩니다.' : '관리자가 서명하면 기능이 정상화됩니다.'}
                            </p>
                            {contractStatus === 'needs_resign' && (
                                <button onClick={handleStartRewrite}
                                    className="mt-2 w-full bg-purple-600 text-white py-2.5 rounded-xl font-bold hover:bg-purple-700 transition text-sm">
                                    근로계약서 재작성하기
                                </button>
                            )}
                        </div>
                    )}

                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
                        <h2 className="text-lg font-bold text-gray-800 mb-1">내 정보</h2>
                        <p className="text-sm text-gray-500 mb-5">입력한 정보는 관리자에게만 공유됩니다.</p>
                        <div className="space-y-4">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">이름</label>
                                <p className="border border-gray-200 rounded-xl py-3 px-4 text-gray-700 bg-gray-50">{empAccount?.name}</p>
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">주소</label>
                                <input value={formData.address}
                                    onChange={e => setFormData(p => ({ ...p, address: e.target.value }))}
                                    className="w-full border-2 border-gray-300 rounded-xl py-3 px-4 focus:border-blue-500 outline-none"
                                    placeholder="서울시 강남구 테헤란로 123" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">연락처</label>
                                <input value={formData.phone}
                                    onChange={e => setFormData(p => ({ ...p, phone: formatPhone(e.target.value) }))}

        function EmpSubmitModal({ date, empAccount, firebaseUser, onClose, showAlert, timeUnit }) {
            const [hoursInt, setHoursInt] = useState('');  // 시간 (정수)
            const [halfOn, setHalfOn] = useState(false);   // half 모드: 30분 토글
            const [minSlide, setMinSlide] = useState(0);   // ten 모드: 0,10,20,30,40,50
            const [minsInt, setMinsInt] = useState('');    // minute 모드: 분 직접 입력
            const [note, setNote] = useState('');
            const [loading, setLoading] = useState(false);

            // 최종 시간값(소수) 계산
            const computeHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return null;
                if (timeUnit === 'hour') return h;
                if (timeUnit === 'half') return h + (halfOn ? 0.5 : 0);
                if (timeUnit === 'ten') return parseFloat((h + minSlide / 60).toFixed(4));
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return null;
                    return parseFloat((h + m / 60).toFixed(4));
                }
                return h;
            };

            const displayHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h)) return '-';
                if (timeUnit === 'hour') return `${h}시간`;
                if (timeUnit === 'half') return halfOn ? `${h}시간 30분` : `${h}시간`;
                if (timeUnit === 'ten') return minSlide > 0 ? `${h}시간 ${minSlide}분` : `${h}시간`;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    return (!isNaN(m) && m > 0) ? `${h}시간 ${m}분` : `${h}시간`;
                }
                return `${h}시간`;
            };

            const isValid = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return false;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return false;
                }
                return h > 0 || (timeUnit !== 'hour' && (halfOn || minSlide > 0 || parseInt(minsInt,10) > 0));
            };

            const handleSubmit = async () => {
                const finalHours = computeHours();
                if (finalHours === null || finalHours <= 0) {
                    showAlert('올바른 근무시간을 입력해주세요.', '입력 오류', 'error'); return;
                }
                setLoading(true);
                try {
                    await submitWorkHours(empAccount.bossUid, {
                        empUid: firebaseUser.uid,
                        employeeId: empAccount.employeeId,
                        empName: empAccount.name,
                        date,
                        hours: finalHours,
                        note: note.trim()
                    });
                    showAlert(`${date} 근무시간(${displayHours()})이 제출되었습니다.`, '제출 완료', 'success');
                    onClose();
                } catch(e) {
                    showAlert('제출 실패: ' + e.message, '오류', 'error');
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-4 z-[9999]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-bold text-gray-800">근무시간 입력</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-4">{date}</p>

                        <div className="mb-4">
                            <label className="block text-sm font-bold text-gray-700 mb-2">근무시간</label>

                            {/* 시간 입력 (공통) */}
                            <div className="flex items-center gap-2 mb-3">
                                <input type="number" min="0" max="24" value={hoursInt} onChange={e => setHoursInt(e.target.value.replace(/[^0-9]/g,''))}
                                    className="w-24 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                    placeholder="0" autoFocus />
                                <span className="text-xl font-bold text-gray-600">시간</span>

                                {/* half 모드: 30분 토글 버튼 */}
                                {timeUnit === 'half' && (
                                    <button
                                        onClick={() => setHalfOn(p => !p)}
                                        className={`ml-2 px-4 py-3 rounded-xl font-bold text-sm border-2 transition ${halfOn ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                                    >30분</button>
                                )}

                                {/* minute 모드: 분 직접 입력 */}
                                {timeUnit === 'minute' && (
                                    <>
                                        <input type="number" min="0" max="59" value={minsInt} onChange={e => setMinsInt(e.target.value.replace(/[^0-9]/g,''))}
                                            className="w-20 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                            placeholder="0" />
                                        <span className="text-xl font-bold text-gray-600">분</span>
                                    </>
                                )}
                            </div>

                            {/* ten 모드: 슬라이드 선택 (0,10,20,30,40,50분) */}
                            {timeUnit === 'ten' && (
                                <div>
                                    <div className="flex gap-2 flex-wrap">
                                        {[0,10,20,30,40,50].map(m => (
                                            <button key={m} onClick={() => setMinSlide(m)}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 transition ${minSlide === m ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'}`}>
                                                {m === 0 ? '정각' : `+${m}분`}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 미리보기 */}
                            {hoursInt !== '' && (
                                <div className="mt-3 text-center text-blue-600 font-bold text-lg">{displayHours()}</div>
                            )}
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-700 mb-1">메모 (선택)</label>
                            <input type="text" value={note} onChange={e => setNote(e.target.value)}
                                className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-blue-500 outline-none text-sm"
                                placeholder="특이사항 입력 (관리자에게 공유됩니다)" />
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 mb-4">
                            <p className="text-xs text-yellow-700 font-medium">⚠️ 제출 후에는 수정할 수 없습니다. 신중하게 입력해주세요.</p>
                        </div>
                        <button onClick={handleSubmit} disabled={loading || !isValid()}
                            className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">
                            {loading ? '제출 중...' : '제출하기'}
                        </button>
                    </div>
                </div>
            );
        }

        function TabEmployees({ employees, setEmployees, nextEmpId, setNextEmpId, getEmployeeStats, globalMinWage, setGlobalMinWage, showAlert, showConfirm, firebaseUser, currentWorkspaceId, workspaceInfo }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingEmp, setEditingEmp] = useState(null);
            const [viewingContract, setViewingContract] = useState(null); // { contract, empUid }
            const [modalDeleteReq, setModalDeleteReq] = useState(null);
            const prevMinWageRef = useRef(''); // 최저시급 편집 시작 전 값 저장용
            const [signingEmpUid, setSigningEmpUid] = useState(null);

            // 팝업 열려있는 동안 해당 직원 workplaces 문서 실시간 감지
            // → 근무자가 동의하면 즉시 employees 상태 반영 (팝업 닫기 전에도 갱신)
            useEffect(() => {
                if (!viewingContract || !firebaseUser || !currentWorkspaceId) return;
                const empUid = viewingContract.empUid;
                if (!empUid) return;
                const unsub = fbDb.collection('employeeAccounts').doc(empUid)
                    .collection('workplaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        const newDeleteReq = data?.contractDeleteRequest || null;
                        const newContractStatus = data?.contractStatus || null;
                        const hasContract = !!data?.contract;
                        setModalDeleteReq(newDeleteReq);
                        setEmployees(prev => prev.map(e =>
                            e.empUid === empUid ? {
                                ...e,
                                contractDeleteRequest: newDeleteReq,
                                contractStatus: newContractStatus,
                                contract: hasContract ? data.contract : (e.contract || null)
                            } : e
                        ));
                    }, () => {});
                return () => unsub();
            }, [viewingContract?.empUid, firebaseUser, currentWorkspaceId]);

            const filteredEmployees = useMemo(() => {
                if (!searchTerm) return employees.sort((a, b) => a.displayId - b.displayId);
                return employees.filter(emp => emp.name.includes(searchTerm)).sort((a, b) => a.displayId - b.displayId);
            }, [employees, searchTerm]);

            const handleAddClick = () => {
                if (globalMinWage === '' || Number(globalMinWage) <= 0) {
                    showAlert('현재 최저시급을 먼저 입력해주세요.\n최저시급이 설정되어야 근무자를 추가할 수 있습니다.', '안내');
                    return;
                }
                setEditingEmp(null);
                setIsModalOpen(true);
            };

            const handleSave = (empData) => {
                const { displayId, ...dataToSave } = empData;

                if (editingEmp) {
                    const oldStatus = editingEmp.status || (editingEmp.isWorking === false ? 'resigned' : 'working');
                    const newStatus = dataToSave.status;

                    // 시급 변경 감지: 계약서가 완료된 근무자의 시급이 바뀌면 재작성 필요
                    const oldWage = Number(editingEmp.wage) || Number(globalMinWage);
                    const newWage = Number(dataToSave.wage) || Number(globalMinWage);
                    const wageChanged = oldWage !== newWage;
                    let finalData = { ...dataToSave };
                    if (wageChanged && editingEmp.contractStatus === 'completed' && workspaceInfo?.contractTemplate) {
                        finalData = { ...finalData, contractStatus: 'needs_resign' };
                        showAlert('급여가 변경되면 근로계약서를 재작성해야합니다. 템플릿을 수정해주세요.', '계약서 재작성 필요', 'alert');
                        if (dataToSave.empUid && currentWorkspaceId) {
                            fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                .collection('workplaces').doc(currentWorkspaceId)
                                .update({ contractStatus: 'needs_resign' })
                                .catch(() => {});
                        }
                    }

                    setEmployees(prev => prev.map(e => e.id === finalData.id ? finalData : e));

                    if (oldStatus !== newStatus) {
                        // Google 직원이면 workplaces 서브컬렉션 workStatus 업데이트 + 알림
                        const empUid = dataToSave.empUid;
                        if (empUid && currentWorkspaceId) {
                            fbDb.collection('employeeAccounts').doc(empUid)
                                .collection('workplaces').doc(currentWorkspaceId)
                                .update({ workStatus: newStatus })
                                .catch(() => {});
                            sendStatusChangeNotification(empUid, newStatus).catch(() => {});
                        }

                        if (oldStatus === 'working' && newStatus === 'leave') {
                            showAlert(`${dataToSave.name}님이 휴직 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                        } else if (oldStatus !== 'resigned' && newStatus === 'resigned') {
                            showAlert(`${dataToSave.name}님이 퇴사 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                        } else if ((oldStatus === 'leave' || oldStatus === 'resigned') && newStatus === 'working') {
                            showAlert(`${dataToSave.name}님이 근무 중 상태로 변경되었습니다.\n월별 근무시간 입력에 포함됩니다.`, '변경 완료', 'success');
                        }
                    }
                } else {
                    setEmployees(prev => [...prev, dataToSave]);
                    setNextEmpId(prev => prev + 1);
                }
                setIsModalOpen(false);
                setEditingEmp(null);
            };

            const handleDelete = (id) => {
                showConfirm('정말 이 근무자를 삭제하시겠습니까?\n(기존 근무 기록은 월별 현황에 유지됩니다)', () => {
                    setEmployees(prev => prev.filter(e => e.id !== id));
                }, '근무자 삭제');
            };

            const handleViewContract = async (emp) => {
                if (!emp.empUid) return;
                try {
                    const doc = await fbDb.collection('employeeAccounts').doc(emp.empUid)
                        .collection('workplaces').doc(currentWorkspaceId || firebaseUser.uid).get();
                    const data = doc.data();
                    const contract = data?.contract || null;
                    if (contract) {
                        const freshDeleteReq = data?.contractDeleteRequest || null;
                        setModalDeleteReq(freshDeleteReq);
                        setEmployees(prev => prev.map(e => e.empUid === emp.empUid ? { ...e, contractDeleteRequest: freshDeleteReq } : e));
                        setViewingContract({ contract, empUid: emp.empUid, emp });
                    } else showAlert('저장된 근로계약서가 없습니다.', '안내', 'info');
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleDeleteContract = (emp) => {
                if (!emp.empUid) return;
                showConfirm('근로계약서를 재작성하시겠습니까?', async () => {
                    try {
                        const bossUid = currentWorkspaceId || firebaseUser.uid;
                        const result = await requestContractDelete(emp.empUid, bossUid, 'boss');
                        if (result === 'deleted') {
                            setModalDeleteReq(null);
                            setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractStatus: 'needs_resign', contract: null, contractDeleteRequest: null } : e));
                            showAlert('근로계약서가 삭제되었습니다.\n근무자가 재작성해야 합니다.', '삭제 완료', 'success');
                        } else {
                            setModalDeleteReq('boss');
                            setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: 'boss' } : e));
                            showAlert('재작성 요청을 보냈습니다.\n근무자가 동의하면 삭제됩니다.', '요청 완료', 'success');
                        }
                    } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 재작성');
            };

            const handleCancelDeleteContract = async (emp) => {
                if (!emp.empUid) return;
                try {
                    const bossUid = currentWorkspaceId || firebaseUser.uid;
                    await cancelContractDeleteRequest(emp.empUid, bossUid, 'boss');
                    setModalDeleteReq(null);
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: null } : e));
                    showAlert('삭제 요청이 취소되었습니다.', '취소 완료', 'success');
                } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
            };

            const handleBossSign = async (emp) => {
                if (!emp.empUid) return;
                showConfirm(`${emp.name}님의 근로계약서에 서명 완료 처리하시겠습니까?\n서명 후 근무자 기능이 정상화됩니다.`, async () => {
                    try {
                        await bossCompleteContract(currentWorkspaceId || firebaseUser.uid, emp.empUid);
                        setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractStatus: 'completed' } : e));
                        showAlert('서명이 완료되었습니다. 기능이 정상화되었습니다.', '서명 완료', 'success');
                    } catch(e) { showAlert('서명 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 서명');
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <div className="relative w-full sm:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Search className="h-5 w-5 text-gray-400" />
                                </div>
                                <input
                                    type="text"
                                    className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"
                                    placeholder="이름으로 검색"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-lg px-3 py-2 w-full sm:w-auto shadow-sm">
                                <label className="text-sm font-medium text-gray-700 whitespace-nowrap">현재 최저시급:</label>
                                <input
                                    type="number"
                                    className="w-24 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0"
                                    value={globalMinWage}
                                    placeholder="입력필수"
                                    onFocus={() => { prevMinWageRef.current = globalMinWage; }}
                                    onChange={(e) => setGlobalMinWage(e.target.value)}
                                    onBlur={() => {
                                        const oldVal = prevMinWageRef.current;
                                        const newVal = globalMinWage;
                                        if (newVal === oldVal || !newVal || Number(newVal) <= 0) return;
                                        if (!workspaceInfo?.contractTemplate) return;

                                        const affectedEmps = employees.filter(emp => {

                                    <input type="text" name="bank" value={formData.bank} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none transition-shadow" />
                                </div>
                                <div className="col-span-2">
                                    <label className="block text-sm font-medium text-gray-700 mb-1">계좌번호</label>
                                    <input type="text" name="account" value={formData.account} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none transition-shadow" />
                                </div>
                            </div>

                            <div>
                                <label className="block text-sm font-medium text-gray-700 mb-1">메모</label>
                                <textarea name="memo" value={formData.memo} onChange={handleChange} rows="2" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none transition-shadow"></textarea>
                            </div>

                            <div className="mt-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                <label className="block text-sm font-bold text-gray-800 mb-3">근무 상태</label>
                                <div className="flex items-center gap-5">
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="working" checked={formData.status === 'working'} onChange={handleChange} className="w-4 h-4 text-green-600 focus:ring-green-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">근무 중</span>
                                    </label>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="leave" checked={formData.status === 'leave'} onChange={handleChange} className="w-4 h-4 text-yellow-600 focus:ring-yellow-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">휴직</span>
                                    </label>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="resigned" checked={formData.status === 'resigned'} onChange={handleChange} className="w-4 h-4 text-red-600 focus:ring-red-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">퇴사</span>
                                    </label>
                                </div>
                                {formData.status === 'resigned' && (
                                    <div className="mt-4 border-t border-gray-200 pt-3">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">퇴사일</label>
                                        <input type="date" name="resignDate" value={formData.resignDate || ''} onChange={handleChange} className="w-full border border-red-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-400 outline-none bg-white transition-shadow" />
                                    </div>
                                )}
                                <p className="text-xs text-gray-500 mt-3">* 휴직 및 퇴사 상태일 경우 월별 현황 입력에서 제외됩니다.</p>
                            </div>
                        </form>
                        
                        <div className="p-4 border-t bg-white flex gap-3 shrink-0">
                            <button type="button" onClick={onClose} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl hover:bg-gray-200 transition font-medium">취소</button>
                            <button type="submit" form="empForm" className="flex-1 bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition font-medium shadow-sm">저장</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TabCalendar({ employees, monthlyData, setMonthlyData, showConfirm, unseenDates, onMarkSeen }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;
            
            const currentMonthData = monthlyData[monthKey] || { days: {} };
            const activeEmployees = employees.filter(e => {
                const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
                const cStatus = e.contractStatus || null;
                return statusVal === 'working' && cStatus !== 'needs_resign' && cStatus !== 'pending_boss';
            }).sort((a,b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const handleTotalRevenueChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                setMonthlyData(prev => ({
                    ...prev,
                    [monthKey]: {
                        ...(prev[monthKey] || { days: {} }),
                        totalRevenue: val
                    }
                }));
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}년 ${month}월 ${dayToDel}일의 정보를 정말 삭제하시겠습니까?`, () => {
                    setMonthlyData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey] && newData[monthKey].days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    setEditDayModal(null); // 삭제 후 모달 닫기
                }, "데이터 삭제");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            let totalMonthPay = 0;
            let sumOfDailyRevenue = 0;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                const dayData = currentMonthData.days[d] || {};
                sumOfDailyRevenue += (dayData.revenue || 0);
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;

            const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
            const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
            const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector
                                    year={year}
                                    month={month}
                                    onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                                />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setIsBulkInputOpen(true)}
                                className="bg-gray-800 text-white px-3 md:px-4 py-2.5 rounded-xl hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap font-medium"
                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">이번달 근무시간 일괄 입력</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-xl px-4 py-2.5 shadow-sm text-sm">
                                <label className="font-medium text-gray-700 whitespace-nowrap">이번달 총매출:</label>
                                <input
                                    type="number"
                                    value={currentMonthData.totalRevenue ?? ''}
                                    onChange={handleTotalRevenueChange}
                                    placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                                    className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0 font-bold"
                                />
                                <span className="text-gray-500 font-medium whitespace-nowrap">원</span>
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                순수 급여: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                주휴수당: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                총 급여: {formatCurrency(totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>
                        
                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`empty-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {}, revenue: 0 };
                                let dailyTotalPay = 0;
                                const activeEntries = [];

                                Object.values(dayData.entries || {}).forEach(entry => {
                                    if (entry.hours > 0) {
                                        dailyTotalPay += entry.pay;
                                        activeEntries.push(entry);
                                    }
                                });

                                const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;
                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];
                                const dateStr = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                                const hasUnseen = unseenDates?.has(dateStr);
                                const handleOpenDay = () => { setEditDayModal(day); onMarkSeen?.(dateStr); };

                                return (
                                    <div key={`day-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={handleOpenDay}>
                                        <div className="flex justify-between items-start mb-1">
                                            <div className="relative flex items-center">
                                                <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                    {day}
                                                </span>
                                                {hasUnseen && <span className="absolute -top-0.5 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>}
                                            </div>
                                            {/* PC에서만 마우스 올렸을 때 보이게 처리 */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={handleOpenDay} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">수정</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="삭제">
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        </div>

                                        {/* 모바일 뷰 */}
                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}명 근무</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}만원</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="주휴수당 발생"></div>}
                                        </div>

                                        {/* PC 뷰 */}
                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                                            </div>

                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">인건비: {formatCurrency(dailyTotalPay)}</div>
                                                    <div className="text-xs text-gray-500 mt-0.5">매출: {formatCurrency(dayData.revenue || 0)}</div>
                                                    {dayData.revenue > 0 && <div className="text-[10px] font-medium text-gray-400 mt-0.5">비율: {dailyRatio}%</div>}
                                                </div>
                                            )}

                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 발생</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setIsBulkInputOpen(false)}
                        />
                    )}

                    {editDayModal && (
                        <DailyEditModal
                            year={year} month={month} day={editDayModal} monthKey={monthKey}
                            activeEmployees={activeEmployees} allEmployees={employees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setEditDayModal(null)}
                            onDelete={() => handleDeleteDay(editDayModal)}
                        />
                    )}

                    <div className="flex justify-end mt-4">
                        <button
                            onClick={() => {
                                showConfirm(`${year}년 ${month}월 정보를 정말 초기화하시겠습니까?`, () => {
                                    setMonthlyData(prev => {
                                        const newData = { ...prev };
                                        delete newData[monthKey];
                                        return newData;
                                    });
                                }, "초기화 확인");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            이번달 정보 전체 초기화
                        </button>
                    </div>
                </div>
            );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose }) {
            const hourRefs = useRef({});
            const minRefs = useRef({});
            const [localData, setLocalData] = useState({});   // 시간 (정수)
            const [minuteData, setMinuteData] = useState({}); // 분 (0-59)

            useEffect(() => {
                const initData = {};
                const initMinData = {};
                const currentMonthData = monthlyData[monthKey] || { days: {} };

                for (let d = 1; d <= daysInMonth; d++) {
                    initData[d] = {};
                    initMinData[d] = {};
                    const dayData = currentMonthData.days[d] || { entries: {} };
                    activeEmployees.forEach(emp => {
                        const existing = dayData.entries[emp.id]?.hours;
                        if (existing != null && existing > 0) {
                            const h = Math.floor(existing);
                            const m = Math.round((existing - h) * 60);
                            initData[d][emp.id] = h > 0 ? String(h) : '';
                            initMinData[d][emp.id] = m > 0 ? String(m) : '';
                        } else {
                            initData[d][emp.id] = '';
                            initMinData[d][emp.id] = '';
                        }
                    });
                }
                setLocalData(initData);
                setMinuteData(initMinData);
            }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

            const handleInputChange = (day, empId, val) => {
                setLocalData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const handleMinuteChange = (day, empId, val) => {
                setMinuteData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const focusHour = (day, empIdx) => {
                const ref = hourRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusMin = (day, empIdx) => {
                const ref = minRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };

            // 시간 입력칸 방향키
            // ↑↓: 같은 직원 이전/다음 날 시간칸 | →/Enter: 같은 날 분칸 | ←: 이전 직원 분칸
            const handleHourKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusHour(day - 1, empIdx);
                } else if (e.key === 'ArrowRight' || e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    focusMin(day, empIdx);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    if (empIdx > 0) focusMin(day, empIdx - 1);
                    else if (day > 1) focusMin(day - 1, last);
                }
            };

            // 분 입력칸 방향키
            // ↑↓: 같은 직원 이전/다음 날 분칸 | →: 다음 직원 시간칸 | ←: 같은 날 시간칸
            // Enter: 다음 날 시간칸 (마지막 날이면 다음 직원 1일 시간칸)
            const handleMinKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusMin(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusMin(day - 1, empIdx);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (empIdx < last) focusHour(day, empIdx + 1);
                    else if (day < daysInMonth) focusHour(day + 1, 0);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    focusHour(day, empIdx);
                } else if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                    else if (empIdx < last) focusHour(1, empIdx + 1);
                }
            };

            const handleSave = () => {
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };

                    for (let d = 1; d <= daysInMonth; d++) {
                        if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };

                        activeEmployees.forEach(emp => {
                            const hStr = localData[d]?.[emp.id];
                            const mStr = minuteData[d]?.[emp.id];
                            const h = hStr === '' || hStr == null ? 0 : parseInt(hStr, 10);
                            const m = mStr === '' || mStr == null ? 0 : parseInt(mStr, 10);
                            const hours = h + m / 60;

                            if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                                newData[monthKey].days[d].entries[emp.id] = {
                                    hours: hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage
                                };
                            }
                        });
                    }
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">{year}년 {month}월 근무시간 일괄 입력</h3>
                                <p className="hidden md:block text-xs text-gray-500 mt-1">시간 Enter → 분칸 이동 | 분 Enter → 다음 날 시간칸 | 방향키로 셀 이동</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5"/></button>
                        </div>

                        <div className="flex-1 overflow-auto p-4 relative">
                            {activeEmployees.length === 0 ? (
                                <div className="h-full flex items-center justify-center text-gray-500">현재 근무 중인 직원이 없습니다.</div>
                            ) : (
                                <table className="w-full border-collapse min-w-max">
                                    <thead className="sticky top-0 bg-white shadow-sm z-10">
                                        <tr>
                                            <th className="border p-2 bg-gray-100 text-center w-16 whitespace-nowrap">날짜</th>
                                            {activeEmployees.map(emp => (
                                                <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm">
                                                    {emp.displayId}. {emp.name}
                                                    <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                                                    <span className="text-[10px] font-normal text-gray-400 block">시간&nbsp;&nbsp;&nbsp;분</span>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                                            <tr key={day} className="hover:bg-yellow-50/50">
                                                <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}일</td>
                                                {activeEmployees.map((emp, empIdx) => (
                                                    <td key={emp.id} className="border p-0.5">
                                                        <div className="flex items-center gap-0.5">
                                                            <input
                                                                ref={el => hourRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0"
                                                                value={localData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleInputChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleHourKeyDown(e, day, empIdx)}
                                                                className="w-12 h-9 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent outline-none transition text-sm"
                                                                placeholder="0"
                                                            />
                                                            <span className="text-gray-300 text-xs">:</span>
                                                            <input
                                                                ref={el => minRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0" max="59"
                                                                value={minuteData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleMinuteChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleMinKeyDown(e, day, empIdx)}
                                                                className="w-10 h-9 text-center border-none focus:ring-2 focus:ring-blue-400 bg-transparent outline-none transition text-sm text-blue-600"
                                                                placeholder="분"
                                                            />
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}

                        <div className="p-5 border-t bg-white flex justify-end gap-3 rounded-b-2xl shrink-0">

                            <button onClick={handleSave} className="px-6 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 transition font-bold shadow-sm">저장하기</button>
