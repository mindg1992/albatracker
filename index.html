        // мЖМмИШм†Р мЛЬк∞Д вЖТ "XмЛЬк∞Д YлґД" нШХмЛЭ (мШИ: 3.5 вЖТ "3мЛЬк∞Д 30лґД")
        const fmtHours = (hours) => {
            if (!hours || hours <= 0) return '';

            const m = Math.round((hours - h) * 60);
            if (h > 0 && m > 0) return `${h}мЛЬк∞Д ${m}лґД`;

        // --- м£ЉнЬімИШлЛє к≥ДмВ∞ мЬ†нЛЄл¶ђнЛ∞ ---
        function calcHolidayPayBySunday(monthlyData, employees) {
            const toLocalStr = (date) => {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const d = date.getDate().toString().padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const allDateEntries = {};
            Object.entries(monthlyData).forEach(([mk, monthData]) => {
                const [y, m] = mk.split('-').map(Number);
                Object.entries(monthData.days || {}).forEach(([day, dayData]) => {
                    const dateStr = toLocalStr(new Date(y, m - 1, parseInt(day)));
                    const empData = {};
                    Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                        if (entry.hours > 0) empData[empId] = { hours: entry.hours, wage: entry.wage, name: entry.name };
                    });
                    if (Object.keys(empData).length > 0) allDateEntries[dateStr] = empData;
                });
            });

            const weekSundays = new Set();
            Object.keys(allDateEntries).forEach(dateStr => {
                const [y, m, d] = dateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                const dow = date.getDay();
                const daysToSunday = dow === 0 ? 0 : 7 - dow;
                weekSundays.add(toLocalStr(new Date(y, m - 1, d + daysToSunday)));
            });

            const result = {};
            weekSundays.forEach(sundayStr => {
                const [sy, sm, sd] = sundayStr.split('-').map(Number);
                const empWeekly = {};
                for (let i = 0; i < 7; i++) {
                    const dk = toLocalStr(new Date(sy, sm - 1, sd - 6 + i));
                    Object.entries(allDateEntries[dk] || {}).forEach(([empId, data]) => {
                        if (!empWeekly[empId]) {
                            const emp = employees.find(e => e.id.toString() === empId);
                            empWeekly[empId] = { hours: 0, wage: emp?.wage || data.wage || MIN_WAGE, name: data.name };
                        }
                        empWeekly[empId].hours += data.hours;
                    });
                }

                const weekResults = [];
                Object.entries(empWeekly).forEach(([empId, { hours, wage, name }]) => {
                    if (hours >= 15) {
                        weekResults.push({ empId, name, weeklyHours: hours, holidayPay: Math.round((hours / 5) * wage) });
                    }
                });
                if (weekResults.length > 0) result[sundayStr] = weekResults;
            });
            return result;
        }

        // --- к≥µнЖµ мЧ∞/мЫФ мІБм†СмЮЕл†• мїінПђлДМнКЄ ---
        function MonthYearSelector({ year, month, onChange }) {
            const [y, setY] = useState(year);
            const [m, setM] = useState(month);

            useEffect(() => {
                setY(year);
                setM(month);
            }, [year, month]);

            const handleApply = () => {
                let newY = parseInt(y);
                let newM = parseInt(m);
                if (isNaN(newY) || newY < 1900) newY = new Date().getFullYear();
                if (isNaN(newM) || newM < 1) newM = 1;
                if (newM > 12) newM = 12;
                setY(newY);
                setM(newM);
                onChange(newY, newM);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') handleApply(); };

            return (
                <div className="flex items-center gap-1 justify-center">
                    <input type="number" value={y} onChange={e => setY(e.target.value)} onKeyDown={handleKeyDown} className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-16 md:w-20 text-center outline-none transition-colors" />

        // Firestore REST APIл°Ь м†АмЮ• (SDK мК§нКЄл¶ђл∞Н мЧ∞к≤∞ лђЄм†Ь мЪ∞нЪМ)
        async function fsSet(docRef, data) {
            const uid = docRef.id;
            const token = await fbAuth.currentUser.getIdToken();
            const toFV = (v) => {
                if (v === null || v === undefined) return { nullValue: null };
                if (typeof v === 'boolean') return { booleanValue: v };
                if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
                if (typeof v === 'string') return { stringValue: v };
                if (Array.isArray(v)) return { arrayValue: { values: v.map(toFV) } };
                if (typeof v === 'object') {
                    const fields = {};
                    Object.entries(v).forEach(([k, val]) => { fields[k] = toFV(val); });
                    return { mapValue: { fields } };
                }
                return { stringValue: String(v) };
            };
            const fields = {};
            Object.entries(data).forEach(([k, v]) => { fields[k] = toFV(v); });
            const resp = await fetch(
                `https://firestore.googleapis.com/v1/projects/albatracker-9e90e/databases/(default)/documents/users/${uid}`,
                {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })

            );

            }

        function generateInviteCode() {

            let code = '';

            return code;

        async function createNotice(workspaceId, title, content) {
            const id = fbDb.collection('_').doc().id;
            const now = new Date().toISOString();
            const ref = fbDb.collection('workspaces').doc(workspaceId);
            return fbDb.runTransaction(async t => {
                const doc = await t.get(ref);
                const notices = doc.data()?.notices || [];
                t.update(ref, { notices: [...notices, { id, title, content, createdAt: now, updatedAt: now }] });
            });
        }

        // к≥µмІА мИШм†Х
        async function updateNotice(workspaceId, noticeId, title, content) {
            const now = new Date().toISOString();
            const ref = fbDb.collection('workspaces').doc(workspaceId);
            return fbDb.runTransaction(async t => {
                const doc = await t.get(ref);
                const notices = (doc.data()?.notices || []).map(n =>
                    n.id === noticeId ? { ...n, title, content, updatedAt: now } : n
                );
                t.update(ref, { notices });
            });
        }

            });

        // кіАл¶ђмЮР: мІБмЫР кЈЉл°Ьк≥ДмХљмДЬ мВ≠м†Ь вЖТ needs_resign мГБнГЬ
        // мГБнШЄ лПЩмЭШ мВ≠м†Ь: нХЬм™љмЭі л®Љм†А лИДл•іл©і contractDeleteRequest мД§м†Х, мЦСм™љ л™®лСР лИДл•іл©і к≥ДмХљмДЬ мЩДм†Д мВ≠м†Ь
        async function requestContractDelete(empUid, bossUid, requester) {
            const ref = fbDb.collection('employeeAccounts').doc(empUid).collection('workplaces').doc(bossUid);
            const doc = await ref.get();
            const existing = doc.data()?.contractDeleteRequest;
            const otherSide = requester === 'boss' ? 'employee' : 'boss';
            if (existing === otherSide) {
                // мЦСм™љ лПЩмЭШ вЖТ к≥ДмХљмДЬ мВ≠м†Ь + needs_resign мГБнГЬл°Ь м†ДнЩШ
                await ref.update({
                    contractStatus: 'needs_resign',
                    contract: firebase.firestore.FieldValue.delete(),
                    contractDeleteRequest: firebase.firestore.FieldValue.delete()
                });
                // кЈЉлђімЮРк∞А лПЩмЭШ мЩДл£МнХЬ к≤љмЪ∞(bossк∞А л®Љм†А мЪФм≤≠) вЖТ кіАл¶ђмЮРмЧРк≤М мХМл¶Љ
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_completed', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    try { await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).delete(); } catch(e) {}
                }
                return 'deleted';
            } else {
                await ref.update({ contractDeleteRequest: requester });
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_request', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                return 'requested';
            }
        }

        // --- мЧЕм≤і мВ≠м†Ь лВ®мЭА мЛЬк∞Д нПђлІЈ ---
        function formatDeleteRemaining(deleteScheduledAt) {
            if (!deleteScheduledAt) return '';
            const ms = deleteScheduledAt.toMillis ? deleteScheduledAt.toMillis() : new Date(deleteScheduledAt).getTime();
            const remaining = ms + 24 * 60 * 60 * 1000 - Date.now();
            if (remaining <= 0) return 'к≥І мВ≠м†ЬлР®';
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            return h > 0 ? `${h}мЛЬк∞Д ${m}лґД` : `${m}лґД`;
        }

            const [dismissedSubmitCount, setDismissedSubmitCount] = useState(0);
            const [dismissedInviteCount, setDismissedInviteCount] = useState(0);

            // лН∞мЭінД∞ л£®нФД л∞П лђімЭШлѓЄнХЬ м†АмЮ•мЭД л∞©мІАнХШкЄ∞ мЬДнХЬ кЄ∞м§Ам†Р
            const lastSyncedDataRef = useRef("");
            // мІБмЫР мЮРм≤і нЗімВђ мЛЬ applyData лНЃмЦімУ∞кЄ∞ л∞©мІАмЪ©
            const resignedEmpUidsRef = useRef(new Set());
            // нХ≠мГБ мµЬмЛ† employeesл•Љ м∞Єм°∞ (snapshot нХЄлУ§лЯђ stale closure л∞©мІА)
            // л†МлНФ л∞ФлФФмЧРмДЬ мІБм†С к∞±мЛ† вЖТ useEffect мІАмЧ∞ мЧЖмЭі нХ≠мГБ мµЬмЛ†к∞Т л≥імЮ• (latest ref нМ®нДі)
            const employeesRef = useRef([]);
            employeesRef.current = employees;

            // PC лД§лєДк≤МмЭімЕШ мК§нБђл°§ л≤ДнКЉ
            const navScrollRef = useRef(null);
            const [navCanScrollLeft, setNavCanScrollLeft] = useState(false);
            const [navCanScrollRight, setNavCanScrollRight] = useState(false);
            const updateNavScroll = () => {
                const el = navScrollRef.current;
                if (!el) return;
                setNavCanScrollLeft(el.scrollLeft > 2);
                setNavCanScrollRight(el.scrollLeft < el.scrollWidth - el.clientWidth - 2);
            };
            useEffect(() => {
                const el = navScrollRef.current;
                if (!el) return;
                // RAFл°Ь лЄМлЭЉмЪ∞м†А л†ИмЭімХДмЫГ мЩДл£М нЫД мЄ°м†Х
                const rafId = requestAnimationFrame(updateNavScroll);
                const ro = new ResizeObserver(() => requestAnimationFrame(updateNavScroll));
                ro.observe(el);
                window.addEventListener('resize', updateNavScroll);
                return () => { cancelAnimationFrame(rafId); ro.disconnect(); window.removeEventListener('resize', updateNavScroll); };
            }, [currentWorkspaceId, isAuthenticated]);

            const showAlert = (message, title = 'мХМл¶Љ', type = 'info', onClose = null) => {
                setModalConfig({ type: type, title, message, onConfirm: () => { setModalConfig(null); onClose && onClose(); } });
            };

            const showConfirm = (message, onConfirmCallback, title = 'нЩХмЭЄ') => {
                setModalConfig({
                    type: 'confirm', title, message,
                    onConfirm: () => { onConfirmCallback(); setModalConfig(null); },
                    onCancel: () => setModalConfig(null)
                });
            };

            const WAGE_REQUIRED_TABS = ['calendar', 'payroll', 'chart'];
            const handleTabChange = (tabId) => {
                if (WAGE_REQUIRED_TABS.includes(tabId) && (globalMinWage === '' || Number(globalMinWage) <= 0)) {
                    showAlert('мµЬм†АмЛЬкЄЙмЭД л®Љм†А мД§м†ХнХі м£ЉмДЄмЪФ.\nкЈЉлђімЮР кіАл¶ђ нГ≠мЧРмДЬ мµЬм†АмЛЬкЄЙмЭД мЮЕл†•нХЬ нЫД мЭімЪ©нХ† мИШ мЮИмКµлЛИлЛ§.');
                    return;
                }
                setActiveTab(tabId);
            };

            // Firebase л°ЬкЈЄмЭЄ мГБнГЬ к∞РмІА
            useEffect(() => {
                // л¶ђлЛ§мЭіл†ЙнКЄ л≥µкЈА мЛЬ мЧРлЯђ м≤Шл¶ђ (мД±к≥µмЭА onAuthStateChangedк∞А м≤Шл¶ђ)
                const pendingLoginRole = localStorage.getItem('albaLoginRole');
                fbAuth.getRedirectResult()
                    .catch(e => {
                        if (!pendingLoginRole) return;
                        localStorage.removeItem('albaLoginRole');
                        setFbLoading(false);
                        setModalConfig({
                            type: 'error', title: 'мШ§л•Ш',
                            message: 'Google л°ЬкЈЄмЭЄмЧР мЛ§нМ®нЦИмКµлЛИлЛ§.\n' + (e?.message || ''),
                            onConfirm: () => setModalConfig(null)
                        });
                    });

                const unsubscribeAuth = fbAuth.onAuthStateChanged((user) => {
                    setFirebaseUser(user);
                    if (!user) {
                        setFbLoading(false);
                        setUserRole(null);
                        setEmpAccount(null);
                        setWorkspaceInfo(null);
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // мЧ≠нХ† к∞РмІА: loginRole localStorageл°Ь кµђлґД (к∞ЩмЭА Google к≥Дм†ХмЭі кіАл¶ђмЮР/мІБмЫР л™®лСР к∞АлК•)
            useEffect(() => {
                if (!firebaseUser) return;
                let cancelled = false;

                // Google к≥Дм†Х: loginRoleл°Ь мЧ≠нХ† к≤∞м†Х (к∞ЩмЭА к≥Дм†ХмЬЉл°Ь кіАл¶ђмЮР/мІБмЫР л™®лСР мВђмЪ© к∞АлК•)
                const loginRole = localStorage.getItem('albaLoginRole');
                if (loginRole === 'employee') {
                    // мІБмЫР мЧ≠нХ†л°Ь л°ЬкЈЄмЭЄ вАФ к≥Дм†Х лђЄмДЬ мЧЖмЬЉл©і мЮРлПЩ мГЭмД± (мµЬміИ л°ЬкЈЄмЭЄ лМАмЭС)
                    const docRef = fbDb.collection('employeeAccounts').doc(firebaseUser.uid);
                    docRef.get()
                        .then(async doc => {
                            if (cancelled) return;
                            let data = doc.exists ? doc.data() : null;
                            if (!data) {
                                try {
                                    await ensureGoogleEmpAccount(
                                        firebaseUser.uid,
                                        firebaseUser.email,
                                        firebaseUser.displayName
                                    );
                                    data = {
                                        isGoogleEmployee: true,
                                        googleEmail: firebaseUser.email || '',
                                        googleDisplayName: firebaseUser.displayName || ''
                                    };
                                } catch(_) {
                                    data = {};
                                }
                            }
                            if (cancelled) return;
                            setUserRole('employee');
                            setEmpAccount({ ...data, isGoogleEmployee: true, uid: firebaseUser.uid });
                            setFbLoading(false);
                        })
                        .catch(() => {
                            if (!cancelled) {
                                setUserRole('employee');
                                setEmpAccount({ isGoogleEmployee: true, uid: firebaseUser.uid });
                                setFbLoading(false);
                            }
                        });
                } else {
                    // кіАл¶ђмЮР мЧ≠нХ†л°Ь л°ЬкЈЄмЭЄ (кЄ∞л≥Єк∞Т)
                    setUserRole('boss');
                    setFbLoading(false);
                }

                return () => { cancelled = true; };
            }, [firebaseUser]);

            // мЭЄм¶Э мЩДл£М нЫД лН∞мЭінД∞ л°ЬлФ© (localStorage мЇРмЛЬ мЪ∞мД† вЖТ Firestore мДЬл≤Д лПЩкЄ∞нЩФ) вАФ кіАл¶ђмЮР м†ДмЪ©
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;

                let cancelled = false;
                const cacheKey = 'at_cache_' + currentWorkspaceId;
                const docRef = fbDb.collection('users').doc(currentWorkspaceId);

                const applyData = (d) => {
                    if (cancelled) return;
                    const resignedSet = resignedEmpUidsRef.current;
                    const rawEmployees = d.employees !== undefined ? d.employees : [];
                    const resolvedEmployees = resignedSet.size > 0
                        ? rawEmployees.map(e => resignedSet.has(e.empUid) ? { ...e, status: 'resigned' } : e)
                        : rawEmployees;
                    const newData = {
                        appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                        employees:     resolvedEmployees,
                        nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                        monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                        predictData:   d.predictData   !== undefined ? d.predictData   : {},
                        globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                    };
                    lastSyncedDataRef.current = JSON.stringify(newData);
                    setAppPin(newData.appPin);
                    setEmployees(newData.employees);
                    setNextEmpId(newData.nextEmpId);
                    setMonthlyData(newData.monthlyData);
                    setPredictData(newData.predictData);
                    setGlobalMinWage(newData.globalMinWage);
                };

                // вС† localStorage мЇРмЛЬ вЖТ м¶ЙмЛЬ нЩФл©і нСЬмЛЬ (мВђмЛ§мГБ 0ms)
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        applyData(JSON.parse(cached));
                    } catch (_) {}
                    setFbLoading(false);
                }

                // вС° Firestore мДЬл≤ДмЧРмДЬ мµЬмЛ† лН∞мЭінД∞ лПЩкЄ∞нЩФ (мЛ§нМ®нХілПД мЇРмЛЬл°Ь лПЩмЮС)
                const syncFromServer = () => {
                    // мЇРмЛЬ мЧЖмЭД лХМ Firestore hang вЖТ мК§нФЉлДИ лђінХЬ л∞©мІА: мµЬлМА 4міИ нЫД к∞Хм†Ь нХім†Ь
                    const loadingTimeout = setTimeout(() => {
                        if (!cancelled) setFbLoading(false);
                    }, 4000);

                    docRef.get().then(doc => {
                        if (cancelled) return;
                        if (doc.exists) {
                            let d = doc.data();
                            // л°ЬмїђмЧРмДЬ мВ≠м†ЬнХЬ мЫФ лН∞мЭінД∞к∞А FirestoreмЧР мХДмІБ л∞ШмШБ мХИ лРРмЭД к≤љмЪ∞ л∞©мЦі
                            let hasPendingDeletes = false;
                            try {
                                const pdelKey = 'at_pdel_' + currentWorkspaceId;
                                const pendingDeletes = JSON.parse(localStorage.getItem(pdelKey) || '[]');
                                if (pendingDeletes.length > 0 && d.monthlyData) {
                                    const fixed = { ...d.monthlyData };
                                    pendingDeletes.forEach(k => { delete fixed[k]; });
                                    d = { ...d, monthlyData: fixed };
                                    hasPendingDeletes = true;
                                }
                            } catch(_) {}
                            const serverStr = JSON.stringify({
                                appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                                employees:     d.employees     !== undefined ? d.employees     : [],
                                nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                                monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                                predictData:   d.predictData   !== undefined ? d.predictData   : {},
                                globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                            });
                            if (serverStr !== lastSyncedDataRef.current) {
                                applyData(d);
                                localStorage.setItem(cacheKey, JSON.stringify(d));
                            }
                            // мВ≠м†Ь лМАкЄ∞ нХ≠л™©мЭі мЮИмЬЉл©і: lastSyncedDataRef міИкЄ∞нЩФ + monthlyData мГИ м∞Єм°∞л°Ь к∞Хм†Ь мЧЕлН∞мЭінКЄ
                            // вЖТ applyData нШЄмґЬ мЧђлґАмЩА лђікіАнХШк≤М auto-save useEffectк∞А л∞ШлУЬмЛЬ мЮђмЛ§нЦЙлР®
                            if (hasPendingDeletes) {
                                const filteredMonthly = d.monthlyData !== undefined ? d.monthlyData : {};
                                lastSyncedDataRef.current = '';
                                setMonthlyData({ ...filteredMonthly });
                            }
                        } else if (!cached) {
                            lastSyncedDataRef.current = JSON.stringify({
                                appPin: INITIAL_PIN, employees: [], nextEmpId: 1,
                                monthlyData: {}, predictData: {}, globalMinWage: ''
                            });
                        }
                    }).catch(e => {
                        if (cancelled) return;
                        // offline/unavailable мЧРлЯђл©і 5міИ нЫД мЮРлПЩ мЮђмЛЬлПД (нМЭмЧЕ мЧЖмЭМ)
                        if (e.code === 'unavailable' || e.message.includes('offline')) {
                            setTimeout(() => { if (!cancelled) syncFromServer(); }, 5000);
                        } else if (!cached) {
                            // мЇРмЛЬлПД мЧЖк≥† мХМ мИШ мЧЖлКФ мЧРлЯђмЭЉ лХМлІМ мХМл¶Љ
                            showAlert('лН∞мЭінД∞л•Љ лґИлЯђмШ§мІА л™їнЦИмКµлЛИлЛ§.\nлД§нКЄмЫМнБђл•Љ нЩХмЭЄнХШк≥† мГИл°Ьк≥†мє®нХі м£ЉмДЄмЪФ.', 'мЧ∞к≤∞ мШ§л•Ш', 'error');
                        }
                    }).finally(() => {
                        clearTimeout(loadingTimeout);
                        if (!cancelled) setFbLoading(false);
                    });
                };
                syncFromServer();

                return () => { cancelled = true; };
            }, [firebaseUser, userRole, currentWorkspaceId]);

            const saveTimerRef = useRef(null);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [saveError, setSaveError] = useState(false);
            const saveSuccessTimerRef = useRef(null);

            useEffect(() => {
                if (!firebaseUser || fbLoading || userRole !== 'boss' || !currentWorkspaceId) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                const currentDataStr = JSON.stringify(currentData);

                // вС† localStorage м¶ЙмЛЬ м†АмЮ• вАФ мХ±мЭД л∞Фл°Ь лЛЂмХДлПД мЭі кЄ∞кЄ∞мЧРмД† лН∞мЭінД∞ л≥ім°і
                localStorage.setItem('at_cache_' + currentWorkspaceId, JSON.stringify(currentData));

                // вС° Firestore лПЩкЄ∞нЩФ вАФ мЭілѓЄ мДЬл≤ДмЩА лПЩмЭЉнХШл©і к±ілДИлЬА
                if (currentDataStr === lastSyncedDataRef.current) return;

                // вСҐ 2міИ лФФл∞ФмЪімК§ нЫД FirestoreмЧР л∞±кЈЄлЭЉмЪілУЬ м†АмЮ• (кµђкЄА к≥Дм†Х лПЩкЄ∞нЩФ)
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                saveTimerRef.current = setTimeout(() => {
                    setIsSyncing(true);
                    fsSet(fbDb.collection('users').doc(currentWorkspaceId), currentData)
                        .then(() => {
                            lastSyncedDataRef.current = currentDataStr;
                            try { localStorage.removeItem('at_pdel_' + currentWorkspaceId); } catch(_) {}
                            setIsSyncing(false);
                            setSaveSuccess(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        })
                        .catch(e => {
                            console.error('Firestore мЮРлПЩ м†АмЮ• мЛ§нМ®:', e);
                            setIsSyncing(false);
                            setSaveError(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveError(false), 4000);
                        });
                }, 2000);
                return () => clearTimeout(saveTimerRef.current);
            }, [appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage, firebaseUser, fbLoading, userRole, currentWorkspaceId]);

            // м†АмЮ• л≤ДнКЉ вАФ localStorage м¶ЙмЛЬ м†АмЮ• нЫД Firestore лПЩкЄ∞нЩФ
            const handleManualSave = () => {
                if (!firebaseUser) {
                    showAlert('нБілЭЉмЪ∞лУЬмЧР мЧ∞к≤∞лРШмЦі мЮИмІА мХКмКµлЛИлЛ§.\nGoogle л°ЬкЈЄмЭЄмЭД мІДнЦЙнХім£ЉмДЄмЪФ.', 'мХИлВі', 'alert');
                    return;
                }
                if (isSyncing) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);

                // localStorage м¶ЙмЛЬ м†АмЮ• (мЭі кЄ∞кЄ∞ лН∞мЭінД∞ л≥інШЄ)
                const wsId = currentWorkspaceId || firebaseUser.uid;
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));

                setIsSyncing(true);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => {
                        lastSyncedDataRef.current = JSON.stringify(currentData);
                        setIsSyncing(false);
                        setSaveSuccess(true);
                        clearTimeout(saveSuccessTimerRef.current);
                        saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        showAlert('кµђкЄА к≥Дм†ХмЧР м†АмЮ•лРШмЧИмКµлЛИлЛ§.', 'м†АмЮ• мЩДл£М', 'success');
                    })
                    .catch(e => {
                        console.error('Firestore м†АмЮ• мЛ§нМ®:', e);
                        setIsSyncing(false);
                        showAlert('кµђкЄА к≥Дм†Х м†АмЮ•мЧР мЛ§нМ®нЦИмКµлЛИлЛ§.\n(' + e.message + ')\n\nмЭі кЄ∞кЄ∞мЧРлКФ м†АмЮ•лРШмЧИмКµлЛИлЛ§.', 'нБілЭЉмЪ∞лУЬ лПЩкЄ∞нЩФ мЛ§нМ®', 'error');
                    });
            };

            // нКєм†Х нХДлУЬ м¶ЙмЛЬ Firestore м†АмЮ• (лФФл∞ФмЪімК§ мЧЖмЭМ) вАФ міИкЄ∞нЩФ лУ± м¶ЙмЛЬ л∞ШмШБ нХДмЪФнХЬ к≤љмЪ∞
            const handleImmediateSaveMonthly = (newMonthlyData) => {
                if (!firebaseUser || !currentWorkspaceId) return;
                const wsId = currentWorkspaceId;
                const currentData = { appPin, employees, nextEmpId, monthlyData: newMonthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));
                lastSyncedDataRef.current = JSON.stringify(currentData);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => { try { localStorage.removeItem('at_pdel_' + wsId); } catch(_) {} })
                    .catch(() => {});
            };

            // PWA мК§нГ†лУЬмЦЉл°† л™®лУЬ к∞РмІА вАФ мЭі к≤љмЪ∞ signInWithPopupмЭА opener кіАк≥Дк∞А лБКк≤® лПЩмЮС лґИк∞А
            // (нЩИ нЩФл©імЧР мД§мєШлРЬ мХ±мЧРмДЬ мЛ§нЦЙ м§С)
            const isStandalonePWA = () => {
                try {
                    return window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;
                } catch(_) { return false; }
            };

            const checkInAppBrowser = () => {
                const ua = navigator.userAgent;
                const isInApp = /KAKAOTALK|Instagram|FBAN|FBAV|Line\/|Twitter|NAVER|DaumApps|Whale/i.test(ua)
                    || (/Android/i.test(ua) && /wv/.test(ua))
                    || (/iPhone|iPad/i.test(ua) && !/Safari/i.test(ua) && /AppleWebKit/i.test(ua));
                if (isInApp) {
                    const isKakao = /KAKAOTALK/i.test(ua);
                    showAlert(
                        isKakao
                            ? 'мєімєімШ§нЖ° лЄМлЭЉмЪ∞м†АмЧРмДЬлКФ Google л°ЬкЈЄмЭЄмЭі м∞®лЛ®лР©лЛИлЛ§.\n\nмЪ∞мЄ° нХШлЛ® вЛѓ л©ФлЙі вЖТ "лЛ§л•Є лЄМлЭЉмЪ∞м†Ал°Ь мЧікЄ∞"л•Љ лИМлЯђ Chrome лШРлКФ SafariмЧРмДЬ м†СмЖНнХі м£ЉмДЄмЪФ.'
                            : 'нШДмЮђ мХ± лВі лЄМлЭЉмЪ∞м†АмЧРмДЬлКФ Google л°ЬкЈЄмЭЄмЭі м∞®лЛ®лР©лЛИлЛ§.\n\nChrome лШРлКФ Safari лЄМлЭЉмЪ∞м†Ал°Ь мЧімЦімДЬ л°ЬкЈЄмЭЄнХі м£ЉмДЄмЪФ.',
                        'лЄМлЭЉмЪ∞м†А мХИлВі', 'alert'
                    );
                    return true;
                }
                return false;
            };

            // Google л°ЬкЈЄмЭЄ к≥µнЖµ нЧђнНЉ: popup л®Љм†А мЛЬлПД вЖТ мЛ§нМ® мЛЬ redirect fallback
            // TWAмЧРмДЬлПД popupмЭі лПЩмЮСнХШлКФмІА нЕМмК§нКЄнХШкЄ∞ мЬДнХі display-mode лґДкЄ∞л•Љ м†Ьк±∞нХ®
            // (к≥Љк±∞мЧРлКФ standaloneмЭіл©і л∞Фл°Ь redirect мВђмЪ© вЖТ TWAмЧРмДЬ мК§нЖ†л¶ђмІА нММнЛ∞мЕФлЛЭ лђЄм†Ьл°Ь л≥µмЫР мЛ§нМ®)
            const POPUP_FALLBACK_CODES = new Set([
                'auth/popup-blocked',
                'auth/web-storage-unsupported',
                'auth/operation-not-supported-in-this-environment',
                'auth/internal-error'
            ]);
            const tryGoogleSignIn = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await fbAuth.signInWithPopup(provider);
                    return;
                } catch(e) {
                    const code = e?.code || '';
                    // мВђмЪ©мЮРк∞А мІБм†С лЛЂмЭА к≤љмЪ∞лКФ fallback мХИ нХ® (мЛ§м†Ь мЈ®мЖМ)
                    if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
                        throw e;
                    }

            // Google мІБмЫР лМАкЄ∞ к∞РмІА (кіАл¶ђмЮР) вАФ empPending мїђл†ЙмЕШ
            useEffect(() => {

                            if (data.type === 'contract_delete_completed') {

            // мВђмЮ•: к∞Б Google мІБмЫРмЭШ workplaces лђЄмДЬмЧРмДЬ contractStatus/pendingRewrite/contractDeleteRequestл•Љ sync
            // (мВђмЮ•мЭШ users лПДнБРл®ЉнКЄ employees л∞∞мЧімЭА мВђмЮ• мЄ°мЧРмДЬлІМ кіАл¶ђлРШлѓАл°Ь, мІБмЫРмЭі мЮРкЄ∞ мЄ°мЧРмДЬ к∞±мЛ†нХЬ contract мГБнГЬк∞А

            //  м≤Шл¶ђлРШмІА мХКмЭД мИШ мЮИмЦі, нОШмЭімІА мІДмЮЕ/employees л≥Ак≤љ мЛЬ нХЬ л≤И л≥ік∞Х sync.)
            useEffect(() => {

                    if (valid.length === 0) return;

                        let changed = false;
                        const next = prev.map(e => {
                            if (!e.empUid) return e;
                            const r = valid.find(v => v.uid === e.empUid);
                            if (!r) return e;
                            const newCs = r.contractStatus !== undefined ? r.contractStatus : (e.contractStatus || null);
                            const newPr = !!r.pendingRewrite;
                            const newCdr = r.contractDeleteRequest || null;
                            if ((e.contractStatus || null) !== newCs

                                const md = prev[mk] || {};
                                const dd = md.days || {};
                                const de = dd[day] || {};
                                const ee = de.entries || {};
                                if (ee[sub.employeeId]?.bossModified) return prev; // кіАл¶ђмЮРк∞А мИШм†ХнХЬ к≤љмЪ∞ мЬ†мІА
                                // нШДмЮђ employeesмЧР лУ±л°ЭлРЬ мЭіл¶Д мЪ∞мД† мВђмЪ© (мЮђк∞АмЮЕ мЭіл¶Д л≥Ак≤љ мЛЬ кµђ мЭіл¶Д л≥µмЫР л∞©мІА)
                                // нПіл∞± мИЬмДЬ: вС†кіАл¶ђмЮР лУ±л°Э мЭіл¶Д вЖТ вС°кЄ∞м°і мЧФнКЄл¶ђ мЭіл¶Д(мЭілѓЄ мЧЕлН∞мЭінКЄлРРмЭД к≤љмЪ∞ л≥ім°і) вЖТ вСҐм†ЬмґЬ мЛЬ мЭіл¶Д
                                const currentEmp = employeesRef.current.find(e => e.empUid === sub.empUid);
                                const existingEntryName = ee[sub.employeeId]?.name;
                                const displayName = currentEmp?.name || existingEntryName || sub.empName;
                                return {
                                    ...prev,
                                    [mk]: { ...md, days: { ...dd, [day]: { ...de, entries: { ...ee,
                                        [sub.employeeId]: {
                                            hours: sub.hours,
                                            pay: Math.round(sub.hours * wage),
                                            name: displayName,
                                            wage,
                                            note: sub.note || '',
                                            submittedByEmp: true,
                                            empUid: sub.empUid,
                                            submittedHours: sub.hours
                                        }
                                    }}}}
                                };
                            });
                            // міИкЄ∞ л°ЬлУЬ мЭінЫД мГИл°Ь мґФк∞АлРЬ м†ЬмґЬлІМ мХМл¶Љ л∞∞лДИ + лѓЄнЩХмЭЄ лВ†мІЬ мґФк∞А
                            if (initialLoadDone && change.type === 'added' && sub.empName) {
                                setWorkSubmitBanner({ empName: sub.empName, date: sub.date, hours: sub.hours });
                                setUnseenDates(prev => new Set([...prev, sub.date]));
                            }
                        });
                        initialLoadDone = true;

        function LoginScreen({ appPin, onLogin, empName }) {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);

            const handleNumClick = (num) => {
                if (input.length < 6) {
                    const newInput = input + num;
                    setInput(newInput);
                    setError(false);
                    if (newInput.length === 6 && newInput === appPin) {
                        setTimeout(onLogin, 100);
                    } else if (newInput.length === 6) {
                        setError(true);
                        setTimeout(() => setInput(''), 500);
                    }
                }
            };

            const handleDelete = () => setInput(prev => prev.slice(0, -1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (/[0-9]/.test(e.key)) handleNumClick(e.key);
                    if (e.key === 'Backspace') handleDelete();
                    if (e.key === 'Enter' && input === appPin) onLogin();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [input, appPin]);

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">

        function TabEmployees({ employees, setEmployees, nextEmpId, setNextEmpId, getEmployeeStats, globalMinWage, setGlobalMinWage, showAlert, showConfirm, firebaseUser, currentWorkspaceId, workspaceInfo, setActiveTab, pendingContractUpdateEmpIds, setPendingContractUpdateEmpIds }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingEmp, setEditingEmp] = useState(null);
            const [viewingContract, setViewingContract] = useState(null); // { contract, empUid }
            const [modalDeleteReq, setModalDeleteReq] = useState(null);
            const [signingEmpUid, setSigningEmpUid] = useState(null);
            const [personalTemplateTarget, setPersonalTemplateTarget] = useState(null); // к∞ЬмЭЄ кЈЉл°Ьк≥ДмХљмДЬ нМЭмЧЕ лМАмГБ кЈЉлђімЮР
            const [personalTemplateReason, setPersonalTemplateReason] = useState('wage_change'); // 'wage_change' | 'rewrite_request' | 'boss_rewrite' | 'new_contract'
            const [minWageModalOpen, setMinWageModalOpen] = useState(false);
            const [minWageTemplateAfterSave, setMinWageTemplateAfterSave] = useState(null); // { affectedEmps }
            // pendingContractUpdateEmpIdsлКФ лґАл™® мїінПђлДМнКЄмЧРмДЬ liftлРЬ propмЬЉл°Ь л∞ЫмЭМ (TabCalendar/л∞∞лДИмЧРмДЬлПД мВђмЪ©)

            // нМЭмЧЕ мЧіл†§мЮИлКФ лПЩмХИ нХілЛє мІБмЫР workplaces лђЄмДЬ мЛ§мЛЬк∞Д к∞РмІА
            // вЖТ кЈЉлђімЮРк∞А лПЩмЭШнХШл©і м¶ЙмЛЬ employees мГБнГЬ л∞ШмШБ (нМЭмЧЕ лЛЂкЄ∞ м†ДмЧРлПД к∞±мЛ†)
            useEffect(() => {
                if (!viewingContract || !firebaseUser || !currentWorkspaceId) return;
                const empUid = viewingContract.empUid;
                if (!empUid) return;
                const unsub = fbDb.collection('employeeAccounts').doc(empUid)
                    .collection('workplaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        const newDeleteReq = data?.contractDeleteRequest || null;
                        const newContractStatus = data?.contractStatus || null;
                        const hasContract = !!data?.contract;
                        setModalDeleteReq(newDeleteReq);
                        setEmployees(prev => prev.map(e =>
                            e.empUid === empUid ? {
                                ...e,
                                contractDeleteRequest: newDeleteReq,
                                contractStatus: newContractStatus,
                                contract: hasContract ? data.contract : (e.contract || null),
                                pendingRewrite: data?.pendingRewrite || false
                            } : e
                        ));
                    }, () => {});
                return () => unsub();
            }, [viewingContract?.empUid, firebaseUser, currentWorkspaceId]);

            const filteredEmployees = useMemo(() => {
                const minW = Number(globalMinWage);
                const isLowWage = (emp) => emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < minW;
                const list = searchTerm ? employees.filter(emp => emp.name.includes(searchTerm)) : [...employees];
                return list.sort((a, b) => {
                    const aPending = pendingContractUpdateEmpIds.has(a.id);
                    const bPending = pendingContractUpdateEmpIds.has(b.id);
                    if (aPending && !bPending) return -1;
                    if (!aPending && bPending) return 1;
                    const aLow = isLowWage(a), bLow = isLowWage(b);
                    if (aLow && !bLow) return -1;
                    if (!aLow && bLow) return 1;
                    return a.displayId - b.displayId;
                });
            }, [employees, searchTerm, globalMinWage, pendingContractUpdateEmpIds]);

            const handleMinWageSave = (newVal) => {
                const oldVal = globalMinWage;
                setGlobalMinWage(newVal);
                setMinWageModalOpen(false);
                const newMin = Number(newVal);

                // кЄ∞м°і мµЬм†АмЛЬкЄЙк≥Љ лПЩмЭЉнХШк≤М мД§м†ХлРЬ кЈЉлђімЮР мЛЬкЄЙ мЮРлПЩ мЧЕлН∞мЭінКЄ
                const equalWageEmps = employees.filter(emp => Number(emp.wage) === Number(oldVal) && Number(emp.wage) > 0);
                if (equalWageEmps.length > 0) {
                    setEmployees(prev => prev.map(e =>
                        Number(e.wage) === Number(oldVal) && Number(e.wage) > 0 ? { ...e, wage: newMin } : e
                    ));
                    if (currentWorkspaceId) {
                        equalWageEmps.forEach(emp => {
                            if (emp.empUid) {
                                sendWageChangeNotification(emp.empUid, currentWorkspaceId, Number(oldVal), newMin).catch(() => {});
                                fbDb.collection('employeeAccounts').doc(emp.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ wageBelowMin: firebase.firestore.FieldValue.delete() })
                                    .catch(() => {});
                            }
                        });
                    }
                }

                // wageBelowMin нФМлЮШкЈЄ мЧЕлН∞мЭінКЄ (мЛЬкЄЙмЭі мµЬм†АмЛЬкЄЙк≥Љ лЛ§л•Є кЈЉлђімЮР лМАмГБ)
                const nowLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < newMin && Number(emp.wage) !== Number(oldVal));
                const noLongerLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) >= newMin && Number(emp.wage) < Number(oldVal));
                if (currentWorkspaceId && (nowLowEmps.length > 0 || noLongerLowEmps.length > 0)) {
                    const batch = fbDb.batch();
                    nowLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: true });
                    });
                    noLongerLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: firebase.firestore.FieldValue.delete() });
                    });
                    batch.commit().catch(() => {});
                }
                // мµЬм†АмЛЬкЄЙ м†БмЪ© м§СмЭЄ кЈЉлђімЮР(мЛЬкЄЙ лѓЄмД§м†Х лШРлКФ мЭім†Д мµЬм†АмЛЬкЄЙк≥Љ лПЩмЭЉ) м§С к≥ДмХљ мЩДл£МмЮРлІМ
                const affectedEmps = employees.filter(emp => {
                    const usesMinWage = !emp.wage || Number(emp.wage) === 0 || Number(emp.wage) === Number(oldVal);
                    return usesMinWage && emp.contractStatus === 'completed';
                });
                if (affectedEmps.length === 0) return;

                if (workspaceInfo?.contractTemplate) {
                    // кЄАл°Ьл≤М нЕЬнФМл¶њмЭі мЮИлКФ к≤љмЪ∞: мЭЉкіД мЮђмЮСмД± мЪФм≤≠ л™®лЛђ нСЬмЛЬ
                    setMinWageTemplateAfterSave({ affectedEmps });
                    setPendingContractUpdateEmpIds(new Set(affectedEmps.map(e => e.id)));
                } else {
                    // кЄАл°Ьл≤М нЕЬнФМл¶њмЭі мЧЖлКФ к≤љмЪ∞: кЈЉл°ЬмЮРл≥Дл°Ь к∞Ьл≥Д к≥ДмХљмДЬк∞А лЛ§л•Љ мИШ мЮИмЦі мЭЉкіД мЮђмЮСмД±мЭА лґАм†Бм†И.
                    // мєілУЬ мИЬмДЬ л≥Ак≤љ + "рЯУЛ кЈЉл°Ьк≥ДмХљмДЬ мИШм†ХнХДмЪФ" нСЬмЛЬлІМ нКЄл¶ђк±∞. мЮђмЮСмД±мЭА мВђмЮ•мЭі к∞Ьл≥Д м≤Шл¶ђ.
                    setPendingContractUpdateEmpIds(new Set(affectedEmps.map(e => e.id)));
                }
            };

            const handleAddClick = () => {
                if (globalMinWage === '' || Number(globalMinWage) <= 0) {
                    showAlert('нШДмЮђ мµЬм†АмЛЬкЄЙмЭД л®Љм†А мЮЕл†•нХім£ЉмДЄмЪФ.\nмµЬм†АмЛЬкЄЙмЭі мД§м†ХлРШмЦімХЉ кЈЉлђімЮРл•Љ мґФк∞АнХ† мИШ мЮИмКµлЛИлЛ§.', 'мХИлВі');
                    return;
                }
                setEditingEmp(null);
                setIsModalOpen(true);
            };

            const handleSave = (empData) => {
                const { displayId, ...dataToSave } = empData;

                if (editingEmp) {
                    const oldStatus = editingEmp.status || (editingEmp.isWorking === false ? 'resigned' : 'working');
                    const newStatus = dataToSave.status;

                    // мЛЬкЄЙ л≥Ак≤љ к∞РмІА: к≥ДмХљмДЬк∞А мЩДл£МлРРк±∞лВШ мЮђмЮСмД± лМАкЄ∞ м§СмЭЄ кЈЉлђімЮРмЭШ мЛЬкЄЙмЭі л∞ФлАМл©і мЮђмЮСмД± нХДмЪФ
                    const oldWage = Number(editingEmp.wage) || Number(globalMinWage);
                    const newWage = Number(dataToSave.wage) || Number(globalMinWage);
                    const wageChanged = oldWage !== newWage;
                    const resolvedWage = (dataToSave.wage && Number(dataToSave.wage) > 0)
                        ? dataToSave.wage
                        : (Number(globalMinWage) > 0 ? Number(globalMinWage) : '');
                    let finalData = { ...dataToSave, wage: resolvedWage };
                    if (wageChanged && (editingEmp.contractStatus === 'completed' || editingEmp.contractStatus === 'needs_resign')) {
                        const hadPersonalWage = editingEmp.wage && Number(editingEmp.wage) > 0;
                        const hasPersonalWage = dataToSave.wage && Number(dataToSave.wage) > 0;
                        if (hasPersonalWage) {
                            // к∞Ьл≥Д мЛЬкЄЙ вЖТ к∞Ьл≥Д мЛЬкЄЙ л≥Ак≤љ: к∞ЬмЭЄ кЈЉл°Ьк≥ДмХљмДЬ нЕЬнФМл¶њ нОЄмІС нМЭмЧЕ мЧікЄ∞
                            // setEmployeesлКФ нМЭмЧЕ м†АмЮ• мЛЬм†РмЧРлІМ нШЄмґЬ (мХ± мЮђмЛЬмЮС мЛЬ мЛЬкЄЙ мЫРл≥µ л≥імЮ•)
                            setPersonalTemplateReason('wage_change');
                            setPersonalTemplateTarget(finalData);
                            setIsModalOpen(false);
                            setEditingEmp(null);
                            // early return м†ДмЧР wageBelowMin м¶ЙмЛЬ л∞ШмШБ
                            if (dataToSave.empUid && currentWorkspaceId) {
                                const isLow = Number(finalData.wage) > 0 && Number(finalData.wage) < Number(globalMinWage);
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ wageBelowMin: isLow ? true : firebase.firestore.FieldValue.delete() })
                                    .catch(() => {});
                            }
                            return;
                        } else if (hadPersonalWage && !hasPersonalWage) {

                                )}

                            </div>
                        </form>
                        
                        <div className="p-4 border-t bg-white flex gap-3 shrink-0">
                            <button type="button" onClick={onClose} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl hover:bg-gray-200 transition font-medium">мЈ®мЖМ</button>
                            <button type="submit" form="empForm" className="flex-1 bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition font-medium shadow-sm">м†АмЮ•</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TabCalendar({ employees, monthlyData, setMonthlyData, showConfirm, unseenDates, onMarkSeen, globalMinWage, workspaceId, onImmediateSaveMonthly, pendingContractUpdateEmpIds }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = monthlyData[monthKey] || { days: {} };
            const activeEmployees = employees.filter(e => {
                const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
                const cStatus = e.contractStatus || null;
                const isLow = e.wage && Number(e.wage) > 0 && Number(e.wage) < Number(globalMinWage);
                const needsContractUpdate = pendingContractUpdateEmpIds && pendingContractUpdateEmpIds.has(e.id);
                return statusVal === 'working' && cStatus !== 'needs_resign' && cStatus !== 'pending_boss' && !needsContractUpdate;
            }).sort((a,b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const touchStartX = useRef(null);
            const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null || isBulkInputOpen || editDayModal) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }
                touchStartX.current = null;
            };

            const handleTotalRevenueChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                setMonthlyData(prev => ({
                    ...prev,

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}лЕД ${month}мЫФ ${dayToDel}мЭЉмЭШ м†Хл≥іл•Љ м†ХлІР мВ≠м†ЬнХШмЛЬк≤†мКµлЛИкєМ?`, () => {
                    // мВ≠м†Ь м†Д нХілЛє лВ†мІЬмЭШ entriesмЧРмДЬ empUid мИШмІС (submissions мВ≠м†Ь + мХМл¶ЉмЪ©)
                    const dayEntries = monthlyData[monthKey]?.days?.[dayToDel]?.entries || {};
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayToDel).padStart(2,'0')}`;
                    // мІБмЫРлУ§мЧРк≤М мВ≠м†Ь мХМл¶Љ л∞ЬмЖ°
                    Object.values(dayEntries).forEach(entry => {
                        const empUid = entry.empUid;
                        if (empUid && entry.hours > 0) {
                            sendChangeNotification(empUid, {
                                type: 'hours_deleted',

                                oldHours: entry.hours,

                        }

                    setMonthlyData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey] && newData[monthKey].days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };

                        return newData;

                    // submissions мїђл†ЙмЕШмЧРмДЬлПД нХілЛє лВ†мІЬ лН∞мЭінД∞ мВ≠м†Ь
                    if (workspaceId) {

                        Object.values(dayEntries).forEach(entry => {
                            const empUid = entry.empUid;
                            if (empUid) {
                                fbDb.collection('workspaces').doc(workspaceId)
                                    .collection('submissions').doc(`${empUid}_${dateStr}`)

                        fbDb.collection('workspaces').doc(workspaceId)
                            .collection('submissions')
                            .where('date', '==', dateStr)
                            .get().then(snap => {
                                if (snap.empty) return;
                                const batch = fbDb.batch();
                                snap.forEach(doc => batch.delete(doc.ref));
                                return batch.commit();
                            }).catch(() => {});
                    }
                    setEditDayModal(null); // мВ≠м†Ь нЫД л™®лЛђ лЛЂкЄ∞
                }, "лН∞мЭінД∞ мВ≠м†Ь");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            let totalMonthPay = 0;
            let sumOfDailyRevenue = 0;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                const dayData = currentMonthData.days[d] || {};
                sumOfDailyRevenue += (dayData.revenue || 0);
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;

            const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
            const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
            const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">

                            <button

                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">мЭіл≤ИлЛђ кЈЉлђімЛЬк∞Д мЭЉкіД мЮЕл†•</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-xl px-4 py-2.5 shadow-sm text-sm">
                                <label className="font-medium text-gray-700 whitespace-nowrap">мЭіл≤ИлЛђ міЭлІ§мґЬ:</label>
                                <input
                                    type="number"
                                    value={currentMonthData.totalRevenue ?? ''}
                                    onChange={handleTotalRevenueChange}
                                    placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                                    className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0 font-bold"
                                />
                                <span className="text-gray-500 font-medium whitespace-nowrap">мЫР</span>
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                мИЬмИШ кЄЙмЧђ: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                м£ЉнЬімИШлЛє: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                міЭ кЄЙмЧђ: {formatCurrency(totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['мЭЉ', 'мЫФ', 'нЩФ', 'мИШ', 'л™©', 'кЄИ', 'нЖ†'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`empty-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {}, revenue: 0 };
                                let dailyTotalPay = 0;
                                const activeEntries = [];

                                Object.values(dayData.entries || {}).forEach(entry => {
                                    if (entry.hours > 0) {
                                        dailyTotalPay += entry.pay;
                                        activeEntries.push(entry);
                                    }
                                });

                                const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;
                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];
                                const dateStr = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                                const hasUnseen = unseenDates?.has(dateStr);
                                const handleOpenDay = () => { setEditDayModal(day); onMarkSeen?.(dateStr); };

                                return (
                                    <div key={`day-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={handleOpenDay}>
                                        <div className="flex justify-between items-start mb-1">
                                            <div className="relative flex items-center">
                                                <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                    {day}
                                                </span>
                                                {hasUnseen && <span className="absolute -top-0.5 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>}
                                            </div>
                                            {/* PCмЧРмДЬлІМ лІИмЪ∞мК§ мШђл†ЄмЭД лХМ л≥імЭік≤М м≤Шл¶ђ */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={handleOpenDay} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">мИШм†Х</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="мВ≠м†Ь">
                                                    <X className="w-3 h-3" />

                                            </div>
                                        </div>

                                        {/* л™®л∞ФмЭЉ лЈ∞ */}
                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}л™Е кЈЉлђі</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}лІМмЫР</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="м£ЉнЬімИШлЛє л∞ЬмГЭ"></div>}
                                        </div>

                                        {/* PC лЈ∞ */}
                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}л™Е...</div>}
                                            </div>

                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">мЭЄк±ілєД: {formatCurrency(dailyTotalPay)}</div>
                                                    <div className="text-xs text-gray-500 mt-0.5">лІ§мґЬ: {formatCurrency(dayData.revenue || 0)}</div>
                                                    {dayData.revenue > 0 && <div className="text-[10px] font-medium text-gray-400 mt-0.5">лєДмЬ®: {dailyRatio}%</div>}
                                                </div>
                                            )}

                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">м£ЉнЬімИШлЛє л∞ЬмГЭ</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setIsBulkInputOpen(false)}
                        />
                    )}

                    {editDayModal && (
                        <DailyEditModal
                            year={year} month={month} day={editDayModal} monthKey={monthKey}
                            activeEmployees={activeEmployees} allEmployees={employees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setEditDayModal(null)}
                            onDelete={() => handleDeleteDay(editDayModal)}
                            workspaceId={workspaceId}
                        />
                    )}

                    <div className="flex justify-end mt-4">
                        <button
                            onClick={() => {
                                showConfirm(`${year}лЕД ${month}мЫФ м†Хл≥іл•Љ м†ХлІР міИкЄ∞нЩФнХШмЛЬк≤†мКµлЛИкєМ?`, () => {
                                    // нХілЛє мЫФмЭШ л™®лУ† мІБмЫРмЧРк≤М мВ≠м†Ь мХМл¶Љ л∞ЬмЖ°
                                    const monthDays = monthlyData[monthKey]?.days || {};
                                    Object.entries(monthDays).forEach(([d, dayData]) => {
                                        Object.values(dayData.entries || {}).forEach(entry => {
                                            if (entry.empUid && entry.hours > 0) {
                                                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                                sendChangeNotification(entry.empUid, {
                                                    type: 'hours_deleted',
                                                    date: dateStr,
                                                    oldHours: entry.hours,
                                                    bossUid: workspaceId || null
                                                }).catch(() => {});
                                            }
                                        });
                                    });
                                    const newData = { ...monthlyData };
                                    delete newData[monthKey];
                                    // Firestore лПЩкЄ∞нЩФ м†Д мГИл°Ьк≥†мє® мЛЬ лН∞мЭінД∞ л≥µмЫР л∞©мІА
                                    if (workspaceId) {
                                        try {
                                            const pKey = 'at_pdel_' + workspaceId;
                                            const list = JSON.parse(localStorage.getItem(pKey) || '[]');
                                            if (!list.includes(monthKey)) localStorage.setItem(pKey, JSON.stringify([...list, monthKey]));
                                        } catch(_) {}
                                    }
                                    setMonthlyData(newData);
                                    onImmediateSaveMonthly?.(newData);
                                    // мГИл°Ьк≥†мє® мЛЬ мІБмЫР м†ЬмґЬ лН∞мЭінД∞к∞А л≥µмЫРлРШлКФ л≤ДкЈЄ мИШм†Х:
                                    // onSnapshot л¶ђмК§лДИк∞А submissionsл•Љ мЮђм†БмЪ©нХШмІА мХКлПДл°Э нХілЛє мЫФ лН∞мЭінД∞ мВ≠м†Ь
                                    if (workspaceId) {
                                        const padM = month.toString().padStart(2, '0');
                                        const nextY = month === 12 ? year + 1 : year;
                                        const nextM = (month === 12 ? 1 : month + 1).toString().padStart(2, '0');
                                        fbDb.collection('workspaces').doc(workspaceId)
                                            .collection('submissions')
                                            .where('date', '>=', `${year}-${padM}-01`)
                                            .where('date', '<', `${nextY}-${nextM}-01`)
                                            .get()
                                            .then(snap => {
                                                if (snap.empty) return;
                                                const batch = fbDb.batch();
                                                snap.forEach(doc => batch.delete(doc.ref));
                                                return batch.commit();
                                            })
                                            .catch(() => {});
                                    }
                                }, "міИкЄ∞нЩФ нЩХмЭЄ");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            мЭіл≤ИлЛђ м†Хл≥і м†Дм≤і міИкЄ∞нЩФ
                        </button>
                    </div>
                </div>
            );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose }) {
            const hourRefs = useRef({});
            const minRefs = useRef({});
            const [localData, setLocalData] = useState({});   // мЛЬк∞Д (м†ХмИШ)
            const [minuteData, setMinuteData] = useState({}); // лґД (0-59)

            useEffect(() => {
                const initData = {};
                const initMinData = {};
                const currentMonthData = monthlyData[monthKey] || { days: {} };

                for (let d = 1; d <= daysInMonth; d++) {
                    initData[d] = {};
                    initMinData[d] = {};
                    const dayData = currentMonthData.days[d] || { entries: {} };
                    activeEmployees.forEach(emp => {
                        const existing = dayData.entries[emp.id]?.hours;
                        if (existing != null && existing > 0) {
                            const h = Math.floor(existing);
                            const m = Math.round((existing - h) * 60);
                            initData[d][emp.id] = h > 0 ? String(h) : '';
                            initMinData[d][emp.id] = m > 0 ? String(m) : '';
                        } else {
                            initData[d][emp.id] = '';
                            initMinData[d][emp.id] = '';
                        }
                    });
                }
                setLocalData(initData);
                setMinuteData(initMinData);
            }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

            const handleInputChange = (day, empId, val) => {
                setLocalData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const handleMinuteChange = (day, empId, val) => {
                setMinuteData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const focusHour = (day, empIdx) => {
                const ref = hourRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusMin = (day, empIdx) => {
                const ref = minRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };

            // мЛЬк∞Д мЮЕл†•мєЄ л∞©нЦ•нВ§
            // вЖСвЖУ: к∞ЩмЭА мІБмЫР мЭім†Д/лЛ§мЭМ лВ† мЛЬк∞ДмєЄ | вЖТ/Enter: к∞ЩмЭА лВ† лґДмєЄ | вЖР: мЭім†Д мІБмЫР лґДмєЄ
            const handleHourKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusHour(day - 1, empIdx);
                } else if (e.key === 'ArrowRight' || e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    focusMin(day, empIdx);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    if (empIdx > 0) focusMin(day, empIdx - 1);
                    else if (day > 1) focusMin(day - 1, last);
                }
            };

            // лґД мЮЕл†•мєЄ л∞©нЦ•нВ§
            // вЖСвЖУ: к∞ЩмЭА мІБмЫР мЭім†Д/лЛ§мЭМ лВ† лґДмєЄ | вЖТ: лЛ§мЭМ мІБмЫР мЛЬк∞ДмєЄ | вЖР: к∞ЩмЭА лВ† мЛЬк∞ДмєЄ
            // Enter: лЛ§мЭМ лВ† мЛЬк∞ДмєЄ (лІИмІАлІЙ лВ†мЭіл©і лЛ§мЭМ мІБмЫР 1мЭЉ мЛЬк∞ДмєЄ)
            const handleMinKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusMin(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusMin(day - 1, empIdx);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (empIdx < last) focusHour(day, empIdx + 1);
                    else if (day < daysInMonth) focusHour(day + 1, 0);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    focusHour(day, empIdx);
                } else if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                    else if (empIdx < last) focusHour(1, empIdx + 1);
                }
            };

            const handleSave = () => {
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };

                    for (let d = 1; d <= daysInMonth; d++) {
                        if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };

                        activeEmployees.forEach(emp => {
                            const hStr = localData[d]?.[emp.id];
                            const mStr = minuteData[d]?.[emp.id];
                            const h = hStr === '' || hStr == null ? 0 : parseInt(hStr, 10);
                            const m = mStr === '' || mStr == null ? 0 : parseInt(mStr, 10);
                            const hours = h + m / 60;

                            if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                                newData[monthKey].days[d].entries[emp.id] = {
                                    hours: hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage
                                };
                            }
                        });
                    }
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-sm">

                            </div>

                        </div>

                        <div className="flex-1 overflow-auto p-4 relative">
                            {activeEmployees.length === 0 ? (

                            ) : (
                                <table className="w-full border-collapse min-w-max">

                                        <tr>

                                            {activeEmployees.map(emp => (
                                                <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm">
                                                    {emp.displayId}. {emp.name}
                                                    <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                                                    <span className="text-[10px] font-normal text-gray-400 block">мЛЬк∞Д&nbsp;&nbsp;&nbsp;лґД</span>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                                            <tr key={day} className="hover:bg-yellow-50/50">
                                                <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}мЭЉ</td>
                                                {activeEmployees.map((emp, empIdx) => (
                                                    <td key={emp.id} className="border p-0.5">
                                                        <div className="flex items-center gap-0.5">
                                                            <input
                                                                ref={el => hourRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0"
                                                                value={localData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleInputChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleHourKeyDown(e, day, empIdx)}
                                                                className="w-12 h-9 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent outline-none transition text-sm"
                                                                placeholder="0"
                                                            />
                                                            <span className="text-gray-300 text-xs">:</span>
                                                            <input
                                                                ref={el => minRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0" max="59"
                                                                value={minuteData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleMinuteChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleMinKeyDown(e, day, empIdx)}

                                                                placeholder="лґД"

                            <button onClick={handleSave} className="px-6 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 transition font-bold shadow-sm">м†АмЮ•нХШкЄ∞</button>
                        </div>
                    </div>
