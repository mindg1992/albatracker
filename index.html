        function TabEmployees({ employees, setEmployees, nextEmpId, setNextEmpId, getEmployeeStats, globalMinWage, setGlobalMinWage, showAlert, showConfirm, firebaseUser, currentWorkspaceId, workspaceInfo, setWorkspaceInfo, setActiveTab, pendingContractUpdateEmpIds, setPendingContractUpdateEmpIds }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingEmp, setEditingEmp] = useState(null);
            const [viewingContract, setViewingContract] = useState(null); // { contract, empUid }
            const [modalDeleteReq, setModalDeleteReq] = useState(null);
            const [signingEmpUid, setSigningEmpUid] = useState(null);
            const [personalTemplateTarget, setPersonalTemplateTarget] = useState(null); // 개인 근로계약서 팝업 대상 근무자
            const [personalTemplateReason, setPersonalTemplateReason] = useState('wage_change'); // 'wage_change' | 'rewrite_request' | 'boss_rewrite' | 'new_contract'
            const [minWageModalOpen, setMinWageModalOpen] = useState(false);
            const [minWageTemplateAfterSave, setMinWageTemplateAfterSave] = useState(null); // { affectedEmps }
            const [bulkDispatchOpen, setBulkDispatchOpen] = useState(false);
            // pendingContractUpdateEmpIds는 부모 컴포넌트에서 lift된 prop으로 받음 (TabCalendar/배너에서도 사용)

            const handleOpenBulkDispatch = () => {
                if (!workspaceInfo?.contractTemplate) {
                    showAlert('설정에서 근로계약서 템플릿을 먼저 작성하세요.', '안내', 'info');
                    return;
                }
                const targets = employees.filter(emp => emp.empUid && emp.status !== 'resigned' && emp.status !== 'leave' && (
                    pendingContractUpdateEmpIds.has(emp.id) ||
                    emp.contractUpdateRequired ||
                    (!emp.contractStatus || emp.contractStatus === null)
                ));
                if (targets.length === 0) {
                    showAlert('근로계약서 발송이 필요한 근무자가 없습니다.', '안내', 'info');
                    return;
                }
                setBulkDispatchOpen(true);
            };

            // 팝업 열려있는 동안 해당 직원 workplaces 문서 실시간 감지
            // → 근무자가 동의하면 즉시 employees 상태 반영 (팝업 닫기 전에도 갱신)
            useEffect(() => {
                if (!viewingContract || !firebaseUser || !currentWorkspaceId) return;
                const empUid = viewingContract.empUid;
                if (!empUid) return;
                const unsub = fbDb.collection('employeeAccounts').doc(empUid)
                    .collection('workplaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        const newDeleteReq = data?.contractDeleteRequest || null;
                        const newContractStatus = data?.contractStatus || null;
                        const hasContract = !!data?.contract;
                        setModalDeleteReq(newDeleteReq);
                        setEmployees(prev => prev.map(e =>
                            e.empUid === empUid ? {
                                ...e,
                                contractDeleteRequest: newDeleteReq,
                                contractStatus: newContractStatus,
                                contract: hasContract ? data.contract : (e.contract || null),
                                pendingRewrite: data?.pendingRewrite || false
                            } : e
                        ));
                    }, () => {});
                return () => unsub();
            }, [viewingContract?.empUid, firebaseUser, currentWorkspaceId]);

            const filteredEmployees = useMemo(() => {
                const minW = Number(globalMinWage);
                const isLowWage = (emp) => emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < minW;
                const visible = employees.filter(emp => emp.status !== 'deleted');
                const list = searchTerm ? visible.filter(emp => emp.name.includes(searchTerm)) : [...visible];
                return list.sort((a, b) => {
                    const aPending = pendingContractUpdateEmpIds.has(a.id);
                    const bPending = pendingContractUpdateEmpIds.has(b.id);
                    if (aPending && !bPending) return -1;
                    if (!aPending && bPending) return 1;
                    const aLow = isLowWage(a), bLow = isLowWage(b);
                    if (aLow && !bLow) return -1;
                    if (!aLow && bLow) return 1;
                    return a.displayId - b.displayId;
                });
            }, [employees, searchTerm, globalMinWage, pendingContractUpdateEmpIds]);

            const handleMinWageSave = (newVal) => {
                const oldVal = globalMinWage;
                setGlobalMinWage(newVal);
                setMinWageModalOpen(false);
                const newMin = Number(newVal);

                // 기존 최저시급과 동일하게 설정된 근무자 시급 자동 업데이트
                const equalWageEmps = employees.filter(emp => Number(emp.wage) === Number(oldVal) && Number(emp.wage) > 0);
                if (equalWageEmps.length > 0) {
                    setEmployees(prev => prev.map(e =>
                        Number(e.wage) === Number(oldVal) && Number(e.wage) > 0 ? { ...e, wage: newMin } : e
                    ));
                    if (currentWorkspaceId) {
                        equalWageEmps.forEach(emp => {
                            if (emp.empUid) {
                                sendWageChangeNotification(emp.empUid, currentWorkspaceId, Number(oldVal), newMin).catch(() => {});
                                fbDb.collection('employeeAccounts').doc(emp.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ wageBelowMin: firebase.firestore.FieldValue.delete() })
                                    .catch(() => {});
                            }
                        });
                    }
                }

                // wageBelowMin 플래그 업데이트 (시급이 최저시급과 다른 근무자 대상)
                const nowLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < newMin && Number(emp.wage) !== Number(oldVal));
                const noLongerLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) >= newMin && Number(emp.wage) < Number(oldVal));
                if (currentWorkspaceId && (nowLowEmps.length > 0 || noLongerLowEmps.length > 0)) {
                    const batch = fbDb.batch();
                    nowLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: true });
                    });
                    noLongerLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: firebase.firestore.FieldValue.delete() });
                    });
                    batch.commit().catch(() => {});
                }
                // 최저시급 적용 중인 근무자(시급 미설정 또는 이전 최저시급과 동일) 중 계약 완료자만
                const affectedEmps = employees.filter(emp => {
                    const usesMinWage = !emp.wage || Number(emp.wage) === 0 || Number(emp.wage) === Number(oldVal);
                    return usesMinWage && emp.contractStatus === 'completed';
                });
                if (affectedEmps.length === 0) return;

                // 사장 측 카드 표시 (메모리)
                setPendingContractUpdateEmpIds(new Set(affectedEmps.map(e => e.id)));

                // 직원 측에도 동일한 신호 전달 — 글로벌 템플릿 유무와 무관하게 contractUpdateRequired=true 저장.
                // 글로벌 템플릿이 있어 모달이 떠도, 사장이 그 모달을 닫으면 직원의 시급은 이미 바뀐 채로
                // 계약서가 미수정 상태가 되므로 직원 측 안내·입력 차단이 필요함.
                // 사장이 모달을 정상 저장하거나 개별 작성요청을 보내면 두 모달의 handleSave가 이 필드를 클리어함.
                const empsWithUid = affectedEmps.filter(emp => emp.empUid);
                if (currentWorkspaceId && empsWithUid.length > 0) {
                    const batch = fbDb.batch();
                    empsWithUid.forEach(emp => {
                        batch.update(
                            fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId),
                            { contractUpdateRequired: true }
                        );
                    });
                    batch.commit().catch(e => {
                        console.error('contractUpdateRequired update failed:', e);
                        showAlert('근로계약서 수정필요 신호 저장 실패: ' + (e?.message || '알 수 없음'), '저장 실패', 'error');
                    });
                    setEmployees(prev => prev.map(e =>
                        empsWithUid.some(a => a.id === e.id) ? { ...e, contractUpdateRequired: true } : e
                    ));
                }

                // 글로벌 템플릿이 있는 경우: 일괄 재작성 요청 모달 표시 (저장 시 contractUpdateRequired 자동 클리어)
                if (workspaceInfo?.contractTemplate) {
                    setMinWageTemplateAfterSave({ affectedEmps });
                }
            };

            const handleAddClick = () => {
                if (globalMinWage === '' || Number(globalMinWage) <= 0) {
                    showAlert('현재 최저시급을 먼저 입력해주세요.\n최저시급이 설정되어야 근무자를 추가할 수 있습니다.', '안내');
                    return;
                }
                setEditingEmp(null);
                setIsModalOpen(true);
            };

            const handleSave = (empData) => {
                const { displayId, ...dataToSave } = empData;

                if (editingEmp) {
                    const oldStatus = editingEmp.status || (editingEmp.isWorking === false ? 'resigned' : 'working');
                    const newStatus = dataToSave.status;

                    // 시급 변경 감지: 계약서가 완료됐거나 재작성 대기 중인 근무자의 시급이 바뀌면 재작성 필요
                    const oldWage = Number(editingEmp.wage) || Number(globalMinWage);
                    const newWage = Number(dataToSave.wage) || Number(globalMinWage);
                    const wageChanged = oldWage !== newWage;
                    const resolvedWage = (dataToSave.wage && Number(dataToSave.wage) > 0)
                        ? dataToSave.wage
                        : (Number(globalMinWage) > 0 ? Number(globalMinWage) : '');
                    let finalData = { ...dataToSave, wage: resolvedWage };
                    if (wageChanged && (editingEmp.contractStatus === 'completed' || editingEmp.contractStatus === 'needs_resign' || editingEmp.contractStatus === 'pending_boss')) {
                        const hadPersonalWage = editingEmp.wage && Number(editingEmp.wage) > 0;
                        const hasPersonalWage = dataToSave.wage && Number(dataToSave.wage) > 0;
                        if (hasPersonalWage) {
                            // 개별 시급 → 개별 시급 변경: 개인 근로계약서 템플릿 편집 팝업 열기
                            // setEmployees는 팝업 저장 시점에만 호출 (앱 재시작 시 시급 원복 보장)
                            setPersonalTemplateReason('wage_change');
                            setPersonalTemplateTarget(finalData);
                            setIsModalOpen(false);
                            setEditingEmp(null);
                            // early return 전에 wageBelowMin + 이름 변경 즉시 반영
                            if (dataToSave.empUid && currentWorkspaceId) {
                                const isLow = Number(finalData.wage) > 0 && Number(finalData.wage) < Number(globalMinWage);
                                const wpUpdate = { wageBelowMin: isLow ? true : firebase.firestore.FieldValue.delete() };
                                if (editingEmp.name !== dataToSave.name) wpUpdate.name = dataToSave.name;
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update(wpUpdate)
                                    .catch(() => {});
                            }
                            return;
                        } else if (hadPersonalWage && !hasPersonalWage) {
                            // 개별 시급 → 공란(최저시급) 전환: pendingRewrite + needs_resign으로 재작성 요청
                            finalData = { ...finalData, contractStatus: 'needs_resign', pendingRewrite: true };
                            if (dataToSave.empUid && currentWorkspaceId) {
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ contractStatus: 'needs_resign', pendingRewrite: true })
                                    .catch(() => {});
                            }
                            showAlert('시급이 최저시급으로 변경되었습니다.\n근무자에게 계약서 재작성이 요청됩니다.', '변경 완료', 'success');
                        } else if (workspaceInfo?.contractTemplate) {
                            // 최저시급 근무자: pendingRewrite + needs_resign으로 재작성 요청 (글로벌 템플릿 수정 안내)
                            finalData = { ...finalData, contractStatus: 'needs_resign', pendingRewrite: true };
                            showAlert('시급이 변경되었습니다.\n\n근로계약서 템플릿에 기재된 시급 항목을 새 시급으로 수정해야 근무자에게 계약서 재작성이 요청됩니다.\n\n확인을 누르면 템플릿 수정 화면으로 이동합니다.', '계약서 재작성 필요', 'alert', () => setActiveTab('settings'));
                            if (dataToSave.empUid && currentWorkspaceId) {
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ contractStatus: 'needs_resign', pendingRewrite: true })
                                    .catch(() => {});
                            }
                        }
                    }

                    setEmployees(prev => prev.map(e => e.id === finalData.id ? finalData : e));

                    // 시급 변경 시 Google 직원에게 알림 발송 + wageBelowMin 플래그 업데이트
                    if (wageChanged && dataToSave.empUid) {
                        sendWageChangeNotification(
                            dataToSave.empUid,
                            currentWorkspaceId,
                            Number(editingEmp.wage) || Number(globalMinWage),
                            Number(finalData.wage) || Number(globalMinWage)
                        ).catch(() => {});
                    }
                    if (dataToSave.empUid && currentWorkspaceId) {
                        const isLow = finalData.wage && Number(finalData.wage) > 0 && Number(finalData.wage) < Number(globalMinWage);
                        fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ wageBelowMin: isLow ? true : firebase.firestore.FieldValue.delete() })
                            .catch(() => {});
                    }

                    if (oldStatus !== newStatus) {
                        // Google 직원이면 workplaces 서브컬렉션 workStatus 업데이트 + 알림
                        const empUid = dataToSave.empUid;
                        if (empUid && currentWorkspaceId) {
                            fbDb.collection('employeeAccounts').doc(empUid)
                                .collection('workplaces').doc(currentWorkspaceId)
                                .update({ workStatus: newStatus })
                                .catch(() => {});
                            sendStatusChangeNotification(empUid, currentWorkspaceId, newStatus).catch(() => {});
                        }

                        if (oldStatus === 'working' && newStatus === 'leave') {
                            showAlert(`${dataToSave.name}님이 휴직 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                        } else if (oldStatus !== 'resigned' && newStatus === 'resigned') {
                            showAlert(`${dataToSave.name}님이 퇴사 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                        } else if ((oldStatus === 'leave' || oldStatus === 'resigned') && newStatus === 'working') {
                            showAlert(`${dataToSave.name}님이 근무 중 상태로 변경되었습니다.\n월별 근무시간 입력에 포함됩니다.`, '변경 완료', 'success');
                        }
                    }
                } else {
                    const newEmpWage = (dataToSave.wage && Number(dataToSave.wage) > 0)
                        ? dataToSave.wage
                        : (Number(globalMinWage) > 0 ? Number(globalMinWage) : '');
                    setEmployees(prev => [...prev, { ...dataToSave, wage: newEmpWage }]);
                    setNextEmpId(prev => prev + 1);
                }
                // 이름 변경 시 직원 workplaces에도 반영 (달력/급여는 employees 배열에서 최신 이름 자동 표시)
                if (editingEmp && editingEmp.name !== dataToSave.name) {
                    if (editingEmp.empUid && currentWorkspaceId) {
                        fbDb.collection('employeeAccounts').doc(editingEmp.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ name: dataToSave.name })
                            .catch(() => {});
                    }
                }

                setIsModalOpen(false);
                setEditingEmp(null);
            };

            const handleDelete = (emp) => {
                showConfirm('정말 이 근무자를 삭제하시겠습니까?\n(기존 근무 기록은 월별 현황에 유지됩니다)\n같은 Google 계정으로 재가입 시 기록이 자동 연동됩니다.', () => {
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, status: 'deleted' } : e));
                    // Google 직원이면 workplaces workStatus를 'deleted'로 업데이트 + 알림
                    if (emp.empUid && currentWorkspaceId) {
                        fbDb.collection('employeeAccounts').doc(emp.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ workStatus: 'deleted' })
                            .catch(e => console.error('삭제 상태 업데이트 실패:', e));
                        sendStatusChangeNotification(emp.empUid, currentWorkspaceId, 'deleted').catch(() => {});
                    }
                }, '근무자 삭제');
            };

            const handleViewContract = async (emp) => {
                if (!emp.empUid) return;
                try {
                    const doc = await fbDb.collection('employeeAccounts').doc(emp.empUid)
                        .collection('workplaces').doc(currentWorkspaceId || firebaseUser.uid).get();
                    const data = doc.data();
                    const contract = data?.contract || null;
                    if (contract) {
                        // Firestore 필드가 undefined일 경우(삭제 직후 캐시 불일치 등) emp 상태값으로 폴백
                        const freshDeleteReq = data?.contractDeleteRequest !== undefined
                            ? (data.contractDeleteRequest || null)
                            : (emp.contractDeleteRequest || null);
                        setModalDeleteReq(freshDeleteReq);
                        setEmployees(prev => prev.map(e => e.empUid === emp.empUid ? { ...e, contractDeleteRequest: freshDeleteReq } : e));
                        setViewingContract({ contract, empUid: emp.empUid, emp });
                    } else showAlert('저장된 근로계약서가 없습니다.', '안내', 'info');
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleDeleteContract = (emp) => {
                if (!emp.empUid) return;
                showConfirm('근로계약서를 재작성하시겠습니까?', async () => {
                    try {
                        const bossUid = currentWorkspaceId || firebaseUser.uid;
                        const result = await requestContractDelete(emp.empUid, bossUid, 'boss');
                        if (result === 'deleted') {
                            setModalDeleteReq(null);
                            setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractStatus: 'needs_resign', contract: null, contractDeleteRequest: null } : e));
                            showAlert('근로계약서가 삭제되었습니다.\n근무자가 재작성해야 합니다.', '삭제 완료', 'success');
                        } else {
                            setModalDeleteReq('boss');
                            setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: 'boss' } : e));
                            showAlert('재작성 요청을 보냈습니다.\n근무자가 동의하면 삭제됩니다.', '요청 완료', 'success');
                        }
                    } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 재작성');
            };

            const handleCancelDeleteContract = async (emp) => {
                if (!emp.empUid) return;
                try {
                    const bossUid = currentWorkspaceId || firebaseUser.uid;
                    await cancelContractDeleteRequest(emp.empUid, bossUid, 'boss');
                    setModalDeleteReq(null);
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: null } : e));
                    showAlert('재작성 요청이 취소되었습니다.', '취소 완료', 'success');
                } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
            };

            const handleAgreeEmpDeleteRequest = async (emp) => {
                if (!emp.empUid) return;
                try {
                    const bossUid = currentWorkspaceId || firebaseUser.uid;
                    await cancelContractDeleteRequest(emp.empUid, bossUid, 'boss');
                    setModalDeleteReq(null);
                    setViewingContract(null);
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: null } : e));
                    setPersonalTemplateTarget(emp);
                    setPersonalTemplateReason('rewrite_request');
                } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
            };

            const handleBossSign = async (emp) => {
                if (!emp.empUid) return;
                showConfirm(`${emp.name}님의 근로계약서에 서명 완료 처리하시겠습니까?\n서명 후 근무자 기능이 정상화됩니다.`, async () => {
                    try {
                        await bossCompleteContract(currentWorkspaceId || firebaseUser.uid, emp.empUid);
                        setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractStatus: 'completed', contractDeleteRequest: null, pendingRewrite: false } : e));
                        setPendingContractUpdateEmpIds(prev => {
                            if (!prev.has(emp.id)) return prev;
                            const next = new Set(prev);
                            next.delete(emp.id);
                            return next;
                        });
                        showAlert('서명이 완료되었습니다.\n근무자의 앱 사용제한이 해제되었습니다.', '서명 완료', 'success');
                    } catch(e) { showAlert('서명 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 서명');
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <div className="relative w-full sm:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Search className="h-5 w-5 text-gray-400" />
                                </div>
                                <input

                                                <span className="font-medium text-gray-700">소정근로:</span>{' '}
                                                {(emp.scheduledDays && emp.dailyHours)

                                        {emp.empUid && (
                                            <div className="flex gap-2 mb-3 flex-wrap">

                                                    <button onClick={() => handleViewContract(emp)}
                                                        className={`flex-1 text-xs py-1.5 rounded-lg font-bold transition ${
                                                            emp.contractDeleteRequest === 'employee'
                                                                ? 'bg-orange-50 text-orange-700 border border-orange-300 hover:bg-orange-100'

                                                                ? 'bg-yellow-50 text-yellow-700 border border-yellow-300 hover:bg-yellow-100'

                                                        }`}>
                                                        {emp.contractDeleteRequest === 'employee' ? '재작성 확인' : emp.contractDeleteRequest === 'boss' ? '재작성 요청 대기중' : '근로계약서 열람'}
                                                    </button>

                                                    <button onClick={() => { setPersonalTemplateReason('new_contract'); setPersonalTemplateTarget(emp); }}
                                                        className="w-full text-xs py-1.5 rounded-lg font-bold transition bg-blue-50 text-blue-700 border border-blue-200 hover:bg-blue-100">

                                            <div className="grid grid-cols-3 gap-2 text-xs text-gray-500 text-center mb-2">
                                                <div>
                                                    <div className="font-semibold text-gray-800">{stats.totalDays}일</div>
                                                    <div>총 근무일</div>
                                                </div>
                                                <div>
                                                    <div className="font-semibold text-gray-800">{fmtHours(stats.totalHours) || '0시간'}</div>
                                                    <div>총 근무시간</div>
                                                </div>
                                                <div>
                                                    <div className="font-semibold text-green-600">{formatCurrency(stats.totalPay)}</div>
                                                    <div>총 급여</div>
                                                </div>
                                            </div>
                                            {stats.totalHolidayPay > 0 && (
                                                <div className="grid grid-cols-2 gap-2 text-xs text-center border-t border-gray-200 pt-2 mt-1">
                                                    <div>
                                                        <div className="font-semibold text-blue-600">{formatCurrency(stats.totalHolidayPay)}</div>
                                                        <div className="text-gray-500">주휴수당</div>

                                                        <div className="font-semibold text-purple-600">{formatCurrency(stats.totalPay + stats.totalHolidayPay)}</div>

                    {isModalOpen && (
                        <EmployeeModal
                            employee={editingEmp}
                            onClose={() => setIsModalOpen(false)}
                            onSave={handleSave}
                            nextId={nextEmpId}
                            globalMinWage={globalMinWage}

                    )}
                    {viewingContract && (
                        <ContractViewModal
                            contract={viewingContract.contract}
                            onClose={() => setViewingContract(null)}
                            viewerRole="boss"
                            bossCanSign={viewingContract?.emp?.contractStatus === 'pending_boss' && !(viewingContract?.emp?.wage && Number(viewingContract?.emp?.wage) > 0 && Number(viewingContract?.emp?.wage) < Number(globalMinWage))}
                            onSign={async () => {
                                const emp = viewingContract.emp;
                                await bossCompleteContract(currentWorkspaceId || firebaseUser.uid, emp.empUid);
                                setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractStatus: 'completed', contractDeleteRequest: null, pendingRewrite: false } : e));
                                setPendingContractUpdateEmpIds(prev => {

                                    next.delete(emp.id);
                                    return next;

                                showAlert('서명이 완료되었습니다.\n근무자의 앱 사용제한이 해제되었습니다.', '서명 완료', 'success');

                                    setPersonalTemplateReason('boss_rewrite');
                                    setPersonalTemplateTarget(emp);
                                } else if (modalDeleteReq === 'employee') {
                                    // 근무자 요청에 동의: contractDeleteRequest 삭제 후 템플릿 편집창 오픈
                                    handleAgreeEmpDeleteRequest(viewingContract.emp);

                    {personalTemplateTarget && (
                        <PersonalContractTemplateModal

                            setEmployees={setEmployees}
                            showAlert={showAlert}
                            reason={personalTemplateReason}
                            onSaveComplete={() => setPersonalTemplateTarget(null)}
                            onClose={() => {
                                // 근무자 재작성 요청에 동의 후 취소(X)한 경우 → contractDeleteRequest 복원
                                if (personalTemplateReason === 'rewrite_request' && personalTemplateTarget?.empUid) {
                                    const bossUid = currentWorkspaceId || firebaseUser.uid;
                                    const emp = personalTemplateTarget;
                                    fbDb.collection('employeeAccounts').doc(emp.empUid)
                                        .collection('workplaces').doc(bossUid)
                                        .update({ contractDeleteRequest: 'employee' })
                                        .catch(() => {});
                                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: 'employee' } : e));

                                setPersonalTemplateTarget(null);

                    )}
                    {minWageModalOpen && (
                        <MinWageChangeModal
                            currentMinWage={globalMinWage}

                            onSave={handleMinWageSave}
                        />
                    )}
                    {minWageTemplateAfterSave && (
                        <MinWageContractTemplateModal
                            globalTemplate={workspaceInfo?.contractTemplate}
                            workspaceId={currentWorkspaceId}
                            firebaseUser={firebaseUser}
                            setEmployees={setEmployees}
                            setWorkspaceInfo={setWorkspaceInfo}
                            showAlert={showAlert}
                            affectedEmps={minWageTemplateAfterSave.affectedEmps}
                            onClose={() => setMinWageTemplateAfterSave(null)}
                            onSaveComplete={() => {
                                setPendingContractUpdateEmpIds(new Set());
                                setMinWageTemplateAfterSave(null);
                            }}

                    )}
                    {bulkDispatchOpen && (
                        <BulkContractDispatchModal
                            targets={employees.filter(emp => emp.empUid && emp.status !== 'resigned' && emp.status !== 'leave' && (pendingContractUpdateEmpIds.has(emp.id) || emp.contractUpdateRequired || (!emp.contractStatus || emp.contractStatus === null)))}
                            globalTemplate={workspaceInfo?.contractTemplate}
                            workspaceId={currentWorkspaceId}
                            firebaseUser={firebaseUser}
                            setEmployees={setEmployees}
                            setWorkspaceInfo={setWorkspaceInfo}
                            setPendingContractUpdateEmpIds={setPendingContractUpdateEmpIds}
                            showAlert={showAlert}
                            onClose={() => setBulkDispatchOpen(false)}
                        />
                    )}
                </div>
            );
        }

        // ─── 근로계약서 일괄 발송 모달 (수정필요 상태 근무자 대상) ───
        function BulkContractDispatchModal({ targets, globalTemplate, workspaceId, firebaseUser, setEmployees, setWorkspaceInfo, setPendingContractUpdateEmpIds, showAlert, onClose }) {
            const [step, setStep] = useState('select'); // 'select' | 'edit'
            const [confirmingSave, setConfirmingSave] = useState(false);
            const [selected, setSelected] = useState(new Set(targets.map(t => t.id)));

            const [title, setTitle] = useState(globalTemplate?.title || '근로계약서');
            const [sections, setSections] = useState(
                globalTemplate?.sections?.length >= 1
                    ? globalTemplate.sections.map(s => ({ ...s }))
                    : [{ content: '', instruction: '' }]
            );
            const [ownerInfo, setOwnerInfo] = useState(
                globalTemplate?.ownerInfo
                    ? { ...globalTemplate.ownerInfo }
                    : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }
            );
            const [saving, setSaving] = useState(false);

            const toggleSelected = (id) => {
                setSelected(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const addSection = () => setSections(prev => [...prev, { content: '', instruction: '' }]);
            const removeSection = (i) => { if (sections.length <= 1) return; setSections(prev => prev.filter((_, j) => j !== i)); };
            const updateSection = (i, key, val) => setSections(prev => prev.map((s, j) => j === i ? { ...s, [key]: val } : s));

            const validateAndConfirm = () => {
                if (selected.size === 0) { showAlert('발송할 근무자를 선택해주세요.', '안내', 'info'); return; }
                if (!title.trim()) { showAlert('제목을 입력해주세요.', '입력 오류', 'alert'); return; }
                if (sections.some(s => !s.content.trim())) { showAlert('모든 내용칸을 입력해주세요.', '입력 오류', 'alert'); return; }
                const fallbackSig = globalTemplate?.ownerInfo?.signatureData || '';
                if (!ownerInfo.signatureData && !fallbackSig) {
                    showAlert('서명이 필요합니다.', '입력 오류', 'alert');
                    return;
                }
                setConfirmingSave(true);
            };

            const handleSend = async (saveTemplate) => {
                setSaving(true);
                try {
                    const finalOwnerInfo = ownerInfo.signatureData
                        ? ownerInfo
                        : { ...ownerInfo, signatureData: globalTemplate?.ownerInfo?.signatureData || '' };
                    const template = { title: title.trim(), sections, ownerInfo: finalOwnerInfo };
                    const bossUid = workspaceId || firebaseUser.uid;

                    if (saveTemplate) {
                        await saveContractTemplate(bossUid, template);
                        if (setWorkspaceInfo) {
                            setWorkspaceInfo(prev => ({ ...prev, contractTemplate: template }));
                        }
                    }

                    const selectedTargets = targets.filter(t => selected.has(t.id));
                    const empsToSend = selectedTargets.filter(emp => emp.empUid);
                    if (empsToSend.length === 0) {
                        showAlert('연동된 계정이 있는 근무자가 없습니다.', '안내', 'info');
                        setSaving(false);
                        setConfirmingSave(false);
                        return;
                    }
                    const batch = fbDb.batch();
                    empsToSend.forEach(emp => {
                        batch.update(
                            fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(bossUid),
                            {
                                contractTemplate: template,
                                contractStatus: 'needs_resign',
                                pendingRewrite: true,
                                contractDeleteRequest: firebase.firestore.FieldValue.delete(),
                                contractUpdateRequired: firebase.firestore.FieldValue.delete()
                            }
                        );
                    });
                    await batch.commit();

                    setEmployees(prev => prev.map(e =>
                        empsToSend.some(a => a.id === e.id)
                            ? { ...e, contractStatus: 'needs_resign', pendingRewrite: true, contractDeleteRequest: null, contractUpdateRequired: false }
                            : e
                    ));
                    if (setPendingContractUpdateEmpIds) {
                        setPendingContractUpdateEmpIds(prev => {
                            const next = new Set(prev);
                            empsToSend.forEach(emp => next.delete(emp.id));
                            return next;
                        });
                    }

                    const names = empsToSend.map(e => e.name).join(', ');
                    showAlert(`${names}님(${empsToSend.length}명)에게 근로계약서가 발송되었습니다.${saveTemplate ? '\n근로계약서 템플릿도 업데이트되었습니다.' : ''}`, '발송 완료', 'success');
                    onClose();
                } catch(e) {
                    showAlert('발송 실패: ' + e.message, '오류', 'error');
                }
                setSaving(false);
                setConfirmingSave(false);
            };

            if (step === 'select') {
                return (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4">
                        <div className="bg-white rounded-2xl w-full max-w-md my-4">
                            <div className="flex items-center justify-between p-5 border-b border-gray-100">
                                <h2 className="text-base font-bold text-gray-800">근로계약서 일괄 발송 — 대상 선택</h2>
                                <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition"><X className="w-5 h-5" /></button>
                            </div>
                            <div className="p-5 space-y-3 max-h-[60vh] overflow-y-auto">
                                <p className="text-xs text-gray-500 mb-2">근로계약서 발송 대상 근무자 {targets.length}명</p>
                                <div className="space-y-2">
                                    {targets.map(emp => (
                                        <label key={emp.id} className="flex items-center gap-3 p-3 rounded-xl border border-gray-200 hover:bg-gray-50 cursor-pointer">
                                            <input
                                                type="checkbox"
                                                checked={selected.has(emp.id)}
                                                onChange={() => toggleSelected(emp.id)}
                                                className="w-5 h-5 cursor-pointer"
                                            />
                                            <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2 py-1 rounded-md">No. {emp.displayId}</span>
                                            <span className="text-sm font-bold text-gray-800">{emp.name}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-gray-100 flex gap-2">
                                <button onClick={onClose} className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition text-sm">취소</button>
                                <button
                                    onClick={() => {
                                        if (selected.size === 0) { showAlert('근무자를 선택해주세요.', '안내', 'info'); return; }
                                        setStep('edit');
                                    }}
                                    className="flex-1 bg-orange-600 text-white py-2.5 rounded-xl font-bold hover:bg-orange-700 transition text-sm">
                                    다음
                                </button>
                            </div>

                    showAlert(`입력한 시급(${w.toLocaleString()}원)이 최저시급(${min.toLocaleString()}원)보다 낮습니다.`, '시급 경고', 'alert');

                                )}
                                {/* 새 메모 작성 폼 */}
                                {formData._newMemo ? (
                                    <div className="border border-green-200 rounded-lg p-3 bg-green-50/50 space-y-2">
                                        {formData._newMemo.contents.map((c, i) => (
                                            <textarea key={i} value={c} onChange={e => { const newContents = [...formData._newMemo.contents]; newContents[i] = e.target.value; setFormData(prev => ({ ...prev, _newMemo: { ...prev._newMemo, contents: newContents } })); }} rows="2" placeholder="내용" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none" />
                                        ))}
                                        <div className="flex gap-2">
                                            <button type="button" onClick={() => setFormData(prev => ({ ...prev, _newMemo: { ...prev._newMemo, contents: [...prev._newMemo.contents, ''] } }))} className="text-xs text-blue-600 hover:text-blue-800 font-medium">+ 내용 추가</button>
                                        </div>
                                        <div className="flex gap-2 pt-1">
                                            <button type="button" onClick={() => {
                                                const validContents = formData._newMemo.contents.filter(c => c.trim());
                                                if (validContents.length === 0) return;
                                                setFormData(prev => ({ ...prev, memos: [...(prev.memos || []), ...validContents], _newMemo: null }));
                                            }} className="flex-1 bg-green-600 text-white text-xs py-2 rounded-lg hover:bg-green-700 font-medium">저장</button>
                                            <button type="button" onClick={() => setFormData(prev => ({ ...prev, _newMemo: null }))} className="flex-1 bg-gray-200 text-gray-600 text-xs py-2 rounded-lg hover:bg-gray-300 font-medium">취소</button>
                                        </div>
                                    </div>
                                ) : (
                                    <button type="button" onClick={() => setFormData(prev => ({ ...prev, _newMemo: { contents: [''] } }))} className="w-full border-2 border-dashed border-gray-300 rounded-lg py-2 text-sm text-gray-500 hover:border-green-400 hover:text-green-600 transition">+ 메모 추가</button>
                                )}
                            </div>

                            <div className="mt-4 bg-gray-50 p-4 rounded-xl border border-gray-200">
                                <label className="block text-sm font-bold text-gray-800 mb-3">근무 상태</label>
                                <div className="flex items-center gap-5">
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="working" checked={formData.status === 'working'} onChange={handleChange} className="w-4 h-4 text-green-600 focus:ring-green-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">근무 중</span>
                                    </label>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="leave" checked={formData.status === 'leave'} onChange={handleChange} className="w-4 h-4 text-yellow-600 focus:ring-yellow-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">휴직</span>
                                    </label>
                                    <label className="flex items-center cursor-pointer">
                                        <input type="radio" name="status" value="resigned" checked={formData.status === 'resigned'} onChange={handleChange} className="w-4 h-4 text-red-600 focus:ring-red-500" />
                                        <span className="ml-1.5 text-sm font-medium text-gray-700">퇴사</span>
                                    </label>
                                </div>
                                {formData.status === 'resigned' && (
                                    <div className="mt-4 border-t border-gray-200 pt-3">
                                        <label className="block text-sm font-medium text-gray-700 mb-1">퇴사일</label>
                                        <input type="date" name="resignDate" value={formData.resignDate || ''} onChange={handleChange} className="w-full border border-red-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-400 outline-none bg-white transition-shadow" />
                                    </div>
                                )}
                                <p className="text-xs text-gray-500 mt-3">* 휴직 및 퇴사 상태일 경우 월별 현황 입력에서 제외됩니다.</p>
                            </div>
                        </form>
                        
                        <div className="p-4 border-t bg-white flex gap-3 shrink-0">
                            <button type="button" onClick={onClose} className="flex-1 bg-gray-100 text-gray-700 py-3 rounded-xl hover:bg-gray-200 transition font-medium">취소</button>
                            <button type="submit" form="empForm" className="flex-1 bg-green-600 text-white py-3 rounded-xl hover:bg-green-700 transition font-medium shadow-sm">저장</button>
                        </div>
                    </div>
                </div>
            );
        }

        function TabCalendar({ employees, monthlyData, setMonthlyData, showConfirm, unseenDates, onMarkSeen, globalMinWage, workspaceId, onImmediateSaveMonthly, pendingContractUpdateEmpIds }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = monthlyData[monthKey] || { days: {} };
            const activeEmployees = employees.filter(e => {
                const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
                const cStatus = e.contractStatus || null;
                const isLow = e.wage && Number(e.wage) > 0 && Number(e.wage) < Number(globalMinWage);
                const needsContractUpdate = (pendingContractUpdateEmpIds && pendingContractUpdateEmpIds.has(e.id)) || !!e.contractUpdateRequired;
                return statusVal === 'working' && cStatus !== 'needs_resign' && cStatus !== 'pending_boss' && !needsContractUpdate;
            }).sort((a,b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const touchStartX = useRef(null);
            const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null || isBulkInputOpen || editDayModal) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }
                touchStartX.current = null;
            };

            const handleTotalRevenueChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                setMonthlyData(prev => ({
                    ...prev,
                    [monthKey]: {
                        ...(prev[monthKey] || { days: {} }),
                        totalRevenue: val
                    }
                }));
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}년 ${month}월 ${dayToDel}일의 정보를 정말 삭제하시겠습니까?`, () => {
                    // 삭제 전 해당 날짜의 entries에서 empUid 수집 (submissions 삭제 + 알림용)
                    const dayEntries = monthlyData[monthKey]?.days?.[dayToDel]?.entries || {};
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayToDel).padStart(2,'0')}`;
                    // 직원들에게 삭제 알림 발송
                    Object.values(dayEntries).forEach(entry => {
                        const empUid = entry.empUid;
                        if (empUid && entry.hours > 0) {
                            sendChangeNotification(empUid, {
                                type: 'hours_deleted',
                                date: dateStr,
                                oldHours: entry.hours,
                                bossUid: workspaceId || null
                            }).catch(() => {});
                        }
                    });
                    setMonthlyData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey] && newData[monthKey].days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    // submissions 컬렉션에서도 해당 날짜 데이터 삭제
                    if (workspaceId) {
                        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayToDel).padStart(2,'0')}`;
                        Object.values(dayEntries).forEach(entry => {
                            const empUid = entry.empUid;
                            if (empUid) {
                                fbDb.collection('workspaces').doc(workspaceId)
                                    .collection('submissions').doc(`${empUid}_${dateStr}`)
                                    .delete().catch(() => {});
                            }
                        });
                        // empUid 없는 경우도 커버: 날짜 기준 쿼리 삭제
                        fbDb.collection('workspaces').doc(workspaceId)
                            .collection('submissions')
                            .where('date', '==', dateStr)
                            .get().then(snap => {
                                if (snap.empty) return;
                                const batch = fbDb.batch();
                                snap.forEach(doc => batch.delete(doc.ref));
                                return batch.commit();
                            }).catch(() => {});
                    }
                    setEditDayModal(null); // 삭제 후 모달 닫기
                }, "데이터 삭제");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            let totalMonthPay = 0;
            let sumOfDailyRevenue = 0;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                const dayData = currentMonthData.days[d] || {};
                sumOfDailyRevenue += (dayData.revenue || 0);
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;

            const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
            const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
            const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector
                                    year={year}
                                    month={month}
                                    onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                                />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setIsBulkInputOpen(true)}
                                className="bg-gray-800 text-white px-3 md:px-4 py-2.5 rounded-xl hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap font-medium"
                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">이번달 근무시간 일괄 입력</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-xl px-4 py-2.5 shadow-sm text-sm">
                                <label className="font-medium text-gray-700 whitespace-nowrap">이번달 총매출:</label>
                                <input
                                    type="number"
                                    value={currentMonthData.totalRevenue ?? ''}
                                    onChange={handleTotalRevenueChange}
                                    placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                                    className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0 font-bold"
                                />
                                <span className="text-gray-500 font-medium whitespace-nowrap">원</span>
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                순수 급여: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                주휴수당: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                총 급여: {formatCurrency(totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`empty-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {}, revenue: 0 };
                                let dailyTotalPay = 0;
                                const activeEntries = [];

                                Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                                    if (entry.hours > 0) {
                                        dailyTotalPay += entry.pay;
                                        const currentEmp = employees.find(e => String(e.id) === String(empId));
                                        activeEntries.push(currentEmp ? { ...entry, name: currentEmp.name } : entry);
                                    }
                                });

                                const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;
                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];
                                const dateStr = `${year}-${month.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                                const hasUnseen = unseenDates?.has(dateStr);
                                const handleOpenDay = () => { setEditDayModal(day); onMarkSeen?.(dateStr); };

                                return (
                                    <div key={`day-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={handleOpenDay}>
                                        <div className="flex justify-between items-start mb-1">
                                            <div className="relative flex items-center">
                                                <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                    {day}
                                                </span>
                                                {hasUnseen && <span className="absolute -top-0.5 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>}
                                            </div>
                                            {/* PC에서만 마우스 올렸을 때 보이게 처리 */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={handleOpenDay} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">수정</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="삭제">
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        </div>

                                        {/* 모바일 뷰 */}
                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}명 근무</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}만원</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="주휴수당 발생"></div>}
                                        </div>

                                        {/* PC 뷰 */}
                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                                            </div>

                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">인건비: {formatCurrency(dailyTotalPay)}</div>
                                                    <div className="text-xs text-gray-500 mt-0.5">매출: {formatCurrency(dayData.revenue || 0)}</div>
                                                    {dayData.revenue > 0 && <div className="text-[10px] font-medium text-gray-400 mt-0.5">비율: {dailyRatio}%</div>}
                                                </div>
                                            )}

                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 발생</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setIsBulkInputOpen(false)}
                            globalMinWage={globalMinWage}
                        />
                    )}

                    {editDayModal && (() => {
                        const editDateStr = `${year}-${month.toString().padStart(2, '0')}-${editDayModal.toString().padStart(2, '0')}`;
                        const editDate = new Date(year, month - 1, editDayModal);
                        const isSunday = editDate.getDay() === 0;
                        const editHolidayEntries = isSunday ? (holidayPayBySunday[editDateStr] || []) : [];
                        return (
                            <DailyEditModal
                                year={year} month={month} day={editDayModal} monthKey={monthKey}
                                activeEmployees={activeEmployees} allEmployees={employees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                                onClose={() => setEditDayModal(null)}
                                onDelete={() => handleDeleteDay(editDayModal)}
                                workspaceId={workspaceId}
                                holidayEntries={editHolidayEntries}
                                globalMinWage={globalMinWage}
                            />
                        );
                    })()}

                    <div className="flex justify-end mt-4">
                        <button
                            onClick={() => {
                                showConfirm(`${year}년 ${month}월 정보를 정말 초기화하시겠습니까?`, () => {
                                    // 해당 월의 모든 직원에게 삭제 알림 발송
                                    const monthDays = monthlyData[monthKey]?.days || {};
                                    Object.entries(monthDays).forEach(([d, dayData]) => {
                                        Object.values(dayData.entries || {}).forEach(entry => {
                                            if (entry.empUid && entry.hours > 0) {
                                                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                                sendChangeNotification(entry.empUid, {
                                                    type: 'hours_deleted',
                                                    date: dateStr,
                                                    oldHours: entry.hours,
                                                    bossUid: workspaceId || null
                                                }).catch(() => {});
                                            }
                                        });
                                    });
                                    const newData = { ...monthlyData };
                                    delete newData[monthKey];
                                    // Firestore 동기화 전 새로고침 시 데이터 복원 방지
                                    if (workspaceId) {
                                        try {
                                            const pKey = 'at_pdel_' + workspaceId;
                                            const list = JSON.parse(localStorage.getItem(pKey) || '[]');
                                            if (!list.includes(monthKey)) localStorage.setItem(pKey, JSON.stringify([...list, monthKey]));
                                        } catch(_) {}
                                    }
                                    setMonthlyData(newData);
                                    onImmediateSaveMonthly?.(newData);
                                    // 새로고침 시 직원 제출 데이터가 복원되는 버그 수정:
                                    // onSnapshot 리스너가 submissions를 재적용하지 않도록 해당 월 데이터 삭제
                                    if (workspaceId) {
                                        const padM = month.toString().padStart(2, '0');
                                        const nextY = month === 12 ? year + 1 : year;
                                        const nextM = (month === 12 ? 1 : month + 1).toString().padStart(2, '0');
                                        fbDb.collection('workspaces').doc(workspaceId)
                                            .collection('submissions')
                                            .where('date', '>=', `${year}-${padM}-01`)
                                            .where('date', '<', `${nextY}-${nextM}-01`)
                                            .get()
                                            .then(snap => {
                                                if (snap.empty) return;
                                                const batch = fbDb.batch();
                                                snap.forEach(doc => batch.delete(doc.ref));
                                                return batch.commit();
                                            })
                                            .catch(() => {});
                                    }
                                }, "초기화 확인");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            이번달 정보 전체 초기화
                        </button>
                    </div>
                </div>
            );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose, globalMinWage }) {
            const hourRefs = useRef({});
            const minRefs = useRef({});
            const wageRefs = useRef({});
            const [localData, setLocalData] = useState({});   // 시간 (정수)
            const [minuteData, setMinuteData] = useState({}); // 분 (0-59)
            const [wageData, setWageData] = useState({});     // 시급

            useEffect(() => {
                const initData = {};
                const initMinData = {};
                const initWageData = {};
                const currentMonthData = monthlyData[monthKey] || { days: {} };
                const minW = Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE;

                for (let d = 1; d <= daysInMonth; d++) {
                    initData[d] = {};
                    initMinData[d] = {};
                    initWageData[d] = {};
                    const dayData = currentMonthData.days[d] || { entries: {} };
                    activeEmployees.forEach(emp => {
                        const existing = dayData.entries[emp.id];
                        const empWage = Number(emp.wage) > 0 ? Number(emp.wage) : minW;
                        initWageData[d][emp.id] = existing?.wage || empWage;
                        if (existing?.hours != null && existing.hours > 0) {
                            const h = Math.floor(existing.hours);
                            const m = Math.round((existing.hours - h) * 60);
                            initData[d][emp.id] = h > 0 ? String(h) : '';
                            initMinData[d][emp.id] = m > 0 ? String(m) : '';
                        } else {
                            initData[d][emp.id] = '';
                            initMinData[d][emp.id] = '';
                        }
                    });
                }
                setLocalData(initData);
                setMinuteData(initMinData);
                setWageData(initWageData);
            }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

            const handleInputChange = (day, empId, val) => {
                setLocalData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const handleMinuteChange = (day, empId, val) => {
                setMinuteData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const handleWageChange = (day, empId, val) => {
                setWageData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const focusHour = (day, empIdx) => {
                const ref = hourRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusMin = (day, empIdx) => {
                const ref = minRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusWage = (day, empIdx) => {
                const ref = wageRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };

            // 시급칸 키보드: ↑↓/Enter만 위아래 이동
            const handleWageKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault();
                    if (day < daysInMonth) focusWage(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusWage(day - 1, empIdx);
                }
            };

            // 시간 입력칸 방향키
            // ↑↓: 같은 직원 이전/다음 날 시간칸 | →/Enter: 같은 날 분칸 | ←: 이전 직원 분칸
            const handleHourKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusHour(day - 1, empIdx);
                } else if (e.key === 'ArrowRight' || e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    focusMin(day, empIdx);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    if (empIdx > 0) focusMin(day, empIdx - 1);
                    else if (day > 1) focusMin(day - 1, last);
                }
            };

            // 분 입력칸 방향키
            // ↑↓: 같은 직원 이전/다음 날 분칸 | →: 다음 직원 시간칸 | ←: 같은 날 시간칸
            // Enter: 다음 날 시간칸 (마지막 날이면 다음 직원 1일 시간칸)
            const handleMinKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusMin(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusMin(day - 1, empIdx);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (empIdx < last) focusHour(day, empIdx + 1);
                    else if (day < daysInMonth) focusHour(day + 1, 0);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    focusHour(day, empIdx);
                } else if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                    else if (empIdx < last) focusHour(1, empIdx + 1);
                }
            };

            const handleSave = () => {
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };

                    for (let d = 1; d <= daysInMonth; d++) {
                        if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };

                        activeEmployees.forEach(emp => {
                            const hStr = localData[d]?.[emp.id];
                            const mStr = minuteData[d]?.[emp.id];
                            const h = hStr === '' || hStr == null ? 0 : parseInt(hStr, 10);
                            const m = mStr === '' || mStr == null ? 0 : parseInt(mStr, 10);
                            const hours = h + m / 60;

                            if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                                const w = Number(wageData[d]?.[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE));
                                newData[monthKey].days[d].entries[emp.id] = {
                                    hours: hours, pay: Math.round(hours * w), name: emp.name, wage: w
                                };
                            }
                        });
                    }
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">{year}년 {month}월 근무시간 일괄 입력</h3>
                                <p className="hidden md:block text-xs text-gray-500 mt-1">시간 Enter → 분칸 이동 | 분 Enter → 다음 날 시간칸 | 방향키로 셀 이동</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5"/></button>
                        </div>

                        <div className="flex-1 overflow-auto p-4 relative">
                            {activeEmployees.length === 0 ? (
                                <div className="h-full flex items-center justify-center text-gray-500">현재 근무 중인 직원이 없습니다.</div>
                            ) : (
                                <table className="border-collapse">
                                    <thead className="sticky top-0 bg-white shadow-sm z-10">
                                        <tr>
