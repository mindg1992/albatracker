                try {
                    await navigator.clipboard.writeText(appUrl);
                    showAlert('링크가 복사되었습니다.\n직원에게 공유해주세요.', '복사 완료', 'success');
                } catch { showAlert('복사에 실패했습니다.', '오류', 'error'); }
            };

            const handleRegenerate = () => {
                showConfirm('초대코드를 새로 발급하면\n기존 코드는 더 이상 사용할 수 없습니다.\n계속하시겠습니까?', async () => {
                    setRegenerating(true);
                    try {
                        const newCode = await regenerateInviteCode(workspaceId || firebaseUser.uid, inviteCode, workspaceInfo?.shopName, firebaseUser?.uid);
                        setWorkspaceInfo(prev => ({ ...prev, inviteCode: newCode }));
                        showAlert(`새 초대코드: ${newCode}`, '코드 재발급 완료', 'success');
                    } catch(e) {
                        showAlert('재발급 실패: ' + e.message, '오류', 'error');
                    }
                    setRegenerating(false);
                }, '초대코드 재발급');
            };

            return (
                <div className="max-w-xl mx-auto space-y-6">
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
                        <h2 className="text-lg font-bold text-gray-800 mb-1">직원 초대 코드</h2>
                        <p className="text-sm text-gray-500 mb-5">직원에게 아래 코드와 앱 링크를 전달해주세요.</p>

                        <div className="bg-blue-50 rounded-xl p-5 text-center mb-4">
                            <p className="text-xs text-blue-500 font-medium mb-2">초대코드</p>
                            <p className="text-4xl font-bold tracking-[0.3em] text-blue-700 mb-3">{inviteCode || '------'}</p>
                            <div className="flex gap-5 justify-center items-center">
                                <button onClick={copyCode} className={`text-sm px-4 py-2 rounded-lg font-medium transition ${copying ? 'bg-green-600 text-white' : 'bg-blue-600 text-white hover:bg-blue-700'}`}>
                                    {copying ? '복사됨 ✓' : '코드 복사'}
                                </button>
                                <button onClick={handleRegenerate} disabled={regenerating} title="코드 재발급" className="text-xs px-2.5 py-2 rounded-lg font-medium bg-white border border-blue-300 text-blue-700 hover:bg-blue-100 transition disabled:opacity-50 flex items-center gap-1">
                                    <svg className="w-3.5 h-3.5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M8 16H3v5"/></svg>
                                    {regenerating ? '발급 중' : '재발급'}
                                </button>
                            </div>
                        </div>

                        <div className="bg-gray-50 border border-gray-200 rounded-xl p-4 mb-2">
                            <h3 className="text-sm font-bold text-gray-800 mb-1">🍎 아이폰(iOS) 유저 사용방법</h3>
                            <p className="text-xs text-gray-600 leading-relaxed mb-3">Safari 브라우저로 아래 앱 링크에 접속한 뒤, 하단 공유 버튼 → "홈 화면에 추가"를 선택하면 앱처럼 사용할 수 있어요.</p>
                            <button onClick={copyLink} className="w-full flex items-center justify-center gap-2 bg-white border border-gray-300 text-gray-700 py-2.5 rounded-xl text-sm font-medium hover:bg-gray-100 transition">
                                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                앱 링크 복사
                            </button>
                        </div>
                        <p className="text-xs text-gray-500 mt-2">Android: 플레이스토어에서 다운로드 가능.</p>
                    </div>

                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h2 className="text-lg font-bold text-gray-800">가입 대기 직원</h2>
                            <span className="text-sm text-gray-500">{pendingEmployees.length}명</span>
                        </div>
                        {pendingEmployees.length === 0 ? (
                            <div className="text-center py-8 text-gray-400">
                                <Users className="w-10 h-10 mx-auto mb-2 opacity-30" />
                                <p className="text-sm">대기 중인 직원이 없습니다</p>
                            </div>
                        ) : (
                            <div className="space-y-3">
                                {pendingEmployees.map(emp => (
                                    <div key={emp.uid} className="flex items-center justify-between bg-yellow-50 border border-yellow-200 rounded-xl p-4">
                                        <div>
                                            <p className="font-bold text-gray-800">{emp.name}</p>
                                            {emp.contractRejected ? (
                                                <p className="text-xs text-orange-600 font-bold">계약서 재제출 대기</p>
                                            ) : emp.hasContract ? (
                                                <p className="text-xs text-purple-600 font-bold">근로계약서 있음</p>
                                            ) : (
                                                <p className="text-xs text-gray-400">가입 신청</p>
                                            )}
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => {
                                                if (emp.hasContract && emp.contract) { setReviewingEmp(emp); }
                                                else { onApprove(emp.uid); }
                                            }} className="bg-green-600 text-white px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-green-700 transition">승인</button>
                                            <button onClick={() => onReject(emp.uid)} className="bg-red-100 text-red-600 px-3 py-1.5 rounded-lg text-sm font-bold hover:bg-red-200 transition">거절</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {reviewingEmp && (
                        <div className="fixed inset-0 bg-black/70 z-[10000] flex items-center justify-center p-4 backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg max-h-[90vh] flex flex-col overflow-hidden">
                                <div className="p-5 border-b flex items-center justify-between shrink-0">
                                    <div>
                                        <h2 className="text-base font-bold text-gray-800">📋 {reviewingEmp.name}님의 근로계약서</h2>
                                        <p className="text-xs text-gray-500 mt-0.5">계약서를 검토한 후 승인하거나 재요청하세요</p>
                                    </div>
                                    <button onClick={() => setReviewingEmp(null)} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition"><X className="w-5 h-5" /></button>
                                </div>
                                <div className="flex-1 overflow-auto p-5 space-y-3">
                                    {reviewingEmp.contract?.title && (
                                        <h3 className="text-center font-bold text-lg text-gray-800 mb-2">{reviewingEmp.contract.title}</h3>
                                    )}
                                    {(reviewingEmp.contract?.sections || []).map((s, i) => (
                                        <div key={i} className="bg-gray-50 rounded-xl p-4">
                                            <p className="text-sm text-gray-700 whitespace-pre-wrap leading-relaxed">{s.content}</p>
                                            {s.answer && (
                                                <div className="mt-2 border-t border-gray-200 pt-2">
                                                    <p className="text-sm font-semibold text-gray-900">{s.answer}</p>
                                                </div>
                                            )}
                                        </div>
                                    ))}
                                    {reviewingEmp.contract?.employeeInfo && (
                                        <div className="bg-green-50 rounded-xl p-4 border border-green-200">
                                            <p className="text-xs font-bold text-green-700 mb-2">근로자</p>
                                            <p className="text-sm text-gray-700">성명: {reviewingEmp.contract.employeeInfo.name}</p>
                                            {reviewingEmp.contract.employeeInfo.address && <p className="text-sm text-gray-700">주소: {reviewingEmp.contract.employeeInfo.address}</p>}
                                            {reviewingEmp.contract.employeeInfo.phone && <p className="text-sm text-gray-700">연락처: {reviewingEmp.contract.employeeInfo.phone}</p>}
                                            {reviewingEmp.contract.employeeInfo.signatureData && (
                                                <img src={reviewingEmp.contract.employeeInfo.signatureData} alt="서명" className="mt-2 h-12 object-contain border border-gray-200 rounded bg-white p-1" />
                                            )}
                                        </div>
                                    )}
                                </div>
                                <div className="p-4 border-t shrink-0 flex gap-3">
                                    <button
                                        onClick={() => { onRejectContract(reviewingEmp.uid); setReviewingEmp(null); }}
                                        className="flex-1 bg-orange-100 text-orange-700 py-3 rounded-xl font-bold hover:bg-orange-200 transition text-sm"
                                    >계약서 재요청</button>
                                    <button
                                        onClick={() => { onApprove(reviewingEmp.uid); setReviewingEmp(null); }}
                                        className="flex-1 bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 transition text-sm"
                                    >최종 승인</button>
                                </div>
                            </div>
                        </div>
                    )}

                    <div className="bg-blue-50 rounded-xl p-4 text-sm text-blue-700 space-y-1">
                        <p className="font-bold">직원 가입 안내</p>
                        <p>① 직원이 앱에 접속</p>
                        <p>② "직원으로 로그인 (Google)" 클릭 → Google 계정으로 로그인</p>
                        <p>③ 초대코드 입력 → 이름·계좌 입력 후 가입 신청</p>
                        <p>④ 관리자가 이 화면에서 승인</p>
                    </div>
                </div>
            );
        }

        function EmployeeApp({ empAccount, onSetEmpAccount, firebaseUser, mySubmissions, notifications, onLogout, onLock, showAlert, showConfirm, modalConfig, onSwitchWorkplace, onDisconnectWorkplace, onAddWorkplace, allWorkplaces, notices = [] }) {
            const [activeTab, setActiveTab] = useState('calendar');
            const [today] = useState(new Date());
            const [year, setYear] = useState(today.getFullYear());
            const [month, setMonth] = useState(today.getMonth() + 1);
            const [myPayslips, setMyPayslips] = useState([]);
            const [payslipBanner, setPayslipBanner] = useState(null); // { year, month, docId }
            const [viewingPayslip, setViewingPayslip] = useState(null);

            // 급여명세서 실시간 로드
            useEffect(() => {
                if (!firebaseUser || !empAccount?.bossUid) return;
                const unsub = fbDb.collection('workspaces').doc(empAccount.bossUid)
                    .collection('payslips')
                    .where('empUid', '==', firebaseUser.uid)
                    .limit(24)
                    .onSnapshot(snap => {
                        const list = [];
                        snap.forEach(d => list.push({ docId: d.id, ...d.data() }));
                        list.sort((a, b) => (b.sentAt?.toMillis?.() || 0) - (a.sentAt?.toMillis?.() || 0));
                        setMyPayslips(list);
                        const unread = list.find(p => !p.read);
                        if (unread) setPayslipBanner({ year: unread.year, month: unread.month, docId: unread.docId, payslip: unread });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, empAccount?.bossUid]);

            const handlePayslipBannerClick = async () => {
                if (!payslipBanner) return;
                setViewingPayslip(payslipBanner.payslip);
                // 읽음 처리
                try {
                    await fbDb.collection('workspaces').doc(empAccount.bossUid)
                        .collection('payslips').doc(payslipBanner.docId).update({ read: true });
                } catch(e) {}
                setPayslipBanner(null);
            };

            const empTouchStartX = useRef(null);
            const handleEmpTouchStart = (e) => { empTouchStartX.current = e.touches[0].clientX; };
            const handleEmpTouchEnd = (e) => {
                if (empTouchStartX.current === null || submitModal || viewModal) return;
                const dx = e.changedTouches[0].clientX - empTouchStartX.current;
                if (Math.abs(dx) > 50) {
                    if (dx < 0) { let m=month+1,y=year; if(m>12){m=1;y++;} setMonth(m);setYear(y); }
                    else        { let m=month-1,y=year; if(m<1){m=12;y--;} setMonth(m);setYear(y); }
                }
                empTouchStartX.current = null;
            };
            const [submitModal, setSubmitModal] = useState(null);
            const [viewModal, setViewModal] = useState(null); // 제출된 날 열람 { date, sub }
            const [timeUnit, setTimeUnit] = useState('hour');
            const [noticePopupQueue, setNoticePopupQueue] = useState([]);
            const [currentNoticePopup, setCurrentNoticePopup] = useState(null);
            const [rewriteBannerDismissed, setRewriteBannerDismissed] = useState(false);
            const [showTopRewrite, setShowTopRewrite] = useState(false);
            const [topRewriteTemplate, setTopRewriteTemplate] = useState(null);
            const pendingSubmitDateRef = useRef(null);
            const unreadCount = notifications.filter(n => !n.read).length;
            const unreadNoticeCount = (() => {
                const confirmed = JSON.parse(localStorage.getItem(`confirmedNotices_${empAccount?.bossUid}`) || '[]');
                return notices.filter(n => !confirmed.includes(n.id)).length;
            })();
            const workStatus = empAccount?.workStatus || 'working';
            const isBlocked = workStatus === 'leave' || workStatus === 'resigned' || workStatus === 'deleted';
            const contractStatus = empAccount?.contractStatus || null;
            const isContractBlocked = contractStatus === 'needs_resign' || contractStatus === 'pending_boss' || !!empAccount?.contractUpdateRequired;
            const isWageBlocked = !!empAccount?.wageBelowMin;
            const isPendingRewrite = !!empAccount?.pendingRewrite;
            const isFullyBlocked = isBlocked || isContractBlocked || isWageBlocked || isPendingRewrite;

            const handlePlusClick = (dateStr) => {
                const confirmedKey = `confirmedNotices_${empAccount?.bossUid}`;
                const confirmed = JSON.parse(localStorage.getItem(confirmedKey) || '[]');
                const unconfirmed = [...notices]
                    .filter(n => !confirmed.includes(n.id))
                    .sort((a, b) => {
                        const ta = a.createdAt?.toDate ? a.createdAt.toDate().getTime() : (a.createdAt ? new Date(a.createdAt).getTime() : 0);
                        const tb = b.createdAt?.toDate ? b.createdAt.toDate().getTime() : (b.createdAt ? new Date(b.createdAt).getTime() : 0);
                        return ta - tb; // 오래된 공지 먼저
                    });
                if (unconfirmed.length > 0) {
                    pendingSubmitDateRef.current = dateStr;
                    setCurrentNoticePopup(unconfirmed[0]);
                    setNoticePopupQueue(unconfirmed.slice(1));
                } else {
                    setSubmitModal({ date: dateStr });
                }
            };

            const handleNoticePopupConfirm = () => {
                const confirmedKey = `confirmedNotices_${empAccount?.bossUid}`;
                const confirmed = JSON.parse(localStorage.getItem(confirmedKey) || '[]');
                if (currentNoticePopup && !confirmed.includes(currentNoticePopup.id)) {
                    confirmed.push(currentNoticePopup.id);
                    localStorage.setItem(confirmedKey, JSON.stringify(confirmed));
                }
                if (noticePopupQueue.length > 0) {
                    setCurrentNoticePopup(noticePopupQueue[0]);
                    setNoticePopupQueue(prev => prev.slice(1));
                } else {
                    setCurrentNoticePopup(null);
                    if (pendingSubmitDateRef.current) {
                        setSubmitModal({ date: pendingSubmitDateRef.current });
                        pendingSubmitDateRef.current = null;
                    }
                }
            };

            useEffect(() => {
                if (!empAccount?.bossUid) return;
                fbDb.collection('workspaces').doc(empAccount.bossUid).get()
                    .then(doc => { if (doc.exists && doc.data().timeUnit) setTimeUnit(doc.data().timeUnit); })
                    .catch(() => {});
            }, [empAccount?.bossUid]);

            const monthKey = `${year}-${String(month).padStart(2,'0')}`;
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);

            const markAllRead = async () => {
                const unread = notifications.filter(n => !n.read);
                await Promise.all(unread.map(n =>
                    fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                        .collection('notifications').doc(n.id).update({ read: true })
                ));
            };

            useEffect(() => {
                if (activeTab === 'notifications' && unreadCount > 0) markAllRead();
            }, [activeTab]);

            const handleOpenTopRewrite = async () => {
                if (!empAccount?.bossUid) return;
                try {
                    const wpDoc = await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                        .collection('workplaces').doc(empAccount.bossUid).get();
                    const personalTemplate = wpDoc.data()?.contractTemplate;
                    if (personalTemplate) { setTopRewriteTemplate(personalTemplate); setShowTopRewrite(true); return; }
                    const wsDoc = await fbDb.collection('workspaces').doc(empAccount.bossUid).get();
                    const template = wsDoc.data()?.contractTemplate;
                    if (!template) { showAlert('관리자가 근로계약서 템플릿을 설정하지 않았습니다.', '안내', 'info'); return; }
                    setTopRewriteTemplate(template);
                    setShowTopRewrite(true);
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleTopResubmit = async (contractData) => {
                await resubmitEmpContract(firebaseUser.uid, empAccount.bossUid, contractData);
                onSetEmpAccount?.(prev => ({ ...prev, pendingRewrite: false, contractStatus: 'pending_boss' }));
                setShowTopRewrite(false);
                showAlert('근로계약서가 제출되었습니다.\n관리자 서명을 기다려주세요.', '제출 완료', 'success');
            };


            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans relative pb-24">
                    <CustomModal config={modalConfig} />
                    {currentNoticePopup && (
                        <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[9998] backdrop-blur-sm">
                            <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                                <div className="flex items-center gap-2 mb-3">
                                    <span className="text-xs font-bold bg-blue-100 text-blue-700 px-2 py-0.5 rounded-full">공지사항</span>
                                    {noticePopupQueue.length > 0 && (
                                        <span className="text-xs text-gray-400">({noticePopupQueue.length + 1}개 중 1번째)</span>
                                    )}
                                </div>
                                <h3 className="text-lg font-bold text-gray-800 mb-3">{currentNoticePopup.title}</h3>
                                <div className="bg-gray-50 rounded-xl p-4 mb-5 max-h-52 overflow-y-auto">
                                    <p className="text-sm text-gray-700 whitespace-pre-wrap">{currentNoticePopup.content}</p>
                                </div>
                                <button onClick={handleNoticePopupConfirm}
                                    className="w-full py-3 bg-blue-600 text-white rounded-xl font-bold hover:bg-blue-700 transition">
                                    {noticePopupQueue.length > 0 ? '확인 (다음 공지 보기 →)' : '확인'}
                                </button>
                            </div>
                        </div>
                    )}
                    {viewingPayslip && (
                        <PayslipViewModal payslip={viewingPayslip} onClose={() => setViewingPayslip(null)} />
                    )}
                    {submitModal && (
                        <EmpSubmitModal
                            date={submitModal.date}
                            empAccount={empAccount}
                            firebaseUser={firebaseUser}
                            onClose={() => setSubmitModal(null)}
                            showAlert={showAlert}
                            timeUnit={timeUnit}
                        />
                    )}
                    {viewModal && (
                        <EmpDayViewModal sub={viewModal.sub} date={viewModal.date} onClose={() => setViewModal(null)} />
                    )}
                    {showTopRewrite && topRewriteTemplate && (
                        <ContractWriteModal
                            template={topRewriteTemplate}
                            employeeInfo={{ name: empAccount?.name || '', address: empAccount?.address || '', phone: empAccount?.phone || '' }}
                            onSubmit={handleTopResubmit}
                            onBack={() => setShowTopRewrite(false)}
                        />
                    )}

                    <header className="bg-blue-600 text-white shadow-md">
                        <div className="max-w-lg mx-auto px-4 h-16 flex items-center justify-between">
                            <div>
                                <p className="text-xs text-blue-200">{empAccount?.shopName || '직원'}</p>
                                <h1 className="text-lg font-bold">{empAccount?.name}님</h1>
                            </div>
                            <div className="flex items-center gap-1">
                                {/* Google 직원: 업체 전환 버튼 */}
                                {onSwitchWorkplace && (allWorkplaces?.filter(w=>w.status!=='disconnected').length > 1 || onAddWorkplace) && (
                                    <button onClick={onSwitchWorkplace} className="px-2 py-1.5 rounded-lg hover:bg-blue-700 transition text-xs font-bold bg-blue-500" title="업체 전환">
                                        업체전환
                                    </button>
                                )}
                                {!empAccount?.isGoogleEmployee && (
                                    <button onClick={onLock} className="p-2 rounded-lg hover:bg-blue-700 transition" title="잠금">
                                        <Lock className="w-5 h-5" />
                                    </button>
                                )}
                                <button onClick={onLogout} className="p-2 rounded-lg hover:bg-blue-700 transition" title="로그아웃">
                                    <svg className="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
                                </button>
                            </div>
                        </div>
                    </header>

                    {payslipBanner && (
                        <div className="bg-emerald-50 border-b border-emerald-300 px-4 py-3 flex items-center justify-between gap-3">
                            <div className="flex items-center gap-2 min-w-0">
                                <svg className="w-5 h-5 text-emerald-600 flex-shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                                <p className="text-emerald-800 font-bold text-sm truncate">{payslipBanner.month}월 급여명세서가 도착했습니다.</p>
                            </div>
                            <button onClick={handlePayslipBannerClick} className="flex-shrink-0 bg-emerald-600 text-white text-xs font-bold py-1.5 px-3 rounded-lg hover:bg-emerald-700 transition">수신</button>
                        </div>
                    )}
                    {isWageBlocked && (
                        <div className="bg-red-50 border-b border-red-300 px-4 py-3 flex items-center gap-3">
                            <AlertCircle className="w-5 h-5 text-red-500 flex-shrink-0" />
                            <p className="text-red-700 font-bold text-sm">관리자가 시급 조정을 완료할때까지 근무시간 입력이 불가능합니다.</p>
                        </div>
                    )}

                    {empAccount?.pendingRewrite && (() => {
                        const isFirstContract = !empAccount?.contract;
                        const verb = isFirstContract ? '작성' : '재작성';
                        return (
                            <div className="bg-red-50 border-b border-red-300 px-4 py-3 flex items-center justify-between gap-3">

        // 직원 내 정보 탭
        function EmpProfileTab({ empAccount, onSetEmpAccount, firebaseUser, showAlert, showConfirm, onDisconnectWorkplace, myPayslips = [], onViewPayslip }) {
            const [formData, setFormData] = useState({
                residentId: empAccount?.residentId || '',
                bank: empAccount?.bank || '',
                account: empAccount?.account || '',
                address: empAccount?.address || '',
                phone: empAccount?.phone || ''
            });
            const [saving, setSaving] = useState(false);
            const [viewingContract, setViewingContract] = useState(null);
            const [payslipOpen, setPayslipOpen] = useState(false);
            const [showContractWrite, setShowContractWrite] = useState(false);
            const [contractTemplate, setContractTemplate] = useState(null);
            const [liveDeleteReq, setLiveDeleteReq] = useState(empAccount?.contractDeleteRequest || null);
            const [infoExpanded, setInfoExpanded] = useState(false);

            const contractStatus = empAccount?.contractStatus || null;
            const isContractBlocked = contractStatus === 'needs_resign' || contractStatus === 'pending_boss' || !!empAccount?.contractUpdateRequired;

            const formatResidentId = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 13);
                return digits.length > 6 ? `${digits.slice(0,6)}-${digits.slice(6)}` : digits;
            };

            const formatPhone = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 11);
                if (digits.length <= 3) return digits;
                if (digits.length <= 7) return `${digits.slice(0,3)}-${digits.slice(3)}`;
                return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
            };

            const handleSave = async () => {
                setSaving(true);
                try {
                    if (empAccount?.isGoogleEmployee && empAccount?.bossUid) {
                        await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                            .collection('workplaces').doc(empAccount.bossUid)
                            .update({
                                residentId: formData.residentId,
                                bank: formData.bank,
                                account: formData.account,
                                address: formData.address,
                                phone: formData.phone
                            });
                    } else {
                        await fbDb.collection('employeeAccounts').doc(firebaseUser.uid).update({
                            residentId: formData.residentId,
                            bank: formData.bank,
                            account: formData.account,
                            address: formData.address,
                            phone: formData.phone
                        });
                    }
                    showAlert('정보가 저장되었습니다.', '저장 완료', 'success');
                } catch(e) {
                    showAlert('저장 실패: ' + e.message, '오류', 'error');
                }
                setSaving(false);
            };

            const handleViewContract = async () => {
                try {
                    const doc = await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                        .collection('workplaces').doc(empAccount.bossUid).get();
                    const data = doc.data();
                    const contract = data?.contract;
                    if (contract) {
                        setLiveDeleteReq(data?.contractDeleteRequest || null);
                        setViewingContract(contract);
                    } else showAlert('저장된 근로계약서가 없습니다.', '안내', 'info');
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleRequestDeleteContract = () => {
                if (!showConfirm) return;
                showConfirm('근로계약서 재작성요청을 하시겠습니까?', async () => {
                    try {
                        const result = await requestContractDelete(firebaseUser.uid, empAccount.bossUid, 'employee');
                        setViewingContract(null);
                        if (result === 'deleted') {
                            showAlert('근로계약서가 삭제되었습니다.', '삭제 완료', 'success');
                        } else {
                            setLiveDeleteReq('employee');
                            showAlert('재작성 요청을 보냈습니다.', '요청 완료', 'success');
                        }
                    } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
                }, '근로계약서 재작성');
            };

            const handleCancelDeleteContract = async () => {
                try {
                    await cancelContractDeleteRequest(firebaseUser.uid, empAccount.bossUid, 'employee');
                    setLiveDeleteReq(null);
                    showAlert('삭제 요청이 취소되었습니다.', '취소 완료', 'success');
                } catch(e) { showAlert('처리 실패: ' + e.message, '오류', 'error'); }
            };

            const handleStartRewrite = async () => {
                try {
                    // 개인 근로계약서 템플릿 우선 확인 (관리자가 개별 시급 변경 시 설정한 전용 템플릿)
                    const wpDoc = await fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                        .collection('workplaces').doc(empAccount.bossUid).get();
                    const personalTemplate = wpDoc.data()?.contractTemplate;
                    if (personalTemplate) {
                        setContractTemplate(personalTemplate);
                        setShowContractWrite(true);
                        return;
                    }
                    // 전역 템플릿으로 폴백
                    const wsDoc = await fbDb.collection('workspaces').doc(empAccount.bossUid).get();
                    const template = wsDoc.data()?.contractTemplate;
                    if (!template) { showAlert('관리자가 근로계약서 템플릿을 설정하지 않았습니다.', '안내', 'info'); return; }
                    setContractTemplate(template);
                    setShowContractWrite(true);
                } catch(e) { showAlert('불러오기 실패: ' + e.message, '오류', 'error'); }
            };

            const handleResubmit = async (contractData) => {
                await resubmitEmpContract(firebaseUser.uid, empAccount.bossUid, contractData);
                onSetEmpAccount?.(prev => ({ ...prev, pendingRewrite: false, contractStatus: 'pending_boss' }));
                setLiveDeleteReq(null);
                setShowContractWrite(false);
                showAlert('근로계약서가 제출되었습니다.\n관리자 서명을 기다려주세요.', '제출 완료', 'success');
            };

            if (showContractWrite && contractTemplate) {
                return (
                    <ContractWriteModal
                        template={contractTemplate}
                        employeeInfo={{ name: empAccount?.name || '', address: formData.address, phone: formData.phone }}
                        onSubmit={handleResubmit}
                        onBack={() => setShowContractWrite(false)}
                    />
                );
            }

            return (
                <div className="max-w-lg mx-auto space-y-4">
                    {/* 근로계약서 상태 배너 */}
                    {isContractBlocked && !empAccount?.pendingRewrite && (() => {
                        const isFirstContract = !empAccount?.contract;
                        const verb = isFirstContract ? '작성' : '재작성';
                        return (
                            <div className={`rounded-xl p-4 border ${contractStatus === 'needs_resign' ? 'bg-red-50 border-red-200' : 'bg-yellow-50 border-yellow-200'}`}>
                                <p className={`font-bold text-sm ${contractStatus === 'needs_resign' ? 'text-red-700' : 'text-yellow-700'}`}>
                                    {contractStatus === 'needs_resign' ? '⚠️ 근로계약서를 작성해주세요' : '⏳ 관리자 서명 대기 중'}
                                </p>
                                <p className="text-xs text-gray-600 mt-1">
                                    {contractStatus === 'needs_resign' ? `근로계약서 ${verb} 및 관리자 서명까지 앱 기능이 제한됩니다.` : '관리자가 서명하면 기능이 정상화됩니다.'}
                                </p>
                                {contractStatus === 'needs_resign' && (
                                    <button onClick={handleStartRewrite}
                                        className="mt-2 w-full bg-purple-600 text-white py-2.5 rounded-xl font-bold hover:bg-purple-700 transition text-sm">
                                        근로계약서 {verb}하기
                                    </button>
                                )}
                            </div>
                        );
                    })()}

                    {/* 급여명세서 열람 — 드롭다운 */}
                    <div className="bg-white rounded-xl border border-emerald-200 shadow-sm p-6">
                        <button onClick={() => setPayslipOpen(!payslipOpen)}
                            className="w-full flex items-center justify-between">
                            <h3 className="text-base font-bold text-emerald-700 flex items-center gap-2">
                                급여명세서 열람
                                {myPayslips.some(p => !p.read) && <span className="w-2 h-2 bg-red-500 rounded-full"></span>}
                            </h3>
                            <ChevronDown className={`w-5 h-5 text-gray-400 transition-transform ${payslipOpen ? 'rotate-180' : ''}`}/>
                        </button>
                        {payslipOpen && (
                            <div className="mt-3 space-y-2">
                                {myPayslips.length > 0 ? (
                                    (() => {
                                        // 월별 최신 1건만 (같은 월 중복 발송 시 마지막 것)
                                        const sorted = [...myPayslips].sort((a, b) => {
                                            if (a.year !== b.year) return b.year - a.year;
                                            if (a.month !== b.month) return b.month - a.month;
                                            const ta = a.sentAt?.toDate ? a.sentAt.toDate().getTime() : 0;
                                            const tb = b.sentAt?.toDate ? b.sentAt.toDate().getTime() : 0;
                                            return tb - ta;
                                        });
                                        const seen = new Set();
                                        const unique = sorted.filter(p => {
                                            const key = `${p.year}-${p.month}`;
                                            if (seen.has(key)) return false;
                                            seen.add(key);
                                            return true;
                                        });
                                        return unique.slice(0, 6);
                                    })().map(p => (
                                        <button key={p.docId} onClick={async () => {
                                            onViewPayslip(p);
                                            if (!p.read) {
                                                try { await fbDb.collection('workspaces').doc(empAccount.bossUid).collection('payslips').doc(p.docId).update({ read: true }); } catch(e) {}
                                            }
                                        }}
                                            className="w-full flex items-center justify-between bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border border-emerald-200 py-2.5 px-4 rounded-xl font-bold transition text-sm">
                                            <span className="flex items-center gap-2">
                                                {!p.read && <span className="w-2 h-2 bg-red-500 rounded-full shrink-0"></span>}
                                                {p.year}년 {p.month}월
                                            </span>
                                            <span className="text-emerald-600">{Number(p.finalAmount||0).toLocaleString()}원</span>
                                        </button>
                                    ))
                                ) : (
                                    <p className="text-sm text-gray-400 text-center py-3">열람 가능한 급여명세서가 없습니다.</p>
                                )}
                            </div>
                        )}
                    </div>

                    {/* 근로계약서 보기 */}
                    {empAccount?.isGoogleEmployee && empAccount?.bossUid && contractStatus !== null && (
                        <div className="bg-white rounded-xl border border-purple-200 shadow-sm p-6">
                            <h3 className="text-base font-bold text-purple-700 mb-3">근로계약서</h3>
                            <button onClick={handleViewContract}
                                className="w-full bg-purple-50 text-purple-700 border border-purple-200 py-2.5 rounded-xl font-bold hover:bg-purple-100 transition text-sm">
                                근로계약서 열람
                            </button>
                        </div>
                    )}

                    {/* 근로계약서 없는 기존 직원: 작성 안내 */}
                    {empAccount?.isGoogleEmployee && empAccount?.bossUid && contractStatus === null && !isContractBlocked && (
                        <div className="bg-blue-50 rounded-xl border border-blue-200 shadow-sm p-5">
                            <p className="font-bold text-sm text-blue-700 mb-1">📋 근로계약서가 없습니다</p>
                            <p className="text-xs text-gray-600 mb-3">근로계약서를 작성하면 관리자 서명 후 완료됩니다.</p>
                            <button onClick={handleStartRewrite}
                                className="w-full bg-blue-600 text-white py-2.5 rounded-xl font-bold hover:bg-blue-700 transition text-sm">
                                근로계약서 작성하기
                            </button>
                        </div>
                    )}

                    {viewingContract && (
                        <ContractViewModal
                            contract={viewingContract}
                            onClose={() => setViewingContract(null)}
                            contractDeleteRequest={liveDeleteReq}
                            onRequestDelete={handleRequestDeleteContract}
                            onCancelDelete={handleCancelDeleteContract}
                        />
                    )}

                    {/* Google 직원: 퇴사하기 (근로계약서 완료 또는 미작성 상태에서 허용) */}
                    {empAccount?.isGoogleEmployee && onDisconnectWorkplace && (
                        <div className="bg-white rounded-xl border border-red-200 shadow-sm p-6">
                            <h3 className="text-base font-bold text-red-700 mb-2">퇴사하기</h3>
                            <button onClick={onDisconnectWorkplace}
                                className="w-full border-2 border-red-400 text-red-600 py-3 rounded-xl font-bold hover:bg-red-50 transition">
                                {empAccount.shopName || '이 업체'}에서 퇴사
                            </button>
                            <p className="text-xs text-gray-400 mt-3">퇴사 시 해당 업체의 내 근무 기록, 근로계약서, 알림 등 모든 데이터가 삭제됩니다.</p>
                        </div>
                    )}

                    {/* 개인정보처리방침 */}
                    <div className="text-center mt-2">
                        <a href="./privacy.html" target="_blank" className="text-xs text-gray-400 hover:text-blue-500 underline">개인정보처리방침</a>
                    </div>
                </div>
            );
        }

        function EmpSubmitModal({ date, empAccount, firebaseUser, onClose, showAlert, timeUnit }) {
            const [hoursInt, setHoursInt] = useState('');  // 시간 (정수)
            const [halfOn, setHalfOn] = useState(false);   // half 모드: 30분 토글
            const [minSlide, setMinSlide] = useState(0);   // ten 모드: 0,10,20,30,40,50
            const [minsInt, setMinsInt] = useState('');    // minute 모드: 분 직접 입력
            const [note, setNote] = useState('');
            const [loading, setLoading] = useState(false);

            // 최종 시간값(소수) 계산
            const computeHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return null;
                if (timeUnit === 'hour') return h;
                if (timeUnit === 'half') return h + (halfOn ? 0.5 : 0);
                if (timeUnit === 'ten') return parseFloat((h + minSlide / 60).toFixed(4));
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return null;
                    return parseFloat((h + m / 60).toFixed(4));
                }
                return h;
            };

            const displayHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h)) return '-';
                if (timeUnit === 'hour') return `${h}시간`;
                if (timeUnit === 'half') return halfOn ? `${h}시간 30분` : `${h}시간`;
                if (timeUnit === 'ten') return minSlide > 0 ? `${h}시간 ${minSlide}분` : `${h}시간`;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    return (!isNaN(m) && m > 0) ? `${h}시간 ${m}분` : `${h}시간`;
                }
                return `${h}시간`;
            };

            const isValid = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return false;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return false;
                }
                return h > 0 || (timeUnit !== 'hour' && (halfOn || minSlide > 0 || parseInt(minsInt,10) > 0));
            };

            const handleSubmit = async () => {
                const finalHours = computeHours();
                if (finalHours === null || finalHours <= 0) {
                    showAlert('올바른 근무시간을 입력해주세요.', '입력 오류', 'error'); return;
                }
                setLoading(true);
                try {
                    await submitWorkHours(empAccount.bossUid, {
                        empUid: firebaseUser.uid,
                        employeeId: empAccount.employeeId,
                        empName: empAccount.name,
                        date,
                        hours: finalHours,
                        note: note.trim()
                    });
                    showAlert(`${date} 근무시간(${displayHours()})이 제출되었습니다.`, '제출 완료', 'success');
                    onClose();
                } catch(e) {
                    showAlert('제출 실패: ' + e.message, '오류', 'error');
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-4 z-[9999]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-bold text-gray-800">근무시간 입력</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-4">{date}</p>

                        <div className="mb-4">
                            <label className="block text-sm font-bold text-gray-700 mb-2">근무시간</label>

                            {/* 시간 입력 (공통) */}
                            <div className="flex items-center gap-2 mb-3">
                                <input type="number" min="0" max="24" value={hoursInt} onChange={e => setHoursInt(e.target.value.replace(/[^0-9]/g,''))}
                                    className="w-24 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                    placeholder="0" autoFocus />
                                <span className="text-xl font-bold text-gray-600">시간</span>

                                {/* half 모드: 30분 토글 버튼 */}
                                {timeUnit === 'half' && (
                                    <button
                                        onClick={() => setHalfOn(p => !p)}
                                        className={`ml-2 px-4 py-3 rounded-xl font-bold text-sm border-2 transition ${halfOn ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                                    >30분</button>
                                )}

                                {/* minute 모드: 분 직접 입력 */}
                                {timeUnit === 'minute' && (
                                    <>
                                        <input type="number" min="0" max="59" value={minsInt} onChange={e => setMinsInt(e.target.value.replace(/[^0-9]/g,''))}
                                            className="w-20 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                            placeholder="0" />
                                        <span className="text-xl font-bold text-gray-600">분</span>
                                    </>
                                )}
                            </div>

                            {/* ten 모드: 슬라이드 선택 (0,10,20,30,40,50분) */}
                            {timeUnit === 'ten' && (
                                <div>
                                    <div className="flex gap-2 flex-wrap">
                                        {[0,10,20,30,40,50].map(m => (
                                            <button key={m} onClick={() => setMinSlide(m)}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 transition ${minSlide === m ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'}`}>
                                                {m === 0 ? '정각' : `+${m}분`}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 미리보기 */}
                            {hoursInt !== '' && (
                                <div className="mt-3 text-center text-blue-600 font-bold text-lg">{displayHours()}</div>
                            )}
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-700 mb-1">메모 (선택)</label>
                            <input type="text" value={note} onChange={e => setNote(e.target.value)}
                                className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-blue-500 outline-none text-sm"
                                placeholder="특이사항 입력 (관리자에게 공유됩니다)" />
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 mb-4">
                            <p className="text-xs text-yellow-700 font-medium">⚠️ 제출 후에는 수정할 수 없습니다. 신중하게 입력해주세요.</p>
                        </div>
                        <button onClick={handleSubmit} disabled={loading || !isValid()}
                            className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">
                            {loading ? '제출 중...' : '제출하기'}
                        </button>
                    </div>
                </div>
            );
        }

        // ─── 관리자: 개인 근로계약서 템플릿 편집 팝업 ───
        function PersonalContractTemplateModal({ emp, globalTemplate, workspaceId, firebaseUser, setEmployees, showAlert, onClose, onSaveComplete, reason }) {
            const baseTemplate = globalTemplate || {};
            const [title, setTitle] = useState(baseTemplate?.title || '근로계약서');
            const [sections, setSections] = useState(
                baseTemplate?.sections?.length >= 1
                    ? baseTemplate.sections.map(s => ({ ...s }))
                    : [{ content: '', instruction: '' }]
            );
            const [ownerInfo, setOwnerInfo] = useState(
                baseTemplate?.ownerInfo
                    ? { ...baseTemplate.ownerInfo, signatureData: '' }
                    : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }
            );
            const [saving, setSaving] = useState(false);
            const [loadingPersonal, setLoadingPersonal] = useState(!!emp.empUid);

            // 기존에 저장된 개인 템플릿이 있으면 우선 로드 (이전 수정 내용 + 서명 유지)
            useEffect(() => {
                if (!emp.empUid) { setLoadingPersonal(false); return; }
                const bossUid = workspaceId || firebaseUser.uid;
                fbDb.collection('employeeAccounts').doc(emp.empUid)
                    .collection('workplaces').doc(bossUid).get()
                    .then(doc => {
                        const personal = doc.data()?.contractTemplate;
                        if (personal) {
                            setTitle(personal.title || '근로계약서');
                            setSections(personal.sections?.length >= 1 ? personal.sections.map(s => ({ ...s })) : [{ content: '', instruction: '' }]);
                            // signatureData도 그대로 가져옴 — 새로 그리면 덮어쓰고, 안 그리면 기존 유지
                            setOwnerInfo(personal.ownerInfo ? { ...personal.ownerInfo } : (baseTemplate?.ownerInfo ? { ...baseTemplate.ownerInfo } : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }));
                        }
                    })
                    .catch(() => {})
                    .finally(() => setLoadingPersonal(false));
            }, []);

            const addSection = () => setSections(prev => [...prev, { content: '', instruction: '' }]);
            const removeSection = (i) => { if (sections.length <= 1) return; setSections(prev => prev.filter((_, j) => j !== i)); };
            const updateSection = (i, key, val) => setSections(prev => prev.map((s, j) => j === i ? { ...s, [key]: val } : s));

            const handleSave = async () => {
                if (!title.trim()) { showAlert('제목을 입력해주세요.', '입력 오류', 'alert'); return; }
                if (sections.some(s => !s.content.trim())) { showAlert('모든 내용칸을 입력해주세요.', '입력 오류', 'alert'); return; }
                const fallbackSig = globalTemplate?.ownerInfo?.signatureData || '';
                if (!ownerInfo.signatureData && !fallbackSig) {
                    showAlert('서명이 필요합니다.', '입력 오류', 'alert');
                    return;
                }
                setSaving(true);
                try {
                    const finalOwnerInfo = ownerInfo.signatureData
                        ? ownerInfo
                        : { ...ownerInfo, signatureData: fallbackSig };
                    const template = { title: title.trim(), sections, ownerInfo: finalOwnerInfo };
                    const bossUid = workspaceId || firebaseUser.uid;
                    if (emp.empUid) {
                        // 모든 경로 통일: pendingRewrite=true + needs_resign으로 재작성 요청
                        // needs_resign은 Firestore 규칙 호환성 및 재제출 흐름 보장용
                        await fbDb.collection('employeeAccounts').doc(emp.empUid)
                            .collection('workplaces').doc(bossUid)
                            .update({
                                contractTemplate: template,
                                contractStatus: 'needs_resign',
                                pendingRewrite: true,
                                contractDeleteRequest: firebase.firestore.FieldValue.delete(),
                                contractUpdateRequired: firebase.firestore.FieldValue.delete()
                            });
                        setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, contractStatus: 'needs_resign', pendingRewrite: true, contractDeleteRequest: null, contractUpdateRequired: false } : e));
                        const verb = reason === 'new_contract' ? '작성' : '재작성';
                        showAlert(`${emp.name}님에게 근로계약서 ${verb}이 요청되었습니다.`, '요청 완료', 'success');
                    }
                    (onSaveComplete || onClose)();
                } catch(e) { showAlert('저장 실패: ' + e.message, '오류', 'error'); }
                setSaving(false);
            };

            if (loadingPersonal) return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                    <div className="bg-white rounded-2xl p-8 flex flex-col items-center gap-3">
                        <div className="w-8 h-8 border-4 border-purple-300 border-t-purple-600 rounded-full animate-spin"></div>
                        <p className="text-sm text-gray-600">계약서 불러오는 중...</p>
                    </div>
                </div>
            );

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4">
                    <div className="bg-white rounded-2xl w-full max-w-lg my-4">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 p-2 rounded-xl">
                                    <svg className="w-5 h-5 text-purple-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                </div>
                                <div>
                                    <h2 className="text-base font-bold text-gray-800">{emp.name}님 근로계약서 {reason === 'new_contract' ? '작성 요청' : '재작성 요청'}</h2>
                                    <p className="text-xs text-gray-500">
                                        {reason === 'new_contract' ? '신규 개인 근로계약서 작성' : (reason === 'rewrite_request' || reason === 'boss_rewrite') ? '관리자 직접 재작성 요청' : '시급 변경으로 인한 개인 계약서 업데이트'}
                                    </p>
                                </div>
                            </div>
                            {reason !== 'new_contract' && (
                                <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition">
                                    <X className="w-5 h-5" />
                                </button>
                            )}
                        </div>

                        <div className="p-5 space-y-4 max-h-[65vh] overflow-y-auto">

            const handleClickSave = () => {
                if (!title.trim()) { showAlert('제목을 입력해주세요.', '입력 오류', 'alert'); return; }

                setConfirmingSave(true);

                setSaving(true);

                    const finalOwnerInfo = ownerInfo.signatureData
