        function BarColumn({ d, maxValue }) {
            const [hoveredBar, setHoveredBar] = React.useState(null); 
            const totalPay = d.pay + d.holidayPay;
            const revH     = maxValue > 0 ? (d.revenue / maxValue) * 100 : 0;
            const stackH   = maxValue > 0 ? (totalPay / maxValue) * 100 : 0;
            const totalRatio = d.revenue > 0 ? ((totalPay / d.revenue) * 100).toFixed(1) : null;
            const payRatio   = d.revenue > 0 ? ((d.pay / d.revenue) * 100).toFixed(1) : null;
            const holRatio   = d.revenue > 0 ? ((d.holidayPay / d.revenue) * 100).toFixed(1) : null;
            const fmt = v => Math.round(v * 10000).toLocaleString();

            return (
                <div className="relative flex flex-col items-center h-full justify-end w-12 shrink-0" onMouseLeave={() => setHoveredBar(null)}>
                    {hoveredBar && (
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 text-[11px] bg-gray-800 text-white px-3 py-2 rounded-lg pointer-events-none whitespace-nowrap z-20 leading-relaxed shadow-lg font-medium">
                            {hoveredBar === 'revenue' && (
                                <>
                                    <div className="font-bold text-yellow-300">매출 {fmt(d.revenue)}원</div>
                                    {totalRatio && <div className="text-gray-300 mt-0.5">총급여 매출 대비 {totalRatio}%</div>}
                                </>
                            )}
                            {hoveredBar === 'pay' && (
                                <>
                                    <div className="font-bold text-green-400">순수인건비 {fmt(d.pay)}원</div>
                                    {payRatio && <div className="text-gray-300 mt-0.5">매출 대비 {payRatio}%</div>}
                                </>
                            )}
                            {hoveredBar === 'holiday' && (
                                <>
                                    <div className="font-bold text-blue-300">주휴수당 {fmt(d.holidayPay)}원</div>
                                    {holRatio && <div className="text-gray-300 mt-0.5">매출 대비 {holRatio}%</div>}
                                </>
                            )}
                        </div>
                    )}
                    <div className="flex items-end gap-1.5 w-full justify-center h-full pb-1">
                        <div
                            style={{ height: `${revH}%`, backgroundColor: hoveredBar === 'revenue' ? '#ca8a04' : '#facc15' }}
                            className="w-5 rounded-t-md cursor-pointer transition-colors duration-150"
                            onMouseEnter={() => setHoveredBar('revenue')}
                        />
                        <div style={{ height: `${stackH}%` }} className="w-5 rounded-t-md overflow-hidden flex flex-col-reverse shadow-sm">
                            {d.pay > 0 && (
                                <div
                                    style={{ height: `${(d.pay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'pay' ? '#15803d' : '#22c55e' }}
                                    className="w-full flex-none cursor-pointer"
                                    onMouseEnter={() => setHoveredBar('pay')}
                                />
                            )}
                            {d.holidayPay > 0 && (
                                <div
                                    style={{ height: `${(d.holidayPay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'holiday' ? '#1d4ed8' : '#60a5fa' }}
                                    className="w-full flex-none cursor-pointer"
                                    onMouseEnter={() => setHoveredBar('holiday')}
                                />
                            )}
                        </div>
                    </div>
                    <div className="absolute -bottom-6 text-sm text-gray-500 font-bold">{d.month}월</div>
                </div>
            );
        }

        function TabChart({ monthlyData, employees }) {
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [pieMonth, setPieMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
            });
            const [pieYear, setPieYear] = useState(new Date().getFullYear());
            
            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                Object.keys(monthlyData).forEach(key => years.add(parseInt(key.split('-')[0])));
                return Array.from(years).sort((a,b) => b - a);
            }, [monthlyData]);

            const chartData = useMemo(() => {
                const data = Array.from({ length: 12 }, (_, i) => ({ month: i + 1, revenue: 0, pay: 0, holidayPay: 0 }));
                Object.keys(monthlyData).forEach(key => {
                    const [y, m] = key.split('-');
                    if (parseInt(y) === selectedYear) {
                        const monthIdx = parseInt(m) - 1;
                        const monthObj = monthlyData[key] || {};
                        const days = monthObj.days || {};

                        let dailySumRev = 0;
                        Object.values(days).forEach(day => {
                            dailySumRev += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { data[monthIdx].pay += (entry.pay || 0) / 10000; });
                        });

                        const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailySumRev;
                        data[monthIdx].revenue += effectiveRev / 10000;
                    }
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== selectedYear) return;
                    const monthIdx = sm - 1;
                    weekData.forEach(({ holidayPay }) => { data[monthIdx].holidayPay += holidayPay / 10000; });
                });
                return data;
            }, [monthlyData, employees, selectedYear]);

            const maxValue = Math.max(...chartData.map(d => Math.max(d.revenue, d.pay + d.holidayPay)), 100);
            const yTicks = [0, maxValue * 0.25, maxValue * 0.5, maxValue * 0.75, maxValue];

            const allHolidayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            const pieMonthData = useMemo(() => {
                let dailyRevSum = 0, pay = 0;
                const monthObj = monthlyData[pieMonth] || { days: {} };
                Object.values(monthObj.days).forEach(day => {
                    dailyRevSum += (day.revenue || 0);
                    Object.values(day.entries || {}).forEach(entry => { pay += (entry.pay || 0); });
                });
                const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieMonth)) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: effectiveRev, pay, holidayPay };
            }, [monthlyData, pieMonth, allHolidayBySunday]);

            const pieYearData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    if (key.startsWith(pieYear.toString())) {
                        const monthObj = monthlyData[key];
                        let dailyRevSum = 0;
                        Object.values(monthObj.days || {}).forEach(day => {
                            dailyRevSum += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                        });
                        totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                    }
                });
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieYear.toString())) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, pieYear, allHolidayBySunday]);

            const pieTotalData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    const monthObj = monthlyData[key];
                    let dailyRevSum = 0;
                    Object.values(monthObj.days || {}).forEach(day => {
                        dailyRevSum += (day.revenue || 0);
                        Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                    });
                    totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                });
                const holidayPay = Object.values(allHolidayBySunday).flat().reduce((s, h) => s + h.holidayPay, 0);
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, allHolidayBySunday]);

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 max-w-5xl mx-auto space-y-10">
                    <div>
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 gap-2">
                            <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center gap-2">
                                <BarChart3 className="w-5 h-5 text-green-600 flex-shrink-0" /> 월별 매출 및 인건비 추이
                            </h2>
                            <select
                                value={selectedYear}
                                onChange={e => setSelectedYear(parseInt(e.target.value))}
                                className="border border-gray-200 rounded-xl px-4 py-2 font-bold bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none transition self-start sm:self-auto flex-shrink-0"
                            >
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                        </div>

                        <div className="flex flex-wrap justify-end gap-4 md:gap-6 mb-5 text-sm font-bold text-gray-600">
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-yellow-400 rounded-full shadow-sm"></div>매출</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-green-500 rounded-full shadow-sm"></div>인건비</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-blue-400 rounded-full shadow-sm"></div>주휴수당</div>
                        </div>

                        {/* Y축 고정 + 막대 가로 스크롤 */}
                        <div className="flex mt-4">
                            <div className="flex flex-col justify-between h-[300px] w-16 md:w-20 flex-shrink-0 pb-8">
                                {yTicks.slice().reverse().map((tick, i) => (
                                    <span key={i} className="text-xs text-gray-400 font-medium text-right block pr-2 leading-none">{Math.round(tick).toLocaleString()}만원</span>
                                ))}
                            </div>
                            <div className="overflow-x-auto no-scrollbar pb-8 flex-1">
                                <div className="relative h-[300px] min-w-[480px]">
                                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none">
                                        {yTicks.slice().reverse().map((tick, i) => (
                                            <div key={i} className="border-t border-gray-100 border-dashed w-full"></div>
                                        ))}
                                    </div>
                                    <div className="absolute inset-0 flex items-end justify-around">
                                        {chartData.map((d) => (
                                            <BarColumn key={d.month} d={d} maxValue={maxValue} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr className="border-gray-100" />

                    <div>
                        <h3 className="text-lg font-bold text-gray-800 mb-6 px-1 flex items-center gap-2">
                            <svg className="w-5 h-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                            매출 대비 인건비 비율 현황
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <DonutGauge revenue={pieMonthData.revenue} pay={pieMonthData.pay} holidayPay={pieMonthData.holidayPay}>
                                <input type="month" value={pieMonth} onChange={e => setPieMonth(e.target.value)} required className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition" />
                            </DonutGauge>

                            <DonutGauge revenue={pieYearData.revenue} pay={pieYearData.pay} holidayPay={pieYearData.holidayPay}>
                                <select value={pieYear} onChange={e => setPieYear(parseInt(e.target.value))} className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition">
                                    {availableYears.map(y => <option key={y} value={y}>{y}년 누적 비율</option>)}
                                </select>
                            </DonutGauge>

                            <DonutGauge revenue={pieTotalData.revenue} pay={pieTotalData.pay} holidayPay={pieTotalData.holidayPay}>
                                <div className="font-bold text-gray-700 bg-gray-100 border border-transparent rounded-xl px-3 py-1.5 text-center w-full">전체 누적 비율</div>
                            </DonutGauge>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 주휴수당 예측 탭
        // ==========================================
        function TabPredict({ employees, predictData, setPredictData, showConfirm, globalMinWage }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = predictData[monthKey] || { days: {} };
            const activeEmployees = employees
                .filter(e => (e.status || (e.isWorking === false ? 'resigned' : 'working')) === 'working')
                .sort((a, b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const touchStartX = useRef(null);
            const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null || isBulkInputOpen || editDayModal) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }
                touchStartX.current = null;
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}년 ${month}월 ${dayToDel}일의 예측 정보를 정말 삭제하시겠습니까?`, () => {
                    setPredictData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey]?.days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    setEditDayModal(null);
                }, "예측 정보 삭제");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(predictData, employees), [predictData, employees]);

            let totalMonthPay = 0;
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                Object.values((currentMonthData.days[d] || {}).entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector year={year} month={month} onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))} />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setIsBulkInputOpen(true)}
                                className="bg-gray-800 text-white px-3 md:px-4 py-2.5 rounded-xl hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap font-medium"
                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">예측 근무시간 일괄 입력</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="bg-amber-50 text-amber-700 px-4 py-2.5 rounded-xl text-xs font-bold border border-amber-200 whitespace-nowrap shadow-sm">
                                예측 모드 — 실제 데이터와 무관
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                순수 급여: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                주휴수당: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                예측 총 급여: {formatCurrency(totalMonthPay + totalMonthHolidayPay)}
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`ep-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {} };
                                let dailyTotalPay = 0;
                                const activeEntries = [];
                                Object.values(dayData.entries || {}).forEach(entry => {
                                    if (entry.hours > 0) { dailyTotalPay += entry.pay; activeEntries.push(entry); }
                                });

                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];

                                return (
                                    <div key={`epd-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={() => setEditDayModal(day)}>
                                        <div className="flex justify-between items-start mb-1">
                                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                {day}
                                            </span>
                                            {/* PC에서만 툴팁 버튼 표시 */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={() => setEditDayModal(day)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">수정</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="삭제">
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        </div>

                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}명 근무</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}만원</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="주휴수당 예측"></div>}
                                        </div>

                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                                            </div>
                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">예측 인건비: {formatCurrency(dailyTotalPay)}</div>
                                                </div>
                                            )}
                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 예측</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={predictData} setMonthlyData={setPredictData}
                            onClose={() => setIsBulkInputOpen(false)}
                            globalMinWage={globalMinWage}
                        />
                    )}
                    {editDayModal && (() => {
                        const editDateStr = `${year}-${month.toString().padStart(2, '0')}-${editDayModal.toString().padStart(2, '0')}`;
                        const editDate = new Date(year, month - 1, editDayModal);
                        const isSunday = editDate.getDay() === 0;
                        const editHolidayEntries = isSunday ? (holidayPayBySunday[editDateStr] || []) : [];
                        return (
                            <DailyEditModal
                                year={year} month={month} day={editDayModal} monthKey={monthKey}
                                activeEmployees={activeEmployees} allEmployees={employees} monthlyData={predictData} setMonthlyData={setPredictData}
                                onClose={() => setEditDayModal(null)}
                                onDelete={() => handleDeleteDay(editDayModal)}
                                holidayEntries={editHolidayEntries}
                                globalMinWage={globalMinWage}
                            />
                        );
                    })()}

        // ─── 서명 그리기 모달 (확대 캔버스) ───
        function SignatureDrawModal({ onSave, onClose }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);
            const lastPosRef = useRef(null);

            const getPos = (e, canvas) => {
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width;
                const sy = canvas.height / rect.height;
                if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
                return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
            };

            const startDraw = (e) => {
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                setIsDrawing(true); setHasDrawn(true);
                lastPosRef.current = pos;
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a'; ctx.fill();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                lastPosRef.current = pos;
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const handleConfirm = () => {
                if (!hasDrawn) return;
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4" onClick={onClose}>
                    <div className="rounded-2xl shadow-2xl w-full max-w-lg" style={{ backgroundColor: 'white', color: '#111' }} onClick={e => e.stopPropagation()}>
                        <div className="px-5 pt-5 pb-2 flex items-center justify-between">
                            <div>
                                <h3 className="text-base font-bold" style={{ color: '#1f2937' }}>서명하기</h3>
                                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>이름을 정자로 적어주세요</p>
                            </div>
                            <button onClick={onClose} className="text-xl leading-none" style={{ color: '#9ca3af' }}>✕</button>
                        </div>
                        <div className="px-5 pb-2 relative">
                            <canvas ref={canvasRef} width={600} height={260}
                                className="rounded-xl touch-none cursor-crosshair w-full"
                                style={{ touchAction: 'none', backgroundColor: 'white', display: 'block', border: '2px dashed #d1d5db' }}
                                onMouseDown={startDraw} onMouseMove={draw}
                                onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)}
                                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                            />
                            {!hasDrawn && (
                                <p className="absolute inset-0 mx-5 flex items-center justify-center text-sm pointer-events-none" style={{ color: '#9ca3af' }}>여기에 서명하세요</p>
                            )}
                            {hasDrawn && (
                                <button onClick={clear} className="absolute top-3 right-7 text-xs px-2 py-1 rounded-lg transition" style={{ backgroundColor: '#fee2e2', color: '#dc2626' }}>지우기</button>
                            )}
                        </div>
                        <div className="px-5 pb-5 flex gap-3 mt-3">
                            <button onClick={onClose} className="flex-1 py-3 rounded-xl text-sm font-medium transition" style={{ border: '1px solid #e5e7eb', backgroundColor: 'white', color: '#4b5563' }}>취소</button>

                                className="flex-1 py-3 rounded-xl text-sm font-bold transition"
                                style={{ backgroundColor: hasDrawn ? '#22c55e' : '#e5e7eb', color: hasDrawn ? 'white' : '#9ca3af', cursor: hasDrawn ? 'pointer' : 'not-allowed' }}>
                                완료
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // ─── 직원: 근로계약서 작성 모달 ───
        function ContractWriteModal({ template, employeeInfo, onSubmit, onBack }) {
            const today = new Date();
            const todayStr = `${today.getFullYear()}-${String(today.getMonth()+1).padStart(2,'0')}-${String(today.getDate()).padStart(2,'0')}`;
            const [answers, setAnswers] = useState((template.sections || []).map(() => ''));
            const [empSig, setEmpSig] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleSubmit = async () => {
                const incomplete = answers.some((a, i) => template.sections[i]?.instruction && !a.trim());
                if (incomplete) { setError('모든 입력칸을 채워주세요.'); return; }
                if (!empSig) { setError('서명을 해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    const contractData = {
                        title: template.title || '근로계약서',
                        date: todayStr,
                        sections: (template.sections || []).map((s, i) => ({ content: s.content, instruction: s.instruction, answer: answers[i] || '' })),
                        ownerInfo: template.ownerInfo || {},
                        employeeInfo: { ...employeeInfo, signatureData: empSig },
                        status: 'pending_boss'
                    };
                    await onSubmit(contractData);
                } catch(e) { setError('오류: ' + e.message); }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-white flex flex-col z-[9999] overflow-hidden">
                    <div className="bg-white border-b p-4 flex items-center gap-3 flex-shrink-0 shadow-sm">
                        <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700">
                            <ChevronLeft className="w-4 h-4" /> 뒤로
                        </button>
                        <h2 className="text-lg font-bold text-gray-800 flex-1 text-center pr-8">근로계약서 작성</h2>
                    </div>
                    <div className="flex-1 overflow-y-auto p-4 space-y-4 pb-6">
                        <h3 className="text-xl font-bold text-center text-gray-900 border-b pb-3 mt-2">{template.title || '근로계약서'}</h3>
                        {(template.sections || []).map((s, i) => (
                            <div key={i} className="bg-gray-50 rounded-xl p-4 space-y-3">
                                <p className="text-sm text-gray-800 whitespace-pre-wrap leading-relaxed">{s.content}</p>
                                {s.instruction && (
                                    <div>
                                        <input value={answers[i]} onChange={e => setAnswers(prev => prev.map((a,j) => j===i ? e.target.value : a))}
                                            className="w-full border-b-2 border-gray-400 bg-transparent py-1.5 px-1 text-sm focus:border-blue-500 outline-none"
                                            placeholder={s.instruction} />
                                        <p className="text-xs text-gray-400 mt-1">{s.instruction}</p>
                                    </div>
                                )}
                            </div>
                        ))}
                        <div className="border-t pt-4 space-y-3 text-sm text-gray-700">
                            <p className="font-medium">작성일: {todayStr}</p>
                            {template.ownerInfo && (
                                <div className="bg-blue-50 rounded-xl p-4">
                                    <p className="text-xs font-bold text-blue-700 mb-2">사업주</p>
                                    <p>사업체명: {template.ownerInfo.shopName || ''}{template.ownerInfo.phone ? ` (전화: ${template.ownerInfo.phone})` : ''}</p>
                                    <p>주소: {template.ownerInfo.address || ''}</p>
                                    <p>대표자: {template.ownerInfo.representative || ''}</p>

                                <p>연락처: {employeeInfo.phone || ''}</p>
                                <p>성명: {employeeInfo.name || ''}</p>
                                <div className="mt-3">
                                    <p className="text-xs font-bold text-gray-600 mb-1">서명</p>
                                    <SignatureCanvas onSave={setEmpSig} width={360} height={110} />
                                </div>
                            </div>
                        </div>
                        {error && <p className="text-red-500 text-sm text-center">{error}</p>}
                        <button onClick={handleSubmit} disabled={loading}
                            className="w-full bg-green-600 text-white py-3.5 rounded-xl font-bold hover:bg-green-700 transition disabled:opacity-50 mt-2">
                            {loading ? '제출 중...' : '계약서 제출'}

                    </div>
                </div>
            );

        // ─── 관리자: 근로계약서 템플릿 편집기 ───

            const [title, setTitle] = useState(existing?.title || '근로계약서');
            const [sections, setSections] = useState(
                existing?.sections?.length >= 1 ? existing.sections : [{ content: '', instruction: '' }]
            );
            const [ownerInfo, setOwnerInfo] = useState(existing?.ownerInfo || { shopName: '', phone: '', address: '', representative: '', signatureData: '' });
            const [saving, setSaving] = useState(false);
            const [expanded, setExpanded] = useState(false);

            const addSection = () => setSections(prev => [...prev, { content: '', instruction: '' }]);
            const removeSection = (i) => { if (sections.length <= 1) return; setSections(prev => prev.filter((_, j) => j !== i)); };
            const updateSection = (i, key, val) => setSections(prev => prev.map((s, j) => j === i ? { ...s, [key]: val } : s));

            const handleDeleteTemplate = () => {
                if (!firebaseUser || !existing) return;
                showConfirm(
                    '근로계약서 템플릿을 삭제하시겠습니까?\n\n삭제 후 신규 입사자는 근로계약서 없이 입사하며,\n이후 템플릿을 다시 저장하면 기존 근무자에게 재작성이 요청됩니다.\n(현재 계약서가 완료된 근무자의 계약서는 유지됩니다)',
                    async () => {
                        try {
                            await fbDb.collection('workspaces').doc(workspaceId || firebaseUser.uid)
                                .update({ contractTemplate: firebase.firestore.FieldValue.delete() });
                            setWorkspaceInfo(prev => { const n = { ...prev }; delete n.contractTemplate; return n; });
                            setTitle('근로계약서');
                            setSections([{ content: '', instruction: '' }]);
                            setOwnerInfo({ shopName: '', phone: '', address: '', representative: '', signatureData: '' });
                            setExpanded(false);
                            showAlert('템플릿이 삭제되었습니다.\n앞으로 신규 입사자는 근로계약서 없이 입사합니다.', '삭제 완료', 'success');
                        } catch(e) { showAlert('삭제 실패: ' + e.message, '오류', 'error'); }
                    },
                    '템플릿 삭제'
                );
            };

            const handleSave = async () => {
                if (!firebaseUser) return;
                if (!title.trim()) { showAlert('제목을 입력해주세요.', '입력 오류', 'alert'); return; }
                const emptySections = sections.some(s => !s.content.trim());
                if (emptySections) { showAlert('모든 내용칸을 입력해주세요.', '입력 오류', 'alert'); return; }
                const isFirstSave = !existing;
                setSaving(true);
                try {
                    // 서명을 새로 그리지 않았으면 기존 서명 유지
                    const finalOwnerInfo = ownerInfo.signatureData
                        ? ownerInfo
                        : { ...ownerInfo, signatureData: existing?.ownerInfo?.signatureData || '' };
                    const template = { title: title.trim(), sections, ownerInfo: finalOwnerInfo };
                    await saveContractTemplate(workspaceId || firebaseUser.uid, template);
                    setWorkspaceInfo(prev => ({ ...prev, contractTemplate: template }));

                    showAlert('근로계약서 템플릿이 저장되었습니다.', '저장 완료', 'success');
                } catch(e) { showAlert('저장 실패: ' + e.message, '오류', 'error'); }
                setSaving(false);
            };

            return (
            <>
                <div className="max-w-md mx-auto mt-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setExpanded(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-purple-100 p-2.5 rounded-xl">
                                <svg className="w-6 h-6 text-purple-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">근로계약서 설정</h2>
                                <p className="text-xs text-gray-500">{existing ? '템플릿 설정됨' : '미설정'}</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${expanded ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {expanded && (
                        <div className="px-6 pb-6 space-y-4 border-t border-gray-100 pt-4">

                                <input value={title} onChange={e => setTitle(e.target.value)}

                                    <div className="flex items-center justify-between mb-1">

                                    </div>
                                </div>
                            ))}

                            <button onClick={addSection} className="w-full border-2 border-dashed border-gray-300 text-gray-500 py-2.5 rounded-xl text-sm hover:border-purple-400 hover:text-purple-600 transition">
                                + 내용 추가하기
                            </button>

                            {/* 사업주 정보 */}
                            <div className="border-2 border-blue-200 rounded-xl p-4 space-y-3 bg-blue-50">
                                <p className="text-xs font-bold text-blue-700">사업주 정보 (항상 최하단 고정)</p>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">사업체명</label>
                                    <input value={ownerInfo.shopName} onChange={e => setOwnerInfo(p => ({...p, shopName: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="예: 홍길동 카페" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">전화번호</label>
                                    <input value={ownerInfo.phone} onChange={e => setOwnerInfo(p => ({...p, phone: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="010-0000-0000" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">주소</label>
                                    <input value={ownerInfo.address} onChange={e => setOwnerInfo(p => ({...p, address: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="서울시 강남구 테헤란로 123" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">대표자</label>
                                    <input value={ownerInfo.representative} onChange={e => setOwnerInfo(p => ({...p, representative: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="홍길동" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">대표자 서명</label>
                                    {existing?.ownerInfo?.signatureData && !ownerInfo.signatureData && (
                                        <div className="mb-2 p-2 border border-gray-200 rounded-xl bg-white">
                                            <p className="text-xs text-gray-400 mb-1">현재 저장된 서명 (새로 그리지 않으면 유지됩니다)</p>
                                            <img src={existing.ownerInfo.signatureData} alt="기존서명" className="h-12 object-contain" />
                                        </div>
                                    )}
                                    <SignatureCanvas onSave={sig => setOwnerInfo(p => ({...p, signatureData: sig}))} width={360} height={100} />
                                    {ownerInfo.signatureData && (
                                        <div className="mt-2">
                                            <p className="text-xs text-gray-500 mb-1">서명 미리보기:</p>
                                            <img src={ownerInfo.signatureData} alt="서명" className="h-12 border rounded-lg bg-white p-1 object-contain" />
                                        </div>
                                    )}
                                </div>
                            </div>

                            <button onClick={handleSave} disabled={saving}
                                className="w-full bg-purple-600 text-white py-3.5 rounded-xl font-bold hover:bg-purple-700 transition disabled:opacity-50">
                                {saving ? '저장 중...' : '근로계약서 템플릿 저장'}
                            </button>
                            {existing && (
                                <button onClick={handleDeleteTemplate}
                                    className="w-full bg-red-50 text-red-600 border border-red-200 py-3 rounded-xl font-bold hover:bg-red-100 transition text-sm">
                                    템플릿 삭제
                                </button>
                            )}
                        </div>
                    )}
                </div>
            </>
            );
        }

        // ─── 업체 삭제 섹션 ───
        function WorkspaceDeleteSection({ isDeleting, deleteScheduledAt, onDelete, onCancel, showConfirm, shopName }) {
            const [open, setOpen] = useState(isDeleting);
            const [tick, setTick] = useState(0);
            useEffect(() => {
                if (!isDeleting) return;
                setOpen(true);
                const t = setInterval(() => setTick(n => n + 1), 60000);
                return () => clearInterval(t);
            }, [isDeleting]);

            const handleDeleteClick = () => {
                showConfirm(
                    `"${shopName || '이 업체'}"를 삭제 예약하시겠습니까?\n\n` +
                    `• 삭제 버튼을 누른 후 24시간 뒤에 모든 데이터가 영구 삭제됩니다.\n` +
                    `• 24시간 이내에 복구 버튼을 누르면 취소할 수 있습니다.\n` +
                    `• 삭제 중에는 데이터 열람만 가능합니다.`,
                    onDelete,
                    '업체 삭제 확인'
                );
            };

            return (
                <div className="max-w-md mx-auto mt-6 mb-8 bg-white rounded-2xl shadow-sm border border-red-100 overflow-hidden">
                    <button onClick={() => setOpen(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-red-100 p-2.5 rounded-xl">
                                <Trash2 className="w-6 h-6 text-red-600" />
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-red-700">업체 삭제</h2>
                                {isDeleting
                                    ? <p className="text-xs text-red-500 font-medium">{formatDeleteRemaining(deleteScheduledAt)} 후 삭제 예정</p>
                                    : <p className="text-xs text-gray-500">삭제 후 24시간 이내 복구 가능</p>
                                }
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform flex-shrink-0 ${open ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {open && (
                        <div className="px-6 pb-6 border-t border-red-50 pt-4">
                            {isDeleting ? (
                                <div className="space-y-4">
                                    <div className="bg-red-50 rounded-xl p-4 border border-red-200">
                                        <p className="text-red-700 font-bold text-sm mb-1">⚠️ 삭제 예약 중</p>
                                        <p className="text-red-600 text-sm">
                                            <span className="font-bold">{formatDeleteRemaining(deleteScheduledAt)}</span> 후에 모든 데이터가 영구 삭제됩니다.
                                        </p>
                                        <p className="text-red-500 text-xs mt-1">현재 열람만 가능합니다.</p>
                                    </div>
                                    <button
                                        onClick={onCancel}
                                        className="w-full py-3.5 bg-green-600 text-white font-bold rounded-xl hover:bg-green-700 transition flex items-center justify-center gap-2"
                                    >
                                        <CheckCircle2 className="w-5 h-5" />
                                        삭제 취소 (복구하기)
                                    </button>
                                </div>
                            ) : (
                                <div className="space-y-3">
                                    <p className="text-sm text-gray-600">
                                        업체를 삭제하면 모든 근무자, 근무 기록, 설정이 영구적으로 삭제됩니다.
                                        삭제 버튼 클릭 후 24시간 이내에는 복구할 수 있습니다.
                                    </p>
                                    <button
                                        onClick={handleDeleteClick}
                                        className="w-full py-3.5 bg-red-500 text-white font-bold rounded-xl hover:bg-red-600 transition flex items-center justify-center gap-2"
                                    >
                                        <Trash2 className="w-5 h-5" />
                                        이 업체 삭제
                                    </button>
                                </div>
                            )}
                        </div>
                    )}
                </div>
            );
        }

        function PayslipSendSettings({ workspaceInfo, setWorkspaceInfo, workspaceId, firebaseUser, showAlert }) {
            const [open, setOpen] = useState(false);
            const [bossName, setBossName] = useState(workspaceInfo?.bossName || '');
            const [bossSignature, setBossSignature] = useState(workspaceInfo?.bossSignature || '');
            const [saving, setSaving] = useState(false);

            // 근로계약서 템플릿에서 대표자 정보 자동 불러오기
            useEffect(() => {
                const tmpl = workspaceInfo?.contractTemplate?.ownerInfo;
                if (!tmpl) return;
                if (!bossName && tmpl.representative) setBossName(tmpl.representative);
                if (!bossSignature && tmpl.signatureData) setBossSignature(tmpl.signatureData);
            }, [workspaceInfo?.contractTemplate]);

            const handleSave = async () => {
                if (!firebaseUser) return;
                setSaving(true);
                try {
                    await fbDb.collection('workspaces').doc(workspaceId || firebaseUser.uid).update({ bossName, bossSignature });
                    setWorkspaceInfo(prev => ({ ...prev, bossName, bossSignature }));
                    showAlert('저장되었습니다.', '저장 완료', 'success');
                } catch(e) { showAlert('저장 실패: ' + e.message, '오류', 'error'); }
                setSaving(false);
            };

            return (
                <div className="max-w-md mx-auto mt-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setOpen(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-emerald-100 p-2.5 rounded-xl">
                                <svg className="w-6 h-6 text-emerald-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">급여명세서 대표자 서명</h2>
                                <p className="text-xs text-gray-500">급여명세서에 첨부될 대표자 정보</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${open ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>
                    {open && (
                        <div className="px-6 pb-6 border-t border-gray-100 pt-4 space-y-4">
                            <div>
                                <p className="text-sm font-bold text-gray-700 mb-2">대표자 이름</p>
                                <input type="text" value={bossName} onChange={e => setBossName(e.target.value)}
                                    placeholder="대표자 성명"
                                    className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-emerald-500 outline-none text-sm transition" />
                            </div>
                            <div>
                                <p className="text-sm font-bold text-gray-700 mb-2">대표자 서명</p>
                                {bossSignature && (
                                    <div className="mb-2">
                                        <p className="text-xs text-gray-400 mb-1">현재 서명</p>
                                        <img src={bossSignature} alt="서명" className="h-14 border border-gray-200 rounded-xl bg-white p-1 object-contain" />
                                    </div>
                                )}
                                <SignatureCanvas onSave={sig => setBossSignature(sig)} width={360} height={100} />
                                {!bossSignature && <p className="text-xs text-gray-400 mt-1">서명을 등록하면 급여명세서에 자동으로 첨부됩니다.</p>}
                            </div>
                            <button onClick={handleSave} disabled={saving} className="w-full bg-emerald-600 text-white font-bold py-3.5 rounded-xl hover:bg-emerald-700 transition disabled:opacity-50">
                                {saving ? '저장 중...' : '저장하기'}
                            </button>
                        </div>
                    )}
                </div>
            );
        }

        function TabSettings({ appPin, setAppPin, showAlert, showConfirm, workspaceInfo, setWorkspaceInfo, firebaseUser, workspaceId, isDeleting, deleteScheduledAt, onDeleteWorkspace, onCancelDeleteWorkspace, employees, setEmployees }) {
            const [currentPin, setCurrentPin] = useState('');
            const [newPin, setNewPin] = useState('');
            const [confirmPin, setConfirmPin] = useState('');
            const [message, setMessage] = useState('');
            const [localTimeUnit, setLocalTimeUnit] = useState(workspaceInfo?.timeUnit || 'hour');
            const [savingUnit, setSavingUnit] = useState(false);
            const [openPin, setOpenPin] = useState(false);
            const [openTimeUnit, setOpenTimeUnit] = useState(false);

            const currentRef = useRef(null);
            const newRef = useRef(null);
            const confirmRef = useRef(null);

            const handleSaveTimeUnit = async () => {
                if (!firebaseUser) return;
                setSavingUnit(true);
                try {
                    await fbDb.collection('workspaces').doc(workspaceId || firebaseUser.uid).update({ timeUnit: localTimeUnit });
                    setWorkspaceInfo(prev => ({ ...prev, timeUnit: localTimeUnit }));
                    showAlert('입력 단위가 저장되었습니다.', '저장 완료', 'success');
                } catch(e) {
                    showAlert('저장 실패: ' + e.message, '오류', 'error');
                }
                setSavingUnit(false);
            };

            const handleInput = (e, setter, nextRef) => {
                const val = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
                setter(val);
                if (val.length === 6 && nextRef) nextRef.current.focus();
            };

            const handleKeyDown = (e) => {
                if (e.key === 'Enter' && currentPin.length===6 && newPin.length===6 && confirmPin.length===6) {
                    handleSave();
                }
            };

            const handleSave = () => {
                if (currentPin !== appPin) {
                    setMessage({ type: 'error', text: '현재 비밀번호가 일치하지 않습니다.' });
                    return;
                }
                if (newPin.length !== 6) {
                    setMessage({ type: 'error', text: '새 비밀번호는 6자리 숫자여야 합니다.' });
                    return;
                }
                if (newPin !== confirmPin) {
                    setMessage({ type: 'error', text: '새 비밀번호와 확인이 일치하지 않습니다.' });
                    return;
                }

                setAppPin(newPin);
                showAlert('비밀번호가 성공적으로 변경되었습니다.', '성공', 'success');
                setMessage('');
                setCurrentPin('');
                setNewPin('');
                setConfirmPin('');
            };

            return (
                <>
                {/* 앱 잠금 비밀번호 변경 */}
                <div className="max-w-md mx-auto mt-8 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setOpenPin(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-gray-100 p-2.5 rounded-xl"><Lock className="w-6 h-6 text-gray-700" /></div>
                            <h2 className="text-xl font-bold text-gray-800">앱 잠금 비밀번호 변경</h2>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${openPin ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {openPin && (
                        <div className="px-6 pb-6 border-t border-gray-100 pt-4">
                            {message && (
                                <div className={`p-4 rounded-xl mb-6 flex items-center gap-2 text-sm font-medium ${message.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                                    {message.type === 'error' ? <AlertCircle className="w-5 h-5" /> : <CheckCircle2 className="w-5 h-5" />}
                                    {message.text}
                                </div>
                            )}

                            <div className="space-y-5" onKeyDown={handleKeyDown}>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">현재 비밀번호 (6자리 숫자)</label>
                                    <input
                                        type="password" ref={currentRef} value={currentPin} onChange={e => handleInput(e, setCurrentPin, newRef)}
                                        className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-green-500 outline-none transition"
                                        placeholder="••••••"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">새 비밀번호</label>
                                    <input
                                        type="password" ref={newRef} value={newPin} onChange={e => handleInput(e, setNewPin, confirmRef)}
                                        className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-green-500 outline-none transition"
                                        placeholder="••••••"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">새 비밀번호 확인</label>
                                    <input
                                        type="password" ref={confirmRef} value={confirmPin} onChange={e => handleInput(e, setConfirmPin, null)}
                                        className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-green-500 outline-none transition"
                                        placeholder="••••••"
                                    />
                                </div>

                                <button
                                    onClick={handleSave}
                                    className="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition shadow-sm"
                                >
                                    저장하기 (Enter)
                                </button>
                            </div>
                        </div>
                    )}
                </div>

                {/* 근무시간 입력 단위 설정 */}
                <div className="max-w-md mx-auto mt-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setOpenTimeUnit(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-100 p-2.5 rounded-xl">
                                <svg className="w-6 h-6 text-blue-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">근무시간 입력 단위</h2>
                                <p className="text-xs text-gray-500">직원용 화면에서 시간 입력 시 적용되는 단위</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${openTimeUnit ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {openTimeUnit && (
                        <div className="px-6 pb-6 border-t border-gray-100 pt-4">
                            <div className="space-y-2 mb-5">
                                {[
                                    { value: 'hour',   label: '1시간 단위', desc: '예: 8시간' },
                                    { value: 'half',   label: '30분 단위',  desc: '예: 8시간 / 8시간 30분' },
                                    { value: 'ten',    label: '10분 단위',  desc: '예: 8시간 20분 (슬라이드 선택)' },
                                    { value: 'minute', label: '1분 단위',   desc: '예: 8시간 45분 (직접 입력)' },
                                ].map(opt => (
                                    <label key={opt.value} className={`flex items-center gap-3 p-3 border-2 rounded-xl cursor-pointer transition ${localTimeUnit === opt.value ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                        <input type="radio" name="timeUnit" value={opt.value} checked={localTimeUnit === opt.value} onChange={() => setLocalTimeUnit(opt.value)} className="accent-blue-600" />
                                        <div>
                                            <p className="font-bold text-gray-800 text-sm">{opt.label}</p>
                                            <p className="text-xs text-gray-400">{opt.desc}</p>
                                        </div>
                                    </label>
                                ))}
                            </div>
                            <button onClick={handleSaveTimeUnit} disabled={savingUnit} className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition disabled:opacity-50">
                                {savingUnit ? '저장 중...' : '저장하기'}
                            </button>
                        </div>
                    )}
                </div>

                {/* 급여지급일 자동발송 설정 */}
                {!isDeleting && <PayslipSendSettings workspaceInfo={workspaceInfo} setWorkspaceInfo={setWorkspaceInfo} workspaceId={workspaceId} firebaseUser={firebaseUser} showAlert={showAlert} employees={employees} setEmployees={setEmployees} />}

                {/* 근로계약서 설정 */}
                {!isDeleting && (
                    <ContractTemplateEditor
                        workspaceInfo={workspaceInfo}
                        setWorkspaceInfo={setWorkspaceInfo}
                        workspaceId={workspaceId}
                        firebaseUser={firebaseUser}
                        showAlert={showAlert}
                        showConfirm={showConfirm}
                        employees={employees}
                        setEmployees={setEmployees}
                    />
                )}

                {/* 업체 삭제 */}
                <WorkspaceDeleteSection
                    isDeleting={isDeleting}
                    deleteScheduledAt={deleteScheduledAt}
                    onDelete={onDeleteWorkspace}
                    onCancel={onCancelDeleteWorkspace}
                    showConfirm={showConfirm}
                    shopName={workspaceInfo?.shopName}
                />

                {/* 개인정보처리방침 */}
                <div className="max-w-md mx-auto mt-6 mb-8 text-center">
                    <a href="./privacy.html" target="_blank" className="text-sm text-gray-400 hover:text-blue-500 underline">개인정보처리방침</a>
                </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlbaTracker />);
    </script>

    <!-- Service Worker 등록: PWA installable 조건 충족용 빈 fetch handler.
         가로채기·캐싱이 없어 OAuth 플로우와 페이지 갱신을 망치지 않음. -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
