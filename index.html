                </div>
            );
        }

        function TabPayroll({ employees, monthlyData, showAlert, workspaceId, workspaceInfo, firebaseUser }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month]);

            const payrollTouchStartX = useRef(null);
            const payrollTouchStartY = useRef(null);
            const payrollIsHorizontal = useRef(false);
            const payrollCarouselRef = useRef(null);
            const payrollStripRef = useRef(null);
            const setPayrollStrip = (dx, withTransition) => {
                const el = payrollStripRef.current;
                if (!el) return;
                el.style.transition = withTransition ? 'transform 0.25s ease-out' : 'none';
                el.style.transform = `translate3d(calc(-33.3333% + ${dx}px), 0, 0)`;
            };
            const clearPayrollStrip = () => {
                const el = payrollStripRef.current;
                if (!el) return;
                el.style.transition = 'none';
                el.style.transform = '';
            };
            const handlePayrollTouchStart = (e) => {
                payrollTouchStartX.current = e.touches[0].clientX;
                payrollTouchStartY.current = e.touches[0].clientY;
                payrollIsHorizontal.current = false;
                clearPayrollStrip();
            };
            const handlePayrollTouchMove = (e) => {
                if (payrollTouchStartX.current === null) return;
                const dx = e.touches[0].clientX - payrollTouchStartX.current;
                const dy = e.touches[0].clientY - payrollTouchStartY.current;
                if (!payrollIsHorizontal.current) {
                    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                    payrollIsHorizontal.current = Math.abs(dx) > Math.abs(dy);
                    if (!payrollIsHorizontal.current) return;
                }
                setPayrollStrip(dx, false);
            };
            const handlePayrollTouchEnd = (e) => {
                if (payrollTouchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - payrollTouchStartX.current;
                const wasHorizontal = payrollIsHorizontal.current;
                payrollTouchStartX.current = null;
                if (!wasHorizontal) { clearPayrollStrip(); return; }
                const w = payrollCarouselRef.current?.clientWidth || window.innerWidth;
                if (Math.abs(dx) > 80) {
                    setPayrollStrip(dx < 0 ? -w : w, true);
                    setTimeout(() => {
                        clearPayrollStrip();
                        if (dx < 0) nextMonth(); else prevMonth();
                    }, 260);
                } else {
                    setPayrollStrip(0, true);
                    setTimeout(clearPayrollStrip, 260);
                }
            };

            const computePayrollList = (py, pm) => {
                const pmKey = `${py}-${pm.toString().padStart(2,'0')}`;
                const list = {};
                const monthData = monthlyData[pmKey]?.days || {};
                Object.values(monthData).forEach(day => {
                    Object.entries(day.entries || {}).forEach(([empId, data]) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: currentEmp?.name || data.name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || 'ВаЋв│┤ ВЌєВЮї',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || data.wage || MIN_WAGE,
                                memos: currentEmp?.memos || [],
                                totalPay: 0, totalHours: 0, holidayPay: 0, holidayWeeks: [], wageBreakdown: {}
                            };
                        }
                        list[empId].totalPay += data.pay;
                        list[empId].totalHours += data.hours;
                        const w = data.wage || list[empId].wage;
                        if (!list[empId].wageBreakdown[w]) list[empId].wageBreakdown[w] = { hours: 0, pay: 0, days: 0 };
                        list[empId].wageBreakdown[w].hours += data.hours;
                        list[empId].wageBreakdown[w].pay += data.pay;
                        list[empId].wageBreakdown[w].days += 1;
                    });
                });
                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== py || sm !== pm) return;
                    weekData.forEach(({ empId, holidayPay, name, weeklyHours, weeklyPay }) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || 'ВаЋв│┤ ВЌєВЮї',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || MIN_WAGE,
                                memos: currentEmp?.memos || [],
                                totalPay: 0, totalHours: 0, holidayPay: 0, holidayWeeks: [], wageBreakdown: {}
                            };
                        }
                        list[empId].holidayPay += holidayPay;
                        list[empId].holidayWeeks.push({ weeklyHours, weeklyPay, holidayPay });
                    });
                });
                const result = Object.values(list).sort((a, b) => a.displayId - b.displayId);
                result.forEach(item => {
                    const emp = employees.find(e => e.id.toString() === item.id);
                    const ins = getInsuranceInfo(workspaceInfo, emp);
                    item.insuranceRate = ins.rate;
                    item.insuranceName = ins.name;
                    const gross = item.totalPay + item.holidayPay;
                    item.insuranceDeduction = ins.rate > 0 ? Math.round(gross * ins.rate / 100) : 0;
                    item.finalPay = gross - item.insuranceDeduction;
                });
                return result;
            };
            const payrollList = useMemo(() => computePayrollList(year, month), [monthKey, monthlyData, employees, year, month, workspaceInfo]);

            const grandTotal = payrollList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);
            const grandTotalFinal = payrollList.reduce((sum, item) => sum + item.finalPay, 0);

            // ЖИЅВЌгвфЁВёИВёю в░юВєА
            const [sendModal, setSendModal] = useState(null); // { item }
            const [sendIncludeHoliday, setSendIncludeHoliday] = useState(true);
            const [sending, setSending] = useState(false);

            // в░юВєА ВЎёвБї ВХћВаЂ
            const [sentPayslips, setSentPayslips] = useState({});
            useEffect(() => {
                if (!workspaceId) return;
                const unsub = fbDb.collection('workspaces').doc(workspaceId)
                    .collection('payslips')
                    .where('year', '==', year).where('month', '==', month)
                    .onSnapshot(snap => {
                        const map = {};
                        snap.forEach(d => { map[d.id] = d.data(); });
                        setSentPayslips(map);
                    }, () => {});
                return () => unsub();
            }, [workspaceId, year, month]);

            const parsePayDate = (str) => {
                if (!str) return todayDateVal();
                const m = str.match(/(\d{4})вЁё\s*(\d{1,2})ВЏћ\s*(\d{1,2})ВЮ╝/);
                if (!m) return todayDateVal();
                return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
            };

            // ВЮ╝Ж┤ёв░юВєА
            const [bulkModal, setBulkModal] = useState(false);
            const [bulkIncludeHoliday, setBulkIncludeHoliday] = useState(true);
            const [bulkDeductInsurance, setBulkDeductInsurance] = useState(false);
            const [bulkSending, setBulkSending] = useState(false);
            const [bulkPayDate, setBulkPayDate] = useState('');
            const [sendPayDate, setSendPayDate] = useState('');
            const [sendDeductInsurance, setSendDeductInsurance] = useState(false);

            const todayDateVal = () => new Date().toISOString().split('T')[0];
            const fmtPayDate = (val) => {
                if (!val) return '';
                const [y, m, d] = val.split('-');
                return `${y}вЁё ${m}ВЏћ ${d}ВЮ╝`;
            };

            const handleBulkSend = async () => {
                if (!workspaceId || payrollList.length === 0) return;
                setBulkSending(true);
                let successCount = 0;
                for (const item of payrollList.filter(i => i.displayId !== 99999 && employees.find(e => e.id.toString() === i.id)?.empUid)) {
                    try {
                        const beforeInsurance = bulkIncludeHoliday ? (item.totalPay + item.holidayPay) : item.totalPay;
                        const insRate = item.insuranceRate || 0;
                        const insName = item.insuranceName || '';
                        const finalAmount = bulkDeductInsurance && insRate > 0 ? Math.round(beforeInsurance * (1 - insRate / 100)) : beforeInsurance;
                        const wages = Object.entries(item.wageBreakdown || {});
                        const calcLines = [];
                        if (wages.length <= 1) {
                            calcLines.push(`ВІюЖИЅ: ${Number(wages[0]?.[0] || item.wage).toLocaleString()}ВЏљ`, `Жи╝вг┤ВІюЖ░ё: ${fmtHours(item.totalHours)}`);
                        } else {
                            wages.sort((a, b) => Number(a[0]) - Number(b[0])).forEach(([w, info]) => {
                                calcLines.push(`ВІюЖИЅ ${Number(w).toLocaleString()}ВЏљ ├Ќ ${info.days}ВЮ╝(${fmtHours(info.hours)}) = ${Number(info.pay).toLocaleString()}ВЏљ`);
                            });
                        }
                        if (bulkIncludeHoliday && item.holidayPay > 0) calcLines.push(`ВБ╝ью┤ВѕўвІ╣: ${Number(item.holidayPay).toLocaleString()}ВЏљ`);
                        if (bulkDeductInsurance && insRate > 0) calcLines.push(`${insName || 'Ж│хВаю'} ${insRate}% ВаюВЎИ: -${Number(beforeInsurance - finalAmount).toLocaleString()}ВЏљ`);
                        const docId = `${item.id}_${year}_${month}`;
                        const emp = employees.find(e => e.id.toString() === item.id);
                        const payslipData = {
                            empId: String(item.id), empName: item.name, year, month,
                            empUid: emp?.empUid || '',
                            totalPay: item.totalPay, holidayPay: item.holidayPay,
                            includeHoliday: bulkIncludeHoliday, deductInsurance: bulkDeductInsurance, finalAmount,
                            insuranceName: insName, insuranceRate: insRate,
                            wage: item.wage, totalHours: item.totalHours,
                            calcMethod: calcLines.join('\n'),
                            payDate: fmtPayDate(bulkPayDate) || fmtPayDate(todayDateVal()),
                            shopName: workspaceInfo?.shopName || '',
                            bossName: workspaceInfo?.bossName || '',
                            bossSignature: workspaceInfo?.bossSignature || '',
                            sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                            read: false
                        };
                        await fbDb.collection('workspaces').doc(workspaceId).collection('payslips').doc(docId).set(payslipData);
                        if (emp?.empUid) {
                            addEmpNotification(emp.empUid, {
                                type: 'payslip', year, month,
                                message: `${year}вЁё ${month}ВЏћ ЖИЅВЌгвфЁВёИВёюЖ░ђ вЈёВ░ЕьќѕВіхвІѕвІц.`,
                                payslipDocId: docId, bossUid: workspaceId
                            }).catch(() => {});
                        }
                        successCount++;
                    } catch(e) {}
                }
                setBulkSending(false);
                setBulkModal(false);
                showAlert(`${successCount}вфЁВЌљЖ▓ї ${month}ВЏћ ЖИЅВЌгвфЁВёИВёювЦ╝ в░юВєАьќѕВіхвІѕвІц.`, 'ВЮ╝Ж┤ёв░юВєА ВЎёвБї', 'success');
            };

            const handleOpenSend = (item, existing = null) => {
                setSendIncludeHoliday(false);
                setSendDeductInsurance(existing ? !!existing.deductInsurance : false);
                setSendPayDate(existing ? parsePayDate(existing.payDate) : todayDateVal());
                setSendModal({ item, isResend: !!existing });
            };

            const handleSendPayslip = async () => {
                if (!sendModal || !workspaceId) return;
                setSending(true);
                const { item } = sendModal;
                const beforeInsurance = sendIncludeHoliday ? (item.totalPay + item.holidayPay) : item.totalPay;
                const insRate = item.insuranceRate || 0;
                const insName = item.insuranceName || '';
                const finalAmount = sendDeductInsurance && insRate > 0 ? Math.round(beforeInsurance * (1 - insRate / 100)) : beforeInsurance;
                const wages = Object.entries(item.wageBreakdown || {});
                const calcLines = [];
                if (wages.length <= 1) {
                    calcLines.push(`ВІюЖИЅ: ${Number(wages[0]?.[0] || item.wage).toLocaleString()}ВЏљ`, `Жи╝вг┤ВІюЖ░ё: ${fmtHours(item.totalHours)}`);
                } else {
                    wages.sort((a, b) => Number(a[0]) - Number(b[0])).forEach(([w, info]) => {
                        calcLines.push(`ВІюЖИЅ ${Number(w).toLocaleString()}ВЏљ ├Ќ ${info.days}ВЮ╝(${fmtHours(info.hours)}) = ${Number(info.pay).toLocaleString()}ВЏљ`);
                    });
                }
                if (sendIncludeHoliday && item.holidayPay > 0) calcLines.push(`ВБ╝ью┤ВѕўвІ╣: ${Number(item.holidayPay).toLocaleString()}ВЏљ`);
                if (sendDeductInsurance && insRate > 0) calcLines.push(`${insName || 'Ж│хВаю'} ${insRate}% ВаюВЎИ: -${Number(beforeInsurance - finalAmount).toLocaleString()}ВЏљ`);
                const calcMethod = calcLines.join('\n');
                const payDate = fmtPayDate(sendPayDate) || fmtPayDate(todayDateVal());
                const docId = `${item.id}_${year}_${month}`;
                const emp = employees.find(e => e.id.toString() === item.id);
                const payslipData = {
                    empId: String(item.id), empName: item.name, year, month,
                    empUid: emp?.empUid || '',
                    totalPay: item.totalPay, holidayPay: item.holidayPay,
                    includeHoliday: sendIncludeHoliday, deductInsurance: sendDeductInsurance, finalAmount,
                    insuranceName: insName, insuranceRate: insRate,
                    wage: item.wage, totalHours: item.totalHours,
                    calcMethod, payDate,
                    shopName: workspaceInfo?.shopName || '',
                    bossName: workspaceInfo?.bossName || '',
                    bossSignature: workspaceInfo?.bossSignature || '',
                    sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                };
                try {
                    await fbDb.collection('workspaces').doc(workspaceId)
                        .collection('payslips').doc(docId).set(payslipData);
                    // Google ВДЂВЏљВЮ┤вЕ┤ ВЋївд╝вЈё в░юВєА (ВІцьїеьЋ┤вЈё вфЁВёИВёю в░юВєАВЮђ Вё▒Ж│х В▓ўвдг)
                    if (emp?.empUid) {
                        addEmpNotification(emp.empUid, {
                                type: 'payslip', year, month,
                                message: `${year}вЁё ${month}ВЏћ ЖИЅВЌгвфЁВёИВёюЖ░ђ вЈёВ░ЕьќѕВіхвІѕвІц.`,
                                payslipDocId: docId, bossUid: workspaceId
                            }).catch(() => {});
                    }
                    showAlert(`${item.name}вІўЖ╗ў ${month}ВЏћ ЖИЅВЌгвфЁВёИВёювЦ╝ в░юВєАьќѕВіхвІѕвІц.`, 'в░юВєА ВЎёвБї', 'success');
                    setSendModal(null);
                } catch(e) {
                    showAlert('в░юВєА ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
                setSending(false);
            };

            const handleExcelDownload = () => {
                if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
                    showAlert('ВЌЉВЁђ вІцВџ┤вАювЊювіћ PCв▓ёВаёВЌљВёювДї ВѓгВџЕ Ж░ђвіЦьЋЕвІѕвІц.', 'ВЋѕвѓ┤');
                    return;
                }

                const daysInMonth = new Date(year, month, 0).getDate();
                const monthData = monthlyData[monthKey]?.days || {};

                // РћђРћђ ьЃГ1: ВЮ╝в│ёЖи╝вг┤ВІюЖ░ё РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
                // ьЌцвЇћьќЅ: в╣ѕВ╣И + Жи╝вг┤ВъљвфЁ вфЕвАЮ
                const sheet1Header = ['вѓаВДю', ...payrollList.map(item => item.name)];
                const sheet1Rows = [sheet1Header];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayData = monthData[d]?.entries || {};
                    const row = [`${d}ВЮ╝`];
                    payrollList.forEach(item => {
                        const entry = dayData[item.id];
                        row.push(entry ? entry.hours : '');
                    });
                    sheet1Rows.push(row);
                }

                const autoColWidth = (rows, minWidth = 4, padding = 1) => {
                    const cols = rows[0]?.length || 0;
                    const widths = Array(cols).fill(minWidth);
                    rows.forEach(row => {
                        row.forEach((cell, c) => {
                            const len = cell != null ? String(cell).length : 0;
                            // ьЋюЖИђВЮђ ВЋй 2в░░ вёѕв╣ё
                            const korLen = (String(cell || '').match(/[Ж░ђ-ьъБ]/g) || []).length;
                            const w = len + korLen + padding;
                            if (w > widths[c]) widths[c] = w;
                        });
                    });
                    return widths.map(w => ({ wch: w }));
                };
                const ws1 = XLSX.utils.aoa_to_sheet(sheet1Rows);
                ws1['!cols'] = autoColWidth(sheet1Rows);
                // ьЃГ1 ВіцьЃђВЮ╝: XВХЋ(ьЌцвЇћьќЅ) ВЌ░ьЋюВ┤ѕвАЮ, YВХЋ(вѓаВДюВЌ┤) ВЌ░ьЋювЁИвъЉ, Ж░ђВџ┤вЇ░ВаЋваг
                const greenFill = { fgColor: { rgb: 'D5F5E3' } };
                const yellowFill = { fgColor: { rgb: 'FFF9C4' } };
                const center = { horizontal: 'center', vertical: 'center' };
                const headerFont = { bold: true };
                for (let c = 0; c < sheet1Header.length; c++) {
                    const addr = XLSX.utils.encode_cell({ r: 0, c });
                    if (ws1[addr]) ws1[addr].s = { fill: greenFill, font: headerFont, alignment: center };
                }
                for (let r = 1; r < sheet1Rows.length; r++) {
                    const addr = XLSX.utils.encode_cell({ r, c: 0 });
                    if (ws1[addr]) ws1[addr].s = { fill: yellowFill, font: headerFont, alignment: center };
                    for (let c = 1; c < sheet1Header.length; c++) {
                        const addr2 = XLSX.utils.encode_cell({ r, c });
                        if (ws1[addr2]) ws1[addr2].s = { alignment: center };
                    }
                }

                // РћђРћђ ьЃГ2: ЖИЅВЌгЖ│ёВѓ░ РћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђРћђ
                // вЕћвфе Вхювїђ Ж░юВѕў Ж│ёВѓ░
                const maxMemos = payrollList.reduce((max, item) => Math.max(max, (item.memos || []).length), 0);
                const memoHeaders = Array.from({ length: maxMemos }, (_, i) => `вЕћвфе${i + 1}`);

                const hasInsurance = payrollList.some(i => i.insuranceRate > 0);
                const insMode = workspaceInfo?.insuranceMode || 'none';
                const gRate = parseFloat(workspaceInfo?.insuranceRate) || 0;
                const showInsCol = insMode !== 'none' && hasInsurance;
                const insHeaderLabel = showInsCol
                    ? (insMode === 'global' && workspaceInfo?.insuranceName ? `${workspaceInfo.insuranceName}(-${gRate}%)` : 'ЖИЅВЌг Ж│хВаю')
                    : 'ЖИЅВЌг Ж│хВаю';
                const sheet2Header = [
                    'ЖхгвХёв▓ѕьўИ', 'Жи╝вг┤ВъљвфЁ',
                    'В┤Ю Жи╝вг┤ВІюЖ░ё', 'ВІюЖИЅ',
                    'ВІюЖ░ёЖИЅВЌг', 'ВБ╝ью┤ВѕўвІ╣', 'В┤Ю ЖИЅВЌг',
                    ...(showInsCol ? [insHeaderLabel] : []),
                    'ВІцВаю ВДђЖИЅВЋА', 'ВДђЖИЅВЮ╝',
                    ...memoHeaders
                ];
                const sheet2Rows = [sheet2Header];

                payrollList.forEach((item, idx) => {
                    const timePay = item.totalPay;
                    const totalPay = timePay + item.holidayPay;
                    const afterInsurance = item.insuranceRate > 0 ? item.finalPay : totalPay;
                    const wages = Object.entries(item.wageBreakdown || {});
                    const wageStr = wages.length <= 1 ? String(wages[0]?.[0] || item.wage) : wages.map(([w, info]) => `${Number(w).toLocaleString()}ВЏљ(${info.days}ВЮ╝)`).join(' / ');
                    const memoCells = Array.from({ length: maxMemos }, (_, i) => (item.memos || [])[i] || '');
                    sheet2Rows.push([
                        idx + 1,
                        item.name,
                        item.totalHours,
                        wageStr,
                        timePay,
                        item.holidayPay,
                        totalPay,
                        ...(showInsCol ? [afterInsurance] : []),
                        '',   // ВІцВаю ВДђЖИЅВЋА Ж│хвъђ
                        '',   // ВДђЖИЅВЮ╝ Ж│хвъђ
                        ...memoCells
                    ]);
                });

                const ws2 = XLSX.utils.aoa_to_sheet(sheet2Rows);
                const ws2Cols = autoColWidth(sheet2Rows);
                // ВДђЖИЅВЮ╝ ВЌ┤ ВхюВєї вёѕв╣ё 15
                const payDateIdx = showInsCol ? 9 : 8;
                if (ws2Cols[payDateIdx]) ws2Cols[payDateIdx].wch = 15;
                ws2['!cols'] = ws2Cols;
                // ьЃГ2 ВіцьЃђВЮ╝: XВХЋ(ьЌцвЇћьќЅ) ВЌ░ьЋюВ┤ѕвАЮ, YВХЋ(ЖхгвХёв▓ѕьўИ+Жи╝вг┤ВъљвфЁ) ВЌ░ьЋювЁИвъЉ
                // ЖИѕВЋА В╗гвЪ╝ВЮђ ВўцвЦИВфйВаЋваг, вѓўвеИВДђ Ж░ђВџ┤вЇ░
                const moneyCols2 = new Set(showInsCol ? [4, 5, 6, 7] : [4, 5, 6]);
                for (let c = 0; c < sheet2Header.length; c++) {
                    const addr = XLSX.utils.encode_cell({ r: 0, c });
                    if (ws2[addr]) ws2[addr].s = { fill: greenFill, font: headerFont, alignment: center };
                }
                for (let r = 1; r < sheet2Rows.length; r++) {
                    // YВХЋ: ЖхгвХёв▓ѕьўИ(col0) + Жи╝вг┤ВъљвфЁ(col1)
                    for (let yc = 0; yc <= 1; yc++) {
                        const addr = XLSX.utils.encode_cell({ r, c: yc });
                        if (ws2[addr]) ws2[addr].s = { fill: yellowFill, font: yc === 1 ? headerFont : {}, alignment: center };
                    }
                    for (let c = 2; c < sheet2Header.length; c++) {
                        const addr = XLSX.utils.encode_cell({ r, c });
                        if (ws2[addr]) ws2[addr].s = { alignment: moneyCols2.has(c) ? { horizontal: 'right', vertical: 'center' } : center };
                    }
                }

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws1, 'ВЮ╝в│ёЖи╝вг┤ВІюЖ░ё');
                XLSX.utils.book_append_sheet(wb, ws2, 'ЖИЅВЌгЖ│ёВѓ░');
                XLSX.writeFile(wb, `${year}.${String(month).padStart(2,'0')}. ЖИЅВЌгвфЁВёИ.xlsx`);
            };

            const prevY = month === 1 ? year - 1 : year;
            const prevM = month === 1 ? 12 : month - 1;
            const nextY = month === 12 ? year + 1 : year;
            const nextM = month === 12 ? 1 : month + 1;
            const prevPayrollList = useMemo(() => computePayrollList(prevY, prevM), [prevY, prevM, monthlyData, employees, workspaceInfo]);

                            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>

                            <div className="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                                {workspaceId && (
                                    <button onClick={() => { setBulkIncludeHoliday(false); setBulkDeductInsurance(false); setBulkPayDate(todayDateVal()); setBulkModal(true); }} className="flex items-center gap-2 text-sm font-bold bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition shadow-sm whitespace-nowrap w-full md:w-auto justify-center">
                                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                                        ЖИЅВЌгвфЁВёИВёю ВЮ╝Ж┤ёв░юВєА
                                    </button>
                                )}
                                <button onClick={handleExcelDownload} className="flex items-center gap-2 text-sm font-bold bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl transition shadow-sm whitespace-nowrap w-full md:w-auto justify-center">
                                    <FileSpreadsheet className="w-4 h-4" />
                                    ВЌЉВЁђ вІцВџ┤вАювЊю
                                </button>
                            </div>
                        )}
                    </div>

                    {(() => {
                        const renderPayrollPanel = (panelList, py, pm, isCurrent) => {
                            const panelGrandTotal = panelList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);
                            const panelGrandTotalFinal = panelList.reduce((sum, item) => sum + item.finalPay, 0);
                            return (
                                <div className="space-y-4 w-full flex-shrink-0">
                                    <div className="md:hidden space-y-3">

                                            <div className="bg-white rounded-2xl border border-gray-200 p-8 text-center text-gray-500 min-h-[calc(100vh-280px)] flex items-center justify-center">ьЋ┤вІ╣ ВЏћВЮў ВЮИЖ▒┤в╣ё ВДђЖИЅ вѓ┤ВЌГВЮ┤ ВЌєВіхвІѕвІц.</div>
                                        ) : (
                                            <>

                                                            <div>
                                                                <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2.5 py-1 rounded-md">
                                                                    {item.displayId === 99999 ? '(ВѓГВаювље)' : `No. ${item.displayId}`}
                                                                </span>
                                                                <h3 className="text-lg font-bold text-gray-800 mt-2">{item.name}</h3>
                                                            </div>
                                                            <div className="text-right">
                                                                <div className="text-xl font-black text-purple-700">{formatCurrency(item.insuranceRate > 0 ? item.finalPay : item.totalPay + item.holidayPay)}</div>
                                                                <div className="text-xs font-medium text-gray-400 mt-0.5">В┤Ю ВДђЖИЅВЋА</div>
                                                            </div>
                                                        </div>
                                                        <div className="border-t border-gray-100 pt-4 space-y-2">
                                                            {(() => {
                                                                const wages = Object.entries(item.wageBreakdown || {}).sort((a, b) => Number(a[0]) - Number(b[0]));
                                                                if (wages.length <= 1) {
                                                                    return (
                                                                        <div className="grid grid-cols-3 gap-2 text-center text-sm">
                                                                            <div>
                                                                                <div className="text-gray-400 text-xs mb-1 font-medium">ВІюЖИЅ</div>
                                                                                <div className="font-bold text-gray-700">{formatCurrency(wages[0]?.[0] || item.wage)}</div>
                                                                            </div>
                                                                            <div>
                                                                                <div className="text-gray-400 text-xs mb-1 font-medium">Жи╝вг┤ВІюЖ░ё</div>
                                                                                <div className="font-bold text-gray-700">{fmtHours(item.totalHours) || '0ВІюЖ░ё'}</div>
                                                                            </div>
                                                                            <div>
                                                                                <div className="text-gray-400 text-xs mb-1 font-medium">ВѕюВѕўЖИЅВЌг</div>
                                                                                <div className="font-bold text-green-600">{formatCurrency(item.totalPay)}</div>
                                                                            </div>
                                                                        </div>
                                                                    );
                                                                }
                                                                return (
                                                                    <div className="space-y-2 text-sm">
                                                                        {wages.map(([wage, info]) => (
                                                                            <div key={wage} className="flex justify-between items-center bg-gray-50 rounded-lg px-3 py-2">
                                                                                <div>
                                                                                    <span className="font-bold text-gray-700">{formatCurrency(wage)}</span>
                                                                                    <span className="text-xs text-gray-400 ml-1">├Ќ {info.days}ВЮ╝ ({fmtHours(info.hours)})</span>
                                                                                </div>
                                                                                <span className="font-bold text-green-600">{formatCurrency(info.pay)}</span>
                                                                            </div>
                                                                        ))}
                                                                        <div className="flex justify-between items-center px-3">
                                                                            <span className="text-xs font-bold text-gray-500">ВѕюВѕўЖИЅВЌг ьЋЕЖ│ё</span>
                                                                            <span className="font-bold text-green-600">{formatCurrency(item.totalPay)}</span>
                                                                        </div>
                                                                    </div>
                                                                );
                                                            })()}
                                                        </div>
                                                        {item.holidayPay > 0 && (
                                                            <div className="mt-3 pt-3 border-t border-blue-100 flex justify-between items-center bg-blue-50/50 -mx-5 px-5 pb-3">
                                                                <span className="text-xs text-blue-600 font-bold">ВБ╝ью┤ВѕўвІ╣ ьЈгьЋе</span>
                                                                <span className="text-sm font-bold text-blue-600">{formatCurrency(item.holidayPay)}</span>

                                                        {item.insuranceRate > 0 && (
                                                            <div className="mt-3 pt-3 border-t border-orange-100 flex justify-between items-center bg-orange-50/50 -mx-5 px-5 pb-3">
                                                                <span className="text-xs text-orange-600 font-bold">ЖИЅВЌг Ж│хВаю (-{item.insuranceRate}%)</span>
                                                                <span className="text-sm font-bold text-orange-600">-{formatCurrency(item.insuranceDeduction)}</span>
                                                            </div>
                                                        )}
                                                        {isCurrent && workspaceId && item.displayId !== 99999 && (() => {
                                                            const emp = employees.find(e => e.id.toString() === item.id);
                                                            if (!emp?.empUid) return null;
                                                            const docId = `${item.id}_${py}_${pm}`;
                                                            const isSent = !!sentPayslips[docId];
                                                            return (
                                                                <div className="mt-3 pt-3 border-t border-gray-100">
                                                                    <button onClick={() => handleOpenSend(item, isSent ? sentPayslips[docId] : null)}
                                                                        className={`w-full flex items-center justify-center gap-2 py-2 rounded-xl text-sm font-bold transition border ${isSent ? 'bg-gray-100 hover:bg-gray-200 text-gray-600 border-gray-300' : 'bg-emerald-50 hover:bg-emerald-100 text-emerald-700 border-emerald-200'}`}>
                                                                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
                                                                        {isSent ? 'в░юВєАВЎёвБї (Въгв░юВєА)' : 'ЖИЅВЌгвфЁВёИВёю в░юВєА'}

                                                    </div>
                                                ))}
                                                <div className="bg-purple-50 rounded-2xl border border-purple-200 p-5 flex justify-between items-center shadow-sm">
                                                    <span className="font-bold text-gray-800">В┤Ю ВДђЖИЅ ВўѕВаЋВЋА</span>
                                                    <span className="text-2xl font-black text-purple-700">{formatCurrency(panelList.some(i => i.insuranceRate > 0) ? panelGrandTotalFinal : panelGrandTotal)}</span>
                                                </div>
                                            </>
                                        )}
                                    </div>

                                    <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                                        <div className="overflow-x-auto">
                                            <table className="w-full text-center border-collapse">
                                                <thead className="bg-gray-50 border-b">
                                                    <tr>
                                                        <th className="px-4 py-4 font-bold text-gray-600 whitespace-nowrap">ЖхгвХёв▓ѕьўИ</th>
                                                        <th className="px-4 py-4 font-bold text-gray-600 whitespace-nowrap">ВЮ┤вдё</th>

                                                        <tr><td colSpan={workspaceId ? 9 : 8} className="p-10 text-center text-gray-500 font-medium">ьЋ┤вІ╣ ВЏћВЮў ВЮИЖ▒┤в╣ё ВДђЖИЅ вѓ┤ВЌГВЮ┤ ВЌєВіхвІѕвІц.</td></tr>

        function TabChart({ monthlyData, employees }) {
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [pieMonth, setPieMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
            });
            const [pieYear, setPieYear] = useState(new Date().getFullYear());
            
            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                Object.keys(monthlyData).forEach(key => years.add(parseInt(key.split('-')[0])));
                return Array.from(years).sort((a,b) => b - a);
            }, [monthlyData]);

            const chartData = useMemo(() => {
                const data = Array.from({ length: 12 }, (_, i) => ({ month: i + 1, revenue: 0, pay: 0, holidayPay: 0 }));
                Object.keys(monthlyData).forEach(key => {
                    const [y, m] = key.split('-');
                    if (parseInt(y) === selectedYear) {
                        const monthIdx = parseInt(m) - 1;
                        const monthObj = monthlyData[key] || {};
                        const days = monthObj.days || {};

                        let dailySumRev = 0;
                        Object.values(days).forEach(day => {
                            dailySumRev += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { data[monthIdx].pay += (entry.pay || 0) / 10000; });
                        });

                        const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailySumRev;
                        data[monthIdx].revenue += effectiveRev / 10000;
                    }
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== selectedYear) return;
                    const monthIdx = sm - 1;
                    weekData.forEach(({ holidayPay }) => { data[monthIdx].holidayPay += holidayPay / 10000; });
                });
                return data;
            }, [monthlyData, employees, selectedYear]);

            const maxValue = Math.max(...chartData.map(d => Math.max(d.revenue, d.pay + d.holidayPay)), 100);
            const yTicks = [0, maxValue * 0.25, maxValue * 0.5, maxValue * 0.75, maxValue];

            const allHolidayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            const pieMonthData = useMemo(() => {
                let dailyRevSum = 0, pay = 0;
                const monthObj = monthlyData[pieMonth] || { days: {} };
                Object.values(monthObj.days).forEach(day => {
                    dailyRevSum += (day.revenue || 0);
                    Object.values(day.entries || {}).forEach(entry => { pay += (entry.pay || 0); });
                });
                const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieMonth)) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: effectiveRev, pay, holidayPay };
            }, [monthlyData, pieMonth, allHolidayBySunday]);

            const pieYearData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    if (key.startsWith(pieYear.toString())) {
                        const monthObj = monthlyData[key];
                        let dailyRevSum = 0;
                        Object.values(monthObj.days || {}).forEach(day => {
                            dailyRevSum += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                        });
                        totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                    }
                });
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieYear.toString())) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, pieYear, allHolidayBySunday]);

            const pieTotalData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    const monthObj = monthlyData[key];
                    let dailyRevSum = 0;
                    Object.values(monthObj.days || {}).forEach(day => {
                        dailyRevSum += (day.revenue || 0);
                        Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                    });
                    totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                });
                const holidayPay = Object.values(allHolidayBySunday).flat().reduce((s, h) => s + h.holidayPay, 0);
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, allHolidayBySunday]);

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 max-w-5xl mx-auto space-y-10">
                    <div>
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 gap-2">
                            <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center gap-2">
                                <BarChart3 className="w-5 h-5 text-green-600 flex-shrink-0" /> ВЏћв│ё вДцВХю в░Ј ВЮИЖ▒┤в╣ё ВХћВЮ┤
                            </h2>
                            <select
                                value={selectedYear}
                                onChange={e => setSelectedYear(parseInt(e.target.value))}
                                className="border border-gray-200 rounded-xl px-4 py-2 font-bold bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none transition self-start sm:self-auto flex-shrink-0"
                            >
                                {availableYears.map(y => <option key={y} value={y}>{y}вЁё</option>)}
                            </select>
                        </div>

                        <div className="flex flex-wrap justify-end gap-4 md:gap-6 mb-5 text-sm font-bold text-gray-600">
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-yellow-400 rounded-full shadow-sm"></div>вДцВХю</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-green-500 rounded-full shadow-sm"></div>ВЮИЖ▒┤в╣ё</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-blue-400 rounded-full shadow-sm"></div>ВБ╝ью┤ВѕўвІ╣</div>
                        </div>

                        {/* YВХЋ Ж│аВаЋ + вДЅвїђ Ж░ђвАю ВіцьЂгвАц */}
                        <div className="flex mt-4">
                            <div className="flex flex-col justify-between h-[300px] w-16 md:w-20 flex-shrink-0 pb-8">
                                {yTicks.slice().reverse().map((tick, i) => (
                                    <span key={i} className="text-xs text-gray-400 font-medium text-right block pr-2 leading-none">{Math.round(tick).toLocaleString()}вДїВЏљ</span>
                                ))}
                            </div>
                            <div className="overflow-x-auto no-scrollbar pb-8 flex-1">
                                <div className="relative h-[300px] min-w-[480px]">
                                    <div className="absolute inset-0 flex flex-col justify-between pointer-events-none">
                                        {yTicks.slice().reverse().map((tick, i) => (
                                            <div key={i} className="border-t border-gray-100 border-dashed w-full"></div>
                                        ))}
                                    </div>
                                    <div className="absolute inset-0 flex items-end justify-around">
                                        {chartData.map((d) => (
                                            <BarColumn key={d.month} d={d} maxValue={maxValue} />
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr className="border-gray-100" />

                    <div>
                        <h3 className="text-lg font-bold text-gray-800 mb-6 px-1 flex items-center gap-2">
                            <svg className="w-5 h-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                            вДцВХю вїђв╣ё ВЮИЖ▒┤в╣ё в╣ёВюе ьўёьЎЕ
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <DonutGauge revenue={pieMonthData.revenue} pay={pieMonthData.pay} holidayPay={pieMonthData.holidayPay}>
                                <input type="month" value={pieMonth} onChange={e => setPieMonth(e.target.value)} required className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition" />
                            </DonutGauge>

                            <DonutGauge revenue={pieYearData.revenue} pay={pieYearData.pay} holidayPay={pieYearData.holidayPay}>
                                <select value={pieYear} onChange={e => setPieYear(parseInt(e.target.value))} className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition">
                                    {availableYears.map(y => <option key={y} value={y}>{y}вЁё вѕёВаЂ в╣ёВюе</option>)}
                                </select>
                            </DonutGauge>

                            <DonutGauge revenue={pieTotalData.revenue} pay={pieTotalData.pay} holidayPay={pieTotalData.holidayPay}>
                                <div className="font-bold text-gray-700 bg-gray-100 border border-transparent rounded-xl px-3 py-1.5 text-center w-full">ВаёВ▓┤ вѕёВаЂ в╣ёВюе</div>
                            </DonutGauge>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // ВБ╝ью┤ВѕўвІ╣ ВўѕВИА ьЃГ
        // ==========================================
        // РћђРћђРћђ ьїїВіцьЁћ В╗гвЪг ВіцВЎђВЮ┤ьћё ВёаьЃЮЖИ░ РћђРћђРћђ
        function ColorSwiper({ value, onChange }) {
            const scrollRef = useRef(null);
            useEffect(() => {
                const handleKey = (e) => {
                    if (e.key !== 'ArrowLeft' && e.key !== 'ArrowRight') return;
                    const idx = PASTEL_COLORS.indexOf(value);
                    if (idx < 0) return;
                    const next = e.key === 'ArrowRight' ? Math.min(PASTEL_COLORS.length - 1, idx + 1) : Math.max(0, idx - 1);
                    if (next !== idx) onChange(PASTEL_COLORS[next]);
                };
                const el = scrollRef.current;
                if (!el) return;
                el.addEventListener('keydown', handleKey);
                return () => el.removeEventListener('keydown', handleKey);
            }, [value, onChange]);
            const scrollBy = (dir) => {
                const el = scrollRef.current;
                if (!el) return;
                el.scrollBy({ left: dir * 120, behavior: 'smooth' });
                const idx = PASTEL_COLORS.indexOf(value);
                if (idx < 0) return;
                const next = dir > 0 ? Math.min(PASTEL_COLORS.length - 1, idx + 1) : Math.max(0, idx - 1);
                if (next !== idx) onChange(PASTEL_COLORS[next]);
            };
            return (
                <div className="flex items-center gap-1">
                    <button type="button" onClick={() => scrollBy(-1)} className="hidden md:flex p-1.5 hover:bg-gray-100 rounded-full shrink-0" title="ВЮ┤Ваё ВЃЅ">
                        <ChevronLeft className="w-4 h-4" />
                    </button>
                    <div
                        ref={scrollRef}
                        tabIndex={0}
                        className="flex-1 overflow-x-auto no-scrollbar focus:outline-none"
                        style={{scrollSnapType: 'x mandatory'}}
                    >
                        <div className="flex gap-2 py-1 px-1">
                            {PASTEL_COLORS.map(c => (
                                <button
                                    key={c}
                                    type="button"
                                    onClick={() => onChange(c)}
                                    className={`w-10 h-10 rounded-xl shrink-0 border-2 transition ${value === c ? 'border-gray-800 scale-110 shadow' : 'border-transparent'}`}
                                    style={{backgroundColor: c, scrollSnapAlign: 'center'}}
                                    title={c}
                                />
                            ))}
                        </div>
                    </div>
                    <button type="button" onClick={() => scrollBy(1)} className="hidden md:flex p-1.5 hover:bg-gray-100 rounded-full shrink-0" title="вІцВЮї ВЃЅ">
                        <ChevronRight className="w-4 h-4" />
                    </button>
                </div>
            );
        }

        // РћђРћђРћђ ВіцВ╝ђВЦ┤ ьјИВДЉ вфевІг (Ж┤ђвдгВъљ ВаёВџЕ) РћђРћђРћђ
        function ScheduleEditModal({ initial, defaultDate, activeEmployees, workspaceId, firebaseUser, workspaceInfo, setWorkspaceInfo, onClose, showAlert, showConfirm, globalMinWage }) {
            const todayStr = defaultDate || (() => {
                const t = new Date();
                return `${t.getFullYear()}-${String(t.getMonth()+1).padStart(2,'0')}-${String(t.getDate()).padStart(2,'0')}`;
            })();
            const [startDate, setStartDate] = useState(initial?.startDate || todayStr);
            const [endDate, setEndDate] = useState(initial?.endDate || todayStr);
            const [startHour, setStartHour] = useState(initial?.startHour != null ? String(initial.startHour) : '');
            const [startMinute, setStartMinute] = useState(initial?.startMinute != null ? String(initial.startMinute) : '');
            const [endHour, setEndHour] = useState(initial?.endHour != null ? String(initial.endHour) : '');
            const [endMinute, setEndMinute] = useState(initial?.endMinute != null ? String(initial.endMinute) : '');
            const [empId, setEmpId] = useState(initial?.empId != null ? String(initial.empId) : (activeEmployees[0]?.id != null ? String(activeEmployees[0].id) : ''));
            const [color, setColor] = useState(initial?.color || PASTEL_COLORS[0]);
            const [memo, setMemo] = useState(initial?.memo || '');
            const [saving, setSaving] = useState(false);

            const handleSave = async () => {
                if (!startDate || !endDate) { showAlert('вѓаВДювЦ╝ ВёаьЃЮьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                if (endDate < startDate) { showAlert('ВбЁвБїВЮ╝ВЮ┤ ВІюВъЉВЮ╝в│┤вІц ВЮ┤ВаёВЮ╝ Вѕў ВЌєВіхвІѕвІц.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                if (!startHour || !endHour) { showAlert('ВІюВъЉ/ВбЁвБї ВІюЖ░Ђ(ВІю)ВЮё ВёаьЃЮьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                if (!empId) { showAlert('Жи╝вг┤ВъљвЦ╝ ВёаьЃЮьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }

                const sM = Math.max(0, Math.min(59, parseInt(startMinute) || 0));
                const eM = Math.max(0, Math.min(59, parseInt(endMinute) || 0));
                const sH = parseInt(startHour);
                const eH = parseInt(endHour);
                const sameDay = startDate === endDate;
                if (sameDay && (sH * 60 + sM) >= (eH * 60 + eM)) {
                    showAlert('Ж░ЎВЮђ вѓаВДюВЌљВёю ВбЁвБї ВІюЖ░ЂВЮ┤ ВІюВъЉ ВІюЖ░Ђв│┤вІц відВќ┤ВЋ╝ ьЋЕвІѕвІц.', 'ВъЁваЦ ВўцвЦў', 'alert'); return;
                }

                const emp = activeEmployees.find(e => String(e.id) === String(empId));
                if (!emp) { showAlert('Жи╝вг┤ВъљвЦ╝ В░ЙВЮё Вѕў ВЌєВіхвІѕвІц.', 'ВўцвЦў', 'error'); return; }

                // вЈЎВЮ╝ Жи╝вг┤Въљ ┬и вѓаВДю ┬и ВІюЖ░ёвїђ ВцЉв│х Ж▓ђВѓг
                const newStartMin = sH * 60 + sM;
                const newEndMin = eH * 60 + eM;
                const existingList = workspaceInfo?.schedules || [];
                const conflict = existingList.find(s => {
                    if (initial && s.id === initial.id) return false;
                    if (String(s.empId) !== String(emp.id)) return false;
                    // вѓаВДю в▓ћВюё Ж▓╣В╣е
                    if (s.endDate < startDate || s.startDate > endDate) return false;
                    // ВІюЖ░ё в▓ћВюё Ж▓╣В╣е (Ж▓йЖ│ё ВЮ╝В╣ўвіћ Ж▓╣В╣ўВДђ ВЋіВЮї)
                    const sMin = s.startHour * 60 + (s.startMinute || 0);
                    const eMin = s.endHour * 60 + (s.endMinute || 0);
                    return sMin < newEndMin && newStartMin < eMin;
                });
                if (conflict) {
                    const fmtT = (h, m) => m === 0 ? `${h}ВІю` : `${h}ВІю${m}вХё`;
                    const rangeStr = conflict.startDate === conflict.endDate
                        ? conflict.startDate
                        : `${conflict.startDate}~${conflict.endDate}`;
                    showAlert(
                        `${emp.name}вІўВЮђ ВЮ┤в»И ьЋ┤вІ╣ ВІюЖ░ёвїђВЌљ ВіцВ╝ђВЦ┤ВЮ┤ ВъѕВіхвІѕвІц.\n(${rangeStr} ${fmtT(conflict.startHour, conflict.startMinute||0)}~${fmtT(conflict.endHour, conflict.endMinute||0)})`,
                        'ВцЉв│х ВіцВ╝ђВЦ┤', 'alert'
                    );
                    return;
                }

                const resolvedWage = Number(emp.wage) > 0
                    ? Number(emp.wage)
                    : (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE);
                const schedule = {
                    id: initial?.id || `sched_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
                    startDate, endDate,
                    startHour: sH, startMinute: sM,
                    endHour: eH, endMinute: eM,
                    empId: emp.id,
                    empName: emp.name,
                    wage: resolvedWage,
                    color,
                    memo: memo.trim(),
                    createdAt: initial?.createdAt || new Date().toISOString()
                };

                setSaving(true);
                try {
                    const existing = workspaceInfo?.schedules || [];
                    const newList = initial
                        ? existing.map(s => s.id === initial.id ? schedule : s)
                        : [...existing, schedule];
                    const wsId = workspaceId || firebaseUser.uid;
                    await fbDb.collection('workspaces').doc(wsId).update({ schedules: newList });
                    setWorkspaceInfo(prev => ({ ...prev, schedules: newList }));
                    if (!initial) {
                        if (emp.empUid) {
                            try {
                                await sendScheduleNotification(emp.empUid, wsId, schedule);
                            } catch (err) {
                                console.warn('schedule_new ВЋївд╝ в░юВєА ВІцьїе:', err);
                            }
                        } else {
                            console.warn('ВёаьЃЮвљю Жи╝вг┤ВъљВЌљ empUidЖ░ђ ВЌєВќ┤ ВЋївд╝ в░юВєА Ж▒┤вёѕвюђ:', emp);
                        }
                    } else {
                        // в│ђЖ▓й ВЋївд╝
                        const empChanged = String(initial.empId) !== String(schedule.empId);
                        if (empChanged) {
                            // ВЮ┤Ваё ВДЂВЏљ Рєњ ВѓГВаю, ВЃѕ ВДЂВЏљ Рєњ ВІаЖию ВЋївд╝
                            const oldEmp = activeEmployees.find(e => String(e.id) === String(initial.empId));
                            if (oldEmp?.empUid) {
                                sendScheduleDeletedNotification(oldEmp.empUid, wsId, initial).catch(err => console.warn('schedule_deleted ВЋївд╝ ВІцьїе:', err));
                            }
                            if (emp.empUid) {
                                sendScheduleNotification(emp.empUid, wsId, schedule).catch(err => console.warn('schedule_new ВЋївд╝ ВІцьїе:', err));
                            }
                        } else if (emp.empUid) {
                            // вЈЎВЮ╝ ВДЂВЏљ Рєњ ьЋёвЊюЖ░ђ в░ћвђљ Ж▓йВџ░вДї в│ђЖ▓й ВЋївд╝
                            const changed =
                                initial.startDate !== schedule.startDate ||
                                initial.endDate !== schedule.endDate ||
                                initial.startHour !== schedule.startHour ||
                                (initial.startMinute||0) !== (schedule.startMinute||0) ||
                                initial.endHour !== schedule.endHour ||
                                (initial.endMinute||0) !== (schedule.endMinute||0) ||
                                (initial.memo||'') !== (schedule.memo||'');
                            if (changed) {
                                sendScheduleUpdatedNotification(emp.empUid, wsId, initial, schedule)
                                    .catch(err => console.warn('schedule_updated ВЋївд╝ ВІцьїе:', err));
                            }
                        }
                    }
                    onClose();
                } catch (e) {
                    showAlert('ВађВъЦ ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
                setSaving(false);
            };

            const handleDelete = () => {
                if (!initial) return;
                showConfirm('ВЮ┤ ВіцВ╝ђВЦ┤ВЮё ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?', async () => {
                    try {
                        const existing = workspaceInfo?.schedules || [];
                        const newList = existing.filter(s => s.id !== initial.id);
                        const wsId = workspaceId || firebaseUser.uid;
                        await fbDb.collection('workspaces').doc(wsId).update({ schedules: newList });
                        setWorkspaceInfo(prev => ({ ...prev, schedules: newList }));
                        // ВѓГВаю ВЋївд╝ в░юВєА (ьЋ┤вІ╣ Жи╝вг┤ВъљВЌљЖ▓ї)
                        const targetEmp = activeEmployees.find(e => String(e.id) === String(initial.empId));
                        if (targetEmp?.empUid) {
                            try {
                                await sendScheduleDeletedNotification(targetEmp.empUid, wsId, initial);
                            } catch (err) {
                                console.warn('schedule_deleted ВЋївд╝ в░юВєА ВІцьїе:', err);
                            }
                        }
                        onClose();
                    } catch (e) {
                        showAlert('ВѓГВаю ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                    }
                }, 'ВіцВ╝ђВЦ┤ ВѓГВаю');
            };

            const hourOptions = Array.from({length: 24}, (_, i) => i + 1);

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-3 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] flex flex-col">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{initial ? 'ВіцВ╝ђВЦ┤ ВѕўВаЋ' : 'ВЃѕ ВіцВ╝ђВЦ┤ вЊ▒вАЮ'}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-5 space-y-4 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1.5">ВІюВъЉВЮ╝</label>
                                <input type="date" value={startDate} onChange={e => setStartDate(e.target.value)}
                                    className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-green-500 outline-none" />
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1.5">ВбЁвБїВЮ╝</label>
                                <input type="date" value={endDate} min={startDate} onChange={e => setEndDate(e.target.value)}
                                    className="w-full border-2 border-gray-200 rounded-xl px-3 py-2.5 text-sm focus:border-green-500 outline-none" />
                            </div>
                            <div>

                            </div>

                                <label className="block text-sm font-bold text-gray-700 mb-1.5">Жи╝вг┤Въљ</label>

                                <textarea value={memo} onChange={e => setMemo(e.target.value)} rows={3}

                                    placeholder="Вўѕ: Вўцьћѕ вІ┤вІ╣, Вцђв╣ёвг╝ ВДђВ░И вЊ▒" />
