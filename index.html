        }

        // РћђРћђРћђ вѓаВДюв│ё ВЃЂВёИ (ВіцВ╝ђВЦ┤ вфЕвАЮ + вЕћвфе) вфевІг РћђРћђРћђ
        function DayDetailModal({ date, schedules, memos, isAdmin, authorName, authorId, workspaceId, firebaseUser, workspaceInfo, setWorkspaceInfo, onEditSchedule, onAddSchedule, onClose, showAlert }) {
            const [memoText, setMemoText] = useState('');
            const [posting, setPosting] = useState(false);
            const dayMemos = memos || [];
            const toMinutes = (s) => s.startHour * 60 + (s.startMinute || 0);
            const sortedSchedules = [...(schedules || [])].sort((a, b) => toMinutes(a) - toMinutes(b));

            const postMemo = async () => {
                if (!memoText.trim()) return;
                setPosting(true);
                try {
                    const memo = {
                        id: `memo_${Date.now()}_${Math.random().toString(36).slice(2,8)}`,
                        date,
                        authorId: authorId || 'boss',
                        authorName: authorName || (isAdmin ? 'Ж┤ђвдгВъљ' : 'ВДЂВЏљ'),
                        text: memoText.trim(),
                        createdAt: new Date().toISOString()
                    };
                    const wsId = workspaceId || firebaseUser.uid;
                    const docMemos = workspaceInfo?.scheduleMemosDoc || workspaceInfo?.scheduleMemos || {};
                    const list = docMemos[date] || [];
                    const newDocMemos = { ...docMemos, [date]: [...list, memo] };
                    await fbDb.collection('workspaces').doc(wsId).update({ scheduleMemos: newDocMemos });
                    setWorkspaceInfo(prev => {
                        const sub = prev?.scheduleMemosSub || {};
                        return {
                            ...prev,
                            scheduleMemosDoc: newDocMemos,
                            scheduleMemos: mergeScheduleMemoMaps(newDocMemos, sub)
                        };
                    });
                    setMemoText('');
                } catch (e) {
                    showAlert('вЕћвфе ВађВъЦ ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
                setPosting(false);
            };

            const deleteMemo = async (id) => {
                try {
                    const wsId = workspaceId || firebaseUser.uid;
                    const docMemos = workspaceInfo?.scheduleMemosDoc || workspaceInfo?.scheduleMemos || {};
                    const inDoc = (docMemos[date] || []).some(m => m.id === id);
                    if (inDoc) {
                        const newDocMemos = { ...docMemos, [date]: (docMemos[date] || []).filter(m => m.id !== id) };
                        await fbDb.collection('workspaces').doc(wsId).update({ scheduleMemos: newDocMemos });
                        setWorkspaceInfo(prev => {
                            const sub = prev?.scheduleMemosSub || {};
                            return {
                                ...prev,
                                scheduleMemosDoc: newDocMemos,
                                scheduleMemos: mergeScheduleMemoMaps(newDocMemos, sub)
                            };
                        });
                    } else {
                        // ВёювИїВ╗гваЅВЁў вЕћвфе Рђћ Ж┤ђвдгВъљЖ░ђ ВѓГВаю
                        await fbDb.collection('workspaces').doc(wsId)
                            .collection('scheduleMemos').doc(id).delete();
                    }
                } catch (e) {
                    showAlert('ВѓГВаю ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            const [yStr, mStr, dStr] = date.split('-');
            const displayDate = `${yStr}вЁё ${parseInt(mStr)}ВЏћ ${parseInt(dStr)}ВЮ╝`;

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-3 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] flex flex-col">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{displayDate}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-5 space-y-4 overflow-y-auto">
                            <div>
                                <div className="flex items-center justify-between mb-2">
                                    <h4 className="text-sm font-bold text-gray-700">Жи╝вг┤ ВіцВ╝ђВЦ┤ ({sortedSchedules.length})</h4>
                                    {isAdmin && (
                                        <button onClick={onAddSchedule}
                                            className="text-xs bg-green-600 text-white px-3 py-1.5 rounded-lg hover:bg-green-700">
                                            + ВХћЖ░ђ
                                        </button>
                                    )}
                                </div>
                                {sortedSchedules.length === 0 ? (
                                    <p className="text-xs text-gray-400 bg-gray-50 rounded-xl p-3 text-center">вЊ▒вАЮвљю ВіцВ╝ђВЦ┤ВЮ┤ ВЌєВіхвІѕвІц.</p>
                                ) : (
                                    <div className="space-y-1.5">
                                        {sortedSchedules.map(s => {
                                            const sh = s.startMinute === 0 ? `${s.startHour}ВІю` : `${s.startHour}ВІю${s.startMinute}вХё`;
                                            const eh = s.endMinute === 0 ? `${s.endHour}ВІю` : `${s.endHour}ВІю${s.endMinute}вХё`;
                                            return (
                                                <div key={s.id}
                                                    onClick={() => isAdmin && onEditSchedule && onEditSchedule(s)}
                                                    className={`rounded-xl px-3 py-2 text-sm ${isAdmin ? 'cursor-pointer hover:opacity-80' : ''}`}
                                                    style={{backgroundColor: s.color}}>
                                                    <div className="font-bold text-gray-800">{s.empName}({sh}~{eh})</div>
                                                    {s.memo && <div className="text-xs text-gray-600 mt-0.5">{s.memo}</div>}
                                                </div>
                                            );
                                        })}
                                    </div>
                                )}
                            </div>
                            <div>
                                <h4 className="text-sm font-bold text-gray-700 mb-2">вЕћвфе ({dayMemos.length})</h4>
                                {dayMemos.length === 0 ? (
                                    <p className="text-xs text-gray-400 bg-gray-50 rounded-xl p-3 text-center mb-2">вЕћвфеЖ░ђ ВЌєВіхвІѕвІц.</p>
                                ) : (
                                    <div className="space-y-1.5 mb-2">
                                        {dayMemos.map(m => (
                                            <div key={m.id} className="bg-gray-50 border border-gray-200 rounded-xl p-2.5">
                                                <div className="flex items-start justify-between gap-2">
                                                    <div className="flex-1">
                                                        <div className="text-xs font-bold text-gray-700">{m.authorName}</div>
                                                        <p className="text-sm text-gray-700 whitespace-pre-wrap mt-0.5">{m.text}</p>
                                                    </div>
                                                    {(isAdmin || m.authorId === authorId) && (
                                                        <button onClick={() => deleteMemo(m.id)} className="text-xs text-red-400 hover:text-red-600 shrink-0">
                                                            <X className="w-3.5 h-3.5" />
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="text-[10px] text-gray-400 mt-0.5">
                                                    {new Date(m.createdAt).toLocaleString('ko-KR')}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex gap-2">
                                    <textarea value={memoText} onChange={e => setMemoText(e.target.value)} rows={2}
                                        className="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm resize-none focus:border-green-500 outline-none"
                                        placeholder="вЕћвфе вѓеЖИ░ЖИ░..." />
                                    <button onClick={postMemo} disabled={posting || !memoText.trim()}
                                        className="bg-green-600 text-white px-4 rounded-xl font-bold hover:bg-green-700 disabled:opacity-50 text-sm">
                                        вЊ▒вАЮ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function TabPredict({ employees, showConfirm, showAlert, globalMinWage, workspaceInfo, setWorkspaceInfo, workspaceId, firebaseUser, initialOpenDate, onInitialOpenConsumed }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [scheduleModal, setScheduleModal] = useState(null); // { schedule?, defaultDate? }
            const [dayDetailModal, setDayDetailModal] = useState(null); // 'YYYY-MM-DD'

            // ьЎЋВЮИьЋю вЕћвфе ID ВХћВаЂ (вѓаВДюВ╣И ьЂ┤вдГ ВІю ьЋ┤вІ╣ вѓаВДю вЕћвфевЦ╝ вфевЉљ ьЎЋВЮИ В▓ўвдг)
            const seenMemoKey = workspaceId ? `schedMemoSeenIds_${workspaceId}` : null;
            const [seenMemoIds, setSeenMemoIds] = useState(() => {
                if (!seenMemoKey) return new Set();
                try {
                    const raw = localStorage.getItem(seenMemoKey);
                    return new Set(raw ? JSON.parse(raw) : []);
                } catch { return new Set(); }
            });
            useEffect(() => {
                if (!seenMemoKey) { setSeenMemoIds(new Set()); return; }
                try {
                    const raw = localStorage.getItem(seenMemoKey);
                    setSeenMemoIds(new Set(raw ? JSON.parse(raw) : []));
                } catch { setSeenMemoIds(new Set()); }
            }, [seenMemoKey]);
            const markDateMemosSeen = (date, memosOnDate) => {
                if (!seenMemoKey || !memosOnDate || memosOnDate.length === 0) return;
                setSeenMemoIds(prev => {
                    const next = new Set(prev);
                    memosOnDate.forEach(m => { if (m.id) next.add(m.id); });
                    try { localStorage.setItem(seenMemoKey, JSON.stringify([...next])); } catch {}
                    return next;
                });
            };

            // ВЎИвХђ(вЕћвфе в░░вёѕ вЊ▒)ВЌљВёю ьі╣ВаЋ вѓаВДю ВЃЂВёИ ьїЮВЌЁ ВЌ┤ЖИ░ ВџћВ▓Г
            useEffect(() => {
                if (!initialOpenDate) return;
                const [y, m] = initialOpenDate.split('-').map(Number);
                setCurrentDate(new Date(y, m - 1, 1));
                setDayDetailModal(initialOpenDate);
                onInitialOpenConsumed && onInitialOpenConsumed();
            }, [initialOpenDate]);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const schedules = workspaceInfo?.schedules || [];
            const scheduleMemos = workspaceInfo?.scheduleMemos || {};
            const activeEmployees = employees
                .filter(e => (e.status || (e.isWorking === false ? 'resigned' : 'working')) === 'working')
                .sort((a, b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (scheduleModal || dayDetailModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, scheduleModal, dayDetailModal]);

            const touchStartX = useRef(null);
            const touchStartY = useRef(null);
            const isHorizontalDrag = useRef(false);
            const predCarouselRef = useRef(null);
            const [predDragX, setPredDragX] = useState(0);
            const [predTransition, setPredTransition] = useState(false);
            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
                isHorizontalDrag.current = false;
                setPredTransition(false);
                setPredDragX(0);
            };
            const handleTouchMove = (e) => {
                if (touchStartX.current === null || scheduleModal || dayDetailModal) return;
                const dx = e.touches[0].clientX - touchStartX.current;
                const dy = e.touches[0].clientY - touchStartY.current;
                if (!isHorizontalDrag.current) {
                    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                    isHorizontalDrag.current = Math.abs(dx) > Math.abs(dy);
                    if (!isHorizontalDrag.current) return;
                }
                setPredDragX(dx);
            };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                const wasHorizontal = isHorizontalDrag.current;
                touchStartX.current = null;
                if (scheduleModal || dayDetailModal || !wasHorizontal) { setPredDragX(0); return; }
                const w = predCarouselRef.current?.clientWidth || window.innerWidth;
                if (Math.abs(dx) > 80) {
                    setPredTransition(true);
                    setPredDragX(dx < 0 ? -w : w);
                    setTimeout(() => {
                        setPredTransition(false);
                        setPredDragX(0);
                        if (dx < 0) nextMonth(); else prevMonth();
                    }, 260);
                } else {
                    setPredTransition(true);
                    setPredDragX(0);
                    setTimeout(() => setPredTransition(false), 220);
                }
            };

            // ВаёВ▓┤ ВіцВ╝ђВЦ┤ Рєњ ВЏћв│ё вЇ░ВЮ┤ьё░ (ВБ╝ью┤ВѕўвІ╣ Ж│ёВѓ░ВЮђ ВЏћ Ж▓йЖ│ё вёўвѓўвЊцЖИ░ вЋївгИВЌљ ВаёВ▓┤ ьЋёВџћ)
            const allMonthlyFromSchedules = useMemo(
                () => schedulesToAllMonthlyData(schedules, employees, globalMinWage),
                [schedules, employees, globalMinWage]
            );
            const holidayPayBySunday = useMemo(
                () => calcHolidayPayBySunday(allMonthlyFromSchedules, employees),
                [allMonthlyFromSchedules, employees]
            );

            // вІ╣ВЏћ ВѕюВѕўЖИЅВЌг
            const currentMonthDays = allMonthlyFromSchedules[monthKey]?.days || {};
            let totalMonthPay = 0;
            const daysInMonth = getDaysInMonth(year, month);
            Object.values(currentMonthDays).forEach(dayData => {
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            });

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);

            // вІ╣ВЏћ В┤Ю Ж│хВаюВЋА
            const totalMonthDeduction = (() => {
                const mode = workspaceInfo?.insuranceMode || 'none';
                if (mode === 'none') return 0;
                let deduct = 0;
                const empIds = new Set();
                Object.values(currentMonthDays).forEach(day => Object.keys(day.entries || {}).forEach(id => empIds.add(id)));
                empIds.forEach(empId => {
                    const emp = employees.find(e => e.id.toString() === empId.toString());
                    const ins = getInsuranceInfo(workspaceInfo, emp);
                    if (ins.rate <= 0) return;
                    let empPay = 0;
                    Object.values(currentMonthDays).forEach(day => { const e = day.entries?.[empId]; if (e) empPay += (e.pay || 0); });
                    let empHoliday = 0;
                    Object.entries(holidayPayBySunday).forEach(([s, wd]) => {
                        const [sy, sm] = s.split('-').map(Number);
                        if (sy !== year || sm !== month) return;
                        wd.forEach(h => { if (h.empId === empId.toString()) empHoliday += h.holidayPay; });
                    });
                    deduct += Math.round((empPay + empHoliday) * ins.rate / 100);
                });
                return deduct;
            })();

            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;
            const totalMonthFinalPay = totalMonthGrandPay - totalMonthDeduction;

            // вѓаВДю Рєњ ЖиИ вѓаВДюВЌљ Ж▒Ивдгвіћ ВіцВ╝ђВЦ┤ вфЕвАЮ
            const schedulesByDay = useMemo(() => {
                const map = {};
                schedules.forEach(s => {
                    if (!s.startDate || !s.endDate) return;
                    const [sy, sm, sd] = s.startDate.split('-').map(Number);
                    const [ey, em, ed] = s.endDate.split('-').map(Number);
                    const start = new Date(sy, sm - 1, sd);
                    const end = new Date(ey, em - 1, ed);
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        if (!map[key]) map[key] = [];
                        map[key].push(s);
                    }
                });
                return map;
            }, [schedules]);

            const resetMonthSchedules = () => {
                showConfirm(`${year}вЁё ${month}ВЏћВЮў вфевЊа ВіцВ╝ђВЦ┤ВЮё ВаЋвДљ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?`, async () => {
                    try {
                        const newSchedules = schedules.filter(s => {
                            const [sy, sm] = s.startDate.split('-').map(Number);
                            const [ey, em] = s.endDate.split('-').map(Number);
                            const touchesMonth =
                                (sy === year && sm === month) ||
                                (ey === year && em === month) ||
                                (new Date(sy, sm - 1, 1) < new Date(year, month - 1, 1) &&
                                 new Date(ey, em - 1, 1) > new Date(year, month, 0));
                            return !touchesMonth;
                        });
                        const wsId = workspaceId || firebaseUser.uid;
                        await fbDb.collection('workspaces').doc(wsId).update({ schedules: newSchedules });
                        setWorkspaceInfo(prev => ({ ...prev, schedules: newSchedules }));
                    } catch (e) {
                        showAlert('В┤ѕЖИ░ьЎћ ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                    }
                }, "ВіцВ╝ђВЦ┤ В┤ѕЖИ░ьЎћ");
            };

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector year={year} month={month} onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))} />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setScheduleModal({ defaultDate: `${year}-${String(month).padStart(2,'0')}-${String(new Date().getDate()).padStart(2,'0')}` })}

                    {(() => {
                        const renderPredictPanel = (py, pm, isCurrent) => {

                            const pDays = [];

                                            endCol = i;
                                        }

                                    if (startCol !== -1) bars.push({ ...s, startCol, endCol });
                                });
                                bars.sort((a, b) =>
                                    (a.startHour * 60 + (a.startMinute||0)) - (b.startHour * 60 + (b.startMinute||0))

                                );
                                const rows = [];
                                bars.forEach(bar => {
                                    let placed = false;
                                    for (let r = 0; r < rows.length; r++) {
                                        if (rows[r].every(rb => rb.endCol < bar.startCol || rb.startCol > bar.endCol)) {
                                            rows[r].push(bar);
                                            bar.row = r;
                                            placed = true;
                                            break;
                                        }
                                    }
                                    if (!placed) { rows.push([bar]); bar.row = rows.length - 1; }
                                });
                                return { bars, rowCount: rows.length };

                                                                    {memoCount > 0 && (
                                                                        hasUnread

                                                                            : <span className="text-[9px] bg-yellow-100 text-yellow-700 px-1.5 rounded-full font-bold">{memoCount}</span>

                                                                    <div className="hidden md:block absolute bottom-1 left-1 right-1 pt-1 border-t border-blue-100 border-dashed">
                                                                        <div className="text-[9px] font-bold text-blue-600">ВБ╝ью┤ВѕўвІ╣</div>
                                                                        {holidayEntries.slice(0, 2).map((h, i) => (
                                                                            <div key={i} className="text-[9px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                                        ))}
                                                                    </div>
                                                                )}
                                                            </div>
                                                        );
                                                    })}
                                                </div>
                                                {/* ВЌ░ВєЇ ВЮїВўЂв░ћ Вўцв▓ёваѕВЮ┤ */}
                                                <div className="absolute left-0 right-0 pointer-events-none"
                                                    style={{top: '34px', bottom: '6px'}}>
                                                    <div className="grid grid-cols-7 h-full px-0.5"
                                                        style={{gridAutoRows: '20px', rowGap: '2px', alignContent: 'start'}}>
                                                        {bars.map(bar => {
                                                            const label = `${bar.empName}(${fmtTime(bar.startHour, bar.startMinute||0)}~${fmtTime(bar.endHour, bar.endMinute||0)})`;
                                                            return (

                                                                    style={{
                                                                        gridColumn: `${bar.startCol + 1} / ${bar.endCol + 2}`,

                        const prevY = month === 1 ? year - 1 : year;

                    })()}

                    {scheduleModal && (

        }

        // РћђРћђРћђ ВёювфЁ ЖиИвдгЖИ░ вфевІг (ьЎЋвїђ В║ћв▓ёВіц) РћђРћђРћђ
        function SignatureDrawModal({ onSave, onClose }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);
            const lastPosRef = useRef(null);

            const getPos = (e, canvas) => {
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width;
                const sy = canvas.height / rect.height;
                if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
                return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
            };

            const startDraw = (e) => {
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                setIsDrawing(true); setHasDrawn(true);
                lastPosRef.current = pos;
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a'; ctx.fill();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                lastPosRef.current = pos;
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const handleConfirm = () => {
                if (!hasDrawn) return;
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4" onClick={onClose}>
                    <div className="rounded-2xl shadow-2xl w-full max-w-lg" style={{ backgroundColor: 'white', color: '#111' }} onClick={e => e.stopPropagation()}>
                        <div className="px-5 pt-5 pb-2 flex items-center justify-between">
                            <div>
                                <h3 className="text-base font-bold" style={{ color: '#1f2937' }}>ВёювфЁьЋўЖИ░</h3>
                                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>ВЮ┤вдёВЮё ВаЋВъљвАю ВаЂВќ┤ВБ╝ВёИВџћ</p>
                            </div>
                            <button onClick={onClose} className="text-xl leading-none" style={{ color: '#9ca3af' }}>РюЋ</button>
                        </div>
                        <div className="px-5 pb-2 relative">
                            <canvas ref={canvasRef} width={600} height={260}
                                className="rounded-xl touch-none cursor-crosshair w-full"
                                style={{ touchAction: 'none', backgroundColor: 'white', display: 'block', border: '2px dashed #d1d5db' }}
                                onMouseDown={startDraw} onMouseMove={draw}
                                onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)}
                                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                            />
                            {!hasDrawn && (
                                <p className="absolute inset-0 mx-5 flex items-center justify-center text-sm pointer-events-none" style={{ color: '#9ca3af' }}>ВЌгЖИ░ВЌљ ВёювфЁьЋўВёИВџћ</p>
                            )}
                            {hasDrawn && (
                                <button onClick={clear} className="absolute top-3 right-7 text-xs px-2 py-1 rounded-lg transition" style={{ backgroundColor: '#fee2e2', color: '#dc2626' }}>ВДђВџ░ЖИ░</button>
                            )}
                        </div>
                        <div className="px-5 pb-5 flex gap-3 mt-3">
                            <button onClick={onClose} className="flex-1 py-3 rounded-xl text-sm font-medium transition" style={{ border: '1px solid #e5e7eb', backgroundColor: 'white', color: '#4b5563' }}>ВиеВєї</button>
                            <button onClick={handleConfirm} disabled={!hasDrawn}
                                className="flex-1 py-3 rounded-xl text-sm font-bold transition"
                                style={{ backgroundColor: hasDrawn ? '#22c55e' : '#e5e7eb', color: hasDrawn ? 'white' : '#9ca3af', cursor: hasDrawn ? 'pointer' : 'not-allowed' }}>
                                ВЎёвБї
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // РћђРћђРћђ ВъљьЋёВёювфЁ В║ћв▓ёВіц (ьЃГьЋўвЕ┤ ьЎЋвїђ вфевІг ВЌ┤вд╝) РћђРћђРћђ
        function SignatureCanvas({ onSave, width = 320, height = 110, className = '' }) {
            const [showModal, setShowModal] = useState(false);
            const [savedSig, setSavedSig] = useState('');

                e.stopPropagation();

                        {savedSig ? (

        }

        // РћђРћђРћђ Жи╝вАюЖ│ёВЋйВёю ВЌ┤въї вфевІг РћђРћђРћђ
        function ContractViewModal({ contract, onClose, bossCanSign, onSign, contractDeleteRequest, onRequestDelete, onCancelDelete, viewerRole }) {

                        ${sigImg(c.ownerInfo.signatureData)}
                    </div>` : '';

                const empHtml = c.employeeInfo ? `
                    <div style="background:#f0fdf4;border-radius:10px;padding:14px;margin-bottom:10px;page-break-inside:avoid;">
                        <p style="font-size:11px;font-weight:700;color:#15803d;margin:0 0 7px;">Жи╝вАюВъљ</p>

                        <p style="font-size:12.5px;margin:2px 0;">ВЌ░вЮйВ▓ў: ${esc(c.employeeInfo.phone)}</p>
                        <p style="font-size:12.5px;margin:2px 0;">Вё▒вфЁ: ${esc(c.employeeInfo.name)}</p>
                        ${sigImg(c.employeeInfo.signatureData)}

                const completedHtml = c.status === 'completed' ? `
                    <div style="background:#dcfce7;border:1px solid #86efac;border-radius:10px;padding:10px;text-align:center;page-break-inside:avoid;">
                        <p style="color:#15803d;font-weight:700;font-size:13px;margin:0;">РюЊ Ж│ёВЋй ВЎёвБї</p>
                    </div>` : '';

                const html = `<!DOCTYPE html><html lang="ko"><head><meta charset="UTF-8">
                    <title>${esc(c.title || 'Жи╝вАюЖ│ёВЋйВёю')}</title>
                    <style>

                                    <input type="radio" name="insuranceMode" value="none" checked={localInsuranceMode === 'none'} onChange={() => saveInsuranceMode('none')} className="accent-orange-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">Ж│хВаю ВЌєВЮї</p>
                                        <p className="text-xs text-gray-400">ЖИЅВЌг Ж│хВаювЦ╝ ВаЂВџЕьЋўВДђ ВЋіВЮї</p>
                                    </div>
                                </label>
                                <label className={`flex items-center gap-3 p-3 border-2 rounded-xl cursor-pointer transition ${localInsuranceMode === 'global' ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                    <input type="radio" name="insuranceMode" value="global" checked={localInsuranceMode === 'global'} onChange={() => saveInsuranceMode('global')} className="accent-orange-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">ВаёВ▓┤ ВЮ╝Ж┤ёВаЂВџЕ</p>
                                        <p className="text-xs text-gray-400">вфевЊа Жи╝вг┤ВъљВЌљЖ▓ї вЈЎВЮ╝ьЋю Ж│хВаюВюе ВаЂВџЕ</p>
                                    </div>
                                </label>
                                <label className={`flex items-center gap-3 p-3 border-2 rounded-xl cursor-pointer transition ${localInsuranceMode === 'individual' ? 'border-orange-500 bg-orange-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                    <input type="radio" name="insuranceMode" value="individual" checked={localInsuranceMode === 'individual'} onChange={() => saveInsuranceMode('individual')} className="accent-orange-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">Ж░юв│ё ВаЂВџЕ</p>
                                        <p className="text-xs text-gray-400">Жи╝вг┤Въљв│ёвАю вІцвЦИ ЖИЅВЌг Ж│хВаюВюе ВёцВаЋ</p>
                                    </div>
                                </label>
                            </div>

                            {localInsuranceMode === 'global' && (
                                <div className="space-y-3">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Ж│хВаюьЋГвфЕ</label>
                                        <input type="text" value={localInsuranceName} onChange={e => { const v = e.target.value; setLocalInsuranceName(v); saveInsuranceGlobalFields(v, localInsuranceRate); }}
                                            placeholder="Вўѕ) Ж│аВџЕв│┤ьЌў / ьћёвдгвъюВёю вЊ▒вЊ▒"
                                            className="w-full border border-gray-300 rounded-xl px-4 py-2.5 text-sm focus:ring-2 focus:ring-orange-500 outline-none transition" />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">В┤Ю ЖИЅВЌгВЌљВёю Ж│хВаю</label>
                                        <div className="relative">
                                            <input type="number" value={localInsuranceRate} onChange={e => { const v = e.target.value; setLocalInsuranceRate(v); saveInsuranceGlobalFields(localInsuranceName, v); }}
                                                min="0" max="100" step="0.1" placeholder="Вўѕ) 3.3"
                                                className="w-full border border-gray-300 rounded-xl px-4 py-2.5 pr-8 text-sm focus:ring-2 focus:ring-orange-500 outline-none transition" />
                                            <span className="absolute right-4 top-1/2 -translate-y-1/2 text-sm text-gray-400 font-bold">%</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {localInsuranceMode === 'individual' && (
                                <div className="bg-yellow-50 rounded-xl p-4 border border-yellow-200">
                                    <p className="text-sm text-yellow-700 font-medium">ВДЂВЏљВаЋв│┤ВЌљВёю Ж░юв│ё Ж│хВаюВюеВЮё ВёцВаЋьЋўВёИВџћ.</p>
                                </div>
                            )}
                        </div>
                    )}
                </div>

                {/* ВДЂВЏљьЎћвЕ┤ ВёцВаЋ */}
                <div className="max-w-md mx-auto mt-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setOpenEmpDisplay(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-purple-100 p-2.5 rounded-xl">
                                <svg className="w-6 h-6 text-purple-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="3" width="20" height="14" rx="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">ВДЂВЏљьЎћвЕ┤ ВёцВаЋ</h2>
                                <p className="text-xs text-gray-500">ВДЂВЏљьЎћвЕ┤ВЌљ ьЉюВІювља ьЋГвфЕ ВёцВаЋ</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${openEmpDisplay ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {openEmpDisplay && (
                        <div className="px-6 pb-6 border-t border-gray-100 pt-4">
                            <p className="text-sm text-gray-500 mb-4">ВДЂВЏљьЎћвЕ┤ВЮў ЖИЅВЌгВџћВЋйВЌљ ьЉюВІювља ьЋГвфЕВЮё ВёаьЃЮьЋўВёИВџћ.</p>
                            <div className="space-y-3">
                                <label className="flex items-center gap-3 cursor-pointer">
                                    <input type="checkbox" checked={empShowPay} onChange={e => { const v = e.target.checked; saveEmpDisplay(v, v ? empShowHoliday : false, v ? empShowDeduction : false); }} className="w-4 h-4 accent-purple-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">ЖИЅВЌг ьЋЕЖ│ё</p>
                                        <p className="text-xs text-gray-400">ВІюЖИЅв│ё Жи╝вг┤ВІюЖ░ё ├Ќ ВІюЖИЅ ьЋЕВѓ░ ьЉюВІю</p>
                                    </div>
                                </label>
                                <label className={`flex items-center gap-3 ${empShowPay ? 'cursor-pointer' : 'cursor-not-allowed opacity-40'}`}>
                                    <input type="checkbox" checked={empShowHoliday} onChange={e => saveEmpDisplay(empShowPay, e.target.checked, empShowDeduction)} disabled={!empShowPay} className="w-4 h-4 accent-purple-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">ВБ╝ью┤ВѕўвІ╣ ьЉюВІю</p>
                                        <p className="text-xs text-gray-400">ВБ╝ью┤ВѕўвІ╣ ЖИѕВЋАВЮё ьЋЕВѓ░ВЌљ ьЈгьЋеьЋўВЌг ьЉюВІю</p>
                                    </div>
                                </label>
                                <label className={`flex items-center gap-3 ${empShowPay ? 'cursor-pointer' : 'cursor-not-allowed opacity-40'}`}>
                                    <input type="checkbox" checked={empShowDeduction} onChange={e => saveEmpDisplay(empShowPay, empShowHoliday, e.target.checked)} disabled={!empShowPay} className="w-4 h-4 accent-purple-600" />
                                    <div>
                                        <p className="font-bold text-gray-800 text-sm">Ж│хВаюВюе ьЉюВІю</p>
                                        <p className="text-xs text-gray-400">ВёцВаЋвљю ЖИЅВЌг Ж│хВаюВюеВЮё ВаЂВџЕьЋўВЌг ьЉюВІю</p>
                                    </div>
                                </label>
                            </div>
                        </div>
                    )}
                </div>

                {/* ЖИЅВЌгВДђЖИЅВЮ╝ ВъљвЈЎв░юВєА ВёцВаЋ */}
                {!isDeleting && <PayslipSendSettings workspaceInfo={workspaceInfo} setWorkspaceInfo={setWorkspaceInfo} workspaceId={workspaceId} firebaseUser={firebaseUser} showAlert={showAlert} employees={employees} setEmployees={setEmployees} />}

                {/* Жи╝вАюЖ│ёВЋйВёю ВёцВаЋ */}
                {!isDeleting && (
                    <ContractTemplateEditor
                        workspaceInfo={workspaceInfo}
                        setWorkspaceInfo={setWorkspaceInfo}
                        workspaceId={workspaceId}
                        firebaseUser={firebaseUser}
                        showAlert={showAlert}
                        showConfirm={showConfirm}
                        employees={employees}
                        setEmployees={setEmployees}
                    />
                )}

                {/* ВЌЁВ▓┤ ВѓГВаю */}
                <WorkspaceDeleteSection
                    isDeleting={isDeleting}
                    deleteScheduledAt={deleteScheduledAt}
                    onDelete={onDeleteWorkspace}
                    onCancel={onCancelDeleteWorkspace}
                    showConfirm={showConfirm}
                    shopName={workspaceInfo?.shopName}
                />

                {/* Ж░юВЮИВаЋв│┤В▓ўвдгв░ЕВ╣е */}
                <div className="max-w-md mx-auto mt-6 mb-8 text-center">
                    <a href="./privacy.html" target="_blank" className="text-sm text-gray-400 hover:text-blue-500 underline">Ж░юВЮИВаЋв│┤В▓ўвдгв░ЕВ╣е</a>
                </div>
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlbaTracker />);
    </script>

    <!-- Service Worker вЊ▒вАЮ: PWA installable ВА░Ж▒┤ ВХЕВА▒ВџЕ в╣ѕ fetch handler.
         Ж░ђвАюВ▒ёЖИ░┬иВ║љВІ▒ВЮ┤ ВЌєВќ┤ OAuth ьћївАюВџ░ВЎђ ьјўВЮ┤ВДђ Ж░▒ВІаВЮё вДЮВ╣ўВДђ ВЋіВЮї. -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
