<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>알바트래커 v1.0</title>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (브라우저에서 React JSX를 해석하기 위함) -->

    <!-- Tailwind CSS (스타일링) -->

    <!-- SheetJS (엑셀 파일 생성) -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <style>
        /* 가로 스크롤바 숨김 처리 */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        .no-scrollbar {
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        body { font-family: 'Pretendard', sans-serif; }
        
        /* input number 화살표 숨김 */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button {
            -webkit-appearance: none;
            margin: 0;
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* 월 선택 입력칸의 기본 'X(삭제)' 버튼 숨김 (입력칸 내부) */
        input[type="month"]::-webkit-clear-button,
        input[type="month"]::-webkit-inner-spin-button {
            display: none;
            -webkit-appearance: none;
        }
    </style>
</head>
<body>
    <!-- React 앱이 렌더링될 공간 -->
    <div id="root"></div>

    <!-- 앱 핵심 코드 -->
    <script type="text/babel">
        const { useState, useEffect, useRef, useMemo } = React;

        // --- 아이콘 컴포넌트 (lucide-react 대체) ---
        const Users = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>;
        const CalendarIcon = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></svg>;
        const Wallet = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12V7H5a2 2 0 0 1 0-4h14v4"/><path d="M3 5v14a2 2 0 0 0 2 2h16v-5"/><path d="M18 12a2 2 0 0 0 0 4h4v-4Z"/></svg>;
        const BarChart3 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 3v18h18"/><rect width="4" height="7" x="7" y="10" rx="1"/><rect width="4" height="12" x="15" y="5" rx="1"/></svg>;
        const Settings = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/><circle cx="12" cy="12" r="3"/></svg>;
        const Search = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>;
        const Plus = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M5 12h14"/><path d="M12 5v14"/></svg>;
        const Edit2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/><path d="m15 5 4 4"/></svg>;
        const Trash2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const X = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>;
        const ChevronLeft = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>;
        const ChevronRight = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m9 18 6-6-6-6"/></svg>;
        const Lock = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
        const CheckCircle2 = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><path d="m9 12 2 2 4-4"/></svg>;
        const AlertCircle = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="8" y2="12"/><line x1="12" x2="12.01" y1="16" y2="16"/></svg>;
        const Download = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const FileSpreadsheet = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><line x1="8" x2="16" y1="13" y2="13"/><line x1="8" x2="16" y1="17" y2="17"/><line x1="8" x2="10" y1="9" y2="9"/></svg>;
        const Upload = ({className}) => <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;

        // --- 전역 설정 및 유틸리티 ---
        const MIN_WAGE = 10030; // 2026년 기준 예상 최저시급
        const INITIAL_PIN = '000000';

        const formatCurrency = (amount) => {
          return new Intl.NumberFormat('ko-KR', { style: 'currency', currency: 'KRW' }).format(amount || 0);
        };

        const getDaysInMonth = (year, month) => new Date(year, month, 0).getDate();
        const getFirstDayOfMonth = (year, month) => new Date(year, month - 1, 1).getDay();

        // LocalStorage 로드 유틸리티
        const loadData = (key, defaultVal) => {
            try {
                const saved = localStorage.getItem(key);
                if (saved !== null) {
                    return JSON.parse(saved);
                }
            } catch (e) {
                console.error(`로컬스토리지 로드 에러 (${key}):`, e);
            }
            return defaultVal;
        };

        // --- 주휴수당 계산 유틸리티 ---
        // 반환: { 'YYYY-MM-DD(일요일)': [{ empId, name, weeklyHours, holidayPay }] }
        // ※ toISOString()은 UTC 기준이라 UTC+9 환경에서 날짜가 밀리므로
        //    new Date(y, m-1, d) 로컬 생성 + 로컬 문자열 변환 사용
        function calcHolidayPayBySunday(monthlyData, employees) {
          const toLocalStr = (date) => {
            const y = date.getFullYear();
            const m = (date.getMonth() + 1).toString().padStart(2, '0');
            const d = date.getDate().toString().padStart(2, '0');
            return `${y}-${m}-${d}`;
          };

          // 1) 전체 날짜별 근무 데이터 수집
          const allDateEntries = {}; // 'YYYY-MM-DD' -> { empId: { hours, wage, name } }
          Object.entries(monthlyData).forEach(([mk, monthData]) => {
            const [y, m] = mk.split('-').map(Number);
            Object.entries(monthData.days || {}).forEach(([day, dayData]) => {
              const dateStr = toLocalStr(new Date(y, m - 1, parseInt(day)));
              const empData = {};
              Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                if (entry.hours > 0) empData[empId] = { hours: entry.hours, wage: entry.wage, name: entry.name };
              });
              if (Object.keys(empData).length > 0) allDateEntries[dateStr] = empData;
            });
          });

          // 2) 각 날짜가 속한 주(월~일)의 일요일을 계산하여 수집
          //    월요일(dow=1)~토요일(dow=6) → 그 주 일요일(+daysToSunday)
          //    일요일(dow=0) → 해당 날이 주의 마지막날이므로 그대로
          const weekSundays = new Set();
          Object.keys(allDateEntries).forEach(dateStr => {
            const [y, m, d] = dateStr.split('-').map(Number);
            const date = new Date(y, m - 1, d); // 로컬 날짜
            const dow = date.getDay(); // 0=일, 1=월 ... 6=토
            const daysToSunday = dow === 0 ? 0 : 7 - dow;
            weekSundays.add(toLocalStr(new Date(y, m - 1, d + daysToSunday)));
          });

          // 3) 각 주(월~일) 근무시간 합산 → 15시간 이상이면 주휴수당 계산
          const result = {};
          weekSundays.forEach(sundayStr => {
            const [sy, sm, sd] = sundayStr.split('-').map(Number);

            const empWeekly = {}; // empId -> { hours, wage, name }
            for (let i = 0; i < 7; i++) {
              // i=0: 월(sunday-6) ... i=6: 일(sunday)
              const dk = toLocalStr(new Date(sy, sm - 1, sd - 6 + i));
              Object.entries(allDateEntries[dk] || {}).forEach(([empId, data]) => {
                if (!empWeekly[empId]) {
                  const emp = employees.find(e => e.id.toString() === empId);
                  empWeekly[empId] = { hours: 0, wage: emp?.wage || data.wage || MIN_WAGE, name: data.name };
                }
                empWeekly[empId].hours += data.hours;
              });
            }

            const weekResults = [];
            Object.entries(empWeekly).forEach(([empId, { hours, wage, name }]) => {
              if (hours >= 15) {
                weekResults.push({ empId, name, weeklyHours: hours, holidayPay: Math.round((hours / 5) * wage) });
              }
            });
            if (weekResults.length > 0) result[sundayStr] = weekResults;
          });

          return result;
        }

        // --- 공통 연/월 직접입력 컴포넌트 ---
        function MonthYearSelector({ year, month, onChange }) {
          const [y, setY] = useState(year);
          const [m, setM] = useState(month);

          useEffect(() => {
            setY(year);
            setM(month);
          }, [year, month]);

          const handleApply = () => {
            let newY = parseInt(y);
            let newM = parseInt(m);
            if (isNaN(newY) || newY < 1900) newY = new Date().getFullYear();
            if (isNaN(newM) || newM < 1) newM = 1;
            if (newM > 12) newM = 12;

            setY(newY);
            setM(newM);
            onChange(newY, newM);
          };

          const handleKeyDown = (e) => {
            if (e.key === 'Enter') handleApply();
          };

          return (
            <div className="flex items-center gap-1 justify-center">
              <input
                type="number"
                value={y}
                onChange={e => setY(e.target.value)}
                onKeyDown={handleKeyDown}
                className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-16 md:w-20 text-center outline-none transition-colors"
              />
              <span className="text-lg md:text-xl font-bold text-gray-800">년</span>
              <input
                type="number"
                value={m}
                onChange={e => setM(e.target.value)}
                onKeyDown={handleKeyDown}
                className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-10 md:w-12 text-center outline-none transition-colors"
              />
              <span className="text-lg md:text-xl font-bold text-gray-800">월</span>
              <button
                onClick={handleApply}
                className="ml-1 md:ml-2 text-xs bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1.5 rounded-md font-bold transition shadow-sm whitespace-nowrap"
              >
                이동
              </button>
            </div>
          );
        }

        // --- 메인 애플리케이션 컴포넌트 ---
        function AlbaTracker() {
          const [isAuthenticated, setIsAuthenticated] = useState(false);
          
          // 초기 로딩 시 로컬스토리지에서 값 불러오기
          const [appPin, setAppPin] = useState(() => loadData('albaTracker_appPin', INITIAL_PIN));
          const [activeTab, setActiveTab] = useState('employees');
          const [employees, setEmployees] = useState(() => loadData('albaTracker_employees', []));
          const [nextEmpId, setNextEmpId] = useState(() => loadData('albaTracker_nextEmpId', 1));
          // monthlyData format: 'YYYY-MM': { totalRevenue?: number, days: { 1: { revenue: 0, entries: { empId: { hours, pay, name, wage } } } } }
          const [monthlyData, setMonthlyData] = useState(() => loadData('albaTracker_monthlyData', {}));
          const [predictData, setPredictData] = useState(() => loadData('albaTracker_predictData', {}));
          const [globalMinWage, setGlobalMinWage] = useState(() => loadData('albaTracker_globalMinWage', MIN_WAGE));

          // 값이 변경될 때마다 로컬스토리지에 자동 저장
          useEffect(() => { localStorage.setItem('albaTracker_appPin', JSON.stringify(appPin)); }, [appPin]);
          useEffect(() => { localStorage.setItem('albaTracker_employees', JSON.stringify(employees)); }, [employees]);
          useEffect(() => { localStorage.setItem('albaTracker_nextEmpId', JSON.stringify(nextEmpId)); }, [nextEmpId]);
          useEffect(() => { localStorage.setItem('albaTracker_monthlyData', JSON.stringify(monthlyData)); }, [monthlyData]);
          useEffect(() => { localStorage.setItem('albaTracker_predictData', JSON.stringify(predictData)); }, [predictData]);
          useEffect(() => { localStorage.setItem('albaTracker_globalMinWage', JSON.stringify(globalMinWage)); }, [globalMinWage]);

          // 새로고침/탭 닫기 직전에 최신 상태를 localStorage에 강제 저장
          useEffect(() => {
            const handleBeforeUnload = () => {
              localStorage.setItem('albaTracker_appPin', JSON.stringify(appPin));
              localStorage.setItem('albaTracker_employees', JSON.stringify(employees));
              localStorage.setItem('albaTracker_nextEmpId', JSON.stringify(nextEmpId));
              localStorage.setItem('albaTracker_monthlyData', JSON.stringify(monthlyData));
              localStorage.setItem('albaTracker_predictData', JSON.stringify(predictData));
              localStorage.setItem('albaTracker_globalMinWage', JSON.stringify(globalMinWage));
            };
            window.addEventListener('beforeunload', handleBeforeUnload);
            return () => window.removeEventListener('beforeunload', handleBeforeUnload);
          }, [appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage]);

          // 동적 구분번호 매기기: 최초입사일(hireDate) 빠른 순서대로 정렬하여 displayId 부여
          const employeesWithDisplayId = useMemo(() => {
            return [...employees].sort((a, b) => {
              const dateA = new Date(a.hireDate).getTime();
              const dateB = new Date(b.hireDate).getTime();
              // 입사일이 같으면 고유 id(입력 순서)로 정렬
              if (dateA === dateB) return a.id - b.id;
              return dateA - dateB;
            }).map((emp, index) => ({ ...emp, displayId: index + 1 }));
          }, [employees]);

          const fileInputRef = useRef(null);

          const handleBackup = () => {
            const backupData = {
              version: "1.0",
              employees, // 내부 ID 유지한 채 백업
              monthlyData,
              predictData,
              nextEmpId,
              appPin,
              globalMinWage
            };
            const dataStr = JSON.stringify(backupData);
            const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
            
            const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
            const exportFileDefaultName = `알바트래커_백업_${dateStr}.json`;

            let linkElement = document.createElement('a');
            linkElement.setAttribute('href', dataUri);
            linkElement.setAttribute('download', exportFileDefaultName);
            document.body.appendChild(linkElement);
            linkElement.click();
            document.body.removeChild(linkElement);
          };

          const handleImportClick = () => {
            if (window.confirm("불러오기를 진행하면 현재 입력된 데이터가 모두 덮어씌워집니다.\n계속하시겠습니까?")) {
              fileInputRef.current?.click();
            }
          };

          const handleFileImport = (e) => {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = (event) => {
              try {
                const importedData = JSON.parse(event.target.result);
                if (importedData.employees && importedData.monthlyData) {
                  setEmployees(importedData.employees);
                  setMonthlyData(importedData.monthlyData);
                  if (importedData.predictData) setPredictData(importedData.predictData);
                  if (importedData.nextEmpId) setNextEmpId(importedData.nextEmpId);
                  if (importedData.appPin) setAppPin(importedData.appPin);
                  if (importedData.globalMinWage) setGlobalMinWage(importedData.globalMinWage);
                  alert("백업 데이터를 성공적으로 불러왔습니다.");
                } else {
                  alert("유효하지 않은 백업 파일 형식입니다.");
                }
              } catch (error) {
                alert("파일을 읽는 중 오류가 발생했습니다.");
              }
            };
            reader.readAsText(file);
            e.target.value = null;
          };

          if (!isAuthenticated) {
            return <LoginScreen appPin={appPin} onLogin={() => setIsAuthenticated(true)} />;
          }

          const getEmployeeStats = (empId) => {
            let totalDays = 0, totalHours = 0, totalPay = 0;

            Object.values(monthlyData).forEach(monthData => {
              Object.values(monthData.days || {}).forEach(dayData => {
                const entry = dayData.entries?.[empId];
                if (entry && entry.hours > 0) {
                  totalDays++;
                  totalHours += entry.hours;
                  totalPay += entry.pay;
                }
              });
            });

            const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
            let totalHolidayPay = 0;
            Object.values(holidayBySunday).forEach(weekData => {
              weekData.forEach(item => {
                if (item.empId === empId.toString()) totalHolidayPay += item.holidayPay;
              });
            });

            return { totalDays, totalHours, totalPay, totalHolidayPay };
          };

          return (
            <div className="min-h-screen bg-gray-50 text-gray-800 font-sans">
              <header className="bg-green-600 text-white shadow-md">
                <div className="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
                  <h1 className="text-xl font-bold flex items-center gap-2">
                    <CalendarIcon className="w-6 h-6" />
                    알바트래커 v1.0
                  </h1>
                  <div className="flex items-center gap-1 md:gap-2">
                    <input 
                      type="file" 
                      accept=".json" 
                      ref={fileInputRef} 
                      style={{ display: 'none' }} 
                      onChange={handleFileImport}
                    />
                    <button 
                      onClick={handleImportClick}
                      className="flex items-center gap-1 text-sm bg-green-500 hover:bg-green-400 px-2 md:px-3 py-1.5 rounded-md transition"
                      title="데이터 불러오기"
                    >
                      <Upload className="w-4 h-4" />
                      <span className="hidden sm:inline">불러오기</span>
                    </button>
                    <button 
                      onClick={handleBackup}
                      className="flex items-center gap-1 text-sm bg-green-500 hover:bg-green-400 px-2 md:px-3 py-1.5 rounded-md transition"
                      title="데이터 백업하기"
                    >
                      <Download className="w-4 h-4" />

        // ==========================================
        // 세부 컴포넌트들
        // ==========================================
        function LoginScreen({ appPin, onLogin }) {
          const [input, setInput] = useState('');
          const [error, setError] = useState(false);

          const handleNumClick = (num) => {
            if (input.length < 6) {
              const newInput = input + num;
              setInput(newInput);
              setError(false);
              if (newInput.length === 6 && newInput === appPin) {
                setTimeout(onLogin, 100);
              } else if (newInput.length === 6) {
                setError(true);
                setTimeout(() => setInput(''), 500);
              }
            }
          };

          const handleDelete = () => setInput(prev => prev.slice(0, -1));

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (/[0-9]/.test(e.key)) handleNumClick(e.key);
              if (e.key === 'Backspace') handleDelete();
              if (e.key === 'Enter' && input === appPin) onLogin();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [input, appPin]);

          return (
            <div className="min-h-screen bg-gray-100 flex flex-col items-center justify-center p-4">
              <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                <div className="bg-yellow-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                  <Lock className="w-8 h-8 text-yellow-600" />
                </div>
                <h2 className="text-2xl font-bold text-gray-800 mb-2">알바트래커 v1.0</h2>
                <p className="text-gray-500 mb-6 text-sm">
                  {appPin === INITIAL_PIN ? '초기 비밀번호는 "000000"입니다.' : '비밀번호를 입력해주세요.'}
                </p>

                <div className="flex justify-center gap-3 mb-8">
                  {[...Array(6)].map((_, i) => (
                    <div 
                      key={i} 
                      className={`w-4 h-4 rounded-full transition-all ${
                        i < input.length ? 'bg-green-600' : 'bg-gray-200'
                      } ${error ? 'bg-red-500' : ''}`}
                    />
                  ))}
                </div>

                <div className="grid grid-cols-3 gap-3">
                  {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                    <button
                      key={num}
                      onClick={() => handleNumClick(num.toString())}
                      className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                    >
                      {num}
                    </button>
                  ))}
                  <div className="h-14"></div>
                  <button
                    onClick={() => handleNumClick('0')}
                    className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                  >
                    0
                  </button>
                  <button
                    onClick={handleDelete}
                    className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-lg font-medium text-gray-700 flex items-center justify-center transition active:scale-95"
                  >
                    <X className="w-6 h-6" />
                  </button>
                </div>
              </div>
            </div>
          );
        }

        function TabEmployees({ employees, setEmployees, nextEmpId, setNextEmpId, getEmployeeStats, globalMinWage, setGlobalMinWage }) {

          const [isModalOpen, setIsModalOpen] = useState(false);

          const filteredEmployees = useMemo(() => {
            if (!searchTerm) return employees.sort((a, b) => a.displayId - b.displayId);
            return employees.filter(emp => emp.name.includes(searchTerm)).sort((a, b) => a.displayId - b.displayId);
          }, [employees, searchTerm]);

          const handleSave = (empData) => {
            const { displayId, ...dataToSave } = empData;

            if (editingEmp) {
              setEmployees(prev => prev.map(e => e.id === dataToSave.id ? dataToSave : e));
            } else {
              setEmployees(prev => [...prev, dataToSave]);
              setNextEmpId(prev => prev + 1);

            setIsModalOpen(false);
            setEditingEmp(null);
          };

          const handleDelete = (id) => {
            if (window.confirm('정말 이 근무자를 삭제하시겠습니까? (기존 근무 기록은 월별 현황에 유지됩니다)')) {
              setEmployees(prev => prev.filter(e => e.id !== id));

                  <div className="relative w-full sm:w-72">
                    <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                      <Search className="h-5 w-5 text-gray-400" />
                    </div>
                    <input

                      className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"

                      value={searchTerm}
                      onChange={(e) => setSearchTerm(e.target.value)}

                  <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-lg px-3 py-2 w-full sm:w-auto shadow-sm">
                    <label className="text-sm font-medium text-gray-700 whitespace-nowrap">현재 최저시급:</label>
                    <input
                      type="number"
                      className="w-20 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0"
                      value={globalMinWage}
                      onChange={(e) => setGlobalMinWage(Number(e.target.value))}
                    />
                    <span className="text-sm text-gray-500 font-medium whitespace-nowrap">원</span>
                  </div>
                </div>
                <button
                  onClick={() => { setEditingEmp(null); setIsModalOpen(true); }}
                  className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition shadow-sm w-full sm:w-auto justify-center"
                >
                  <Plus className="w-5 h-5" />
                  근무자 추가
                </button>
              </div>

              {filteredEmployees.length === 0 ? (
                <div className="text-center py-12 bg-white rounded-xl border border-gray-200">
                  <Users className="mx-auto h-12 w-12 text-gray-300 mb-3" />
                  <p className="text-gray-500">등록된 근무자가 없습니다.</p>
                </div>
              ) : (
                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                  {filteredEmployees.map(emp => {
                    const stats = getEmployeeStats(emp.id);
                    const statusVal = emp.status || (emp.isWorking === false ? 'resigned' : 'working');
                    return (
                      <div key={emp.id} className={`bg-white rounded-xl border shadow-sm p-5 relative transition ${statusVal !== 'working' ? 'opacity-75 bg-gray-50' : ''}`}>
                        <div className="flex justify-between items-start mb-3">
                          <div>
                            <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2 py-1 rounded-md mb-2 inline-block">
                              No. {emp.displayId}
                            </span>
                            <h3 className="text-lg font-bold text-gray-800 flex items-center gap-2">
                              {emp.name}
                              {statusVal === 'working' && <span className="text-xs font-normal text-green-600 border border-green-200 bg-green-50 px-1.5 py-0.5 rounded">근무 중</span>}
                              {statusVal === 'leave' && <span className="text-xs font-normal text-yellow-600 border border-yellow-200 bg-yellow-50 px-1.5 py-0.5 rounded">휴직</span>}
                              {statusVal === 'resigned' && <span className="text-xs font-normal text-red-600 border border-red-200 bg-red-50 px-1.5 py-0.5 rounded">퇴사</span>}
                            </h3>
                          </div>
                          <div className="flex gap-2">
                            <button onClick={() => { setEditingEmp(emp); setIsModalOpen(true); }} className="text-gray-400 hover:text-green-600 p-1">
                              <Edit2 className="w-4 h-4" />
                            </button>
                            <button onClick={() => handleDelete(emp.id)} className="text-gray-400 hover:text-red-600 p-1">
                              <Trash2 className="w-4 h-4" />
                            </button>
                          </div>
                        </div>

                        <div className="space-y-1.5 text-sm text-gray-600 mb-4">
                          <p><span className="font-medium inline-block w-16">입사일:</span> {emp.hireDate || '-'}</p>
                          {emp.resignDate && <p><span className="font-medium inline-block w-16">퇴사일:</span> <span className="text-red-500">{emp.resignDate}</span></p>}
                          <p><span className="font-medium inline-block w-16">시급:</span> {formatCurrency(emp.wage)}</p>
                          <p>
                            <span className="font-medium text-gray-700">한 주 소정근로시간:</span>{' '}
                            {(emp.scheduledDays && emp.dailyHours)
                              ? `주 ${emp.scheduledDays}일 × ${emp.dailyHours}시간 = ${parseFloat(emp.scheduledDays) * parseFloat(emp.dailyHours)}시간`
                              : '-'}
                          </p>
                          <p className="truncate" title={`${emp.bank} ${emp.account}`}><span className="font-medium inline-block w-16">계좌:</span> {emp.bank} {emp.account}</p>
                          {emp.memo && <p className="truncate text-gray-500 bg-gray-50 p-2 rounded mt-2 text-xs">{emp.memo}</p>}
                        </div>

                        <div className="pt-3 border-t border-gray-100 bg-gray-50 -mx-5 -mb-5 p-4 rounded-b-xl">
                          <div className="grid grid-cols-3 gap-2 text-xs text-gray-500 text-center mb-2">
                            <div>
                              <div className="font-semibold text-gray-800">{stats.totalDays}일</div>
                              <div>총 근무일</div>
                            </div>
                            <div>
                              <div className="font-semibold text-gray-800">{stats.totalHours}H</div>
                              <div>총 근무시간</div>
                            </div>
                            <div>
                              <div className="font-semibold text-green-600">{formatCurrency(stats.totalPay)}</div>
                              <div>총 급여</div>
                            </div>
                          </div>
                          {stats.totalHolidayPay > 0 && (
                            <div className="grid grid-cols-2 gap-2 text-xs text-center border-t border-gray-200 pt-2 mt-1">
                              <div>
                                <div className="font-semibold text-blue-600">{formatCurrency(stats.totalHolidayPay)}</div>
                                <div className="text-gray-500">주휴수당</div>
                              </div>
                              <div>
                                <div className="font-semibold text-purple-600">{formatCurrency(stats.totalPay + stats.totalHolidayPay)}</div>
                                <div className="text-gray-500">주휴포함 급여</div>

                            </div>

                      </div>
                    );
                  })}
                </div>
              )}

              {isModalOpen && (
                <EmployeeModal 
                  employee={editingEmp} 
                  onClose={() => setIsModalOpen(false)} 
                  onSave={handleSave} 
                  nextId={nextEmpId}
                  globalMinWage={globalMinWage}
                />
              )}
            </div>
          );

        function EmployeeModal({ employee, onClose, onSave, nextId, globalMinWage }) {
          const [formData, setFormData] = useState(() => {
            const initialStatus = employee 
                ? (employee.status || (employee.isWorking === false ? 'resigned' : 'working'))
                : 'working';
            
            return employee ? { scheduledDays: '', dailyHours: '', resignDate: '', residentId: '', ...employee, status: initialStatus } : {
              id: nextId,
              name: '',
              hireDate: new Date().toISOString().split('T')[0],
              wage: '',
              scheduledDays: '',
              dailyHours: '',
              bank: '',
              account: '',
              residentId: '',
              memo: '',
              resignDate: '',
              status: initialStatus
            };
          });

          const handleChange = (e) => {
            const { name, value, type, checked } = e.target;
            setFormData(prev => ({
              ...prev,
              [name]: type === 'checkbox' ? checked : value
            }));
          };

          const handleResidentIdChange = (e) => {
            const raw = e.target.value.replace(/[^0-9]/g, '');
            const trimmed = raw.slice(0, 13);
            const formatted = trimmed.length > 6 ? `${trimmed.slice(0, 6)}-${trimmed.slice(6)}` : trimmed;
            setFormData(prev => ({ ...prev, residentId: formatted }));
          };

          const handleSubmit = (e) => {
            e.preventDefault();
            if (!formData.name) return alert('이름을 입력해주세요.');
            
            const finalData = {
              ...formData,
              wage: formData.wage ? parseInt(formData.wage, 10) : globalMinWage
            };
            onSave(finalData);
          };

          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              <div className="bg-white rounded-xl shadow-xl w-full max-w-md max-h-[90vh] flex flex-col overflow-hidden">
                <div className="flex justify-between items-center p-4 border-b flex-shrink-0">
                  <h3 className="text-lg font-bold">근무자 정보 {employee ? '수정' : '입력'}</h3>
                  <button type="button" onClick={onClose} className="text-gray-500 hover:bg-gray-100 p-1 rounded-full"><X className="w-5 h-5"/></button>
                </div>

                <form onSubmit={handleSubmit} className="p-4 space-y-3 overflow-y-auto flex-1">
                  <div className="grid grid-cols-2 gap-4">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">구분번호</label>
                      <input type="text" value={employee ? `No. ${employee.displayId}` : '저장 시 자동 부여'} disabled className="w-full bg-gray-100 border border-gray-300 rounded-lg px-3 py-2 text-sm text-gray-500" />
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">이름 *</label>
                      <input type="text" name="name" value={formData.name} onChange={handleChange} autoFocus required className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                    </div>
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">주민등록번호</label>
                    <input
                      type="text"
                      value={formData.residentId}
                      onChange={handleResidentIdChange}
                      placeholder="000000-0000000"
                      maxLength={14}
                      className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none font-mono tracking-wider"
                    />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">최초 입사일</label>
                    <input type="date" name="hireDate" value={formData.hireDate} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                  </div>

                  <div>
                    <label className="block text-sm font-medium text-gray-700 mb-1">시급</label>
                    <input type="number" name="wage" value={formData.wage} onChange={handleChange} placeholder={`공란 시 최저시급(${globalMinWage.toLocaleString()}원) 적용`} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                  </div>

                  <div className="grid grid-cols-2 gap-2">
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">소정근로일</label>
                      <div className="relative">
                        <input type="number" name="scheduledDays" value={formData.scheduledDays} onChange={handleChange} min="1" max="7" placeholder="0" className="w-full border border-gray-300 rounded-lg px-3 py-2 pr-8 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-400">일</span>
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-gray-700 mb-1">하루 근로시간</label>
                      <div className="relative">
                        <input type="number" name="dailyHours" value={formData.dailyHours} onChange={handleChange} min="1" max="24" step="0.5" placeholder="0" className="w-full border border-gray-300 rounded-lg px-3 py-2 pr-12 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                        <span className="absolute right-3 top-1/2 -translate-y-1/2 text-sm text-gray-400">시간</span>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-3 gap-2">
                    <div className="col-span-1">
                      <label className="block text-sm font-medium text-gray-700 mb-1">은행명</label>
                      <input type="text" name="bank" value={formData.bank} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" />
                    </div>
                    <div className="col-span-2">
                      <label className="block text-sm font-medium text-gray-700 mb-1">계좌번호</label>
                      <input type="text" name="account" value={formData.account} onChange={handleChange} className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none" />

                    <label className="block text-sm font-medium text-gray-700 mb-1">메모</label>
                    <textarea name="memo" value={formData.memo} onChange={handleChange} rows="2" className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-green-500 outline-none resize-none"></textarea>
