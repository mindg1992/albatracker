        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, allEmployees, monthlyData, setMonthlyData, onClose, onDelete }) {
            const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };

            const combinedEmployees = useMemo(() => {
                const list = [...activeEmployees];
                const activeIds = new Set(activeEmployees.map(e => e.id.toString()));

                Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
                    if (!activeIds.has(empIdStr)) {
                        const empInfo = (allEmployees || []).find(e => e.id.toString() === empIdStr);
                        const empStatus = empInfo?.status || (empInfo?.isWorking === false ? 'resigned' : 'resigned');
                        list.push({
                            id: empIdStr, displayId: '-', name: data.name, wage: data.wage,
                            isInactive: true, inactiveStatus: empStatus
                        });
                    }
                });
                return list;
            }, [activeEmployees, allEmployees, currentDayData.entries]);

            const hourRefs = useRef({});
            const minRefs = useRef({});

            const [revenue, setRevenue] = useState(currentDayData.revenue || '');
            const [hoursData, setHoursData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    init[emp.id] = existing > 0 ? Math.floor(existing) : '';
                });
                return init;
            });
            const [minsData, setMinsData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    const m = Math.round((existing - Math.floor(existing)) * 60);
                    init[emp.id] = m > 0 ? m : '';
                });
                return init;
            });
            // 메모 삭제 상태 (직원이 입력한 메모를 관리자가 삭제할 수 있음)
            const [deletedNotes, setDeletedNotes] = useState({});

            const handleHourKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleMinKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleSave = () => {
                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };
                    if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

                    newData[monthKey].days[day].revenue = Number(revenue) || 0;

                    combinedEmployees.forEach(emp => {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const existingEntry = prev[monthKey]?.days[day]?.entries[emp.id];

                        if (hours > 0) {
                            // 직원이 제출했고 관리자가 시간을 변경한 경우 → 알림 전송
                            if (existingEntry?.submittedByEmp && existingEntry?.empUid &&
                                existingEntry.hours !== hours) {
                                sendChangeNotification(existingEntry.empUid, {
                                    date: dateStr,
                                    oldHours: existingEntry.hours,
                                    newHours: hours
                                }).catch(() => {});
                            }
                            newData[monthKey].days[day].entries[emp.id] = {
                                hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage,
                                note: deletedNotes[emp.id] ? '' : (existingEntry?.note || ''),
                                submittedByEmp: existingEntry?.submittedByEmp || false,
                                empUid: existingEntry?.empUid || null,
                                submittedHours: existingEntry?.submittedHours || null,
                                bossModified: existingEntry?.submittedByEmp ? (existingEntry.hours !== hours) : false
                            };
                        } else {
                            delete newData[monthKey].days[day].entries[emp.id];
                        }
                    });
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <form onSubmit={(e) => { e.preventDefault(); handleSave(); }} className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{month}월 {day}일 상세 수정</h3>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">일일 매출 (원)</label>
                                <input 
                                    type="number" 
                                    value={revenue} 
                                    onChange={e => setRevenue(e.target.value)}
                                    className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="0"
                                />
                            </div>

                            <div className="pt-3 border-t border-gray-100">
                                <label className="block text-sm font-bold text-gray-700 mb-1">근무 시간 수정</label>
                                <p className="text-xs text-gray-400 mb-3">시간/분 입력 후 Enter → 다음 근무자로 이동</p>
                                {combinedEmployees.map((emp, idx) => (
                                    <React.Fragment key={emp.id}>
                                        <div className={`flex justify-between items-center mb-1 p-2 rounded-lg ${emp.isInactive ? (emp.inactiveStatus === 'leave' ? 'bg-yellow-50/50' : 'bg-red-50/50') : 'bg-gray-50'}`}>
                                            <span className="text-sm text-gray-700 truncate flex items-center gap-1 font-medium">
                                                {emp.isInactive ? (
                                                    emp.inactiveStatus === 'leave'
                                                        ? <span className="text-xs text-yellow-600 bg-yellow-50 border border-yellow-200 px-1.5 py-0.5 rounded font-bold">휴직</span>
                                                        : <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-bold">퇴사</span>
                                                ) : (
                                                    <span>{emp.displayId}.</span>
                                                )}
                                                {emp.name}
                                            </span>
                                            <div className="flex items-center gap-1">
                                                <input
                                                    ref={el => hourRefs.current[emp.id] = el}
                                                    type="number" min="0"
                                                    value={hoursData[emp.id] ?? ''}
                                                    onChange={e => setHoursData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleHourKeyDown(e, idx)}
                                                    className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-green-500 outline-none"
                                                    placeholder="0"
                                                />
                                                <span className="text-xs text-gray-500">시간</span>
                                                <input
                                                    ref={el => minRefs.current[emp.id] = el}
                                                    type="number" min="0" max="59"
                                                    value={minsData[emp.id] ?? ''}
                                                    onChange={e => setMinsData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleMinKeyDown(e, idx)}
                                                    className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                                    placeholder="0"
                                                />
                                                <span className="text-xs text-gray-500">분</span>
                                            </div>
                                        </div>
                                        {/* 직원이 입력한 메모 표시 (읽기전용, 관리자는 삭제만 가능) */}
                                        {currentDayData.entries[emp.id]?.submittedByEmp &&
                                         currentDayData.entries[emp.id]?.note &&
                                         !deletedNotes[emp.id] && (
                                            <div className="mb-2 flex items-start gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
                                                <div className="flex-1">
                                                    <p className="text-[10px] text-blue-500 font-bold mb-0.5">직원 메모</p>
                                                    <p className="text-xs text-gray-700 whitespace-pre-wrap">{currentDayData.entries[emp.id].note}</p>
                                                </div>
                                                <button type="button" onClick={() => setDeletedNotes(p => ({...p, [emp.id]: true}))}
                                                    className="text-red-400 hover:text-red-600 transition shrink-0 mt-0.5" title="메모 삭제">
                                                    <Trash2 className="w-3.5 h-3.5"/>
                                                </button>
                                            </div>
                                        )}
                                        {deletedNotes[emp.id] && (
                                            <p className="text-[10px] text-red-400 mb-2 ml-1">메모가 삭제됩니다 (저장 후 적용)</p>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                            
                            {/* 모바일 삭제 버튼 영역 */}
                            {onDelete && (
                                <div className="pt-2 flex justify-center">
                                    <button type="button" onClick={onDelete} className="text-red-500 text-sm font-medium px-4 py-2 hover:bg-red-50 rounded-lg transition flex items-center gap-1">
                                        <Trash2 className="w-4 h-4" /> 이 날짜의 기록 삭제
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-4 border-t bg-white flex gap-3 shrink-0 rounded-b-2xl">
                            <button type="button" onClick={onClose} className="flex-1 py-3 text-sm bg-gray-100 font-medium text-gray-700 rounded-xl hover:bg-gray-200 transition">취소</button>
                            <button type="submit" className="flex-1 py-3 text-sm bg-green-600 font-bold text-white rounded-xl hover:bg-green-700 transition shadow-sm">저장 (Enter)</button>
                        </div>
                    </form>
                </div>
            );
        }

        function TabPayroll({ employees, monthlyData, showAlert }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month]);

            const payrollList = useMemo(() => {
                const list = {};
                const monthData = monthlyData[monthKey]?.days || {};

                Object.values(monthData).forEach(day => {
                    Object.entries(day.entries || {}).forEach(([empId, data]) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: data.name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || data.wage || MIN_WAGE,
                                totalPay: 0,
                                totalHours: 0,
                                holidayPay: 0,
                                holidayWeeks: []
                            };
                        }
                        list[empId].totalPay += data.pay;
                        list[empId].totalHours += data.hours;
                    });
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== year || sm !== month) return;
                    weekData.forEach(({ empId, holidayPay, name, weeklyHours }) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || MIN_WAGE,
                                totalPay: 0, totalHours: 0, holidayPay: 0, holidayWeeks: []
                            };
                        }
                        list[empId].holidayPay += holidayPay;
                        list[empId].holidayWeeks.push({ weeklyHours, holidayPay });
                    });
                });

                return Object.values(list).sort((a, b) => a.displayId - b.displayId);
            }, [monthKey, monthlyData, employees, year, month]);

            const grandTotal = payrollList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);

            const handleExcelDownload = () => {
                if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
                    showAlert('엑셀 다운로드는 PC버전에서만 사용 가능합니다.', '안내');
                    return;
                }

                const daysInMonth = new Date(year, month, 0).getDate();
                const monthData = monthlyData[monthKey]?.days || {};

                // ── 탭1: 일별근무시간 ──────────────────────────────
                // 헤더행: 빈칸 + 근무자명 목록
                const sheet1Header = ['날짜', ...payrollList.map(item => item.name)];
                const sheet1Rows = [sheet1Header];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayData = monthData[d]?.entries || {};
                    const row = [`${d}일`];
                    payrollList.forEach(item => {
                        const entry = dayData[item.id];
                        row.push(entry ? entry.hours : '');
                    });
                    sheet1Rows.push(row);
                }

                const ws1 = XLSX.utils.aoa_to_sheet(sheet1Rows);
                const colWidth1 = [{ wch: 6 }, ...payrollList.map(() => ({ wch: 12 }))];
                ws1['!cols'] = colWidth1;

                // ── 탭2: 급여계산 ──────────────────────────────────
                const sheet2Header = [
                    '구분번호', '근무자명', '주민번호',
                    '이번달 총 근무시간', '시급',
                    '시간급여', '주휴수당', '총 급여',
                    '실제 지급액', '지급일',
                    '고용보험 0.8% 제외'
                ];
                const sheet2Rows = [sheet2Header];

                payrollList.forEach((item, idx) => {
                    const timePay = item.totalHours * item.wage;      // 시간급여
                    const totalPay = timePay + item.holidayPay;       // 총급여
                    const afterInsurance = Math.round(totalPay * 0.992); // 고용보험 0.8% 제외
                    sheet2Rows.push([
                        idx + 1,
                        item.name,
                        item.residentId || '',
                        item.totalHours,
                        item.wage,
                        timePay,
                        item.holidayPay,
                        totalPay,
                        '',   // 실제 지급액 공란
                        '',   // 지급일 공란
                        afterInsurance
                    ]);
                });

                const ws2 = XLSX.utils.aoa_to_sheet(sheet2Rows);
                ws2['!cols'] = [
                    { wch: 8 }, { wch: 14 }, { wch: 16 },
                    { wch: 18 }, { wch: 10 },
                    { wch: 14 }, { wch: 12 }, { wch: 14 },
                    { wch: 14 }, { wch: 12 },
                    { wch: 18 }
                ];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws1, '일별근무시간');
                XLSX.utils.book_append_sheet(wb, ws2, '급여계산');
                XLSX.writeFile(wb, `${year}.${String(month).padStart(2,'0')}. 급여명세.xlsx`);
            };

            return (
                <div className="space-y-4 max-w-5xl mx-auto">
                    <div className="flex justify-center items-center bg-white p-5 rounded-2xl shadow-sm border border-gray-200 gap-4">
                        <div className="flex items-center gap-2 md:gap-4 shrink-0">
                            <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                            <MonthYearSelector year={year} month={month} onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))} />
                            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                        </div>
                        {payrollList.length > 0 && (
                            <button onClick={handleExcelDownload} className="flex items-center gap-2 text-sm font-bold bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2.5 rounded-xl transition shadow-sm whitespace-nowrap">
                                <FileSpreadsheet className="w-4 h-4" />
                                엑셀 다운로드
                            </button>
                        )}
                    </div>

                    <div className="md:hidden space-y-3">
                        {payrollList.length === 0 ? (
                            <div className="bg-white rounded-2xl border border-gray-200 p-8 text-center text-gray-500">해당 월의 인건비 지급 내역이 없습니다.</div>
                        ) : (
                            <>
                                {payrollList.map(item => (
                                    <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2.5 py-1 rounded-md">
                                                    {item.displayId === 99999 ? '(삭제됨)' : `No. ${item.displayId}`}
                                                </span>
                                                <h3 className="text-lg font-bold text-gray-800 mt-2">{item.name}</h3>
                                                <p className="text-xs text-gray-500 mt-1">{item.bank} <span className="font-mono">{item.account}</span></p>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-xl font-black text-purple-700">{formatCurrency(item.totalPay + item.holidayPay)}</div>
                                                <div className="text-xs font-medium text-gray-400 mt-0.5">총 지급액</div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 text-center text-sm border-t border-gray-100 pt-4">
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">시급</div>
                                                <div className="font-bold text-gray-700">{formatCurrency(item.wage)}</div>
                                            </div>
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">근무시간</div>
                                                <div className="font-bold text-gray-700">{fmtHours(item.totalHours) || '0시간'}</div>
                                            </div>
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">순수급여</div>
                                                <div className="font-bold text-green-600">{formatCurrency(item.totalPay)}</div>
                                            </div>
                                        </div>
                                        {item.holidayPay > 0 && (
                                            <div className="mt-3 pt-3 border-t border-blue-100 flex justify-between items-center bg-blue-50/50 -mx-5 -mb-5 p-4 rounded-b-2xl">
                                                <span className="text-xs text-blue-600 font-bold">주휴수당 포함</span>
                                                <span className="text-sm font-bold text-blue-600">{formatCurrency(item.holidayPay)}</span>
                                            </div>
                                        )}
                                    </div>
                                ))}
                                <div className="bg-purple-50 rounded-2xl border border-purple-200 p-5 flex justify-between items-center shadow-sm">
                                    <span className="font-bold text-gray-800">총 지급 예정액</span>
                                    <span className="text-2xl font-black text-purple-700">{formatCurrency(grandTotal)}</span>
                                </div>
                            </>
                        )}
                    </div>

                    <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse min-w-max">
                                <thead className="bg-gray-50 border-b">
                                    <tr>
                                        <th className="p-4 font-bold text-gray-600">구분번호</th>

                                                </td>
                                                <td className="p-4 text-right font-black text-purple-700">
                                                    {formatCurrency(item.totalPay + item.holidayPay)}
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                                {payrollList.length > 0 && (
                                    <tfoot className="bg-gray-50 border-t-2 border-gray-200">
                                        <tr>
                                            <td colSpan="8" className="p-5 text-right font-bold text-gray-700">총 지급 예정액</td>

        }

        // --- 도넛 차트 ---
        function DonutGauge({ revenue, pay, holidayPay = 0, children }) {
            const [hoveredSegment, setHoveredSegment] = React.useState(null); 
            const totalPay = pay + holidayPay;
            const ratio      = revenue > 0 ? (totalPay / revenue) * 100 : 0;
            const payRatio   = revenue > 0 ? (pay / revenue) * 100 : 0;
            const holRatio   = revenue > 0 ? (holidayPay / revenue) * 100 : 0;
            const payDash    = revenue > 0 ? Math.min((pay / revenue) * 100, 100) : 0;
            const holDash    = revenue > 0 ? Math.min((holidayPay / revenue) * 100, Math.max(0, 100 - payDash)) : 0;

            return (
                <div className="flex flex-col items-center bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm w-full">
                    <div className="mb-5 h-8 flex items-center justify-center w-full">
                        {children}
                    </div>
                    <div className="relative w-36 h-36 flex items-center justify-center mb-5 cursor-default">
                        <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90 drop-shadow-sm">
                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#fef08a" strokeWidth="3" />
                            {revenue > 0 && pay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'pay' ? '#16a34a' : '#22c55e'}
                                    strokeWidth={hoveredSegment === 'pay' ? '4.5' : '3.5'}
                                    strokeDasharray={`${payDash} ${100 - payDash}`} strokeDashoffset="0" strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('pay')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}
                            {revenue > 0 && holidayPay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'holiday' ? '#2563eb' : '#60a5fa'}
                                    strokeWidth={hoveredSegment === 'holiday' ? '4.5' : '3.5'}
                                    strokeDasharray={`${holDash} ${100 - holDash}`} strokeDashoffset={`${-payDash}`} strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('holiday')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-1 pointer-events-none">
                            {hoveredSegment === 'pay' && revenue > 0 ? (
                                <>
                                    <span className="text-[10px] font-bold text-green-700 leading-tight">순수인건비</span>
                                    <span className="text-xl font-black text-green-600 leading-tight mt-0.5">{payRatio.toFixed(1)}%</span>
                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>
                            ) : hoveredSegment === 'holiday' && revenue > 0 ? (
                                <>
                                    <span className="text-[10px] font-bold text-blue-600 leading-tight">주휴수당</span>
                                    <span className="text-xl font-black text-blue-500 leading-tight mt-0.5">{holRatio.toFixed(1)}%</span>
                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>
                            ) : (
                                <>
                                    <span className="text-2xl font-black text-gray-800">{ratio.toFixed(1)}%</span>
                                    <span className="text-[11px] text-gray-500 font-bold mt-0.5">총인건비율</span>
                                </>
                            )}
                        </div>
                    </div>
                    <div className="w-full space-y-2 text-sm font-medium">
                        <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-gray-100">
                            <span className="text-gray-500 text-xs">매출</span>
                            <span className="font-bold text-gray-800">{formatCurrency(revenue)}</span>
                        </div>
                        <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-gray-100">
                            <span className="flex items-center gap-1.5 text-gray-500 text-xs"><span className="w-2.5 h-2.5 rounded-full bg-green-500 inline-block"></span>인건비</span>
                            <span className="font-bold text-green-600">{formatCurrency(pay)}</span>
                        </div>
                        <div className="flex justify-between items-center bg-white px-4 py-2 rounded-xl border border-gray-100">
                            <span className="flex items-center gap-1.5 text-gray-500 text-xs"><span className="w-2.5 h-2.5 rounded-full bg-blue-400 inline-block"></span>주휴수당</span>
                            <span className="font-bold text-blue-600">{formatCurrency(holidayPay)}</span>
                        </div>
                        <div className="flex justify-between items-center bg-purple-50 px-4 py-2.5 rounded-xl border border-purple-100 mt-1">
                            <span className="text-purple-600 font-bold text-xs">총 인건비</span>
                            <span className="font-black text-purple-700">{formatCurrency(totalPay)}</span>
                        </div>
                    </div>
                </div>
            );
        }

        function BarColumn({ d, maxValue }) {
            const [hoveredBar, setHoveredBar] = React.useState(null); 
            const totalPay = d.pay + d.holidayPay;
            const revH     = maxValue > 0 ? (d.revenue / maxValue) * 100 : 0;
            const stackH   = maxValue > 0 ? (totalPay / maxValue) * 100 : 0;
            const totalRatio = d.revenue > 0 ? ((totalPay / d.revenue) * 100).toFixed(1) : null;
            const payRatio   = d.revenue > 0 ? ((d.pay / d.revenue) * 100).toFixed(1) : null;
            const holRatio   = d.revenue > 0 ? ((d.holidayPay / d.revenue) * 100).toFixed(1) : null;
            const fmt = v => Math.round(v * 10000).toLocaleString();

            return (
                <div className="relative flex flex-col items-center h-full justify-end w-12 shrink-0" onMouseLeave={() => setHoveredBar(null)}>
                    {hoveredBar && (
                        <div className="absolute top-0 left-1/2 -translate-x-1/2 text-[11px] bg-gray-800 text-white px-3 py-2 rounded-lg pointer-events-none whitespace-nowrap z-20 leading-relaxed shadow-lg font-medium">
                            {hoveredBar === 'revenue' && (
                                <>
                                    <div className="font-bold text-yellow-300">매출 {fmt(d.revenue)}원</div>
                                    {totalRatio && <div className="text-gray-300 mt-0.5">총급여 매출 대비 {totalRatio}%</div>}
                                </>
                            )}
                            {hoveredBar === 'pay' && (
                                <>
                                    <div className="font-bold text-green-400">순수인건비 {fmt(d.pay)}원</div>
                                    {payRatio && <div className="text-gray-300 mt-0.5">매출 대비 {payRatio}%</div>}
                                </>
                            )}
                            {hoveredBar === 'holiday' && (
                                <>
                                    <div className="font-bold text-blue-300">주휴수당 {fmt(d.holidayPay)}원</div>
                                    {holRatio && <div className="text-gray-300 mt-0.5">매출 대비 {holRatio}%</div>}
                                </>
                            )}
                        </div>
                    )}
                    <div className="flex items-end gap-1.5 w-full justify-center h-full pb-1">
                        <div
                            style={{ height: `${revH}%`, backgroundColor: hoveredBar === 'revenue' ? '#ca8a04' : '#facc15' }}
                            className="w-5 rounded-t-md cursor-pointer transition-colors duration-150"
                            onMouseEnter={() => setHoveredBar('revenue')}
                        />
                        <div style={{ height: `${stackH}%` }} className="w-5 rounded-t-md overflow-hidden flex flex-col-reverse shadow-sm">
                            {d.pay > 0 && (
                                <div
                                    style={{ height: `${(d.pay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'pay' ? '#15803d' : '#22c55e' }}
                                    className="w-full flex-none cursor-pointer"
                                    onMouseEnter={() => setHoveredBar('pay')}
                                />
                            )}
                            {d.holidayPay > 0 && (
                                <div
                                    style={{ height: `${(d.holidayPay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'holiday' ? '#1d4ed8' : '#60a5fa' }}
                                    className="w-full flex-none cursor-pointer"
                                    onMouseEnter={() => setHoveredBar('holiday')}
                                />
                            )}
                        </div>
                    </div>
                    <div className="absolute -bottom-6 text-sm text-gray-500 font-bold">{d.month}월</div>
                </div>
            );
        }

        function TabChart({ monthlyData, employees }) {
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [pieMonth, setPieMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
            });
            const [pieYear, setPieYear] = useState(new Date().getFullYear());
            
            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                Object.keys(monthlyData).forEach(key => years.add(parseInt(key.split('-')[0])));
                return Array.from(years).sort((a,b) => b - a);
            }, [monthlyData]);

            const chartData = useMemo(() => {
                const data = Array.from({ length: 12 }, (_, i) => ({ month: i + 1, revenue: 0, pay: 0, holidayPay: 0 }));
                Object.keys(monthlyData).forEach(key => {
                    const [y, m] = key.split('-');
                    if (parseInt(y) === selectedYear) {
                        const monthIdx = parseInt(m) - 1;
                        const monthObj = monthlyData[key] || {};
                        const days = monthObj.days || {};

                        let dailySumRev = 0;
                        Object.values(days).forEach(day => {
                            dailySumRev += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { data[monthIdx].pay += (entry.pay || 0) / 10000; });
                        });

                        const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailySumRev;
                        data[monthIdx].revenue += effectiveRev / 10000;
                    }
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== selectedYear) return;
                    const monthIdx = sm - 1;
                    weekData.forEach(({ holidayPay }) => { data[monthIdx].holidayPay += holidayPay / 10000; });
                });
                return data;
            }, [monthlyData, employees, selectedYear]);

            const maxValue = Math.max(...chartData.map(d => Math.max(d.revenue, d.pay + d.holidayPay)), 100);
            const yTicks = [0, maxValue * 0.25, maxValue * 0.5, maxValue * 0.75, maxValue];

            const allHolidayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            const pieMonthData = useMemo(() => {
                let dailyRevSum = 0, pay = 0;
                const monthObj = monthlyData[pieMonth] || { days: {} };
                Object.values(monthObj.days).forEach(day => {
                    dailyRevSum += (day.revenue || 0);
                    Object.values(day.entries || {}).forEach(entry => { pay += (entry.pay || 0); });
                });
                const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieMonth)) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: effectiveRev, pay, holidayPay };
            }, [monthlyData, pieMonth, allHolidayBySunday]);

            const pieYearData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    if (key.startsWith(pieYear.toString())) {
                        const monthObj = monthlyData[key];
                        let dailyRevSum = 0;
                        Object.values(monthObj.days || {}).forEach(day => {
                            dailyRevSum += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                        });
                        totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                    }
                });
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieYear.toString())) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, pieYear, allHolidayBySunday]);

            const pieTotalData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    const monthObj = monthlyData[key];
                    let dailyRevSum = 0;
                    Object.values(monthObj.days || {}).forEach(day => {
                        dailyRevSum += (day.revenue || 0);
                        Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                    });
                    totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                });
                const holidayPay = Object.values(allHolidayBySunday).flat().reduce((s, h) => s + h.holidayPay, 0);
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, allHolidayBySunday]);

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 max-w-5xl mx-auto space-y-10">
                    <div>
                        <div className="flex justify-between items-center mb-8">
                            <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center gap-2">
                                <BarChart3 className="text-green-600" /> 월별 매출 및 인건비 추이
                            </h2>
                            <select 
                                value={selectedYear} 
                                onChange={e => setSelectedYear(parseInt(e.target.value))}
                                className="border border-gray-200 rounded-xl px-4 py-2 font-bold bg-gray-50 focus:ring-2 focus:ring-green-500 outline-none transition"
                            >
                                {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                            </select>
                        </div>

                        <div className="flex flex-wrap justify-end gap-4 md:gap-6 mb-5 text-sm font-bold text-gray-600">
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-yellow-400 rounded-full shadow-sm"></div>매출</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-green-500 rounded-full shadow-sm"></div>인건비</div>
                            <div className="flex items-center gap-2"><div className="w-3.5 h-3.5 bg-blue-400 rounded-full shadow-sm"></div>주휴수당 (스택)</div>
                        </div>

                        {/* 모바일에서 x축이 넘치면 가로 스크롤 허용 */}
                        <div className="overflow-x-auto no-scrollbar pb-8">
                            <div className="relative h-[300px] min-w-[600px] mt-4">
                                <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pr-4">
                                    {yTicks.slice().reverse().map((tick, i) => (
                                        <div key={i} className="flex items-center text-xs text-gray-400 font-medium w-full">
                                            <span className="w-16 md:w-20 text-right mr-3">{Math.round(tick).toLocaleString()}만원</span>
                                            <div className="flex-1 border-t border-gray-100 border-dashed"></div>
                                        </div>
                                    ))}
                                </div>

                                <div className="absolute inset-0 ml-20 md:ml-24 flex items-end justify-around">
                                    {chartData.map((d) => (
                                        <BarColumn key={d.month} d={d} maxValue={maxValue} />
                                    ))}
                                </div>
                            </div>
                        </div>
                    </div>

                    <hr className="border-gray-100" />

                    <div>
                        <h3 className="text-lg font-bold text-gray-800 mb-6 px-1 flex items-center gap-2">
                            <svg className="w-5 h-5 text-purple-600" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M11 3.055A9.001 9.001 0 1020.945 13H11V3.055z" /><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M20.488 9H15V3.512A9.025 9.025 0 0120.488 9z" /></svg>
                            매출 대비 인건비 비율 현황
                        </h3>
                        <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                            <DonutGauge revenue={pieMonthData.revenue} pay={pieMonthData.pay} holidayPay={pieMonthData.holidayPay}>
                                <input type="month" value={pieMonth} onChange={e => setPieMonth(e.target.value)} required className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition" />
                            </DonutGauge>

                            <DonutGauge revenue={pieYearData.revenue} pay={pieYearData.pay} holidayPay={pieYearData.holidayPay}>
                                <select value={pieYear} onChange={e => setPieYear(parseInt(e.target.value))} className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-xl px-3 py-1.5 outline-none text-center shadow-sm w-full transition">
                                    {availableYears.map(y => <option key={y} value={y}>{y}년 누적 비율</option>)}
                                </select>
                            </DonutGauge>

                            <DonutGauge revenue={pieTotalData.revenue} pay={pieTotalData.pay} holidayPay={pieTotalData.holidayPay}>
                                <div className="font-bold text-gray-700 bg-gray-100 border border-transparent rounded-xl px-3 py-1.5 text-center w-full">전체 누적 비율</div>
                            </DonutGauge>
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        // 주휴수당 예측 탭
        // ==========================================
        function TabPredict({ employees, predictData, setPredictData, showConfirm }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = predictData[monthKey] || { days: {} };
            const activeEmployees = employees
                .filter(e => (e.status || (e.isWorking === false ? 'resigned' : 'working')) === 'working')
                .sort((a, b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}년 ${month}월 ${dayToDel}일의 예측 정보를 정말 삭제하시겠습니까?`, () => {
                    setPredictData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey]?.days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    setEditDayModal(null);
                }, "예측 정보 삭제");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(predictData, employees), [predictData, employees]);

            let totalMonthPay = 0;

        // ─── 서명 그리기 모달 (확대 캔버스) ───
        function SignatureDrawModal({ onSave, onClose }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);
            const lastPosRef = useRef(null);

            const getPos = (e, canvas) => {
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width;
                const sy = canvas.height / rect.height;
                if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
                return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
            };

            const startDraw = (e) => {
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                setIsDrawing(true); setHasDrawn(true);
                lastPosRef.current = pos;
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a'; ctx.fill();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                lastPosRef.current = pos;
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const handleConfirm = () => {
                if (!hasDrawn) return;
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4" onClick={onClose}>
                    <div className="rounded-2xl shadow-2xl w-full max-w-lg" style={{ backgroundColor: 'white', color: '#111' }} onClick={e => e.stopPropagation()}>
                        <div className="px-5 pt-5 pb-2 flex items-center justify-between">
                            <div>
                                <h3 className="text-base font-bold" style={{ color: '#1f2937' }}>서명하기</h3>
                                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>이름을 정자로 적어주세요</p>
                            </div>
                            <button onClick={onClose} className="text-xl leading-none" style={{ color: '#9ca3af' }}>✕</button>
                        </div>
                        <div className="px-5 pb-2 relative">
                            <canvas ref={canvasRef} width={600} height={260}
                                className="rounded-xl touch-none cursor-crosshair w-full"
                                style={{ touchAction: 'none', backgroundColor: 'white', display: 'block', border: '2px dashed #d1d5db' }}
                                onMouseDown={startDraw} onMouseMove={draw}
                                onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)}
                                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                            />
                            {!hasDrawn && (
                                <p className="absolute inset-0 mx-5 flex items-center justify-center text-sm pointer-events-none" style={{ color: '#9ca3af' }}>여기에 서명하세요</p>
                            )}
                            {hasDrawn && (
                                <button onClick={clear} className="absolute top-3 right-7 text-xs px-2 py-1 rounded-lg transition" style={{ backgroundColor: '#fee2e2', color: '#dc2626' }}>지우기</button>
                            )}
                        </div>
                        <div className="px-5 pb-5 flex gap-3 mt-3">
                            <button onClick={onClose} className="flex-1 py-3 rounded-xl text-sm font-medium transition" style={{ border: '1px solid #e5e7eb', backgroundColor: 'white', color: '#4b5563' }}>취소</button>
                            <button onClick={handleConfirm} disabled={!hasDrawn}
                                className="flex-1 py-3 rounded-xl text-sm font-bold transition"
                                style={{ backgroundColor: hasDrawn ? '#22c55e' : '#e5e7eb', color: hasDrawn ? 'white' : '#9ca3af', cursor: hasDrawn ? 'pointer' : 'not-allowed' }}>
                                완료
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

                const completedHtml = c.status === 'completed' ? `<div style="background:#dcfce7;border:1px solid #86efac;border-radius:8px;padding:8px;text-align:center;page-break-inside:avoid;"><p style="color:#15803d;font-weight:700;font-size:11px;margin:0;">✓ 계약 완료</p></div>` : '';

                element.innerHTML = `<h2 style="text-align:center;border-bottom:2px solid #e5e7eb;padding-bottom:8px;margin:0 0 10px;font-size:15px;font-family:'Malgun Gothic',sans-serif;">${esc(c.title || '근로계약서')}</h2>${sectionsHtml}<div style="border-top:1px solid #e5e7eb;padding-top:10px;margin-top:4px;font-family:'Malgun Gothic',sans-serif;"><p style="font-size:10.5px;margin-bottom:8px;">작성일: <strong>${esc(c.date)}</strong></p><div style="display:flex;gap:10px;align-items:flex-start;"><div style="flex:1;min-width:0;">${ownerHtml}</div><div style="flex:1;min-width:0;">${empHtml}</div></div>${completedHtml}</div>`;

                const shopName = (c.ownerInfo && c.ownerInfo.shopName) ? c.ownerInfo.shopName : '';
                const empName = (c.employeeInfo && c.employeeInfo.name) ? c.employeeInfo.name : '';
                const fileName = [shopName, c.title || '근로계약서', c.date || '', empName].filter(Boolean).join('_') + '.pdf';
                const opt = {
                    margin: [10, 12, 10, 12],
                    filename: fileName,
                    image: { type: 'jpeg', quality: 0.98 },
                    html2canvas: { scale: 2, useCORS: true, logging: false },
                    jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }

                html2pdf().set(opt).from(element).save();

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-[9998] backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-lg flex flex-col" style={{maxHeight: '92vh'}}>
                        <div className="p-5 border-b flex items-center justify-between flex-shrink-0">
                            <h2 className="text-lg font-bold text-gray-800">근로계약서</h2>
