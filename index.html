                                            <th className="border p-2 bg-gray-100 text-center whitespace-nowrap" style={{width:'50px'}}>날짜</th>
                                            {activeEmployees.map(emp => (
                                                <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm" style={{width:'170px'}}>
                                                    {emp.displayId}. {emp.name}
                                                    <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                                                    <div className="flex items-center gap-0.5 text-[10px] font-normal text-gray-400 mt-0.5">
                                                        <span className="w-12 text-center">시간</span>
                                                        <span className="text-transparent text-xs">:</span>
                                                        <span className="w-10 text-center">분</span>
                                                        <span className="text-transparent text-xs mx-0.5">|</span>
                                                        <span className="w-14 text-center">시급</span>
                                                        <span className="text-[9px] text-transparent">원</span>
                                                    </div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                                            <tr key={day} className="hover:bg-yellow-50/50">
                                                <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}일</td>
                                                {activeEmployees.map((emp, empIdx) => (
                                                    <td key={emp.id} className="border p-0.5">
                                                        <div className="flex items-center gap-0.5">
                                                            <input
                                                                ref={el => hourRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0"
                                                                value={localData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleInputChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleHourKeyDown(e, day, empIdx)}
                                                                className="w-12 h-9 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent outline-none transition text-sm"
                                                                placeholder="시"
                                                            />
                                                            <span className="text-gray-300 text-xs">:</span>
                                                            <input
                                                                ref={el => minRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0" max="59"
                                                                value={minuteData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleMinuteChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleMinKeyDown(e, day, empIdx)}
                                                                className="w-10 h-9 text-center border-none focus:ring-2 focus:ring-blue-400 bg-transparent outline-none transition text-sm text-blue-600"
                                                                placeholder="분"
                                                            />
                                                            <span className="text-gray-200 text-xs mx-0.5">|</span>
                                                            <input
                                                                ref={el => wageRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0"
                                                                value={wageData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleWageChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleWageKeyDown(e, day, empIdx)}
                                                                className={`w-14 h-9 text-right pr-0.5 border-none focus:ring-2 focus:ring-orange-400 bg-transparent outline-none transition text-[11px] ${Number(wageData[day]?.[emp.id]) !== (Number(emp.wage) > 0 ? Number(emp.wage) : (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE)) ? 'text-red-500' : 'text-gray-700'}`}
                                                            />
                                                            <span className="text-[9px] text-gray-400 shrink-0">원</span>
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>

                        <div className="p-5 border-t bg-white flex justify-end gap-3 rounded-b-2xl shrink-0">
                            <button onClick={onClose} className="px-6 py-2.5 border border-gray-300 rounded-xl bg-white hover:bg-gray-50 transition font-medium">취소</button>
                            <button onClick={handleSave} className="px-6 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 transition font-bold shadow-sm">저장하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, allEmployees, monthlyData, setMonthlyData, onClose, onDelete, workspaceId, holidayEntries, globalMinWage }) {
            const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };

            const combinedEmployees = useMemo(() => {
                const list = [...activeEmployees];
                const activeIds = new Set(activeEmployees.map(e => e.id.toString()));

                Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
                    if (!activeIds.has(empIdStr)) {
                        const empInfo = (allEmployees || []).find(e => e.id.toString() === empIdStr);
                        const empStatus = empInfo?.status || (empInfo?.isWorking === false ? 'resigned' : 'resigned');
                        list.push({
                            id: empIdStr, displayId: '-', name: data.name, wage: data.wage,
                            isInactive: true, inactiveStatus: empStatus
                        });
                    }
                });
                return list;
            }, [activeEmployees, allEmployees, currentDayData.entries]);

            const hourRefs = useRef({});
            const minRefs = useRef({});

            const [revenue, setRevenue] = useState(currentDayData.revenue || '');
            const [wageData, setWageData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id];
                    const empWage = Number(emp.wage) > 0 ? Number(emp.wage) : 0;
                    const minW = Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE;
                    init[emp.id] = existing?.wage || empWage || minW;
                });
                return init;
            });
            const [hoursData, setHoursData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    init[emp.id] = existing > 0 ? Math.floor(existing) : '';
                });
                return init;
            });
            const [minsData, setMinsData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    const m = Math.round((existing - Math.floor(existing)) * 60);
                    init[emp.id] = m > 0 ? m : '';
                });
                return init;
            });
            // 메모 삭제 상태 (직원이 입력한 메모를 관리자가 삭제할 수 있음)
            const [deletedNotes, setDeletedNotes] = useState({});

            const handleHourKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleMinKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleSave = () => {
                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                // Google 연동 직원의 submissions 동기화용 목록
                const submissionUpdates = [];
                combinedEmployees.forEach(emp => {
                    const existingEntry = currentDayData.entries[emp.id];
                    const empUid = existingEntry?.empUid || emp.empUid;
                    if (empUid) {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const w = Number(wageData[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : 0) || (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE);
                        submissionUpdates.push({ empUid, employeeId: emp.id, empName: emp.name, hours, wage: w, isNew: !existingEntry?.submittedByEmp });
                    }
                });

                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };
                    if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

                    newData[monthKey].days[day].revenue = Number(revenue) || 0;

                    combinedEmployees.forEach(emp => {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const existingEntry = prev[monthKey]?.days[day]?.entries[emp.id];

                        if (hours > 0) {
                            const empUid = existingEntry?.empUid || emp.empUid;
                            if (empUid && (!existingEntry || existingEntry.hours !== hours)) {
                                if (!existingEntry) {
                                    // 관리자가 빈 칸에 새로 입력
                                    sendChangeNotification(empUid, {
                                        type: 'hours_entered',
                                        date: dateStr,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                } else {
                                    // 기존 시간을 변경 (직원 제출이든 관리자 입력이든)
                                    sendChangeNotification(empUid, {
                                        type: 'hours_modified',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            const savedWage = Number(wageData[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : 0) || (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE);
                            // 시급 변경 알림
                            if (existingEntry && hours > 0 && Number(existingEntry.wage) !== savedWage) {
                                const empUid = existingEntry.empUid || emp.empUid;
                                if (empUid) {
                                    sendChangeNotification(empUid, {
                                        type: 'wage_modified',
                                        date: dateStr,
                                        oldWage: existingEntry.wage,
                                        newWage: savedWage,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            newData[monthKey].days[day].entries[emp.id] = {
                                hours, pay: Math.round(hours * savedWage), name: emp.name, wage: savedWage,
                                note: deletedNotes[emp.id] ? '' : (existingEntry?.note || ''),
                                submittedByEmp: existingEntry?.submittedByEmp || false,
                                empUid: existingEntry?.empUid || emp.empUid || null,
                                submittedHours: existingEntry?.submittedHours || null,
                                bossModified: existingEntry?.submittedByEmp ? (existingEntry.hours !== hours) : false
                            };
                        } else {
                            // 기존 시간이 있었는데 삭제된 경우 → 직원에게 알림
                            if (existingEntry?.hours > 0) {
                                const empUid = existingEntry?.empUid || emp.empUid;
                                if (empUid) {
                                    sendChangeNotification(empUid, {
                                        type: 'hours_deleted',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            delete newData[monthKey].days[day].entries[emp.id];
                        }
                    });
                    return newData;
                });

                // 근무자 달력에도 반영: submissions 컬렉션 동기화 (기존 업데이트 + 신규 생성)
                if (workspaceId && submissionUpdates.length > 0) {
                    submissionUpdates.forEach(({ empUid, employeeId, empName, hours, wage, isNew }) => {
                        const subsRef = fbDb.collection('workspaces').doc(workspaceId).collection('submissions');
                        if (hours > 0) {
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).set({
                                empUid, employeeId, empName, date: dateStr, hours, wage,
                                locked: true, bossEntered: isNew,
                                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true }).catch(() => {});
                        } else {
                            // 시간 0이면 submissions에서도 삭제
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).delete().catch(() => {});
                        }
                    });
                }

                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <form onSubmit={(e) => { e.preventDefault(); handleSave(); }} className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{month}월 {day}일 상세 수정</h3>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">일일 매출 (원)</label>
                                <input 
                                    type="number" 
                                    value={revenue} 
                                    onChange={e => setRevenue(e.target.value)}
                                    className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="0"
                                />
                            </div>

                            <div className="pt-3 border-t border-gray-100">
                                <label className="block text-sm font-bold text-gray-700 mb-1">근무 시간 수정</label>
                                <p className="text-xs text-gray-400 mb-3">시간/분 입력 후 Enter → 다음 근무자로 이동</p>
                                {combinedEmployees.map((emp, idx) => (
                                    <React.Fragment key={emp.id}>
                                        <div className={`mb-1 p-2 rounded-lg ${emp.isInactive ? (emp.inactiveStatus === 'leave' ? 'bg-yellow-50/50' : 'bg-red-50/50') : 'bg-gray-50'}`}>
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm text-gray-700 truncate flex items-center gap-1 font-medium">
                                                    {emp.isInactive ? (
                                                        emp.inactiveStatus === 'leave'
                                                            ? <span className="text-xs text-yellow-600 bg-yellow-50 border border-yellow-200 px-1.5 py-0.5 rounded font-bold">휴직</span>
                                                            : <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-bold">퇴사</span>
                                                    ) : (
                                                        <span>{emp.displayId}.</span>
                                                    )}
                                                    {emp.name}
                                                </span>
                                                <div className="flex items-center gap-1">
                                                    <input
                                                        ref={el => hourRefs.current[emp.id] = el}
                                                        type="number" min="0"
                                                        value={hoursData[emp.id] ?? ''}
                                                        onChange={e => setHoursData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                        onKeyDown={e => handleHourKeyDown(e, idx)}
                                                        className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-green-500 outline-none"
                                                        placeholder="0"
                                                    />
                                                    <span className="text-xs text-gray-500">시간</span>
                                                    <input
                                                        ref={el => minRefs.current[emp.id] = el}
                                                        type="number" min="0" max="59"
                                                        value={minsData[emp.id] ?? ''}
                                                        onChange={e => setMinsData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                        onKeyDown={e => handleMinKeyDown(e, idx)}
                                                        className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                                        placeholder="0"
                                                    />
                                                    <span className="text-xs text-gray-500">분</span>
                                                </div>
                                            </div>
                                            <div className="flex items-center gap-1 mt-1.5">
                                                <span className="text-[10px] text-gray-400 shrink-0">시급:</span>
                                                <input
                                                    type="number" min="0"
                                                    value={wageData[emp.id] ?? ''}
                                                    onChange={e => setWageData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    className="w-20 border border-gray-200 rounded px-2 py-0.5 text-right text-[11px] focus:ring-1 focus:ring-orange-400 outline-none bg-white"
                                                    placeholder={String(emp.wage || MIN_WAGE)}
                                                />
                                                <span className="text-[10px] text-gray-400">원</span>
                                            </div>
                                        </div>
                                        {/* 직원이 입력한 메모 표시 (읽기전용, 관리자는 삭제만 가능) */}
                                        {currentDayData.entries[emp.id]?.submittedByEmp &&
                                         currentDayData.entries[emp.id]?.note &&
                                         !deletedNotes[emp.id] && (
                                            <div className="mb-2 flex items-start gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
                                                <div className="flex-1">
                                                    <p className="text-[10px] text-blue-500 font-bold mb-0.5">직원 메모</p>
                                                    <p className="text-xs text-gray-700 whitespace-pre-wrap">{currentDayData.entries[emp.id].note}</p>
                                                </div>
                                                <button type="button" onClick={() => setDeletedNotes(p => ({...p, [emp.id]: true}))}
                                                    className="text-red-400 hover:text-red-600 transition shrink-0 mt-0.5" title="메모 삭제">
                                                    <Trash2 className="w-3.5 h-3.5"/>
                                                </button>
                                            </div>
                                        )}
                                        {deletedNotes[emp.id] && (
                                            <p className="text-[10px] text-red-400 mb-2 ml-1">메모가 삭제됩니다 (저장 후 적용)</p>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                            
                            {/* 주휴수당 정보 */}
                            {holidayEntries && holidayEntries.length > 0 && (
                                <div className="pt-3 border-t border-blue-200">
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-2.5 h-2.5 rounded-full bg-blue-400"></div>
                                            <span className="text-sm font-bold text-blue-700">주휴수당 발생</span>
                                        </div>
                                        <div className="space-y-1.5">
                                            {holidayEntries.map((h, i) => (
                                                <div key={i} className="text-sm">
                                                    <div className="flex justify-between items-center">
                                                        <span className="text-gray-700">{h.name} <span className="text-xs text-gray-400">(주 {h.weeklyHours.toFixed(1)}h)</span></span>
                                                        <span className="font-bold text-blue-600">{Number(h.holidayPay).toLocaleString()}원</span>
                                                    </div>
                                                    <div className="text-[10px] text-gray-400">{Number(h.weeklyPay || 0).toLocaleString()}원 ÷ 5</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-2 pt-2 border-t border-blue-200 flex justify-between items-center">
                                            <span className="text-xs font-bold text-blue-700">합계</span>
                                            <span className="font-bold text-blue-700">{holidayEntries.reduce((s, h) => s + h.holidayPay, 0).toLocaleString()}원</span>
                                        </div>
                                    </div>
                                </div>
                            )}

                            {/* 모바일 삭제 버튼 영역 */}
                            {onDelete && (
                                <div className="pt-2 flex justify-center">
                                    <button type="button" onClick={onDelete} className="text-red-500 text-sm font-medium px-4 py-2 hover:bg-red-50 rounded-lg transition flex items-center gap-1">
                                        <Trash2 className="w-4 h-4" /> 이 날짜의 기록 삭제
                                    </button>
                                </div>
                            )}
                        </div>

                        <div className="p-4 border-t bg-white flex gap-3 shrink-0 rounded-b-2xl">
                            <button type="button" onClick={onClose} className="flex-1 py-3 text-sm bg-gray-100 font-medium text-gray-700 rounded-xl hover:bg-gray-200 transition">취소</button>
                            <button type="submit" className="flex-1 py-3 text-sm bg-green-600 font-bold text-white rounded-xl hover:bg-green-700 transition shadow-sm">저장 (Enter)</button>
                        </div>
                    </form>
                </div>
            );
        }

        function TabPayroll({ employees, monthlyData, showAlert, workspaceId, workspaceInfo, firebaseUser }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month]);

            const payrollTouchStartX = useRef(null);
            const handlePayrollTouchStart = (e) => { payrollTouchStartX.current = e.touches[0].clientX; };
            const handlePayrollTouchEnd = (e) => {
                if (payrollTouchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - payrollTouchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }
                payrollTouchStartX.current = null;
            };

            const payrollList = useMemo(() => {
                const list = {};
                const monthData = monthlyData[monthKey]?.days || {};

                Object.values(monthData).forEach(day => {
                    Object.entries(day.entries || {}).forEach(([empId, data]) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: currentEmp?.name || data.name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || data.wage || MIN_WAGE,
                                memos: currentEmp?.memos || [],
                                totalPay: 0,
                                totalHours: 0,
                                holidayPay: 0,
                                holidayWeeks: [],
                                wageBreakdown: {}
                            };
                        }
                        list[empId].totalPay += data.pay;
                        list[empId].totalHours += data.hours;
                        const w = data.wage || list[empId].wage;
                        if (!list[empId].wageBreakdown[w]) list[empId].wageBreakdown[w] = { hours: 0, pay: 0, days: 0 };
                        list[empId].wageBreakdown[w].hours += data.hours;
                        list[empId].wageBreakdown[w].pay += data.pay;
                        list[empId].wageBreakdown[w].days += 1;
                    });
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== year || sm !== month) return;
                    weekData.forEach(({ empId, holidayPay, name, weeklyHours, weeklyPay }) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || MIN_WAGE,
                                memos: currentEmp?.memos || [],
                                totalPay: 0, totalHours: 0, holidayPay: 0, holidayWeeks: [],
                                wageBreakdown: {}
                            };
                        }
                        list[empId].holidayPay += holidayPay;
                        list[empId].holidayWeeks.push({ weeklyHours, weeklyPay, holidayPay });
                    });
                });

                return Object.values(list).sort((a, b) => a.displayId - b.displayId);
            }, [monthKey, monthlyData, employees, year, month]);

            const grandTotal = payrollList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);

            // 급여명세서 발송
            const [sendModal, setSendModal] = useState(null); // { item }
            const [sendIncludeHoliday, setSendIncludeHoliday] = useState(true);
            const [sending, setSending] = useState(false);

            // 발송 완료 추적
            const [sentPayslips, setSentPayslips] = useState({});
            useEffect(() => {
                if (!workspaceId) return;
                const unsub = fbDb.collection('workspaces').doc(workspaceId)
                    .collection('payslips')
                    .where('year', '==', year).where('month', '==', month)
                    .onSnapshot(snap => {
                        const map = {};
                        snap.forEach(d => { map[d.id] = d.data(); });
                        setSentPayslips(map);
                    }, () => {});
                return () => unsub();
            }, [workspaceId, year, month]);

            const parsePayDate = (str) => {
                if (!str) return todayDateVal();
                const m = str.match(/(\d{4})년\s*(\d{1,2})월\s*(\d{1,2})일/);
                if (!m) return todayDateVal();
                return `${m[1]}-${String(m[2]).padStart(2,'0')}-${String(m[3]).padStart(2,'0')}`;
            };

            // 일괄발송
            const [bulkModal, setBulkModal] = useState(false);
            const [bulkIncludeHoliday, setBulkIncludeHoliday] = useState(true);
            const [bulkDeductInsurance, setBulkDeductInsurance] = useState(false);
            const [bulkSending, setBulkSending] = useState(false);
            const [bulkPayDate, setBulkPayDate] = useState('');
            const [sendPayDate, setSendPayDate] = useState('');
            const [sendDeductInsurance, setSendDeductInsurance] = useState(false);

            const todayDateVal = () => new Date().toISOString().split('T')[0];
            const fmtPayDate = (val) => {
                if (!val) return '';
                const [y, m, d] = val.split('-');
                return `${y}년 ${m}월 ${d}일`;
            };

            const handleBulkSend = async () => {
                if (!workspaceId || payrollList.length === 0) return;
                setBulkSending(true);
                let successCount = 0;
                for (const item of payrollList.filter(i => i.displayId !== 99999)) {
                    try {
                        const beforeInsurance = bulkIncludeHoliday ? (item.totalPay + item.holidayPay) : item.totalPay;
                        const finalAmount = bulkDeductInsurance ? Math.round(beforeInsurance * 0.992) : beforeInsurance;
                        const wages = Object.entries(item.wageBreakdown || {});
                        const calcLines = [];
                        if (wages.length <= 1) {
                            calcLines.push(`시급: ${Number(wages[0]?.[0] || item.wage).toLocaleString()}원`, `근무시간: ${fmtHours(item.totalHours)}`, `${bulkIncludeHoliday ? '순수급여' : '총 급여'}: ${Number(item.totalPay).toLocaleString()}원`);
                        } else {
                            wages.sort((a, b) => Number(a[0]) - Number(b[0])).forEach(([w, info]) => {
                                calcLines.push(`시급 ${Number(w).toLocaleString()}원 × ${info.days}일(${fmtHours(info.hours)}) = ${Number(info.pay).toLocaleString()}원`);
                            });
                            calcLines.push(`${bulkIncludeHoliday ? '순수급여' : '총 급여'}: ${Number(item.totalPay).toLocaleString()}원`);
                        }
                        if (bulkIncludeHoliday && item.holidayPay > 0) calcLines.push(`주휴수당: ${Number(item.holidayPay).toLocaleString()}원`);
                        if (bulkDeductInsurance) calcLines.push(`고용보험 0.8% 제외: -${Number(beforeInsurance - finalAmount).toLocaleString()}원`);
                        const docId = `${item.id}_${year}_${month}`;
                        const emp = employees.find(e => e.id.toString() === item.id);
                        const payslipData = {
                            empId: String(item.id), empName: item.name, year, month,
                            empUid: emp?.empUid || '',
                            totalPay: item.totalPay, holidayPay: item.holidayPay,
                            includeHoliday: bulkIncludeHoliday, deductInsurance: bulkDeductInsurance, finalAmount,
                            wage: item.wage, totalHours: item.totalHours,
                            calcMethod: calcLines.join('\n'),
                            payDate: fmtPayDate(bulkPayDate) || fmtPayDate(todayDateVal()),
                            shopName: workspaceInfo?.shopName || '',
                            bossName: workspaceInfo?.bossName || '',
                            bossSignature: workspaceInfo?.bossSignature || '',
                            sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                            read: false
                        };
                        await fbDb.collection('workspaces').doc(workspaceId).collection('payslips').doc(docId).set(payslipData);
                        if (emp?.empUid) {
                            await addEmpNotification(emp.empUid, {
                                type: 'payslip', year, month,
                                message: `${year}년 ${month}월 급여명세서가 도착했습니다.`,
                                payslipDocId: docId, bossUid: workspaceId
                            });
                        }
                        successCount++;
                    } catch(e) {}
                }
                setBulkSending(false);
                setBulkModal(false);
                showAlert(`${successCount}명에게 ${month}월 급여명세서를 발송했습니다.`, '일괄발송 완료', 'success');
            };

            const handleOpenSend = (item, existing = null) => {
                setSendIncludeHoliday(false);
                setSendDeductInsurance(existing ? !!existing.deductInsurance : false);
                setSendPayDate(existing ? parsePayDate(existing.payDate) : todayDateVal());
                setSendModal({ item, isResend: !!existing });
            };

            const handleSendPayslip = async () => {
                if (!sendModal || !workspaceId) return;
                setSending(true);
                const { item } = sendModal;
                const beforeInsurance = sendIncludeHoliday ? (item.totalPay + item.holidayPay) : item.totalPay;
                const finalAmount = sendDeductInsurance ? Math.round(beforeInsurance * 0.992) : beforeInsurance;
                const wages = Object.entries(item.wageBreakdown || {});
                const calcLines = [];
                if (wages.length <= 1) {
                    calcLines.push(`시급: ${Number(wages[0]?.[0] || item.wage).toLocaleString()}원`, `근무시간: ${fmtHours(item.totalHours)}`, `${sendIncludeHoliday ? '순수급여' : '총 급여'}: ${Number(item.totalPay).toLocaleString()}원`);
                } else {
                    wages.sort((a, b) => Number(a[0]) - Number(b[0])).forEach(([w, info]) => {
                        calcLines.push(`시급 ${Number(w).toLocaleString()}원 × ${info.days}일(${fmtHours(info.hours)}) = ${Number(info.pay).toLocaleString()}원`);
                    });
                    calcLines.push(`${sendIncludeHoliday ? '순수급여' : '총 급여'}: ${Number(item.totalPay).toLocaleString()}원`);
                }
                if (sendIncludeHoliday && item.holidayPay > 0) calcLines.push(`주휴수당: ${Number(item.holidayPay).toLocaleString()}원`);
                if (sendDeductInsurance) calcLines.push(`고용보험 0.8% 제외: -${Number(beforeInsurance - finalAmount).toLocaleString()}원`);
                const calcMethod = calcLines.join('\n');
                const payDate = fmtPayDate(sendPayDate) || fmtPayDate(todayDateVal());
                const docId = `${item.id}_${year}_${month}`;
                const emp = employees.find(e => e.id.toString() === item.id);
                const payslipData = {
                    empId: String(item.id), empName: item.name, year, month,
                    empUid: emp?.empUid || '',
                    totalPay: item.totalPay, holidayPay: item.holidayPay,
                    includeHoliday: sendIncludeHoliday, deductInsurance: sendDeductInsurance, finalAmount,
                    wage: item.wage, totalHours: item.totalHours,
                    calcMethod, payDate,
                    shopName: workspaceInfo?.shopName || '',
                    bossName: workspaceInfo?.bossName || '',
                    bossSignature: workspaceInfo?.bossSignature || '',
                    sentAt: firebase.firestore.FieldValue.serverTimestamp(),
                    read: false
                };
                try {
                    await fbDb.collection('workspaces').doc(workspaceId)
                        .collection('payslips').doc(docId).set(payslipData);
                    // Google 직원이면 알림도 발송
                    if (emp?.empUid) {
                        await addEmpNotification(emp.empUid, {
                                type: 'payslip', year, month,
                                message: `${year}년 ${month}월 급여명세서가 도착했습니다.`,
                                payslipDocId: docId, bossUid: workspaceId
                            });
                    }
                    showAlert(`${item.name}님께 ${month}월 급여명세서를 발송했습니다.`, '발송 완료', 'success');
                    setSendModal(null);
                } catch(e) {
                    showAlert('발송 실패: ' + e.message, '오류', 'error');
                }
                setSending(false);
            };

            const handleExcelDownload = () => {
                if (('ontouchstart' in window) || navigator.maxTouchPoints > 0) {
                    showAlert('엑셀 다운로드는 PC버전에서만 사용 가능합니다.', '안내');
                    return;
                }

                const daysInMonth = new Date(year, month, 0).getDate();
                const monthData = monthlyData[monthKey]?.days || {};

                // ── 탭1: 일별근무시간 ──────────────────────────────
                // 헤더행: 빈칸 + 근무자명 목록
                const sheet1Header = ['날짜', ...payrollList.map(item => item.name)];
                const sheet1Rows = [sheet1Header];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayData = monthData[d]?.entries || {};
                    const row = [`${d}일`];
                    payrollList.forEach(item => {
                        const entry = dayData[item.id];
                        row.push(entry ? entry.hours : '');
                    });
                    sheet1Rows.push(row);
                }

                const ws1 = XLSX.utils.aoa_to_sheet(sheet1Rows);
                const colWidth1 = [{ wch: 6 }, ...payrollList.map(() => ({ wch: 12 }))];
                ws1['!cols'] = colWidth1;

                // ── 탭2: 급여계산 ──────────────────────────────────
                // 메모 최대 개수 계산
                const maxMemos = payrollList.reduce((max, item) => Math.max(max, (item.memos || []).length), 0);
                const memoHeaders = Array.from({ length: maxMemos }, (_, i) => `메모${i + 1}`);

                const sheet2Header = [
                    '구분번호', '근무자명',
                    '이번달 총 근무시간', '시급',
                    '시간급여', '주휴수당', '총 급여',
                    '실제 지급액', '지급일',
                    '고용보험 0.8% 제외',
                    ...memoHeaders
                ];
                const sheet2Rows = [sheet2Header];

                payrollList.forEach((item, idx) => {
                    const timePay = item.totalPay;                     // 시간급여 (시급별 합산)
                    const totalPay = timePay + item.holidayPay;       // 총급여
                    const afterInsurance = Math.round(totalPay * 0.992); // 고용보험 0.8% 제외
                    const wages = Object.entries(item.wageBreakdown || {});
                    const wageStr = wages.length <= 1 ? String(wages[0]?.[0] || item.wage) : wages.map(([w, info]) => `${Number(w).toLocaleString()}원(${info.days}일)`).join(' / ');
                    const memoCells = Array.from({ length: maxMemos }, (_, i) => (item.memos || [])[i] || '');
                    sheet2Rows.push([
                        idx + 1,
                        item.name,
                        item.totalHours,
                        wageStr,
                        timePay,
                        item.holidayPay,
                        totalPay,
                        '',   // 실제 지급액 공란
                        '',   // 지급일 공란
                        afterInsurance,
                        ...memoCells
                    ]);
                });

                const ws2 = XLSX.utils.aoa_to_sheet(sheet2Rows);
                ws2['!cols'] = [
                    { wch: 8 }, { wch: 14 },
                    { wch: 18 }, { wch: 10 },
                    { wch: 14 }, { wch: 12 }, { wch: 14 },
                    { wch: 14 }, { wch: 12 },
                    { wch: 18 },
                    ...memoHeaders.map(() => ({ wch: 20 }))
                ];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws1, '일별근무시간');
                XLSX.utils.book_append_sheet(wb, ws2, '급여계산');
                XLSX.writeFile(wb, `${year}.${String(month).padStart(2,'0')}. 급여명세.xlsx`);
            };

            return (
                <>
                <div className="space-y-4 max-w-full mx-auto" onTouchStart={handlePayrollTouchStart} onTouchEnd={handlePayrollTouchEnd}>
                    <div className="flex flex-col md:flex-row justify-center items-center bg-white p-4 md:p-5 rounded-2xl shadow-sm border border-gray-200 gap-3 md:gap-4">
                        <div className="flex items-center gap-2 md:gap-4 shrink-0">
                            <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                            <MonthYearSelector year={year} month={month} onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))} />
                            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                        </div>
                        {payrollList.length > 0 && (
                            <div className="flex flex-col md:flex-row gap-2 w-full md:w-auto">
                                {workspaceId && (
                                    <button onClick={() => { setBulkIncludeHoliday(false); setBulkDeductInsurance(false); setBulkPayDate(todayDateVal()); setBulkModal(true); }} className="flex items-center gap-2 text-sm font-bold bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-xl transition shadow-sm whitespace-nowrap w-full md:w-auto justify-center">
                                        <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><rect x="2" y="5" width="20" height="14" rx="2"/><line x1="2" y1="10" x2="22" y2="10"/></svg>
                                        급여명세서 일괄발송
                                    </button>
                                )}
                                <button onClick={handleExcelDownload} className="flex items-center gap-2 text-sm font-bold bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-xl transition shadow-sm whitespace-nowrap w-full md:w-auto justify-center">
                                    <FileSpreadsheet className="w-4 h-4" />
                                    엑셀 다운로드
                                </button>
                            </div>
                        )}
                    </div>

                    <div className="md:hidden space-y-3">
                        {payrollList.length === 0 ? (

        function DonutGauge({ revenue, pay, holidayPay = 0, children }) {
            const [hoveredSegment, setHoveredSegment] = React.useState(null); 
            const totalPay = pay + holidayPay;
            const ratio      = revenue > 0 ? (totalPay / revenue) * 100 : 0;
            const payRatio   = revenue > 0 ? (pay / revenue) * 100 : 0;
            const holRatio   = revenue > 0 ? (holidayPay / revenue) * 100 : 0;
            const payDash    = revenue > 0 ? Math.min((pay / revenue) * 100, 100) : 0;
            const holDash    = revenue > 0 ? Math.min((holidayPay / revenue) * 100, Math.max(0, 100 - payDash)) : 0;

            return (
                <div className="flex flex-col items-center bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm w-full">
                    <div className="mb-5 h-8 flex items-center justify-center w-full">

                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#fef08a" strokeWidth="3" />
                            {revenue > 0 && pay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'pay' ? '#16a34a' : '#22c55e'}
                                    strokeWidth={hoveredSegment === 'pay' ? '4.5' : '3.5'}
                                    strokeDasharray={`${payDash} ${100 - payDash}`} strokeDashoffset="0" strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('pay')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}
                            {revenue > 0 && holidayPay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'holiday' ? '#2563eb' : '#60a5fa'}
                                    strokeWidth={hoveredSegment === 'holiday' ? '4.5' : '3.5'}
                                    strokeDasharray={`${holDash} ${100 - holDash}`} strokeDashoffset={`${-payDash}`} strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('holiday')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}
                        </svg>
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-1 pointer-events-none">
                            {hoveredSegment === 'pay' && revenue > 0 ? (
                                <>
                                    <span className="text-[10px] font-bold text-green-700 leading-tight">순수인건비</span>
                                    <span className="text-xl font-black text-green-600 leading-tight mt-0.5">{payRatio.toFixed(1)}%</span>
                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>
                            ) : hoveredSegment === 'holiday' && revenue > 0 ? (
                                <>
                                    <span className="text-[10px] font-bold text-blue-600 leading-tight">주휴수당</span>
                                    <span className="text-xl font-black text-blue-500 leading-tight mt-0.5">{holRatio.toFixed(1)}%</span>
                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>

                            ) : (
