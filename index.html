        function TabCalendar({ employees, monthlyData, setMonthlyData, showConfirm }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;
            
            const currentMonthData = monthlyData[monthKey] || { days: {} };
            const activeEmployees = employees.filter(e => {
                const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
                return statusVal === 'working';
            }).sort((a,b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const handleTotalRevenueChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                setMonthlyData(prev => ({
                    ...prev,
                    [monthKey]: {
                        ...(prev[monthKey] || { days: {} }),
                        totalRevenue: val
                    }
                }));
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}년 ${month}월 ${dayToDel}일의 정보를 정말 삭제하시겠습니까?`, () => {
                    setMonthlyData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey] && newData[monthKey].days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    setEditDayModal(null); // 삭제 후 모달 닫기
                }, "데이터 삭제");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            let totalMonthPay = 0;
            let sumOfDailyRevenue = 0;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                const dayData = currentMonthData.days[d] || {};
                sumOfDailyRevenue += (dayData.revenue || 0);
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;

            const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
            const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
            const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector
                                    year={year}
                                    month={month}
                                    onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                                />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setIsBulkInputOpen(true)}
                                className="bg-gray-800 text-white px-3 md:px-4 py-2.5 rounded-xl hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap font-medium"
                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">이번달 근무시간 일괄 입력</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-xl px-4 py-2.5 shadow-sm text-sm">
                                <label className="font-medium text-gray-700 whitespace-nowrap">이번달 총매출:</label>
                                <input
                                    type="number"
                                    value={currentMonthData.totalRevenue ?? ''}
                                    onChange={handleTotalRevenueChange}
                                    placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                                    className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0 font-bold"
                                />
                                <span className="text-gray-500 font-medium whitespace-nowrap">원</span>
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                순수 급여: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                주휴수당: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                총 급여: {formatCurrency(totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>
                        
                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`empty-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {}, revenue: 0 };
                                let dailyTotalPay = 0;
                                const activeEntries = [];

                                Object.values(dayData.entries || {}).forEach(entry => {
                                    if (entry.hours > 0) {
                                        dailyTotalPay += entry.pay;
                                        activeEntries.push(entry);
                                    }
                                });

                                const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;
                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];

                                return (
                                    <div key={`day-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={() => setEditDayModal(day)}>
                                        <div className="flex justify-between items-start mb-1">
                                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                {day}
                                            </span>
                                            {/* PC에서만 마우스 올렸을 때 보이게 처리 */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={() => setEditDayModal(day)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">수정</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="삭제">
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        </div>

                                        {/* 모바일 뷰 */}
                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}명 근무</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}만원</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="주휴수당 발생"></div>}
                                        </div>

                                        {/* PC 뷰 */}
                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {e.hours}H</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                                            </div>

                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">인건비: {formatCurrency(dailyTotalPay)}</div>
                                                    <div className="text-xs text-gray-500 mt-0.5">매출: {formatCurrency(dayData.revenue || 0)}</div>
                                                    {dayData.revenue > 0 && <div className="text-[10px] font-medium text-gray-400 mt-0.5">비율: {dailyRatio}%</div>}
                                                </div>
                                            )}

                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 발생</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setIsBulkInputOpen(false)}
                        />
                    )}

                    {editDayModal && (
                        <DailyEditModal
                            year={year} month={month} day={editDayModal} monthKey={monthKey}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setEditDayModal(null)}
                            onDelete={() => handleDeleteDay(editDayModal)}
                        />
                    )}

                    <div className="flex justify-end mt-4">
                        <button 
                            onClick={() => {
                                showConfirm(`${year}년 ${month}월 정보를 정말 초기화하시겠습니까?`, () => {
                                    setMonthlyData(prev => {
                                        const newData = { ...prev };
                                        delete newData[monthKey];
                                        return newData;
                                    });
                                }, "초기화 확인");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            이번달 정보 전체 초기화
                        </button>
                    </div>
                </div>
            );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose }) {
            const hourRefs = useRef({});
            const minRefs = useRef({});
            const [localData, setLocalData] = useState({});   // 시간 (정수)
            const [minuteData, setMinuteData] = useState({}); // 분 (0-59)

            useEffect(() => {
                const initData = {};
                const initMinData = {};
                const currentMonthData = monthlyData[monthKey] || { days: {} };

                for (let d = 1; d <= daysInMonth; d++) {
                    initData[d] = {};
                    initMinData[d] = {};
                    const dayData = currentMonthData.days[d] || { entries: {} };
                    activeEmployees.forEach(emp => {
                        const existing = dayData.entries[emp.id]?.hours;
                        if (existing != null && existing > 0) {
                            const h = Math.floor(existing);
                            const m = Math.round((existing - h) * 60);
                            initData[d][emp.id] = h > 0 ? String(h) : '';
                            initMinData[d][emp.id] = m > 0 ? String(m) : '';
                        } else {
                            initData[d][emp.id] = '';
                            initMinData[d][emp.id] = '';
                        }
                    });
                }
                setLocalData(initData);
                setMinuteData(initMinData);
            }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

            const handleInputChange = (day, empId, val) => {
                setLocalData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            const handleMinuteChange = (day, empId, val) => {
                setMinuteData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: val } }));
            };

            // 시간 입력칸 키 핸들러: Enter/ArrowDown → 다음 날 시간칸, Tab → 다음 직원 시간칸
            const handleHourKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }

                let nextDay = day;
                let nextEmpIdx = empIdx;

                if (e.key === 'Enter' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day === daysInMonth) {
                        if (empIdx < activeEmployees.length - 1) { nextDay = 1; nextEmpIdx = empIdx + 1; }
                    } else { nextDay = day + 1; }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    nextDay = Math.max(day - 1, 1);
                } else if (e.key === 'ArrowRight' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    // 오른쪽 → 분 입력칸으로
                    const minRef = minRefs.current[`${day}-${activeEmployees[empIdx].id}`];
                    if (minRef) { minRef.focus(); minRef.select(); }
                    return;
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    nextEmpIdx = Math.max(empIdx - 1, 0);
                    if (e.key === 'Tab' && empIdx === 0) {
                        nextDay = Math.max(day - 1, 1);
                        nextEmpIdx = activeEmployees.length - 1;
                    }
                }

                if (nextDay !== day || nextEmpIdx !== empIdx) {
                    const nextRef = hourRefs.current[`${nextDay}-${activeEmployees[nextEmpIdx].id}`];
                    if (nextRef) { nextRef.focus(); nextRef.select(); }
                }
            };

            // 분 입력칸 키 핸들러: Enter/ArrowDown → 다음 날 시간칸, ArrowLeft → 같은 날 시간칸
            const handleMinKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }

                if (e.key === 'Enter' || e.key === 'ArrowDown') {
                    e.preventDefault();
                    let nextDay = day;
                    let nextEmpIdx = empIdx;
                    if (day === daysInMonth) {
                        if (empIdx < activeEmployees.length - 1) { nextDay = 1; nextEmpIdx = empIdx + 1; }
                    } else { nextDay = day + 1; }
                    const nextRef = hourRefs.current[`${nextDay}-${activeEmployees[nextEmpIdx].id}`];
                    if (nextRef) { nextRef.focus(); nextRef.select(); }
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    const prevRef = hourRefs.current[`${Math.max(day - 1, 1)}-${activeEmployees[empIdx].id}`];
                    if (prevRef) { prevRef.focus(); prevRef.select(); }
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    const hRef = hourRefs.current[`${day}-${activeEmployees[empIdx].id}`];
                    if (hRef) { hRef.focus(); hRef.select(); }
                } else if (e.key === 'Tab' && !e.shiftKey) {
                    e.preventDefault();
                    const nextEmpIdx2 = empIdx + 1;
                    if (nextEmpIdx2 < activeEmployees.length) {
                        const nextRef = hourRefs.current[`${day}-${activeEmployees[nextEmpIdx2].id}`];
                        if (nextRef) { nextRef.focus(); nextRef.select(); }
                    } else {
                        const nextDay = Math.min(day + 1, daysInMonth);
                        const nextRef = hourRefs.current[`${nextDay}-${activeEmployees[0].id}`];
                        if (nextRef) { nextRef.focus(); nextRef.select(); }
                    }
                }
            };

            const handleSave = () => {
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };

                    for (let d = 1; d <= daysInMonth; d++) {
                        if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };

                        activeEmployees.forEach(emp => {
                            const hStr = localData[d]?.[emp.id];
                            const mStr = minuteData[d]?.[emp.id];
                            const h = hStr === '' || hStr == null ? 0 : parseInt(hStr, 10);
                            const m = mStr === '' || mStr == null ? 0 : parseInt(mStr, 10);
                            const hours = h + m / 60;

                            if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                                newData[monthKey].days[d].entries[emp.id] = {
                                    hours: hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage
                                };
                            }
                        });
                    }
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">{year}년 {month}월 근무시간 일괄 입력</h3>
                                <p className="hidden md:block text-xs text-gray-500 mt-1">시간/분 입력 후 Enter → 다음 날짜 이동. 방향키·Tab으로 셀 이동.</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5"/></button>
                        </div>

                        <div className="flex-1 overflow-auto p-4 relative">
                            {activeEmployees.length === 0 ? (
                                <div className="h-full flex items-center justify-center text-gray-500">현재 근무 중인 직원이 없습니다.</div>
                            ) : (
                                <table className="w-full border-collapse min-w-max">
                                    <thead className="sticky top-0 bg-white shadow-sm z-10">
                                        <tr>
                                            <th className="border p-2 bg-gray-100 text-center w-16 whitespace-nowrap">날짜</th>
                                            {activeEmployees.map(emp => (
                                                <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm">
                                                    {emp.displayId}. {emp.name}
                                                    <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                                                    <span className="text-[10px] font-normal text-gray-400 block">시간&nbsp;&nbsp;&nbsp;분</span>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                                            <tr key={day} className="hover:bg-yellow-50/50">
                                                <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}일</td>
                                                {activeEmployees.map((emp, empIdx) => (
                                                    <td key={emp.id} className="border p-0.5">
                                                        <div className="flex items-center gap-0.5">
                                                            <input
                                                                ref={el => hourRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0"
                                                                value={localData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleInputChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleHourKeyDown(e, day, empIdx)}
                                                                className="w-12 h-9 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent outline-none transition text-sm"
                                                                placeholder="0"
                                                            />
                                                            <span className="text-gray-300 text-xs">:</span>
                                                            <input
                                                                ref={el => minRefs.current[`${day}-${emp.id}`] = el}
                                                                type="number" min="0" max="59"
                                                                value={minuteData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleMinuteChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleMinKeyDown(e, day, empIdx)}
                                                                className="w-10 h-9 text-center border-none focus:ring-2 focus:ring-blue-400 bg-transparent outline-none transition text-sm text-blue-600"
                                                                placeholder="분"
                                                            />
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>

                        <div className="p-5 border-t bg-white flex justify-end gap-3 rounded-b-2xl shrink-0">
                            <button onClick={onClose} className="px-6 py-2.5 border border-gray-300 rounded-xl bg-white hover:bg-gray-50 transition font-medium">취소</button>
                            <button onClick={handleSave} className="px-6 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 transition font-bold shadow-sm">저장하기</button>
                        </div>
                    </div>
                </div>
            );
        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, monthlyData, setMonthlyData, onClose, onDelete }) {
            const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };

            const combinedEmployees = useMemo(() => {
                const list = [...activeEmployees];
                const activeIds = new Set(activeEmployees.map(e => e.id.toString()));

                Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
                    if (!activeIds.has(empIdStr)) {
                        list.push({
                            id: empIdStr, displayId: '-', name: data.name, wage: data.wage, isInactive: true
                        });
                    }
                });
                return list;
            }, [activeEmployees, currentDayData.entries]);

            const hourRefs = useRef({});
            const minRefs = useRef({});

            const [revenue, setRevenue] = useState(currentDayData.revenue || '');
            const [hoursData, setHoursData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    init[emp.id] = existing > 0 ? Math.floor(existing) : '';
                });
                return init;
            });
            const [minsData, setMinsData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    const m = Math.round((existing - Math.floor(existing)) * 60);
                    init[emp.id] = m > 0 ? m : '';
                });
                return init;
            });
            // 메모 삭제 상태 (직원이 입력한 메모를 관리자가 삭제할 수 있음)
            const [deletedNotes, setDeletedNotes] = useState({});

            const handleHourKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleMinKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleSave = () => {
                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };
                    if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

                    newData[monthKey].days[day].revenue = Number(revenue) || 0;

                    combinedEmployees.forEach(emp => {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const existingEntry = prev[monthKey]?.days[day]?.entries[emp.id];

                        if (hours > 0) {
                            // 직원이 제출했고 관리자가 시간을 변경한 경우 → 알림 전송
                            if (existingEntry?.submittedByEmp && existingEntry?.empUid &&
                                existingEntry.hours !== hours) {
                                sendChangeNotification(existingEntry.empUid, {
                                    date: dateStr,
                                    oldHours: existingEntry.hours,
                                    newHours: hours
                                }).catch(() => {});
                            }
                            newData[monthKey].days[day].entries[emp.id] = {
                                hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage,
                                note: deletedNotes[emp.id] ? '' : (existingEntry?.note || ''),
                                submittedByEmp: existingEntry?.submittedByEmp || false,
                                empUid: existingEntry?.empUid || null,
                                submittedHours: existingEntry?.submittedHours || null,
                                bossModified: existingEntry?.submittedByEmp ? (existingEntry.hours !== hours) : false
                            };
                        } else {
                            delete newData[monthKey].days[day].entries[emp.id];
                        }
                    });
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <form onSubmit={(e) => { e.preventDefault(); handleSave(); }} className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{month}월 {day}일 상세 수정</h3>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">일일 매출 (원)</label>
                                <input 
                                    type="number" 
                                    value={revenue} 
                                    onChange={e => setRevenue(e.target.value)}
                                    className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="0"
                                />
                            </div>

                            <div className="pt-3 border-t border-gray-100">
                                <label className="block text-sm font-bold text-gray-700 mb-1">근무 시간 수정</label>
                                <p className="text-xs text-gray-400 mb-3">시간/분 입력 후 Enter → 다음 근무자로 이동</p>
                                {combinedEmployees.map((emp, idx) => (
                                    <React.Fragment key={emp.id}>
                                        <div className={`flex justify-between items-center mb-1 p-2 rounded-lg ${emp.isInactive ? 'bg-red-50/50' : 'bg-gray-50'}`}>
                                            <span className="text-sm text-gray-700 truncate flex items-center gap-1 font-medium">
                                                {emp.isInactive ? (
                                                    <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-bold">제외/퇴사</span>
                                                ) : (
                                                    <span>{emp.displayId}.</span>
                                                )}
                                                {emp.name}
                                            </span>
                                            <div className="flex items-center gap-1">
                                                <input
                                                    ref={el => hourRefs.current[emp.id] = el}
                                                    type="number" min="0"
                                                    value={hoursData[emp.id] ?? ''}
                                                    onChange={e => setHoursData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleHourKeyDown(e, idx)}
                                                    disabled={emp.isInactive}
                                                    className={`w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-green-500 outline-none ${emp.isInactive ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : ''}`}
                                                    placeholder="0"
                                                />
                                                <span className="text-xs text-gray-500">시간</span>
                                                <input
                                                    ref={el => minRefs.current[emp.id] = el}
                                                    type="number" min="0" max="59"
                                                    value={minsData[emp.id] ?? ''}
                                                    onChange={e => setMinsData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleMinKeyDown(e, idx)}
                                                    disabled={emp.isInactive}
                                                    className={`w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-blue-400 outline-none ${emp.isInactive ? 'bg-gray-100 text-gray-400 cursor-not-allowed' : ''}`}
                                                    placeholder="0"
                                                />
                                                <span className="text-xs text-gray-500">분</span>
                                            </div>
                                        </div>
                                        {/* 직원이 입력한 메모 표시 (읽기전용, 관리자는 삭제만 가능) */}
                                        {currentDayData.entries[emp.id]?.submittedByEmp &&
                                         currentDayData.entries[emp.id]?.note &&
                                         !deletedNotes[emp.id] && (
                                            <div className="mb-2 flex items-start gap-2 bg-blue-50 border border-blue-200 rounded-lg px-3 py-2">
                                                <div className="flex-1">
                                                    <p className="text-[10px] text-blue-500 font-bold mb-0.5">직원 메모</p>
                                                    <p className="text-xs text-gray-700 whitespace-pre-wrap">{currentDayData.entries[emp.id].note}</p>
                                                </div>
                                                <button type="button" onClick={() => setDeletedNotes(p => ({...p, [emp.id]: true}))}
                                                    className="text-red-400 hover:text-red-600 transition shrink-0 mt-0.5" title="메모 삭제">
                                                    <Trash2 className="w-3.5 h-3.5"/>
                                                </button>
                                            </div>
                                        )}
                                        {deletedNotes[emp.id] && (
                                            <p className="text-[10px] text-red-400 mb-2 ml-1">메모가 삭제됩니다 (저장 후 적용)</p>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>

        function TabPayroll({ employees, monthlyData, showAlert }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month]);

            const payrollList = useMemo(() => {
                const list = {};
                const monthData = monthlyData[monthKey]?.days || {};

                Object.values(monthData).forEach(day => {
                    Object.entries(day.entries || {}).forEach(([empId, data]) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: data.name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || data.wage || MIN_WAGE,
                                totalPay: 0,
                                totalHours: 0,
                                holidayPay: 0,
                                holidayWeeks: []
                            };
                        }
                        list[empId].totalPay += data.pay;
                        list[empId].totalHours += data.hours;
                    });
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== year || sm !== month) return;
                    weekData.forEach(({ empId, holidayPay, name, weeklyHours }) => {
                        if (!list[empId]) {
                            const currentEmp = employees.find(e => e.id.toString() === empId);
                            list[empId] = {
                                id: empId,
                                displayId: currentEmp ? currentEmp.displayId : 99999,
                                name: name,
                                residentId: currentEmp?.residentId || '',
                                account: currentEmp?.account || '정보 없음',
                                bank: currentEmp?.bank || '-',
                                wage: currentEmp?.wage || MIN_WAGE,
                                totalPay: 0, totalHours: 0, holidayPay: 0, holidayWeeks: []
                            };
                        }
                        list[empId].holidayPay += holidayPay;
                        list[empId].holidayWeeks.push({ weeklyHours, holidayPay });
                    });
                });

                return Object.values(list).sort((a, b) => a.displayId - b.displayId);
            }, [monthKey, monthlyData, employees, year, month]);

            const grandTotal = payrollList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);

            const handleExcelDownload = () => {
                if (window.innerWidth < 768) {
                    showAlert('엑셀 다운로드는 PC버전에서만 사용 가능합니다.', '안내');
                    return;
                }

                const daysInMonth = new Date(year, month, 0).getDate();
                const monthData = monthlyData[monthKey]?.days || {};

                // ── 탭1: 일별근무시간 ──────────────────────────────
                // 헤더행: 빈칸 + 근무자명 목록
                const sheet1Header = ['날짜', ...payrollList.map(item => item.name)];
                const sheet1Rows = [sheet1Header];

                for (let d = 1; d <= daysInMonth; d++) {
                    const dayData = monthData[d]?.entries || {};
                    const row = [`${d}일`];
                    payrollList.forEach(item => {
                        const entry = dayData[item.id];
                        row.push(entry ? entry.hours : '');

                    sheet1Rows.push(row);
                }

                const ws1 = XLSX.utils.aoa_to_sheet(sheet1Rows);
                const colWidth1 = [{ wch: 6 }, ...payrollList.map(() => ({ wch: 12 }))];
                ws1['!cols'] = colWidth1;

                // ── 탭2: 급여계산 ──────────────────────────────────
                const sheet2Header = [
                    '구분번호', '근무자명', '주민번호',
                    '이번달 총 근무시간', '시급',
                    '시간급여', '주휴수당', '총 급여',
                    '실제 지급액', '지급일',
                    '고용보험 0.8% 제외'
                ];
                const sheet2Rows = [sheet2Header];

                payrollList.forEach((item, idx) => {
                    const timePay = item.totalHours * item.wage;      // 시간급여
                    const totalPay = timePay + item.holidayPay;       // 총급여
                    const afterInsurance = Math.round(totalPay * 0.992); // 고용보험 0.8% 제외
                    sheet2Rows.push([
                        idx + 1,
                        item.name,
                        item.residentId || '',
                        item.totalHours,
                        item.wage,
                        timePay,
                        item.holidayPay,
                        totalPay,
                        '',   // 실제 지급액 공란
                        '',   // 지급일 공란
                        afterInsurance
                    ]);
                });

                const ws2 = XLSX.utils.aoa_to_sheet(sheet2Rows);
                ws2['!cols'] = [
                    { wch: 8 }, { wch: 14 }, { wch: 16 },
                    { wch: 18 }, { wch: 10 },
                    { wch: 14 }, { wch: 12 }, { wch: 14 },
                    { wch: 14 }, { wch: 12 },
                    { wch: 18 }
                ];

                const wb = XLSX.utils.book_new();
                XLSX.utils.book_append_sheet(wb, ws1, '일별근무시간');
                XLSX.utils.book_append_sheet(wb, ws2, '급여계산');
                XLSX.writeFile(wb, `${year}.${String(month).padStart(2,'0')}. 급여명세.xlsx`);
            };

            return (

                            <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>

                        {payrollList.length > 0 && (

                                <FileSpreadsheet className="w-4 h-4" />
                                <span className="hidden md:inline">엑셀 다운로드</span>
                                <span className="md:hidden">엑셀</span>
                            </button>

                    </div>

                    <div className="md:hidden space-y-3">
                        {payrollList.length === 0 ? (
                            <div className="bg-white rounded-2xl border border-gray-200 p-8 text-center text-gray-500">해당 월의 인건비 지급 내역이 없습니다.</div>
                        ) : (
                            <>
                                {payrollList.map(item => (
                                    <div key={item.id} className="bg-white rounded-2xl shadow-sm border border-gray-200 p-5">
                                        <div className="flex justify-between items-start mb-4">
                                            <div>
                                                <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2.5 py-1 rounded-md">
                                                    {item.displayId === 99999 ? '(삭제됨)' : `No. ${item.displayId}`}
                                                </span>
                                                <h3 className="text-lg font-bold text-gray-800 mt-2">{item.name}</h3>
                                                <p className="text-xs text-gray-500 mt-1">{item.bank} <span className="font-mono">{item.account}</span></p>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-xl font-black text-purple-700">{formatCurrency(item.totalPay + item.holidayPay)}</div>
                                                <div className="text-xs font-medium text-gray-400 mt-0.5">총 지급액</div>
                                            </div>
                                        </div>
                                        <div className="grid grid-cols-3 gap-2 text-center text-sm border-t border-gray-100 pt-4">
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">시급</div>
                                                <div className="font-bold text-gray-700">{formatCurrency(item.wage)}</div>
                                            </div>
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">근무시간</div>
                                                <div className="font-bold text-gray-700">{item.totalHours}H</div>
                                            </div>
                                            <div>
                                                <div className="text-gray-400 text-xs mb-1 font-medium">순수급여</div>
                                                <div className="font-bold text-green-600">{formatCurrency(item.totalPay)}</div>

                                                <span className="text-xs text-blue-600 font-bold">주휴수당 포함</span>
                                                <span className="text-sm font-bold text-blue-600">{formatCurrency(item.holidayPay)}</span>
                                            </div>

                                <div className="bg-purple-50 rounded-2xl border border-purple-200 p-5 flex justify-between items-center shadow-sm">
                                    <span className="font-bold text-gray-800">총 지급 예정액</span>
                                    <span className="text-2xl font-black text-purple-700">{formatCurrency(grandTotal)}</span>
                                </div>

                    <div className="hidden md:block bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden">

                            <table className="w-full text-left border-collapse min-w-max">

                                    <tr>
                                        <th className="p-4 font-bold text-gray-600">구분번호</th>
                                        <th className="p-4 font-bold text-gray-600">이름</th>

                                        <th className="p-4 font-bold text-gray-600 text-right">시급</th>

                                <tbody className="divide-y divide-gray-100">

                                                    ) : <span className="text-gray-300 font-normal">-</span>}
                                                </td>
                                                <td className="p-4 text-right font-black text-purple-700">
                                                    {formatCurrency(item.totalPay + item.holidayPay)}

                            </table>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 도넛 차트 ---
        function DonutGauge({ revenue, pay, holidayPay = 0, children }) {
            const [hoveredSegment, setHoveredSegment] = React.useState(null); 
            const totalPay = pay + holidayPay;
            const ratio      = revenue > 0 ? (totalPay / revenue) * 100 : 0;
            const payRatio   = revenue > 0 ? (pay / revenue) * 100 : 0;
            const holRatio   = revenue > 0 ? (holidayPay / revenue) * 100 : 0;
            const payDash    = revenue > 0 ? Math.min((pay / revenue) * 100, 100) : 0;
            const holDash    = revenue > 0 ? Math.min((holidayPay / revenue) * 100, Math.max(0, 100 - payDash)) : 0;

            return (
                <div className="flex flex-col items-center bg-gray-50 p-6 rounded-2xl border border-gray-200 shadow-sm w-full">
                    <div className="mb-5 h-8 flex items-center justify-center w-full">

                            <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#fef08a" strokeWidth="3" />
                            {revenue > 0 && pay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'pay' ? '#16a34a' : '#22c55e'}
                                    strokeWidth={hoveredSegment === 'pay' ? '4.5' : '3.5'}
                                    strokeDasharray={`${payDash} ${100 - payDash}`} strokeDashoffset="0" strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('pay')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}
                            {revenue > 0 && holidayPay > 0 && (
                                <circle
                                    cx="18" cy="18" r="15.915" fill="transparent"
                                    stroke={hoveredSegment === 'holiday' ? '#2563eb' : '#60a5fa'}
                                    strokeWidth={hoveredSegment === 'holiday' ? '4.5' : '3.5'}
                                    strokeDasharray={`${holDash} ${100 - holDash}`} strokeDashoffset={`${-payDash}`} strokeLinecap="butt"
                                    pointerEvents="visibleStroke"
                                    style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                                    onMouseEnter={() => setHoveredSegment('holiday')} onMouseLeave={() => setHoveredSegment(null)}
                                    className="transition-all duration-1000 ease-out"
                                />
                            )}

                        <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-1 pointer-events-none">
                            {hoveredSegment === 'pay' && revenue > 0 ? (

                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>
                            ) : hoveredSegment === 'holiday' && revenue > 0 ? (
                                <>
                                    <span className="text-[10px] font-bold text-blue-600 leading-tight">주휴수당</span>
                                    <span className="text-xl font-black text-blue-500 leading-tight mt-0.5">{holRatio.toFixed(1)}%</span>
                                    <span className="text-[10px] text-gray-400 leading-tight mt-0.5">매출 대비</span>
                                </>

        function BarColumn({ d, maxValue }) {
            const [hoveredBar, setHoveredBar] = React.useState(null); 
            const totalPay = d.pay + d.holidayPay;
            const revH     = maxValue > 0 ? (d.revenue / maxValue) * 100 : 0;

                <div className="relative flex flex-col items-center h-full justify-end w-12 shrink-0" onMouseLeave={() => setHoveredBar(null)}>
