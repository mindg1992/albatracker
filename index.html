        // --- 주휴수당 계산 유틸리티 ---
        function calcHolidayPayBySunday(monthlyData, employees) {
            const toLocalStr = (date) => {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const d = date.getDate().toString().padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const allDateEntries = {};
            Object.entries(monthlyData).forEach(([mk, monthData]) => {
                const [y, m] = mk.split('-').map(Number);
                Object.entries(monthData.days || {}).forEach(([day, dayData]) => {
                    const dateStr = toLocalStr(new Date(y, m - 1, parseInt(day)));
                    const empData = {};
                    Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                        if (entry.hours > 0) empData[empId] = { hours: entry.hours, wage: entry.wage, name: entry.name };
                    });
                    if (Object.keys(empData).length > 0) allDateEntries[dateStr] = empData;
                });
            });

            const weekSundays = new Set();
            Object.keys(allDateEntries).forEach(dateStr => {
                const [y, m, d] = dateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                const dow = date.getDay();
                const daysToSunday = dow === 0 ? 0 : 7 - dow;
                weekSundays.add(toLocalStr(new Date(y, m - 1, d + daysToSunday)));
            });

            const result = {};
            weekSundays.forEach(sundayStr => {
                const [sy, sm, sd] = sundayStr.split('-').map(Number);
                const empWeekly = {};
                for (let i = 0; i < 7; i++) {
                    const dk = toLocalStr(new Date(sy, sm - 1, sd - 6 + i));
                    Object.entries(allDateEntries[dk] || {}).forEach(([empId, data]) => {
                        if (!empWeekly[empId]) {
                            const emp = employees.find(e => e.id.toString() === empId);
                            empWeekly[empId] = { hours: 0, wage: emp?.wage || data.wage || MIN_WAGE, name: data.name };
                        }
                        empWeekly[empId].hours += data.hours;
                    });
                }

                const weekResults = [];
                Object.entries(empWeekly).forEach(([empId, { hours, wage, name }]) => {
                    if (hours >= 15) {
                        weekResults.push({ empId, name, weeklyHours: hours, holidayPay: Math.round((hours / 5) * wage) });
                    }
                });
                if (weekResults.length > 0) result[sundayStr] = weekResults;
            });
            return result;
        }

        function MonthYearSelector({ year, month, onChange }) {
            const [y, setY] = useState(year);
            const [m, setM] = useState(month);

            useEffect(() => {
                setY(year);
                setM(month);
            }, [year, month]);

            const handleApply = () => {
                let newY = parseInt(y);
                let newM = parseInt(m);
                if (isNaN(newY) || newY < 1900) newY = new Date().getFullYear();
                if (isNaN(newM) || newM < 1) newM = 1;
                if (newM > 12) newM = 12;
                setY(newY);
                setM(newM);
                onChange(newY, newM);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') handleApply(); };

            return (
                <div className="flex items-center gap-1 justify-center">
                    <input type="number" value={y} onChange={e => setY(e.target.value)} onKeyDown={handleKeyDown} className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-16 md:w-20 text-center outline-none transition-colors" />

        // Firestore REST API로 저장 (SDK 스트리밍 연결 문제 우회)
        async function fsSet(docRef, data) {
            const uid = docRef.id;
            const token = await fbAuth.currentUser.getIdToken();
            const toFV = (v) => {
                if (v === null || v === undefined) return { nullValue: null };
                if (typeof v === 'boolean') return { booleanValue: v };
                if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
                if (typeof v === 'string') return { stringValue: v };
                if (Array.isArray(v)) return { arrayValue: { values: v.map(toFV) } };
                if (typeof v === 'object') {
                    const fields = {};
                    Object.entries(v).forEach(([k, val]) => { fields[k] = toFV(val); });
                    return { mapValue: { fields } };
                }
                return { stringValue: String(v) };
            };
            const fields = {};
            Object.entries(data).forEach(([k, v]) => { fields[k] = toFV(v); });
            const resp = await fetch(
                `https://firestore.googleapis.com/v1/projects/albatracker-9e90e/databases/(default)/documents/users/${uid}`,
                {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })
                }
            );
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${resp.status}`);
            }
        }

        // --- 직원 시스템 헬퍼 함수 ---
        function generateInviteCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        async function setupBossWorkspace(bossUid, shopName) {
            const inviteCode = generateInviteCode();
            const batch = fbDb.batch();
            batch.set(fbDb.collection('workspaces').doc(bossUid), {
                shopName, inviteCode, bossUid,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            batch.set(fbDb.collection('inviteCodes').doc(inviteCode), {
                bossUid, shopName,
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await batch.commit();
            return inviteCode;
        }

        async function regenerateInviteCode(bossUid, oldCode, shopName) {
            const newCode = generateInviteCode();
            const batch = fbDb.batch();
            if (oldCode) batch.delete(fbDb.collection('inviteCodes').doc(oldCode));
            batch.update(fbDb.collection('workspaces').doc(bossUid), { inviteCode: newCode });
            batch.set(fbDb.collection('inviteCodes').doc(newCode), {
                bossUid, shopName: shopName || '',
                createdAt: firebase.firestore.FieldValue.serverTimestamp()
            });
            await batch.commit();
            return newCode;
        }

                        setWorkspaceInfo(null);
                        setPendingEmployees([]);
                    }
                });
                return () => unsubscribeAuth();
            }, []);

            // 역할 감지: Google 계정 = 관리자, @emp.albatracker.page 이메일 = 직원
            useEffect(() => {
                if (!firebaseUser) return;
                let cancelled = false;

                const isGoogleUser = firebaseUser.providerData?.some(p => p.providerId === 'google.com');
                if (isGoogleUser || !firebaseUser.email?.includes('@emp.albatracker.page')) {
                    setUserRole('boss');
                    return;
                }

                // 직원 계정 로드 (생성 직후 딜레이 대응: 최대 3회 재시도)
                let attempts = 0;
                const tryLoad = () => {
                    fbDb.collection('employeeAccounts').doc(firebaseUser.uid).get()
                        .then(doc => {
                            if (cancelled) return;
                            if (doc.exists) {
                                const data = doc.data();
                                setUserRole('employee');
                                setEmpAccount(data);
                                setEmpPin(data.pin || '');
                                setFbLoading(false);
                            } else if (attempts < 3) {
                                attempts++;
                                setTimeout(tryLoad, 1500);
                            } else {
                                setUserRole('boss');
                                setFbLoading(false);
                            }
                        })
                        .catch(() => { if (!cancelled) { setUserRole('boss'); setFbLoading(false); } });
                };
                tryLoad();
                return () => { cancelled = true; };
            }, [firebaseUser]);

            // 인증 완료 후 데이터 로딩 (localStorage 캐시 우선 → Firestore 서버 동기화) — 관리자 전용
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss') return;

                let cancelled = false;
                const cacheKey = 'at_cache_' + firebaseUser.uid;
                const docRef = fbDb.collection('users').doc(firebaseUser.uid);

                const applyData = (d) => {
                    if (cancelled) return;
                    const newData = {
                        appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                        employees:     d.employees     !== undefined ? d.employees     : [],
                        nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                        monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                        predictData:   d.predictData   !== undefined ? d.predictData   : {},
                        globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                    };
                    lastSyncedDataRef.current = JSON.stringify(newData);
                    setAppPin(newData.appPin);
                    setEmployees(newData.employees);
                    setNextEmpId(newData.nextEmpId);
                    setMonthlyData(newData.monthlyData);
                    setPredictData(newData.predictData);
                    setGlobalMinWage(newData.globalMinWage);
                };

                // ① localStorage 캐시 → 즉시 화면 표시 (사실상 0ms)
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        applyData(JSON.parse(cached));
                    } catch (_) {}
                    setFbLoading(false);
                }

                // ② Firestore 서버에서 최신 데이터 동기화 (실패해도 캐시로 동작)
                const syncFromServer = () => {
                    // 캐시 없을 때 Firestore hang → 스피너 무한 방지: 최대 4초 후 강제 해제
                    const loadingTimeout = setTimeout(() => {
                        if (!cancelled) setFbLoading(false);
                    }, 4000);

                    docRef.get().then(doc => {
                        if (cancelled) return;
                        if (doc.exists) {
                            const d = doc.data();
                            const serverStr = JSON.stringify({
                                appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                                employees:     d.employees     !== undefined ? d.employees     : [],
                                nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                                monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                                predictData:   d.predictData   !== undefined ? d.predictData   : {},
                                globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                            });
                            if (serverStr !== lastSyncedDataRef.current) {
                                applyData(d);
                                localStorage.setItem(cacheKey, JSON.stringify(d));
                            }
                        } else if (!cached) {
                            lastSyncedDataRef.current = JSON.stringify({
                                appPin: INITIAL_PIN, employees: [], nextEmpId: 1,
                                monthlyData: {}, predictData: {}, globalMinWage: ''
                            });
                        }
                    }).catch(e => {
                        if (cancelled) return;
                        // offline/unavailable 에러면 5초 후 자동 재시도 (팝업 없음)
                        if (e.code === 'unavailable' || e.message.includes('offline')) {
                            setTimeout(() => { if (!cancelled) syncFromServer(); }, 5000);
                        } else if (!cached) {
                            // 캐시도 없고 알 수 없는 에러일 때만 알림
                            showAlert('데이터를 불러오지 못했습니다.\n네트워크를 확인하고 새로고침해 주세요.', '연결 오류', 'error');
                        }
                    }).finally(() => {
                        clearTimeout(loadingTimeout);
                        if (!cancelled) setFbLoading(false);
                    });
                };
                syncFromServer();

                return () => { cancelled = true; };
            }, [firebaseUser, userRole]);

            const saveTimerRef = useRef(null);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [saveError, setSaveError] = useState(false);
            const saveSuccessTimerRef = useRef(null);

            useEffect(() => {
                if (!firebaseUser || fbLoading || userRole !== 'boss') return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                const currentDataStr = JSON.stringify(currentData);

                // ① localStorage 즉시 저장 — 앱을 바로 닫아도 이 기기에선 데이터 보존
                localStorage.setItem('at_cache_' + firebaseUser.uid, JSON.stringify(currentData));

                // ② Firestore 동기화 — 이미 서버와 동일하면 건너뜀
                if (currentDataStr === lastSyncedDataRef.current) return;

                // ③ 2초 디바운스 후 Firestore에 백그라운드 저장 (구글 계정 동기화)
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                saveTimerRef.current = setTimeout(() => {
                    setIsSyncing(true);
                    fsSet(fbDb.collection('users').doc(firebaseUser.uid), currentData)
                        .then(() => {
                            lastSyncedDataRef.current = currentDataStr;
                            setIsSyncing(false);
                            setSaveSuccess(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        })
                        .catch(e => {
                            console.error('Firestore 자동 저장 실패:', e);
                            setIsSyncing(false);
                            setSaveError(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveError(false), 4000);
                        });
                }, 2000);
                return () => clearTimeout(saveTimerRef.current);
            }, [appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage, firebaseUser, fbLoading, userRole]);

            // 저장 버튼 — localStorage 즉시 저장 후 Firestore 동기화
            const handleManualSave = () => {
                if (!firebaseUser) {
                    showAlert('클라우드에 연결되어 있지 않습니다.\nGoogle 로그인을 진행해주세요.', '안내', 'alert');
                    return;
                }
                if (isSyncing) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);

                // localStorage 즉시 저장 (이 기기 데이터 보호)
                localStorage.setItem('at_cache_' + firebaseUser.uid, JSON.stringify(currentData));

                setIsSyncing(true);
                fsSet(fbDb.collection('users').doc(firebaseUser.uid), currentData)
                    .then(() => {
                        lastSyncedDataRef.current = JSON.stringify(currentData);
                        setIsSyncing(false);
                        setSaveSuccess(true);
                        clearTimeout(saveSuccessTimerRef.current);
                        saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        showAlert('구글 계정에 저장되었습니다.', '저장 완료', 'success');
                    })
                    .catch(e => {
                        console.error('Firestore 저장 실패:', e);
                        setIsSyncing(false);
                        showAlert('구글 계정 저장에 실패했습니다.\n(' + e.message + ')\n\n이 기기에는 저장되었습니다.', '클라우드 동기화 실패', 'error');
                    });
            };

            const handleGoogleLogin = async () => {
                const ua = navigator.userAgent;
                const isInApp = /KAKAOTALK|Instagram|FBAN|FBAV|Line\/|Twitter|NAVER|DaumApps|Whale/i.test(ua)
                    || (/Android/i.test(ua) && /wv/.test(ua))
                    || (/iPhone|iPad/i.test(ua) && !/Safari/i.test(ua) && /AppleWebKit/i.test(ua));
                
                if (isInApp) {
                    const isKakao = /KAKAOTALK/i.test(ua);
                    if (isKakao) {
                        showAlert('카카오톡 브라우저에서는 Google 로그인이 차단됩니다.\n\n우측 하단 ⋯ 메뉴 → "다른 브라우저로 열기"를 눌러 Chrome 또는 Safari에서 접속해 주세요.', '브라우저 안내', 'alert');
                    } else {
                        showAlert('현재 앱 내 브라우저에서는 Google 로그인이 차단됩니다.\n\nChrome 또는 Safari 브라우저로 열어서 로그인해 주세요.', '브라우저 안내', 'alert');
                    }
                    return;
                }

                setFbLoading(true);
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await fbAuth.signInWithPopup(provider);
                } catch(e) {
                    setFbLoading(false);
                    showAlert('Google 로그인에 실패했습니다.\n' + e.message, '오류', 'error');
                }
            };

            const handleLogout = () => {
                showConfirm('로그아웃 하시겠습니까?', async () => {
                    await fbAuth.signOut();
                    setIsAuthenticated(false);
                    setAppPin(INITIAL_PIN);
                    setEmployees([]);
                    setNextEmpId(1);
                    setMonthlyData({});
                    setPredictData({});
                    setGlobalMinWage('');
                    lastSyncedDataRef.current = "";
                    setUserRole(null);
                    setEmpAccount(null);
                    setEmpPin('');
                    setIsEmpAuthenticated(false);
                    setWorkspaceInfo(null);
                    setPendingEmployees([]);
                    setEmpNotifications([]);
                    setMySubmissions({});
                });
            };

            // 관리자 워크스페이스 로드
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss') return;
                let cancelled = false;
                fbDb.collection('workspaces').doc(firebaseUser.uid).get()
                    .then(doc => {
                        if (cancelled) return;
                        if (doc.exists) setWorkspaceInfo(doc.data());
                        else setShowBossSetup(true);
                    }).catch(() => {});
                return () => { cancelled = true; };
            }, [firebaseUser, userRole]);

            // 대기 중인 직원 실시간 감지 (관리자)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss') return;
                const unsub = fbDb.collection('employeeAccounts')
                    .where('bossUid', '==', firebaseUser.uid)
                    .where('status', '==', 'pending')
                    .onSnapshot(snap => {
                        const list = [];
                        snap.forEach(d => list.push({ uid: d.id, ...d.data() }));
                        setPendingEmployees(list);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole]);

            // 직원 제출 근무시간 실시간 수신 → 월별 현황 자동 반영 (관리자)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !isAuthenticated) return;
                const unsub = fbDb.collection('workspaces').doc(firebaseUser.uid)
                    .collection('submissions')
                    .onSnapshot(snap => {
                        snap.docChanges().forEach(change => {
                            if (change.type !== 'added' && change.type !== 'modified') return;
                            const sub = change.doc.data();
                            if (!sub.date || sub.employeeId == null || !sub.hours) return;
                            const parts = sub.date.split('-').map(Number);
                            const mk = `${parts[0]}-${String(parts[1]).padStart(2,'0')}`;
                            const day = parts[2];
                            const wage = sub.wage || Number(globalMinWage) || MIN_WAGE;
                            setMonthlyData(prev => {
                                const md = prev[mk] || {};
                                const dd = md.days || {};
                                const de = dd[day] || {};
                                const ee = de.entries || {};
                                if (ee[sub.employeeId]?.bossModified) return prev; // 관리자가 수정한 경우 유지
                                return {
                                    ...prev,
                                    [mk]: { ...md, days: { ...dd, [day]: { ...de, entries: { ...ee,
                                        [sub.employeeId]: {
                                            hours: sub.hours,
                                            pay: Math.round(sub.hours * wage),
                                            name: sub.empName,
                                            wage,
                                            note: sub.note || '',
                                            submittedByEmp: true,
                                            empUid: sub.empUid,
                                            submittedHours: sub.hours
                                        }
                                    }}}}
                                };
                            });
                        });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, isAuthenticated, globalMinWage]);

            // 직원 본인 알림 실시간 로드
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !isEmpAuthenticated) return;
                const unsub = fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                    .collection('notifications')
                    .orderBy('createdAt', 'desc').limit(50)
                    .onSnapshot(snap => {
                        const list = [];
                        snap.forEach(d => list.push({ id: d.id, ...d.data() }));
                        setEmpNotifications(list);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, isEmpAuthenticated]);

            // 직원 본인 제출 기록 실시간 로드
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !empAccount?.bossUid || !isEmpAuthenticated) return;
                const unsub = fbDb.collection('workspaces').doc(empAccount.bossUid)
                    .collection('submissions')
                    .where('empUid', '==', firebaseUser.uid)
                    .onSnapshot(snap => {
                        const subs = {};
                        snap.forEach(d => { const data = d.data(); if (data.date) subs[data.date] = { id: d.id, ...data }; });
                        setMySubmissions(subs);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, empAccount, isEmpAuthenticated]);

            // 직원 승인 처리 (관리자)
            const handleApproveEmployee = async (empUid) => {
                const empData = pendingEmployees.find(e => e.uid === empUid);
                if (!empData) return;
                try {
                    const newEmpId = nextEmpId;
                    const newEmp = {
                        id: newEmpId, name: empData.name,
                        hireDate: new Date().toISOString().split('T')[0],
                        wage: '', scheduledDays: '', dailyHours: '',
                        residentId: empData.residentId || '',
                        bank: empData.bank || '',
                        account: empData.account || '',
                        memo: '', status: 'working'
                    };
                    setEmployees(prev => [...prev, newEmp]);
                    setNextEmpId(prev => prev + 1);
                    await fbDb.collection('employeeAccounts').doc(empUid).update({
                        status: 'approved', employeeId: newEmpId,
                        approvedAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    showAlert(`${empData.name}님이 승인되었습니다.\n근무자 정보 탭에서 시급 등을 설정해주세요.`, '승인 완료', 'success');
                } catch(e) {
                    showAlert('승인 처리 중 오류: ' + e.message, '오류', 'error');
                }
            };

            // 직원 거절 처리 (관리자)
            const handleRejectEmployee = (empUid) => {
                const empData = pendingEmployees.find(e => e.uid === empUid);
                showConfirm(`${empData?.name || '직원'}님의 가입을 거절하시겠습니까?`, async () => {
                    try {
                        await fbDb.collection('employeeAccounts').doc(empUid).update({
                            status: 'rejected',
                            rejectedAt: firebase.firestore.FieldValue.serverTimestamp()
                        });
                    } catch(e) {
                        showAlert('처리 중 오류: ' + e.message, '오류', 'error');
                    }
                }, '가입 거절');
            };

            const employeesWithDisplayId = useMemo(() => {
                return [...employees].sort((a, b) => {
                    const dateA = new Date(a.hireDate).getTime();
                    const dateB = new Date(b.hireDate).getTime();
                    if (dateA === dateB) return a.id - b.id;
                    return dateA - dateB;
                }).map((emp, index) => ({ ...emp, displayId: index + 1 }));
            }, [employees]);

            const fileInputRef = useRef(null);

            const handleBackup = () => {
                const backupData = { version: "1.0", employees, monthlyData, predictData, nextEmpId, appPin, globalMinWage };
                const dataStr = JSON.stringify(backupData);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const exportFileDefaultName = `알바트래커_백업_${dateStr}.json`;

                let linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                document.body.appendChild(linkElement);
                linkElement.click();
                document.body.removeChild(linkElement);
            };

            const handleImportClick = () => {
                showConfirm("불러오기를 진행하면 현재 입력된 데이터가 모두 덮어씌워집니다.\n계속하시겠습니까?", () => {
                    fileInputRef.current?.click();
                }, "데이터 불러오기");
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.employees && importedData.monthlyData) {
                            setEmployees(importedData.employees);
                            setMonthlyData(importedData.monthlyData);
                            if (importedData.predictData) setPredictData(importedData.predictData);
                            if (importedData.nextEmpId) setNextEmpId(importedData.nextEmpId);
                            if (importedData.appPin) setAppPin(importedData.appPin);
                            if (importedData.globalMinWage !== undefined) setGlobalMinWage(importedData.globalMinWage);
                            showAlert("백업 데이터를 성공적으로 불러왔습니다.", "성공", "success");
                        } else {
                            showAlert("유효하지 않은 백업 파일 형식입니다.", "오류", "error");
                        }
                    } catch (error) {
                        showAlert("파일을 읽는 중 오류가 발생했습니다.", "오류", "error");
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            // === 렌더 분기 ===

            // 로딩 중
            if (fbLoading || (firebaseUser && !userRole)) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-500 text-sm font-medium">
                                {(firebaseUser && !userRole) ? '사용자 정보를 확인 중...' : '데이터를 동기화하고 있습니다...'}
                            </p>
                        </div>
                    </div>
                );
            }

            // 로그인 안 된 상태 → 랜딩 화면
            if (!firebaseUser) {
                return <LandingScreen onBossLogin={handleGoogleLogin} modalConfig={modalConfig} />;
            }

            // ── 직원 플로우 ──
            if (userRole === 'employee') {
                if (!empAccount || empAccount.status === 'pending') {
                    return <PendingApprovalScreen empAccount={empAccount} onLogout={handleLogout} />;
                }
                if (empAccount.status === 'rejected') {
                    return (
                        <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                            <CustomModal config={modalConfig} />
                            <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                                <AlertCircle className="w-16 h-16 text-red-500 mx-auto mb-4" />
                                <h2 className="text-xl font-bold text-gray-800 mb-2">가입이 거절되었습니다</h2>
                                <p className="text-gray-500 text-sm mb-6">관리자께 문의해 주세요.</p>
                                <button onClick={handleLogout} className="w-full bg-gray-600 text-white py-3 rounded-xl font-bold">로그아웃</button>
                            </div>
                        </div>
                    );
                }
                if (!isEmpAuthenticated) {
                    return (
                        <>
                            <CustomModal config={modalConfig} />
                            <LoginScreen appPin={empPin} onLogin={() => setIsEmpAuthenticated(true)} empName={empAccount?.name} />
                        </>
                    );
                }
                return (
                    <EmployeeApp
                        empAccount={empAccount}
                        firebaseUser={firebaseUser}
                        mySubmissions={mySubmissions}
                        notifications={empNotifications}
                        onLogout={handleLogout}
                        onLock={() => setIsEmpAuthenticated(false)}
                        showAlert={showAlert}
                        showConfirm={showConfirm}
                        modalConfig={modalConfig}
                    />
                );
            }

            // ── 관리자 플로우 ──
            if (!isAuthenticated) {
                return (
                    <>
                        <CustomModal config={modalConfig} />
                        <LoginScreen appPin={appPin} onLogin={() => setIsAuthenticated(true)} />
                    </>
                );
            }

            const getEmployeeStats = (empId) => {
                let totalDays = 0, totalHours = 0, totalPay = 0;
                Object.values(monthlyData).forEach(monthData => {
                    Object.values(monthData.days || {}).forEach(dayData => {
                        const entry = dayData.entries?.[empId];
                        if (entry && entry.hours > 0) { totalDays++; totalHours += entry.hours; totalPay += entry.pay; }
                    });
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                let totalHolidayPay = 0;
                Object.values(holidayBySunday).forEach(weekData => {
                    weekData.forEach(item => {
                        if (item.empId === empId.toString()) totalHolidayPay += item.holidayPay;
                    });
                });

                return { totalDays, totalHours, totalPay, totalHolidayPay };

        function LoginScreen({ appPin, onLogin, empName }) {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);

            const handleNumClick = (num) => {
                if (input.length < 6) {
                    const newInput = input + num;
                    setInput(newInput);
                    setError(false);
                    if (newInput.length === 6 && newInput === appPin) {
                        setTimeout(onLogin, 100);
                    } else if (newInput.length === 6) {
                        setError(true);
                        setTimeout(() => setInput(''), 500);
                    }
                }
            };

            const handleDelete = () => setInput(prev => prev.slice(0, -1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (/[0-9]/.test(e.key)) handleNumClick(e.key);
                    if (e.key === 'Backspace') handleDelete();
                    if (e.key === 'Enter' && input === appPin) onLogin();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [input, appPin]);

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                        <div className="bg-yellow-100 w-16 h-16 rounded-full flex items-center justify-center mx-auto mb-4">
                            <Lock className="w-8 h-8 text-yellow-600" />
                        </div>
                        <h2 className="text-2xl font-bold text-gray-800 mb-1">{empName ? `${empName}님` : '알바트래커 v1.0'}</h2>
                        <p className="text-gray-500 mb-6 text-sm">
                            {empName ? 'PIN을 입력해주세요.' : (appPin === INITIAL_PIN ? '초기 비밀번호는 "000000"입니다.' : '비밀번호를 입력해주세요.')}
                        </p>

                        <div className="flex justify-center gap-3 mb-8">
                            {[...Array(6)].map((_, i) => (
                                <div 
                                    key={i} 
                                    className={`w-4 h-4 rounded-full transition-all ${
                                        i < input.length ? 'bg-green-600 scale-110' : 'bg-gray-200'
                                    } ${error ? 'bg-red-500' : ''}`}
                                />
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-3">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button
                                    key={num}
                                    onClick={() => handleNumClick(num.toString())}
                                    className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                                >
                                    {num}
                                </button>
                            ))}
                            <div className="h-14"></div>
                            <button
                                onClick={() => handleNumClick('0')}
                                className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                            >
                                0
                            </button>
                            <button
                                onClick={handleDelete}
                                className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-lg font-medium text-gray-700 flex items-center justify-center transition active:scale-95"
                            >
                                <X className="w-6 h-6" />
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function EmployeeEntryScreen({ onBack }) {
            const [step, setStep] = useState('code'); // code → info → pinSetup → pinConfirm → profile → (create)
            const [code, setCode] = useState('');
            const [inviteInfo, setInviteInfo] = useState(null);
            const [name, setName] = useState('');
            const [pin, setPin] = useState('');
            const [confirmPin, setConfirmPin] = useState('');
            const [isNew, setIsNew] = useState(false);
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [profile, setProfile] = useState({ residentId: '', bank: '', account: '' });

            const handleCodeNext = async () => {
                if (code.trim().length !== 6) { setError('초대코드 6자리를 입력해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    const doc = await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase()).get();
                    if (!doc.exists) { setError('유효하지 않은 초대코드입니다.'); setLoading(false); return; }
                    setInviteInfo(doc.data());
                    setStep('info');
                } catch(e) { setError('오류: ' + e.message); }
                setLoading(false);
            };

            const handleNameNext = async () => {
                if (!name.trim()) { setError('이름을 입력해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    const nameKey = name.trim().toLowerCase().replace(/\s+/g, '_');
                    const lookupDoc = await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase())
                        .collection('employees').doc(nameKey).get();
                    setIsNew(!lookupDoc.exists);
                    setStep(lookupDoc.exists ? 'pinLogin' : 'pinSetup');
                } catch(e) { setError('오류: ' + e.message); }
                setLoading(false);
            };

            const handleLogin = async () => {
                if (pin.length !== 6) { setError('PIN 6자리를 입력해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    const nameKey = name.trim().toLowerCase().replace(/\s+/g, '_');
                    const lookupDoc = await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase())
                        .collection('employees').doc(nameKey).get();
                    if (!lookupDoc.exists) { setError('등록된 직원 정보를 찾을 수 없습니다.'); setLoading(false); return; }
                    await fbAuth.signInWithEmailAndPassword(lookupDoc.data().email, pin);
                    // onAuthStateChanged가 자동으로 처리
                } catch(e) {
                    setError(e.code === 'auth/wrong-password' || e.code === 'auth/invalid-credential' ? 'PIN이 틀렸습니다.' : '로그인 실패: ' + e.message);
                }
                setLoading(false);
            };

            const handleFinalSignup = async () => {
                setLoading(true); setError('');
                try {
                    const email = `emp${Date.now().toString(36)}@emp.albatracker.page`;
                    await fbAuth.createUserWithEmailAndPassword(email, pin);
                    const uid = fbAuth.currentUser.uid;
                    const nameKey = name.trim().toLowerCase().replace(/\s+/g, '_');
                    await fbDb.collection('employeeAccounts').doc(uid).set({
                        name: name.trim(), bossUid: inviteInfo.bossUid,
                        status: 'pending', pin, email,
                        inviteCode: code.trim().toUpperCase(),
                        residentId: profile.residentId || '',
                        bank: profile.bank || '',
                        account: profile.account || '',
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase())
                        .collection('employees').doc(nameKey).set({ email, uid });
                } catch(e) {
                    if (e.code === 'auth/email-already-in-use') {
                        setError('이미 가입된 계정입니다. 로그인해 주세요.');
                        setStep('pinLogin');
                    } else {
                        setError('가입 실패: ' + e.message);
                    }
                }
                setLoading(false);
            };

            const formatResidentId = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 13);
                return digits.length > 6 ? `${digits.slice(0,6)}-${digits.slice(6)}` : digits;
            };

            const PinDots = ({ value }) => (
                <div className="flex justify-center gap-3 my-6">
                    {[...Array(6)].map((_, i) => (
                        <div key={i} className={`w-4 h-4 rounded-full transition-all ${i < value.length ? 'bg-blue-600 scale-110' : 'bg-gray-200'}`} />
                    ))}
                </div>
            );

            const NumPad = ({ onNum, onDel }) => (
                <div className="grid grid-cols-3 gap-3">
                    {[1,2,3,4,5,6,7,8,9].map(n => (
                        <button key={n} onClick={() => onNum(n.toString())} className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95">{n}</button>
                    ))}
                    <div/>
                    <button onClick={() => onNum('0')} className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95">0</button>
                    <button onClick={onDel} className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl flex items-center justify-center transition active:scale-95"><X className="w-6 h-6 text-gray-700"/></button>
                </div>
            );

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm">
                        <button onClick={onBack} className="flex items-center gap-1 text-sm text-gray-500 hover:text-gray-700 mb-6">
                            <ChevronLeft className="w-4 h-4" /> 뒤로
                        </button>

            const [copying, setCopying] = useState(false);

            const inviteCode = workspaceInfo?.inviteCode || '';
            const appUrl = window.location.href.split('?')[0];

            const copyCode = async () => {
                try {
                    await navigator.clipboard.writeText(inviteCode);
                    setCopying(true);
                    setTimeout(() => setCopying(false), 2000);
                } catch { showAlert('복사에 실패했습니다.', '오류', 'error'); }
            };

            const copyLink = async () => {
                try {
                    await navigator.clipboard.writeText(appUrl);
                    showAlert('링크가 복사되었습니다.\n직원에게 공유해주세요.', '복사 완료', 'success');

            };

            const handleRegenerate = () => {
                showConfirm('초대코드를 새로 발급하면\n기존 코드는 더 이상 사용할 수 없습니다.\n계속하시겠습니까?', async () => {
                    setRegenerating(true);
                    try {
                        const newCode = await regenerateInviteCode(firebaseUser.uid, inviteCode, workspaceInfo?.shopName);
                        setWorkspaceInfo(prev => ({ ...prev, inviteCode: newCode }));
                        showAlert(`새 초대코드: ${newCode}`, '코드 재발급 완료', 'success');
                    } catch(e) {
                        showAlert('재발급 실패: ' + e.message, '오류', 'error');

                                <svg className="w-4 h-4" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/></svg>
                                앱 링크 복사

        function EmpSubmitModal({ date, empAccount, firebaseUser, onClose, showAlert, timeUnit }) {
            const [hoursInt, setHoursInt] = useState('');  // 시간 (정수)
            const [halfOn, setHalfOn] = useState(false);   // half 모드: 30분 토글
            const [minSlide, setMinSlide] = useState(0);   // ten 모드: 0,10,20,30,40,50
            const [minsInt, setMinsInt] = useState('');    // minute 모드: 분 직접 입력
            const [note, setNote] = useState('');
            const [loading, setLoading] = useState(false);

            // 최종 시간값(소수) 계산
            const computeHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return null;
                if (timeUnit === 'hour') return h;
                if (timeUnit === 'half') return h + (halfOn ? 0.5 : 0);
                if (timeUnit === 'ten') return parseFloat((h + minSlide / 60).toFixed(4));
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return null;
                    return parseFloat((h + m / 60).toFixed(4));
                }
                return h;
            };

            const displayHours = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h)) return '-';
                if (timeUnit === 'hour') return `${h}시간`;
                if (timeUnit === 'half') return halfOn ? `${h}시간 30분` : `${h}시간`;
                if (timeUnit === 'ten') return minSlide > 0 ? `${h}시간 ${minSlide}분` : `${h}시간`;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    return (!isNaN(m) && m > 0) ? `${h}시간 ${m}분` : `${h}시간`;
                }
                return `${h}시간`;
            };

            const isValid = () => {
                const h = parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return false;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return false;
                }
                return h > 0 || (timeUnit !== 'hour' && (halfOn || minSlide > 0 || parseInt(minsInt,10) > 0));
            };

            const handleSubmit = async () => {
                const finalHours = computeHours();
                if (finalHours === null || finalHours <= 0) {
                    showAlert('올바른 근무시간을 입력해주세요.', '입력 오류', 'error'); return;
                }
                setLoading(true);
                try {
                    await submitWorkHours(empAccount.bossUid, {
                        empUid: firebaseUser.uid,
                        employeeId: empAccount.employeeId,
                        empName: empAccount.name,
                        date,
                        hours: finalHours,
                        note: note.trim()
                    });
                    showAlert(`${date} 근무시간(${displayHours()})이 제출되었습니다.`, '제출 완료', 'success');
                    onClose();
                } catch(e) {
                    showAlert('제출 실패: ' + e.message, '오류', 'error');
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-4 z-[9999]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-bold text-gray-800">근무시간 입력</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-4">{date}</p>

                        <div className="mb-4">
                            <label className="block text-sm font-bold text-gray-700 mb-2">근무시간</label>

                            {/* 시간 입력 (공통) */}
                            <div className="flex items-center gap-2 mb-3">
                                <input type="number" min="0" max="24" value={hoursInt} onChange={e => setHoursInt(e.target.value.replace(/[^0-9]/g,''))}
                                    className="w-24 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                    placeholder="0" autoFocus />
                                <span className="text-xl font-bold text-gray-600">시간</span>

                                {/* half 모드: 30분 토글 버튼 */}
                                {timeUnit === 'half' && (
                                    <button
                                        onClick={() => setHalfOn(p => !p)}
                                        className={`ml-2 px-4 py-3 rounded-xl font-bold text-sm border-2 transition ${halfOn ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                                    >30분</button>
                                )}

                                {/* minute 모드: 분 직접 입력 */}
                                {timeUnit === 'minute' && (
                                    <>
                                        <input type="number" min="0" max="59" value={minsInt} onChange={e => setMinsInt(e.target.value.replace(/[^0-9]/g,''))}
                                            className="w-20 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                            placeholder="0" />
                                        <span className="text-xl font-bold text-gray-600">분</span>
                                    </>
                                )}
                            </div>

                            {/* ten 모드: 슬라이드 선택 (0,10,20,30,40,50분) */}
                            {timeUnit === 'ten' && (
                                <div>
                                    <div className="flex gap-2 flex-wrap">
                                        {[0,10,20,30,40,50].map(m => (
                                            <button key={m} onClick={() => setMinSlide(m)}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 transition ${minSlide === m ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'}`}>
                                                {m === 0 ? '정각' : `+${m}분`}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* 미리보기 */}
                            {hoursInt !== '' && (
                                <div className="mt-3 text-center text-blue-600 font-bold text-lg">{displayHours()}</div>
                            )}
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-700 mb-1">메모 (선택)</label>
                            <input type="text" value={note} onChange={e => setNote(e.target.value)}
                                className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-blue-500 outline-none text-sm"
                                placeholder="특이사항 입력 (관리자에게 공유됩니다)" />
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 mb-4">
                            <p className="text-xs text-yellow-700 font-medium">⚠️ 제출 후에는 수정할 수 없습니다. 신중하게 입력해주세요.</p>
                        </div>
                        <button onClick={handleSubmit} disabled={loading || !isValid()}
                            className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">
                            {loading ? '제출 중...' : '제출하기'}
                        </button>
                    </div>
                </div>
            );
        }

        function TabEmployees({ employees, setEmployees, nextEmpId, setNextEmpId, getEmployeeStats, globalMinWage, setGlobalMinWage, showAlert, showConfirm }) {
            const [searchTerm, setSearchTerm] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);

            const filteredEmployees = useMemo(() => {

            const handleAddClick = () => {
                if (globalMinWage === '' || Number(globalMinWage) <= 0) {
                    showAlert('현재 최저시급을 먼저 입력해주세요.\n최저시급이 설정되어야 근무자를 추가할 수 있습니다.', '안내');

                setEditingEmp(null);
                setIsModalOpen(true);
            };

            const handleSave = (empData) => {
                const { displayId, ...dataToSave } = empData;

                if (editingEmp) {
                    const oldStatus = editingEmp.status || (editingEmp.isWorking === false ? 'resigned' : 'working');
                    const newStatus = dataToSave.status;
                    setEmployees(prev => prev.map(e => e.id === dataToSave.id ? dataToSave : e));

                    if (oldStatus === 'working' && newStatus === 'leave') {
                        showAlert(`${dataToSave.name}님이 휴직 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                    } else if (oldStatus !== 'resigned' && newStatus === 'resigned') {
                        showAlert(`${dataToSave.name}님이 퇴사 처리되었습니다.\n이제 월별 근무시간 입력에서 제외됩니다.`, '변경 완료', 'alert');
                    } else if ((oldStatus === 'leave' || oldStatus === 'resigned') && newStatus === 'working') {
                        showAlert(`${dataToSave.name}님이 근무 중 상태로 변경되었습니다.\n월별 근무시간 입력에 포함됩니다.`, '변경 완료', 'success');
                    }
                } else {
                    setEmployees(prev => [...prev, dataToSave]);
                    setNextEmpId(prev => prev + 1);
                }
                setIsModalOpen(false);
                setEditingEmp(null);
            };

            const handleDelete = (id) => {
                showConfirm('정말 이 근무자를 삭제하시겠습니까?\n(기존 근무 기록은 월별 현황에 유지됩니다)', () => {
                    setEmployees(prev => prev.filter(e => e.id !== id));
                }, '근무자 삭제');
            };

            return (
                <div className="space-y-6">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center gap-4">
                        <div className="flex flex-col sm:flex-row gap-3 w-full sm:w-auto">
                            <div className="relative w-full sm:w-72">
                                <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
                                    <Search className="h-5 w-5 text-gray-400" />
                                </div>
                                <input
                                    type="text"
                                    className="block w-full pl-10 pr-3 py-2 border border-gray-300 rounded-lg focus:ring-green-500 focus:border-green-500 text-sm"
                                    placeholder="이름으로 검색"
                                    value={searchTerm}
                                    onChange={(e) => setSearchTerm(e.target.value)}
                                />
                            </div>
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-lg px-3 py-2 w-full sm:w-auto shadow-sm">
                                <label className="text-sm font-medium text-gray-700 whitespace-nowrap">현재 최저시급:</label>
                                <input
                                    type="number"
