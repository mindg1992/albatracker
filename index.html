        // ВєїВѕўВаљ ВІюЖ░ё Рєњ "XВІюЖ░ё YвХё" ьўЋВІЮ (Вўѕ: 3.5 Рєњ "3ВІюЖ░ё 30вХё")

            if (!hours || hours <= 0) return '';
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (h > 0 && m > 0) return `${h}ВІюЖ░ё ${m}вХё`;

        // --- ЖИЅВЌг Ж│хВаю ВаЋв│┤ ВюаьІИвдгьІ░ ---
        function getInsuranceInfo(workspaceInfo, employee) {
            const mode = workspaceInfo?.insuranceMode || 'none';
            if (mode === 'none') return { mode, rate: 0, name: '' };
            if (mode === 'individual') {
                const rate = parseFloat(employee?.insuranceRate) || 0;
                const name = employee?.insuranceName || 'Ж│хВаю';
                return { mode, rate, name };
            }
            const rate = parseFloat(workspaceInfo?.insuranceRate) || 0;
            const name = workspaceInfo?.insuranceName || '';
            return { mode, rate, name };
        }

        // --- ВБ╝ью┤ВѕўвІ╣ Ж│ёВѓ░ ВюаьІИвдгьІ░ ---
        function calcHolidayPayBySunday(monthlyData, employees) {
            const toLocalStr = (date) => {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const d = date.getDate().toString().padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const allDateEntries = {};
            Object.entries(monthlyData).forEach(([mk, monthData]) => {
                const [y, m] = mk.split('-').map(Number);
                Object.entries(monthData.days || {}).forEach(([day, dayData]) => {
                    const dateStr = toLocalStr(new Date(y, m - 1, parseInt(day)));
                    const empData = {};
                    Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                        if (entry.hours > 0) empData[empId] = { hours: entry.hours, wage: entry.wage, name: entry.name };
                    });
                    if (Object.keys(empData).length > 0) allDateEntries[dateStr] = empData;
                });
            });

            const weekSundays = new Set();
            Object.keys(allDateEntries).forEach(dateStr => {
                const [y, m, d] = dateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                const dow = date.getDay();
                const daysToSunday = dow === 0 ? 0 : 7 - dow;
                weekSundays.add(toLocalStr(new Date(y, m - 1, d + daysToSunday)));
            });

            const result = {};
            weekSundays.forEach(sundayStr => {
                const [sy, sm, sd] = sundayStr.split('-').map(Number);
                const empWeekly = {};
                for (let i = 0; i < 7; i++) {
                    const dk = toLocalStr(new Date(sy, sm - 1, sd - 6 + i));
                    Object.entries(allDateEntries[dk] || {}).forEach(([empId, data]) => {
                        if (!empWeekly[empId]) {
                            const currentEmp = employees.find(e => String(e.id) === String(empId));
                            empWeekly[empId] = { hours: 0, totalPay: 0, name: currentEmp?.name || data.name };
                        }
                        empWeekly[empId].hours += data.hours;
                        empWeekly[empId].totalPay += Math.round(data.hours * data.wage);
                    });
                }

                const weekResults = [];
                Object.entries(empWeekly).forEach(([empId, { hours, totalPay, name }]) => {
                    if (hours >= 15) {
                        weekResults.push({ empId, name, weeklyHours: hours, weeklyPay: totalPay, holidayPay: Math.round(totalPay / 5) });
                    }
                });
                if (weekResults.length > 0) result[sundayStr] = weekResults;
            });
            return result;
        }

        // --- Ж│хьєх ВЌ░/ВЏћ ВДЂВаЉВъЁваЦ В╗┤ьЈгвёїьіИ ---
        function MonthYearSelector({ year, month, onChange }) {
            const [y, setY] = useState(year);
            const [m, setM] = useState(month);

            useEffect(() => {
                setY(year);
                setM(month);
            }, [year, month]);

            const handleApply = () => {
                let newY = parseInt(y);
                let newM = parseInt(m);
                if (isNaN(newY) || newY < 1900) newY = new Date().getFullYear();
                if (isNaN(newM) || newM < 1) newM = 1;
                if (newM > 12) newM = 12;
                setY(newY);
                setM(newM);
                onChange(newY, newM);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') handleApply(); };

            return (
                <div className="flex items-center gap-1 justify-center">
                    <input type="number" value={y} onChange={e => setY(e.target.value)} onKeyDown={handleKeyDown} className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-16 md:w-20 text-center outline-none transition-colors" />
                    <span className="text-lg md:text-xl font-bold text-gray-800">вЁё</span>
                    <input type="number" value={m} onChange={e => setM(e.target.value)} onKeyDown={handleKeyDown} className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-10 md:w-12 text-center outline-none transition-colors" />
                    <span className="text-lg md:text-xl font-bold text-gray-800">ВЏћ</span>
                    <button onClick={handleApply} className="ml-1 md:ml-2 text-xs bg-gray-200 text-gray-700 hover:bg-gray-300 px-3 py-1.5 rounded-md font-bold transition shadow-sm whitespace-nowrap">ВЮ┤вЈЎ</button>
                </div>
            );
        }

        // Firestore REST APIвАю ВађВъЦ (SDK ВіцьіИвдгв░Ї ВЌ░Ж▓░ вгИВаю Вџ░ьџї)
        async function fsSet(docRef, data) {
            const uid = docRef.id;
            const token = await fbAuth.currentUser.getIdToken();
            const toFV = (v) => {
                if (v === null || v === undefined) return { nullValue: null };
                if (typeof v === 'boolean') return { booleanValue: v };
                if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
                if (typeof v === 'string') return { stringValue: v };
                if (Array.isArray(v)) return { arrayValue: { values: v.map(toFV) } };
                if (typeof v === 'object') {
                    const fields = {};
                    Object.entries(v).forEach(([k, val]) => { fields[k] = toFV(val); });
                    return { mapValue: { fields } };
                }
                return { stringValue: String(v) };
            };
            const fields = {};
            Object.entries(data).forEach(([k, v]) => { fields[k] = toFV(v); });
            const resp = await fetch(
                `https://firestore.googleapis.com/v1/projects/albatracker-9e90e/databases/(default)/documents/users/${uid}`,
                {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })
                }
            );
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${resp.status}`);
            }
        }

        function generateInviteCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        const PASTEL_COLORS = [
            '#fecaca', '#fed7aa', '#fef08a', '#bbf7d0', '#99f6e4',

        // РћђРћђРћђ ВіцВ╝ђВЦ┤ Рєњ ВЏћв│ё per-day ВЌћьіИвдг в│ђьЎў (ЖИЅВЌг Ж│ёВѓ░ВџЕ) РћђРћђРћђ
        function schedulesToMonthlyData(schedules, year, month, employees, globalMinWage) {
            const monthKey = `${year}-${month.toString().padStart(2,'0')}`;
            const days = {};
            (schedules || []).forEach(s => {
                const hours = ((s.endHour * 60 + (s.endMinute || 0)) - (s.startHour * 60 + (s.startMinute || 0))) / 60;
                if (hours <= 0) return;
                const [sy, sm, sd] = s.startDate.split('-').map(Number);
                const [ey, em, ed] = s.endDate.split('-').map(Number);
                const start = new Date(sy, sm - 1, sd);
                const end = new Date(ey, em - 1, ed);
                const emp = employees.find(e => String(e.id) === String(s.empId));
                const wage = Number(s.wage) > 0 ? Number(s.wage)
                    : Number(emp?.wage) > 0 ? Number(emp.wage)
                    : (Number(globalMinWage) || MIN_WAGE);
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    if (d.getFullYear() !== year || d.getMonth() + 1 !== month) continue;
                    const day = d.getDate();
                    if (!days[day]) days[day] = { entries: {}, revenue: 0 };
                    const key = String(s.empId);
                    if (!days[day].entries[key]) days[day].entries[key] = { hours: 0, pay: 0, name: s.empName || emp?.name || '', wage };
                    days[day].entries[key].hours += hours;
                    days[day].entries[key].pay += Math.round(hours * wage);
                }
            });
            return { [monthKey]: { days } };
        }

        // ВаёВ▓┤ ВіцВ╝ђВЦ┤ ЖИ░в░ў ВЏћв│ёвДх(ВБ╝ью┤ВѕўвІ╣ВџЕ) Рђћ ВЌгвЪг вІг В╗цв▓ё
        function schedulesToAllMonthlyData(schedules, employees, globalMinWage) {
            const out = {};
            (schedules || []).forEach(s => {
                const hours = ((s.endHour * 60 + (s.endMinute || 0)) - (s.startHour * 60 + (s.startMinute || 0))) / 60;
                if (hours <= 0) return;
                const [sy, sm, sd] = s.startDate.split('-').map(Number);
                const [ey, em, ed] = s.endDate.split('-').map(Number);
                const start = new Date(sy, sm - 1, sd);
                const end = new Date(ey, em - 1, ed);
                const emp = employees.find(e => String(e.id) === String(s.empId));
                const wage = Number(s.wage) > 0 ? Number(s.wage)
                    : Number(emp?.wage) > 0 ? Number(emp.wage)
                    : (Number(globalMinWage) || MIN_WAGE);
                for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                    const y = d.getFullYear();
                    const m = d.getMonth() + 1;
                    const day = d.getDate();
                    const mk = `${y}-${m.toString().padStart(2,'0')}`;
                    if (!out[mk]) out[mk] = { days: {} };
                    if (!out[mk].days[day]) out[mk].days[day] = { entries: {}, revenue: 0 };
                    const key = String(s.empId);
                    if (!out[mk].days[day].entries[key]) out[mk].days[day].entries[key] = { hours: 0, pay: 0, name: s.empName || emp?.name || '', wage };
                    out[mk].days[day].entries[key].hours += hours;
                    out[mk].days[day].entries[key].pay += Math.round(hours * wage);
                }
            });
            return out;
        }

            return fbDb.runTransaction(async t => {
                const doc = await t.get(ref);
                const notices = (doc.data()?.notices || []).map(n =>
                    n.id === noticeId ? { ...n, title, content, updatedAt: now } : n
                );
                t.update(ref, { notices });
            });

        // Ж┤ђвдгВъљ: ВДЂВЏљ Жи╝вАюЖ│ёВЋйВёю ВѓГВаю Рєњ needs_resign ВЃЂьЃю
        // ВЃЂьўИ вЈЎВЮў ВѓГВаю: ьЋюВфйВЮ┤ ве╝Вађ вѕёвЦ┤вЕ┤ contractDeleteRequest ВёцВаЋ, ВќЉВфй вфевЉљ вѕёвЦ┤вЕ┤ Ж│ёВЋйВёю ВЎёВаё ВѓГВаю
        async function requestContractDelete(empUid, bossUid, requester) {
            const ref = fbDb.collection('employeeAccounts').doc(empUid).collection('workplaces').doc(bossUid);
            const doc = await ref.get();
            const existing = doc.data()?.contractDeleteRequest;
            const otherSide = requester === 'boss' ? 'employee' : 'boss';
            if (existing === otherSide) {
                // ВќЉВфй вЈЎВЮў Рєњ Ж│ёВЋйВёю ВѓГВаю + needs_resign ВЃЂьЃювАю ВаёьЎў
                await ref.update({
                    contractStatus: 'needs_resign',
                    contract: firebase.firestore.FieldValue.delete(),
                    contractDeleteRequest: firebase.firestore.FieldValue.delete()
                });
                // Жи╝вг┤ВъљЖ░ђ вЈЎВЮў ВЎёвБїьЋю Ж▓йВџ░(bossЖ░ђ ве╝Вађ ВџћВ▓Г) Рєњ Ж┤ђвдгВъљВЌљЖ▓ї ВЋївд╝
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_completed', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    try { await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).delete(); } catch(e) {}
                }
                return 'deleted';
            } else {
                await ref.update({ contractDeleteRequest: requester });
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_request', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                return 'requested';
            }
        }

        async function resubmitEmpJoinContract(empUid, bossUid, contractData, profileData) {
            const batch = fbDb.batch();
            const wpUpdate = { contractRejected: firebase.firestore.FieldValue.delete() };
            if (profileData) Object.assign(wpUpdate, profileData);
            batch.update(
                fbDb.collection('employeeAccounts').doc(empUid).collection('workplaces').doc(bossUid),
                wpUpdate
            );
            const pendingUpdate = {
                contract: contractData,
                hasContract: true,
                contractRejected: firebase.firestore.FieldValue.delete()
            };
            if (profileData) Object.assign(pendingUpdate, profileData);
            batch.update(fbDb.collection('empPending').doc(`${empUid}_${bossUid}`), pendingUpdate);
            await batch.commit();

        // --- ВЌЁВ▓┤ ВѓГВаю вѓеВЮђ ВІюЖ░ё ьЈгвДи ---
        function formatDeleteRemaining(deleteScheduledAt) {
            if (!deleteScheduledAt) return '';
            const ms = deleteScheduledAt.toMillis ? deleteScheduledAt.toMillis() : new Date(deleteScheduledAt).getTime();
            const remaining = ms + 24 * 60 * 60 * 1000 - Date.now();
            if (remaining <= 0) return 'Ж│Д ВѓГВаювље';
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            return h > 0 ? `${h}ВІюЖ░ё ${m}вХё` : `${m}вХё`;
        }

        // --- Жи╝вг┤ ВЎёвБї ВЋївд╝ в░░вёѕ (Ж┤ђвдгВъљЖ░ђ ВЋ▒ВЮё в│┤Ж│а ВъѕВЮё вЋївДї 3В┤ѕ В╣┤Вџ┤ьіИ) ---
        function WorkSubmitBannerBar({ banner, onDismiss }) {
            useEffect(() => {
                let timer = null;
                let remaining = 10000;
                let startedAt = null;
                const startTimer = () => {
                    startedAt = Date.now();
                    timer = setTimeout(onDismiss, remaining);
                };
                const pauseTimer = () => {
                    if (timer) {
                        clearTimeout(timer);
                        timer = null;
                        if (startedAt) remaining -= (Date.now() - startedAt);
                        if (remaining <= 0) { onDismiss(); return; }
                    }
                };
                const handleVisibility = () => {
                    if (document.visibilityState === 'visible') startTimer();
                    else pauseTimer();
                };
                if (document.visibilityState === 'visible') startTimer();
                document.addEventListener('visibilitychange', handleVisibility);
                return () => {
                    if (timer) clearTimeout(timer);
                    document.removeEventListener('visibilitychange', handleVisibility);
                };
            }, [banner]);
            const [y, m, d] = banner.date.split('-').map(Number);
            const h = Math.floor(banner.hours);
            const min = Math.round((banner.hours % 1) * 60);
            const timeStr = min > 0 ? `${h}ВІюЖ░ё ${min}вХё` : `${h}ВІюЖ░ё`;
            return (
                <div className="bg-green-50 border-b border-green-200 px-4 py-3 flex items-center justify-between gap-3">
                    <div className="flex items-center gap-2 min-w-0">
                        <span className="text-green-500 text-base flex-shrink-0">РюЁ</span>
                        <div className="min-w-0">
                            <p className="text-green-800 font-bold text-sm">Жи╝вг┤ ВЎёвБї ВЋївд╝</p>
                            <p className="text-green-700 text-xs truncate">{banner.empName}вІўВЮ┤ {y}вЁё {m}ВЏћ {d}ВЮ╝ {timeStr} Жи╝вг┤вЦ╝ ВЎёвБїьќѕВіхвІѕвІц.</p>
                        </div>
                    </div>
                    <button onClick={onDismiss} className="flex-shrink-0 text-green-600 hover:text-green-800 p-1"><X className="w-4 h-4" /></button>
                </div>
            );
        }

        // вгИВёюваѕв▓е scheduleMemos + ВёювИїВ╗гваЅВЁў scheduleMemos в│ЉьЋЕ (ВцЉв│х id ВаюЖ▒░)
        function mergeScheduleMemoMaps(docMemos, subMemos) {
            const merged = {};
            Object.entries(docMemos || {}).forEach(([date, list]) => {
                merged[date] = [...(list || [])];
            });
            Object.entries(subMemos || {}).forEach(([date, list]) => {
                const seen = new Set((merged[date] || []).map(m => m.id));
                merged[date] = [...(merged[date] || []), ...(list || []).filter(m => !seen.has(m.id))];
            });
            return merged;
        }

                const rafId = requestAnimationFrame(updateNavScroll);

                                monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                                predictData:   d.predictData   !== undefined ? d.predictData   : {},
                                globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                            });
                            if (serverStr !== lastSyncedDataRef.current) {
                                applyData(d);
                                localStorage.setItem(cacheKey, JSON.stringify(d));
                            }
                            // ВѓГВаю вїђЖИ░ ьЋГвфЕВЮ┤ ВъѕВю╝вЕ┤: lastSyncedDataRef В┤ѕЖИ░ьЎћ + monthlyData ВЃѕ В░ИВА░вАю Ж░ЋВаю ВЌЁвЇ░ВЮ┤ьіИ
                            // Рєњ applyData ьўИВХю ВЌгвХђВЎђ вг┤Ж┤ђьЋўЖ▓ї auto-save useEffectЖ░ђ в░ўвЊюВІю ВъгВІцьќЅвље
                            if (hasPendingDeletes) {
                                const filteredMonthly = d.monthlyData !== undefined ? d.monthlyData : {};
                                lastSyncedDataRef.current = '';
                                setMonthlyData({ ...filteredMonthly });
                            }
                        } else if (!cached) {
                            lastSyncedDataRef.current = JSON.stringify({
                                appPin: INITIAL_PIN, employees: [], nextEmpId: 1,
                                monthlyData: {}, predictData: {}, globalMinWage: ''
                            });
                        }
                    }).catch(e => {
                        if (cancelled) return;
                        // offline/unavailable ВЌљвЪгвЕ┤ 5В┤ѕ ьЏё ВъљвЈЎ ВъгВІювЈё (ьїЮВЌЁ ВЌєВЮї)
                        if (e.code === 'unavailable' || e.message.includes('offline')) {
                            setTimeout(() => { if (!cancelled) syncFromServer(); }, 5000);
                        } else if (!cached) {
                            // В║љВІювЈё ВЌєЖ│а ВЋї Вѕў ВЌєвіћ ВЌљвЪгВЮ╝ вЋївДї ВЋївд╝
                            showAlert('вЇ░ВЮ┤ьё░вЦ╝ вХѕвЪгВўцВДђ вф╗ьќѕВіхвІѕвІц.\nвёцьіИВЏїьЂгвЦ╝ ьЎЋВЮИьЋўЖ│а ВЃѕвАюЖ│аВ╣еьЋ┤ ВБ╝ВёИВџћ.', 'ВЌ░Ж▓░ ВўцвЦў', 'error');
                        }
                    }).finally(() => {
                        clearTimeout(loadingTimeout);
                        if (!cancelled) setFbLoading(false);
                    });
                };
                syncFromServer();

                return () => { cancelled = true; };
            }, [firebaseUser, userRole, currentWorkspaceId]);

            const saveTimerRef = useRef(null);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [saveError, setSaveError] = useState(false);
            const saveSuccessTimerRef = useRef(null);

            useEffect(() => {
                if (!firebaseUser || fbLoading || userRole !== 'boss' || !currentWorkspaceId) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                const currentDataStr = JSON.stringify(currentData);

                // РЉа localStorage ВдЅВІю ВађВъЦ Рђћ ВЋ▒ВЮё в░ћвАю вІФВЋёвЈё ВЮ┤ ЖИ░ЖИ░ВЌљВёа вЇ░ВЮ┤ьё░ в│┤ВА┤
                localStorage.setItem('at_cache_' + currentWorkspaceId, JSON.stringify(currentData));

                // РЉА Firestore вЈЎЖИ░ьЎћ Рђћ ВЮ┤в»И Вёюв▓ёВЎђ вЈЎВЮ╝ьЋўвЕ┤ Ж▒┤вёѕвюђ
                if (currentDataStr === lastSyncedDataRef.current) return;

                // РЉб 2В┤ѕ вћћв░ћВџ┤Віц ьЏё FirestoreВЌљ в░▒ЖиИвЮ╝Вџ┤вЊю ВађВъЦ (ЖхгЖИђ Ж│ёВаЋ вЈЎЖИ░ьЎћ)
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                saveTimerRef.current = setTimeout(() => {
                    setIsSyncing(true);
                    fsSet(fbDb.collection('users').doc(currentWorkspaceId), currentData)
                        .then(() => {
                            lastSyncedDataRef.current = currentDataStr;
                            try { localStorage.removeItem('at_pdel_' + currentWorkspaceId); } catch(_) {}
                            setIsSyncing(false);
                            setSaveSuccess(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        })
                        .catch(e => {
                            console.error('Firestore ВъљвЈЎ ВађВъЦ ВІцьїе:', e);
                            setIsSyncing(false);
                            setSaveError(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveError(false), 4000);
                        });
                }, 2000);
                return () => clearTimeout(saveTimerRef.current);
            }, [appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage, firebaseUser, fbLoading, userRole, currentWorkspaceId]);

            // ВађВъЦ в▓ёьі╝ Рђћ localStorage ВдЅВІю ВађВъЦ ьЏё Firestore вЈЎЖИ░ьЎћ
            const handleManualSave = () => {
                if (!firebaseUser) {
                    showAlert('ьЂ┤вЮ╝Вџ░вЊюВЌљ ВЌ░Ж▓░вљўВќ┤ ВъѕВДђ ВЋіВіхвІѕвІц.\nGoogle вАюЖиИВЮИВЮё ВДёьќЅьЋ┤ВБ╝ВёИВџћ.', 'ВЋѕвѓ┤', 'alert');
                    return;
                }
                if (isSyncing) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);

                // localStorage ВдЅВІю ВађВъЦ (ВЮ┤ ЖИ░ЖИ░ вЇ░ВЮ┤ьё░ в│┤ьўИ)
                const wsId = currentWorkspaceId || firebaseUser.uid;
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));

                setIsSyncing(true);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => {
                        lastSyncedDataRef.current = JSON.stringify(currentData);
                        setIsSyncing(false);
                        setSaveSuccess(true);
                        clearTimeout(saveSuccessTimerRef.current);
                        saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        showAlert('ЖхгЖИђ Ж│ёВаЋВЌљ ВађВъЦвљўВЌѕВіхвІѕвІц.', 'ВађВъЦ ВЎёвБї', 'success');
                    })
                    .catch(e => {
                        console.error('Firestore ВађВъЦ ВІцьїе:', e);
                        setIsSyncing(false);
                        showAlert('ЖхгЖИђ Ж│ёВаЋ ВађВъЦВЌљ ВІцьїеьќѕВіхвІѕвІц.\n(' + e.message + ')\n\nВЮ┤ ЖИ░ЖИ░ВЌљвіћ ВађВъЦвљўВЌѕВіхвІѕвІц.', 'ьЂ┤вЮ╝Вџ░вЊю вЈЎЖИ░ьЎћ ВІцьїе', 'error');
                    });
            };

            // ьі╣ВаЋ ьЋёвЊю ВдЅВІю Firestore ВађВъЦ (вћћв░ћВџ┤Віц ВЌєВЮї) Рђћ В┤ѕЖИ░ьЎћ вЊ▒ ВдЅВІю в░ўВўЂ ьЋёВџћьЋю Ж▓йВџ░
            const handleImmediateSaveMonthly = (newMonthlyData) => {
                if (!firebaseUser || !currentWorkspaceId) return;
                const wsId = currentWorkspaceId;
                const currentData = { appPin, employees, nextEmpId, monthlyData: newMonthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));
                lastSyncedDataRef.current = JSON.stringify(currentData);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => { try { localStorage.removeItem('at_pdel_' + wsId); } catch(_) {} })
                    .catch(() => {});
            };

            // PWA ВіцьЃавЊюВќ╝вАа вфевЊю Ж░љВДђ Рђћ ВЮ┤ Ж▓йВџ░ signInWithPopupВЮђ opener Ж┤ђЖ│ёЖ░ђ вЂіЖ▓е вЈЎВъЉ вХѕЖ░ђ
            // (ьЎѕ ьЎћвЕ┤ВЌљ ВёцВ╣ўвљю ВЋ▒ВЌљВёю ВІцьќЅ ВцЉ)
            const isStandalonePWA = () => {
                try {
                    return window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;
                } catch(_) { return false; }
            };

            const checkInAppBrowser = () => {
                const ua = navigator.userAgent;
                const isInApp = /KAKAOTALK|Instagram|FBAN|FBAV|Line\/|Twitter|NAVER|DaumApps|Whale/i.test(ua)
                    || (/Android/i.test(ua) && /wv/.test(ua))
                    || (/iPhone|iPad/i.test(ua) && !/Safari/i.test(ua) && /AppleWebKit/i.test(ua));
                if (isInApp) {
                    const isKakao = /KAKAOTALK/i.test(ua);
                    showAlert(
                        isKakao
                            ? 'В╣┤В╣┤ВўцьєА вИївЮ╝Вџ░ВађВЌљВёювіћ Google вАюЖиИВЮИВЮ┤ В░евІевљЕвІѕвІц.\n\nВџ░ВИА ьЋўвІе РІ» вЕћвЅ┤ Рєњ "вІцвЦИ вИївЮ╝Вџ░ВађвАю ВЌ┤ЖИ░"вЦ╝ вѕївЪг Chrome вўљвіћ SafariВЌљВёю ВаЉВєЇьЋ┤ ВБ╝ВёИВџћ.'
                            : 'ьўёВъг ВЋ▒ вѓ┤ вИївЮ╝Вџ░ВађВЌљВёювіћ Google вАюЖиИВЮИВЮ┤ В░евІевљЕвІѕвІц.\n\nChrome вўљвіћ Safari вИївЮ╝Вџ░ВађвАю ВЌ┤Вќ┤Вёю вАюЖиИВЮИьЋ┤ ВБ╝ВёИВџћ.',
                        'вИївЮ╝Вџ░Вађ ВЋѕвѓ┤', 'alert'
                    );
                    return true;
                }
                return false;
            };

            // Google вАюЖиИВЮИ Ж│хьєх ьЌгьЇ╝: popup ве╝Вађ ВІювЈё Рєњ ВІцьїе ВІю redirect fallback
            // TWAВЌљВёювЈё popupВЮ┤ вЈЎВъЉьЋўвіћВДђ ьЁїВіцьіИьЋўЖИ░ ВюёьЋ┤ display-mode вХёЖИ░вЦ╝ ВаюЖ▒░ьЋе
            // (Ж│╝Ж▒░ВЌљвіћ standaloneВЮ┤вЕ┤ в░ћвАю redirect ВѓгВџЕ Рєњ TWAВЌљВёю ВіцьєавдгВДђ ьїїьІ░ВЁћвІЮ вгИВаювАю в│хВЏљ ВІцьїе)
            const POPUP_FALLBACK_CODES = new Set([
                'auth/popup-blocked',
                'auth/web-storage-unsupported',
                'auth/operation-not-supported-in-this-environment',
                'auth/internal-error'
            ]);
            const tryGoogleSignIn = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await fbAuth.signInWithPopup(provider);
                    return;
                } catch(e) {
                    const code = e?.code || '';
                    // ВѓгВџЕВъљЖ░ђ ВДЂВаЉ вІФВЮђ Ж▓йВџ░віћ fallback ВЋѕ ьЋе (ВІцВаю ВиеВєї)
                    if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
                        throw e;
                    }
                    // popupВЮё ВЌ┤ Вѕў ВЌєвіћ ьЎўЖ▓йВЮ┤вЕ┤ redirectвАю ьЈ┤в░▒
                    if (POPUP_FALLBACK_CODES.has(code) || !code) {
                        await fbAuth.signInWithRedirect(provider);
                        return; // ьјўВЮ┤ВДђ ВЮ┤вЈЎ
                    }
                    throw e;
                }
            };

            const handleGoogleLogin = async () => {
                if (checkInAppBrowser()) return;
                localStorage.setItem('albaLoginRole', 'boss');
                setFbLoading(true);
                try {
                    await tryGoogleSignIn();
                } catch(e) {
                    localStorage.removeItem('albaLoginRole');
                    setFbLoading(false);
                    if (e?.code !== 'auth/popup-closed-by-user' && e?.code !== 'auth/cancelled-popup-request') {
                        showAlert('Google вАюЖиИВЮИВЌљ ВІцьїеьќѕВіхвІѕвІц.\n' + (e?.message || ''), 'ВўцвЦў', 'error');
                    }
                }
            };

            const handleEmpGoogleLogin = async () => {
                if (checkInAppBrowser()) return;
                localStorage.setItem('albaLoginRole', 'employee');
                setFbLoading(true);
                try {
                    await tryGoogleSignIn();
                } catch(e) {
                    localStorage.removeItem('albaLoginRole');
                    setFbLoading(false);
                    if (e?.code !== 'auth/popup-closed-by-user' && e?.code !== 'auth/cancelled-popup-request') {
                        showAlert('Google вАюЖиИВЮИВЌљ ВІцьїеьќѕВіхвІѕвІц.\n' + (e?.message || ''), 'ВўцвЦў', 'error');
                    }
                }
            };

            const handleLogout = () => {
                showConfirm('вАюЖиИВЋёВЏЃ ьЋўВІюЖ▓аВіхвІѕЖ╣ї?', async () => {
                    await fbAuth.signOut();
                    setIsAuthenticated(false);
                    setAppPin(INITIAL_PIN);
                    setEmployees([]);
                    setNextEmpId(1);
                    setMonthlyData({});
                    setPredictData({});
                    setGlobalMinWage('');
                    lastSyncedDataRef.current = "";
                    setUserRole(null);
                    setEmpAccount(null);
                    setWorkspaceInfo(null);
                    setPendingGoogleEmployees([]);
                    setEmpNotifications([]);
                    setMySubmissions({});
                    setEmpGoogleWorkplaces([]);
                    setSelectedEmpBossUid(null);
                    setShowEmpJoinScreen(false);
                    setCurrentWorkspaceId(null);
                    setBossWorkspaceList([]);
                    setBossWorkspacesLoaded(false);
                    localStorage.removeItem('selectedEmpBossUid');
                    localStorage.removeItem('albaLoginRole');
                    localStorage.removeItem('bossWorkspaceId');
                    sessionStorage.removeItem('bossWorkspaceSelected');
                });
            };

            // Google ВДЂВЏљВЮ┤ ьЄ┤Вѓг В▓ўвдг
            const handleEmpDisconnectWorkplace = (bossUid) => {
                const wp = empGoogleWorkplaces.find(w => w.bossUid === bossUid);
                const shopName = wp?.shopName || 'ВЮ┤ ВЌЁВ▓┤';
                showConfirm(
                    `${shopName}ВЌљВёю ьЄ┤ВѓгьЋўВІюЖ▓аВіхвІѕЖ╣ї?`,
                    async () => {
                        try {
                            await disconnectGoogleEmpWorkplace(
                                firebaseUser.uid, bossUid,
                                empAccount?.name || '', shopName
                            );
                            setEmpGoogleWorkplaces(prev => prev.map(w =>
                                w.bossUid === bossUid ? { ...w, status: 'resigned_by_emp' } : w
                            ));
                            setSelectedEmpBossUid(null);
                            localStorage.removeItem('selectedEmpBossUid');
                            setEmpAccount(prev => ({ ...prev, status: undefined, bossUid: undefined }));
                        } catch(e) {
                            showAlert('В▓ўвдг ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error');
                        }
                    },
                    'ьЄ┤ВѓгьЋўЖИ░'
                );
            };

            // Ж┤ђвдгВъљ ВЌЁВ▓┤(workspaces) вфЕвАЮ вАювЊю Рђћ вІцВцЉ ВЌЁВ▓┤ ВДђВЏљ
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss') return;
                let cancelled = false;
                setBossWorkspacesLoaded(false);

                // 5В┤ѕ ьЈ┤в░▒: Firestore ВЮЉвІх ВЌєВќ┤вЈё ЖИ░в│ИЖ░њВю╝вАю ВДёьќЅ (вфев░ћВЮ╝ вг┤ьЋю Віцьћ╝вёѕ в░ЕВДђ)
                const fallbackTimer = setTimeout(() => {
                    if (!cancelled && !currentWorkspaceId) {
                        const savedId = localStorage.getItem('bossWorkspaceId') || firebaseUser.uid;
                        setBossWorkspaceList([{ id: savedId, shopName: '' }]);
                        setBossWorkspacesLoaded(true);
                        // ВёИВЁўВЌљВёю ВёаьЃЮвљю ВЌЁВ▓┤Ж░ђ ВъѕВю╝вЕ┤ ВъљвЈЎ ВёаьЃЮ
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId === savedId) setCurrentWorkspaceId(savedId);
                    }
                }, 5000);

                fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).get()
                    .then(async doc => {
                        if (cancelled) return;
                        let workspaceIds;
                        if (doc.exists && doc.data().workspaceIds?.length) {
                            workspaceIds = doc.data().workspaceIds;
                        } else {
                            // В▓Ф ВѓгВџЕВъљ: ЖИ░в│И ВЌЁВ▓┤(= uid) вЊ▒вАЮ
                            workspaceIds = [firebaseUser.uid];
                            fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).set({
                                workspaceIds: [firebaseUser.uid],
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            }).catch(() => {});
                        }

                        // Ж░Ђ ВЏїьЂгВіцьјўВЮ┤ВіцВЮў shopName + deleteScheduledAt вАювЊю
                        const details = await Promise.all(
                            workspaceIds.map(id =>
                                fbDb.collection('workspaces').doc(id).get()
                                    .then(d => ({
                                        id,
                                        shopName: d.exists ? (d.data().shopName || '') : '',
                                        deleteScheduledAt: d.exists ? (d.data().deleteScheduledAt || null) : null
                                    }))
                                    .catch(() => ({ id, shopName: '', deleteScheduledAt: null }))
                            )
                        );
                        if (cancelled) return;
                        clearTimeout(fallbackTimer);

                        // 24ВІюЖ░ё Ж▓йЖ│╝ьЋю ВѓГВаю ВўѕВЋй ВЌЁВ▓┤ ВъљвЈЎ ВаЋвдг
                        const now = Date.now();
                        const expired = details.filter(ws => {
                            if (!ws.deleteScheduledAt) return false;
                            const ms = ws.deleteScheduledAt.toMillis ? ws.deleteScheduledAt.toMillis() : new Date(ws.deleteScheduledAt).getTime();
                            return now > ms + 24 * 60 * 60 * 1000;
                        });
                        if (expired.length > 0) {
                            expired.forEach(ws => {
                                (async () => {
                                    try {
                                        await fbDb.collection('users').doc(ws.id).delete();
                                        await fbDb.collection('workspaces').doc(ws.id).delete();
                                        await fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).update({
                                            workspaceIds: firebase.firestore.FieldValue.arrayRemove(ws.id)
                                        });
                                        localStorage.removeItem('at_cache_' + ws.id);
                                    } catch(e) { console.error('вДївБї ВЌЁВ▓┤ ВъљвЈЎ ВѓГВаю ВІцьїе:', ws.id, e); }
                                })();
                            });
                            const expiredIds = new Set(expired.map(w => w.id));
                            const remaining = details.filter(d => !expiredIds.has(d.id));
                            setBossWorkspaceList(remaining);
                            // ВѓГВаювљю ВЌЁВ▓┤Ж░ђ ВёИВЁў ВёаьЃЮВЮ┤ВЌѕВю╝вЕ┤ В┤ѕЖИ░ьЎћ
                            const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                            if (sessionId && expiredIds.has(sessionId)) {
                                sessionStorage.removeItem('bossWorkspaceSelected');
                                localStorage.removeItem('bossWorkspaceId');
                            }
                        } else {
                            setBossWorkspaceList(details);
                        }
                        setBossWorkspacesLoaded(true);

                        // ВЮ┤в▓ѕ ВёИВЁўВЌљВёю ВЮ┤в»И ВёаьЃЮьЋю ВЌЁВ▓┤Ж░ђ ВъѕВю╝вЕ┤ ВъљвЈЎ ВёаьЃЮ (ьјўВЮ┤ВДђ ВЃѕвАюЖ│аВ╣е вїђВЮЉ)
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId && workspaceIds.includes(sessionId)) {
                            const expiredIds = new Set(expired.map(w => w.id));
                            if (!expiredIds.has(sessionId)) setCurrentWorkspaceId(sessionId);
                        }
                        // ВёИВЁў ВёаьЃЮ ВЌєВю╝вЕ┤ ВЌЁВ▓┤ ВёаьЃЮ ьЎћвЕ┤ ьЉюВІю (currentWorkspaceId = null ВюаВДђ)
                    })
                    .catch(e => {
                        if (cancelled) return;
                        clearTimeout(fallbackTimer);
                        console.error('ВЌЁВ▓┤ вфЕвАЮ вАювЊю ВўцвЦў:', e);
                        // ВўцвЦў ВІю ЖИ░в│ИЖ░њВю╝вАю ьЈ┤в░▒
                        const savedId = localStorage.getItem('bossWorkspaceId') || firebaseUser.uid;
                        setBossWorkspaceList([{ id: savedId, shopName: '' }]);
                        setBossWorkspacesLoaded(true);
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId === savedId) setCurrentWorkspaceId(savedId);
                    });

                return () => { cancelled = true; clearTimeout(fallbackTimer); };
            }, [firebaseUser?.uid, userRole]);

            // Google ВДЂВЏљ ВЌЁВ▓┤(workplaces) вАювЊю
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !empAccount?.isGoogleEmployee) return;
                let isFirst = true;
                setEmpWorkplaceLoading(true);

                const unsub = fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                    .collection('workplaces').onSnapshot(snap => {
                        const workplaces = [];
                        snap.forEach(d => workplaces.push({ bossUid: d.id, ...d.data() }));

                        // вфевЊа workplaceВЮў shopNameВЮё workspaces вгИВёю(ВЏљв│И)ВЌљВёю ВхюВІаьЎћ
                        const activeWps = workplaces.filter(w => w.bossUid && w.status !== 'disconnected');
                        Promise.all(activeWps.map(w =>
                            fbDb.collection('workspaces').doc(w.bossUid).get()
                                .then(wsDoc => wsDoc.exists && wsDoc.data()?.shopName ? { bossUid: w.bossUid, shopName: wsDoc.data().shopName } : null)
                                .catch(() => null)
                        )).then(results => {
                            const nameMap = {};
                            results.forEach(r => { if (r) nameMap[r.bossUid] = r.shopName; });
                            if (Object.keys(nameMap).length > 0) {
                                setEmpGoogleWorkplaces(prev => prev.map(w => nameMap[w.bossUid] ? { ...w, shopName: nameMap[w.bossUid] } : w));
                            }
                        });

                        setEmpGoogleWorkplaces(workplaces);
                        setEmpWorkplaceLoading(false);

                        if (!isFirst) return;
                        isFirst = false;

                        // Ж▒░Ваѕвљю ВЌЁВ▓┤ Рђћ ВхюВ┤ѕ 1ьџївДї ьїЮВЌЁ ВЋївд╝
                        const rejected = workplaces.filter(w => w.status === 'rejected');
                        if (rejected.length > 0) {
                            const seenKey = 'rejectedSeenBossUids';
                            const seen = JSON.parse(localStorage.getItem(seenKey) || '[]');
                            const unseen = rejected.filter(w => !seen.includes(w.bossUid));
                            if (unseen.length > 0) {
                                const names = unseen.map(w => w.shopName || '(ВЌЁВ▓┤вфЁ ВЌєВЮї)').join(', ');
                                setTimeout(() => showAlert(`[${names}]\nЖ░ђВъЁ ВІаВ▓ГВЮ┤ Ж▒░ВаѕвљўВЌѕВіхвІѕвІц.`, 'Ж░ђВъЁ Ж▒░Ваѕ ВЋѕвѓ┤', 'alert'), 300);
                                localStorage.setItem(seenKey, JSON.stringify([...seen, ...unseen.map(w => w.bossUid)]));
                            }
                        }

                        // ВађВъЦвљю ВЌЁВ▓┤ вўљвіћ вІевЈЁ Ві╣ВЮИ ВЌЁВ▓┤ ВъљвЈЎ ВёаьЃЮ
                        const savedBossUid = localStorage.getItem('selectedEmpBossUid');
                        const approved = workplaces.filter(w => w.status === 'approved');
                        let target = null;
                        if (savedBossUid) target = approved.find(w => w.bossUid === savedBossUid) || null;
                        if (!target && approved.length === 1) target = approved[0];

                        if (target) {
                            setSelectedEmpBossUid(target.bossUid);
                            localStorage.setItem('selectedEmpBossUid', target.bossUid);
                            setEmpAccount(prev => ({
                                ...prev,
                                bossUid: target.bossUid,
                                shopName: target.shopName || '',
                                name: target.name,
                                status: target.status,
                                workStatus: target.workStatus || 'working',
                                employeeId: target.employeeId,
                                residentId: target.residentId || '',
                                bank: target.bank || '',
                                account: target.account || '',
                                address: target.address || '',
                                phone: target.phone || '',
                                inviteCode: target.inviteCode || '',
                                contractStatus: target.contractStatus || null,
                                contract: target.contract || null,
                                insuranceName: target.insuranceName || '',
                                insuranceRate: target.insuranceRate != null ? target.insuranceRate : 0
                            }));
                        } else {
                            setSelectedEmpBossUid(null);
                        }
                    }, e => { console.error('ВЌЁВ▓┤ вАювЊю ВўцвЦў:', e); setEmpWorkplaceLoading(false); });

                return () => unsub();
            }, [firebaseUser?.uid, userRole, empAccount?.isGoogleEmployee]);

            // Ж┤ђвдгВъљ ВіцВ╝ђВЦ┤/вЕћвфе ВІцВІюЖ░ё sync (в│И вАювЊю ВЎИВЌљ вЕћвфе ВХћЖ░ђ ВЋївд╝ВџЕ ВІцВІюЖ░ё Ж▓йвАю)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                const unsub = fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        setWorkspaceInfo(prev => {
                            const sub = prev?.scheduleMemosSub || {};
                            return {
                                ...(prev || {}),
                                schedules: data.schedules || [],
                                scheduleMemosDoc: data.scheduleMemos || {},
                                scheduleMemos: mergeScheduleMemoMaps(data.scheduleMemos || {}, sub)
                            };
                        });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // ВіцВ╝ђВЦ┤ вЕћвфе ВёювИїВ╗гваЅВЁў ВІцВІюЖ░ё sync (ВДЂВЏљ ВъЉВё▒ вЕћвфе ьЈгьЋе)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                const unsub = fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .collection('scheduleMemos')
                    .onSnapshot(snap => {
                        const byDate = {};
                        snap.forEach(doc => {
                            const m = doc.data();
                            if (!m.date) return;
                            if (!byDate[m.date]) byDate[m.date] = [];
                            byDate[m.date].push({ ...m, id: m.id || doc.id });
                        });
                        setWorkspaceInfo(prev => {
                            const docMemos = prev?.scheduleMemosDoc || prev?.scheduleMemos || {};
                            return {
                                ...(prev || {}),
                                scheduleMemosSub: byDate,
                                scheduleMemos: mergeScheduleMemoMaps(docMemos, byDate)
                            };
                        });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // Ж┤ђвдгВъљ ВЏїьЂгВіцьјўВЮ┤Віц вАювЊю Рђћ currentWorkspaceId ЖИ░в░ў
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                let cancelled = false;
                fbDb.collection('workspaces').doc(currentWorkspaceId).get()
                    .then(doc => {
                        if (cancelled) return;
                        if (doc.exists) {
                            const data = doc.data();
                            setWorkspaceInfo(prev => {
                                const sub = prev?.scheduleMemosSub || {};
                                return {
                                    ...data,
                                    scheduleMemosDoc: data.scheduleMemos || {},
                                    scheduleMemosSub: sub,
                                    scheduleMemos: mergeScheduleMemoMaps(data.scheduleMemos || {}, sub)
                                };
                            });
                            // bossWorkspaceList shopName + deleteScheduledAt ВхюВІаьЎћ
                            setBossWorkspaceList(prev => prev.map(w =>
                                w.id === currentWorkspaceId
                                    ? { ...w, shopName: data.shopName || '', deleteScheduledAt: data.deleteScheduledAt || null }
                                    : w
                            ));
                            // 24ВІюЖ░ё Ж▓йЖ│╝ ВІю ВъљвЈЎ ВѓГВаю ВІцьќЅ
                            if (data.deleteScheduledAt) {
                                const scheduledMs = data.deleteScheduledAt.toMillis
                                    ? data.deleteScheduledAt.toMillis()
                                    : new Date(data.deleteScheduledAt).getTime();
                                if (Date.now() > scheduledMs + 24 * 60 * 60 * 1000) {
                                    const wsId = currentWorkspaceId;
                                    (async () => {
                                        try {
                                            await fbDb.collection('users').doc(wsId).delete();
                                            await fbDb.collection('workspaces').doc(wsId).delete();
                                            await fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).update({
                                                workspaceIds: firebase.firestore.FieldValue.arrayRemove(wsId)
                                            });
                                            localStorage.removeItem('at_cache_' + wsId);
                                            setBossWorkspaceList(prev => prev.filter(w => w.id !== wsId));
                                            setCurrentWorkspaceId(null);
                                            sessionStorage.removeItem('bossWorkspaceSelected');
                                            localStorage.removeItem('bossWorkspaceId');
                                        } catch(e) { console.error('ВъљвЈЎ ВѓГВаю ВІцьїе:', e); }
                                    })();
                                }
                            }
                        } else {
                            setBossSetupWorkspaceId(currentWorkspaceId);
                            setShowBossSetup(true);
                        }
                    }).catch(() => {});
                return () => { cancelled = true; };
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // Google ВДЂВЏљ вїђЖИ░ Ж░љВДђ (Ж┤ђвдгВъљ) Рђћ empPending В╗гваЅВЁў
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                const unsub = fbDb.collection('empPending')
                    .where('bossUid', '==', currentWorkspaceId)
                    .onSnapshot(snap => {
                        // ВѓГВаювљю вгИВёю В▓ўвдг (Вўѕ: Жи╝вг┤ВъљЖ░ђ ВъгВъЉВё▒ ВџћВ▓ГВЮё ВиеВєїьЋю Ж▓йВџ░)
                        snap.docChanges().forEach(change => {
                            if (change.type === 'removed') {
                                const data = change.doc.data();
                                if (data.type === 'contract_delete_request') {
                                    setEmployees(prev => prev.map(e =>
                                        e.empUid === data.empUid ? { ...e, contractDeleteRequest: null } : e
                                    ));
                                }
                            }
                        });
                        const list = [];
                        snap.forEach(d => {
                            const data = d.data();
                            // ВДЂВЏљВЮ┤ ВДЂВаЉ ьЄ┤ВѓгьЋю Ж▓йВџ░ ВъљвЈЎ В▓ўвдг
                            if (data.type === 'resigned_by_emp') {
                                resignedEmpUidsRef.current.add(data.empUid);
                                setEmployees(prev => prev.map(e =>
                                    e.empUid === data.empUid && e.status !== 'deleted' ? { ...e, status: 'resigned', contractDeleteRequest: null } : e
                                ));
                                fbDb.collection('empPending').doc(d.id).delete().catch(() => {});
                                return;
                            }
                            // ВДЂВЏљВЮ┤ Жи╝вАюЖ│ёВЋйВёю ВъгВаюВХюьЋю Ж▓йВџ░
                            if (data.type === 'contract_resubmit') {
                                setEmployees(prev => prev.map(e =>
                                    e.empUid === data.empUid ? { ...e, contractStatus: 'pending_boss', contractDeleteRequest: null } : e
                                ));
                                fbDb.collection('empPending').doc(d.id).delete().catch(() => {});
                                return;
                            }
                            // ВДЂВЏљВЮ┤ Жи╝вАюЖ│ёВЋйВёю ВѓГВаювЦ╝ ВџћВ▓ГьЋю Ж▓йВџ░
                            if (data.type === 'contract_delete_request') {
                                setEmployees(prev => prev.map(e =>
                                    e.empUid === data.empUid ? { ...e, contractDeleteRequest: 'employee' } : e
                                ));
                                // empPendingВЮђ Ж┤ђвдгВъљЖ░ђ В▓ўвдгьЋа вЋїЖ╣їВДђ ВюаВДђ
                                return;
                            }
                            // Жи╝вг┤ВъљЖ░ђ ВъгВъЉВё▒ ВџћВ▓ГВЌљ вЈЎВЮў ВЎёвБїьЋю Ж▓йВџ░ (bossЖ░ђ ве╝Вађ ВџћВ▓Г)
                            if (data.type === 'contract_delete_completed') {
                                setEmployees(prev => prev.map(e =>
                                    e.empUid === data.empUid ? { ...e, contractStatus: 'needs_resign', contract: null, contractDeleteRequest: null } : e
                                ));
                                fbDb.collection('empPending').doc(d.id).delete().catch(() => {});
                                return;
                            }
                            list.push({ uid: data.empUid, isGoogleEmployee: true, ...data });
                        });
                        setPendingGoogleEmployees(list);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // ВѓгВъЦ: Ж░Ђ Google ВДЂВЏљВЮў workplaces вгИВёюВЌљВёю contractStatus/pendingRewrite/contractDeleteRequestвЦ╝ sync
            // (ВѓгВъЦВЮў users вЈёьЂљве╝ьіИ employees в░░ВЌ┤ВЮђ ВѓгВъЦ ВИАВЌљВёювДї Ж┤ђвдгвљўв»ђвАю, ВДЂВЏљВЮ┤ ВъљЖИ░ ВИАВЌљВёю Ж░▒ВІаьЋю contract ВЃЂьЃюЖ░ђ
            //  ВѓгВъЦ employees в░░ВЌ┤ВЌљ ВъљвЈЎВю╝вАю в░ўВўЂвљўВДђ ВЋіВЮї. empPending ВІцВІюЖ░ё ВЋївд╝ВЮ┤ ВѓгВъЦВЮ┤ ьјўВЮ┤ВДђвЦ╝ в╣ёВџ┤ ВѓгВЮ┤ВЌљвіћ
            //  В▓ўвдгвљўВДђ ВЋіВЮё Вѕў ВъѕВќ┤, ьјўВЮ┤ВДђ ВДёВъЁ/employees в│ђЖ▓й ВІю ьЋю в▓ѕ в│┤Ж░Ћ sync.)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                const empUids = employees.filter(e => e.empUid).map(e => e.empUid);
                if (empUids.length === 0) return;
                let cancelled = false;
                Promise.all(empUids.map(uid =>
                    fbDb.collection('employeeAccounts').doc(uid).collection('workplaces').doc(currentWorkspaceId).get()
                        .then(doc => doc.exists ? { uid, ...doc.data() } : null)
                        .catch(() => null)
                )).then(results => {
                    if (cancelled) return;
                    const valid = results.filter(Boolean);
                    if (valid.length === 0) return;
                    setEmployees(prev => {
                        let changed = false;
                        const next = prev.map(e => {
                            if (!e.empUid) return e;
                            const r = valid.find(v => v.uid === e.empUid);
                            if (!r) return e;
                            const newCs = r.contractStatus !== undefined ? r.contractStatus : (e.contractStatus || null);
                            const newPr = !!r.pendingRewrite;
                            const newCdr = r.contractDeleteRequest || null;
                            const newCur = !!r.contractUpdateRequired;
                            if ((e.contractStatus || null) !== newCs
                                || !!e.pendingRewrite !== newPr
                                || (e.contractDeleteRequest || null) !== newCdr
                                || !!e.contractUpdateRequired !== newCur) {
                                changed = true;
                                return { ...e, contractStatus: newCs, pendingRewrite: newPr, contractDeleteRequest: newCdr, contractUpdateRequired: newCur };
                            }
                            return e;
                        });
                        return changed ? next : prev;
                    });
                });
                return () => { cancelled = true; };
            }, [firebaseUser?.uid, userRole, currentWorkspaceId, employees.length]);

            // ВДЂВЏљ ВаюВХю Жи╝вг┤ВІюЖ░ё ВІцВІюЖ░ё ВѕўВІа Рєњ ВЏћв│ё ьўёьЎЕ ВъљвЈЎ в░ўВўЂ (Ж┤ђвдгВъљ)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !isAuthenticated || !currentWorkspaceId) return;
                let initialLoadDone = false;
                const unsub = fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .collection('submissions')
                    .onSnapshot(snap => {
                        if (!initialLoadDone) {
                            initialLoadDone = true;
                            // В┤ѕЖИ░ вАювЊю: в»ИьЎЋВЮИ ВЋївд╝ в░░вёѕ ьЉюВІю
                            const unseenSubs = [];
                            snap.docs.forEach(doc => {
                                const sub = doc.data();
                                if (!sub.date || sub.employeeId == null || !sub.hours || sub.bossEntered) return;
                                if (!sub.seenByBoss && sub.empName) {
                                    unseenSubs.push({ ...sub, docRef: doc.ref });
                                }
                                // Ж┤ђвдгВъљЖ░ђ вЕћвфе ВѓГВаюьќѕВДђвДї FirestoreВЌљ вѓеВЋёВъѕвіћ Ж▓йВџ░ ВъљвЈЎ ьЂ┤вдгВќ┤
                                if (sub.note) {
                                    const parts = sub.date.split('-').map(Number);
                                    const mk = `${parts[0]}-${String(parts[1]).padStart(2,'0')}`;
                                    const dayNum = parts[2];
                                    const localEntry = monthlyData[mk]?.days?.[dayNum]?.entries?.[sub.employeeId];
                                    if (localEntry && !localEntry.note) {
                                        doc.ref.update({ note: '', memoSeenByBoss: true }).catch(() => {});
                                        return; // ВѓГВаювљю вЕћвфеВЮ┤в»ђвАю ВЋївд╝ в░░вёѕ ьЉюВІюьЋўВДђ ВЋіВЮї
                                    }
                                }
                                // в»ИьЎЋВЮИ вЕћвфе ВЋївд╝ ВѕўВДЉ
                                if (sub.note && !sub.memoSeenByBoss && sub.empName) {
                                    setMemoBanners(prev => [...prev, { empName: sub.empName, date: sub.date, id: Date.now() + Math.random(), docId: doc.id }]);
                                }
                            });
                            if (unseenSubs.length > 0) {
                                // Ж░ђВъЦ ВхюЖи╝ ВаюВХюВЮё Жи╝вг┤ ВЋївд╝ в░░вёѕвАю ьЉюВІю
                                const latest = unseenSubs[unseenSubs.length - 1];
                                setWorkSubmitBanner({ empName: latest.empName, date: latest.date, hours: latest.hours });
                                unseenSubs.forEach(s => {
                                    setUnseenDates(prev => new Set([...prev, s.date]));
                                    s.docRef.update({ seenByBoss: true }).catch(() => {});
                                });
                            }
                            return;
                        }
                        // ВЮ┤ьЏё: ВІцВІюЖ░ё в│ђЖ▓йвДї В▓ўвдг (ВДЂВЏљВЮ┤ ВЃѕвАю ВІюЖ░ё ВаюВХю вЊ▒)
                        snap.docChanges().forEach(change => {
                            if (change.type !== 'added' && change.type !== 'modified') return;
                            const sub = change.doc.data();
                            if (!sub.date || sub.employeeId == null || !sub.hours) return;
                            if (sub.bossEntered) return;
                            const parts = sub.date.split('-').map(Number);
                            const mk = `${parts[0]}-${String(parts[1]).padStart(2,'0')}`;
                            const day = parts[2];
                            const emp = employeesRef.current.find(e => e.id !== undefined && e.id.toString() === String(sub.employeeId));
                            const empWage = emp?.wage ? Number(emp.wage) : 0;
                            const wage = Number(sub.wage) || empWage || Number(globalMinWage) || MIN_WAGE;
                            // submissionВЌљ wageЖ░ђ ВЌєВю╝вЕ┤ Firebase вгИВёюВЌљ wage ВХћЖ░ђ (ВДЂВЏљ ВЋ▒ВЌљВёю ВІюЖИЅ ьЉюВІюВџЕ)
                            if (!sub.wage && wage > 0) {
                                change.doc.ref.update({ wage }).catch(() => {});
                            }
                            const latestName = emp?.name || sub.empName;
                            setMonthlyData(prev => {
                                const md = prev[mk] || {};
                                const dd = md.days || {};
                                const de = dd[day] || {};
                                const ee = de.entries || {};
                                const existing = ee[sub.employeeId];
                                if (existing?.bossModified) return prev;
                                if (existing && existing.hours === sub.hours && existing.wage === wage && existing.name === latestName) return prev;
                                return {
                                    ...prev,
                                    [mk]: { ...md, days: { ...dd, [day]: { ...de, entries: { ...ee,
                                        [sub.employeeId]: {
                                            hours: sub.hours,
                                            pay: Math.round(sub.hours * wage),
                                            name: latestName,
                                            wage,
                                            note: sub.note || existing?.note || '',
                                            submittedByEmp: true,
                                            empUid: sub.empUid,
                                            submittedHours: sub.hours
                                        }
                                    }}}}
                                };
                            });
                            if (change.type === 'added' && sub.empName) {
                                setWorkSubmitBanner({ empName: sub.empName, date: sub.date, hours: sub.hours });
                                setUnseenDates(prev => new Set([...prev, sub.date]));
                                // ВІцВІюЖ░ё: ВдЅВІю seenByBoss В▓ўвдг
                                change.doc.ref.update({ seenByBoss: true }).catch(() => {});
                                if (sub.note) {
                                    setMemoBanners(prev => [...prev, { empName: sub.empName, date: sub.date, id: Date.now() + Math.random(), docId: change.doc.id }]);
                                }
                            }
                        });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, isAuthenticated, currentWorkspaceId, globalMinWage]);

            // submissionsВЌљ wage ВЌєвіћ вгИВёю в│┤ВХЕ (monthlyData/employees вАювЊю ВЎёвБї ьЏё 1ьџї)
            const wageBackfillDone = useRef(false);
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                if (wageBackfillDone.current) return;
                if (employees.length === 0) return; // employees ВЋёВДЂ вАювЊю ВЋѕвље
                wageBackfillDone.current = true;
                fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .collection('submissions').get().then(snap => {
                        snap.forEach(doc => {
                            const sub = doc.data();
                            if (sub.wage) return; // ВЮ┤в»И wage ВъѕВЮї
                            if (sub.employeeId == null) return;
                            const parts = (sub.date || '').split('-').map(Number);
                            const mk = parts.length >= 2 ? `${parts[0]}-${String(parts[1]).padStart(2,'0')}` : null;
                            const day = parts[2];
                            const monthlyEntry = mk ? monthlyData?.[mk]?.days?.[day]?.entries?.[sub.employeeId] : null;
                            const emp = employees.find(e => e.id !== undefined && e.id.toString() === String(sub.employeeId));
                            const empWage = emp?.wage ? Number(emp.wage) : 0;
                            const wage = Number(monthlyEntry?.wage) || empWage || 0;
                            if (wage > 0) doc.ref.update({ wage }).catch(() => {});
                        });
                    }).catch(() => {});
            }, [firebaseUser, userRole, currentWorkspaceId, employees, monthlyData]);

            // Ж│хВДђВѓгьЋГ ВІцВІюЖ░ё вАювЊю (Ж┤ђвдгВъљ)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                const unsub = fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        const list = (doc.data()?.notices || [])
                            .slice().sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                        setNotices(list);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // ВДЂВЏљ workplaces ВІцВІюЖ░ё Ж░љВДђ (contractStatus в│ђЖ▓й вЊ▒)
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !empAccount?.bossUid) return;
                const unsub = fbDb.collection('employeeAccounts').doc(firebaseUser.uid)
                    .collection('workplaces').doc(empAccount.bossUid)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        setEmpGoogleWorkplaces(prev =>
                            prev.map(w => w.bossUid === empAccount.bossUid ? { ...w, ...data, bossUid: w.bossUid } : w)

                            ...prev,
                            name: data.name || prev.name,
                            contractStatus: data.contractStatus || null,
                            contract: data.contract || null,
                            contractDeleteRequest: data.contractDeleteRequest || null,

                        }));
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, empAccount?.bossUid]);

            // Ж│хВДђВѓгьЋГ ВІцВІюЖ░ё вАювЊю (ВДЂВЏљ) + workspaces вгИВёюВЌљВёю ВхюВІа shopName в░ўВўЂ
            useEffect(() => {

                        const data = doc.data();
                        const list = (data?.notices || [])
                            .slice().sort((a, b) => (b.createdAt || '').localeCompare(a.createdAt || ''));
                        setNotices(list);
                        if (data?.shopName) {
                            setEmpAccount(prev => prev?.bossUid === empAccount.bossUid ? { ...prev, shopName: data.shopName } : prev);
                            setEmpGoogleWorkplaces(prev => prev.map(w => w.bossUid === empAccount.bossUid ? { ...w, shopName: data.shopName } : w));
                        }
                        setEmpDisplaySettings({

                            insuranceRate: parseFloat(data?.insuranceRate) || 0

                return () => unsub();
            }, [firebaseUser, userRole, empAccount?.bossUid]);

            // ВДЂВЏљ в│ИВЮИ ВЋївд╝ ВІцВІюЖ░ё вАювЊю
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee') return;

            // ВДЂВЏљ в│ИВЮИ ВаюВХю ЖИ░вАЮ ВІцВІюЖ░ё вАювЊю
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !empAccount?.bossUid) return;
                const unsub = fbDb.collection('workspaces').doc(empAccount.bossUid)
                    .collection('submissions')
