        function TabCalendar({ employees, monthlyData, setMonthlyData, showConfirm, unseenDates, onMarkSeen, globalMinWage, workspaceId, onImmediateSaveMonthly, pendingContractUpdateEmpIds, workspaceInfo, navigateTarget, onNavigateDone }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            // вЕћвфе ВЋївд╝ВЌљВёю ьі╣ВаЋ вѓаВДювАю ВЮ┤вЈЎ
            useEffect(() => {
                if (!navigateTarget) return;
                setCurrentDate(new Date(navigateTarget.year, navigateTarget.month - 1, 1));
                setEditDayModal(navigateTarget.day);
                if (onNavigateDone) onNavigateDone();
            }, [navigateTarget]);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = monthlyData[monthKey] || { days: {} };
            const activeEmployees = employees.filter(e => {
                const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
                const cStatus = e.contractStatus || null;
                const isLow = e.wage && Number(e.wage) > 0 && Number(e.wage) < Number(globalMinWage);
                const needsContractUpdate = (pendingContractUpdateEmpIds && pendingContractUpdateEmpIds.has(e.id)) || !!e.contractUpdateRequired;
                return statusVal === 'working' && cStatus !== 'needs_resign' && cStatus !== 'pending_boss' && !needsContractUpdate;
            }).sort((a,b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const touchStartX = useRef(null);
            const touchStartY = useRef(null);
            const isHorizontalDrag = useRef(false);
            const carouselRef = useRef(null);
            const [calDragX, setCalDragX] = useState(0);
            const [calTransition, setCalTransition] = useState(false);
            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
                isHorizontalDrag.current = false;
                setCalTransition(false);
                setCalDragX(0);
            };
            const handleTouchMove = (e) => {
                if (touchStartX.current === null || isBulkInputOpen || editDayModal) return;
                const dx = e.touches[0].clientX - touchStartX.current;
                const dy = e.touches[0].clientY - touchStartY.current;
                if (!isHorizontalDrag.current) {
                    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                    isHorizontalDrag.current = Math.abs(dx) > Math.abs(dy);
                    if (!isHorizontalDrag.current) return;
                }
                setCalDragX(dx);
            };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                const wasHorizontal = isHorizontalDrag.current;
                touchStartX.current = null;
                if (isBulkInputOpen || editDayModal || !wasHorizontal) { setCalDragX(0); return; }
                const w = carouselRef.current?.clientWidth || window.innerWidth;
                if (Math.abs(dx) > 80) {
                    setCalTransition(true);
                    setCalDragX(dx < 0 ? -w : w);
                    setTimeout(() => {
                        setCalTransition(false);
                        setCalDragX(0);
                        if (dx < 0) nextMonth(); else prevMonth();
                    }, 260);
                } else {
                    setCalTransition(true);
                    setCalDragX(0);
                    setTimeout(() => setCalTransition(false), 220);
                }
            };

            const handleTotalRevenueChange = (e) => {
                const val = e.target.value === '' ? '' : Number(e.target.value);
                setMonthlyData(prev => ({
                    ...prev,
                    [monthKey]: {
                        ...(prev[monthKey] || { days: {} }),
                        totalRevenue: val
                    }
                }));
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}вЁё ${month}ВЏћ ${dayToDel}ВЮ╝ВЮў ВаЋв│┤вЦ╝ ВаЋвДљ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?`, () => {
                    // ВѓГВаю Ваё ьЋ┤вІ╣ вѓаВДюВЮў entriesВЌљВёю empUid ВѕўВДЉ (submissions ВѓГВаю + ВЋївд╝ВџЕ)
                    const dayEntries = monthlyData[monthKey]?.days?.[dayToDel]?.entries || {};
                    const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayToDel).padStart(2,'0')}`;
                    // ВДЂВЏљвЊцВЌљЖ▓ї ВѓГВаю ВЋївд╝ в░юВєА
                    Object.values(dayEntries).forEach(entry => {
                        const empUid = entry.empUid;
                        if (empUid && entry.hours > 0) {
                            sendChangeNotification(empUid, {
                                type: 'hours_deleted',
                                date: dateStr,
                                oldHours: entry.hours,
                                bossUid: workspaceId || null
                            }).catch(() => {});
                        }
                    });
                    setMonthlyData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey] && newData[monthKey].days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;
                    });
                    // submissions В╗гваЅВЁўВЌљВёювЈё ьЋ┤вІ╣ вѓаВДю вЇ░ВЮ┤ьё░ ВѓГВаю
                    if (workspaceId) {
                        const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(dayToDel).padStart(2,'0')}`;
                        Object.values(dayEntries).forEach(entry => {
                            const empUid = entry.empUid;
                            if (empUid) {
                                fbDb.collection('workspaces').doc(workspaceId)
                                    .collection('submissions').doc(`${empUid}_${dateStr}`)
                                    .delete().catch(() => {});
                            }
                        });
                        // empUid ВЌєвіћ Ж▓йВџ░вЈё В╗цв▓ё: вѓаВДю ЖИ░Вцђ В┐╝вдг ВѓГВаю
                        fbDb.collection('workspaces').doc(workspaceId)
                            .collection('submissions')
                            .where('date', '==', dateStr)
                            .get().then(snap => {
                                if (snap.empty) return;
                                const batch = fbDb.batch();
                                snap.forEach(doc => batch.delete(doc.ref));
                                return batch.commit();
                            }).catch(() => {});
                    }
                    setEditDayModal(null); // ВѓГВаю ьЏё вфевІг вІФЖИ░
                }, "вЇ░ВЮ┤ьё░ ВѓГВаю");
            };

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            let totalMonthPay = 0;
            let sumOfDailyRevenue = 0;

            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                const dayData = currentMonthData.days[d] || {};
                sumOfDailyRevenue += (dayData.revenue || 0);
                Object.values(dayData.entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
            const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;
            // ВЏћв│ё В┤Ю Ж│хВаюВЋА Ж│ёВѓ░
            const totalMonthDeduction = (() => {
                const mode = workspaceInfo?.insuranceMode || 'none';
                if (mode === 'none') return 0;
                let deduct = 0;
                const monthData2 = monthlyData[monthKey]?.days || {};
                const empIds = new Set();
                Object.values(monthData2).forEach(day => Object.keys(day.entries || {}).forEach(id => empIds.add(id)));
                empIds.forEach(empId => {
                    const emp = employees.find(e => e.id.toString() === empId);
                    const ins = getInsuranceInfo(workspaceInfo, emp);
                    if (ins.rate <= 0) return;
                    let empPay = 0;
                    Object.values(monthData2).forEach(day => { const e = day.entries?.[empId]; if (e) empPay += (e.pay || 0); });
                    let empHoliday = 0;
                    Object.entries(holidayPayBySunday).forEach(([s, wd]) => {
                        const [sy, sm] = s.split('-').map(Number);
                        if (sy !== year || sm !== month) return;
                        wd.forEach(h => { if (h.empId === empId) empHoliday += h.holidayPay; });
                    });
                    deduct += Math.round((empPay + empHoliday) * ins.rate / 100);
                });
                return deduct;
            })();
            const totalMonthFinalPay = totalMonthGrandPay - totalMonthDeduction;

            const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
            const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
            const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

            return (
                <div className="space-y-4">
                    <div className="bg-white p-5 rounded-2xl shadow-sm border border-gray-200 space-y-4">
                        <div className="flex justify-between items-center">
                            <div className="flex items-center gap-2 md:gap-4">
                                <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                                <MonthYearSelector
                                    year={year}
                                    month={month}
                                    onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                                />
                                <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                            </div>
                            <button
                                onClick={() => setIsBulkInputOpen(true)}
                                className="bg-gray-800 text-white px-3 md:px-4 py-2.5 rounded-xl hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap font-medium"
                            >
                                <Edit2 className="w-4 h-4" />
                                <span className="hidden sm:inline">ВЮ┤в▓ѕвІг Жи╝вг┤ВІюЖ░ё ВЮ╝Ж┤ё ВъЁваЦ</span>
                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-xl px-4 py-2.5 shadow-sm text-sm">
                                <label className="font-medium text-gray-700 whitespace-nowrap">ВЮ┤в▓ѕвІг В┤ЮвДцВХю:</label>
                                <input
                                    type="number"
                                    value={currentMonthData.totalRevenue ?? ''}
                                    onChange={handleTotalRevenueChange}
                                    placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                                    className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0 font-bold"
                                />
                                <span className="text-gray-500 font-medium whitespace-nowrap">ВЏљ</span>
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                ВѕюВѕў ЖИЅВЌг: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                ВБ╝ью┤ВѕўвІ╣: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            {totalMonthDeduction > 0 && (
                                <div className="bg-orange-50 text-orange-800 px-4 py-2.5 rounded-xl font-medium border border-orange-200 whitespace-nowrap text-sm shadow-sm">
                                    В┤Ю Ж│хВаюВЋА: -{formatCurrency(totalMonthDeduction)}
                                </div>
                            )}
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                В┤Ю ЖИЅВЌг: {formatCurrency(totalMonthDeduction > 0 ? totalMonthFinalPay : totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                            </div>
                        </div>
                    </div>

                    {(() => {
                        const renderCalendarPanel = (py, pm, isCurrent) => {
                            const pmKey = `${py}-${pm.toString().padStart(2,'0')}`;
                            const pmData = monthlyData[pmKey] || { days: {} };
                            const pDaysIn = getDaysInMonth(py, pm);
                            const pFirstDay = getFirstDayOfMonth(py, pm);
                            const pDays = [];
                            for (let i = 0; i < pFirstDay; i++) pDays.push(null);
                            for (let d = 1; d <= pDaysIn; d++) pDays.push(d);
                            return (
                                <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden w-full flex-shrink-0">
                                    <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                                        {['ВЮ╝', 'ВЏћ', 'ьЎћ', 'Вѕў', 'вфЕ', 'ЖИѕ', 'ьєа'].map((day, i) => (
                                            <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>{day}</div>
                                        ))}
                                    </div>
                                    <div className="grid grid-cols-7 auto-rows-fr">
                                        {pDays.map((day, idx) => {
                                            if (!day) return <div key={`empty-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;
                                            const dayData = pmData.days[day] || { entries: {}, revenue: 0 };
                                            let dailyTotalPay = 0;
                                            const activeEntries = [];
                                            Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                                                if (entry.hours > 0) {
                                                    dailyTotalPay += entry.pay;
                                                    const currentEmp = employees.find(e => String(e.id) === String(empId));
                                                    activeEntries.push(currentEmp ? { ...entry, name: currentEmp.name } : entry);
                                                }
                                            });
                                            const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;
                                            const isSunday = idx % 7 === 0;
                                            const sundayKey = isSunday ? `${py}-${pm.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                            const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];
                                            const dateStr = `${py}-${pm.toString().padStart(2,'0')}-${day.toString().padStart(2,'0')}`;
                                            const hasUnseen = isCurrent && unseenDates?.has(dateStr);
                                            const handleOpenDay = isCurrent ? () => { setEditDayModal(day); onMarkSeen?.(dateStr); } : undefined;
                                            return (
                                                <div key={`day-${day}`} className={`cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group ${isCurrent ? 'hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default' : ''}`} onClick={handleOpenDay}>
                                                    <div className="flex justify-between items-start mb-1">
                                                        <div className="relative flex items-center">
                                                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>{day}</span>
                                                            {hasUnseen && <span className="absolute -top-0.5 -right-1 w-2 h-2 bg-red-500 rounded-full"></span>}
                                                        </div>
                                                        {isCurrent && (
                                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                                <button onClick={handleOpenDay} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">ВѕўВаЋ</button>
                                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="ВѓГВаю">
                                                                    <X className="w-3 h-3" />
                                                                </button>
                                                            </div>
                                                        )}
                                                    </div>
                                                    <div className="md:hidden space-y-0.5 mt-1">
                                                        {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}вфЁ Жи╝вг┤</div>}
                                                        {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}вДїВЏљ</div>}
                                                        {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="ВБ╝ью┤ВѕўвІ╣ в░юВЃЮ"></div>}
                                                    </div>
                                                    <div className="hidden md:block space-y-1 mt-2">
                                                        <div className="text-xs text-gray-600 overflow-hidden">
                                                            {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                            {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}вфЁ...</div>}
                                                        </div>
                                                        {dailyTotalPay > 0 && (
                                                            <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                                <div className="text-xs font-semibold text-green-700">ВЮИЖ▒┤в╣ё: {formatCurrency(dailyTotalPay)}</div>
                                                                <div className="text-xs text-gray-500 mt-0.5">вДцВХю: {formatCurrency(dayData.revenue || 0)}</div>
                                                                {dayData.revenue > 0 && <div className="text-[10px] font-medium text-gray-400 mt-0.5">в╣ёВюе: {dailyRatio}%</div>}
                                                            </div>
                                                        )}
                                                        {holidayEntries.length > 0 && (
                                                            <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                                <div className="text-[10px] font-bold text-blue-600 mb-0.5">ВБ╝ью┤ВѕўвІ╣ в░юВЃЮ</div>
                                                                {holidayEntries.map((h, i) => (
                                                                    <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                                ))}
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>
                            );
                        };
                        const prevY = month === 1 ? year - 1 : year;
                        const prevM = month === 1 ? 12 : month - 1;
                        const nextY = month === 12 ? year + 1 : year;
                        const nextM = month === 12 ? 1 : month + 1;
                        return (
                            <div ref={carouselRef} className="overflow-hidden" style={{ touchAction: 'pan-y' }} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                                <div className="flex" style={{ width: '300%', transform: `translate3d(calc(-33.3333% + ${calDragX}px), 0, 0)`, transition: calTransition ? 'transform 0.25s ease-out' : 'none' }}>
                                    <div className="w-1/3 flex-shrink-0 pr-2">{renderCalendarPanel(prevY, prevM, false)}</div>
                                    <div className="w-1/3 flex-shrink-0 px-1">{renderCalendarPanel(year, month, true)}</div>
                                    <div className="w-1/3 flex-shrink-0 pl-2">{renderCalendarPanel(nextY, nextM, false)}</div>
                                </div>
                            </div>
                        );
                    })()}

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                            onClose={() => setIsBulkInputOpen(false)}
                            globalMinWage={globalMinWage}
                        />
                    )}

                    {editDayModal && (() => {
                        const editDateStr = `${year}-${month.toString().padStart(2, '0')}-${editDayModal.toString().padStart(2, '0')}`;
                        const editDate = new Date(year, month - 1, editDayModal);
                        const isSunday = editDate.getDay() === 0;
                        const editHolidayEntries = isSunday ? (holidayPayBySunday[editDateStr] || []) : [];
                        return (
                            <DailyEditModal
                                year={year} month={month} day={editDayModal} monthKey={monthKey}
                                activeEmployees={activeEmployees} allEmployees={employees} monthlyData={monthlyData} setMonthlyData={setMonthlyData}
                                onClose={() => setEditDayModal(null)}
                                onDelete={() => handleDeleteDay(editDayModal)}
                                workspaceId={workspaceId}
                                holidayEntries={editHolidayEntries}
                                globalMinWage={globalMinWage}
                            />
                        );
                    })()}

                    <div className="flex justify-end mt-4">
                        <button
                            onClick={() => {
                                showConfirm(`${year}вЁё ${month}ВЏћ ВаЋв│┤вЦ╝ ВаЋвДљ В┤ѕЖИ░ьЎћьЋўВІюЖ▓аВіхвІѕЖ╣ї?`, () => {
                                    // ьЋ┤вІ╣ ВЏћВЮў вфевЊа ВДЂВЏљВЌљЖ▓ї ВѓГВаю ВЋївд╝ в░юВєА
                                    const monthDays = monthlyData[monthKey]?.days || {};
                                    Object.entries(monthDays).forEach(([d, dayData]) => {
                                        Object.values(dayData.entries || {}).forEach(entry => {
                                            if (entry.empUid && entry.hours > 0) {
                                                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
                                                sendChangeNotification(entry.empUid, {
                                                    type: 'hours_deleted',
                                                    date: dateStr,
                                                    oldHours: entry.hours,
                                                    bossUid: workspaceId || null
                                                }).catch(() => {});
                                            }
                                        });
                                    });
                                    const newData = { ...monthlyData };
                                    delete newData[monthKey];
                                    // Firestore вЈЎЖИ░ьЎћ Ваё ВЃѕвАюЖ│аВ╣е ВІю вЇ░ВЮ┤ьё░ в│хВЏљ в░ЕВДђ
                                    if (workspaceId) {
                                        try {
                                            const pKey = 'at_pdel_' + workspaceId;
                                            const list = JSON.parse(localStorage.getItem(pKey) || '[]');
                                            if (!list.includes(monthKey)) localStorage.setItem(pKey, JSON.stringify([...list, monthKey]));
                                        } catch(_) {}
                                    }
                                    setMonthlyData(newData);
                                    onImmediateSaveMonthly?.(newData);
                                    // ьЋ┤вІ╣ ВЏћВЮў в»ИьЎЋВЮИ в░░ВДђ вфевЉљ ВаюЖ▒░
                                    if (unseenDates && onMarkSeen) {
                                        const prefix = `${year}-${String(month).padStart(2,'0')}-`;
                                        unseenDates.forEach(d => {
                                            if (typeof d === 'string' && d.startsWith(prefix)) onMarkSeen(d);
                                        });
                                    }
                                    // ВЃѕвАюЖ│аВ╣е ВІю ВДЂВЏљ ВаюВХю вЇ░ВЮ┤ьё░Ж░ђ в│хВЏљвљўвіћ в▓ёЖиИ ВѕўВаЋ:
                                    // onSnapshot вдгВіцвёѕЖ░ђ submissionsвЦ╝ ВъгВаЂВџЕьЋўВДђ ВЋівЈёвАЮ ьЋ┤вІ╣ ВЏћ вЇ░ВЮ┤ьё░ ВѓГВаю
                                    if (workspaceId) {
                                        const padM = month.toString().padStart(2, '0');
                                        const nextY = month === 12 ? year + 1 : year;
                                        const nextM = (month === 12 ? 1 : month + 1).toString().padStart(2, '0');
                                        fbDb.collection('workspaces').doc(workspaceId)
                                            .collection('submissions')
                                            .where('date', '>=', `${year}-${padM}-01`)
                                            .where('date', '<', `${nextY}-${nextM}-01`)
                                            .get()
                                            .then(snap => {
                                                if (snap.empty) return;
                                                const batch = fbDb.batch();
                                                snap.forEach(doc => batch.delete(doc.ref));
                                                return batch.commit();
                                            })
                                            .catch(() => {});
                                    }
                                }, "В┤ѕЖИ░ьЎћ ьЎЋВЮИ");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            ВЮ┤в▓ѕвІг ВаЋв│┤ ВаёВ▓┤ В┤ѕЖИ░ьЎћ
                        </button>
                    </div>
                </div>
            );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose, globalMinWage }) {
            const hourRefs = useRef({});
            const minRefs = useRef({});
            const wageRefs = useRef({});
            const [localData, setLocalData] = useState({});   // ВІюЖ░ё (ВаЋВѕў)
            const [minuteData, setMinuteData] = useState({}); // вХё (0-59)
            const [wageData, setWageData] = useState({});     // ВІюЖИЅ

            useEffect(() => {
                const initData = {};
                const initMinData = {};
                const initWageData = {};
                const currentMonthData = monthlyData[monthKey] || { days: {} };
                const minW = Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE;

                for (let d = 1; d <= daysInMonth; d++) {
                    initData[d] = {};
                    initMinData[d] = {};
                    initWageData[d] = {};
                    const dayData = currentMonthData.days[d] || { entries: {} };
                    activeEmployees.forEach(emp => {
                        const existing = dayData.entries[emp.id];
                        const empWage = Number(emp.wage) > 0 ? Number(emp.wage) : minW;
                        initWageData[d][emp.id] = existing?.wage || empWage;
                        if (existing?.hours != null && existing.hours > 0) {
                            const h = Math.floor(existing.hours);
                            const m = Math.round((existing.hours - h) * 60);
                            initData[d][emp.id] = h > 0 ? String(h) : '';
                            initMinData[d][emp.id] = m > 0 ? String(m) : '';
                        } else {
                            initData[d][emp.id] = '';
                            initMinData[d][emp.id] = '';
                        }
                    });
                }
                setLocalData(initData);
                setMinuteData(initMinData);
                setWageData(initWageData);
            }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

            const handleInputChange = (day, empId, val) => {
                const v = String(val).replace(/[^0-9]/g, '');
                setLocalData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: v } }));
            };

            const handleMinuteChange = (day, empId, val) => {
                const v = String(val).replace(/[^0-9]/g, '');
                setMinuteData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: v } }));
            };

            const handleWageChange = (day, empId, val) => {
                const v = String(val).replace(/[^0-9]/g, '');
                setWageData(prev => ({ ...prev, [day]: { ...prev[day], [empId]: v } }));
            };

            const focusHour = (day, empIdx) => {
                const ref = hourRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusMin = (day, empIdx) => {
                const ref = minRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };
            const focusWage = (day, empIdx) => {
                const ref = wageRefs.current[`${day}-${activeEmployees[empIdx]?.id}`];
                if (ref) { ref.focus(); ref.select(); }
            };

            // ВІюЖИЅВ╣И ьѓцв│┤вЊю: РєЉРєЊ/EnterвДї ВюёВЋёвъў ВЮ┤вЈЎ
            const handleWageKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                if (e.key === 'ArrowDown' || e.key === 'Enter') {
                    e.preventDefault();
                    if (day < daysInMonth) focusWage(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusWage(day - 1, empIdx);
                }
            };

            // ВІюЖ░ё ВъЁваЦВ╣И в░ЕьќЦьѓц
            // РєЉРєЊ: Ж░ЎВЮђ ВДЂВЏљ ВЮ┤Ваё/вІцВЮї вѓа ВІюЖ░ёВ╣И | Рєњ/Enter: Ж░ЎВЮђ вѓа вХёВ╣И | Рєљ: ВЮ┤Ваё ВДЂВЏљ вХёВ╣И
            const handleHourKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusHour(day - 1, empIdx);
                } else if (e.key === 'ArrowRight' || e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    focusMin(day, empIdx);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    if (empIdx > 0) focusMin(day, empIdx - 1);
                    else if (day > 1) focusMin(day - 1, last);
                }
            };

            // вХё ВъЁваЦВ╣И в░ЕьќЦьѓц
            // РєЉРєЊ: Ж░ЎВЮђ ВДЂВЏљ ВЮ┤Ваё/вІцВЮї вѓа вХёВ╣И | Рєњ: вІцВЮї ВДЂВЏљ ВІюЖ░ёВ╣И | Рєљ: Ж░ЎВЮђ вѓа ВІюЖ░ёВ╣И
            // Enter: вІцВЮї вѓа ВІюЖ░ёВ╣И (вДѕВДђвДЅ вѓаВЮ┤вЕ┤ вІцВЮї ВДЂВЏљ 1ВЮ╝ ВІюЖ░ёВ╣И)
            const handleMinKeyDown = (e, day, empIdx) => {
                if (['e', 'E', '+', '-'].includes(e.key)) { e.preventDefault(); return; }
                const last = activeEmployees.length - 1;

                if (e.key === 'ArrowDown') {
                    e.preventDefault();
                    if (day < daysInMonth) focusMin(day + 1, empIdx);
                } else if (e.key === 'ArrowUp') {
                    e.preventDefault();
                    if (day > 1) focusMin(day - 1, empIdx);
                } else if (e.key === 'ArrowRight') {
                    e.preventDefault();
                    if (empIdx < last) focusHour(day, empIdx + 1);
                    else if (day < daysInMonth) focusHour(day + 1, 0);
                } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
                    e.preventDefault();
                    focusHour(day, empIdx);
                } else if (e.key === 'Enter' || (e.key === 'Tab' && !e.shiftKey)) {
                    e.preventDefault();
                    if (day < daysInMonth) focusHour(day + 1, empIdx);
                    else if (empIdx < last) focusHour(1, empIdx + 1);
                }
            };

            const handleSave = () => {
                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };

                    for (let d = 1; d <= daysInMonth; d++) {
                        if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };

                        activeEmployees.forEach(emp => {
                            const hStr = localData[d]?.[emp.id];
                            const mStr = minuteData[d]?.[emp.id];
                            const h = hStr === '' || hStr == null ? 0 : parseInt(hStr, 10);
                            const m = mStr === '' || mStr == null ? 0 : parseInt(mStr, 10);
                            const hours = h + m / 60;

                            if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                                const w = Number(wageData[d]?.[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE));
                                newData[monthKey].days[d].entries[emp.id] = {
                                    hours: hours, pay: Math.round(hours * w), name: emp.name, wage: w
                                };
                            }
                        });
                    }
                    return newData;
                });
                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <div>
                                <h3 className="text-lg font-bold text-gray-800">{year}вЁё {month}ВЏћ Жи╝вг┤ВІюЖ░ё ВЮ╝Ж┤ё ВъЁваЦ</h3>
                                <p className="hidden md:block text-xs text-gray-500 mt-1">ВІюЖ░ё Enter Рєњ вХёВ╣И ВЮ┤вЈЎ | вХё Enter Рєњ вІцВЮї вѓа ВІюЖ░ёВ╣И | в░ЕьќЦьѓцвАю ВЁђ ВЮ┤вЈЎ</p>
                            </div>
                            <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5"/></button>
                        </div>

                        <div className="flex-1 overflow-auto px-4 pb-4 relative">
                            {activeEmployees.length === 0 ? (
                                <div className="h-full flex items-center justify-center text-gray-500">ьўёВъг Жи╝вг┤ ВцЉВЮИ ВДЂВЏљВЮ┤ ВЌєВіхвІѕвІц.</div>
                            ) : (
                                <table className="border-collapse">
                                    <thead className="sticky bg-white shadow-sm z-10" style={{top: '-1px'}}>
                                        <tr>
                                            <th className="border p-2 bg-gray-100 text-center whitespace-nowrap" style={{width:'50px'}}>вѓаВДю</th>
                                            {activeEmployees.map(emp => (
                                                <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm" style={{width:'170px'}}>
                                                    {emp.displayId}. {emp.name}
                                                    <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                                                    <div className="flex items-center gap-0.5 text-[10px] font-normal text-gray-400 mt-0.5">
                                                        <span className="w-12 text-center">ВІюЖ░ё</span>
                                                        <span className="text-transparent text-xs">:</span>
                                                        <span className="w-10 text-center">вХё</span>
                                                        <span className="text-transparent text-xs mx-0.5">|</span>
                                                        <span className="w-14 text-center">ВІюЖИЅ</span>
                                                        <span className="text-[9px] text-transparent">ВЏљ</span>
                                                    </div>
                                                </th>
                                            ))}
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                                            <tr key={day} className="hover:bg-yellow-50/50">
                                                <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}ВЮ╝</td>
                                                {activeEmployees.map((emp, empIdx) => (
                                                    <td key={emp.id} className="border p-0.5">
                                                        <div className="flex items-center gap-0.5">
                                                            <input
                                                                ref={el => hourRefs.current[`${day}-${emp.id}`] = el}
                                                                type="text" inputMode="numeric" enterKeyHint="next" pattern="[0-9]*"
                                                                value={localData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleInputChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleHourKeyDown(e, day, empIdx)}
                                                                className="w-12 h-9 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent outline-none transition text-sm"
                                                                placeholder="ВІю"
                                                            />
                                                            <span className="text-gray-300 text-xs">:</span>
                                                            <input
                                                                ref={el => minRefs.current[`${day}-${emp.id}`] = el}
                                                                type="text" inputMode="numeric" enterKeyHint="next" pattern="[0-9]*"
                                                                value={minuteData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleMinuteChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleMinKeyDown(e, day, empIdx)}
                                                                className="w-10 h-9 text-center border-none focus:ring-2 focus:ring-blue-400 bg-transparent outline-none transition text-sm text-blue-600"
                                                                placeholder="вХё"
                                                            />
                                                            <span className="text-gray-200 text-xs mx-0.5">|</span>
                                                            <input
                                                                ref={el => wageRefs.current[`${day}-${emp.id}`] = el}
                                                                type="text" inputMode="numeric" enterKeyHint="next" pattern="[0-9]*"
                                                                value={wageData[day]?.[emp.id] ?? ''}
                                                                onChange={e => handleWageChange(day, emp.id, e.target.value)}
                                                                onKeyDown={e => handleWageKeyDown(e, day, empIdx)}
                                                                className={`w-14 h-9 text-right pr-0.5 border-none focus:ring-2 focus:ring-orange-400 bg-transparent outline-none transition text-[11px] ${Number(wageData[day]?.[emp.id]) !== (Number(emp.wage) > 0 ? Number(emp.wage) : (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE)) ? 'text-red-500' : 'text-gray-700'}`}
                                                            />
                                                            <span className="text-[9px] text-gray-400 shrink-0">ВЏљ</span>
                                                        </div>
                                                    </td>
                                                ))}
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            )}
                        </div>

                        <div className="p-5 border-t bg-white flex justify-end gap-3 rounded-b-2xl shrink-0">
                            <button onClick={onClose} className="px-6 py-2.5 border border-gray-300 rounded-xl bg-white hover:bg-gray-50 transition font-medium">ВиеВєї</button>
                            <button onClick={handleSave} className="px-6 py-2.5 bg-green-600 text-white rounded-xl hover:bg-green-700 transition font-bold shadow-sm">ВађВъЦьЋўЖИ░</button>
                        </div>
                    </div>
                </div>
            );
        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, allEmployees, monthlyData, setMonthlyData, onClose, onDelete, workspaceId, holidayEntries, globalMinWage }) {
            const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };

            const combinedEmployees = useMemo(() => {
                const list = [...activeEmployees];
                const activeIds = new Set(activeEmployees.map(e => e.id.toString()));

                Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
                    if (!activeIds.has(empIdStr)) {
                        const empInfo = (allEmployees || []).find(e => e.id.toString() === empIdStr);
                        const empStatus = empInfo?.status || (empInfo?.isWorking === false ? 'resigned' : 'resigned');
                        list.push({
                            id: empIdStr, displayId: '-', name: data.name, wage: data.wage,
                            isInactive: true, inactiveStatus: empStatus
                        });
                    }
                });
                return list;
            }, [activeEmployees, allEmployees, currentDayData.entries]);

            const hourRefs = useRef({});
            const minRefs = useRef({});

            const [revenue, setRevenue] = useState(currentDayData.revenue || '');
            const [wageData, setWageData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id];
                    const empWage = Number(emp.wage) > 0 ? Number(emp.wage) : 0;
                    const minW = Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE;
                    init[emp.id] = existing?.wage || empWage || minW;
                });
                return init;
            });
            const [hoursData, setHoursData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    init[emp.id] = existing > 0 ? Math.floor(existing) : '';
                });
                return init;
            });
            const [minsData, setMinsData] = useState(() => {
                const init = {};
                combinedEmployees.forEach(emp => {
                    const existing = currentDayData.entries[emp.id]?.hours || 0;
                    const m = Math.round((existing - Math.floor(existing)) * 60);
                    init[emp.id] = m > 0 ? m : '';
                });
                return init;
            });
            // вЕћвфе ВѓГВаю ВЃЂьЃю (ВДЂВЏљВЮ┤ ВъЁваЦьЋю вЕћвфевЦ╝ Ж┤ђвдгВъљЖ░ђ ВѓГВаюьЋа Вѕў ВъѕВЮї)
            const [deletedNotes, setDeletedNotes] = useState({});

            const handleHourKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleMinKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {
                    e.preventDefault();
                    const nextEmp = combinedEmployees[empIdx + 1];
                    if (nextEmp) {
                        const ref = hourRefs.current[nextEmp.id];
                        if (ref) { ref.focus(); ref.select(); }
                    }
                }
            };

            const handleSave = () => {
                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                // Google ВЌ░вЈЎ ВДЂВЏљВЮў submissions вЈЎЖИ░ьЎћВџЕ вфЕвАЮ
                const submissionUpdates = [];
                combinedEmployees.forEach(emp => {
                    const existingEntry = currentDayData.entries[emp.id];
                    const empUid = existingEntry?.empUid || emp.empUid;
                    if (empUid) {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const w = Number(wageData[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : 0) || (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE);
                        const noteVal = deletedNotes[emp.id] ? '' : (existingEntry?.note || '');
                        submissionUpdates.push({ empUid, employeeId: emp.id, empName: emp.name, hours, wage: w, isNew: !existingEntry?.submittedByEmp, note: noteVal });
                    }
                });

                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };
                    if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

                    newData[monthKey].days[day].revenue = Number(revenue) || 0;

                    combinedEmployees.forEach(emp => {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const existingEntry = prev[monthKey]?.days[day]?.entries[emp.id];

                        if (hours > 0) {
                            const empUid = existingEntry?.empUid || emp.empUid;
                            const hoursChanged = !existingEntry || Math.abs(existingEntry.hours - hours) > 0.0001;
                            if (empUid && hoursChanged) {
                                if (!existingEntry) {
                                    // Ж┤ђвдгВъљЖ░ђ в╣ѕ В╣ИВЌљ ВЃѕвАю ВъЁваЦ
                                    sendChangeNotification(empUid, {
                                        type: 'hours_entered',
                                        date: dateStr,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                } else {
                                    // ЖИ░ВА┤ ВІюЖ░ёВЮё в│ђЖ▓й (ВДЂВЏљ ВаюВХюВЮ┤вЊа Ж┤ђвдгВъљ ВъЁваЦВЮ┤вЊа)
                                    sendChangeNotification(empUid, {
                                        type: 'hours_modified',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            const savedWage = Number(wageData[emp.id]) || (Number(emp.wage) > 0 ? Number(emp.wage) : 0) || (Number(globalMinWage) > 0 ? Number(globalMinWage) : MIN_WAGE);
                            // ВІюЖИЅ в│ђЖ▓й ВЋївд╝
                            if (existingEntry && hours > 0 && Math.abs(Number(existingEntry.wage) - savedWage) > 0) {
                                const empUid = existingEntry.empUid || emp.empUid;
                                if (empUid) {
                                    sendChangeNotification(empUid, {
                                        type: 'wage_modified',
                                        date: dateStr,
                                        oldWage: existingEntry.wage,
                                        newWage: savedWage,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            newData[monthKey].days[day].entries[emp.id] = {
                                hours, pay: Math.round(hours * savedWage), name: emp.name, wage: savedWage,
                                note: deletedNotes[emp.id] ? '' : (existingEntry?.note || ''),
                                submittedByEmp: existingEntry?.submittedByEmp || false,
                                empUid: existingEntry?.empUid || emp.empUid || null,
                                submittedHours: existingEntry?.submittedHours || null,
                                bossModified: existingEntry?.submittedByEmp ? (Math.abs(existingEntry.hours - hours) > 0.0001) : false
                            };
                        } else {
                            // ЖИ░ВА┤ ВІюЖ░ёВЮ┤ ВъѕВЌѕвіћвЇ░ ВѓГВаювљю Ж▓йВџ░ Рєњ ВДЂВЏљВЌљЖ▓ї ВЋївд╝
                            if (existingEntry?.hours > 0) {
                                const empUid = existingEntry?.empUid || emp.empUid;
                                if (empUid) {
                                    sendChangeNotification(empUid, {
                                        type: 'hours_deleted',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            delete newData[monthKey].days[day].entries[emp.id];
                        }
                    });
                    return newData;
                });

                // Жи╝вг┤Въљ вІгваЦВЌљвЈё в░ўВўЂ: submissions В╗гваЅВЁў вЈЎЖИ░ьЎћ (ЖИ░ВА┤ ВЌЁвЇ░ВЮ┤ьіИ + ВІаЖию ВЃЮВё▒)
                if (workspaceId && submissionUpdates.length > 0) {
                    submissionUpdates.forEach(({ empUid, employeeId, empName, hours, wage, isNew, note }) => {
                        const subsRef = fbDb.collection('workspaces').doc(workspaceId).collection('submissions');
                        if (hours > 0) {
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).set({
                                empUid, employeeId, empName, date: dateStr, hours, wage,
                                locked: true, bossEntered: isNew, note,
                                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true }).catch(() => {});
                        } else {
                            // ВІюЖ░ё 0ВЮ┤вЕ┤ submissionsВЌљВёювЈё ВѓГВаю
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).delete().catch(() => {});
                        }
                    });
                }

                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <form onSubmit={(e) => { e.preventDefault(); handleSave(); }} className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{month}ВЏћ {day}ВЮ╝ ВЃЂВёИ ВѕўВаЋ</h3>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">ВЮ╝ВЮ╝ вДцВХю (ВЏљ)</label>
                                <input 
                                    type="number" 
                                    value={revenue} 
                                    onChange={e => setRevenue(e.target.value)}
                                    className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="0"
                                />
                            </div>

                            <div className="pt-3 border-t border-gray-100">
                                <label className="block text-sm font-bold text-gray-700 mb-1">Жи╝вг┤ ВІюЖ░ё ВѕўВаЋ</label>
                                <p className="text-xs text-gray-400 mb-3">ВІюЖ░ё/вХё ВъЁваЦ ьЏё Enter Рєњ вІцВЮї Жи╝вг┤ВъљвАю ВЮ┤вЈЎ</p>
                                {combinedEmployees.map((emp, idx) => (
                                    <React.Fragment key={emp.id}>
                                        <div className={`mb-1 p-2 rounded-lg ${emp.isInactive ? (emp.inactiveStatus === 'leave' ? 'bg-yellow-50/50' : 'bg-red-50/50') : 'bg-gray-50'}`}>
                                            <div className="flex justify-between items-center">
                                                <span className="text-sm text-gray-700 truncate flex items-center gap-1 font-medium">
                                                    {emp.isInactive ? (
                                                        emp.inactiveStatus === 'leave'
                                                            ? <span className="text-xs text-yellow-600 bg-yellow-50 border border-yellow-200 px-1.5 py-0.5 rounded font-bold">ью┤ВДЂ</span>
                                                            : <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-bold">ьЄ┤Вѓг</span>
                                                    ) : (

                                                </span>

                                                    <span className="text-xs text-gray-500">ВІюЖ░ё</span>

                                                        onChange={e => setMinsData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                        onKeyDown={e => handleMinKeyDown(e, idx)}
                                                        className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                                        placeholder="0"
                                                    />
                                                    <span className="text-xs text-gray-500">вХё</span>

                                            </div>
                                            <div className="flex items-center gap-1 mt-1.5">
                                                <span className="text-[10px] text-gray-400 shrink-0">ВІюЖИЅ:</span>
                                                <input
                                                    type="number" min="0"
                                                    value={wageData[emp.id] ?? ''}
                                                    onChange={e => setWageData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    className="w-20 border border-gray-200 rounded px-2 py-0.5 text-right text-[11px] focus:ring-1 focus:ring-orange-400 outline-none bg-white"

                                        {currentDayData.entries[emp.id]?.submittedByEmp &&
                                         currentDayData.entries[emp.id]?.note &&
                                         !deletedNotes[emp.id] && (

                                                <div className="flex-1">

                                                    <p className="text-xs text-gray-700 whitespace-pre-wrap">{currentDayData.entries[emp.id].note}</p>
                                                </div>
                                                <button type="button" onClick={() => setDeletedNotes(p => ({...p, [emp.id]: true}))}
                                                    className="text-red-400 hover:text-red-600 transition shrink-0 mt-0.5" title="вЕћвфе ВѓГВаю">
                                                    <Trash2 className="w-3.5 h-3.5"/>

                                        )}
                                        {deletedNotes[emp.id] && (
                                            <p className="text-[10px] text-red-400 mb-2 ml-1">вЕћвфеЖ░ђ ВѓГВаювљЕвІѕвІц (ВађВъЦ ьЏё ВаЂВџЕ)</p>
                                        )}
                                    </React.Fragment>
                                ))}
                            </div>
                            
                            {/* ВБ╝ью┤ВѕўвІ╣ ВаЋв│┤ */}
                            {holidayEntries && holidayEntries.length > 0 && (
                                <div className="pt-3 border-t border-blue-200">
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-4">
                                        <div className="flex items-center gap-2 mb-2">
                                            <div className="w-2.5 h-2.5 rounded-full bg-blue-400"></div>
                                            <span className="text-sm font-bold text-blue-700">ВБ╝ью┤ВѕўвІ╣ в░юВЃЮ</span>

                                        <div className="space-y-1.5">
                                            {holidayEntries.map((h, i) => (
                                                <div key={i} className="text-sm">

                                                        <span className="text-gray-700">{h.name} <span className="text-xs text-gray-400">(ВБ╝ {h.weeklyHours.toFixed(1)}h)</span></span>
                                                        <span className="font-bold text-blue-600">{Number(h.holidayPay).toLocaleString()}ВЏљ</span>
                                                    </div>
                                                    <div className="text-[10px] text-gray-400">{Number(h.weeklyPay || 0).toLocaleString()}ВЏљ ├и 5</div>
                                                </div>
                                            ))}
                                        </div>
                                        <div className="mt-2 pt-2 border-t border-blue-200 flex justify-between items-center">
                                            <span className="text-xs font-bold text-blue-700">ьЋЕЖ│ё</span>
                                            <span className="font-bold text-blue-700">{holidayEntries.reduce((s, h) => s + h.holidayPay, 0).toLocaleString()}ВЏљ</span>

                            {/* вфев░ћВЮ╝ ВѓГВаю в▓ёьі╝ ВўЂВЌГ */}
                            {onDelete && (
                                <div className="pt-2 flex justify-center">
                                    <button type="button" onClick={onDelete} className="text-red-500 text-sm font-medium px-4 py-2 hover:bg-red-50 rounded-lg transition flex items-center gap-1">
                                        <Trash2 className="w-4 h-4" /> ВЮ┤ вѓаВДюВЮў ЖИ░вАЮ ВѓГВаю

                        </div>

                        <div className="p-4 border-t bg-white flex gap-3 shrink-0 rounded-b-2xl">
                            <button type="button" onClick={onClose} className="flex-1 py-3 text-sm bg-gray-100 font-medium text-gray-700 rounded-xl hover:bg-gray-200 transition">ВиеВєї</button>
                            <button type="submit" className="flex-1 py-3 text-sm bg-green-600 font-bold text-white rounded-xl hover:bg-green-700 transition shadow-sm">ВађВъЦ (Enter)</button>
