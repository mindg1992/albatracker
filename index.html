        function EmpSubmitModal({ date, empAccount, firebaseUser, onClose, showAlert, timeUnit }) {
            const [hoursInt, setHoursInt] = useState('');  // ВІюЖ░ё (ВаЋВѕў)
            const [halfOn, setHalfOn] = useState(false);   // half вфевЊю: 30вХё ьєаЖИђ
            const [minSlide, setMinSlide] = useState(0);   // ten вфевЊю: 0,10,20,30,40,50
            const [minsInt, setMinsInt] = useState('');    // minute вфевЊю: вХё ВДЂВаЉ ВъЁваЦ
            const [note, setNote] = useState('');
            const [loading, setLoading] = useState(false);

            // ВхюВбЁ ВІюЖ░ёЖ░њ(ВєїВѕў) Ж│ёВѓ░
            const computeHours = () => {
                const h = hoursInt === '' ? 0 : parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return null;
                if (timeUnit === 'hour') return h;
                if (timeUnit === 'half') return h + (halfOn ? 0.5 : 0);
                if (timeUnit === 'ten') return parseFloat((h + minSlide / 60).toFixed(4));
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return null;
                    return parseFloat((h + m / 60).toFixed(4));
                }
                return h;
            };

            const displayHours = () => {
                const h = hoursInt === '' ? 0 : parseInt(hoursInt, 10);
                if (isNaN(h)) return '-';
                if (timeUnit === 'hour') return `${h}ВІюЖ░ё`;
                if (timeUnit === 'half') return halfOn ? `${h}ВІюЖ░ё 30вХё` : `${h}ВІюЖ░ё`;
                if (timeUnit === 'ten') return minSlide > 0 ? `${h}ВІюЖ░ё ${minSlide}вХё` : `${h}ВІюЖ░ё`;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    return (!isNaN(m) && m > 0) ? `${h}ВІюЖ░ё ${m}вХё` : `${h}ВІюЖ░ё`;
                }
                return `${h}ВІюЖ░ё`;
            };

            const isValid = () => {
                const h = hoursInt === '' ? 0 : parseInt(hoursInt, 10);
                if (isNaN(h) || h < 0 || h > 24) return false;
                if (timeUnit === 'minute') {
                    const m = parseInt(minsInt, 10);
                    if (isNaN(m) || m < 0 || m > 59) return false;
                }
                return h > 0 || (timeUnit !== 'hour' && (halfOn || minSlide > 0 || parseInt(minsInt,10) > 0));
            };

            const handleSubmit = async () => {
                const finalHours = computeHours();
                if (finalHours === null || finalHours <= 0) {
                    showAlert('Вўгв░ћвЦИ Жи╝вг┤ВІюЖ░ёВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'error'); return;
                }
                setLoading(true);
                try {
                    await submitWorkHours(empAccount.bossUid, {
                        empUid: firebaseUser.uid,
                        employeeId: empAccount.employeeId,
                        empName: empAccount.name,
                        date,
                        hours: finalHours,
                        note: note.trim()
                    });
                    showAlert(`${date} Жи╝вг┤ВІюЖ░ё(${displayHours()})ВЮ┤ ВаюВХювљўВЌѕВіхвІѕвІц.`, 'ВаюВХю ВЎёвБї', 'success');
                    onClose();
                } catch(e) {
                    showAlert('ВаюВХю ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
                setLoading(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-end sm:items-center justify-center p-4 z-[9999]">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-sm p-6">
                        <div className="flex items-center justify-between mb-4">
                            <h3 className="text-lg font-bold text-gray-800">Жи╝вг┤ВІюЖ░ё ВъЁваЦ</h3>
                            <button onClick={onClose}><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        <p className="text-sm text-gray-500 mb-4">{date}</p>

                        <div className="mb-4">
                            <label className="block text-sm font-bold text-gray-700 mb-2">Жи╝вг┤ВІюЖ░ё</label>

                            {/* ВІюЖ░ё ВъЁваЦ (Ж│хьєх) */}
                            <div className="flex items-center gap-2 mb-3">
                                <input type="number" min="0" max="24" value={hoursInt} onChange={e => setHoursInt(e.target.value.replace(/[^0-9]/g,''))}
                                    className="w-24 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                    placeholder="0" autoFocus />
                                <span className="text-xl font-bold text-gray-600">ВІюЖ░ё</span>

                                {/* half вфевЊю: 30вХё ьєаЖИђ в▓ёьі╝ */}
                                {timeUnit === 'half' && (
                                    <button
                                        onClick={() => setHalfOn(p => !p)}
                                        className={`ml-2 px-4 py-3 rounded-xl font-bold text-sm border-2 transition ${halfOn ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-300 hover:border-blue-400'}`}
                                    >30вХё</button>
                                )}

                                {/* minute вфевЊю: вХё ВДЂВаЉ ВъЁваЦ */}
                                {timeUnit === 'minute' && (
                                    <>
                                        <input type="number" min="0" max="59" value={minsInt} onChange={e => setMinsInt(e.target.value.replace(/[^0-9]/g,''))}
                                            className="w-20 border-2 border-gray-300 rounded-xl py-3 px-2 text-center text-2xl font-bold focus:border-blue-500 outline-none"
                                            placeholder="0" />
                                        <span className="text-xl font-bold text-gray-600">вХё</span>
                                    </>
                                )}
                            </div>

                            {/* ten вфевЊю: ВігвЮ╝ВЮ┤вЊю ВёаьЃЮ (0,10,20,30,40,50вХё) */}
                            {timeUnit === 'ten' && (
                                <div>
                                    <div className="flex gap-2 flex-wrap">
                                        {[0,10,20,30,40,50].map(m => (
                                            <button key={m} onClick={() => setMinSlide(m)}
                                                className={`flex-1 py-2 rounded-lg text-sm font-bold border-2 transition ${minSlide === m ? 'bg-blue-600 text-white border-blue-600' : 'bg-white text-gray-600 border-gray-200 hover:border-blue-400'}`}>
                                                {m === 0 ? 'ВаЋЖ░Ђ' : `+${m}вХё`}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {/* в»Ивдгв│┤ЖИ░ */}
                            {hoursInt !== '' && (
                                <div className="mt-3 text-center text-blue-600 font-bold text-lg">{displayHours()}</div>
                            )}
                        </div>

                        <div className="mb-6">
                            <label className="block text-sm font-bold text-gray-700 mb-1">вЕћвфе (ВёаьЃЮ)</label>
                            <input type="text" value={note} onChange={e => setNote(e.target.value)}
                                className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-blue-500 outline-none text-sm"
                                placeholder="ьі╣ВЮ┤ВѓгьЋГ ВъЁваЦ (Ж┤ђвдгВъљВЌљЖ▓ї Ж│хВюављЕвІѕвІц)" />
                        </div>
                        <div className="bg-yellow-50 border border-yellow-200 rounded-xl p-3 mb-4">
                            <p className="text-xs text-yellow-700 font-medium">Рџа№ИЈ ВаюВХю ьЏёВЌљвіћ ВѕўВаЋьЋа Вѕў ВЌєВіхвІѕвІц. ВІаВцЉьЋўЖ▓ї ВъЁваЦьЋ┤ВБ╝ВёИВџћ.</p>
                        </div>
                        <button onClick={handleSubmit} disabled={loading || !isValid()}
                            className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50">
                            {loading ? 'ВаюВХю ВцЉ...' : 'ВаюВХюьЋўЖИ░'}
                        </button>
                    </div>
                </div>
            );
        }

        // РћђРћђРћђ Ж┤ђвдгВъљ: Ж░юВЮИ Жи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐ ьјИВДЉ ьїЮВЌЁ РћђРћђРћђ
        function PersonalContractTemplateModal({ emp, globalTemplate, workspaceId, firebaseUser, setEmployees, showAlert, onClose, onSaveComplete, reason }) {
            const baseTemplate = globalTemplate || {};
            const [title, setTitle] = useState(baseTemplate?.title || 'Жи╝вАюЖ│ёВЋйВёю');
            const [sections, setSections] = useState(
                baseTemplate?.sections?.length >= 1
                    ? baseTemplate.sections.map(s => ({ ...s }))
                    : [{ content: '', instruction: '' }]
            );
            const [ownerInfo, setOwnerInfo] = useState(
                baseTemplate?.ownerInfo
                    ? { ...baseTemplate.ownerInfo, signatureData: '' }
                    : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }
            );
            const [saving, setSaving] = useState(false);
            const [loadingPersonal, setLoadingPersonal] = useState(!!emp.empUid);

            // ЖИ░ВА┤ВЌљ ВађВъЦвљю Ж░юВЮИ ьЁюьћївд┐ВЮ┤ ВъѕВю╝вЕ┤ Вџ░Вёа вАювЊю (ВЮ┤Ваё ВѕўВаЋ вѓ┤ВџЕ + ВёювфЁ ВюаВДђ)
            // Ж░юВЮИ ьЁюьћївд┐ВЮ┤ ВЌєЖ│а ЖИђвАюв▓ї ьЁюьћївд┐вЈё ВѓГВаювљю Ж▓йВџ░, ЖИ░ВА┤ВЌљ ВъЉВё▒ ВЎёвБївљю Ж│ёВЋйВёю(.contract)ВЌљВёю ьЁюьћївд┐ ЖхгВА░ в│хВЏљ
            useEffect(() => {
                if (!emp.empUid) { setLoadingPersonal(false); return; }
                const bossUid = workspaceId || firebaseUser.uid;
                fbDb.collection('employeeAccounts').doc(emp.empUid)
                    .collection('workplaces').doc(bossUid).get()
                    .then(doc => {
                        const data = doc.data() || {};
                        const personal = data.contractTemplate;
                        if (personal) {
                            setTitle(personal.title || 'Жи╝вАюЖ│ёВЋйВёю');
                            setSections(personal.sections?.length >= 1 ? personal.sections.map(s => ({ ...s })) : [{ content: '', instruction: '' }]);
                            // signatureDataвЈё ЖиИвїђвАю Ж░ђВаИВў┤ Рђћ ВЃѕвАю ЖиИвдгвЕ┤ вЇ«Вќ┤ВЊ░Ж│а, ВЋѕ ЖиИвдгвЕ┤ ЖИ░ВА┤ ВюаВДђ
                            setOwnerInfo(personal.ownerInfo ? { ...personal.ownerInfo } : (baseTemplate?.ownerInfo ? { ...baseTemplate.ownerInfo } : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }));
                        } else if (data.contract && !(baseTemplate?.sections?.length >= 1)) {
                            // ьЁюьћївд┐ВЮ┤ ВѓГВаювљўВЌѕВДђвДї ЖИ░ВА┤ ВъЉВё▒вљю Ж│ёВЋйВёюЖ░ђ ВъѕВю╝вЕ┤ ЖиИ вѓ┤ВџЕВю╝вАю ьЈ┤в░▒
                            const c = data.contract;
                            setTitle(c.title || 'Жи╝вАюЖ│ёВЋйВёю');
                            setSections(c.sections?.length >= 1
                                ? c.sections.map(s => ({ content: s.content || '', instruction: s.instruction || '' }))
                                : [{ content: '', instruction: '' }]);
                            setOwnerInfo(c.ownerInfo ? { ...c.ownerInfo } : { shopName: '', phone: '', address: '', representative: '', signatureData: '' });
                        }
                    })
                    .catch(() => {})
                    .finally(() => setLoadingPersonal(false));
            }, []);

            const addSection = () => setSections(prev => [...prev, { content: '', instruction: '' }]);
            const removeSection = (i) => { if (sections.length <= 1) return; setSections(prev => prev.filter((_, j) => j !== i)); };
            const updateSection = (i, key, val) => setSections(prev => prev.map((s, j) => j === i ? { ...s, [key]: val } : s));

            const handleSave = async () => {
                if (!title.trim()) { showAlert('ВаювфЕВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                if (sections.some(s => !s.content.trim())) { showAlert('вфевЊа вѓ┤ВџЕВ╣ИВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                const fallbackSig = globalTemplate?.ownerInfo?.signatureData || '';
                if (!ownerInfo.signatureData && !fallbackSig) {
                    showAlert('ВёювфЁВЮ┤ ьЋёВџћьЋЕвІѕвІц.', 'ВъЁваЦ ВўцвЦў', 'alert');
                    return;
                }
                setSaving(true);
                try {
                    const finalOwnerInfo = ownerInfo.signatureData
                        ? ownerInfo
                        : { ...ownerInfo, signatureData: fallbackSig };
                    const template = { title: title.trim(), sections, ownerInfo: finalOwnerInfo };
                    const bossUid = workspaceId || firebaseUser.uid;
                    if (emp.empUid) {
                        // вфевЊа Ж▓йвАю ьєхВЮ╝: pendingRewrite=true + needs_resignВю╝вАю ВъгВъЉВё▒ ВџћВ▓Г
                        // needs_resignВЮђ Firestore ЖиюВ╣Ў ьўИьЎўВё▒ в░Ј ВъгВаюВХю ьЮљвдё в│┤ВъЦВџЕ
                        await fbDb.collection('employeeAccounts').doc(emp.empUid)
                            .collection('workplaces').doc(bossUid)
                            .update({
                                contractTemplate: template,
                                contractStatus: 'needs_resign',
                                pendingRewrite: true,
                                contractDeleteRequest: firebase.firestore.FieldValue.delete(),
                                contractUpdateRequired: firebase.firestore.FieldValue.delete()
                            });
                        setEmployees(prev => prev.map(e => e.id === emp.id ? { ...emp, contractStatus: 'needs_resign', pendingRewrite: true, contractDeleteRequest: null, contractUpdateRequired: false } : e));
                        // ВІюЖИЅ в│ђЖ▓йВю╝вАю ВЮИьЋю ьЁюьћївд┐ ВъгВъЉВё▒ ВІю ВІюЖИЅ в│ђЖ▓й ВЋївд╝ в░юВєА
                        if (reason === 'wage_change' && emp._oldWage != null) {
                            const oldW = Number(emp._oldWage);
                            const newW = Number(emp.wage);
                            if (oldW !== newW) {
                                sendWageChangeNotification(emp.empUid, bossUid, oldW, newW).catch(() => {});
                            }
                        }
                        const verb = reason === 'new_contract' ? 'ВъЉВё▒' : 'ВъгВъЉВё▒';
                        showAlert(`${emp.name}вІўВЌљЖ▓ї Жи╝вАюЖ│ёВЋйВёю ${verb}ВЮ┤ ВџћВ▓ГвљўВЌѕВіхвІѕвІц.`, 'ВџћВ▓Г ВЎёвБї', 'success');
                    }
                    (onSaveComplete || onClose)();
                } catch(e) { showAlert('ВађВъЦ ВІцьїе: ' + e.message, 'ВўцвЦў', 'error'); }
                setSaving(false);
            };

            if (loadingPersonal) return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center">
                    <div className="bg-white rounded-2xl p-8 flex flex-col items-center gap-3">
                        <div className="w-8 h-8 border-4 border-purple-300 border-t-purple-600 rounded-full animate-spin"></div>
                        <p className="text-sm text-gray-600">Ж│ёВЋйВёю вХѕвЪгВўцвіћ ВцЉ...</p>
                    </div>
                </div>
            );

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4">
                    <div className="bg-white rounded-2xl w-full max-w-lg my-4">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <div className="bg-purple-100 p-2 rounded-xl">
                                    <svg className="w-5 h-5 text-purple-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                                </div>
                                <div>
                                    <h2 className="text-base font-bold text-gray-800">{emp.name}вІў Жи╝вАюЖ│ёВЋйВёю {reason === 'new_contract' ? 'ВъЉВё▒ ВџћВ▓Г' : 'ВъгВъЉВё▒ ВџћВ▓Г'}</h2>
                                    <p className="text-xs text-gray-500">
                                        {reason === 'new_contract' ? 'ВІаЖию Ж░юВЮИ Жи╝вАюЖ│ёВЋйВёю ВъЉВё▒' : (reason === 'rewrite_request' || reason === 'boss_rewrite') ? 'Ж┤ђвдгВъљ ВДЂВаЉ ВъгВъЉВё▒ ВџћВ▓Г' : 'ВІюЖИЅ в│ђЖ▓йВю╝вАю ВЮИьЋю Ж░юВЮИ Ж│ёВЋйВёю ВЌЁвЇ░ВЮ┤ьіИ'}
                                    </p>
                                </div>
                            </div>
                            {reason !== 'new_contract' && (
                                <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition">
                                    <X className="w-5 h-5" />
                                </button>
                            )}
                        </div>

                        <div className="p-5 space-y-4 max-h-[65vh] overflow-y-auto">
                            <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-xs text-blue-700">
                                {reason === 'new_contract'
                                    ? `${emp.name}вІў ВаёВџЕ Жи╝вАюЖ│ёВЋйВёювЦ╝ ВЃѕвАю ВъЉВё▒ьЋЕвІѕвІц. вѓ┤ВџЕ ВъЉВё▒ ьЏё ВађВъЦьЋўвЕ┤ ьЋ┤вІ╣ Жи╝вг┤ВъљВЌљЖ▓ї Ж│ёВЋйВёю ВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.`
                                    : (reason === 'rewrite_request' || reason === 'boss_rewrite')
                                    ? `${emp.name}вІўВЌљЖ▓ї Жи╝вАюЖ│ёВЋйВёю ВъгВъЉВё▒ВЮё ВџћВ▓ГьЋЕвІѕвІц. вѓ┤ВџЕВЮё ВѕўВаЋ ьЏё ВађВъЦьЋўвЕ┤ ьЋ┤вІ╣ Жи╝вг┤ВъљВЌљЖ▓ї ВъгВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.`
                                    : `ВІюЖИЅВЮ┤ в│ђЖ▓йвљю ${emp.name}вІў ВаёВџЕ Жи╝вАюЖ│ёВЋйВёюВъЁвІѕвІц. вѓ┤ВџЕВЮё ВѕўВаЋ ьЏё ВађВъЦьЋўвЕ┤ ьЋ┤вІ╣ Жи╝вг┤ВъљВЌљЖ▓ї ВъгВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.`}
                            </div>

                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">Ж│ёВЋйВёю ВаювфЕ</label>
                                <input value={title} onChange={e => setTitle(e.target.value)}
                                    className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-purple-500 outline-none text-sm"
                                    placeholder="Жи╝вАюЖ│ёВЋйВёю" />
                            </div>

                            {sections.map((s, i) => (
                                <div key={i} className="border-2 border-gray-200 rounded-xl p-4 space-y-3 relative">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-xs font-bold text-gray-500">ьЋГвфЕ {i + 1}</span>
                                        {sections.length > 1 && (
                                            <button onClick={() => removeSection(i)} className="text-red-400 hover:text-red-600 text-xs">ВѓГВаю</button>
                                        )}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">вѓ┤ВџЕ (Ж┤ђвдгВъљ ВъЉВё▒)</label>
                                        <textarea value={s.content} onChange={e => updateSection(i, 'content', e.target.value)} rows={3}
                                            className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-purple-400 outline-none resize-none"
                                            placeholder="Вўѕ: ВЌЁвг┤вѓ┤ВџЕ, ВєїВаЋЖи╝вАюВІюЖ░ё, ВъёЖИѕ вЊ▒" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">ВДђВІю (Жи╝вг┤ВъљВЌљЖ▓ї Вќ┤вќ╗Ж▓ї ВъЉВё▒ьЋўЖ▓ї ьЋаВДђ)</label>
                                        <input value={s.instruction} onChange={e => updateSection(i, 'instruction', e.target.value)}
                                            className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none"
                                            placeholder='Вўѕ: Вюё вѓ┤ВџЕВЌљ вЈЎВЮўьЋЕвІѕвІц.' />
                                    </div>
                                </div>
                            ))}

                            <button onClick={addSection} className="w-full border-2 border-dashed border-gray-300 text-gray-500 py-2.5 rounded-xl text-sm hover:border-purple-400 hover:text-purple-600 transition">
                                + вѓ┤ВџЕ ВХћЖ░ђьЋўЖИ░
                            </button>

                            <div className="border-2 border-blue-200 rounded-xl p-4 space-y-3 bg-blue-50">
                                <p className="text-xs font-bold text-blue-700">ВѓгВЌЁВБ╝ ВаЋв│┤ (ьЋГВЃЂ ВхюьЋўвІе Ж│аВаЋ)</p>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВѓгВЌЁВ▓┤вфЁ</label>
                                    <input value={ownerInfo.shopName} onChange={e => setOwnerInfo(p => ({...p, shopName: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="Вўѕ: ьЎЇЖИИвЈЎ В╣┤ьјў" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВаёьЎћв▓ѕьўИ</label>
                                    <input value={ownerInfo.phone} onChange={e => setOwnerInfo(p => ({...p, phone: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"
                                        placeholder="010-0000-0000" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВБ╝Вєї</label>
                                    <input value={ownerInfo.address} onChange={e => setOwnerInfo(p => ({...p, address: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white"

            const [minWageTemplateAfterSave, setMinWageTemplateAfterSave] = useState(null); // { affectedEmps }
            const [bulkDispatchOpen, setBulkDispatchOpen] = useState(false);
            // pendingContractUpdateEmpIdsвіћ вХђвфе В╗┤ьЈгвёїьіИВЌљВёю liftвљю propВю╝вАю в░ЏВЮї (TabCalendar/в░░вёѕВЌљВёювЈё ВѓгВџЕ)

            const handleOpenBulkDispatch = () => {
                if (!workspaceInfo?.contractTemplate) {
                    showAlert('ВёцВаЋВЌљВёю Жи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐ВЮё ве╝Вађ ВъЉВё▒ьЋўВёИВџћ.', 'ВЋѕвѓ┤', 'info');
                    return;
                }
                const targets = employees.filter(emp => emp.empUid && emp.status !== 'resigned' && emp.status !== 'leave' && (
                    pendingContractUpdateEmpIds.has(emp.id) ||
                    emp.contractUpdateRequired ||
                    (!emp.contractStatus || emp.contractStatus === null)
                ));
                if (targets.length === 0) {
                    showAlert('Жи╝вАюЖ│ёВЋйВёю в░юВєАВЮ┤ ьЋёВџћьЋю Жи╝вг┤ВъљЖ░ђ ВЌєВіхвІѕвІц.', 'ВЋѕвѓ┤', 'info');
                    return;
                }
                setBulkDispatchOpen(true);
            };

            // ьїЮВЌЁ ВЌ┤вацВъѕвіћ вЈЎВЋѕ ьЋ┤вІ╣ ВДЂВЏљ workplaces вгИВёю ВІцВІюЖ░ё Ж░љВДђ
            // Рєњ Жи╝вг┤ВъљЖ░ђ вЈЎВЮўьЋўвЕ┤ ВдЅВІю employees ВЃЂьЃю в░ўВўЂ (ьїЮВЌЁ вІФЖИ░ ВаёВЌљвЈё Ж░▒ВІа)
            useEffect(() => {
                if (!viewingContract || !firebaseUser || !currentWorkspaceId) return;
                const empUid = viewingContract.empUid;
                if (!empUid) return;
                const unsub = fbDb.collection('employeeAccounts').doc(empUid)
                    .collection('workplaces').doc(currentWorkspaceId)
                    .onSnapshot(doc => {
                        if (!doc.exists) return;
                        const data = doc.data();
                        const newDeleteReq = data?.contractDeleteRequest || null;
                        const newContractStatus = data?.contractStatus || null;
                        const hasContract = !!data?.contract;
                        setModalDeleteReq(newDeleteReq);
                        setEmployees(prev => prev.map(e =>
                            e.empUid === empUid ? {
                                ...e,
                                contractDeleteRequest: newDeleteReq,
                                contractStatus: newContractStatus,
                                contract: hasContract ? data.contract : (e.contract || null),
                                pendingRewrite: data?.pendingRewrite || false
                            } : e
                        ));
                    }, () => {});
                return () => unsub();
            }, [viewingContract?.empUid, firebaseUser, currentWorkspaceId]);

            const filteredEmployees = useMemo(() => {
                const minW = Number(globalMinWage);
                const isLowWage = (emp) => emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < minW;
                const visible = employees.filter(emp => emp.status !== 'deleted');
                const list = searchTerm ? visible.filter(emp => emp.name.includes(searchTerm)) : [...visible];
                return list.sort((a, b) => {
                    const aPending = pendingContractUpdateEmpIds.has(a.id);
                    const bPending = pendingContractUpdateEmpIds.has(b.id);
                    if (aPending && !bPending) return -1;
                    if (!aPending && bPending) return 1;
                    const aLow = isLowWage(a), bLow = isLowWage(b);
                    if (aLow && !bLow) return -1;
                    if (!aLow && bLow) return 1;
                    return a.displayId - b.displayId;
                });
            }, [employees, searchTerm, globalMinWage, pendingContractUpdateEmpIds]);

            const handleMinWageSave = (newVal) => {
                const oldVal = globalMinWage;
                setGlobalMinWage(newVal);
                setMinWageModalOpen(false);
                const newMin = Number(newVal);

                // ЖИ░ВА┤ ВхюВађВІюЖИЅЖ│╝ вЈЎВЮ╝ьЋўЖ▓ї ВёцВаЋвљю Жи╝вг┤Въљ ВІюЖИЅ ВъљвЈЎ ВЌЁвЇ░ВЮ┤ьіИ
                const equalWageEmps = employees.filter(emp => Number(emp.wage) === Number(oldVal) && Number(emp.wage) > 0);
                if (equalWageEmps.length > 0) {
                    setEmployees(prev => prev.map(e =>
                        Number(e.wage) === Number(oldVal) && Number(e.wage) > 0 ? { ...e, wage: newMin } : e
                    ));
                    if (currentWorkspaceId) {
                        equalWageEmps.forEach(emp => {
                            if (emp.empUid) {
                                sendWageChangeNotification(emp.empUid, currentWorkspaceId, Number(oldVal), newMin).catch(() => {});
                                fbDb.collection('employeeAccounts').doc(emp.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ wageBelowMin: firebase.firestore.FieldValue.delete() })
                                    .catch(() => {});
                            }
                        });
                    }
                }

                // wageBelowMin ьћївъўЖиИ ВЌЁвЇ░ВЮ┤ьіИ (ВІюЖИЅВЮ┤ ВхюВађВІюЖИЅЖ│╝ вІцвЦИ Жи╝вг┤Въљ вїђВЃЂ)
                const nowLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) < newMin && Number(emp.wage) !== Number(oldVal));
                const noLongerLowEmps = employees.filter(emp => emp.empUid && emp.wage && Number(emp.wage) > 0 && Number(emp.wage) >= newMin && Number(emp.wage) < Number(oldVal));
                if (currentWorkspaceId && (nowLowEmps.length > 0 || noLongerLowEmps.length > 0)) {
                    const batch = fbDb.batch();
                    nowLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: true });
                    });
                    noLongerLowEmps.forEach(emp => {
                        batch.update(fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId), { wageBelowMin: firebase.firestore.FieldValue.delete() });
                    });
                    batch.commit().catch(() => {});
                }
                // ВхюВађВІюЖИЅ ВаЂВџЕ ВцЉВЮИ Жи╝вг┤Въљ(ВІюЖИЅ в»ИВёцВаЋ вўљвіћ ВЮ┤Ваё ВхюВађВІюЖИЅЖ│╝ вЈЎВЮ╝) ВцЉ Ж│ёВЋй ВЎёвБїВъљвДї
                const affectedEmps = employees.filter(emp => {
                    const usesMinWage = !emp.wage || Number(emp.wage) === 0 || Number(emp.wage) === Number(oldVal);
                    return usesMinWage && emp.contractStatus === 'completed';
                });
                if (affectedEmps.length === 0) return;

                // ВѓгВъЦ ВИА В╣┤вЊю ьЉюВІю (вЕћвфевдг)
                setPendingContractUpdateEmpIds(new Set(affectedEmps.map(e => e.id)));

                // ВДЂВЏљ ВИАВЌљвЈё вЈЎВЮ╝ьЋю ВІаьўИ ВаёвІг Рђћ ЖИђвАюв▓ї ьЁюьћївд┐ Вюавг┤ВЎђ вг┤Ж┤ђьЋўЖ▓ї contractUpdateRequired=true ВађВъЦ.
                // ЖИђвАюв▓ї ьЁюьћївд┐ВЮ┤ ВъѕВќ┤ вфевІгВЮ┤ вќавЈё, ВѓгВъЦВЮ┤ ЖиИ вфевІгВЮё вІФВю╝вЕ┤ ВДЂВЏљВЮў ВІюЖИЅВЮђ ВЮ┤в»И в░ћвђљ В▒ёвАю
                // Ж│ёВЋйВёюЖ░ђ в»ИВѕўВаЋ ВЃЂьЃюЖ░ђ вљўв»ђвАю ВДЂВЏљ ВИА ВЋѕвѓ┤┬иВъЁваЦ В░евІеВЮ┤ ьЋёВџћьЋе.
                // ВѓгВъЦВЮ┤ вфевІгВЮё ВаЋВЃЂ ВађВъЦьЋўЖ▒░вѓў Ж░юв│ё ВъЉВё▒ВџћВ▓ГВЮё в│┤вѓ┤вЕ┤ вЉљ вфевІгВЮў handleSaveЖ░ђ ВЮ┤ ьЋёвЊювЦ╝ ьЂ┤вдгВќ┤ьЋе.
                const empsWithUid = affectedEmps.filter(emp => emp.empUid);
                if (currentWorkspaceId && empsWithUid.length > 0) {
                    const batch = fbDb.batch();
                    empsWithUid.forEach(emp => {
                        batch.update(
                            fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(currentWorkspaceId),
                            { contractUpdateRequired: true }
                        );
                    });
                    batch.commit().catch(e => {
                        console.error('contractUpdateRequired update failed:', e);
                        showAlert('Жи╝вАюЖ│ёВЋйВёю ВѕўВаЋьЋёВџћ ВІаьўИ ВађВъЦ ВІцьїе: ' + (e?.message || 'ВЋї Вѕў ВЌєВЮї'), 'ВађВъЦ ВІцьїе', 'error');
                    });
                    setEmployees(prev => prev.map(e =>
                        empsWithUid.some(a => a.id === e.id) ? { ...e, contractUpdateRequired: true } : e
                    ));
                }

                // ЖИђвАюв▓ї ьЁюьћївд┐ВЮ┤ Въѕвіћ Ж▓йВџ░: ВЮ╝Ж┤ё ВъгВъЉВё▒ ВџћВ▓Г вфевІг ьЉюВІю (ВађВъЦ ВІю contractUpdateRequired ВъљвЈЎ ьЂ┤вдгВќ┤)
                if (workspaceInfo?.contractTemplate) {
                    setMinWageTemplateAfterSave({ affectedEmps });
                }
            };

            const handleAddClick = () => {
                if (globalMinWage === '' || Number(globalMinWage) <= 0) {
                    showAlert('ьўёВъг ВхюВађВІюЖИЅВЮё ве╝Вађ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.\nВхюВађВІюЖИЅВЮ┤ ВёцВаЋвљўВќ┤ВЋ╝ Жи╝вг┤ВъљвЦ╝ ВХћЖ░ђьЋа Вѕў ВъѕВіхвІѕвІц.', 'ВЋѕвѓ┤');
                    return;
                }
                setEditingEmp(null);
                setIsModalOpen(true);
            };

            const handleSave = (empData) => {
                const { displayId, ...dataToSave } = empData;

                if (editingEmp) {
                    const oldStatus = editingEmp.status || (editingEmp.isWorking === false ? 'resigned' : 'working');
                    const newStatus = dataToSave.status;

                    // ВІюЖИЅ в│ђЖ▓й Ж░љВДђ: Ж│ёВЋйВёюЖ░ђ ВЎёвБївљљЖ▒░вѓў ВъгВъЉВё▒ вїђЖИ░ ВцЉВЮИ Жи╝вг┤ВъљВЮў ВІюЖИЅВЮ┤ в░ћвђївЕ┤ ВъгВъЉВё▒ ьЋёВџћ
                    const oldWage = Number(editingEmp.wage) || Number(globalMinWage);
                    const newWage = Number(dataToSave.wage) || Number(globalMinWage);
                    const wageChanged = oldWage !== newWage;
                    const resolvedWage = (dataToSave.wage && Number(dataToSave.wage) > 0)
                        ? dataToSave.wage
                        : (Number(globalMinWage) > 0 ? Number(globalMinWage) : '');
                    let finalData = { ...dataToSave, wage: resolvedWage };
                    if (wageChanged && (editingEmp.contractStatus === 'completed' || editingEmp.contractStatus === 'needs_resign' || editingEmp.contractStatus === 'pending_boss')) {
                        const hadPersonalWage = editingEmp.wage && Number(editingEmp.wage) > 0;
                        const hasPersonalWage = dataToSave.wage && Number(dataToSave.wage) > 0;
                        if (hasPersonalWage) {
                            // Ж░юв│ё ВІюЖИЅ Рєњ Ж░юв│ё ВІюЖИЅ в│ђЖ▓й: Ж░юВЮИ Жи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐ ьјИВДЉ ьїЮВЌЁ ВЌ┤ЖИ░
                            // setEmployeesвіћ ьїЮВЌЁ ВађВъЦ ВІюВаљВЌљвДї ьўИВХю (ВЋ▒ ВъгВІюВъЉ ВІю ВІюЖИЅ ВЏљв│х в│┤ВъЦ)
                            setPersonalTemplateReason('wage_change');
                            setPersonalTemplateTarget({ ...finalData, _oldWage: oldWage });
                            setIsModalOpen(false);
                            setEditingEmp(null);
                            // early return ВаёВЌљ wageBelowMin + ВЮ┤вдё в│ђЖ▓й ВдЅВІю в░ўВўЂ
                            if (dataToSave.empUid && currentWorkspaceId) {
                                const isLow = Number(finalData.wage) > 0 && Number(finalData.wage) < Number(globalMinWage);
                                const wpUpdate = { wageBelowMin: isLow ? true : firebase.firestore.FieldValue.delete() };
                                if (editingEmp.name !== dataToSave.name) wpUpdate.name = dataToSave.name;
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update(wpUpdate)
                                    .catch(() => {});
                            }
                            return;
                        } else if (hadPersonalWage && !hasPersonalWage) {
                            // Ж░юв│ё ВІюЖИЅ Рєњ Ж│хвъђ(ВхюВађВІюЖИЅ) ВаёьЎў: pendingRewrite + needs_resignВю╝вАю ВъгВъЉВё▒ ВџћВ▓Г
                            finalData = { ...finalData, contractStatus: 'needs_resign', pendingRewrite: true };
                            if (dataToSave.empUid && currentWorkspaceId) {
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ contractStatus: 'needs_resign', pendingRewrite: true })
                                    .catch(() => {});
                            }
                            showAlert('ВІюЖИЅВЮ┤ ВхюВађВІюЖИЅВю╝вАю в│ђЖ▓йвљўВЌѕВіхвІѕвІц.\nЖи╝вг┤ВъљВЌљЖ▓ї Ж│ёВЋйВёю ВъгВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.', 'в│ђЖ▓й ВЎёвБї', 'success');
                        } else if (workspaceInfo?.contractTemplate) {
                            // ВхюВађВІюЖИЅ Жи╝вг┤Въљ: pendingRewrite + needs_resignВю╝вАю ВъгВъЉВё▒ ВџћВ▓Г (ЖИђвАюв▓ї ьЁюьћївд┐ ВѕўВаЋ ВЋѕвѓ┤)
                            finalData = { ...finalData, contractStatus: 'needs_resign', pendingRewrite: true };
                            showAlert('ВІюЖИЅВЮ┤ в│ђЖ▓йвљўВЌѕВіхвІѕвІц.\n\nЖи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐ВЌљ ЖИ░Въгвљю ВІюЖИЅ ьЋГвфЕВЮё ВЃѕ ВІюЖИЅВю╝вАю ВѕўВаЋьЋ┤ВЋ╝ Жи╝вг┤ВъљВЌљЖ▓ї Ж│ёВЋйВёю ВъгВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.\n\nьЎЋВЮИВЮё вѕёвЦ┤вЕ┤ ьЁюьћївд┐ ВѕўВаЋ ьЎћвЕ┤Вю╝вАю ВЮ┤вЈЎьЋЕвІѕвІц.', 'Ж│ёВЋйВёю ВъгВъЉВё▒ ьЋёВџћ', 'alert', () => setActiveTab('settings'));
                            if (dataToSave.empUid && currentWorkspaceId) {
                                fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ contractStatus: 'needs_resign', pendingRewrite: true })
                                    .catch(() => {});
                            }
                        }
                    }

                    setEmployees(prev => prev.map(e => e.id === finalData.id ? finalData : e));

                    // ВІюЖИЅ в│ђЖ▓й ВІю Google ВДЂВЏљВЌљЖ▓ї ВЋївд╝ в░юВєА + wageBelowMin ьћївъўЖиИ ВЌЁвЇ░ВЮ┤ьіИ
                    if (wageChanged && dataToSave.empUid) {
                        sendWageChangeNotification(
                            dataToSave.empUid,
                            currentWorkspaceId,
                            Number(editingEmp.wage) || Number(globalMinWage),
                            Number(finalData.wage) || Number(globalMinWage)
                        ).catch(() => {});
                    }
                    if (dataToSave.empUid && currentWorkspaceId) {
                        const isLow = finalData.wage && Number(finalData.wage) > 0 && Number(finalData.wage) < Number(globalMinWage);
                        fbDb.collection('employeeAccounts').doc(dataToSave.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ wageBelowMin: isLow ? true : firebase.firestore.FieldValue.delete() })
                            .catch(() => {});
                    }

                    if (oldStatus !== newStatus) {
                        // Google ВДЂВЏљВЮ┤вЕ┤ workplaces ВёювИїВ╗гваЅВЁў workStatus ВЌЁвЇ░ВЮ┤ьіИ + ВЋївд╝
                        const empUid = dataToSave.empUid;
                        if (empUid && currentWorkspaceId) {
                            fbDb.collection('employeeAccounts').doc(empUid)
                                .collection('workplaces').doc(currentWorkspaceId)
                                .update({ workStatus: newStatus })
                                .catch(() => {});
                            sendStatusChangeNotification(empUid, currentWorkspaceId, newStatus).catch(() => {});
                        }

                        if (oldStatus === 'working' && newStatus === 'leave') {
                            showAlert(`${dataToSave.name}вІўВЮ┤ ью┤ВДЂ В▓ўвдгвљўВЌѕВіхвІѕвІц.\nВЮ┤Ваю ВЏћв│ё Жи╝вг┤ВІюЖ░ё ВъЁваЦВЌљВёю ВаюВЎИвљЕвІѕвІц.`, 'в│ђЖ▓й ВЎёвБї', 'alert');
                        } else if (oldStatus !== 'resigned' && newStatus === 'resigned') {
                            showAlert(`${dataToSave.name}вІўВЮ┤ ьЄ┤Вѓг В▓ўвдгвљўВЌѕВіхвІѕвІц.\nВЮ┤Ваю ВЏћв│ё Жи╝вг┤ВІюЖ░ё ВъЁваЦВЌљВёю ВаюВЎИвљЕвІѕвІц.`, 'в│ђЖ▓й ВЎёвБї', 'alert');
                        } else if ((oldStatus === 'leave' || oldStatus === 'resigned') && newStatus === 'working') {
                            showAlert(`${dataToSave.name}вІўВЮ┤ Жи╝вг┤ ВцЉ ВЃЂьЃювАю в│ђЖ▓йвљўВЌѕВіхвІѕвІц.\nВЏћв│ё Жи╝вг┤ВІюЖ░ё ВъЁваЦВЌљ ьЈгьЋевљЕвІѕвІц.`, 'в│ђЖ▓й ВЎёвБї', 'success');
                        }
                    }
                } else {
                    const newEmpWage = (dataToSave.wage && Number(dataToSave.wage) > 0)
                        ? dataToSave.wage
                        : (Number(globalMinWage) > 0 ? Number(globalMinWage) : '');
                    setEmployees(prev => [...prev, { ...dataToSave, wage: newEmpWage }]);
                    setNextEmpId(prev => prev + 1);
                }
                // ВЮ┤вдё в│ђЖ▓й ВІю ВДЂВЏљ workplacesВЌљвЈё в░ўВўЂ + ВЋївд╝ в░юВєА
                if (editingEmp && editingEmp.name !== dataToSave.name) {
                    if (editingEmp.empUid && currentWorkspaceId) {
                        fbDb.collection('employeeAccounts').doc(editingEmp.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ name: dataToSave.name })
                            .catch(() => {});
                        addEmpNotification(editingEmp.empUid, {
                            type: 'name_change',
                            oldName: editingEmp.name,
                            newName: dataToSave.name,
                            bossUid: currentWorkspaceId
                        }).catch(() => {});
                    }
                }
                // Ж░юв│ё Ж│хВаюВюе в│ђЖ▓й ВІю ВДЂВЏљ workplacesВЌљвЈё в░ўВўЂ
                if (editingEmp && editingEmp.empUid && currentWorkspaceId && workspaceInfo?.insuranceMode === 'individual') {
                    const oldRate = parseFloat(editingEmp.insuranceRate) || 0;
                    const newRate = parseFloat(dataToSave.insuranceRate) || 0;
                    const oldName = editingEmp.insuranceName || '';
                    const newName = dataToSave.insuranceName || '';
                    if (oldRate !== newRate || oldName !== newName) {
                        fbDb.collection('employeeAccounts').doc(editingEmp.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ insuranceName: newName, insuranceRate: newRate })
                            .catch(() => {});
                    }
                }

                setIsModalOpen(false);
                setEditingEmp(null);
            };

            const handleDelete = (emp) => {
                showConfirm('ВаЋвДљ ВЮ┤ Жи╝вг┤ВъљвЦ╝ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?\n(ЖИ░ВА┤ Жи╝вг┤ ЖИ░вАЮВЮђ ВЏћв│ё ьўёьЎЕВЌљ ВюаВДђвљЕвІѕвІц)\nЖ░ЎВЮђ Google Ж│ёВаЋВю╝вАю ВъгЖ░ђВъЁ ВІю ЖИ░вАЮВЮ┤ ВъљвЈЎ ВЌ░вЈЎвљЕвІѕвІц.', () => {
                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, status: 'deleted' } : e));
                    // Google ВДЂВЏљВЮ┤вЕ┤ workplaces workStatusвЦ╝ 'deleted'вАю ВЌЁвЇ░ВЮ┤ьіИ + ВЋївд╝
                    if (emp.empUid && currentWorkspaceId) {
                        fbDb.collection('employeeAccounts').doc(emp.empUid)
                            .collection('workplaces').doc(currentWorkspaceId)
                            .update({ workStatus: 'deleted' })

                    {personalTemplateTarget && (
                        <PersonalContractTemplateModal
                            emp={personalTemplateTarget}
                            globalTemplate={workspaceInfo?.contractTemplate}
                            workspaceId={currentWorkspaceId}
                            firebaseUser={firebaseUser}
                            setEmployees={setEmployees}
                            showAlert={showAlert}
                            reason={personalTemplateReason}
                            onSaveComplete={() => setPersonalTemplateTarget(null)}
                            onClose={() => {
                                // Жи╝вг┤Въљ ВъгВъЉВё▒ ВџћВ▓ГВЌљ вЈЎВЮў ьЏё ВиеВєї(X)ьЋю Ж▓йВџ░ Рєњ contractDeleteRequest в│хВЏљ
                                if (personalTemplateReason === 'rewrite_request' && personalTemplateTarget?.empUid) {
                                    const bossUid = currentWorkspaceId || firebaseUser.uid;
                                    const emp = personalTemplateTarget;
                                    fbDb.collection('employeeAccounts').doc(emp.empUid)
                                        .collection('workplaces').doc(bossUid)
                                        .update({ contractDeleteRequest: 'employee' })
                                        .catch(() => {});
                                    setEmployees(prev => prev.map(e => e.id === emp.id ? { ...e, contractDeleteRequest: 'employee' } : e));
                                }
                                setPersonalTemplateTarget(null);
                            }}
                        />
                    )}
                    {minWageModalOpen && (
                        <MinWageChangeModal
                            currentMinWage={globalMinWage}
                            onClose={() => setMinWageModalOpen(false)}
                            onSave={handleMinWageSave}
                        />
                    )}
                    {minWageTemplateAfterSave && (
                        <MinWageContractTemplateModal
                            globalTemplate={workspaceInfo?.contractTemplate}
                            workspaceId={currentWorkspaceId}
                            firebaseUser={firebaseUser}
                            setEmployees={setEmployees}
                            setWorkspaceInfo={setWorkspaceInfo}
                            showAlert={showAlert}
                            affectedEmps={minWageTemplateAfterSave.affectedEmps}
                            onClose={() => setMinWageTemplateAfterSave(null)}
                            onSaveComplete={() => {
                                setPendingContractUpdateEmpIds(new Set());
                                setMinWageTemplateAfterSave(null);
                            }}
                        />
                    )}
                    {bulkDispatchOpen && (
                        <BulkContractDispatchModal
                            targets={employees.filter(emp => emp.empUid && emp.status !== 'resigned' && emp.status !== 'leave' && (pendingContractUpdateEmpIds.has(emp.id) || emp.contractUpdateRequired || (!emp.contractStatus || emp.contractStatus === null)))}
                            globalTemplate={workspaceInfo?.contractTemplate}
                            workspaceId={currentWorkspaceId}
                            firebaseUser={firebaseUser}
                            setEmployees={setEmployees}
                            setWorkspaceInfo={setWorkspaceInfo}
                            setPendingContractUpdateEmpIds={setPendingContractUpdateEmpIds}
                            showAlert={showAlert}
                            onClose={() => setBulkDispatchOpen(false)}
                        />
                    )}
                </div>
            );
        }

        // РћђРћђРћђ Жи╝вАюЖ│ёВЋйВёю ВЮ╝Ж┤ё в░юВєА вфевІг (ВѕўВаЋьЋёВџћ ВЃЂьЃю Жи╝вг┤Въљ вїђВЃЂ) РћђРћђРћђ
        function BulkContractDispatchModal({ targets, globalTemplate, workspaceId, firebaseUser, setEmployees, setWorkspaceInfo, setPendingContractUpdateEmpIds, showAlert, onClose }) {
            const [step, setStep] = useState('select'); // 'select' | 'edit'
            const [confirmingSave, setConfirmingSave] = useState(false);
            const [selected, setSelected] = useState(new Set(targets.map(t => t.id)));

            const [title, setTitle] = useState(globalTemplate?.title || 'Жи╝вАюЖ│ёВЋйВёю');
            const [sections, setSections] = useState(
                globalTemplate?.sections?.length >= 1
                    ? globalTemplate.sections.map(s => ({ ...s }))
                    : [{ content: '', instruction: '' }]
            );
            const [ownerInfo, setOwnerInfo] = useState(
                globalTemplate?.ownerInfo
                    ? { ...globalTemplate.ownerInfo }
                    : { shopName: '', phone: '', address: '', representative: '', signatureData: '' }
            );
            const [saving, setSaving] = useState(false);

            const toggleSelected = (id) => {
                setSelected(prev => {
                    const next = new Set(prev);
                    if (next.has(id)) next.delete(id);
                    else next.add(id);
                    return next;
                });
            };

            const addSection = () => setSections(prev => [...prev, { content: '', instruction: '' }]);
            const removeSection = (i) => { if (sections.length <= 1) return; setSections(prev => prev.filter((_, j) => j !== i)); };
            const updateSection = (i, key, val) => setSections(prev => prev.map((s, j) => j === i ? { ...s, [key]: val } : s));

            const validateAndConfirm = () => {
                if (selected.size === 0) { showAlert('в░юВєАьЋа Жи╝вг┤ВъљвЦ╝ ВёаьЃЮьЋ┤ВБ╝ВёИВџћ.', 'ВЋѕвѓ┤', 'info'); return; }
                if (!title.trim()) { showAlert('ВаювфЕВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                if (sections.some(s => !s.content.trim())) { showAlert('вфевЊа вѓ┤ВџЕВ╣ИВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                const fallbackSig = globalTemplate?.ownerInfo?.signatureData || '';
                if (!ownerInfo.signatureData && !fallbackSig) {
                    showAlert('ВёювфЁВЮ┤ ьЋёВџћьЋЕвІѕвІц.', 'ВъЁваЦ ВўцвЦў', 'alert');
                    return;
                }
                setConfirmingSave(true);
            };

            const handleSend = async (saveTemplate) => {
                setSaving(true);
                try {
                    const finalOwnerInfo = ownerInfo.signatureData
                        ? ownerInfo
                        : { ...ownerInfo, signatureData: globalTemplate?.ownerInfo?.signatureData || '' };
                    const template = { title: title.trim(), sections, ownerInfo: finalOwnerInfo };
                    const bossUid = workspaceId || firebaseUser.uid;

                    if (saveTemplate) {
                        await saveContractTemplate(bossUid, template);
                        if (setWorkspaceInfo) {
                            setWorkspaceInfo(prev => ({ ...prev, contractTemplate: template }));
                        }
                    }

                    const selectedTargets = targets.filter(t => selected.has(t.id));
                    const empsToSend = selectedTargets.filter(emp => emp.empUid);
                    if (empsToSend.length === 0) {
                        showAlert('ВЌ░вЈЎвљю Ж│ёВаЋВЮ┤ Въѕвіћ Жи╝вг┤ВъљЖ░ђ ВЌєВіхвІѕвІц.', 'ВЋѕвѓ┤', 'info');
                        setSaving(false);
                        setConfirmingSave(false);
                        return;
                    }
                    const batch = fbDb.batch();
                    empsToSend.forEach(emp => {
                        batch.update(
                            fbDb.collection('employeeAccounts').doc(emp.empUid).collection('workplaces').doc(bossUid),
                            {
                                contractTemplate: template,
                                contractStatus: 'needs_resign',
                                pendingRewrite: true,
                                contractDeleteRequest: firebase.firestore.FieldValue.delete(),
                                contractUpdateRequired: firebase.firestore.FieldValue.delete()
                            }
                        );
                    });
                    await batch.commit();

                    setEmployees(prev => prev.map(e =>
                        empsToSend.some(a => a.id === e.id)
                            ? { ...e, contractStatus: 'needs_resign', pendingRewrite: true, contractDeleteRequest: null, contractUpdateRequired: false }
                            : e
                    ));
                    if (setPendingContractUpdateEmpIds) {
                        setPendingContractUpdateEmpIds(prev => {
                            const next = new Set(prev);
                            empsToSend.forEach(emp => next.delete(emp.id));
                            return next;
                        });
                    }

                    const names = empsToSend.map(e => e.name).join(', ');
                    showAlert(`${names}вІў(${empsToSend.length}вфЁ)ВЌљЖ▓ї Жи╝вАюЖ│ёВЋйВёюЖ░ђ в░юВєАвљўВЌѕВіхвІѕвІц.${saveTemplate ? '\nЖи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐вЈё ВЌЁвЇ░ВЮ┤ьіИвљўВЌѕВіхвІѕвІц.' : ''}`, 'в░юВєА ВЎёвБї', 'success');
                    onClose();
                } catch(e) {
                    showAlert('в░юВєА ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
                setSaving(false);
                setConfirmingSave(false);
            };

            if (step === 'select') {
                return (
                    <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4">
                        <div className="bg-white rounded-2xl w-full max-w-md my-4">
                            <div className="flex items-center justify-between p-5 border-b border-gray-100">
                                <h2 className="text-base font-bold text-gray-800">Жи╝вАюЖ│ёВЋйВёю ВЮ╝Ж┤ё в░юВєА Рђћ вїђВЃЂ ВёаьЃЮ</h2>
                                <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition"><X className="w-5 h-5" /></button>
                            </div>
                            <div className="p-5 space-y-3 max-h-[60vh] overflow-y-auto">
                                <p className="text-xs text-gray-500 mb-2">Жи╝вАюЖ│ёВЋйВёю в░юВєА вїђВЃЂ Жи╝вг┤Въљ {targets.length}вфЁ</p>
                                <div className="space-y-2">
                                    {targets.map(emp => (
                                        <label key={emp.id} className="flex items-center gap-3 p-3 rounded-xl border border-gray-200 hover:bg-gray-50 cursor-pointer">
                                            <input
                                                type="checkbox"
                                                checked={selected.has(emp.id)}
                                                onChange={() => toggleSelected(emp.id)}
                                                className="w-5 h-5 cursor-pointer"
                                            />
                                            <span className="text-xs font-bold text-yellow-800 bg-yellow-100 px-2 py-1 rounded-md">No. {emp.displayId}</span>
                                            <span className="text-sm font-bold text-gray-800">{emp.name}</span>
                                        </label>
                                    ))}
                                </div>
                            </div>
                            <div className="p-5 border-t border-gray-100 flex gap-2">
                                <button onClick={onClose} className="flex-1 bg-gray-100 text-gray-600 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition text-sm">ВиеВєї</button>
                                <button
                                    onClick={() => {
                                        if (selected.size === 0) { showAlert('Жи╝вг┤ВъљвЦ╝ ВёаьЃЮьЋ┤ВБ╝ВёИВџћ.', 'ВЋѕвѓ┤', 'info'); return; }
                                        setStep('edit');
                                    }}
                                    className="flex-1 bg-orange-600 text-white py-2.5 rounded-xl font-bold hover:bg-orange-700 transition text-sm">
                                    вІцВЮї
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="fixed inset-0 bg-black/50 z-50 flex items-start justify-center overflow-y-auto p-4">
                    <div className="bg-white rounded-2xl w-full max-w-lg my-4">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100">
                            <div className="flex items-center gap-3">
                                <div className="bg-orange-100 p-2 rounded-xl">
                                    <svg className="w-5 h-5 text-orange-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" x2="8" y1="13" y2="13"/><line x1="16" x2="8" y1="17" y2="17"/></svg>
                                </div>
                                <div>
                                    <h2 className="text-base font-bold text-gray-800">Жи╝вАюЖ│ёВЋйВёю ВЮ╝Ж┤ё в░юВєА</h2>
                                    <p className="text-xs text-gray-500">вїђВЃЂ: {targets.filter(t => selected.has(t.id)).map(t => t.name).join(', ')} ({selected.size}вфЁ)</p>
                                </div>
                            </div>
                            <button onClick={onClose} className="p-1.5 text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-lg transition"><X className="w-5 h-5" /></button>
                        </div>
                        <div className="p-5 space-y-4 max-h-[60vh] overflow-y-auto">
                            <div className="bg-orange-50 border border-orange-200 rounded-xl p-3 text-xs text-orange-700">
                                ВёаьЃЮьЋю {selected.size}вфЁВЌљЖ▓ї Жи╝вАюЖ│ёВЋйВёювЦ╝ ВЮ╝Ж┤ё в░юВєАьЋЕвІѕвІц. вѓ┤ВџЕВЮё ВѕўВаЋ ьЏё в░юВєАьЋўЖИ░вЦ╝ вѕёвЦ┤ВёИВџћ.
                            </div>
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-1">Ж│ёВЋйВёю ВаювфЕ</label>
                                <input value={title} onChange={e => setTitle(e.target.value)}
                                    className="w-full border-2 border-gray-300 rounded-xl py-2.5 px-4 focus:border-orange-500 outline-none text-sm"
                                    placeholder="Жи╝вАюЖ│ёВЋйВёю" />
                            </div>
                            {sections.map((s, i) => (
                                <div key={i} className="border-2 border-gray-200 rounded-xl p-4 space-y-3 relative">
                                    <div className="flex items-center justify-between mb-1">
                                        <span className="text-xs font-bold text-gray-500">ьЋГвфЕ {i + 1}</span>
                                        {sections.length > 1 && (<button onClick={() => removeSection(i)} className="text-red-400 hover:text-red-600 text-xs">ВѓГВаю</button>)}
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">вѓ┤ВџЕ (Ж┤ђвдгВъљ ВъЉВё▒)</label>
                                        <textarea value={s.content} onChange={e => updateSection(i, 'content', e.target.value)} rows={3}
                                            className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-orange-400 outline-none resize-none"
                                            placeholder="Вўѕ: ВЌЁвг┤вѓ┤ВџЕ, ВєїВаЋЖи╝вАюВІюЖ░ё, ВъёЖИѕ вЊ▒" />
                                    </div>
                                    <div>
                                        <label className="block text-xs font-bold text-gray-600 mb-1">ВДђВІю (Жи╝вг┤ВъљВЌљЖ▓ї Вќ┤вќ╗Ж▓ї ВъЉВё▒ьЋўЖ▓ї ьЋаВДђ)</label>
                                        <input value={s.instruction} onChange={e => updateSection(i, 'instruction', e.target.value)}
                                            className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none"
                                            placeholder='Вўѕ: Вюё вѓ┤ВџЕВЌљ вЈЎВЮўьЋЕвІѕвІц.' />
                                    </div>
                                </div>
                            ))}
                            <button onClick={addSection} className="w-full border-2 border-dashed border-gray-300 text-gray-500 py-2.5 rounded-xl text-sm hover:border-orange-400 hover:text-orange-600 transition">+ вѓ┤ВџЕ ВХћЖ░ђьЋўЖИ░</button>
                            <div className="border-2 border-blue-200 rounded-xl p-4 space-y-3 bg-blue-50">
                                <p className="text-xs font-bold text-blue-700">ВѓгВЌЁВБ╝ ВаЋв│┤ (ьЋГВЃЂ ВхюьЋўвІе Ж│аВаЋ)</p>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВѓгВЌЁВ▓┤вфЁ</label>
                                    <input value={ownerInfo.shopName} onChange={e => setOwnerInfo(p => ({...p, shopName: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white" placeholder="Вўѕ: ьЎЇЖИИвЈЎ В╣┤ьјў" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВаёьЎћв▓ѕьўИ</label>
                                    <input value={ownerInfo.phone} onChange={e => setOwnerInfo(p => ({...p, phone: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white" placeholder="010-0000-0000" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">ВБ╝Вєї</label>
                                    <input value={ownerInfo.address} onChange={e => setOwnerInfo(p => ({...p, address: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white" placeholder="ВёюВџИВІю Ж░ЋвѓеЖхг ьЁїьЌцвъђвАю 123" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">вїђьЉюВъљ</label>
                                    <input value={ownerInfo.representative} onChange={e => setOwnerInfo(p => ({...p, representative: e.target.value}))}
                                        className="w-full border-2 border-gray-200 rounded-xl py-2 px-3 text-sm focus:border-blue-400 outline-none bg-white" placeholder="ьЎЇЖИИвЈЎ" />
                                </div>
                                <div>
                                    <label className="block text-xs font-bold text-gray-600 mb-1">вїђьЉюВъљ ВёювфЁ</label>
                                    <SignatureCanvas onSave={sig => setOwnerInfo(p => ({...p, signatureData: sig}))} width={360} height={100} />
                                    {ownerInfo.signatureData && (
                                        <div className="mt-2">
                                            <p className="text-xs text-gray-500 mb-1">ВёювфЁ в»Ивдгв│┤ЖИ░:</p>
                                            <img src={ownerInfo.signatureData} alt="ВёювфЁ" className="h-12 border rounded-lg bg-white p-1 object-contain" />
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                        <div className="p-5 border-t border-gray-100 space-y-2">
                            {confirmingSave ? (
                                <>
                                    <div className="bg-blue-50 border border-blue-200 rounded-xl p-3 text-sm text-blue-700">
                                        <p className="font-bold mb-1">ьЁюьћївд┐ВЌљ ВађВъЦьЋўВІюЖ▓аВіхвІѕЖ╣ї?</p>
                                        <p className="text-xs">ВађВъЦьЋўвЕ┤ ВёцВаЋ ьЃГВЮў Жи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐вЈё ьЋеЖ╗ў ВЌЁвЇ░ВЮ┤ьіИвљЕвІѕвІц.</p>
                                    </div>
                                    <button onClick={() => handleSend(true)} disabled={saving}
                                        className="w-full bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 transition disabled:opacity-50 text-sm">
                                        {saving ? 'в░юВєА ВцЉ...' : 'ВађВъЦьЋўЖ│а в░юВєА'}
                                    </button>
                                    <button onClick={() => handleSend(false)} disabled={saving}
                                        className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition disabled:opacity-50 text-sm">
                                        ВађВъЦьЋўВДђ ВЋіЖ│а в░юВєА
                                    </button>
                                    <button onClick={() => setConfirmingSave(false)} disabled={saving}
                                        className="w-full bg-gray-100 text-gray-600 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition text-sm disabled:opacity-50">
                                        ВиеВєї
                                    </button>
                                </>
                            ) : (
                                <>
                                    <button onClick={validateAndConfirm}
                                        className="w-full bg-orange-600 text-white py-3 rounded-xl font-bold hover:bg-orange-700 transition text-sm">
                                        в░юВєАьЋўЖИ░
                                    </button>
                                    <button onClick={() => setStep('select')}
                                        className="w-full bg-gray-100 text-gray-600 py-2.5 rounded-xl font-medium hover:bg-gray-200 transition text-sm">
                                        Рєљ вїђВЃЂ вІцВІю ВёаьЃЮ
                                    </button>
                                </>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function TabNotices({ workspaceId, notices, showAlert, showConfirm }) {
            const [editingId, setEditingId] = useState(null);
            const [isAdding, setIsAdding] = useState(false);
            const [form, setForm] = useState({ title: '', content: '' });
            const [loading, setLoading] = useState(false);

            const fmtDate = (ts) => {
                if (!ts) return '';
                try {
                    const d = ts.toDate ? ts.toDate() : new Date(ts);
                    return `${d.getFullYear()}.${String(d.getMonth()+1).padStart(2,'0')}.${String(d.getDate()).padStart(2,'0')}`;
                } catch { return ''; }
            };

            const handleAdd = async () => {
                if (!form.title.trim() || !form.content.trim()) { showAlert('ВаювфЕЖ│╝ вѓ┤ВџЕВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                setLoading(true);
                try {
                    await createNotice(workspaceId, form.title.trim(), form.content.trim());
                    setForm({ title: '', content: '' });
                    setIsAdding(false);
                } catch(e) { showAlert('ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error'); }
                setLoading(false);
            };

            const handleUpdate = async (noticeId) => {
                if (!form.title.trim() || !form.content.trim()) { showAlert('ВаювфЕЖ│╝ вѓ┤ВџЕВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.', 'ВъЁваЦ ВўцвЦў', 'alert'); return; }
                setLoading(true);
                try {
                    await updateNotice(workspaceId, noticeId, form.title.trim(), form.content.trim());
                    setEditingId(null);
                } catch(e) { showAlert('ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error'); }
                setLoading(false);
            };

            const handleDelete = (noticeId, title) => {
                showConfirm(`"${title}" Ж│хВДђвЦ╝ ВѓГВаюьЋўВІюЖ▓аВіхвІѕЖ╣ї?`, async () => {
                    try { await deleteNotice(workspaceId, noticeId); }
                    catch(e) { showAlert('ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error'); }
                }, 'Ж│хВДђ ВѓГВаю');
            };

            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center">
                        <h2 className="text-xl font-bold text-gray-800">ВаёВ▓┤ Ж│хВДђВѓгьЋГ</h2>
                        <button onClick={() => { setIsAdding(true); setForm({ title: '', content: '' }); setEditingId(null); }}
                            className="flex items-center gap-2 bg-green-600 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition text-sm font-bold shadow-sm">
                            <Plus className="w-4 h-4" /> Ж│хВДђ ВъЉВё▒
                        </button>
