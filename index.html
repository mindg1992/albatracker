                        const subs = {};
                        snap.forEach(d => { const data = d.data(); if (data.date) subs[data.date] = { id: d.id, ...data }; });
                        setMySubmissions(subs);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, empAccount?.bossUid]);

            // ВДЂВЏљ Ві╣ВЮИ В▓ўвдг (Ж┤ђвдгВъљ)
            const handleApproveEmployee = async (empUid) => {
                const empData = pendingGoogleEmployees.find(e => e.uid === empUid);
                if (!empData) return;
                try {
                    // ВъгВъЁВѓг ВЌгвХђ ьЎЋВЮИ Рђћ empUidЖ░ђ Ж░ЎВЮђ ЖИ░ВА┤ В╣┤вЊюЖ░ђ ВъѕВю╝вЕ┤ ВъгВѓгВџЕ
                    const existingEmp = employees.find(e => e.empUid === empUid);
                    let approvedId;
                    const hasContract = !!empData.hasContract;
                    if (existingEmp) {
                        approvedId = existingEmp.id;
                        // Ж░ЎВЮђ empUid Ж░ђВДё ВцЉв│х ваѕВйћвЊюЖ░ђ ВъѕВю╝вЕ┤ ЖИ░ВА┤ ваѕВйћвЊю(Ж░ђВъЦ ве╝Вађ ВХћЖ░ђвљю Ж▓Ѓ)вДї ьЎюВё▒ьЎћ, вѓўвеИВДђ ьЄ┤Вѓг В▓ўвдг
                        setEmployees(prev => prev.map(e => {
                            if (e.empUid !== empUid) return e;
                            if (e.id === existingEmp.id) {
                                return {
                                    ...e,
                                    name: empData.name,
                                    status: 'working',
                                    hireDate: new Date().toISOString().split('T')[0],
                                    residentId: empData.residentId || e.residentId || '',
                                    bank: empData.bank || e.bank || '',
                                    account: empData.account || e.account || '',
                                    contractStatus: hasContract ? 'completed' : (e.contractStatus || null),
                                };
                            }
                            // Ж░ЎВЮђ empUidВЮў вІцвЦИ ваѕВйћвЊю(ВцЉв│х)віћ ьЄ┤Вѓг В▓ўвдг
                            return { ...e, status: 'resigned' };
                        }));
                        // вІгваЦ/ЖИЅВЌгвіћ employees в░░ВЌ┤ВЌљВёю ВхюВІа ВЮ┤вдё ВъљвЈЎ ьЉюВІюьЋўв»ђвАю monthlyData ВЌЁвЇ░ВЮ┤ьіИ вХѕьЋёВџћ
                        await approveGoogleEmpJoinRequest(currentWorkspaceId || firebaseUser.uid, empUid, approvedId, hasContract);
                        showAlert(`${empData.name}вІўВЮ┤ ВъгВъЁВѓг Ві╣ВЮИвљўВЌѕВіхвІѕвІц.\nЖИ░ВА┤ Жи╝вг┤ ЖИ░вАЮВЮ┤ ВЮ┤Вќ┤ВДЉвІѕвІц.`, 'ВъгВъЁВѓг Ві╣ВЮИ', 'success');
                    } else {
                        approvedId = nextEmpId;
                        const newEmp = {
                            id: approvedId, name: empData.name,
                            hireDate: new Date().toISOString().split('T')[0],
                            wage: Number(globalMinWage) > 0 ? Number(globalMinWage) : '', scheduledDays: '', dailyHours: '',
                            residentId: empData.residentId || '',
                            bank: empData.bank || '',
                            account: empData.account || '',
                            memo: '', status: 'working',
                            empUid,
                            contractStatus: hasContract ? 'completed' : null
                        };
                        setEmployees(prev => [...prev, newEmp]);
                        setNextEmpId(prev => prev + 1);
                        await approveGoogleEmpJoinRequest(currentWorkspaceId || firebaseUser.uid, empUid, approvedId, hasContract);
                        showAlert(`${empData.name}вІўВЮ┤ Ві╣ВЮИвљўВЌѕВіхвІѕвІц.\nЖи╝вг┤Въљ ВаЋв│┤ ьЃГВЌљВёю ВІюЖИЅ вЊ▒ВЮё ВёцВаЋьЋ┤ВБ╝ВёИВџћ.`, 'Ві╣ВЮИ ВЎёвБї', 'success');
                    }
                } catch(e) {
                    showAlert('Ві╣ВЮИ В▓ўвдг ВцЉ ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            // Ж░ђВъЁ ВІаВ▓ГВъљ Жи╝вАюЖ│ёВЋйВёю в░ўвац В▓ўвдг (Ж┤ђвдгВъљ)
            const handleRejectJoinContract = async (empUid) => {
                const empData = pendingGoogleEmployees.find(e => e.uid === empUid);
                try {
                    await rejectEmpJoinContract(currentWorkspaceId || firebaseUser.uid, empUid);
                    showAlert(`${empData?.name || 'ВДЂВЏљ'}вІўВЮў Жи╝вАюЖ│ёВЋйВёюЖ░ђ в░ўвацвљўВЌѕВіхвІѕвІц.\nВДЂВЏљВЌљЖ▓ї ВъгВъЉВё▒ВЮ┤ ВџћВ▓ГвљЕвІѕвІц.`, 'в░ўвац ВЎёвБї', 'success');
                } catch(e) {
                    showAlert('В▓ўвдг ВцЉ ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            // ВДЂВЏљ Ж▒░Ваѕ В▓ўвдг (Ж┤ђвдгВъљ)
            const handleRejectEmployee = (empUid) => {
                const empData = pendingGoogleEmployees.find(e => e.uid === empUid);
                showConfirm(`${empData?.name || 'ВДЂВЏљ'}вІўВЮў Ж░ђВъЁВЮё Ж▒░ВаѕьЋўВІюЖ▓аВіхвІѕЖ╣ї?`, async () => {
                    try {
                        await rejectGoogleEmpJoinRequest(currentWorkspaceId || firebaseUser.uid, empUid);
                    } catch(e) {
                        showAlert('В▓ўвдг ВцЉ ВўцвЦў: ' + e.message, 'ВўцвЦў', 'error');
                    }
                }, 'Ж░ђВъЁ Ж▒░Ваѕ');
            };

            const employeesWithDisplayId = useMemo(() => {
                const active = employees.filter(e => e.status !== 'deleted');
                const deleted = employees.filter(e => e.status === 'deleted');
                const sorted = [...active].sort((a, b) => {
                    const dateA = new Date(a.hireDate).getTime();
                    const dateB = new Date(b.hireDate).getTime();
                    if (dateA === dateB) return a.id - b.id;
                    return dateA - dateB;
                }).map((emp, index) => ({ ...emp, displayId: index + 1 }));
                // deleted ВДЂВЏљвЈё ьЈгьЋе (ВъгЖ░ђВъЁ ВІю В░ЙВЮё Вѕў ВъѕвЈёвАЮ)
                return [...sorted, ...deleted.map(e => ({ ...e, displayId: 99999 }))];
            }, [employees]);

            const fileInputRef = useRef(null);

            const handleBackup = () => {
                const backupData = { version: "1.0", employees, monthlyData, predictData, nextEmpId, appPin, globalMinWage };
                const dataStr = JSON.stringify(backupData);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const exportFileDefaultName = `ВЋїв░ћьіИвъўВ╗ц_в░▒ВЌЁ_${dateStr}.json`;

                let linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                document.body.appendChild(linkElement);
                linkElement.click();
                document.body.removeChild(linkElement);
            };

            const handleImportClick = () => {
                showConfirm("вХѕвЪгВўцЖИ░вЦ╝ ВДёьќЅьЋўвЕ┤ ьўёВъг ВъЁваЦвљю вЇ░ВЮ┤ьё░Ж░ђ вфевЉљ вЇ«Вќ┤ВћїВЏїВДЉвІѕвІц.\nЖ│ёВєЇьЋўВІюЖ▓аВіхвІѕЖ╣ї?", () => {
                    fileInputRef.current?.click();
                }, "вЇ░ВЮ┤ьё░ вХѕвЪгВўцЖИ░");
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.employees && importedData.monthlyData) {
                            setEmployees(importedData.employees);
                            setMonthlyData(importedData.monthlyData);
                            if (importedData.predictData) setPredictData(importedData.predictData);
                            if (importedData.nextEmpId) setNextEmpId(importedData.nextEmpId);
                            if (importedData.appPin) setAppPin(importedData.appPin);
                            if (importedData.globalMinWage !== undefined) setGlobalMinWage(importedData.globalMinWage);
                            showAlert("в░▒ВЌЁ вЇ░ВЮ┤ьё░вЦ╝ Вё▒Ж│хВаЂВю╝вАю вХѕвЪгВЎћВіхвІѕвІц.", "Вё▒Ж│х", "success");
                        } else {
                            showAlert("ВюаьџеьЋўВДђ ВЋіВЮђ в░▒ВЌЁ ьїїВЮ╝ ьўЋВІЮВъЁвІѕвІц.", "ВўцвЦў", "error");
                        }
                    } catch (error) {
                        showAlert("ьїїВЮ╝ВЮё ВЮйвіћ ВцЉ ВўцвЦўЖ░ђ в░юВЃЮьќѕВіхвІѕвІц.", "ВўцвЦў", "error");
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            // Ж┤ђвдгВъљ ВЌЁВ▓┤ ВаёьЎў
            const handleSwitchBossWorkspace = (newWorkspaceId) => {
                if (newWorkspaceId === currentWorkspaceId) { setShowBossWorkspaceSelect(false); return; }
                // ьўёВъг вЇ░ВЮ┤ьё░ В┤ѕЖИ░ьЎћ ьЏё ВЃѕ ВЌЁВ▓┤вАю ВаёьЎў
                setEmployees([]);
                setNextEmpId(1);
                setMonthlyData({});
                setPredictData({});
                setGlobalMinWage('');
                setWorkspaceInfo(null);
                setPendingGoogleEmployees([]);
                lastSyncedDataRef.current = '';
                setCurrentWorkspaceId(newWorkspaceId);
                localStorage.setItem('bossWorkspaceId', newWorkspaceId);
                sessionStorage.setItem('bossWorkspaceSelected', newWorkspaceId);
                setShowBossWorkspaceSelect(false);
            };

            // ВЌЁВ▓┤ ВѓГВаю ВўѕВЋй (24ВІюЖ░ё ьЏё ВІцВаю ВѓГВаю)
            const handleDeleteWorkspace = async () => {
                if (!firebaseUser || !currentWorkspaceId) return;
                try {
                    await fbDb.collection('workspaces').doc(currentWorkspaceId).update({
                        deleteScheduledAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // ьЂ┤вЮ╝ВЮ┤ВќИьіИВЌљВёю ьўёВъг ВІюЖ░ЂВю╝вАю ВдЅВІю в░ўВўЂ
                    const now = { toMillis: () => Date.now(), _now: true };
                    setWorkspaceInfo(prev => ({ ...prev, deleteScheduledAt: now }));
                    setBossWorkspaceList(prev => prev.map(ws =>
                        ws.id === currentWorkspaceId ? { ...ws, deleteScheduledAt: now } : ws
                    ));
                } catch(e) {
                    showAlert('ВѓГВаю ВўѕВЋй ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            // ВЌЁВ▓┤ ВѓГВаю ВиеВєї (в│хЖхг)
            const handleCancelDeleteWorkspace = async () => {
                if (!firebaseUser || !currentWorkspaceId) return;
                try {
                    await fbDb.collection('workspaces').doc(currentWorkspaceId).update({
                        deleteScheduledAt: firebase.firestore.FieldValue.delete()
                    });
                    setWorkspaceInfo(prev => { const n = { ...prev }; delete n.deleteScheduledAt; return n; });
                    setBossWorkspaceList(prev => prev.map(ws => {
                        if (ws.id === currentWorkspaceId) { const n = { ...ws }; delete n.deleteScheduledAt; return n; }
                        return ws;
                    }));
                    showAlert('ВЌЁВ▓┤ ВѓГВаюЖ░ђ ВиеВєївљўВЌѕВіхвІѕвІц. ВаЋВЃЂВаЂВю╝вАю в│хЖхгвљўВЌѕВіхвІѕвІц.', 'в│хЖхг ВЎёвБї', 'success');
                } catch(e) {
                    showAlert('в│хЖхг ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            // ВЌЁВ▓┤вфЁ в│ђЖ▓й
            const handleRenameWorkspace = () => {
                if (!firebaseUser || !currentWorkspaceId || !workspaceInfo) return;
                const currentName = workspaceInfo.shopName || '';
                const newName = prompt('ВЃѕ ВЌЁВ▓┤вфЁВЮё ВъЁваЦьЋўВёИВџћ:', currentName);
                if (newName === null || newName.trim() === '' || newName.trim() === currentName) return;
                const trimmed = newName.trim();
                (async () => {
                    try {
                        // 1. workspaces вгИВёю ВЌЁвЇ░ВЮ┤ьіИ
                        await fbDb.collection('workspaces').doc(currentWorkspaceId).update({ shopName: trimmed });
                        // 2. inviteCodes вгИВёю ВЌЁвЇ░ВЮ┤ьіИ (ЖХїьЋю ВЌєВю╝вЕ┤ вг┤ВІю)
                        if (workspaceInfo.inviteCode) {
                            fbDb.collection('inviteCodes').doc(workspaceInfo.inviteCode).update({ shopName: trimmed }).catch(() => {});
                        }
                        // 3. ьЂ┤вЮ╝ВЮ┤ВќИьіИ ВЃЂьЃю в░ўВўЂ
                        setWorkspaceInfo(prev => ({ ...prev, shopName: trimmed }));
                        setBossWorkspaceList(prev => prev.map(ws =>
                            ws.id === currentWorkspaceId ? { ...ws, shopName: trimmed } : ws
                        ));
                        // 4. Google ВДЂВЏљвЊцВЮў workplacesВЌљвЈё shopName ВЌЁвЇ░ВЮ┤ьіИ + ВЋївд╝ в░юВєА
                        const empsWithUid = employees.filter(e => e.empUid);
                        for (const emp of empsWithUid) {
                            try {
                                await fbDb.collection('employeeAccounts').doc(emp.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ shopName: trimmed });
                                await addEmpNotification(emp.empUid, {
                                        type: 'shop_name_change',
                                        oldName: currentName,
                                        newName: trimmed,
                                        bossUid: currentWorkspaceId
                                    });
                            } catch(e) { console.error('ВЌЁВ▓┤вфЁ в│ђЖ▓й ВЋївд╝ в░юВєА ВІцьїе:', emp.empUid, e); }
                        }
                        showAlert(`ВЌЁВ▓┤вфЁВЮ┤ "${trimmed}"(Вю╝)вАю в│ђЖ▓йвљўВЌѕВіхвІѕвІц.`, 'в│ђЖ▓й ВЎёвБї', 'success');
                    } catch(e) {
                        showAlert('ВЌЁВ▓┤вфЁ в│ђЖ▓й ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                    }
                })();
            };

            // Ж┤ђвдгВъљ ВЃѕ ВЌЁВ▓┤ ВХћЖ░ђ (BossSetupModal ьіИвдгЖ▒░)
            const handleAddBossWorkspace = () => {
                const newId = `${firebaseUser.uid}__ws${Date.now()}`;
                setBossSetupWorkspaceId(newId);
                setShowBossWorkspaceSelect(false);
                setShowBossSetup(true);
            };

            // ьўёВъг ВЌЁВ▓┤ ВѓГВаю ВўѕВЋй ВЌгвХђ (24ВІюЖ░ё ВЮ┤вѓ┤)
            const wsDeleteScheduledAt = workspaceInfo?.deleteScheduledAt;
            const isWorkspaceDeleting = (() => {
                if (!wsDeleteScheduledAt) return false;
                const ms = wsDeleteScheduledAt.toMillis ? wsDeleteScheduledAt.toMillis() : new Date(wsDeleteScheduledAt).getTime();
                return Date.now() < ms + 24 * 60 * 60 * 1000;
            })();

            // === ваївЇћ вХёЖИ░ ===

            // вАювћЕ ВцЉ
            if (fbLoading || (firebaseUser && !userRole)) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <ATLogo className="w-16 h-16 mx-auto mb-5 rounded-2xl shadow-lg" />
                            <div className="w-8 h-8 border-3 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-3" style={{borderWidth:'3px'}}></div>
                            <p className="text-gray-500 text-sm font-medium">
                                {(firebaseUser && !userRole) ? 'ВѓгВџЕВъљ ВаЋв│┤вЦ╝ ьЎЋВЮИ ВцЉ...' : 'вЇ░ВЮ┤ьё░вЦ╝ вЈЎЖИ░ьЎћьЋўЖ│а ВъѕВіхвІѕвІц...'}
                            </p>
                        </div>
                    </div>
                );
            }

            // вАюЖиИВЮИ ВЋѕ вљю ВЃЂьЃю Рєњ въювћЕ ьЎћвЕ┤
            if (!firebaseUser) {
                return <LandingScreen onBossLogin={handleGoogleLogin} onEmpGoogleLogin={handleEmpGoogleLogin} modalConfig={modalConfig} />;
            }

            const schedMemoBadgeCount = unreadSchedMemos.length;
            const markSchedMemosSeen = () => {
                const now = Date.now();
                if (currentWorkspaceId) localStorage.setItem(`schedMemoSeenAt_${currentWorkspaceId}`, String(now));
                setMemoSeenAt(now);
            };

            const allPendingEmployees = pendingGoogleEmployees;
            const contractRewriteRequests = employees.filter(e => e.status !== 'deleted' && e.contractDeleteRequest === 'employee');
            const contractRewriteRequestCount = contractRewriteRequests.length;
            const contractRewriteBannerMsg = contractRewriteRequestCount === 1
                ? `${contractRewriteRequests[0].name}вІўВЮ┤ ВъгВъЉВё▒ВЮё ВџћВ▓ГьќѕВіхвІѕвІц.`
                : `${contractRewriteRequests[0]?.name}вІў ВЎИ ${contractRewriteRequestCount - 1}вфЁВЮ┤ ВъгВъЉВё▒ВЮё ВџћВ▓ГьќѕВіхвІѕвІц.`;
            // в▒ЃВДђ: ВъгВъЉВё▒ ВџћВ▓Г ~ ВъЉВё▒ ВЎёвБї ВаёЖ╣їВДђ ВюаВДђ + ВІюЖИЅ в»ИвІг + ВѕўВаЋ ьЋёВџћ ВІаьўИ
            const contractPendingBadgeCount = employees.filter(e =>
                e.status !== 'deleted' && (
                    e.contractDeleteRequest === 'employee' ||
                    e.contractStatus === 'needs_resign' ||
                    e.contractStatus === 'pending_boss' ||
                    e.pendingRewrite ||
                    e.contractUpdateRequired ||

                        if (entry && entry.hours > 0) { totalDays++; totalHours += entry.hours; totalPay += entry.pay; }

                    weekData.forEach(item => {

        function LoginScreen({ appPin, onLogin, empName }) {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);

            const handleNumClick = (num) => {
                if (input.length < 6) {
                    const newInput = input + num;
                    setInput(newInput);
                    setError(false);
                    if (newInput.length === 6 && newInput === appPin) {
                        setTimeout(onLogin, 100);
                    } else if (newInput.length === 6) {
                        setError(true);
                        setTimeout(() => setInput(''), 500);
                    }
                }
            };

            const handleDelete = () => setInput(prev => prev.slice(0, -1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (/[0-9]/.test(e.key)) handleNumClick(e.key);
                    if (e.key === 'Backspace') handleDelete();
                    if (e.key === 'Enter' && input === appPin) onLogin();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [input, appPin]);

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                        <ATLogo className="w-16 h-16 mx-auto mb-4 rounded-2xl shadow-md" />

                            {empName ? 'PINВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.' : (appPin === INITIAL_PIN ? 'В┤ѕЖИ░ в╣ёв░ђв▓ѕьўИвіћ "000000"ВъЁвІѕвІц.' : 'в╣ёв░ђв▓ѕьўИвЦ╝ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.')}
                        </p>

                        <div className="flex justify-center gap-3 mb-8">
                            {[...Array(6)].map((_, i) => (
                                <div
                                    key={i}
                                    className={`w-4 h-4 rounded-full transition-all ${
                                        i < input.length ? 'bg-green-600 scale-110' : 'bg-gray-200'
                                    } ${error ? 'bg-red-500' : ''}`}
                                />
                            ))}
                        </div>

                        <div className="grid grid-cols-3 gap-3">
                            {[1, 2, 3, 4, 5, 6, 7, 8, 9].map(num => (
                                <button
                                    key={num}
                                    onClick={() => handleNumClick(num.toString())}
                                    className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                                >
                                    {num}
                                </button>
                            ))}
                            <div className="h-14"></div>
                            <button
                                onClick={() => handleNumClick('0')}
                                className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-xl font-medium text-gray-700 transition active:scale-95"
                            >
                                0
                            </button>
                            <button
                                onClick={handleDelete}
                                className="h-14 bg-gray-50 hover:bg-gray-100 rounded-xl text-lg font-medium text-gray-700 flex items-center justify-center transition active:scale-95"

        function EmpGoogleJoinScreen({ firebaseUser, empGoogleWorkplaces, onJoined, onBack, onLogout, showAlert }) {
            const [step, setStep] = useState('code'); // code Рєњ name Рєњ contract(ВёаьЃЮ) Рєњ done
            const [code, setCode] = useState('');
            const [inviteInfo, setInviteInfo] = useState(null);
            const [contractTemplate, setContractTemplate] = useState(null);
            const [name, setName] = useState(firebaseUser?.displayName || '');
            const [profile, setProfile] = useState({ residentId: '', bank: '', account: '', address: '', phone: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [showContractWrite, setShowContractWrite] = useState(false);

            const handleCodeNext = async () => {
                if (code.trim().length !== 6) { setError('В┤ѕвїђВйћвЊю 6ВъљвдгвЦ╝ ВъЁваЦьЋ┤ВБ╝ВёИВџћ.'); return; }
                setLoading(true); setError('');
                try {
                    const existingWp = empGoogleWorkplaces.find(w => w.inviteCode === code.trim().toUpperCase());
                    if (existingWp) {
                        if (existingWp.status === 'pending') { setError('ВЮ┤в»И ВЮ┤ ВЌЁВ▓┤ВЌљ Ж░ђВъЁ ВІаВ▓Г ВцЉВъЁвІѕвІц.'); setLoading(false); return; }
                        if (existingWp.status === 'approved') { setError('ВЮ┤в»И ВЮ┤ ВЌЁВ▓┤ВЌљ Ві╣ВЮИвљю Ж│ёВаЋВЮ┤ ВъѕВіхвІѕвІц.'); setLoading(false); return; }
                    }
                    const doc = await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase()).get();
                    if (!doc.exists) { setError('ВюаьџеьЋўВДђ ВЋіВЮђ В┤ѕвїђВйћвЊюВъЁвІѕвІц.'); setLoading(false); return; }
                    const bossUid = doc.data().bossUid;
                    const existingBossWp = empGoogleWorkplaces.find(w => w.bossUid === bossUid && w.status !== 'disconnected' && w.status !== 'resigned_by_emp' && w.workStatus !== 'deleted');
                    if (existingBossWp && existingBossWp.status === 'approved') {
                        showAlert('ВЮ┤в»И ВЮ┤ ВЌЁВ▓┤ВЌљ Ві╣ВЮИвљю Ж│ёВаЋВЮ┤ ВъѕВіхвІѕвІц.\nВЌЁВ▓┤ ВёаьЃЮ ьЎћвЕ┤ВЌљВёю ВёаьЃЮьЋ┤ ВБ╝ВёИВџћ.', 'ВЋѕвѓ┤', 'info');
                        setLoading(false); onBack(); return;
                    }
                    const invData = doc.data();
                    // workspaces вгИВёюВЌљВёю ВхюВІа shopName Ж░ђВаИВўцЖИ░ + Жи╝вАюЖ│ёВЋйВёю ьЁюьћївд┐ ВА░ьџї
                    try {
                        const wsDoc = await fbDb.collection('workspaces').doc(bossUid).get();
                        if (wsDoc.exists && wsDoc.data()?.shopName) {
                            invData.shopName = wsDoc.data().shopName;
                        }
                        setContractTemplate(wsDoc.data()?.contractTemplate || null);
                    } catch(_) { setContractTemplate(null); }
                    setInviteInfo(invData);
                    setStep('name');
                } catch(e) { setError('ВўцвЦў: ' + e.message); }
                setLoading(false);
            };

            const formatResidentId = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 13);
                return digits.length > 6 ? `${digits.slice(0,6)}-${digits.slice(6)}` : digits;
            };

            const formatPhone = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 11);
                if (digits.length <= 3) return digits;
                if (digits.length <= 7) return `${digits.slice(0,3)}-${digits.slice(3)}`;
                return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
            };

            // ьћёвАюьЋё ВъЉВё▒ ьЏё ВаюВХю (Ж│ёВЋйВёю ВЌєВЮё вЋї)
            const handleDirectSubmit = async () => {
                if (!name.trim()) { setError('ВЮ┤вдёВЮё ВъЁваЦьЋ┤ВБ╝ВёИВџћ.'); return; }
                setLoading(true); setError('');
                try {
                    await createGoogleEmpJoinRequest(
                        firebaseUser.uid, firebaseUser.email, name.trim(),
                        inviteInfo, code.trim().toUpperCase(), profile, null
                    );
                    const newWp = {
                        bossUid: inviteInfo.bossUid, empUid: firebaseUser.uid,
                        shopName: inviteInfo.shopName, status: 'pending',
                        employeeId: null, inviteCode: code.trim().toUpperCase(),
                        name: name.trim(), residentId: profile.residentId,
                        bank: profile.bank, account: profile.account,
                        address: profile.address, phone: profile.phone,
                        contractStatus: null
                    };
                    onJoined(newWp);
                } catch(e) { setError('Ж░ђВъЁ ВІцьїе: ' + e.message); }
                setLoading(false);
            };

            // Жи╝вАюЖ│ёВЋйВёю ВъЉВё▒ ьЏё ВаюВХю
            const handleContractSubmit = async (contractData) => {
                await createGoogleEmpJoinRequest(
                    firebaseUser.uid, firebaseUser.email, name.trim(),
                    inviteInfo, code.trim().toUpperCase(), profile, contractData
                );
                const newWp = {

        // РћђРћђРћђ ВДЂВЏљ: Жи╝вг┤ВіцВ╝ђВЦ┤ ьЃГ РћђРћђРћђ
        function EmpScheduleTab({ bossSchedules, bossScheduleMemos, empAccount, firebaseUser, showAlert, displaySettings = {} }) {
            const [today] = useState(new Date());
            const [year, setYear] = useState(today.getFullYear());
            const [month, setMonth] = useState(today.getMonth() + 1);
            const [dayDetailDate, setDayDetailDate] = useState(null);

            // ьЎЋВЮИьЋю вЕћвфе ID ВХћВаЂ (вѓаВДюВ╣И ьЂ┤вдГ ВІю ьЋ┤вІ╣ вѓаВДю вЕћвфевЦ╝ вфевЉљ ьЎЋВЮИ В▓ўвдг)
            const seenMemoKey = empAccount?.bossUid ? `schedMemoSeenIds_emp_${empAccount.bossUid}` : null;
            const [seenMemoIds, setSeenMemoIds] = useState(() => {
                if (!seenMemoKey) return new Set();
                try {
                    const raw = localStorage.getItem(seenMemoKey);
                    return new Set(raw ? JSON.parse(raw) : []);
                } catch { return new Set(); }
            });
            useEffect(() => {
                if (!seenMemoKey) { setSeenMemoIds(new Set()); return; }
                try {
                    const raw = localStorage.getItem(seenMemoKey);
                    setSeenMemoIds(new Set(raw ? JSON.parse(raw) : []));
                } catch { setSeenMemoIds(new Set()); }
            }, [seenMemoKey]);
            const markDateMemosSeen = (memosOnDate) => {
                if (!seenMemoKey || !memosOnDate || memosOnDate.length === 0) return;
                setSeenMemoIds(prev => {
                    const next = new Set(prev);
                    memosOnDate.forEach(m => { if (m.id) next.add(m.id); });
                    try { localStorage.setItem(seenMemoKey, JSON.stringify([...next])); } catch {}
                    return next;
                });
            };

            const schedulesByDay = useMemo(() => {
                const map = {};
                (bossSchedules || []).forEach(s => {
                    if (!s.startDate || !s.endDate) return;
                    const [sy, sm, sd] = s.startDate.split('-').map(Number);
                    const [ey, em, ed] = s.endDate.split('-').map(Number);
                    const start = new Date(sy, sm - 1, sd);
                    const end = new Date(ey, em - 1, ed);
                    for (let d = new Date(start); d <= end; d.setDate(d.getDate() + 1)) {
                        const key = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
                        if (!map[key]) map[key] = [];
                        map[key].push(s);
                    }
                });
                return map;
            }, [bossSchedules]);

            const prevMonth = () => { let m=month-1,y=year; if(m<1){m=12;y--;} setMonth(m); setYear(y); };
            const nextMonth = () => { let m=month+1,y=year; if(m>12){m=1;y++;} setMonth(m); setYear(y); };
            const daysInMonth = getDaysInMonth(year, month);
            const firstDay = getFirstDayOfMonth(year, month);
            const fmtTime = (h, m) => m === 0 ? `${h}ВІю` : `${h}ВІю${m}вХё`;

            // ВіцВЎђВЮ┤ьћё В║љвЪгВЁђ
            const carouselRef = useRef(null);
            const touchStartX = useRef(null);
            const touchStartY = useRef(null);
            const isHorizontalDrag = useRef(false);
            const [dragX, setDragX] = useState(0);
            const [dragTransition, setDragTransition] = useState(false);
            const handleTouchStart = (e) => {
                touchStartX.current = e.touches[0].clientX;
                touchStartY.current = e.touches[0].clientY;
                isHorizontalDrag.current = false;
                setDragTransition(false);
                setDragX(0);
            };
            const handleTouchMove = (e) => {
                if (touchStartX.current === null || dayDetailDate) return;
                const dx = e.touches[0].clientX - touchStartX.current;
                const dy = e.touches[0].clientY - touchStartY.current;
                if (!isHorizontalDrag.current) {
                    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                    isHorizontalDrag.current = Math.abs(dx) > Math.abs(dy);
                    if (!isHorizontalDrag.current) return;
                }
                setDragX(dx);
            };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                const wasHorizontal = isHorizontalDrag.current;
                touchStartX.current = null;
                if (dayDetailDate || !wasHorizontal) { setDragX(0); return; }
                const w = carouselRef.current?.clientWidth || window.innerWidth;
                if (Math.abs(dx) > 80) {
                    setDragTransition(true);
                    setDragX(dx < 0 ? -w : w);
                    setTimeout(() => {
                        setDragTransition(false);
                        setDragX(0);
                        if (dx < 0) nextMonth(); else prevMonth();
                    }, 260);
                } else {
                    setDragTransition(true);
                    setDragX(0);
                    setTimeout(() => setDragTransition(false), 220);
                }
            };

            const postMemo = async (date, text) => {
                if (!text.trim()) return;
                try {
                    const memoId = `memo_${Date.now()}_${Math.random().toString(36).slice(2,8)}`;
                    const memo = {
                        id: memoId,
                        date,
                        authorId: firebaseUser.uid,
                        authorName: empAccount?.name || firebaseUser.displayName || 'ВДЂВЏљ',
                        text: text.trim(),
                        createdAt: new Date().toISOString()
                    };
                    const wsId = empAccount.bossUid;
                    // ВДЂВЏљВЮђ workspaces вгИВёювЦ╝ ВДЂВаЉ ВѕўВаЋьЋа Вѕў ВЌєВю╝в»ђвАю ВёювИїВ╗гваЅВЁўВЌљ ВађВъЦ
                    await fbDb.collection('workspaces').doc(wsId)
                        .collection('scheduleMemos').doc(memoId).set(memo);
                } catch (e) {
                    showAlert('вЕћвфе ВађВъЦ ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            const deleteMemo = async (date, id) => {
                try {
                    const wsId = empAccount.bossUid;
                    // Вџ░Вёа ВёювИїВ╗гваЅВЁўВЌљВёю ВІювЈё (ВДЂВЏљ в│ИВЮИВЮ┤ ВъЉВё▒ьЋю вЕћвфе)
                    await fbDb.collection('workspaces').doc(wsId)
                        .collection('scheduleMemos').doc(id).delete();
                } catch (e) {
                    showAlert('вЕћвфе ВѓГВаю ВІцьїе: ' + e.message, 'ВўцвЦў', 'error');
                }
            };

            const renderCalendarPanel = (py, pm, isCurrent) => {
                const pDaysIn = getDaysInMonth(py, pm);
                const pFirstDay = getFirstDayOfMonth(py, pm);
                const pDays = [];
                for (let i = 0; i < pFirstDay; i++) pDays.push(null);
                for (let d = 1; d <= pDaysIn; d++) pDays.push(d);
                while (pDays.length % 7 !== 0) pDays.push(null);
                const weeks = [];
                for (let i = 0; i < pDays.length; i += 7) weeks.push(pDays.slice(i, i + 7));
                const computeWeekBars = (week) => {
                    const dateStrs = week.map(d => d == null ? null : `${py}-${String(pm).padStart(2,'0')}-${String(d).padStart(2,'0')}`);
                    const bars = [];
                    (bossSchedules || []).forEach(s => {
                        let startCol = -1, endCol = -1;
                        for (let i = 0; i < 7; i++) {
                            const ds = dateStrs[i];
                            if (!ds) continue;
                            if (ds >= s.startDate && ds <= s.endDate) {
                                if (startCol === -1) startCol = i;
                                endCol = i;
                            }
                        }
                        if (startCol !== -1) bars.push({ ...s, startCol, endCol });
                    });
                    bars.sort((a, b) =>
                        (a.startHour * 60 + (a.startMinute||0)) - (b.startHour * 60 + (b.startMinute||0))
                        || a.startCol - b.startCol
                    );
                    const rows = [];
                    bars.forEach(bar => {
                        let placed = false;
                        for (let r = 0; r < rows.length; r++) {
                            if (rows[r].every(rb => rb.endCol < bar.startCol || rb.startCol > bar.endCol)) {
                                rows[r].push(bar); bar.row = r; placed = true; break;
                            }
                        }
                        if (!placed) { rows.push([bar]); bar.row = rows.length - 1; }
                    });
                    return { bars, rowCount: rows.length };
                };
                return (
                    <div className="bg-white rounded-xl border border-gray-200 shadow-sm overflow-hidden w-full flex-shrink-0">
                        <div className="grid grid-cols-7 border-b border-gray-100">
                            {['ВЮ╝','ВЏћ','ьЎћ','Вѕў','вфЕ','ЖИѕ','ьєа'].map((d, i) => (
                                <div key={d} className={`py-2 text-center text-xs font-bold ${i===0 ? 'text-red-500' : i===6 ? 'text-blue-500' : 'text-gray-500'}`}>{d}</div>
                            ))}
                        </div>
                        {weeks.map((week, weekIdx) => {
                            const { bars, rowCount } = computeWeekBars(week);
                            const barAreaHeight = Math.max(rowCount * 18 + 4, 40);
                            return (
                                <div key={`wk-${weekIdx}`} className="relative border-b border-gray-100">
                                    <div className="grid grid-cols-7">
                                        {week.map((day, idx) => {
                                            if (!day) return <div key={`e-${weekIdx}-${idx}`} className="border-r border-gray-50" style={{minHeight: `${barAreaHeight + 24}px`}}/>;
                                            const dateStr = `${py}-${String(pm).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
                                            const memosOnDate = bossScheduleMemos[dateStr] || [];
                                            const memoCount = memosOnDate.length;
                                            const hasUnread = memosOnDate.some(m => m.authorId !== firebaseUser?.uid && m.id && !seenMemoIds.has(m.id));
                                            const isToday = today.getFullYear()===py && today.getMonth()+1===pm && today.getDate()===day;
                                            const handleOpenDay = isCurrent ? () => { markDateMemosSeen(memosOnDate); setDayDetailDate(dateStr); } : undefined;
                                            return (
                                                <div key={day}
                                                    onClick={handleOpenDay}
                                                    className={`border-r border-gray-100 p-1 ${isCurrent ? 'cursor-pointer hover:bg-yellow-50/50' : ''} ${isToday ? 'bg-blue-50' : ''}`}
                                                    style={{minHeight: `${barAreaHeight + 24}px`}}>
                                                    <div className="flex items-center justify-between">
                                                        <span className={`text-xs font-bold ${isToday ? 'text-blue-600' : idx===0 ? 'text-red-500' : idx===6 ? 'text-blue-500' : 'text-gray-600'}`}>{day}</span>
                                                        {memoCount > 0 && (
                                                            hasUnread
                                                                ? <span className="text-[8px] bg-red-500 text-white w-3.5 h-3.5 flex items-center justify-center rounded-full font-bold">{memoCount}</span>
                                                                : <span className="text-[8px] bg-yellow-100 text-yellow-700 px-1 rounded-full font-bold">{memoCount}</span>
                                                        )}
                                                    </div>
                                                </div>
                                            );
                                        })}
                                    </div>
                                    <div className="absolute left-0 right-0 pointer-events-none" style={{top: '22px', bottom: '0'}}>
                                        <div className="grid grid-cols-7 h-full px-0.5"
                                            style={{gridAutoRows: '16px', rowGap: '2px', alignContent: 'start'}}>
                                            {bars.map(bar => {
                                                const label = `${bar.empName}(${fmtTime(bar.startHour, bar.startMinute||0)}~${fmtTime(bar.endHour, bar.endMinute||0)})`;
                                                return (
                                                    <div key={`${bar.id}-wk${weekIdx}`}
                                                        style={{
                                                            gridColumn: `${bar.startCol + 1} / ${bar.endCol + 2}`,
                                                            gridRow: bar.row + 1,
                                                            backgroundColor: bar.color
                                                        }}
                                                        className="text-[9px] font-medium text-gray-800 rounded px-1 overflow-hidden whitespace-nowrap leading-[16px] text-center"
                                                        title={label}>
                                                        {label}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            );
                        })}
                    </div>
                );
            };
            const prevY = month === 1 ? year - 1 : year;
            const prevM = month === 1 ? 12 : month - 1;
            const nextY = month === 12 ? year + 1 : year;
            const nextM = month === 12 ? 1 : month + 1;

            return (
                <div>
                    <div className="flex items-center justify-between mb-4">
                        <button onClick={prevMonth} className="p-2 rounded-lg hover:bg-gray-200"><ChevronLeft className="w-5 h-5"/></button>
                        <h2 className="text-lg font-bold text-gray-800">{year}вЁё {month}ВЏћ Жи╝вг┤ВіцВ╝ђВЦ┤</h2>
                        <button onClick={nextMonth} className="p-2 rounded-lg hover:bg-gray-200"><ChevronRight className="w-5 h-5"/></button>
                    </div>
                    <div ref={carouselRef} className="overflow-hidden" style={{ touchAction: 'pan-y' }} onTouchStart={handleTouchStart} onTouchMove={handleTouchMove} onTouchEnd={handleTouchEnd}>
                        <div className="flex" style={{ width: '300%', transform: `translate3d(calc(-33.3333% + ${dragX}px), 0, 0)`, transition: dragTransition ? 'transform 0.25s ease-out' : 'none' }}>
                            <div className="w-1/3 flex-shrink-0 pr-2">{renderCalendarPanel(prevY, prevM, false)}</div>
                            <div className="w-1/3 flex-shrink-0 px-1">{renderCalendarPanel(year, month, true)}</div>
                            <div className="w-1/3 flex-shrink-0 pl-2">{renderCalendarPanel(nextY, nextM, false)}</div>
                        </div>
                    </div>

                    {/* ВЏћ ВўѕВЃЂ ЖИЅВЌг ВџћВЋй */}
                    <div className="mt-4 bg-white rounded-xl border border-gray-200 p-4">
                        <h3 className="text-sm font-bold text-gray-700 mb-1">{month}ВЏћ ВўѕВЃЂ ЖИЅВЌг</h3>
                        <p className="text-gray-400 mb-3 whitespace-nowrap overflow-hidden" style={{fontSize: 'clamp(8px, 2.6vw, 11px)'}}>Ж┤ђвдгВъљЖ░ђ ВъЁваЦьЋа вІ╣ВІюВЮў ВІюЖИЅВЮ┤ ВаЂВџЕвљю ЖИЅВЌгВЮ┤в»ђвАю ВІцВѕўва╣ВЋАЖ│╝ вІцвЦ╝ Вѕў ВъѕВіхвІѕвІц.</p>
                        {(() => {
                            const ds = displaySettings || {};
                            const empIdKey = String(empAccount?.employeeId || '0');
                            const monthKey = `${year}-${String(month).padStart(2,'0')}`;
                            // вѓ┤ ВіцВ╝ђВЦ┤вДї ВХћвац per-day в│ђьЎў
                            const mySchedules = (bossSchedules || []).filter(s => String(s.empId) === empIdKey);
                            const myMonthData = {};
                            const myMonthAllData = {};
                            let totalH = 0, totalPay = 0, daysSet = new Set();
                            const wageMap = {};
                            mySchedules.forEach(s => {
                                const hours = ((s.endHour * 60 + (s.endMinute||0)) - (s.startHour * 60 + (s.startMinute||0))) / 60;
                                if (hours <= 0) return;
                                const [sy,sm,sd] = s.startDate.split('-').map(Number);
                                const [ey,em,ed] = s.endDate.split('-').map(Number);
                                const start = new Date(sy, sm-1, sd);
                                const end = new Date(ey, em-1, ed);
                                const wage = Number(s.wage) > 0 ? Number(s.wage) : 0;
                                for (let d = new Date(start); d <= end; d.setDate(d.getDate()+1)) {
                                    const y = d.getFullYear(), mo = d.getMonth()+1, dd = d.getDate();
                                    const mk = `${y}-${String(mo).padStart(2,'0')}`;
                                    if (!myMonthAllData[mk]) myMonthAllData[mk] = { days: {} };
                                    if (!myMonthAllData[mk].days[dd]) myMonthAllData[mk].days[dd] = { entries: {} };
                                    const cur = myMonthAllData[mk].days[dd].entries[empIdKey] || { hours: 0, pay: 0, name: empAccount?.name || '', wage };
                                    cur.hours += hours;
                                    cur.pay += Math.round(hours * wage);
                                    myMonthAllData[mk].days[dd].entries[empIdKey] = cur;
                                    if (mk === monthKey) {
                                        daysSet.add(dd);
                                        totalH += hours;
                                        totalPay += Math.round(hours * wage);
                                        if (wage > 0) {
                                            if (!wageMap[wage]) wageMap[wage] = { hours: 0, days: new Set() };
                                            wageMap[wage].hours += hours;
                                            wageMap[wage].days.add(dd);
                                        }
                                    }
                                }
                            });
                            if (mySchedules.length === 0 || totalH === 0) {
                                return (
                                    <div className="flex flex-wrap gap-4 text-sm">
                                        <div><p className="text-gray-500">Жи╝вг┤ВЮ╝</p><p className="font-bold text-gray-800">0ВЮ╝</p></div>
                                        <div><p className="text-gray-500">В┤Ю ВІюЖ░ё</p><p className="font-bold text-gray-800">0ВІюЖ░ё</p></div>
                                    </div>
                                );
                            }
                            const wages = Object.entries(wageMap).sort((a,b) => Number(a[0]) - Number(b[0]));
                            // ВБ╝ью┤ВѕўвІ╣ Ж│ёВѓ░ (ВіцВ╝ђВЦ┤ ВаёВ▓┤ month вЇ░ВЮ┤ьё░вАю)
                            const holidayInfo = ds.showHoliday ? (() => {
                                try {
                                    const fakeEmp = [{ id: Number(empIdKey), name: empAccount?.name || '', wage: Number(empAccount?.wage) || 0, scheduledDays: '5', dailyHours: '8', status: 'working' }];
                                    const allHoliday = calcHolidayPayBySunday(myMonthAllData, fakeEmp);
                                    let hp = 0;
                                    Object.entries(allHoliday).forEach(([s, wd]) => {
                                        const [sy, sm] = s.split('-').map(Number);
                                        if (sy === year && sm === month) wd.forEach(h => { hp += h.holidayPay; });
                                    });
                                    return hp;
                                } catch(e) { return 0; }
                            })() : 0;
                            const deductInfo = ds.showDeduction ? (() => {
                                const ins = getInsuranceInfo(ds, empAccount);
                                if (ins.rate <= 0) return null;
                                const gross = ds.showHoliday ? totalPay + holidayInfo : totalPay;
                                const deductAmt = Math.round(gross * ins.rate / 100);
                                return { name: ins.name || 'Ж│хВаю', rate: ins.rate, amount: deductAmt };
                            })() : null;
                            const finalTotal = totalPay + (ds.showHoliday ? holidayInfo : 0) - (deductInfo?.amount || 0);
                            return (
                                <div className="space-y-2 text-sm">
                                    <div className="flex flex-wrap gap-4">
                                        <div><p className="text-gray-500">Жи╝вг┤ВЮ╝</p><p className="font-bold text-gray-800">{daysSet.size}ВЮ╝</p></div>
                                        <div><p className="text-gray-500">В┤Ю ВІюЖ░ё</p><p className="font-bold text-gray-800">{fmtHours(totalH) || '0ВІюЖ░ё'}</p></div>
                                    </div>
                                    {ds.showPay !== false && (<>
                                        {wages.map(([w, info]) => (
                                            <div key={w} className="flex justify-between items-center bg-gray-50 rounded-lg px-3 py-2">
                                                <span className="text-gray-600">ВІюЖИЅ {Number(w).toLocaleString()}ВЏљ <span className="text-gray-400">├Ќ {info.days.size}ВЮ╝ ({fmtHours(info.hours)})</span></span>
                                                <span className="font-bold text-gray-800">{Math.round(info.hours * Number(w)).toLocaleString()}ВЏљ</span>
                                            </div>
                                        ))}
                                        <div className="flex justify-between items-center border-t border-gray-200 pt-2 px-1">
                                            <span className="font-bold text-gray-700">{ds.showHoliday || ds.showDeduction ? 'ЖИЅВЌг ьЋЕВѓ░' : 'ьЋЕВѓ░'}</span>
                                            <span className="font-bold text-green-600 text-base">{totalPay.toLocaleString()}ВЏљ</span>
                                        </div>
                                    </>)}
                                    {ds.showHoliday && holidayInfo > 0 && (
                                        <div className="flex justify-between items-center bg-blue-50 rounded-lg px-3 py-2">
                                            <span className="text-blue-600 font-medium">ВБ╝ью┤ВѕўвІ╣</span>
                                            <span className="font-bold text-blue-600">+{holidayInfo.toLocaleString()}ВЏљ</span>
                                        </div>
                                    )}
                                    {ds.showDeduction && deductInfo && (
                                        <div className="flex justify-between items-center bg-orange-50 rounded-lg px-3 py-2">
                                            <span className="text-orange-600 font-medium">{deductInfo.name} -{deductInfo.rate}%</span>
                                            <span className="font-bold text-orange-600">-{deductInfo.amount.toLocaleString()}ВЏљ</span>
                                        </div>
                                    )}
                                    {(ds.showHoliday || ds.showDeduction) && (
                                        <div className="flex justify-between items-center border-t-2 border-gray-300 pt-2 px-1">
                                            <span className="font-bold text-gray-800">В┤Ю ЖИѕВЋА</span>
                                            <span className="font-black text-purple-700 text-base">{finalTotal.toLocaleString()}ВЏљ</span>
                                        </div>
                                    )}
                                </div>
                            );
                        })()}
                    </div>

                    {dayDetailDate && (
                        <EmpDayDetailModal
                            date={dayDetailDate}
                            schedules={schedulesByDay[dayDetailDate] || []}
                            memos={bossScheduleMemos[dayDetailDate] || []}
                            currentEmpId={firebaseUser.uid}
                            currentEmpName={empAccount?.name || firebaseUser.displayName || 'ВДЂВЏљ'}
                            onPostMemo={postMemo}
                            onDeleteMemo={deleteMemo}
                            onClose={() => setDayDetailDate(null)}
                        />
                    )}
                </div>
            );
        }

        // РћђРћђРћђ ВДЂВЏљВџЕ вѓаВДю ВЃЂВёИ вфевІг (ВЌ┤въї+вЕћвфе) РћђРћђРћђ
        function EmpDayDetailModal({ date, schedules, memos, currentEmpId, currentEmpName, onPostMemo, onDeleteMemo, onClose }) {
            const [memoText, setMemoText] = useState('');
            const [posting, setPosting] = useState(false);
            const sortedSchedules = [...(schedules || [])].sort(
                (a, b) => (a.startHour * 60 + (a.startMinute||0)) - (b.startHour * 60 + (b.startMinute||0))
            );
            const fmtTime = (h, m) => m === 0 ? `${h}ВІю` : `${h}ВІю${m}вХё`;
            const [yStr, mStr, dStr] = date.split('-');
            const displayDate = `${yStr}вЁё ${parseInt(mStr)}ВЏћ ${parseInt(dStr)}ВЮ╝`;

            const handlePost = async () => {
                setPosting(true);
                await onPostMemo(date, memoText);
                setMemoText('');
                setPosting(false);
            };

            return (
                <div className="fixed inset-0 bg-black/60 z-50 flex items-center justify-center p-3 backdrop-blur-sm">
                    <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md max-h-[92vh] flex flex-col">
                        <div className="flex items-center justify-between p-5 border-b border-gray-100 shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{displayDate}</h3>
                            <button onClick={onClose} className="p-2 hover:bg-gray-100 rounded-full"><X className="w-5 h-5"/></button>
                        </div>
                        <div className="p-5 space-y-4 overflow-y-auto">
                            <div>
                                <h4 className="text-sm font-bold text-gray-700 mb-2">Жи╝вг┤ ВіцВ╝ђВЦ┤ ({sortedSchedules.length})</h4>
                                {sortedSchedules.length === 0 ? (
                                    <p className="text-xs text-gray-400 bg-gray-50 rounded-xl p-3 text-center">вЊ▒вАЮвљю ВіцВ╝ђВЦ┤ВЮ┤ ВЌєВіхвІѕвІц.</p>
                                ) : (
                                    <div className="space-y-1.5">
                                        {sortedSchedules.map(s => (
                                            <div key={s.id} className="rounded-xl px-3 py-2 text-sm" style={{backgroundColor: s.color}}>
                                                <div className="font-bold text-gray-800">{s.empName}({fmtTime(s.startHour, s.startMinute||0)}~{fmtTime(s.endHour, s.endMinute||0)})</div>
                                                {s.memo && <div className="text-xs text-gray-600 mt-0.5">{s.memo}</div>}
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                            <div>
                                <h4 className="text-sm font-bold text-gray-700 mb-2">вЕћвфе ({memos.length})</h4>
                                {memos.length === 0 ? (
                                    <p className="text-xs text-gray-400 bg-gray-50 rounded-xl p-3 text-center mb-2">вЕћвфеЖ░ђ ВЌєВіхвІѕвІц.</p>
                                ) : (
                                    <div className="space-y-1.5 mb-2">
                                        {memos.map(m => (
                                            <div key={m.id} className="bg-gray-50 border border-gray-200 rounded-xl p-2.5">
                                                <div className="flex items-start justify-between gap-2">
                                                    <div className="flex-1">
                                                        <div className="text-xs font-bold text-gray-700">{m.authorName}</div>
                                                        <p className="text-sm text-gray-700 whitespace-pre-wrap mt-0.5">{m.text}</p>
                                                    </div>
                                                    {m.authorId === currentEmpId && (
                                                        <button onClick={() => onDeleteMemo(date, m.id)} className="text-xs text-red-400 hover:text-red-600 shrink-0">
                                                            <X className="w-3.5 h-3.5" />
                                                        </button>
                                                    )}
                                                </div>
                                                <div className="text-[10px] text-gray-400 mt-0.5">{new Date(m.createdAt).toLocaleString('ko-KR')}</div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                <div className="flex gap-2">
                                    <textarea value={memoText} onChange={e => setMemoText(e.target.value)} rows={2}
                                        className="flex-1 border-2 border-gray-200 rounded-xl px-3 py-2 text-sm resize-none focus:border-blue-500 outline-none"
                                        placeholder="вЕћвфе вѓеЖИ░ЖИ░..." />
                                    <button onClick={handlePost} disabled={posting || !memoText.trim()}
                                        className="bg-blue-600 text-white px-4 rounded-xl font-bold hover:bg-blue-700 disabled:opacity-50 text-sm">
                                        вЊ▒вАЮ
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function EmployeeApp({ empAccount, onSetEmpAccount, firebaseUser, mySubmissions, notifications, onLogout, onLock, showAlert, showConfirm, modalConfig, onSwitchWorkplace, onDisconnectWorkplace, onAddWorkplace, allWorkplaces, notices = [], displaySettings = {} }) {
            const [activeTab, setActiveTab] = useState('calendar');
            const [today] = useState(new Date());
            const [year, setYear] = useState(today.getFullYear());
            const [month, setMonth] = useState(today.getMonth() + 1);
            const [myPayslips, setMyPayslips] = useState([]);
            const [payslipBanner, setPayslipBanner] = useState(null); // { year, month, docId }
            const [viewingPayslip, setViewingPayslip] = useState(null);
            const [bossSchedules, setBossSchedules] = useState([]);
            const [bossScheduleMemosDoc, setBossScheduleMemosDoc] = useState({}); // ВѓгВъЦ вгИВёю вѓ┤ вЕћвфе (legacy)
            const [bossScheduleMemosSub, setBossScheduleMemosSub] = useState({}); // ВёювИїВ╗гваЅВЁў вѓ┤ вЕћвфе
            const bossScheduleMemos = useMemo(
                () => mergeScheduleMemoMaps(bossScheduleMemosDoc, bossScheduleMemosSub),
                [bossScheduleMemosDoc, bossScheduleMemosSub]
            );

            // Ж┤ђвдгВъљ ВіцВ╝ђВЦ┤/вЕћвфе ВІцВІюЖ░ё вАювЊю (ВѓгВъЦ вгИВёю ваѕв▓е)
            useEffect(() => {
                if (!firebaseUser || !empAccount?.bossUid) return;
                const unsub = fbDb.collection('workspaces').doc(empAccount.bossUid)
                    .onSnapshot(doc => {
                        if (doc.exists) {
                            const data = doc.data();
                            setBossSchedules(data.schedules || []);
                            setBossScheduleMemosDoc(data.scheduleMemos || {});
                        }
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, empAccount?.bossUid]);

            // ВіцВ╝ђВЦ┤ вЕћвфе ВёювИїВ╗гваЅВЁў ВІцВІюЖ░ё вАювЊю (ВДЂВЏљ ВъЉВё▒ вЕћвфе ьЈгьЋе)
            useEffect(() => {
                if (!firebaseUser || !empAccount?.bossUid) return;
                const unsub = fbDb.collection('workspaces').doc(empAccount.bossUid)
                    .collection('scheduleMemos')
                    .onSnapshot(snap => {
                        const byDate = {};
                        snap.forEach(doc => {
                            const m = doc.data();
                            if (!m.date) return;
                            if (!byDate[m.date]) byDate[m.date] = [];
                            byDate[m.date].push({ ...m, id: m.id || doc.id });
                        });
                        setBossScheduleMemosSub(byDate);
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, empAccount?.bossUid]);

                            read: ts <= empMemoSeenAt,
                            bossUid: empAccount?.bossUid || null

                setEmpDragX(0);

                const dy = e.touches[0].clientY - empTouchStartY.current;
                if (!empIsHorizontal.current) {
                    if (Math.abs(dx) < 10 && Math.abs(dy) < 10) return;
                    empIsHorizontal.current = Math.abs(dx) > Math.abs(dy);
                    if (!empIsHorizontal.current) return;
                }
                setEmpDragX(dx);
            };
            const handleEmpTouchEnd = (e) => {
                if (empTouchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - empTouchStartX.current;
                const wasHorizontal = empIsHorizontal.current;
                empTouchStartX.current = null;
                if (submitModal || viewModal || !wasHorizontal) { setEmpDragX(0); return; }

                    setEmpTransition(true);
                    setEmpDragX(dx < 0 ? -w : w);

                        setEmpTransition(false);
                        setEmpDragX(0);

                                        const sorted = [...myPayslips].sort((a, b) => {
