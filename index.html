        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, allEmployees, monthlyData, setMonthlyData, onClose, onDelete, workspaceId }) {
            const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };

            const combinedEmployees = useMemo(() => {

                Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
                    if (!activeIds.has(empIdStr)) {

            const [minsData, setMinsData] = useState(() => {

            // л©Фл™® мВ≠м†Ь мГБнГЬ (мІБмЫРмЭі мЮЕл†•нХЬ л©Фл™®л•Љ кіАл¶ђмЮРк∞А мВ≠м†ЬнХ† мИШ мЮИмЭМ)

            const handleHourKeyDown = (e, empIdx) => {
                if (e.key === 'Enter') {

            const handleSave = () => {
                const dateStr = `${year}-${String(month).padStart(2,'0')}-${String(day).padStart(2,'0')}`;

                // Google мЧ∞лПЩ мІБмЫРмЭШ submissions лПЩкЄ∞нЩФмЪ© л™©л°Э
                const submissionUpdates = [];
                combinedEmployees.forEach(emp => {
                    const existingEntry = currentDayData.entries[emp.id];
                    const empUid = existingEntry?.empUid || emp.empUid;
                    if (empUid) {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        submissionUpdates.push({ empUid, employeeId: emp.id, empName: emp.name, hours, isNew: !existingEntry?.submittedByEmp });
                    }
                });

                setMonthlyData(prev => {
                    const newData = { ...prev };
                    if (!newData[monthKey]) newData[monthKey] = { days: {} };
                    if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

                    newData[monthKey].days[day].revenue = Number(revenue) || 0;

                    combinedEmployees.forEach(emp => {
                        const h = Number(hoursData[emp.id]) || 0;
                        const m = Number(minsData[emp.id]) || 0;
                        const hours = h + m / 60;
                        const existingEntry = prev[monthKey]?.days[day]?.entries[emp.id];

                        if (hours > 0) {
                            const empUid = existingEntry?.empUid || emp.empUid;
                            if (empUid && (!existingEntry || existingEntry.hours !== hours)) {
                                if (!existingEntry) {
                                    // кіАл¶ђмЮРк∞А лєИ мєЄмЧР мГИл°Ь мЮЕл†•
                                    sendChangeNotification(empUid, {
                                        type: 'hours_entered',
                                        date: dateStr,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                } else {
                                    // кЄ∞м°і мЛЬк∞ДмЭД л≥Ак≤љ (мІБмЫР м†ЬмґЬмЭілУ† кіАл¶ђмЮР мЮЕл†•мЭілУ†)
                                    sendChangeNotification(empUid, {
                                        type: 'hours_modified',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        newHours: hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            newData[monthKey].days[day].entries[emp.id] = {
                                hours, pay: Math.round(hours * emp.wage), name: emp.name, wage: emp.wage,
                                note: deletedNotes[emp.id] ? '' : (existingEntry?.note || ''),
                                submittedByEmp: existingEntry?.submittedByEmp || false,
                                empUid: existingEntry?.empUid || emp.empUid || null,
                                submittedHours: existingEntry?.submittedHours || null,
                                bossModified: existingEntry?.submittedByEmp ? (existingEntry.hours !== hours) : false
                            };
                        } else {
                            // кЄ∞м°і мЛЬк∞ДмЭі мЮИмЧИлКФлН∞ мВ≠м†ЬлРЬ к≤љмЪ∞ вЖТ мІБмЫРмЧРк≤М мХМл¶Љ
                            if (existingEntry?.hours > 0) {
                                const empUid = existingEntry?.empUid || emp.empUid;
                                if (empUid) {
                                    sendChangeNotification(empUid, {
                                        type: 'hours_deleted',
                                        date: dateStr,
                                        oldHours: existingEntry.hours,
                                        bossUid: workspaceId || null
                                    }).catch(() => {});
                                }
                            }
                            delete newData[monthKey].days[day].entries[emp.id];
                        }
                    });
                    return newData;
                });

                // кЈЉлђімЮР лЛђл†•мЧРлПД л∞ШмШБ: submissions мїђл†ЙмЕШ лПЩкЄ∞нЩФ (кЄ∞м°і мЧЕлН∞мЭінКЄ + мЛ†кЈЬ мГЭмД±)
                if (workspaceId && submissionUpdates.length > 0) {
                    submissionUpdates.forEach(({ empUid, employeeId, empName, hours, isNew }) => {
                        const subsRef = fbDb.collection('workspaces').doc(workspaceId).collection('submissions');
                        if (hours > 0) {
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).set({
                                empUid, employeeId, empName, date: dateStr, hours,
                                locked: true, bossEntered: isNew,
                                submittedAt: firebase.firestore.FieldValue.serverTimestamp()
                            }, { merge: true }).catch(() => {});
                        } else {
                            // мЛЬк∞Д 0мЭіл©і submissionsмЧРмДЬлПД мВ≠м†Ь
                            const docId = `${empUid}_${dateStr}`;
                            subsRef.doc(docId).delete().catch(() => {});
                        }
                    });
                }

                onClose();
            };

            return (
                <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-4 z-50 backdrop-blur-sm">
                    <form onSubmit={(e) => { e.preventDefault(); handleSave(); }} className="bg-white rounded-2xl shadow-2xl w-full max-w-sm flex flex-col max-h-[90vh]">
                        <div className="p-5 border-b flex justify-between items-center bg-gray-50 rounded-t-2xl shrink-0">
                            <h3 className="text-lg font-bold text-gray-800">{month}мЫФ {day}мЭЉ мГБмДЄ мИШм†Х</h3>
                            <button type="button" onClick={onClose} className="p-1 hover:bg-gray-200 rounded-full transition"><X className="w-5 h-5 text-gray-500"/></button>
                        </div>
                        
                        <div className="p-5 space-y-5 overflow-y-auto">
                            <div>
                                <label className="block text-sm font-bold text-gray-700 mb-2">мЭЉмЭЉ лІ§мґЬ (мЫР)</label>
                                <input 
                                    type="number" 
                                    value={revenue} 
                                    onChange={e => setRevenue(e.target.value)}
                                    className="w-full border border-gray-300 rounded-xl px-4 py-3 focus:ring-2 focus:ring-green-500 outline-none transition" 
                                    placeholder="0"
                                />
                            </div>

                            <div className="pt-3 border-t border-gray-100">
                                <label className="block text-sm font-bold text-gray-700 mb-1">кЈЉлђі мЛЬк∞Д мИШм†Х</label>
                                <p className="text-xs text-gray-400 mb-3">мЛЬк∞Д/лґД мЮЕл†• нЫД Enter вЖТ лЛ§мЭМ кЈЉлђімЮРл°Ь мЭілПЩ</p>
                                {combinedEmployees.map((emp, idx) => (
                                    <React.Fragment key={emp.id}>
                                        <div className={`flex justify-between items-center mb-1 p-2 rounded-lg ${emp.isInactive ? (emp.inactiveStatus === 'leave' ? 'bg-yellow-50/50' : 'bg-red-50/50') : 'bg-gray-50'}`}>
                                            <span className="text-sm text-gray-700 truncate flex items-center gap-1 font-medium">
                                                {emp.isInactive ? (
                                                    emp.inactiveStatus === 'leave'
                                                        ? <span className="text-xs text-yellow-600 bg-yellow-50 border border-yellow-200 px-1.5 py-0.5 rounded font-bold">нЬімІБ</span>
                                                        : <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1.5 py-0.5 rounded font-bold">нЗімВђ</span>
                                                ) : (
                                                    <span>{emp.displayId}.</span>
                                                )}
                                                {emp.name}

                                            <div className="flex items-center gap-1">
                                                <input
                                                    ref={el => hourRefs.current[emp.id] = el}
                                                    type="number" min="0"
                                                    value={hoursData[emp.id] ?? ''}
                                                    onChange={e => setHoursData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleHourKeyDown(e, idx)}
                                                    className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-green-500 outline-none"

                                                    type="number" min="0" max="59"
                                                    value={minsData[emp.id] ?? ''}
                                                    onChange={e => setMinsData(prev => ({...prev, [emp.id]: e.target.value}))}
                                                    onKeyDown={e => handleMinKeyDown(e, idx)}
                                                    className="w-14 border border-gray-300 rounded-lg px-2 py-1.5 text-right text-sm focus:ring-2 focus:ring-blue-400 outline-none"
                                                    placeholder="0"
                                                />
                                                <span className="text-xs text-gray-500">лґД</span>

                            {/* л™®л∞ФмЭЉ мВ≠м†Ь л≤ДнКЉ мШБмЧ≠ */}

        function TabPayroll({ employees, monthlyData, showAlert, workspaceId, workspaceInfo, firebaseUser }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            
            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month]);

            const payrollTouchStartX = useRef(null);
            const handlePayrollTouchStart = (e) => { payrollTouchStartX.current = e.touches[0].clientX; };
            const handlePayrollTouchEnd = (e) => {
                if (payrollTouchStartX.current === null) return;
                const dx = e.changedTouches[0].clientX - payrollTouchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);

                    const [sy, sm] = sundayStr.split('-').map(Number);

        function TabChart({ monthlyData, employees }) {
            const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
            const [pieMonth, setPieMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
            });
            const [pieYear, setPieYear] = useState(new Date().getFullYear());
            
            const availableYears = useMemo(() => {
                const years = new Set([new Date().getFullYear()]);
                Object.keys(monthlyData).forEach(key => years.add(parseInt(key.split('-')[0])));
                return Array.from(years).sort((a,b) => b - a);
            }, [monthlyData]);

            const chartData = useMemo(() => {
                const data = Array.from({ length: 12 }, (_, i) => ({ month: i + 1, revenue: 0, pay: 0, holidayPay: 0 }));
                Object.keys(monthlyData).forEach(key => {
                    const [y, m] = key.split('-');
                    if (parseInt(y) === selectedYear) {
                        const monthIdx = parseInt(m) - 1;
                        const monthObj = monthlyData[key] || {};
                        const days = monthObj.days || {};

                        let dailySumRev = 0;
                        Object.values(days).forEach(day => {
                            dailySumRev += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { data[monthIdx].pay += (entry.pay || 0) / 10000; });
                        });

                        const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailySumRev;
                        data[monthIdx].revenue += effectiveRev / 10000;
                    }
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
                    const [sy, sm] = sundayStr.split('-').map(Number);
                    if (sy !== selectedYear) return;
                    const monthIdx = sm - 1;
                    weekData.forEach(({ holidayPay }) => { data[monthIdx].holidayPay += holidayPay / 10000; });
                });
                return data;
            }, [monthlyData, employees, selectedYear]);

            const maxValue = Math.max(...chartData.map(d => Math.max(d.revenue, d.pay + d.holidayPay)), 100);
            const yTicks = [0, maxValue * 0.25, maxValue * 0.5, maxValue * 0.75, maxValue];

            const allHolidayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

            const pieMonthData = useMemo(() => {
                let dailyRevSum = 0, pay = 0;
                const monthObj = monthlyData[pieMonth] || { days: {} };
                Object.values(monthObj.days).forEach(day => {
                    dailyRevSum += (day.revenue || 0);
                    Object.values(day.entries || {}).forEach(entry => { pay += (entry.pay || 0); });
                });
                const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieMonth)) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: effectiveRev, pay, holidayPay };
            }, [monthlyData, pieMonth, allHolidayBySunday]);

            const pieYearData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    if (key.startsWith(pieYear.toString())) {
                        const monthObj = monthlyData[key];
                        let dailyRevSum = 0;
                        Object.values(monthObj.days || {}).forEach(day => {
                            dailyRevSum += (day.revenue || 0);
                            Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                        });
                        totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                    }
                });
                let holidayPay = 0;
                Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
                    if (sundayStr.startsWith(pieYear.toString())) weekData.forEach(h => { holidayPay += h.holidayPay; });
                });
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, pieYear, allHolidayBySunday]);

            const pieTotalData = useMemo(() => {
                let totalEffectiveRev = 0, totalPay = 0;
                Object.keys(monthlyData).forEach(key => {
                    const monthObj = monthlyData[key];
                    let dailyRevSum = 0;
                    Object.values(monthObj.days || {}).forEach(day => {
                        dailyRevSum += (day.revenue || 0);
                        Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                    });
                    totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
                });
                const holidayPay = Object.values(allHolidayBySunday).flat().reduce((s, h) => s + h.holidayPay, 0);
                return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
            }, [monthlyData, allHolidayBySunday]);

            return (
                <div className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 max-w-5xl mx-auto space-y-10">
                    <div>
                        <div className="flex flex-col sm:flex-row sm:justify-between sm:items-center mb-8 gap-2">
                            <h2 className="text-lg md:text-xl font-bold text-gray-800 flex items-center gap-2">
                                <BarChart3 className="w-5 h-5 text-green-600 flex-shrink-0" /> мЫФл≥Д лІ§мґЬ л∞П мЭЄк±ілєД мґФмЭі
                            </h2>
                            <select

        // ==========================================
        // м£ЉнЬімИШлЛє мШИмЄ° нГ≠

        function TabPredict({ employees, predictData, setPredictData, showConfirm }) {
            const [currentDate, setCurrentDate] = useState(new Date());
            const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
            const [editDayModal, setEditDayModal] = useState(null);

            const year = currentDate.getFullYear();
            const month = currentDate.getMonth() + 1;
            const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

            const currentMonthData = predictData[monthKey] || { days: {} };
            const activeEmployees = employees
                .filter(e => (e.status || (e.isWorking === false ? 'resigned' : 'working')) === 'working')
                .sort((a, b) => a.displayId - b.displayId);

            const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
            const nextMonth = () => setCurrentDate(new Date(year, month, 1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (isBulkInputOpen || editDayModal) return;
                    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
                    if (e.key === 'ArrowLeft') prevMonth();
                    if (e.key === 'ArrowRight') nextMonth();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [year, month, isBulkInputOpen, editDayModal]);

            const touchStartX = useRef(null);
            const handleTouchStart = (e) => { touchStartX.current = e.touches[0].clientX; };
            const handleTouchEnd = (e) => {
                if (touchStartX.current === null || isBulkInputOpen || editDayModal) return;
                const dx = e.changedTouches[0].clientX - touchStartX.current;
                if (Math.abs(dx) > 50) { dx < 0 ? nextMonth() : prevMonth(); }
                touchStartX.current = null;
            };

            const handleDeleteDay = (dayToDel) => {
                showConfirm(`${year}лЕД ${month}мЫФ ${dayToDel}мЭЉмЭШ мШИмЄ° м†Хл≥іл•Љ м†ХлІР мВ≠м†ЬнХШмЛЬк≤†мКµлЛИкєМ?`, () => {
                    setPredictData(prev => {
                        const newData = { ...prev };
                        if (newData[monthKey]?.days) {
                            const updatedDays = { ...newData[monthKey].days };
                            delete updatedDays[dayToDel];
                            newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                        }
                        return newData;

                    setEditDayModal(null);

            const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(predictData, employees), [predictData, employees]);

            let totalMonthPay = 0;

            const firstDay = getFirstDayOfMonth(year, month);
            const calendarDays = [];

            for (let i = 0; i < firstDay; i++) calendarDays.push(null);
            for (let d = 1; d <= daysInMonth; d++) {
                calendarDays.push(d);
                Object.values((currentMonthData.days[d] || {}).entries || {}).forEach(entry => {
                    totalMonthPay += (entry.pay || 0);
                });
            }

            const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
                .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
                .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);

                            >

                            </button>
                        </div>
                        <div className="flex flex-wrap gap-3 items-center">
                            <div className="bg-amber-50 text-amber-700 px-4 py-2.5 rounded-xl text-xs font-bold border border-amber-200 whitespace-nowrap shadow-sm">
                                мШИмЄ° л™®лУЬ вАФ мЛ§м†Ь лН∞мЭінД∞мЩА лђікіА
                            </div>
                            <div className="bg-green-50 text-green-800 px-4 py-2.5 rounded-xl font-medium border border-green-200 whitespace-nowrap text-sm shadow-sm">
                                мИЬмИШ кЄЙмЧђ: {formatCurrency(totalMonthPay)}
                            </div>
                            <div className="bg-blue-50 text-blue-800 px-4 py-2.5 rounded-xl font-medium border border-blue-200 whitespace-nowrap text-sm shadow-sm">
                                м£ЉнЬімИШлЛє: {formatCurrency(totalMonthHolidayPay)}
                            </div>
                            <div className="bg-purple-50 text-purple-800 px-4 py-2.5 rounded-xl font-bold border border-purple-200 whitespace-nowrap text-sm shadow-sm">
                                мШИмЄ° міЭ кЄЙмЧђ: {formatCurrency(totalMonthPay + totalMonthHolidayPay)}
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-gray-200 overflow-hidden" onTouchStart={handleTouchStart} onTouchEnd={handleTouchEnd}>
                        <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                            {['мЭЉ', 'мЫФ', 'нЩФ', 'мИШ', 'л™©', 'кЄИ', 'нЖ†'].map((day, i) => (
                                <div key={day} className={`text-center py-3 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                                    {day}
                                </div>
                            ))}
                        </div>

                        <div className="grid grid-cols-7 auto-rows-fr">
                            {calendarDays.map((day, idx) => {
                                if (!day) return <div key={`ep-${idx}`} className="cal-cell-empty min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                                const dayData = currentMonthData.days[day] || { entries: {} };
                                let dailyTotalPay = 0;
                                const activeEntries = [];
                                Object.values(dayData.entries || {}).forEach(entry => {
                                    if (entry.hours > 0) { dailyTotalPay += entry.pay; activeEntries.push(entry); }
                                });

                                const isSunday = idx % 7 === 0;
                                const sundayKey = isSunday ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}` : null;
                                const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];

                                return (
                                    <div key={`epd-${day}`} className="cal-cell min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition cursor-pointer md:cursor-default" onClick={() => setEditDayModal(day)}>
                                        <div className="flex justify-between items-start mb-1">
                                            <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                                                {day}
                                            </span>
                                            {/* PCмЧРмДЬлІМ нИінМБ л≤ДнКЉ нСЬмЛЬ */}
                                            <div className="hidden md:flex opacity-0 group-hover:opacity-100 gap-1 transition" onClick={e => e.stopPropagation()}>
                                                <button onClick={() => setEditDayModal(day)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded shadow-sm">мИШм†Х</button>
                                                <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center shadow-sm" title="мВ≠м†Ь">
                                                    <X className="w-3 h-3" />
                                                </button>
                                            </div>
                                        </div>

                                        <div className="md:hidden space-y-0.5 mt-1">
                                            {activeEntries.length > 0 && <div className="text-[9px] text-green-700 font-semibold truncate">{activeEntries.length}л™Е кЈЉлђі</div>}
                                            {dailyTotalPay > 0 && <div className="text-[9px] font-bold text-green-600 truncate">{Math.round(dailyTotalPay/10000)}лІМмЫР</div>}
                                            {holidayEntries.length > 0 && <div className="w-1.5 h-1.5 rounded-full bg-blue-400 inline-block ml-0.5" title="м£ЉнЬімИШлЛє мШИмЄ°"></div>}
                                        </div>

                                        <div className="hidden md:block space-y-1 mt-2">
                                            <div className="text-xs text-gray-600 overflow-hidden">
                                                {activeEntries.slice(0, 3).map((e, i) => <div key={i} className="truncate">{e.name}: {fmtHours(e.hours)}</div>)}
                                                {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}л™Е...</div>}
                                            </div>
                                            {dailyTotalPay > 0 && (
                                                <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                                                    <div className="text-xs font-semibold text-green-700">мШИмЄ° мЭЄк±ілєД: {formatCurrency(dailyTotalPay)}</div>
                                                </div>
                                            )}
                                            {holidayEntries.length > 0 && (
                                                <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                                                    <div className="text-[10px] font-bold text-blue-600 mb-0.5">м£ЉнЬімИШлЛє мШИмЄ°</div>
                                                    {holidayEntries.map((h, i) => (
                                                        <div key={i} className="text-[10px] text-blue-500 truncate">{h.name}: {formatCurrency(h.holidayPay)}</div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </div>

                    {isBulkInputOpen && (
                        <BulkInputModal
                            year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                            activeEmployees={activeEmployees} monthlyData={predictData} setMonthlyData={setPredictData}
                            onClose={() => setIsBulkInputOpen(false)}
                        />
                    )}
                    {editDayModal && (
                        <DailyEditModal
                            year={year} month={month} day={editDayModal} monthKey={monthKey}
                            activeEmployees={activeEmployees} allEmployees={employees} monthlyData={predictData} setMonthlyData={setPredictData}
                            onClose={() => setEditDayModal(null)}
                            onDelete={() => handleDeleteDay(editDayModal)}
                        />
                    )}

                    <div className="flex justify-end mt-4">
                        <button
                            onClick={() => {
                                showConfirm(`${year}лЕД ${month}мЫФ мШИмЄ° м†Хл≥іл•Љ м†ХлІР міИкЄ∞нЩФнХШмЛЬк≤†мКµлЛИкєМ?`, () => {
                                    setPredictData(prev => { const nd = { ...prev }; delete nd[monthKey]; return nd; });
                                }, "мШИмЄ° м†Хл≥і міИкЄ∞нЩФ");
                            }}
                            className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2.5 rounded-xl transition border border-red-200 font-medium"
                        >
                            мЭіл≤ИлЛђ мШИмЄ° міИкЄ∞нЩФ
                        </button>
                    </div>
                </div>
            );
        }

        // вФАвФАвФА мДЬл™Е кЈЄл¶ђкЄ∞ л™®лЛђ (нЩХлМА мЇФл≤ДмК§) вФАвФАвФА
        function SignatureDrawModal({ onSave, onClose }) {
            const canvasRef = useRef(null);
            const [isDrawing, setIsDrawing] = useState(false);
            const [hasDrawn, setHasDrawn] = useState(false);
            const lastPosRef = useRef(null);

            const getPos = (e, canvas) => {
                const rect = canvas.getBoundingClientRect();
                const sx = canvas.width / rect.width;
                const sy = canvas.height / rect.height;
                if (e.touches) return { x: (e.touches[0].clientX - rect.left) * sx, y: (e.touches[0].clientY - rect.top) * sy };
                return { x: (e.clientX - rect.left) * sx, y: (e.clientY - rect.top) * sy };
            };

            const startDraw = (e) => {
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                setIsDrawing(true); setHasDrawn(true);
                lastPosRef.current = pos;
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#1a1a1a'; ctx.fill();
            };

            const draw = (e) => {
                if (!isDrawing) return;
                e.preventDefault();
                const canvas = canvasRef.current;
                const pos = getPos(e, canvas);
                const ctx = canvas.getContext('2d');
                ctx.beginPath(); ctx.moveTo(lastPosRef.current.x, lastPosRef.current.y);
                ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#1a1a1a'; ctx.lineWidth = 2.5;
                ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
                lastPosRef.current = pos;
            };

            const clear = () => {
                const canvas = canvasRef.current;
                canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
                setHasDrawn(false);
            };

            const handleConfirm = () => {
                if (!hasDrawn) return;
                onSave(canvasRef.current.toDataURL());
            };

            return (
                <div className="fixed inset-0 bg-black/80 flex items-center justify-center z-[10000] p-4" onClick={onClose}>
                    <div className="rounded-2xl shadow-2xl w-full max-w-lg" style={{ backgroundColor: 'white', color: '#111' }} onClick={e => e.stopPropagation()}>
                        <div className="px-5 pt-5 pb-2 flex items-center justify-between">
                            <div>
                                <h3 className="text-base font-bold" style={{ color: '#1f2937' }}>мДЬл™ЕнХШкЄ∞</h3>
                                <p className="text-xs mt-0.5" style={{ color: '#6b7280' }}>мЭіл¶ДмЭД м†ХмЮРл°Ь м†БмЦім£ЉмДЄмЪФ</p>
                            </div>
                            <button onClick={onClose} className="text-xl leading-none" style={{ color: '#9ca3af' }}>вЬХ</button>
                        </div>
                        <div className="px-5 pb-2 relative">
                            <canvas ref={canvasRef} width={600} height={260}
                                className="rounded-xl touch-none cursor-crosshair w-full"
                                style={{ touchAction: 'none', backgroundColor: 'white', display: 'block', border: '2px dashed #d1d5db' }}
                                onMouseDown={startDraw} onMouseMove={draw}
                                onMouseUp={() => setIsDrawing(false)} onMouseLeave={() => setIsDrawing(false)}
                                onTouchStart={startDraw} onTouchMove={draw} onTouchEnd={() => setIsDrawing(false)}
                            />
                            {!hasDrawn && (
                                <p className="absolute inset-0 mx-5 flex items-center justify-center text-sm pointer-events-none" style={{ color: '#9ca3af' }}>мЧђкЄ∞мЧР мДЬл™ЕнХШмДЄмЪФ</p>
                            )}
                            {hasDrawn && (
                                <button onClick={clear} className="absolute top-3 right-7 text-xs px-2 py-1 rounded-lg transition" style={{ backgroundColor: '#fee2e2', color: '#dc2626' }}>мІАмЪ∞кЄ∞</button>
                            )}
                        </div>
                        <div className="px-5 pb-5 flex gap-3 mt-3">
                            <button onClick={onClose} className="flex-1 py-3 rounded-xl text-sm font-medium transition" style={{ border: '1px solid #e5e7eb', backgroundColor: 'white', color: '#4b5563' }}>мЈ®мЖМ</button>
                            <button onClick={handleConfirm} disabled={!hasDrawn}
                                className="flex-1 py-3 rounded-xl text-sm font-bold transition"
                                style={{ backgroundColor: hasDrawn ? '#22c55e' : '#e5e7eb', color: hasDrawn ? 'white' : '#9ca3af', cursor: hasDrawn ? 'pointer' : 'not-allowed' }}>
                                мЩДл£М
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // вФАвФАвФА мЮРнХДмДЬл™Е мЇФл≤ДмК§ (нГ≠нХШл©і нЩХлМА л™®лЛђ мЧіл¶Љ) вФАвФАвФА
        function SignatureCanvas({ onSave, width = 320, height = 110, className = '' }) {
            const [showModal, setShowModal] = useState(false);
            const [savedSig, setSavedSig] = useState('');

            const handleModalSave = (dataUrl) => {
                setSavedSig(dataUrl);
                onSave && onSave(dataUrl);
                setShowModal(false);
            };

            const handleClear = (e) => {
                e.stopPropagation();
                setSavedSig('');
                onSave && onSave('');
            };

            return (
                <div className={`relative ${className}`}>
                    <div
                        onClick={() => setShowModal(true)}
                        className="border-2 border-dashed border-gray-300 rounded-xl cursor-pointer flex items-center justify-center w-full select-none"
                        style={{ height: `${height}px`, minHeight: '72px', backgroundColor: 'white' }}
                    >
                        {savedSig ? (
                            <img src={savedSig} alt="мДЬл™Е" className="w-full h-full object-contain p-1" style={{ backgroundColor: 'white' }} />
                        ) : (
                            <p className="text-gray-400 text-sm text-center pointer-events-none">мДЬл™ЕлЮА (нГ≠нХШмЧђ мДЬл™Е)</p>
                        )}
                    </div>
                    {savedSig && (
                        <button onClick={handleClear} className="absolute top-1 right-1 bg-red-100 text-red-600 text-xs px-2 py-1 rounded-lg hover:bg-red-200 transition">мІАмЪ∞кЄ∞</button>
                    )}
                    {showModal && <SignatureDrawModal onSave={handleModalSave} onClose={() => setShowModal(false)} />}
                </div>
            );
        }

        // вФАвФАвФА кЈЉл°Ьк≥ДмХљмДЬ мЧілЮМ л™®лЛђ вФАвФАвФА
        function ContractViewModal({ contract, onClose, bossCanSign, onSign, contractDeleteRequest, onRequestDelete, onCancelDelete, viewerRole }) {
            const [signing, setSigning] = useState(false);
            if (!contract) return null;
            const handleSign = async () => {
                setSigning(true);
                try { await onSign(); } catch(e) {}
                setSigning(false);
            };
            const handlePrint = () => {

                                        placeholder="вАҐвАҐвАҐвАҐвАҐвАҐ"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">мГИ лєДл∞Ал≤ИнШЄ</label>
                                    <input
                                        type="password" ref={newRef} value={newPin} onChange={e => handleInput(e, setNewPin, confirmRef)}
                                        className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-green-500 outline-none transition"
                                        placeholder="вАҐвАҐвАҐвАҐвАҐвАҐ"
                                    />
                                </div>
                                <div>
                                    <label className="block text-sm font-bold text-gray-700 mb-2">мГИ лєДл∞Ал≤ИнШЄ нЩХмЭЄ</label>
                                    <input
                                        type="password" ref={confirmRef} value={confirmPin} onChange={e => handleInput(e, setConfirmPin, null)}
                                        className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-xl px-4 py-3.5 focus:ring-2 focus:ring-green-500 outline-none transition"
                                        placeholder="вАҐвАҐвАҐвАҐвАҐвАҐ"
                                    />
                                </div>

                                <button
                                    onClick={handleSave}
                                    className="w-full mt-6 bg-green-600 text-white font-bold py-4 rounded-xl hover:bg-green-700 transition shadow-sm"
                                >
                                    м†АмЮ•нХШкЄ∞ (Enter)
                                </button>
                            </div>
                        </div>
                    )}
                </div>

                {/* кЈЉлђімЛЬк∞Д мЮЕл†• лЛ®мЬД мД§м†Х */}
                <div className="max-w-md mx-auto mt-6 bg-white rounded-2xl shadow-sm border border-gray-200">
                    <button onClick={() => setOpenTimeUnit(p => !p)} className="w-full p-6 flex items-center justify-between text-left">
                        <div className="flex items-center gap-3">
                            <div className="bg-blue-100 p-2.5 rounded-xl">
                                <svg className="w-6 h-6 text-blue-700" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><circle cx="12" cy="12" r="10"/><path d="M12 6v6l4 2"/></svg>
                            </div>
                            <div>
                                <h2 className="text-xl font-bold text-gray-800">кЈЉлђімЛЬк∞Д мЮЕл†• лЛ®мЬД</h2>
                                <p className="text-xs text-gray-500">мІБмЫРмЪ© нЩФл©імЧРмДЬ мЛЬк∞Д мЮЕл†• мЛЬ м†БмЪ©лРШлКФ лЛ®мЬД</p>
                            </div>
                        </div>
                        <svg className={`w-5 h-5 text-gray-400 transition-transform ${openTimeUnit ? 'rotate-180' : ''}`} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="6 9 12 15 18 9"/></svg>
                    </button>

                    {openTimeUnit && (
                        <div className="px-6 pb-6 border-t border-gray-100 pt-4">
                            <div className="space-y-2 mb-5">
                                {[
                                    { value: 'hour',   label: '1мЛЬк∞Д лЛ®мЬД', desc: 'мШИ: 8мЛЬк∞Д' },
                                    { value: 'half',   label: '30лґД лЛ®мЬД',  desc: 'мШИ: 8мЛЬк∞Д / 8мЛЬк∞Д 30лґД' },
                                    { value: 'ten',    label: '10лґД лЛ®мЬД',  desc: 'мШИ: 8мЛЬк∞Д 20лґД (мКђлЭЉмЭілУЬ мД†нГЭ)' },
                                    { value: 'minute', label: '1лґД лЛ®мЬД',   desc: 'мШИ: 8мЛЬк∞Д 45лґД (мІБм†С мЮЕл†•)' },
                                ].map(opt => (
                                    <label key={opt.value} className={`flex items-center gap-3 p-3 border-2 rounded-xl cursor-pointer transition ${localTimeUnit === opt.value ? 'border-blue-500 bg-blue-50' : 'border-gray-200 hover:bg-gray-50'}`}>
                                        <input type="radio" name="timeUnit" value={opt.value} checked={localTimeUnit === opt.value} onChange={() => setLocalTimeUnit(opt.value)} className="accent-blue-600" />
                                        <div>
                                            <p className="font-bold text-gray-800 text-sm">{opt.label}</p>
                                            <p className="text-xs text-gray-400">{opt.desc}</p>
                                        </div>
                                    </label>
                                ))}
                            </div>
                            <button onClick={handleSaveTimeUnit} disabled={savingUnit} className="w-full bg-blue-600 text-white font-bold py-3.5 rounded-xl hover:bg-blue-700 transition disabled:opacity-50">
                                {savingUnit ? 'м†АмЮ• м§С...' : 'м†АмЮ•нХШкЄ∞'}
                            </button>
                        </div>
                    )}
                </div>

                {/* кЄЙмЧђмІАкЄЙмЭЉ мЮРлПЩл∞ЬмЖ° мД§м†Х */}
                {!isDeleting && <PayslipSendSettings workspaceInfo={workspaceInfo} setWorkspaceInfo={setWorkspaceInfo} workspaceId={workspaceId} firebaseUser={firebaseUser} showAlert={showAlert} employees={employees} setEmployees={setEmployees} />}

                {/* кЈЉл°Ьк≥ДмХљмДЬ мД§м†Х */}
                {!isDeleting && (
                    <ContractTemplateEditor
                        workspaceInfo={workspaceInfo}
                        setWorkspaceInfo={setWorkspaceInfo}
                        workspaceId={workspaceId}
                        firebaseUser={firebaseUser}
                        showAlert={showAlert}
                        showConfirm={showConfirm}
                        employees={employees}
                        setEmployees={setEmployees}
                    />
                )}

                {/* мЧЕм≤і мВ≠м†Ь */}
                <WorkspaceDeleteSection
                    isDeleting={isDeleting}
                    deleteScheduledAt={deleteScheduledAt}
                    onDelete={onDeleteWorkspace}
                    onCancel={onCancelDeleteWorkspace}
                    showConfirm={showConfirm}
                    shopName={workspaceInfo?.shopName}
                />
                </>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlbaTracker />);
    </script>

    <!-- Service Worker лУ±л°Э: PWA installable м°∞к±і мґ©м°±мЪ© лєИ fetch handler.
         к∞Ал°Ьм±ДкЄ∞¬ЈмЇРмЛ±мЭі мЧЖмЦі OAuth нФМл°ЬмЪ∞мЩА нОШмЭімІА к∞±мЛ†мЭД лІЭмєШмІА мХКмЭМ. -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', function() {
                navigator.serviceWorker.register('./sw.js').catch(function() {});
            });
        }
    </script>
</body>
</html>
