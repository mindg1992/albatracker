        // 소수점 시간 → "X시간 Y분" 형식 (예: 3.5 → "3시간 30분")
        const fmtHours = (hours) => {
            if (!hours || hours <= 0) return '';
            const h = Math.floor(hours);
            const m = Math.round((hours - h) * 60);
            if (h > 0 && m > 0) return `${h}시간 ${m}분`;
            if (h > 0) return `${h}시간`;
            return `${m}분`;

        // --- 주휴수당 계산 유틸리티 ---
        function calcHolidayPayBySunday(monthlyData, employees) {
            const toLocalStr = (date) => {
                const y = date.getFullYear();
                const m = (date.getMonth() + 1).toString().padStart(2, '0');
                const d = date.getDate().toString().padStart(2, '0');
                return `${y}-${m}-${d}`;
            };

            const allDateEntries = {};
            Object.entries(monthlyData).forEach(([mk, monthData]) => {
                const [y, m] = mk.split('-').map(Number);
                Object.entries(monthData.days || {}).forEach(([day, dayData]) => {
                    const dateStr = toLocalStr(new Date(y, m - 1, parseInt(day)));
                    const empData = {};
                    Object.entries(dayData.entries || {}).forEach(([empId, entry]) => {
                        if (entry.hours > 0) empData[empId] = { hours: entry.hours, wage: entry.wage, name: entry.name };
                    });
                    if (Object.keys(empData).length > 0) allDateEntries[dateStr] = empData;
                });
            });

            const weekSundays = new Set();
            Object.keys(allDateEntries).forEach(dateStr => {
                const [y, m, d] = dateStr.split('-').map(Number);
                const date = new Date(y, m - 1, d);
                const dow = date.getDay();
                const daysToSunday = dow === 0 ? 0 : 7 - dow;
                weekSundays.add(toLocalStr(new Date(y, m - 1, d + daysToSunday)));
            });

            const result = {};
            weekSundays.forEach(sundayStr => {
                const [sy, sm, sd] = sundayStr.split('-').map(Number);
                const empWeekly = {};
                for (let i = 0; i < 7; i++) {
                    const dk = toLocalStr(new Date(sy, sm - 1, sd - 6 + i));
                    Object.entries(allDateEntries[dk] || {}).forEach(([empId, data]) => {
                        if (!empWeekly[empId]) {
                            const currentEmp = employees.find(e => String(e.id) === String(empId));
                            empWeekly[empId] = { hours: 0, totalPay: 0, name: currentEmp?.name || data.name };
                        }
                        empWeekly[empId].hours += data.hours;
                        empWeekly[empId].totalPay += Math.round(data.hours * data.wage);
                    });
                }

                const weekResults = [];
                Object.entries(empWeekly).forEach(([empId, { hours, totalPay, name }]) => {
                    if (hours >= 15) {
                        weekResults.push({ empId, name, weeklyHours: hours, weeklyPay: totalPay, holidayPay: Math.round(totalPay / 5) });
                    }
                });
                if (weekResults.length > 0) result[sundayStr] = weekResults;
            });
            return result;
        }

        // --- 공통 연/월 직접입력 컴포넌트 ---
        function MonthYearSelector({ year, month, onChange }) {
            const [y, setY] = useState(year);
            const [m, setM] = useState(month);

            useEffect(() => {
                setY(year);
                setM(month);
            }, [year, month]);

            const handleApply = () => {
                let newY = parseInt(y);
                let newM = parseInt(m);
                if (isNaN(newY) || newY < 1900) newY = new Date().getFullYear();
                if (isNaN(newM) || newM < 1) newM = 1;
                if (newM > 12) newM = 12;
                setY(newY);
                setM(newM);
                onChange(newY, newM);
            };

            const handleKeyDown = (e) => { if (e.key === 'Enter') handleApply(); };

            return (
                <div className="flex items-center gap-1 justify-center">
                    <input type="number" value={y} onChange={e => setY(e.target.value)} onKeyDown={handleKeyDown} className="text-lg md:text-xl font-bold text-gray-800 bg-transparent border-b-2 border-gray-300 focus:border-green-500 w-16 md:w-20 text-center outline-none transition-colors" />
                    <span className="text-lg md:text-xl font-bold text-gray-800">년</span>

            );

        // Firestore REST API로 저장 (SDK 스트리밍 연결 문제 우회)
        async function fsSet(docRef, data) {
            const uid = docRef.id;
            const token = await fbAuth.currentUser.getIdToken();
            const toFV = (v) => {
                if (v === null || v === undefined) return { nullValue: null };
                if (typeof v === 'boolean') return { booleanValue: v };
                if (typeof v === 'number') return Number.isInteger(v) ? { integerValue: String(v) } : { doubleValue: v };
                if (typeof v === 'string') return { stringValue: v };
                if (Array.isArray(v)) return { arrayValue: { values: v.map(toFV) } };
                if (typeof v === 'object') {
                    const fields = {};
                    Object.entries(v).forEach(([k, val]) => { fields[k] = toFV(val); });
                    return { mapValue: { fields } };
                }
                return { stringValue: String(v) };
            };
            const fields = {};
            Object.entries(data).forEach(([k, v]) => { fields[k] = toFV(v); });
            const resp = await fetch(
                `https://firestore.googleapis.com/v1/projects/albatracker-9e90e/databases/(default)/documents/users/${uid}`,
                {
                    method: 'PATCH',
                    headers: { 'Authorization': `Bearer ${token}`, 'Content-Type': 'application/json' },
                    body: JSON.stringify({ fields })
                }
            );
            if (!resp.ok) {
                const err = await resp.json().catch(() => ({}));
                throw new Error(err.error?.message || `HTTP ${resp.status}`);
            }
        }

        // --- 직원 시스템 헬퍼 함수 ---
        function generateInviteCode() {
            const chars = 'ABCDEFGHJKLMNPQRSTUVWXYZ23456789';
            let code = '';
            for (let i = 0; i < 6; i++) code += chars[Math.floor(Math.random() * chars.length)];
            return code;
        }

        // workspaceId = 워크스페이스 ID (관리자 uid 또는 uid__ws{timestamp})
        // ownerUid = 실제 Google 계정 uid (여러 업체의 소유자 식별용)
        async function setupBossWorkspace(workspaceId, shopName, ownerUid) {
            const inviteCode = generateInviteCode();

        // 관리자: 직원 근로계약서 삭제 → needs_resign 상태
        // 상호 동의 삭제: 한쪽이 먼저 누르면 contractDeleteRequest 설정, 양쪽 모두 누르면 계약서 완전 삭제
        async function requestContractDelete(empUid, bossUid, requester) {
            const ref = fbDb.collection('employeeAccounts').doc(empUid).collection('workplaces').doc(bossUid);
            const doc = await ref.get();
            const existing = doc.data()?.contractDeleteRequest;
            const otherSide = requester === 'boss' ? 'employee' : 'boss';
            if (existing === otherSide) {
                // 양쪽 동의 → 계약서 삭제 + needs_resign 상태로 전환
                await ref.update({
                    contractStatus: 'needs_resign',
                    contract: firebase.firestore.FieldValue.delete(),
                    contractDeleteRequest: firebase.firestore.FieldValue.delete()
                });
                // 근무자가 동의 완료한 경우(boss가 먼저 요청) → 관리자에게 알림
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_completed', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                } else {
                    try { await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).delete(); } catch(e) {}
                }
                return 'deleted';
            } else {
                await ref.update({ contractDeleteRequest: requester });
                if (requester === 'employee') {
                    await fbDb.collection('empPending').doc(`${empUid}_${bossUid}`).set({
                        type: 'contract_delete_request', empUid, bossUid,
                        createdAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                }
                return 'requested';
            }
        }

        // --- 업체 삭제 남은 시간 포맷 ---
        function formatDeleteRemaining(deleteScheduledAt) {
            if (!deleteScheduledAt) return '';
            const ms = deleteScheduledAt.toMillis ? deleteScheduledAt.toMillis() : new Date(deleteScheduledAt).getTime();
            const remaining = ms + 24 * 60 * 60 * 1000 - Date.now();
            if (remaining <= 0) return '곧 삭제됨';
            const h = Math.floor(remaining / 3600000);
            const m = Math.floor((remaining % 3600000) / 60000);
            return h > 0 ? `${h}시간 ${m}분` : `${m}분`;
        }

                setNavCanScrollRight(el.scrollLeft < el.scrollWidth - el.clientWidth - 2);

                const rafId = requestAnimationFrame(updateNavScroll);
                const ro = new ResizeObserver(() => requestAnimationFrame(updateNavScroll));

            // 역할 감지: loginRole localStorage로 구분 (같은 Google 계정이 관리자/직원 모두 가능)
            useEffect(() => {
                if (!firebaseUser) return;

                const loginRole = localStorage.getItem('albaLoginRole');

                    const docRef = fbDb.collection('employeeAccounts').doc(firebaseUser.uid);

                            if (cancelled) return;

                                        firebaseUser.uid,

                                        firebaseUser.displayName

                                        isGoogleEmployee: true,
                                        googleEmail: firebaseUser.email || '',

                                    };

                    setUserRole('boss');
                    setFbLoading(false);
                }

                return () => { cancelled = true; };
            }, [firebaseUser]);

            // 인증 완료 후 데이터 로딩 (localStorage 캐시 우선 → Firestore 서버 동기화) — 관리자 전용
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;

                let cancelled = false;
                const cacheKey = 'at_cache_' + currentWorkspaceId;
                const docRef = fbDb.collection('users').doc(currentWorkspaceId);

                const applyData = (d) => {
                    if (cancelled) return;
                    const resignedSet = resignedEmpUidsRef.current;
                    const rawEmployees = d.employees !== undefined ? d.employees : [];
                    const resolvedEmployees = resignedSet.size > 0
                        ? rawEmployees.map(e => resignedSet.has(e.empUid) ? { ...e, status: 'resigned' } : e)
                        : rawEmployees;
                    const newData = {
                        appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                        employees:     resolvedEmployees,
                        nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                        monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                        predictData:   d.predictData   !== undefined ? d.predictData   : {},
                        globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                    };
                    lastSyncedDataRef.current = JSON.stringify(newData);
                    setAppPin(newData.appPin);
                    setEmployees(newData.employees);
                    setNextEmpId(newData.nextEmpId);
                    setMonthlyData(newData.monthlyData);
                    setPredictData(newData.predictData);
                    setGlobalMinWage(newData.globalMinWage);
                };

                // ① localStorage 캐시 → 즉시 화면 표시 (사실상 0ms)
                const cached = localStorage.getItem(cacheKey);
                if (cached) {
                    try {
                        applyData(JSON.parse(cached));
                    } catch (_) {}
                    setFbLoading(false);
                }

                // ② Firestore 서버에서 최신 데이터 동기화 (실패해도 캐시로 동작)
                const syncFromServer = () => {
                    // 캐시 없을 때 Firestore hang → 스피너 무한 방지: 최대 4초 후 강제 해제
                    const loadingTimeout = setTimeout(() => {
                        if (!cancelled) setFbLoading(false);
                    }, 4000);

                    docRef.get().then(doc => {
                        if (cancelled) return;
                        if (doc.exists) {
                            let d = doc.data();
                            // 로컬에서 삭제한 월 데이터가 Firestore에 아직 반영 안 됐을 경우 방어
                            let hasPendingDeletes = false;
                            try {
                                const pdelKey = 'at_pdel_' + currentWorkspaceId;
                                const pendingDeletes = JSON.parse(localStorage.getItem(pdelKey) || '[]');
                                if (pendingDeletes.length > 0 && d.monthlyData) {
                                    const fixed = { ...d.monthlyData };
                                    pendingDeletes.forEach(k => { delete fixed[k]; });
                                    d = { ...d, monthlyData: fixed };
                                    hasPendingDeletes = true;
                                }
                            } catch(_) {}
                            const serverStr = JSON.stringify({
                                appPin:        d.appPin        !== undefined ? d.appPin        : INITIAL_PIN,
                                employees:     d.employees     !== undefined ? d.employees     : [],
                                nextEmpId:     d.nextEmpId     !== undefined ? d.nextEmpId     : 1,
                                monthlyData:   d.monthlyData   !== undefined ? d.monthlyData   : {},
                                predictData:   d.predictData   !== undefined ? d.predictData   : {},
                                globalMinWage: d.globalMinWage !== undefined ? d.globalMinWage : ''
                            });
                            if (serverStr !== lastSyncedDataRef.current) {
                                applyData(d);
                                localStorage.setItem(cacheKey, JSON.stringify(d));
                            }
                            // 삭제 대기 항목이 있으면: lastSyncedDataRef 초기화 + monthlyData 새 참조로 강제 업데이트
                            // → applyData 호출 여부와 무관하게 auto-save useEffect가 반드시 재실행됨
                            if (hasPendingDeletes) {
                                const filteredMonthly = d.monthlyData !== undefined ? d.monthlyData : {};
                                lastSyncedDataRef.current = '';
                                setMonthlyData({ ...filteredMonthly });
                            }
                        } else if (!cached) {
                            lastSyncedDataRef.current = JSON.stringify({
                                appPin: INITIAL_PIN, employees: [], nextEmpId: 1,
                                monthlyData: {}, predictData: {}, globalMinWage: ''
                            });
                        }
                    }).catch(e => {
                        if (cancelled) return;
                        // offline/unavailable 에러면 5초 후 자동 재시도 (팝업 없음)
                        if (e.code === 'unavailable' || e.message.includes('offline')) {
                            setTimeout(() => { if (!cancelled) syncFromServer(); }, 5000);
                        } else if (!cached) {
                            // 캐시도 없고 알 수 없는 에러일 때만 알림
                            showAlert('데이터를 불러오지 못했습니다.\n네트워크를 확인하고 새로고침해 주세요.', '연결 오류', 'error');
                        }
                    }).finally(() => {
                        clearTimeout(loadingTimeout);
                        if (!cancelled) setFbLoading(false);
                    });
                };
                syncFromServer();

                return () => { cancelled = true; };
            }, [firebaseUser, userRole, currentWorkspaceId]);

            const saveTimerRef = useRef(null);
            const [saveSuccess, setSaveSuccess] = useState(false);
            const [saveError, setSaveError] = useState(false);
            const saveSuccessTimerRef = useRef(null);

            useEffect(() => {
                if (!firebaseUser || fbLoading || userRole !== 'boss' || !currentWorkspaceId) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                const currentDataStr = JSON.stringify(currentData);

                // ① localStorage 즉시 저장 — 앱을 바로 닫아도 이 기기에선 데이터 보존
                localStorage.setItem('at_cache_' + currentWorkspaceId, JSON.stringify(currentData));

                // ② Firestore 동기화 — 이미 서버와 동일하면 건너뜀
                if (currentDataStr === lastSyncedDataRef.current) return;

                // ③ 2초 디바운스 후 Firestore에 백그라운드 저장 (구글 계정 동기화)
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                saveTimerRef.current = setTimeout(() => {
                    setIsSyncing(true);
                    fsSet(fbDb.collection('users').doc(currentWorkspaceId), currentData)
                        .then(() => {
                            lastSyncedDataRef.current = currentDataStr;
                            try { localStorage.removeItem('at_pdel_' + currentWorkspaceId); } catch(_) {}
                            setIsSyncing(false);
                            setSaveSuccess(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        })
                        .catch(e => {
                            console.error('Firestore 자동 저장 실패:', e);
                            setIsSyncing(false);
                            setSaveError(true);
                            clearTimeout(saveSuccessTimerRef.current);
                            saveSuccessTimerRef.current = setTimeout(() => setSaveError(false), 4000);
                        });
                }, 2000);
                return () => clearTimeout(saveTimerRef.current);
            }, [appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage, firebaseUser, fbLoading, userRole, currentWorkspaceId]);

            // 저장 버튼 — localStorage 즉시 저장 후 Firestore 동기화
            const handleManualSave = () => {
                if (!firebaseUser) {
                    showAlert('클라우드에 연결되어 있지 않습니다.\nGoogle 로그인을 진행해주세요.', '안내', 'alert');
                    return;
                }
                if (isSyncing) return;

                const currentData = { appPin, employees, nextEmpId, monthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);

                // localStorage 즉시 저장 (이 기기 데이터 보호)
                const wsId = currentWorkspaceId || firebaseUser.uid;
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));

                setIsSyncing(true);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => {
                        lastSyncedDataRef.current = JSON.stringify(currentData);
                        setIsSyncing(false);
                        setSaveSuccess(true);
                        clearTimeout(saveSuccessTimerRef.current);
                        saveSuccessTimerRef.current = setTimeout(() => setSaveSuccess(false), 2000);
                        showAlert('구글 계정에 저장되었습니다.', '저장 완료', 'success');
                    })
                    .catch(e => {
                        console.error('Firestore 저장 실패:', e);
                        setIsSyncing(false);
                        showAlert('구글 계정 저장에 실패했습니다.\n(' + e.message + ')\n\n이 기기에는 저장되었습니다.', '클라우드 동기화 실패', 'error');
                    });
            };

            // 특정 필드 즉시 Firestore 저장 (디바운스 없음) — 초기화 등 즉시 반영 필요한 경우
            const handleImmediateSaveMonthly = (newMonthlyData) => {
                if (!firebaseUser || !currentWorkspaceId) return;
                const wsId = currentWorkspaceId;
                const currentData = { appPin, employees, nextEmpId, monthlyData: newMonthlyData, predictData, globalMinWage };
                if (saveTimerRef.current) clearTimeout(saveTimerRef.current);
                localStorage.setItem('at_cache_' + wsId, JSON.stringify(currentData));
                lastSyncedDataRef.current = JSON.stringify(currentData);
                fsSet(fbDb.collection('users').doc(wsId), currentData)
                    .then(() => { try { localStorage.removeItem('at_pdel_' + wsId); } catch(_) {} })
                    .catch(() => {});
            };

            // PWA 스탠드얼론 모드 감지 — 이 경우 signInWithPopup은 opener 관계가 끊겨 동작 불가
            // (홈 화면에 설치된 앱에서 실행 중)
            const isStandalonePWA = () => {
                try {
                    return window.matchMedia('(display-mode: standalone)').matches
                        || window.navigator.standalone === true;
                } catch(_) { return false; }
            };

            const checkInAppBrowser = () => {
                const ua = navigator.userAgent;
                const isInApp = /KAKAOTALK|Instagram|FBAN|FBAV|Line\/|Twitter|NAVER|DaumApps|Whale/i.test(ua)
                    || (/Android/i.test(ua) && /wv/.test(ua))
                    || (/iPhone|iPad/i.test(ua) && !/Safari/i.test(ua) && /AppleWebKit/i.test(ua));
                if (isInApp) {
                    const isKakao = /KAKAOTALK/i.test(ua);
                    showAlert(
                        isKakao
                            ? '카카오톡 브라우저에서는 Google 로그인이 차단됩니다.\n\n우측 하단 ⋯ 메뉴 → "다른 브라우저로 열기"를 눌러 Chrome 또는 Safari에서 접속해 주세요.'
                            : '현재 앱 내 브라우저에서는 Google 로그인이 차단됩니다.\n\nChrome 또는 Safari 브라우저로 열어서 로그인해 주세요.',
                        '브라우저 안내', 'alert'
                    );
                    return true;
                }
                return false;
            };

            // Google 로그인 공통 헬퍼: popup 먼저 시도 → 실패 시 redirect fallback
            // TWA에서도 popup이 동작하는지 테스트하기 위해 display-mode 분기를 제거함
            // (과거에는 standalone이면 바로 redirect 사용 → TWA에서 스토리지 파티셔닝 문제로 복원 실패)
            const POPUP_FALLBACK_CODES = new Set([
                'auth/popup-blocked',
                'auth/web-storage-unsupported',
                'auth/operation-not-supported-in-this-environment',
                'auth/internal-error'
            ]);
            const tryGoogleSignIn = async () => {
                const provider = new firebase.auth.GoogleAuthProvider();
                try {
                    await fbAuth.signInWithPopup(provider);
                    return;
                } catch(e) {
                    const code = e?.code || '';
                    // 사용자가 직접 닫은 경우는 fallback 안 함 (실제 취소)
                    if (code === 'auth/popup-closed-by-user' || code === 'auth/cancelled-popup-request') {
                        throw e;
                    }
                    // popup을 열 수 없는 환경이면 redirect로 폴백
                    if (POPUP_FALLBACK_CODES.has(code) || !code) {
                        await fbAuth.signInWithRedirect(provider);
                        return; // 페이지 이동
                    }
                    throw e;
                }
            };

            const handleGoogleLogin = async () => {
                if (checkInAppBrowser()) return;
                localStorage.setItem('albaLoginRole', 'boss');
                setFbLoading(true);
                try {
                    await tryGoogleSignIn();
                } catch(e) {
                    localStorage.removeItem('albaLoginRole');
                    setFbLoading(false);
                    if (e?.code !== 'auth/popup-closed-by-user' && e?.code !== 'auth/cancelled-popup-request') {
                        showAlert('Google 로그인에 실패했습니다.\n' + (e?.message || ''), '오류', 'error');
                    }
                }
            };

            const handleEmpGoogleLogin = async () => {
                if (checkInAppBrowser()) return;
                localStorage.setItem('albaLoginRole', 'employee');
                setFbLoading(true);
                try {
                    await tryGoogleSignIn();
                } catch(e) {
                    localStorage.removeItem('albaLoginRole');
                    setFbLoading(false);
                    if (e?.code !== 'auth/popup-closed-by-user' && e?.code !== 'auth/cancelled-popup-request') {
                        showAlert('Google 로그인에 실패했습니다.\n' + (e?.message || ''), '오류', 'error');
                    }
                }
            };

            const handleLogout = () => {
                showConfirm('로그아웃 하시겠습니까?', async () => {
                    await fbAuth.signOut();
                    setIsAuthenticated(false);
                    setAppPin(INITIAL_PIN);
                    setEmployees([]);
                    setNextEmpId(1);
                    setMonthlyData({});
                    setPredictData({});
                    setGlobalMinWage('');
                    lastSyncedDataRef.current = "";
                    setUserRole(null);
                    setEmpAccount(null);
                    setWorkspaceInfo(null);
                    setPendingGoogleEmployees([]);
                    setEmpNotifications([]);
                    setMySubmissions({});
                    setEmpGoogleWorkplaces([]);
                    setSelectedEmpBossUid(null);
                    setShowEmpJoinScreen(false);
                    setCurrentWorkspaceId(null);
                    setBossWorkspaceList([]);
                    setBossWorkspacesLoaded(false);
                    localStorage.removeItem('selectedEmpBossUid');
                    localStorage.removeItem('albaLoginRole');
                    localStorage.removeItem('bossWorkspaceId');
                    sessionStorage.removeItem('bossWorkspaceSelected');
                });
            };

            // Google 직원이 퇴사 처리
            const handleEmpDisconnectWorkplace = (bossUid) => {
                const wp = empGoogleWorkplaces.find(w => w.bossUid === bossUid);
                const shopName = wp?.shopName || '이 업체';
                showConfirm(
                    `${shopName}에서 퇴사하시겠습니까?`,
                    async () => {
                        try {
                            await disconnectGoogleEmpWorkplace(
                                firebaseUser.uid, bossUid,
                                empAccount?.name || '', shopName
                            );
                            setEmpGoogleWorkplaces(prev => prev.map(w =>
                                w.bossUid === bossUid ? { ...w, status: 'resigned_by_emp' } : w
                            ));
                            setSelectedEmpBossUid(null);
                            localStorage.removeItem('selectedEmpBossUid');
                            setEmpAccount(prev => ({ ...prev, status: undefined, bossUid: undefined }));
                        } catch(e) {
                            showAlert('처리 오류: ' + e.message, '오류', 'error');
                        }
                    },
                    '퇴사하기'
                );
            };

            // 관리자 업체(workspaces) 목록 로드 — 다중 업체 지원
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss') return;
                let cancelled = false;
                setBossWorkspacesLoaded(false);

                // 5초 폴백: Firestore 응답 없어도 기본값으로 진행 (모바일 무한 스피너 방지)
                const fallbackTimer = setTimeout(() => {
                    if (!cancelled && !currentWorkspaceId) {
                        const savedId = localStorage.getItem('bossWorkspaceId') || firebaseUser.uid;
                        setBossWorkspaceList([{ id: savedId, shopName: '' }]);
                        setBossWorkspacesLoaded(true);
                        // 세션에서 선택된 업체가 있으면 자동 선택
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId === savedId) setCurrentWorkspaceId(savedId);
                    }
                }, 5000);

                fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).get()
                    .then(async doc => {
                        if (cancelled) return;
                        let workspaceIds;
                        if (doc.exists && doc.data().workspaceIds?.length) {
                            workspaceIds = doc.data().workspaceIds;
                        } else {
                            // 첫 사용자: 기본 업체(= uid) 등록
                            workspaceIds = [firebaseUser.uid];
                            fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).set({
                                workspaceIds: [firebaseUser.uid],
                                createdAt: firebase.firestore.FieldValue.serverTimestamp()
                            }).catch(() => {});
                        }

                        // 각 워크스페이스의 shopName + deleteScheduledAt 로드
                        const details = await Promise.all(
                            workspaceIds.map(id =>
                                fbDb.collection('workspaces').doc(id).get()
                                    .then(d => ({
                                        id,
                                        shopName: d.exists ? (d.data().shopName || '') : '',
                                        deleteScheduledAt: d.exists ? (d.data().deleteScheduledAt || null) : null
                                    }))
                                    .catch(() => ({ id, shopName: '', deleteScheduledAt: null }))
                            )
                        );
                        if (cancelled) return;
                        clearTimeout(fallbackTimer);

                        // 24시간 경과한 삭제 예약 업체 자동 정리
                        const now = Date.now();
                        const expired = details.filter(ws => {
                            if (!ws.deleteScheduledAt) return false;
                            const ms = ws.deleteScheduledAt.toMillis ? ws.deleteScheduledAt.toMillis() : new Date(ws.deleteScheduledAt).getTime();
                            return now > ms + 24 * 60 * 60 * 1000;
                        });
                        if (expired.length > 0) {
                            expired.forEach(ws => {
                                (async () => {
                                    try {
                                        await fbDb.collection('users').doc(ws.id).delete();
                                        await fbDb.collection('workspaces').doc(ws.id).delete();
                                        await fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).update({
                                            workspaceIds: firebase.firestore.FieldValue.arrayRemove(ws.id)
                                        });
                                        localStorage.removeItem('at_cache_' + ws.id);
                                    } catch(e) { console.error('만료 업체 자동 삭제 실패:', ws.id, e); }
                                })();
                            });
                            const expiredIds = new Set(expired.map(w => w.id));
                            const remaining = details.filter(d => !expiredIds.has(d.id));
                            setBossWorkspaceList(remaining);
                            // 삭제된 업체가 세션 선택이었으면 초기화
                            const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                            if (sessionId && expiredIds.has(sessionId)) {
                                sessionStorage.removeItem('bossWorkspaceSelected');
                                localStorage.removeItem('bossWorkspaceId');
                            }
                        } else {
                            setBossWorkspaceList(details);
                        }
                        setBossWorkspacesLoaded(true);

                        // 이번 세션에서 이미 선택한 업체가 있으면 자동 선택 (페이지 새로고침 대응)
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId && workspaceIds.includes(sessionId)) {
                            const expiredIds = new Set(expired.map(w => w.id));
                            if (!expiredIds.has(sessionId)) setCurrentWorkspaceId(sessionId);
                        }
                        // 세션 선택 없으면 업체 선택 화면 표시 (currentWorkspaceId = null 유지)
                    })
                    .catch(e => {
                        if (cancelled) return;
                        clearTimeout(fallbackTimer);
                        console.error('업체 목록 로드 오류:', e);
                        // 오류 시 기본값으로 폴백
                        const savedId = localStorage.getItem('bossWorkspaceId') || firebaseUser.uid;
                        setBossWorkspaceList([{ id: savedId, shopName: '' }]);
                        setBossWorkspacesLoaded(true);
                        const sessionId = sessionStorage.getItem('bossWorkspaceSelected');
                        if (sessionId === savedId) setCurrentWorkspaceId(savedId);
                    });

                return () => { cancelled = true; clearTimeout(fallbackTimer); };
            }, [firebaseUser?.uid, userRole]);

            // Google 직원 업체(workplaces) 로드
            useEffect(() => {
                if (!firebaseUser || userRole !== 'employee' || !empAccount?.isGoogleEmployee) return;
                let isFirst = true;

                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, currentWorkspaceId]);

            // 사장: 각 Google 직원의 workplaces 문서에서 contractStatus/pendingRewrite/contractDeleteRequest를 sync
            // (사장의 users 도큐먼트 employees 배열은 사장 측에서만 관리되므로, 직원이 자기 측에서 갱신한 contract 상태가
            //  사장 employees 배열에 자동으로 반영되지 않음. empPending 실시간 알림이 사장이 페이지를 비운 사이에는

            useEffect(() => {

                    const valid = results.filter(Boolean);

                    setEmployees(prev => {

                        const next = prev.map(e => {
                            if (!e.empUid) return e;
                            const r = valid.find(v => v.uid === e.empUid);
                            if (!r) return e;
                            const newCs = r.contractStatus !== undefined ? r.contractStatus : (e.contractStatus || null);
                            const newPr = !!r.pendingRewrite;
                            const newCdr = r.contractDeleteRequest || null;
                            const newCur = !!r.contractUpdateRequired;
                            if ((e.contractStatus || null) !== newCs
                                || !!e.pendingRewrite !== newPr
                                || (e.contractDeleteRequest || null) !== newCdr
                                || !!e.contractUpdateRequired !== newCur) {
                                changed = true;
                                return { ...e, contractStatus: newCs, pendingRewrite: newPr, contractDeleteRequest: newCdr, contractUpdateRequired: newCur };
                            }
                            return e;
                        });
                        return changed ? next : prev;
                    });
                });
                return () => { cancelled = true; };
            }, [firebaseUser?.uid, userRole, currentWorkspaceId, employees.length]);

            // 직원 제출 근무시간 실시간 수신 → 월별 현황 자동 반영 (관리자)

                            initialLoadDone = true;
                            return;
                        }
                        // 이후: 실시간 변경만 처리 (직원이 새로 시간 제출 등)
                        snap.docChanges().forEach(change => {
                            if (change.type !== 'added' && change.type !== 'modified') return;
                            const sub = change.doc.data();
                            if (!sub.date || sub.employeeId == null || !sub.hours) return;
                            if (sub.bossEntered) return;
                            const parts = sub.date.split('-').map(Number);
                            const mk = `${parts[0]}-${String(parts[1]).padStart(2,'0')}`;
                            const day = parts[2];
                            const emp = employeesRef.current.find(e => e.id !== undefined && e.id.toString() === String(sub.employeeId));
                            const empWage = emp?.wage ? Number(emp.wage) : 0;
                            const wage = Number(sub.wage) || empWage || Number(globalMinWage) || MIN_WAGE;
                            // submission에 wage가 없으면 Firebase 문서에 wage 추가 (직원 앱에서 시급 표시용)
                            if (!sub.wage && wage > 0) {
                                change.doc.ref.update({ wage }).catch(() => {});
                            }
                            const latestName = emp?.name || sub.empName;
                            setMonthlyData(prev => {
                                const md = prev[mk] || {};
                                const dd = md.days || {};
                                const de = dd[day] || {};
                                const ee = de.entries || {};
                                const existing = ee[sub.employeeId];
                                if (existing?.bossModified) return prev;
                                if (existing && existing.hours === sub.hours && existing.wage === wage && existing.name === latestName) return prev;
                                return {
                                    ...prev,
                                    [mk]: { ...md, days: { ...dd, [day]: { ...de, entries: { ...ee,
                                        [sub.employeeId]: {
                                            hours: sub.hours,
                                            pay: Math.round(sub.hours * wage),
                                            name: latestName,
                                            wage,
                                            note: sub.note || existing?.note || '',
                                            submittedByEmp: true,
                                            empUid: sub.empUid,
                                            submittedHours: sub.hours
                                        }
                                    }}}}
                                };
                            });
                            if (change.type === 'added' && sub.empName) {
                                setWorkSubmitBanner({ empName: sub.empName, date: sub.date, hours: sub.hours });
                                setUnseenDates(prev => new Set([...prev, sub.date]));
                            }
                        });
                    }, () => {});
                return () => unsub();
            }, [firebaseUser, userRole, isAuthenticated, currentWorkspaceId, globalMinWage]);

            // submissions에 wage 없는 문서 보충 (monthlyData/employees 로드 완료 후 1회)
            const wageBackfillDone = useRef(false);
            useEffect(() => {
                if (!firebaseUser || userRole !== 'boss' || !currentWorkspaceId) return;
                if (wageBackfillDone.current) return;
                if (employees.length === 0) return; // employees 아직 로드 안됨
                wageBackfillDone.current = true;
                fbDb.collection('workspaces').doc(currentWorkspaceId)
                    .collection('submissions').get().then(snap => {
                        snap.forEach(doc => {
                            const sub = doc.data();
                            if (sub.wage) return; // 이미 wage 있음
                            if (sub.employeeId == null) return;
                            const parts = (sub.date || '').split('-').map(Number);
                            const mk = parts.length >= 2 ? `${parts[0]}-${String(parts[1]).padStart(2,'0')}` : null;
                            const day = parts[2];
                            const monthlyEntry = mk ? monthlyData?.[mk]?.days?.[day]?.entries?.[sub.employeeId] : null;
                            const emp = employees.find(e => e.id !== undefined && e.id.toString() === String(sub.employeeId));
                            const empWage = emp?.wage ? Number(emp.wage) : 0;
                            const wage = Number(monthlyEntry?.wage) || empWage || 0;
                            if (wage > 0) doc.ref.update({ wage }).catch(() => {});
                        });
                    }).catch(() => {});
            }, [firebaseUser, userRole, currentWorkspaceId, employees, monthlyData]);

                const active = employees.filter(e => e.status !== 'deleted');
                const deleted = employees.filter(e => e.status === 'deleted');
                const sorted = [...active].sort((a, b) => {
                    const dateA = new Date(a.hireDate).getTime();
                    const dateB = new Date(b.hireDate).getTime();
                    if (dateA === dateB) return a.id - b.id;
                    return dateA - dateB;
                }).map((emp, index) => ({ ...emp, displayId: index + 1 }));
                // deleted 직원도 포함 (재가입 시 찾을 수 있도록)
                return [...sorted, ...deleted.map(e => ({ ...e, displayId: 99999 }))];
            }, [employees]);

            const fileInputRef = useRef(null);

            const handleBackup = () => {
                const backupData = { version: "1.0", employees, monthlyData, predictData, nextEmpId, appPin, globalMinWage };
                const dataStr = JSON.stringify(backupData);
                const dataUri = 'data:application/json;charset=utf-8,' + encodeURIComponent(dataStr);
                const dateStr = new Date().toISOString().slice(0, 10).replace(/-/g, '');
                const exportFileDefaultName = `알바트래커_백업_${dateStr}.json`;

                let linkElement = document.createElement('a');
                linkElement.setAttribute('href', dataUri);
                linkElement.setAttribute('download', exportFileDefaultName);
                document.body.appendChild(linkElement);
                linkElement.click();
                document.body.removeChild(linkElement);
            };

            const handleImportClick = () => {
                showConfirm("불러오기를 진행하면 현재 입력된 데이터가 모두 덮어씌워집니다.\n계속하시겠습니까?", () => {
                    fileInputRef.current?.click();
                }, "데이터 불러오기");
            };

            const handleFileImport = (e) => {
                const file = e.target.files[0];
                if (!file) return;

                const reader = new FileReader();
                reader.onload = (event) => {
                    try {
                        const importedData = JSON.parse(event.target.result);
                        if (importedData.employees && importedData.monthlyData) {
                            setEmployees(importedData.employees);
                            setMonthlyData(importedData.monthlyData);
                            if (importedData.predictData) setPredictData(importedData.predictData);
                            if (importedData.nextEmpId) setNextEmpId(importedData.nextEmpId);
                            if (importedData.appPin) setAppPin(importedData.appPin);
                            if (importedData.globalMinWage !== undefined) setGlobalMinWage(importedData.globalMinWage);
                            showAlert("백업 데이터를 성공적으로 불러왔습니다.", "성공", "success");
                        } else {
                            showAlert("유효하지 않은 백업 파일 형식입니다.", "오류", "error");
                        }
                    } catch (error) {
                        showAlert("파일을 읽는 중 오류가 발생했습니다.", "오류", "error");
                    }
                };
                reader.readAsText(file);
                e.target.value = null;
            };

            // 관리자 업체 전환
            const handleSwitchBossWorkspace = (newWorkspaceId) => {
                if (newWorkspaceId === currentWorkspaceId) { setShowBossWorkspaceSelect(false); return; }
                // 현재 데이터 초기화 후 새 업체로 전환
                setEmployees([]);
                setNextEmpId(1);
                setMonthlyData({});
                setPredictData({});
                setGlobalMinWage('');
                setWorkspaceInfo(null);
                setPendingGoogleEmployees([]);
                lastSyncedDataRef.current = '';
                setCurrentWorkspaceId(newWorkspaceId);
                localStorage.setItem('bossWorkspaceId', newWorkspaceId);
                sessionStorage.setItem('bossWorkspaceSelected', newWorkspaceId);
                setShowBossWorkspaceSelect(false);
            };

            // 업체 삭제 예약 (24시간 후 실제 삭제)
            const handleDeleteWorkspace = async () => {
                if (!firebaseUser || !currentWorkspaceId) return;
                try {
                    await fbDb.collection('workspaces').doc(currentWorkspaceId).update({
                        deleteScheduledAt: firebase.firestore.FieldValue.serverTimestamp()
                    });
                    // 클라이언트에서 현재 시각으로 즉시 반영
                    const now = { toMillis: () => Date.now(), _now: true };
                    setWorkspaceInfo(prev => ({ ...prev, deleteScheduledAt: now }));
                    setBossWorkspaceList(prev => prev.map(ws =>
                        ws.id === currentWorkspaceId ? { ...ws, deleteScheduledAt: now } : ws
                    ));
                } catch(e) {
                    showAlert('삭제 예약 실패: ' + e.message, '오류', 'error');
                }
            };

            // 업체 삭제 취소 (복구)
            const handleCancelDeleteWorkspace = async () => {
                if (!firebaseUser || !currentWorkspaceId) return;
                try {
                    await fbDb.collection('workspaces').doc(currentWorkspaceId).update({
                        deleteScheduledAt: firebase.firestore.FieldValue.delete()
                    });
                    setWorkspaceInfo(prev => { const n = { ...prev }; delete n.deleteScheduledAt; return n; });
                    setBossWorkspaceList(prev => prev.map(ws => {
                        if (ws.id === currentWorkspaceId) { const n = { ...ws }; delete n.deleteScheduledAt; return n; }
                        return ws;
                    }));
                    showAlert('업체 삭제가 취소되었습니다. 정상적으로 복구되었습니다.', '복구 완료', 'success');
                } catch(e) {
                    showAlert('복구 실패: ' + e.message, '오류', 'error');
                }
            };

            // 업체명 변경
            const handleRenameWorkspace = () => {
                if (!firebaseUser || !currentWorkspaceId || !workspaceInfo) return;
                const currentName = workspaceInfo.shopName || '';
                const newName = prompt('새 업체명을 입력하세요:', currentName);
                if (newName === null || newName.trim() === '' || newName.trim() === currentName) return;
                const trimmed = newName.trim();
                (async () => {
                    try {
                        // 1. workspaces 문서 업데이트
                        await fbDb.collection('workspaces').doc(currentWorkspaceId).update({ shopName: trimmed });
                        // 2. inviteCodes 문서 업데이트 (권한 없으면 무시)
                        if (workspaceInfo.inviteCode) {
                            fbDb.collection('inviteCodes').doc(workspaceInfo.inviteCode).update({ shopName: trimmed }).catch(() => {});
                        }
                        // 3. 클라이언트 상태 반영
                        setWorkspaceInfo(prev => ({ ...prev, shopName: trimmed }));
                        setBossWorkspaceList(prev => prev.map(ws =>
                            ws.id === currentWorkspaceId ? { ...ws, shopName: trimmed } : ws
                        ));
                        // 4. Google 직원들의 workplaces에도 shopName 업데이트 + 알림 발송
                        const empsWithUid = employees.filter(e => e.empUid);
                        for (const emp of empsWithUid) {
                            try {
                                await fbDb.collection('employeeAccounts').doc(emp.empUid)
                                    .collection('workplaces').doc(currentWorkspaceId)
                                    .update({ shopName: trimmed });
                                await addEmpNotification(emp.empUid, {
                                        type: 'shop_name_change',
                                        oldName: currentName,
                                        newName: trimmed,
                                        bossUid: currentWorkspaceId
                                    });
                            } catch(e) { console.error('업체명 변경 알림 발송 실패:', emp.empUid, e); }
                        }
                        showAlert(`업체명이 "${trimmed}"(으)로 변경되었습니다.`, '변경 완료', 'success');
                    } catch(e) {
                        showAlert('업체명 변경 실패: ' + e.message, '오류', 'error');
                    }
                })();
            };

            // 관리자 새 업체 추가 (BossSetupModal 트리거)
            const handleAddBossWorkspace = () => {
                const newId = `${firebaseUser.uid}__ws${Date.now()}`;
                setBossSetupWorkspaceId(newId);
                setShowBossWorkspaceSelect(false);
                setShowBossSetup(true);
            };

            // 현재 업체 삭제 예약 여부 (24시간 이내)
            const wsDeleteScheduledAt = workspaceInfo?.deleteScheduledAt;
            const isWorkspaceDeleting = (() => {
                if (!wsDeleteScheduledAt) return false;
                const ms = wsDeleteScheduledAt.toMillis ? wsDeleteScheduledAt.toMillis() : new Date(wsDeleteScheduledAt).getTime();
                return Date.now() < ms + 24 * 60 * 60 * 1000;
            })();

            // === 렌더 분기 ===

            // 로딩 중
            if (fbLoading || (firebaseUser && !userRole)) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <ATLogo className="w-16 h-16 mx-auto mb-5 rounded-2xl shadow-lg" />
                            <div className="w-8 h-8 border-3 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-3" style={{borderWidth:'3px'}}></div>
                            <p className="text-gray-500 text-sm font-medium">
                                {(firebaseUser && !userRole) ? '사용자 정보를 확인 중...' : '데이터를 동기화하고 있습니다...'}
                            </p>
                        </div>
                    </div>
                );
            }

            // 로그인 안 된 상태 → 랜딩 화면
            if (!firebaseUser) {
                return <LandingScreen onBossLogin={handleGoogleLogin} onEmpGoogleLogin={handleEmpGoogleLogin} modalConfig={modalConfig} />;
            }

            const allPendingEmployees = pendingGoogleEmployees;
            const contractRewriteRequests = employees.filter(e => e.status !== 'deleted' && e.contractDeleteRequest === 'employee');
            const contractRewriteRequestCount = contractRewriteRequests.length;
            const contractRewriteBannerMsg = contractRewriteRequestCount === 1
                ? `${contractRewriteRequests[0].name}님이 재작성을 요청했습니다.`
                : `${contractRewriteRequests[0]?.name}님 외 ${contractRewriteRequestCount - 1}명이 재작성을 요청했습니다.`;
            // 뱃지: 재작성 요청 ~ 작성 완료 전까지 유지 + 시급 미달 + 수정 필요 신호
            const contractPendingBadgeCount = employees.filter(e =>
                e.status !== 'deleted' && (
                    e.contractDeleteRequest === 'employee' ||
                    e.contractStatus === 'needs_resign' ||
                    e.contractStatus === 'pending_boss' ||
                    e.pendingRewrite ||
                    e.contractUpdateRequired ||
                    (e.wage && Number(e.wage) > 0 && Number(globalMinWage) > 0 && Number(e.wage) < Number(globalMinWage))
                )
            ).length;
            // 계약서 제출 알림 (pending_boss 상태)
            const contractSubmitRequests = employees.filter(e => e.status !== 'deleted' && e.contractStatus === 'pending_boss');
            const contractSubmitCount = contractSubmitRequests.length;
            const contractSubmitBannerMsg = contractSubmitCount === 1
                ? `${contractSubmitRequests[0].name}님이 근로계약서를 제출했습니다.`
                : `${contractSubmitRequests[0]?.name}님 외 ${contractSubmitCount - 1}명이 근로계약서를 제출했습니다.`;

            // ── 직원 플로우 ──
            if (userRole === 'employee') {

                // ── Google 직원 플로우 ──
                if (empAccount?.isGoogleEmployee) {
                    if (empWorkplaceLoading) {
                        return (
                            <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                                <div className="text-center">
                                    <ATLogo className="w-16 h-16 mx-auto mb-5 rounded-2xl shadow-lg" />
                                    <div className="w-8 h-8 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-3" style={{borderWidth:'3px', borderStyle:'solid'}}></div>
                                    <p className="text-gray-500 text-sm">업체 정보를 불러오는 중...</p>
                                </div>
                            </div>
                        );
                    }

                    const approvedWorkplaces = empGoogleWorkplaces.filter(w => w.status === 'approved');
                    const pendingWorkplaces = empGoogleWorkplaces.filter(w => w.status === 'pending');
                    const selectedWorkplace = selectedEmpBossUid
                        ? empGoogleWorkplaces.find(w => w.bossUid === selectedEmpBossUid)
                        : null;

                    // 근무업체 등록 화면 (업체 선택 화면에서 버튼으로 진입)
                    if (showEmpJoinScreen) {
                        return (
                            <>
                                <CustomModal config={modalConfig} />
                                <EmpGoogleJoinScreen
                                    firebaseUser={firebaseUser}
                                    empGoogleWorkplaces={empGoogleWorkplaces}
                                    onJoined={(newWorkplace) => {
                                        setEmpGoogleWorkplaces(prev => {
                                            const idx = prev.findIndex(w => w.bossUid === newWorkplace.bossUid);
                                            return idx >= 0 ? prev.map((w,i) => i===idx ? newWorkplace : w) : [...prev, newWorkplace];
                                        });
                                        setShowEmpJoinScreen(false);
                                    }}
                                    onBack={() => setShowEmpJoinScreen(false)}
                                    onLogout={handleLogout}
                                    showAlert={showAlert}
                                />
                            </>
                        );
                    }

                    // 업체 선택 화면 — pending 업체가 선택된 경우는 PendingApprovalScreen으로 넘김
                    if (!selectedEmpBossUid || !selectedWorkplace || (selectedWorkplace.status !== 'approved' && selectedWorkplace.status !== 'pending')) {
                        return (
                            <>
                                <CustomModal config={modalConfig} />
                                <WorkplaceSelectScreen
                                    workplaces={empGoogleWorkplaces}
                                    firebaseUser={firebaseUser}
                                    onSelect={(bossUid) => {
                                        const wp = empGoogleWorkplaces.find(w => w.bossUid === bossUid);
                                        if (!wp) return;
                                        setSelectedEmpBossUid(bossUid);
                                        localStorage.setItem('selectedEmpBossUid', bossUid);
                                        // workspaces 문서에서 최신 shopName 가져오기
                                        fbDb.collection('workspaces').doc(bossUid).get()
                                            .then(wsDoc => {
                                                if (wsDoc.exists && wsDoc.data()?.shopName) {
                                                    const latestName = wsDoc.data().shopName;
                                                    setEmpAccount(prev => prev?.bossUid === bossUid ? { ...prev, shopName: latestName } : prev);
                                                    setEmpGoogleWorkplaces(prev => prev.map(w => w.bossUid === bossUid ? { ...w, shopName: latestName } : w));
                                                }
                                            }).catch(() => {});
                                        setEmpAccount(prev => ({
                                            ...prev,
                                            bossUid: wp.bossUid,
                                            shopName: wp.shopName || '',
                                            name: wp.name,
                                            status: wp.status,
                                            workStatus: wp.workStatus || 'working',
                                            employeeId: wp.employeeId,
                                            residentId: wp.residentId || '',
                                            bank: wp.bank || '',
                                            account: wp.account || '',
                                            address: wp.address || '',
                                            phone: wp.phone || '',
                                            contractStatus: wp.contractStatus || null,
                                            contract: wp.contract || null,
                                            wageBelowMin: wp.wageBelowMin || false
                                        }));
                                    }}
                                    onAddWorkplace={() => setShowEmpJoinScreen(true)}
                                    onLogout={handleLogout}
                                />
                            </>
                        );
                    }

                    // 승인 대기 중
                    if (selectedWorkplace.status === 'pending') {
                        return (
                            <>
                                <CustomModal config={modalConfig} />
                                <PendingApprovalScreen
                                    empAccount={{ ...empAccount, ...selectedWorkplace }}
                                    firebaseUser={firebaseUser}
                                    onLogout={handleLogout}
                                    onBack={() => { setSelectedEmpBossUid(null); localStorage.removeItem('selectedEmpBossUid'); }}
                                    onResubmitComplete={(bossUid) => {
                                        setEmpGoogleWorkplaces(prev => prev.map(w =>
                                            w.bossUid === bossUid ? { ...w, contractRejected: false } : w
                                        ));
                                        setSelectedEmpBossUid(null);
                                        localStorage.removeItem('selectedEmpBossUid');
                                    }}
                                    showAlert={showAlert}
                                />
                            </>
                        );
                    }

                    // Google 직원 앱 (PIN 없음 — Google이 인증 역할)
                    return (
                        <>
                            <CustomModal config={modalConfig} />
                            <EmployeeApp
                                empAccount={{ ...empAccount, ...selectedWorkplace }}
                                onSetEmpAccount={(updater) => {
                                    setEmpAccount(updater);
                                    setEmpGoogleWorkplaces(prev => prev.map(w =>
                                        w.bossUid === selectedEmpBossUid
                                            ? (typeof updater === 'function' ? updater(w) : { ...w, ...updater })
                                            : w
                                    ));
                                }}
                                firebaseUser={firebaseUser}
                                mySubmissions={mySubmissions}
                                notifications={empNotifications.filter(n => !n.bossUid || n.bossUid === selectedEmpBossUid)}
                                onLogout={handleLogout}
                                onLock={handleLogout}
                                showAlert={showAlert}
                                showConfirm={showConfirm}
                                modalConfig={modalConfig}
                                onSwitchWorkplace={() => { setSelectedEmpBossUid(null); localStorage.removeItem('selectedEmpBossUid'); }}
                                onDisconnectWorkplace={handleEmpDisconnectWorkplace}
                                onAddWorkplace={() => setShowEmpJoinScreen(true)}
                                allWorkplaces={empGoogleWorkplaces}
                                notices={notices}
                            />
                        </>
                    );
                }

                // Google 직원만 지원 — isGoogleEmployee가 없으면 로그아웃 안내
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <CustomModal config={modalConfig} />
                        <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                            <AlertCircle className="w-16 h-16 text-red-500 mx-auto mb-4" />
                            <h2 className="text-xl font-bold text-gray-800 mb-2">로그인 오류</h2>
                            <p className="text-gray-500 text-sm mb-6">직원으로 로그인 버튼을 통해 접속해 주세요.</p>
                            <button onClick={handleLogout} className="w-full bg-gray-600 text-white py-3 rounded-xl font-bold">로그아웃</button>
                        </div>
                    </div>
                );
            }

            // ── 관리자 플로우 ──
            if (!isAuthenticated) {
                return (
                    <>
                        <CustomModal config={modalConfig} />
                        <LoginScreen appPin={appPin} onLogin={() => setIsAuthenticated(true)} />
                    </>
                );
            }

            // 관리자: 업체 목록 로딩 중
            if (!bossWorkspacesLoaded) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="text-center">
                            <div className="w-12 h-12 border-4 border-green-500 border-t-transparent rounded-full animate-spin mx-auto mb-4"></div>
                            <p className="text-gray-500 text-sm font-medium">업체 목록을 불러오는 중...</p>
                        </div>
                    </div>
                );
            }

            // 관리자: 업체 선택 화면 (업체 미선택 시)
            if (!currentWorkspaceId) {
                return (
                    <>
                        <CustomModal config={modalConfig} />
                        {showBossSetup && (
                            <BossSetupModal
                                firebaseUser={firebaseUser}
                                workspaceId={bossSetupWorkspaceId || firebaseUser.uid}
                                onSetup={(info) => {
                                    const wsId = bossSetupWorkspaceId || firebaseUser.uid;
                                    setWorkspaceInfo(info);
                                    setShowBossSetup(false);
                                    if (bossSetupWorkspaceId && bossSetupWorkspaceId !== firebaseUser.uid) {
                                        setBossWorkspaceList(prev => [...prev, { id: bossSetupWorkspaceId, shopName: info.shopName }]);
                                        fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).update({
                                            workspaceIds: firebase.firestore.FieldValue.arrayUnion(bossSetupWorkspaceId)
                                        }).catch(() => {});
                                    } else {
                                        setBossWorkspaceList(prev => {
                                            const exists = prev.find(w => w.id === wsId);
                                            if (exists) return prev.map(w => w.id === wsId ? { ...w, shopName: info.shopName } : w);
                                            return [...prev, { id: wsId, shopName: info.shopName }];
                                        });
                                    }
                                    setCurrentWorkspaceId(wsId);
                                    localStorage.setItem('bossWorkspaceId', wsId);
                                    sessionStorage.setItem('bossWorkspaceSelected', wsId);
                                    setBossSetupWorkspaceId(null);
                                }}
                                onCancel={bossSetupWorkspaceId && bossSetupWorkspaceId !== firebaseUser.uid ? () => {
                                    setShowBossSetup(false);
                                    setBossSetupWorkspaceId(null);
                                } : undefined}
                            />
                        )}
                        <BossWorkspaceLoginPage
                            workspaceList={bossWorkspaceList}
                            firebaseUser={firebaseUser}
                            onSelect={(wsId) => {
                                setCurrentWorkspaceId(wsId);
                                localStorage.setItem('bossWorkspaceId', wsId);
                                sessionStorage.setItem('bossWorkspaceSelected', wsId);
                            }}
                            onAdd={() => {
                                const newId = `${firebaseUser.uid}__ws${Date.now()}`;
                                setBossSetupWorkspaceId(newId);
                                setShowBossSetup(true);
                            }}
                            onLogout={handleLogout}
                            onCancelDelete={async (wsId) => {
                                try {
                                    await fbDb.collection('workspaces').doc(wsId).update({
                                        deleteScheduledAt: firebase.firestore.FieldValue.delete()
                                    });
                                    setBossWorkspaceList(prev => prev.map(ws => {
                                        if (ws.id === wsId) { const n = { ...ws }; delete n.deleteScheduledAt; return n; }
                                        return ws;
                                    }));
                                } catch(e) { showAlert('복구 실패: ' + e.message, '오류', 'error'); }
                            }}
                        />
                    </>
                );
            }

            const getEmployeeStats = (empId) => {
                let totalDays = 0, totalHours = 0, totalPay = 0;
                Object.values(monthlyData).forEach(monthData => {
                    Object.values(monthData.days || {}).forEach(dayData => {
                        const entry = dayData.entries?.[empId];
                        if (entry && entry.hours > 0) { totalDays++; totalHours += entry.hours; totalPay += entry.pay; }
                    });
                });

                const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
                let totalHolidayPay = 0;
                Object.values(holidayBySunday).forEach(weekData => {
                    weekData.forEach(item => {
                        if (item.empId === empId.toString()) totalHolidayPay += item.holidayPay;
                    });
                });

                return { totalDays, totalHours, totalPay, totalHolidayPay };
            };

            return (
                <div className="min-h-screen bg-gray-50 text-gray-800 font-sans relative pb-28 md:pb-6">
                    <CustomModal config={modalConfig} />
                    {showBossSetup && (
                        <BossSetupModal
                            firebaseUser={firebaseUser}
                            workspaceId={bossSetupWorkspaceId || currentWorkspaceId || firebaseUser.uid}
                            onSetup={(info) => {
                                setWorkspaceInfo(info);
                                setShowBossSetup(false);
                                // 새 업체였을 경우: 목록 추가 + 업체 인덱스 업데이트 + 전환
                                if (bossSetupWorkspaceId && bossSetupWorkspaceId !== firebaseUser.uid) {
                                    setBossWorkspaceList(prev => [...prev, { id: bossSetupWorkspaceId, shopName: info.shopName }]);
                                    fbDb.collection('bossWorkspaces').doc(firebaseUser.uid).update({
                                        workspaceIds: firebase.firestore.FieldValue.arrayUnion(bossSetupWorkspaceId)
                                    }).catch(() => {});
                                    // 기존 업체 데이터가 새 업체에 복사되지 않도록 초기화 후 전환
                                    setEmployees([]);

        function LoginScreen({ appPin, onLogin, empName }) {
            const [input, setInput] = useState('');
            const [error, setError] = useState(false);

            const handleNumClick = (num) => {
                if (input.length < 6) {
                    const newInput = input + num;
                    setInput(newInput);
                    setError(false);
                    if (newInput.length === 6 && newInput === appPin) {
                        setTimeout(onLogin, 100);
                    } else if (newInput.length === 6) {
                        setError(true);
                        setTimeout(() => setInput(''), 500);
                    }
                }
            };

            const handleDelete = () => setInput(prev => prev.slice(0, -1));

            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (/[0-9]/.test(e.key)) handleNumClick(e.key);
                    if (e.key === 'Backspace') handleDelete();
                    if (e.key === 'Enter' && input === appPin) onLogin();
                };
                window.addEventListener('keydown', handleKeyDown);
                return () => window.removeEventListener('keydown', handleKeyDown);
            }, [input, appPin]);

            return (
                <div className="min-h-screen bg-gray-50 flex flex-col items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-2xl shadow-xl w-full max-w-sm text-center">
                        <ATLogo className="w-16 h-16 mx-auto mb-4 rounded-2xl shadow-md" />
                        <h2 className="text-2xl font-bold text-gray-800 mb-1">{empName ? `${empName}님` : '알바트래커 v2.1'}</h2>
                        <p className="text-gray-500 mb-6 text-sm">
                            {empName ? 'PIN을 입력해주세요.' : (appPin === INITIAL_PIN ? '초기 비밀번호는 "000000"입니다.' : '비밀번호를 입력해주세요.')}
                        </p>

                        <div className="flex justify-center gap-3 mb-8">
                            {[...Array(6)].map((_, i) => (

        // ─── Google 직원: 새 업체 가입 화면 ───
        function EmpGoogleJoinScreen({ firebaseUser, empGoogleWorkplaces, onJoined, onBack, onLogout, showAlert }) {
            const [step, setStep] = useState('code'); // code → name → contract(선택) → done
            const [code, setCode] = useState('');
            const [inviteInfo, setInviteInfo] = useState(null);
            const [contractTemplate, setContractTemplate] = useState(null);
            const [name, setName] = useState(firebaseUser?.displayName || '');
            const [profile, setProfile] = useState({ residentId: '', bank: '', account: '', address: '', phone: '' });
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const [showContractWrite, setShowContractWrite] = useState(false);

            const handleCodeNext = async () => {
                if (code.trim().length !== 6) { setError('초대코드 6자리를 입력해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    const existingWp = empGoogleWorkplaces.find(w => w.inviteCode === code.trim().toUpperCase());
                    if (existingWp) {
                        if (existingWp.status === 'pending') { setError('이미 이 업체에 가입 신청 중입니다.'); setLoading(false); return; }
                        if (existingWp.status === 'approved') { setError('이미 이 업체에 승인된 계정이 있습니다.'); setLoading(false); return; }
                    }
                    const doc = await fbDb.collection('inviteCodes').doc(code.trim().toUpperCase()).get();
                    if (!doc.exists) { setError('유효하지 않은 초대코드입니다.'); setLoading(false); return; }
                    const bossUid = doc.data().bossUid;
                    const existingBossWp = empGoogleWorkplaces.find(w => w.bossUid === bossUid && w.status !== 'disconnected' && w.status !== 'resigned_by_emp' && w.workStatus !== 'deleted');
                    if (existingBossWp && existingBossWp.status === 'approved') {
                        showAlert('이미 이 업체에 승인된 계정이 있습니다.\n업체 선택 화면에서 선택해 주세요.', '안내', 'info');
                        setLoading(false); onBack(); return;
                    }
                    const invData = doc.data();
                    // workspaces 문서에서 최신 shopName 가져오기 + 근로계약서 템플릿 조회
                    try {
                        const wsDoc = await fbDb.collection('workspaces').doc(bossUid).get();
                        if (wsDoc.exists && wsDoc.data()?.shopName) {
                            invData.shopName = wsDoc.data().shopName;
                        }
                        setContractTemplate(wsDoc.data()?.contractTemplate || null);
                    } catch(_) { setContractTemplate(null); }
                    setInviteInfo(invData);
                    setStep('name');
                } catch(e) { setError('오류: ' + e.message); }
                setLoading(false);
            };

            const formatResidentId = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 13);
                return digits.length > 6 ? `${digits.slice(0,6)}-${digits.slice(6)}` : digits;
            };

            const formatPhone = (raw) => {
                const digits = raw.replace(/[^0-9]/g, '').slice(0, 11);
                if (digits.length <= 3) return digits;
                if (digits.length <= 7) return `${digits.slice(0,3)}-${digits.slice(3)}`;
                return `${digits.slice(0,3)}-${digits.slice(3,7)}-${digits.slice(7)}`;
            };

            // 프로필 작성 후 제출 (계약서 없을 때)
            const handleDirectSubmit = async () => {
                if (!name.trim()) { setError('이름을 입력해주세요.'); return; }
                setLoading(true); setError('');
                try {
                    await createGoogleEmpJoinRequest(
                        firebaseUser.uid, firebaseUser.email, name.trim(),
                        inviteInfo, code.trim().toUpperCase(), profile, null
                    );
                    const newWp = {
                        bossUid: inviteInfo.bossUid, empUid: firebaseUser.uid,
                        shopName: inviteInfo.shopName, status: 'pending',
                        employeeId: null, inviteCode: code.trim().toUpperCase(),
                        name: name.trim(), residentId: profile.residentId,
                        bank: profile.bank, account: profile.account,
                        address: profile.address, phone: profile.phone,
                        contractStatus: null
                    };
                    onJoined(newWp);
                } catch(e) { setError('가입 실패: ' + e.message); }
                setLoading(false);
            };

            // 근로계약서 작성 후 제출
            const handleContractSubmit = async (contractData) => {
                await createGoogleEmpJoinRequest(
                    firebaseUser.uid, firebaseUser.email, name.trim(),
                    inviteInfo, code.trim().toUpperCase(), profile, contractData
                );
                const newWp = {
                    bossUid: inviteInfo.bossUid, empUid: firebaseUser.uid,
                    shopName: inviteInfo.shopName, status: 'pending',
                    employeeId: null, inviteCode: code.trim().toUpperCase(),
                    name: name.trim(), residentId: profile.residentId,
                    bank: profile.bank, account: profile.account,
                    address: profile.address, phone: profile.phone,
                    contractStatus: 'pending_boss', contract: contractData
                };
                onJoined(newWp);
            };

            // 근로계약서 작성 화면
            if (showContractWrite && contractTemplate) {
                return (
                    <ContractWriteModal
                        template={contractTemplate}
                        employeeInfo={{ name: name.trim(), address: profile.address, phone: profile.phone }}
                        onSubmit={handleContractSubmit}
