                    <div className="flex items-center gap-4">
                      <label className="flex items-center cursor-pointer">
                        <input type="radio" name="status" value="working" checked={formData.status === 'working'} onChange={handleChange} className="w-4 h-4 text-green-600 focus:ring-green-500" />
                        <span className="ml-1.5 text-sm font-medium text-gray-700">근무 중</span>
                      </label>
                      <label className="flex items-center cursor-pointer">
                        <input type="radio" name="status" value="leave" checked={formData.status === 'leave'} onChange={handleChange} className="w-4 h-4 text-yellow-600 focus:ring-yellow-500" />
                        <span className="ml-1.5 text-sm font-medium text-gray-700">휴직</span>
                      </label>
                      <label className="flex items-center cursor-pointer">
                        <input type="radio" name="status" value="resigned" checked={formData.status === 'resigned'} onChange={handleChange} className="w-4 h-4 text-red-600 focus:ring-red-500" />
                        <span className="ml-1.5 text-sm font-medium text-gray-700">퇴사</span>
                      </label>
                    </div>
                    {formData.status === 'resigned' && (
                      <div className="mt-3">
                        <label className="block text-sm font-medium text-gray-700 mb-1">퇴사일</label>
                        <input type="date" name="resignDate" value={formData.resignDate || ''} onChange={handleChange} className="w-full border border-red-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-red-400 outline-none bg-white" />
                      </div>
                    )}
                    <p className="text-xs text-gray-500 mt-2">* 휴직 및 퇴사 상태일 경우 월별 현황 입력에서 제외됩니다.</p>
                  </div>

                  <div className="pt-4 flex gap-3">
                    <button type="button" onClick={onClose} className="flex-1 bg-gray-100 text-gray-700 py-2.5 rounded-lg hover:bg-gray-200 transition font-medium">취소</button>
                    <button type="submit" className="flex-1 bg-green-600 text-white py-2.5 rounded-lg hover:bg-green-700 transition font-medium">저장</button>
                  </div>
                </form>
              </div>
            </div>
          );
        }

        function TabCalendar({ employees, monthlyData, setMonthlyData }) {
          const [currentDate, setCurrentDate] = useState(new Date());
          const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
          const [editDayModal, setEditDayModal] = useState(null);

          const year = currentDate.getFullYear();
          const month = currentDate.getMonth() + 1;
          const monthKey = `${year}-${month.toString().padStart(2, '0')}`;
          
          const currentMonthData = monthlyData[monthKey] || { days: {} };
          const activeEmployees = employees.filter(e => {
              const statusVal = e.status || (e.isWorking === false ? 'resigned' : 'working');
              return statusVal === 'working';
          }).sort((a,b) => a.displayId - b.displayId);

          const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
          const nextMonth = () => setCurrentDate(new Date(year, month, 1));

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (isBulkInputOpen || editDayModal) return;
              if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
              if (e.key === 'ArrowLeft') prevMonth();
              if (e.key === 'ArrowRight') nextMonth();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [year, month, isBulkInputOpen, editDayModal]);

          // 이번달 총매출 업데이트 함수
          const handleTotalRevenueChange = (e) => {
            const val = e.target.value === '' ? '' : Number(e.target.value);
            setMonthlyData(prev => ({
              ...prev,
              [monthKey]: {
                ...(prev[monthKey] || { days: {} }),
                totalRevenue: val
              }
            }));
          };

          const handleDeleteDay = (dayToDel) => {
            if (window.confirm(`${year}년 ${month}월 ${dayToDel}일의 정보를 정말 삭제하시겠습니까?`)) {
              setMonthlyData(prev => {
                const newData = { ...prev };
                if (newData[monthKey] && newData[monthKey].days) {
                  const updatedDays = { ...newData[monthKey].days };
                  delete updatedDays[dayToDel]; // 해당 날짜 데이터 삭제
                  newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                }
                return newData;
              });
            }
          };

          // 이번달 일요일별 주휴수당 계산
          const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

          let totalMonthPay = 0;
          let sumOfDailyRevenue = 0;

          const daysInMonth = getDaysInMonth(year, month);
          const firstDay = getFirstDayOfMonth(year, month);
          const calendarDays = [];

          for (let i = 0; i < firstDay; i++) calendarDays.push(null);
          
          for (let d = 1; d <= daysInMonth; d++) {
            calendarDays.push(d);
            const dayData = currentMonthData.days[d] || {};
            sumOfDailyRevenue += (dayData.revenue || 0);
            Object.values(dayData.entries || {}).forEach(entry => {
              totalMonthPay += (entry.pay || 0);
            });
          }

          // 이번달 주휴수당 합산
          const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
            .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
            .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);
          const totalMonthGrandPay = totalMonthPay + totalMonthHolidayPay;

          // 총매출 입력값이 있으면 우선 반영, 없으면 일별 매출 총합 반영
          const explicitTotalRevenue = currentMonthData.totalRevenue || 0;
          const effectiveRevenue = explicitTotalRevenue > 0 ? explicitTotalRevenue : sumOfDailyRevenue;
          const payRatio = effectiveRevenue > 0 ? ((totalMonthGrandPay / effectiveRevenue) * 100).toFixed(1) : 0;

          return (
            <div className="space-y-4">
              <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                {/* 1행: 월 네비게이션 + 근무시간 입력 버튼 */}
                <div className="flex justify-between items-center">
                  <div className="flex items-center gap-2 md:gap-4">
                    <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                    <MonthYearSelector
                      year={year}
                      month={month}
                      onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                    />
                    <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                  </div>
                  <button
                    onClick={() => setIsBulkInputOpen(true)}
                    className="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap"
                  >
                    <Edit2 className="w-4 h-4" />
                    이번달 근무시간 입력
                  </button>
                </div>
                {/* 2행: 총매출 + 급여 요약 배지 (자동 줄바꿈) */}
                <div className="flex flex-wrap gap-2 items-center">
                  <div className="flex items-center gap-2 bg-white border border-gray-300 rounded-lg px-3 py-2 shadow-sm text-sm">
                    <label className="font-medium text-gray-700 whitespace-nowrap">이번달 총매출:</label>
                    <input
                      type="number"
                      value={currentMonthData.totalRevenue ?? ''}
                      onChange={handleTotalRevenueChange}
                      placeholder={sumOfDailyRevenue > 0 ? sumOfDailyRevenue.toString() : '0'}
                      className="w-28 border-none focus:ring-0 text-sm text-right outline-none bg-transparent p-0"
                    />
                    <span className="text-gray-500 font-medium whitespace-nowrap">원</span>
                  </div>
                  <div className="bg-green-50 text-green-800 px-3 py-2 rounded-lg font-medium border border-green-200 whitespace-nowrap text-sm">
                    순수 급여: {formatCurrency(totalMonthPay)}
                  </div>
                  <div className="bg-blue-50 text-blue-800 px-3 py-2 rounded-lg font-medium border border-blue-200 whitespace-nowrap text-sm">
                    주휴수당: {formatCurrency(totalMonthHolidayPay)}
                  </div>
                  <div className="bg-purple-50 text-purple-800 px-3 py-2 rounded-lg font-bold border border-purple-200 whitespace-nowrap text-sm">
                    총 급여: {formatCurrency(totalMonthGrandPay)} <span className="text-xs font-normal text-purple-600">({payRatio}%)</span>
                  </div>
                </div>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                  {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                    <div key={day} className={`text-center py-2 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                      {day}
                    </div>
                  ))}
                </div>
                
                <div className="grid grid-cols-7 auto-rows-fr">
                  {calendarDays.map((day, idx) => {
                    if (!day) return <div key={`empty-${idx}`} className="min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                    const dayData = currentMonthData.days[day] || { entries: {}, revenue: 0 };
                    let dailyTotalPay = 0;
                    const activeEntries = [];

                    Object.values(dayData.entries || {}).forEach(entry => {
                      if (entry.hours > 0) {
                        dailyTotalPay += entry.pay;
                        activeEntries.push(entry);
                      }
                    });

                    const dailyRatio = dayData.revenue > 0 ? ((dailyTotalPay / dayData.revenue) * 100).toFixed(0) : 0;

                    // 일요일이면 이 주의 주휴수당 확인
                    const isSunday = idx % 7 === 0;
                    const sundayKey = isSunday
                      ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`
                      : null;
                    const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];

                    return (
                      <div key={`day-${day}`} className="min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition">
                        <div className="flex justify-between items-start mb-1">
                          <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                            {day}
                          </span>
                          <div className="opacity-0 group-hover:opacity-100 flex gap-1 transition">
                            <button
                              onClick={() => setEditDayModal(day)}
                              className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded"
                            >
                              수정
                            </button>
                            <button
                              onClick={() => handleDeleteDay(day)}
                              className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center"
                              title="삭제"
                            >
                              <X className="w-3 h-3" />
                            </button>
                          </div>
                        </div>

                        <div className="space-y-1 mt-2">
                          <div className="text-[10px] md:text-xs text-gray-600 overflow-hidden">
                            {activeEntries.slice(0, 3).map((e, i) => (
                              <div key={i} className="truncate">{e.name}: {e.hours}H</div>
                            ))}
                            {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                          </div>

                          {dailyTotalPay > 0 && (
                            <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                              <div className="text-[10px] md:text-xs font-semibold text-green-700">인건비: {formatCurrency(dailyTotalPay)}</div>
                              <div className="text-[10px] md:text-xs text-gray-500 mt-0.5">매출: {formatCurrency(dayData.revenue || 0)}</div>
                              {dayData.revenue > 0 && (
                                <div className="text-[10px] font-medium text-gray-400 mt-0.5">비율: {dailyRatio}%</div>
                              )}
                            </div>
                          )}

                          {holidayEntries.length > 0 && (
                            <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                              <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 발생</div>
                              {holidayEntries.map((h, i) => (
                                <div key={i} className="text-[10px] text-blue-500 truncate">
                                  {h.name}: {formatCurrency(h.holidayPay)}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {isBulkInputOpen && (
                <BulkInputModal
                  year={year}
                  month={month}
                  monthKey={monthKey}
                  daysInMonth={daysInMonth}
                  activeEmployees={activeEmployees}
                  monthlyData={monthlyData}
                  setMonthlyData={setMonthlyData}
                  onClose={() => setIsBulkInputOpen(false)}
                />
              )}

              {editDayModal && (
                <DailyEditModal
                  year={year}
                  month={month}
                  day={editDayModal}
                  monthKey={monthKey}
                  activeEmployees={activeEmployees}
                  monthlyData={monthlyData}
                  setMonthlyData={setMonthlyData}
                  onClose={() => setEditDayModal(null)}
                />
              )}

              {/* 이번달 정보 초기화 버튼 */}
              <div className="flex justify-end mt-2">
                <button 
                  onClick={() => {
                    if(window.confirm(`${year}년 ${month}월 정보를 정말 초기화하시겠습니까?`)) {
                      setMonthlyData(prev => {
                        const newData = { ...prev };
                        delete newData[monthKey];
                        return newData;
                      });
                    }
                  }}
                  className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg transition border border-red-200"
                >
                  이번달 정보 초기화
                </button>
              </div>
            </div>
          );
        }

        function BulkInputModal({ year, month, monthKey, daysInMonth, activeEmployees, monthlyData, setMonthlyData, onClose }) {
          const inputRefs = useRef({});
          const [localData, setLocalData] = useState({});

          useEffect(() => {
            const initData = {};
            const currentMonthData = monthlyData[monthKey] || { days: {} };
            
            for (let d = 1; d <= daysInMonth; d++) {
              initData[d] = {};
              const dayData = currentMonthData.days[d] || { entries: {} };
              activeEmployees.forEach(emp => {
                initData[d][emp.id] = dayData.entries[emp.id]?.hours ?? '';
              });
            }
            setLocalData(initData);
          }, [monthKey, daysInMonth, activeEmployees, monthlyData]);

          const handleInputChange = (day, empId, val) => {
            setLocalData(prev => ({
              ...prev,
              [day]: { ...prev[day], [empId]: val }
            }));
          };

          const handleKeyDown = (e, day, empIdx) => {
            // 숫자, 소수점, 방향키 등 유효한 키 외의 입력 방지 ('e', 'E', '+', '-' 차단)
            if (['e', 'E', '+', '-'].includes(e.key)) {
                e.preventDefault();
                return;
            }

            let nextDay = day;
            let nextEmpIdx = empIdx;

            if (e.key === 'Enter' || e.key === 'ArrowDown') {
              e.preventDefault();
              if (day === daysInMonth) {
                  // 마지막 날짜인 경우, 다음 근무자의 1일로 이동
                  if (empIdx < activeEmployees.length - 1) {
                      nextDay = 1;
                      nextEmpIdx = empIdx + 1;
                  } else {
                      // 마지막 근무자의 마지막 날짜인 경우 이동하지 않음
                      nextDay = day;
                      nextEmpIdx = empIdx;
                  }
              } else {
                  nextDay = Math.min(day + 1, daysInMonth);
              }
            } else if (e.key === 'ArrowUp') {
              e.preventDefault();
              nextDay = Math.max(day - 1, 1);
            } else if (e.key === 'ArrowRight' || (e.key === 'Tab' && !e.shiftKey)) {
              e.preventDefault();
              nextEmpIdx = Math.min(empIdx + 1, activeEmployees.length - 1);
              if (e.key === 'Tab' && empIdx === activeEmployees.length - 1) {
                nextDay = Math.min(day + 1, daysInMonth);
                nextEmpIdx = 0;
              }
            } else if (e.key === 'ArrowLeft' || (e.key === 'Tab' && e.shiftKey)) {
              e.preventDefault();
              nextEmpIdx = Math.max(empIdx - 1, 0);
              if (e.key === 'Tab' && empIdx === 0) {
                nextDay = Math.max(day - 1, 1);
                nextEmpIdx = activeEmployees.length - 1;
              }
            }

            if (nextDay !== day || nextEmpIdx !== empIdx) {
              const nextRef = inputRefs.current[`${nextDay}-${activeEmployees[nextEmpIdx].id}`];
              if (nextRef) {
                nextRef.focus();
                nextRef.select();
              }
            }
          };

          const handleSave = () => {
            setMonthlyData(prev => {
              const newData = { ...prev };
              if (!newData[monthKey]) newData[monthKey] = { days: {} };

              for (let d = 1; d <= daysInMonth; d++) {
                if (!newData[monthKey].days[d]) newData[monthKey].days[d] = { revenue: 0, entries: {} };
                
                activeEmployees.forEach(emp => {
                  const hoursStr = localData[d][emp.id];
                  const hours = hoursStr === '' ? 0 : parseFloat(hoursStr);
                  
                  if (hours > 0 || (newData[monthKey].days[d].entries[emp.id] && hours === 0)) {
                     newData[monthKey].days[d].entries[emp.id] = {
                       hours: hours,
                       pay: hours * emp.wage,
                       name: emp.name,
                       wage: emp.wage
                     };
                  }
                });
              }
              return newData;
            });
            onClose();
          };

          return (
            <div className="fixed inset-0 bg-black/60 flex items-center justify-center p-2 sm:p-4 z-50">
              <div className="bg-white rounded-xl shadow-2xl w-full max-w-5xl h-[90vh] flex flex-col">
                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                  <div>
                    <h3 className="text-lg font-bold text-gray-800">{year}년 {month}월 근무시간 일괄 입력</h3>
                    <p className="text-xs text-gray-500 mt-1">방향키, Tab, Enter를 이용해 셀을 이동하세요. 맨 아래칸에서 엔터를 누르면 다음 사람으로 넘어갑니다.</p>
                  </div>
                  <button onClick={onClose} className="p-2 hover:bg-gray-200 rounded-full"><X className="w-5 h-5"/></button>
                </div>

                <div className="flex-1 overflow-auto p-4 relative">
                  {activeEmployees.length === 0 ? (
                    <div className="h-full flex items-center justify-center text-gray-500">현재 근무 중인 직원이 없습니다.</div>
                  ) : (
                    <table className="w-full border-collapse min-w-max">
                      <thead className="sticky top-0 bg-white shadow-sm z-10">
                        <tr>
                          <th className="border p-2 bg-gray-100 text-center w-16 whitespace-nowrap">날짜</th>
                          {activeEmployees.map(emp => (
                            <th key={emp.id} className="border p-2 bg-gray-100 text-center whitespace-nowrap text-sm">
                              {emp.displayId}. {emp.name} <span className="text-xs font-normal text-gray-500 block">{formatCurrency(emp.wage)}/h</span>
                            </th>
                          ))}
                        </tr>
                      </thead>
                      <tbody>
                        {Array.from({ length: daysInMonth }, (_, i) => i + 1).map(day => (
                          <tr key={day} className="hover:bg-yellow-50/50">
                            <td className="border p-2 text-center font-medium bg-gray-50 whitespace-nowrap">{day}일</td>
                            {activeEmployees.map((emp, empIdx) => (
                              <td key={emp.id} className="border p-1">
                                <input
                                  ref={el => inputRefs.current[`${day}-${emp.id}`] = el}
                                  type="number"
                                  step="0.5"
                                  min="0"
                                  value={localData[day]?.[emp.id] ?? ''}
                                  onChange={(e) => handleInputChange(day, emp.id, e.target.value)}
                                  onKeyDown={(e) => handleKeyDown(e, day, empIdx)}
                                  className="w-full h-10 text-center border-none focus:ring-2 focus:ring-green-500 bg-transparent"
                                  placeholder="0"
                                />
                              </td>
                            ))}
                          </tr>
                        ))}
                      </tbody>
                    </table>
                  )}
                </div>

                <div className="p-4 border-t bg-gray-50 flex justify-end gap-3 rounded-b-xl shrink-0">
                  <button onClick={onClose} className="px-6 py-2 border border-gray-300 rounded-lg bg-white hover:bg-gray-50 transition font-medium">취소</button>
                  <button onClick={handleSave} className="px-6 py-2 bg-green-600 text-white rounded-lg hover:bg-green-700 transition font-medium shadow-sm">저장하기</button>
                </div>
              </div>
            </div>
          );
        }

        function DailyEditModal({ year, month, day, monthKey, activeEmployees, monthlyData, setMonthlyData, onClose }) {
          const currentDayData = monthlyData[monthKey]?.days[day] || { revenue: 0, entries: {} };
          
          // 이미 기록이 있는 퇴사/휴직/삭제자 포함
          const combinedEmployees = useMemo(() => {
            const list = [...activeEmployees];
            const activeIds = new Set(activeEmployees.map(e => e.id.toString()));

            Object.entries(currentDayData.entries).forEach(([empIdStr, data]) => {
              if (!activeIds.has(empIdStr)) {
                list.push({
                  id: empIdStr,
                  displayId: '-',
                  name: data.name,
                  wage: data.wage,
                  isInactive: true
                });
              }
            });
            return list;
          }, [activeEmployees, currentDayData.entries]);

          const [revenue, setRevenue] = useState(currentDayData.revenue || '');
          const [hoursData, setHoursData] = useState(() => {
            const init = {};
            combinedEmployees.forEach(emp => {
              init[emp.id] = currentDayData.entries[emp.id]?.hours || '';
            });
            return init;
          });

          const handleSave = () => {
            setMonthlyData(prev => {
              const newData = { ...prev };
              if (!newData[monthKey]) newData[monthKey] = { days: {} };
              if (!newData[monthKey].days[day]) newData[monthKey].days[day] = { entries: {} };

              newData[monthKey].days[day].revenue = Number(revenue) || 0;

              combinedEmployees.forEach(emp => {
                const hours = Number(hoursData[emp.id]) || 0;
                if (hours > 0) {
                  newData[monthKey].days[day].entries[emp.id] = {
                    hours, pay: hours * emp.wage, name: emp.name, wage: emp.wage
                  };
                } else {
                  delete newData[monthKey].days[day].entries[emp.id];
                }
              });
              return newData;
            });
            onClose();
          };

          return (
            <div className="fixed inset-0 bg-black/50 flex items-center justify-center p-4 z-50">
              {/* Form으로 감싸서 엔터키 입력 시 자동으로 저장되도록 구현 */}
              <form 
                onSubmit={(e) => { e.preventDefault(); handleSave(); }} 
                className="bg-white rounded-xl shadow-xl w-full max-w-sm flex flex-col max-h-[90vh]"
              >
                <div className="p-4 border-b flex justify-between items-center bg-gray-50 rounded-t-xl shrink-0">
                  <h3 className="text-lg font-bold">{month}월 {day}일 상세 수정</h3>
                  <button type="button" onClick={onClose}><X className="w-5 h-5 text-gray-500"/></button>
                </div>
                
                <div className="p-4 space-y-4 overflow-y-auto">
                  <div>
                    <label className="block text-sm font-bold text-gray-700 mb-1">일일 매출 (원)</label>
                    <input 
                      type="number" 
                      value={revenue} 
                      onChange={e => setRevenue(e.target.value)}
                      className="w-full border rounded-lg px-3 py-2 focus:ring-green-500 outline-none" 
                      placeholder="0"
                    />
                  </div>

                  <div className="pt-2 border-t">
                    <label className="block text-sm font-bold text-gray-700 mb-2">근무 시간 수정</label>
                    {combinedEmployees.map(emp => (
                      <div key={emp.id} className="flex justify-between items-center mb-2">
                        <span className="text-sm text-gray-600 truncate flex items-center gap-1">
                          {emp.isInactive ? (
                            <span className="text-xs text-red-500 bg-red-50 border border-red-200 px-1 rounded font-bold">제외/퇴사</span>
                          ) : (
                            <span>{emp.displayId}.</span>
                          )}
                          {emp.name}
                        </span>
                        <div className="flex items-center gap-2">
                          <input 
                            type="number" step="0.5" min="0"
                            value={hoursData[emp.id] ?? ''}
                            onChange={e => setHoursData(prev => ({...prev, [emp.id]: e.target.value}))}
                            className="w-20 border rounded px-2 py-1 text-right text-sm focus:ring-2 focus:ring-green-500 outline-none"
                            placeholder="0"
                          />
                          <span className="text-sm text-gray-500">시간</span>
                        </div>
                      </div>
                    ))}
                  </div>
                </div>

                <div className="p-4 border-t flex gap-2 shrink-0">
                  <button type="button" onClick={onClose} className="flex-1 py-2 bg-gray-100 rounded-lg">취소</button>
                  <button type="submit" className="flex-1 py-2 bg-green-600 text-white rounded-lg">저장 (Enter)</button>
                </div>
              </form>
            </div>
          );
        }

        function TabPayroll({ employees, monthlyData }) {
          const [currentDate, setCurrentDate] = useState(new Date());
          
          const year = currentDate.getFullYear();
          const month = currentDate.getMonth() + 1;
          const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

          const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
          const nextMonth = () => setCurrentDate(new Date(year, month, 1));

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
              if (e.key === 'ArrowLeft') prevMonth();
              if (e.key === 'ArrowRight') nextMonth();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [year, month]);

          const payrollList = useMemo(() => {
            const list = {};
            const monthData = monthlyData[monthKey]?.days || {};

            Object.values(monthData).forEach(day => {
              Object.entries(day.entries || {}).forEach(([empId, data]) => {
                if (!list[empId]) {
                  const currentEmp = employees.find(e => e.id.toString() === empId);
                  list[empId] = {
                    id: empId,
                    displayId: currentEmp ? currentEmp.displayId : 99999,
                    name: data.name,
                    residentId: currentEmp?.residentId || '',
                    account: currentEmp?.account || '정보 없음',
                    bank: currentEmp?.bank || '-',
                    wage: currentEmp?.wage || data.wage || MIN_WAGE,
                    totalPay: 0,
                    totalHours: 0,
                    holidayPay: 0,
                    holidayWeeks: []
                  };
                }
                list[empId].totalPay += data.pay;
                list[empId].totalHours += data.hours;
              });
            });

            // 이번달 일요일 기준 주휴수당 합산
            const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
            Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
              const [sy, sm] = sundayStr.split('-').map(Number);
              if (sy !== year || sm !== month) return;
              weekData.forEach(({ empId, holidayPay, name, weeklyHours }) => {
                if (!list[empId]) {
                  const currentEmp = employees.find(e => e.id.toString() === empId);
                  list[empId] = {
                    id: empId,
                    displayId: currentEmp ? currentEmp.displayId : 99999,
                    name: name,
                    residentId: currentEmp?.residentId || '',
                    account: currentEmp?.account || '정보 없음',
                    bank: currentEmp?.bank || '-',
                    wage: currentEmp?.wage || MIN_WAGE,
                    totalPay: 0,
                    totalHours: 0,
                    holidayPay: 0,
                    holidayWeeks: []
                  };
                }
                list[empId].holidayPay += holidayPay;
                list[empId].holidayWeeks.push({ weeklyHours, holidayPay });
              });
            });

            return Object.values(list).sort((a, b) => a.displayId - b.displayId);
          }, [monthKey, monthlyData, employees, year, month]);

          const grandTotal = payrollList.reduce((sum, item) => sum + item.totalPay + item.holidayPay, 0);

          const handleExcelDownload = () => {
            const rows = [
              [`${year}년 ${month}월 인건비 지급 내역`],
              [],
              ['이름', '주민등록번호', '은행명', '계좌번호', '시급(원)', '근무시간(H)', '순수급여(원)', '주휴수당(원)', '총지급액(원)']
            ];

            payrollList.forEach(item => {
              rows.push([
                item.name,
                item.residentId || '',
                item.bank,
                item.account,
                item.wage,
                item.totalHours,
                item.totalPay,
                item.holidayPay,
                item.totalPay + item.holidayPay
              ]);
            });

            rows.push([]);
            rows.push(['', '', '', '', '', '', '', '총 지급 예정액', grandTotal]);

            const ws = XLSX.utils.aoa_to_sheet(rows);

            // 열 너비 설정
            ws['!cols'] = [
              { wch: 10 }, { wch: 18 }, { wch: 10 }, { wch: 20 },
              { wch: 12 }, { wch: 14 }, { wch: 14 }, { wch: 14 }, { wch: 14 }
            ];

            // 제목 행 병합
            ws['!merges'] = [{ s: { r: 0, c: 0 }, e: { r: 0, c: 8 } }];

            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, `${year}-${String(month).padStart(2,'0')}`);
            XLSX.writeFile(wb, `${year}.${String(month).padStart(2,'0')}. 급여명세.xlsx`);
          };

          return (
            <div className="space-y-4 max-w-5xl mx-auto">
              <div className="flex justify-center items-center bg-white p-4 rounded-xl shadow-sm border border-gray-200 gap-4">
                <div className="flex items-center gap-2 md:gap-4 shrink-0">
                  <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                  <MonthYearSelector
                    year={year}
                    month={month}
                    onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))}
                  />
                  <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                </div>
                {payrollList.length > 0 && (
                  <button
                    onClick={handleExcelDownload}
                    className="flex items-center gap-1.5 text-sm bg-emerald-600 hover:bg-emerald-700 text-white px-3 py-2 rounded-lg transition shadow-sm whitespace-nowrap"
                    title="엑셀로 다운로드"
                  >
                    <FileSpreadsheet className="w-4 h-4" />
                    엑셀 다운로드
                  </button>
                )}
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-left border-collapse min-w-max">
                    <thead className="bg-gray-50 border-b">
                      <tr>
                        <th className="p-4 font-semibold text-gray-600">구분번호</th>
                        <th className="p-4 font-semibold text-gray-600">이름</th>
                        <th className="p-4 font-semibold text-gray-600">은행명</th>
                        <th className="p-4 font-semibold text-gray-600">계좌번호</th>
                        <th className="p-4 font-semibold text-gray-600 text-right">시급</th>
                        <th className="p-4 font-semibold text-gray-600 text-right">이번달 근무시간</th>
                        <th className="p-4 font-semibold text-gray-600 text-right">순수 급여</th>
                        <th className="p-4 font-semibold text-blue-600 text-right">주휴수당</th>
                        <th className="p-4 font-semibold text-purple-600 text-right">{month}월 총 지급액</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                      {payrollList.length === 0 ? (
                        <tr>
                          <td colSpan="7" className="p-8 text-center text-gray-500">해당 월의 인건비 지급 내역이 없습니다.</td>
                        </tr>
                      ) : (
                        payrollList.map(item => (
                          <tr key={item.id} className="hover:bg-gray-50 transition">
                            <td className="p-4 text-gray-600">
                              {item.displayId === 99999 ? '- (삭제됨)' : `No. ${item.displayId}`}
                            </td>
                            <td className="p-4 font-medium text-gray-800">{item.name}</td>
                            <td className="p-4 text-gray-600">{item.bank}</td>
                            <td className="p-4 text-gray-600 font-mono text-sm">{item.account}</td>
                            <td className="p-4 text-right text-gray-600">{formatCurrency(item.wage)}</td>
                            <td className="p-4 text-right text-gray-600">{item.totalHours}H</td>
                            <td className="p-4 text-right font-bold text-green-600">
                              <div className="text-[11px] text-gray-400 font-normal">{formatCurrency(item.wage)} × {item.totalHours}H</div>
                              <div>{formatCurrency(item.totalPay)}</div>
                            </td>
                            <td className="p-4 text-right font-bold text-blue-600">
                              {item.holidayPay > 0 ? (
                                <>
                                  {item.holidayWeeks.length === 1 ? (
                                    <div className="text-[11px] text-gray-400 font-normal">
                                      {formatCurrency(item.wage)} × {item.holidayWeeks[0].weeklyHours}H÷5
                                    </div>
                                  ) : (
                                    <div className="text-[11px] text-gray-400 font-normal">
                                      {item.holidayWeeks.map((w, i) => (
                                        <div key={i}>{i + 1}주: {formatCurrency(item.wage)} × {w.weeklyHours}H÷5</div>
                                      ))}
                                    </div>
                                  )}
                                  <div>{formatCurrency(item.holidayPay)}</div>
                                </>
                              ) : (
                                <span className="text-gray-300 font-normal">-</span>
                              )}
                            </td>
                            <td className="p-4 text-right font-bold text-purple-700">
                              {formatCurrency(item.totalPay + item.holidayPay)}
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                    {payrollList.length > 0 && (
                      <tfoot className="bg-gray-50 border-t-2 border-gray-200">
                        <tr>
                          <td colSpan="8" className="p-4 text-right font-bold text-gray-700">총 지급 예정액</td>
                          <td className="p-4 text-right font-bold text-xl text-purple-700">{formatCurrency(grandTotal)}</td>
                        </tr>
                      </tfoot>
                    )}
                  </table>
                </div>
              </div>
            </div>
          );
        }

        // --- 도넛 차트 (원형 차트) 컴포넌트 ---
        function DonutGauge({ revenue, pay, holidayPay = 0, children }) {
          const [hoveredSegment, setHoveredSegment] = React.useState(null); // null | 'pay' | 'holiday'
          const totalPay = pay + holidayPay;
          const ratio      = revenue > 0 ? (totalPay / revenue) * 100 : 0;
          const payRatio   = revenue > 0 ? (pay / revenue) * 100 : 0;
          const holRatio   = revenue > 0 ? (holidayPay / revenue) * 100 : 0;
          const payDash    = revenue > 0 ? Math.min((pay / revenue) * 100, 100) : 0;
          const holDash    = revenue > 0 ? Math.min((holidayPay / revenue) * 100, Math.max(0, 100 - payDash)) : 0;

          return (
            <div className="flex flex-col items-center bg-gray-50 p-5 rounded-xl border border-gray-200 shadow-sm w-full">
              <div className="mb-4 h-8 flex items-center justify-center w-full">
                {children}
              </div>
              <div className="relative w-32 h-32 flex items-center justify-center mb-4 cursor-default">
                <svg viewBox="0 0 36 36" className="w-full h-full transform -rotate-90 drop-shadow-sm">
                  {/* 배경 원 (매출, 노란색) */}
                  <circle cx="18" cy="18" r="15.915" fill="transparent" stroke="#fef08a" strokeWidth="3" />
                  {/* 인건비 호 (초록) */}
                  {revenue > 0 && pay > 0 && (
                    <circle
                      cx="18" cy="18" r="15.915"
                      fill="transparent"
                      stroke={hoveredSegment === 'pay' ? '#16a34a' : '#22c55e'}
                      strokeWidth={hoveredSegment === 'pay' ? '4.5' : '3.5'}
                      strokeDasharray={`${payDash} ${100 - payDash}`}
                      strokeDashoffset="0"
                      strokeLinecap="butt"
                      pointerEvents="visibleStroke"
                      style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                      onMouseEnter={() => setHoveredSegment('pay')}
                      onMouseLeave={() => setHoveredSegment(null)}
                      className="transition-all duration-1000 ease-out"
                    />
                  )}
                  {/* 주휴수당 호 (파랑, 인건비 위에 스택) */}
                  {revenue > 0 && holidayPay > 0 && (
                    <circle
                      cx="18" cy="18" r="15.915"
                      fill="transparent"
                      stroke={hoveredSegment === 'holiday' ? '#2563eb' : '#60a5fa'}
                      strokeWidth={hoveredSegment === 'holiday' ? '4.5' : '3.5'}
                      strokeDasharray={`${holDash} ${100 - holDash}`}
                      strokeDashoffset={`${-payDash}`}
                      strokeLinecap="butt"
                      pointerEvents="visibleStroke"
                      style={{cursor: 'pointer', transition: 'stroke 0.15s, stroke-width 0.15s'}}
                      onMouseEnter={() => setHoveredSegment('holiday')}
                      onMouseLeave={() => setHoveredSegment(null)}
                      className="transition-all duration-1000 ease-out"
                    />
                  )}
                </svg>
                {/* 중앙 텍스트: 기본 총인건비율, 호버시 해당 세그먼트 비율 */}
                <div className="absolute inset-0 flex flex-col items-center justify-center text-center px-1 pointer-events-none">
                  {hoveredSegment === 'pay' && revenue > 0 ? (
                    <>
                      <span className="text-[9px] font-bold text-green-700 leading-tight">순수인건비</span>
                      <span className="text-lg font-bold text-green-600 leading-tight">{payRatio.toFixed(1)}%</span>
                      <span className="text-[9px] text-gray-400 leading-tight">매출 대비</span>
                    </>
                  ) : hoveredSegment === 'holiday' && revenue > 0 ? (
                    <>
                      <span className="text-[9px] font-bold text-blue-600 leading-tight">주휴수당</span>
                      <span className="text-lg font-bold text-blue-500 leading-tight">{holRatio.toFixed(1)}%</span>
                      <span className="text-[9px] text-gray-400 leading-tight">매출 대비</span>
                    </>
                  ) : (
                    <>
                      <span className="text-xl font-bold text-gray-800">{ratio.toFixed(1)}%</span>
                      <span className="text-[10px] text-gray-500 font-medium -mt-1">총인건비율</span>
                    </>
                  )}
                </div>
              </div>
              <div className="w-full space-y-2 text-sm">
                <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-gray-100">
                  <span className="text-gray-500 font-medium text-xs">매출</span>
                  <span className="font-bold text-gray-800">{formatCurrency(revenue)}</span>
                </div>
                <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-gray-100">
                  <span className="flex items-center gap-1 text-gray-500 font-medium text-xs"><span className="w-2 h-2 rounded-full bg-green-500 inline-block"></span>인건비</span>
                  <span className="font-bold text-green-600">{formatCurrency(pay)}</span>
                </div>
                <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-gray-100">
                  <span className="flex items-center gap-1 text-gray-500 font-medium text-xs"><span className="w-2 h-2 rounded-full bg-blue-400 inline-block"></span>주휴수당</span>
                  <span className="font-bold text-blue-600">{formatCurrency(holidayPay)}</span>
                </div>
                <div className="flex justify-between items-center bg-purple-50 px-3 py-1.5 rounded-lg border border-purple-100">
                  <span className="text-purple-600 font-bold text-xs">총 인건비</span>
                  <span className="font-bold text-purple-700">{formatCurrency(totalPay)}</span>
                </div>
              </div>
            </div>
          );
        }

        function BarColumn({ d, maxValue }) {
          const [hoveredBar, setHoveredBar] = React.useState(null); // null | 'revenue' | 'pay' | 'holiday'
          const totalPay = d.pay + d.holidayPay;
          const revH     = maxValue > 0 ? (d.revenue / maxValue) * 100 : 0;
          const stackH   = maxValue > 0 ? (totalPay / maxValue) * 100 : 0;
          const totalRatio = d.revenue > 0 ? ((totalPay / d.revenue) * 100).toFixed(1) : null;
          const payRatio   = d.revenue > 0 ? ((d.pay / d.revenue) * 100).toFixed(1) : null;
          const holRatio   = d.revenue > 0 ? ((d.holidayPay / d.revenue) * 100).toFixed(1) : null;
          const fmt = v => Math.round(v * 10000).toLocaleString();

          return (
            <div
              className="relative flex flex-col items-center h-full justify-end w-12"
              onMouseLeave={() => setHoveredBar(null)}
            >
              {/* 툴팁 */}
              {hoveredBar && (
                <div className="absolute top-0 left-1/2 -translate-x-1/2 text-[10px] bg-gray-800 text-white px-2 py-1.5 rounded pointer-events-none whitespace-nowrap z-20 leading-relaxed shadow-lg">
                  {hoveredBar === 'revenue' && (
                    <>
                      <div className="font-bold text-yellow-300">매출 {fmt(d.revenue)}원</div>
                      {totalRatio && <div className="text-gray-300">총급여 매출 대비 {totalRatio}%</div>}
                    </>
                  )}
                  {hoveredBar === 'pay' && (
                    <>
                      <div className="font-bold text-green-400">순수인건비 {fmt(d.pay)}원</div>
                      {payRatio && <div className="text-gray-300">매출 대비 {payRatio}%</div>}
                    </>
                  )}
                  {hoveredBar === 'holiday' && (
                    <>
                      <div className="font-bold text-blue-300">주휴수당 {fmt(d.holidayPay)}원</div>
                      {holRatio && <div className="text-gray-300">매출 대비 {holRatio}%</div>}
                    </>
                  )}
                </div>
              )}
              <div className="flex items-end gap-1 w-full justify-center h-full pb-1">
                {/* 매출 바 */}
                <div
                  style={{ height: `${revH}%`, backgroundColor: hoveredBar === 'revenue' ? '#ca8a04' : '#facc15' }}
                  className="w-4 rounded-t-sm cursor-pointer transition-colors duration-150"
                  onMouseEnter={() => setHoveredBar('revenue')}
                />
                {/* 스택 인건비 바 */}
                <div style={{ height: `${stackH}%` }} className="w-4 rounded-t-sm overflow-hidden flex flex-col-reverse">
                  {d.pay > 0 && (
                    <div
                      style={{ height: `${(d.pay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'pay' ? '#15803d' : '#22c55e' }}
                      className="w-full flex-none cursor-pointer"
                      onMouseEnter={() => setHoveredBar('pay')}
                    />
                  )}
                  {d.holidayPay > 0 && (
                    <div
                      style={{ height: `${(d.holidayPay / totalPay) * 100}%`, backgroundColor: hoveredBar === 'holiday' ? '#1d4ed8' : '#60a5fa' }}
                      className="w-full flex-none cursor-pointer"
                      onMouseEnter={() => setHoveredBar('holiday')}
                    />
                  )}
                </div>
              </div>
              <div className="absolute -bottom-6 text-sm text-gray-600 font-medium">{d.month}월</div>
            </div>
          );
        }

        function TabChart({ monthlyData, employees }) {
          const [selectedYear, setSelectedYear] = useState(new Date().getFullYear());
          
          // 원형 차트를 위한 독립적인 상태
          const [pieMonth, setPieMonth] = useState(() => {
            const d = new Date();
            return `${d.getFullYear()}-${(d.getMonth() + 1).toString().padStart(2, '0')}`;
          });
          const [pieYear, setPieYear] = useState(new Date().getFullYear());
          
          const availableYears = useMemo(() => {
            const years = new Set([new Date().getFullYear()]);
            Object.keys(monthlyData).forEach(key => years.add(parseInt(key.split('-')[0])));
            return Array.from(years).sort((a,b) => b - a);
          }, [monthlyData]);

          // 막대 차트 데이터 연산
          const chartData = useMemo(() => {
            const data = Array.from({ length: 12 }, (_, i) => ({ month: i + 1, revenue: 0, pay: 0, holidayPay: 0 }));

            Object.keys(monthlyData).forEach(key => {
              const [y, m] = key.split('-');
              if (parseInt(y) === selectedYear) {
                const monthIdx = parseInt(m) - 1;
                const monthObj = monthlyData[key] || {};
                const days = monthObj.days || {};

                let dailySumRev = 0;
                Object.values(days).forEach(day => {
                  dailySumRev += (day.revenue || 0);
                  Object.values(day.entries || {}).forEach(entry => {
                    data[monthIdx].pay += (entry.pay || 0) / 10000;
                  });
                });

                const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailySumRev;
                data[monthIdx].revenue += effectiveRev / 10000;
              }
            });

            // 주휴수당: 일요일 기준으로 해당 연도 월별 합산
            const holidayBySunday = calcHolidayPayBySunday(monthlyData, employees);
            Object.entries(holidayBySunday).forEach(([sundayStr, weekData]) => {
              const [sy, sm] = sundayStr.split('-').map(Number);
              if (sy !== selectedYear) return;
              const monthIdx = sm - 1;
              weekData.forEach(({ holidayPay }) => {
                data[monthIdx].holidayPay += holidayPay / 10000;
              });
            });

            return data;
          }, [monthlyData, employees, selectedYear]);

          const maxValue = Math.max(...chartData.map(d => Math.max(d.revenue, d.pay + d.holidayPay)), 100);
          const yTicks = [0, maxValue * 0.25, maxValue * 0.5, maxValue * 0.75, maxValue];

          // 주휴수당 전체 (pieMonth/Year/Total 계산에 재사용)
          const allHolidayBySunday = useMemo(() => calcHolidayPayBySunday(monthlyData, employees), [monthlyData, employees]);

          // 원형 차트 연산: 특정 월
          const pieMonthData = useMemo(() => {
            let dailyRevSum = 0, pay = 0;
            const monthObj = monthlyData[pieMonth] || { days: {} };
            Object.values(monthObj.days).forEach(day => {
              dailyRevSum += (day.revenue || 0);
              Object.values(day.entries || {}).forEach(entry => { pay += (entry.pay || 0); });
            });
            const effectiveRev = monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
            let holidayPay = 0;
            Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
              if (sundayStr.startsWith(pieMonth)) weekData.forEach(h => { holidayPay += h.holidayPay; });
            });
            return { revenue: effectiveRev, pay, holidayPay };
          }, [monthlyData, pieMonth, allHolidayBySunday]);

          // 원형 차트 연산: 특정 년도
          const pieYearData = useMemo(() => {
            let totalEffectiveRev = 0, totalPay = 0;
            Object.keys(monthlyData).forEach(key => {
              if (key.startsWith(pieYear.toString())) {
                const monthObj = monthlyData[key];
                let dailyRevSum = 0;
                Object.values(monthObj.days || {}).forEach(day => {
                  dailyRevSum += (day.revenue || 0);
                  Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
                });
                totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
              }
            });
            let holidayPay = 0;
            Object.entries(allHolidayBySunday).forEach(([sundayStr, weekData]) => {
              if (sundayStr.startsWith(pieYear.toString())) weekData.forEach(h => { holidayPay += h.holidayPay; });
            });
            return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
          }, [monthlyData, pieYear, allHolidayBySunday]);

          // 원형 차트 연산: 전체 누적
          const pieTotalData = useMemo(() => {
            let totalEffectiveRev = 0, totalPay = 0;
            Object.keys(monthlyData).forEach(key => {
              const monthObj = monthlyData[key];
              let dailyRevSum = 0;
              Object.values(monthObj.days || {}).forEach(day => {
                dailyRevSum += (day.revenue || 0);
                Object.values(day.entries || {}).forEach(entry => { totalPay += (entry.pay || 0); });
              });
              totalEffectiveRev += monthObj.totalRevenue > 0 ? monthObj.totalRevenue : dailyRevSum;
            });
            const holidayPay = Object.values(allHolidayBySunday).flat().reduce((s, h) => s + h.holidayPay, 0);
            return { revenue: totalEffectiveRev, pay: totalPay, holidayPay };
          }, [monthlyData, allHolidayBySunday]);

          return (
            <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-200 max-w-5xl mx-auto space-y-8">
              {/* 상단: 막대 차트 구역 */}
              <div>
                <div className="flex justify-between items-center mb-8">
                  <h2 className="text-xl font-bold text-gray-800 flex items-center gap-2">
                    <BarChart3 className="text-green-600" /> 월별 매출 및 인건비 추이
                  </h2>
                  <select 
                    value={selectedYear} 
                    onChange={e => setSelectedYear(parseInt(e.target.value))}
                    className="border border-gray-300 rounded-lg px-4 py-2 font-medium bg-gray-50 focus:ring-green-500 outline-none"
                  >
                    {availableYears.map(y => <option key={y} value={y}>{y}년</option>)}
                  </select>
                </div>

                <div className="flex justify-end gap-6 mb-4 text-sm font-medium">
                  <div className="flex items-center gap-2"><div className="w-3 h-3 bg-yellow-400 rounded"></div>매출</div>
                  <div className="flex items-center gap-2"><div className="w-3 h-3 bg-green-500 rounded"></div>인건비</div>
                  <div className="flex items-center gap-2"><div className="w-3 h-3 bg-blue-400 rounded"></div>주휴수당 (스택)</div>
                </div>

                <div className="relative h-72 w-full mt-4">
                  <div className="absolute inset-0 flex flex-col justify-between pointer-events-none pb-8 pr-4">
                    {yTicks.slice().reverse().map((tick, i) => (
                      <div key={i} className="flex items-center text-xs text-gray-400 w-full">
                        <span className="w-16 md:w-20 text-right mr-2">{Math.round(tick).toLocaleString()}만원</span>
                        <div className="flex-1 border-t border-gray-100 border-dashed"></div>
                      </div>
                    ))}
                  </div>

                  <div className="absolute inset-0 ml-20 md:ml-24 pb-8 flex items-end justify-around">
                    {chartData.map((d) => (
                      <BarColumn key={d.month} d={d} maxValue={maxValue} />
                    ))}
                  </div>
                </div>
              </div>

              {/* 구분선 */}
              <hr className="border-gray-200" />

              {/* 하단: 매출 대비 인건비 비율 원형 차트 */}
              <div>
                <h3 className="text-lg font-bold text-gray-800 mb-4 px-1">매출 대비 인건비 비율 (도넛 차트)</h3>
                <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                  {/* 왼쪽: 월별 선택 */}
                  <DonutGauge revenue={pieMonthData.revenue} pay={pieMonthData.pay} holidayPay={pieMonthData.holidayPay}>
                    <input 
                      type="month" 
                      value={pieMonth} 
                      onChange={e => setPieMonth(e.target.value)}
                      required
                      className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-lg px-3 py-1 outline-none text-center shadow-sm w-full"
                    />
                  </DonutGauge>

                  {/* 가운데: 연도별 선택 */}
                  <DonutGauge revenue={pieYearData.revenue} pay={pieYearData.pay} holidayPay={pieYearData.holidayPay}>
                    <select 
                      value={pieYear} 
                      onChange={e => setPieYear(parseInt(e.target.value))}
                      className="font-bold text-gray-800 bg-white border border-gray-200 cursor-pointer focus:ring-2 focus:ring-green-500 rounded-lg px-3 py-1 outline-none text-center shadow-sm w-full"
                    >
                      {availableYears.map(y => <option key={y} value={y}>{y}년 누적 비율</option>)}
                    </select>
                  </DonutGauge>

                  {/* 오른쪽: 전체 누적 합산 */}
                  <DonutGauge revenue={pieTotalData.revenue} pay={pieTotalData.pay} holidayPay={pieTotalData.holidayPay}>
                    <div className="font-bold text-gray-800 bg-gray-200/50 border border-transparent rounded-lg px-3 py-1 text-center w-full">
                      전체 누적 비율
                    </div>
                  </DonutGauge>
                </div>
              </div>
            </div>
          );
        }

        // ==========================================
        // 주휴수당 예측 탭 (독립 데이터, 근무 중인 직원만 연동)
        // ==========================================
        function TabPredict({ employees, predictData, setPredictData }) {
          const [currentDate, setCurrentDate] = useState(new Date());
          const [isBulkInputOpen, setIsBulkInputOpen] = useState(false);
          const [editDayModal, setEditDayModal] = useState(null);

          const year = currentDate.getFullYear();
          const month = currentDate.getMonth() + 1;
          const monthKey = `${year}-${month.toString().padStart(2, '0')}`;

          const currentMonthData = predictData[monthKey] || { days: {} };
          const activeEmployees = employees
            .filter(e => (e.status || (e.isWorking === false ? 'resigned' : 'working')) === 'working')
            .sort((a, b) => a.displayId - b.displayId);

          const prevMonth = () => setCurrentDate(new Date(year, month - 2, 1));
          const nextMonth = () => setCurrentDate(new Date(year, month, 1));

          useEffect(() => {
            const handleKeyDown = (e) => {
              if (isBulkInputOpen || editDayModal) return;
              if (['INPUT', 'TEXTAREA', 'SELECT'].includes(e.target.tagName)) return;
              if (e.key === 'ArrowLeft') prevMonth();
              if (e.key === 'ArrowRight') nextMonth();
            };
            window.addEventListener('keydown', handleKeyDown);
            return () => window.removeEventListener('keydown', handleKeyDown);
          }, [year, month, isBulkInputOpen, editDayModal]);

          const handleDeleteDay = (dayToDel) => {
            if (window.confirm(`${year}년 ${month}월 ${dayToDel}일의 예측 정보를 정말 삭제하시겠습니까?`)) {
              setPredictData(prev => {
                const newData = { ...prev };
                if (newData[monthKey]?.days) {
                  const updatedDays = { ...newData[monthKey].days };
                  delete updatedDays[dayToDel];
                  newData[monthKey] = { ...newData[monthKey], days: updatedDays };
                }
                return newData;
              });
            }
          };

          const holidayPayBySunday = useMemo(() => calcHolidayPayBySunday(predictData, employees), [predictData, employees]);

          let totalMonthPay = 0;
          const daysInMonth = getDaysInMonth(year, month);
          const firstDay = getFirstDayOfMonth(year, month);
          const calendarDays = [];

          for (let i = 0; i < firstDay; i++) calendarDays.push(null);
          for (let d = 1; d <= daysInMonth; d++) {
            calendarDays.push(d);
            Object.values((currentMonthData.days[d] || {}).entries || {}).forEach(entry => {
              totalMonthPay += (entry.pay || 0);
            });
          }

          const totalMonthHolidayPay = Object.entries(holidayPayBySunday)
            .filter(([s]) => { const [sy, sm] = s.split('-').map(Number); return sy === year && sm === month; })
            .reduce((sum, [, wd]) => sum + wd.reduce((s, h) => s + h.holidayPay, 0), 0);

          return (
            <div className="space-y-4">
              {/* 상단 헤더 */}
              <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-200 space-y-3">
                {/* 1행: 월 네비게이션 + 근무시간 입력 버튼 */}
                <div className="flex justify-between items-center">
                  <div className="flex items-center gap-2 md:gap-4">
                    <button onClick={prevMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronLeft className="w-5 h-5 md:w-6 md:h-6" /></button>
                    <MonthYearSelector year={year} month={month} onChange={(y, m) => setCurrentDate(new Date(y, m - 1, 1))} />
                    <button onClick={nextMonth} className="p-2 hover:bg-gray-100 rounded-full transition"><ChevronRight className="w-5 h-5 md:w-6 md:h-6" /></button>
                  </div>
                  <button
                    onClick={() => setIsBulkInputOpen(true)}
                    className="bg-gray-800 text-white px-4 py-2 rounded-lg hover:bg-gray-900 transition flex items-center gap-2 shadow-sm text-sm whitespace-nowrap"
                  >
                    <Edit2 className="w-4 h-4" />
                    이번달 근무시간 입력
                  </button>
                </div>
                {/* 2행: 예측 모드 배지 + 급여 요약 (자동 줄바꿈) */}
                <div className="flex flex-wrap gap-2 items-center">
                  <div className="bg-amber-50 text-amber-700 px-3 py-2 rounded-lg text-xs font-medium border border-amber-200 whitespace-nowrap">
                    예측 모드 — 실제 데이터와 무관
                  </div>
                  <div className="bg-green-50 text-green-800 px-3 py-2 rounded-lg font-medium border border-green-200 whitespace-nowrap text-sm">
                    순수 급여: {formatCurrency(totalMonthPay)}
                  </div>
                  <div className="bg-blue-50 text-blue-800 px-3 py-2 rounded-lg font-medium border border-blue-200 whitespace-nowrap text-sm">
                    주휴수당: {formatCurrency(totalMonthHolidayPay)}
                  </div>
                  <div className="bg-purple-50 text-purple-800 px-3 py-2 rounded-lg font-bold border border-purple-200 whitespace-nowrap text-sm">
                    예측 총 급여: {formatCurrency(totalMonthPay + totalMonthHolidayPay)}
                  </div>
                </div>
              </div>

              {/* 달력 */}
              <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                <div className="grid grid-cols-7 bg-gray-50 border-b border-gray-200">
                  {['일', '월', '화', '수', '목', '금', '토'].map((day, i) => (
                    <div key={day} className={`text-center py-2 text-sm font-bold ${i === 0 ? 'text-red-500' : i === 6 ? 'text-blue-500' : 'text-gray-600'}`}>
                      {day}
                    </div>
                  ))}
                </div>

                <div className="grid grid-cols-7 auto-rows-fr">
                  {calendarDays.map((day, idx) => {
                    if (!day) return <div key={`ep-${idx}`} className="min-h-[120px] border-b border-r border-gray-100 bg-gray-50/50"></div>;

                    const dayData = currentMonthData.days[day] || { entries: {} };
                    let dailyTotalPay = 0;
                    const activeEntries = [];
                    Object.values(dayData.entries || {}).forEach(entry => {
                      if (entry.hours > 0) { dailyTotalPay += entry.pay; activeEntries.push(entry); }
                    });

                    const isSunday = idx % 7 === 0;
                    const sundayKey = isSunday
                      ? `${year}-${month.toString().padStart(2, '0')}-${day.toString().padStart(2, '0')}`
                      : null;
                    const holidayEntries = sundayKey ? (holidayPayBySunday[sundayKey] || []) : [];

                    return (
                      <div key={`epd-${day}`} className="min-h-[140px] border-b border-r border-gray-100 p-2 relative group hover:bg-yellow-50/50 transition">
                        <div className="flex justify-between items-start mb-1">
                          <span className={`text-sm font-bold w-6 h-6 flex items-center justify-center rounded-full ${idx % 7 === 0 ? 'text-red-500' : idx % 7 === 6 ? 'text-blue-500' : 'text-gray-700'}`}>
                            {day}
                          </span>
                          <div className="opacity-0 group-hover:opacity-100 flex gap-1 transition">
                            <button onClick={() => setEditDayModal(day)} className="text-xs bg-gray-100 hover:bg-gray-200 text-gray-600 px-2 py-1 rounded">수정</button>
                            <button onClick={() => handleDeleteDay(day)} className="text-xs bg-red-50 hover:bg-red-100 text-red-500 px-1.5 py-1 rounded flex items-center justify-center" title="삭제">
                              <X className="w-3 h-3" />
                            </button>
                          </div>
                        </div>
                        <div className="space-y-1 mt-2">
                          <div className="text-[10px] md:text-xs text-gray-600 overflow-hidden">
                            {activeEntries.slice(0, 3).map((e, i) => (
                              <div key={i} className="truncate">{e.name}: {e.hours}H</div>
                            ))}
                            {activeEntries.length > 3 && <div className="text-gray-400 italic">+{activeEntries.length - 3}명...</div>}
                          </div>
                          {dailyTotalPay > 0 && (
                            <div className="mt-2 pt-1 border-t border-gray-100 border-dashed">
                              <div className="text-[10px] md:text-xs font-semibold text-green-700">예측 인건비: {formatCurrency(dailyTotalPay)}</div>
                            </div>
                          )}
                          {holidayEntries.length > 0 && (
                            <div className="mt-1 pt-1 border-t border-blue-100 border-dashed">
                              <div className="text-[10px] font-bold text-blue-600 mb-0.5">주휴수당 예측</div>
                              {holidayEntries.map((h, i) => (
                                <div key={i} className="text-[10px] text-blue-500 truncate">
                                  {h.name}: {formatCurrency(h.holidayPay)}
                                </div>
                              ))}
                            </div>
                          )}
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>

              {isBulkInputOpen && (
                <BulkInputModal
                  year={year} month={month} monthKey={monthKey} daysInMonth={daysInMonth}
                  activeEmployees={activeEmployees}
                  monthlyData={predictData}
                  setMonthlyData={setPredictData}
                  onClose={() => setIsBulkInputOpen(false)}
                />
              )}
              {editDayModal && (
                <DailyEditModal
                  year={year} month={month} day={editDayModal} monthKey={monthKey}
                  activeEmployees={activeEmployees}
                  monthlyData={predictData}
                  setMonthlyData={setPredictData}
                  onClose={() => setEditDayModal(null)}
                />
              )}

              <div className="flex justify-end mt-2">
                <button
                  onClick={() => {
                    if (window.confirm(`${year}년 ${month}월 예측 정보를 정말 초기화하시겠습니까?`)) {
                      setPredictData(prev => { const nd = { ...prev }; delete nd[monthKey]; return nd; });
                    }
                  }}
                  className="text-sm bg-red-50 text-red-600 hover:bg-red-100 px-4 py-2 rounded-lg transition border border-red-200"
                >
                  이번달 예측 초기화
                </button>
              </div>
            </div>
          );
        }

        function TabSettings({ appPin, setAppPin }) {
          const [currentPin, setCurrentPin] = useState('');
          const [newPin, setNewPin] = useState('');
          const [confirmPin, setConfirmPin] = useState('');
          const [message, setMessage] = useState('');

          const currentRef = useRef(null);
          const newRef = useRef(null);
          const confirmRef = useRef(null);

          const handleInput = (e, setter, nextRef, isSubmit = false) => {
            const val = e.target.value.replace(/[^0-9]/g, '').slice(0, 6);
            setter(val);
            
            if (val.length === 6 && nextRef) {
              nextRef.current.focus();
            }
          };

          const handleKeyDown = (e) => {
            if (e.key === 'Enter' && currentPin.length===6 && newPin.length===6 && confirmPin.length===6) {
              handleSave();
            }
          };

          const handleSave = () => {
            if (currentPin !== appPin) {
              setMessage({ type: 'error', text: '현재 비밀번호가 일치하지 않습니다.' });
              return;
            }
            if (newPin.length !== 6) {
              setMessage({ type: 'error', text: '새 비밀번호는 6자리 숫자여야 합니다.' });
              return;
            }
            if (newPin !== confirmPin) {
              setMessage({ type: 'error', text: '새 비밀번호와 확인이 일치하지 않습니다.' });
              return;
            }

            setAppPin(newPin);
            setMessage({ type: 'success', text: '비밀번호가 성공적으로 변경되었습니다.' });
            setCurrentPin('');
            setNewPin('');
            setConfirmPin('');
          };

          return (
            <div className="max-w-md mx-auto mt-8 bg-white p-8 rounded-xl shadow-sm border border-gray-200">
              <div className="flex items-center gap-3 mb-6">
                <div className="bg-gray-100 p-2 rounded-lg"><Lock className="w-6 h-6 text-gray-600" /></div>
                <h2 className="text-xl font-bold text-gray-800">앱 잠금 비밀번호 변경</h2>
              </div>

              {message && (
                <div className={`p-3 rounded-lg mb-6 flex items-center gap-2 text-sm ${message.type === 'error' ? 'bg-red-50 text-red-600 border border-red-100' : 'bg-green-50 text-green-700 border border-green-100'}`}>
                  {message.type === 'error' ? <AlertCircle className="w-4 h-4" /> : <CheckCircle2 className="w-4 h-4" />}
                  {message.text}
                </div>
              )}

              <div className="space-y-4" onKeyDown={handleKeyDown}>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">현재 비밀번호 (6자리 숫자)</label>
                  <input 
                    type="password" 
                    ref={currentRef}
                    value={currentPin}
                    onChange={e => handleInput(e, setCurrentPin, newRef)}
                    className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-green-500 outline-none"
                    placeholder="••••••"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">새 비밀번호</label>
                  <input 
                    type="password" 
                    ref={newRef}
                    value={newPin}
                    onChange={e => handleInput(e, setNewPin, confirmRef)}
                    className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-green-500 outline-none"
                    placeholder="••••••"
                  />
                </div>
                <div>
                  <label className="block text-sm font-medium text-gray-700 mb-1">새 비밀번호 확인</label>
                  <input 
                    type="password" 
                    ref={confirmRef}
                    value={confirmPin}
                    onChange={e => handleInput(e, setConfirmPin, null)}
                    className="w-full tracking-[0.5em] font-mono text-center border border-gray-300 rounded-lg px-3 py-3 focus:ring-2 focus:ring-green-500 outline-none"
                    placeholder="••••••"
                  />
                </div>

                <button 
                  onClick={handleSave}
                  className="w-full mt-6 bg-green-600 text-white font-bold py-3 rounded-lg hover:bg-green-700 transition shadow-sm"
                >
                  저장하기 (Enter)
                </button>
              </div>
            </div>
          );
        }

        // --- 앱 렌더링 ---
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<AlbaTracker />);
    </script>
</body>
</html>
